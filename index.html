<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<style>
:root {
  --note-bg: #0a0f1a;
  --note-surface: #0f1a2a;
  --note-surface-hover: #16253d;
  --note-text: #d0e4f5;
  --note-dim: #8fb5c4;
  --note-accent: #2f9bff;
  --note-border: #1e4a5a;
  --note-teal: #6ad5ff;
  --note-font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--note-bg);
  color: var(--note-text);
  font: 13px/1.5 var(--note-font), system-ui, sans-serif;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--note-surface);
  border-right: 1px solid var(--note-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--note-border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--note-text);
}
.btn-new {
  background: var(--note-accent);
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font: 600 11px var(--note-font), system-ui;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-new:hover { opacity: .85; }
.search-box {
  display: flex;
  align-items: center;
  background: var(--note-bg);
  border: 1px solid var(--note-border);
  border-radius: 6px;
  padding: 0 8px;
}
.search-box input {
  flex: 1;
  background: none;
  border: none;
  color: var(--note-text);
  font: 12px var(--note-font), system-ui;
  padding: 6px 4px;
  outline: none;
}
.search-box input::placeholder { color: var(--note-dim); }
.search-icon { color: var(--note-dim); font-size: 12px; }

/* Tag filter */
.tag-bar {
  display: flex;
  gap: 4px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--note-border);
  flex-wrap: wrap;
  min-height: 0;
}
.tag-bar:empty { display: none; padding: 0; border: none; }
.tag-pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--note-bg);
  border: 1px solid var(--note-border);
  color: var(--note-dim);
  cursor: pointer;
  transition: all .15s;
}
.tag-pill:hover, .tag-pill.active {
  background: var(--note-accent);
  color: #fff;
  border-color: var(--note-accent);
}

/* Note list */
.note-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.note-item {
  padding: 10px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .12s;
}
.note-item:hover { background: var(--note-surface-hover); }
.note-item.active {
  background: var(--note-surface-hover);
  border-left-color: var(--note-accent);
}
.note-item-top {
  display: flex;
  align-items: center;
  gap: 6px;
}
.note-item-pin { font-size: 10px; opacity: .6; }
.note-item-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--note-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.note-item-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
}
.note-item-date { font-size: 10px; color: var(--note-dim); }
.note-item-tags { display: flex; gap: 3px; }
.note-item-tag {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 8px;
  background: rgba(47,155,255,.18);
  color: var(--note-accent);
}
.note-item-preview {
  font-size: 11px;
  color: var(--note-dim);
  margin-top: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Editor */
.editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.editor-toolbar {
  padding: 10px 16px;
  border-bottom: 1px solid var(--note-border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.editor-toolbar input {
  flex: 1;
  background: none;
  border: none;
  color: var(--note-text);
  font: 600 16px var(--note-font), system-ui;
  outline: none;
}
.editor-toolbar input::placeholder { color: var(--note-dim); }
.toolbar-btn {
  background: var(--note-surface);
  border: 1px solid var(--note-border);
  color: var(--note-dim);
  padding: 4px 10px;
  border-radius: 6px;
  font: 11px var(--note-font), system-ui;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.toolbar-btn:hover { background: var(--note-surface-hover); color: var(--note-text); }
.toolbar-btn.active { background: var(--note-accent); color: #fff; border-color: var(--note-accent); }
.toolbar-btn.danger:hover { color: #ff5577; border-color: #ff5577; }

/* Tags editor */
.tags-bar {
  padding: 6px 16px;
  border-bottom: 1px solid var(--note-border);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.tags-bar .tag-chip {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(47,155,255,.18);
  color: var(--note-accent);
  display: flex;
  align-items: center;
  gap: 4px;
}
.tags-bar .tag-chip .tag-remove {
  cursor: pointer;
  opacity: .6;
  font-size: 12px;
}
.tags-bar .tag-chip .tag-remove:hover { opacity: 1; }
.tag-input {
  background: none;
  border: none;
  color: var(--note-text);
  font: 11px var(--note-font), system-ui;
  outline: none;
  width: 100px;
}
.tag-input::placeholder { color: var(--note-dim); }

/* Content area */
.content-wrap { flex: 1; overflow: hidden; position: relative; }
#editor-area {
  width: 100%;
  height: 100%;
  padding: 16px;
  background: none;
  border: none;
  color: var(--note-text);
  font: 13px/1.7 var(--note-font), system-ui;
  outline: none;
  resize: none;
}
#editor-area::placeholder { color: var(--note-dim); }
#preview-area {
  width: 100%;
  height: 100%;
  padding: 16px;
  overflow-y: auto;
  display: none;
}
#preview-area h1, #preview-area h2, #preview-area h3 { color: var(--note-text); margin: 16px 0 8px; }
#preview-area h1 { font-size: 20px; border-bottom: 1px solid var(--note-border); padding-bottom: 6px; }
#preview-area h2 { font-size: 17px; }
#preview-area h3 { font-size: 14px; }
#preview-area p { margin: 8px 0; line-height: 1.7; }
#preview-area code {
  background: var(--note-surface);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
}
#preview-area pre {
  background: var(--note-surface);
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 8px 0;
}
#preview-area pre code { background: none; padding: 0; }
#preview-area ul, #preview-area ol { padding-left: 24px; margin: 8px 0; }
#preview-area li { margin: 4px 0; }
#preview-area blockquote {
  border-left: 3px solid var(--note-accent);
  padding-left: 12px;
  color: var(--note-dim);
  margin: 8px 0;
}
#preview-area a { color: var(--note-accent); }
#preview-area strong { color: var(--note-text); }

/* Status bar */
.editor-status {
  padding: 4px 16px;
  border-top: 1px solid var(--note-border);
  font-size: 10px;
  color: var(--note-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.save-indicator { display: flex; align-items: center; gap: 4px; }
.save-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #2f9bff;
}
.save-dot.saving { background: #8fc5ff; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--note-dim);
  font-size: 13px;
  flex-direction: column;
  gap: 8px;
}

/* Backup buttons */
.backup-bar {
  position: fixed;
  bottom: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: .4;
  z-index: 100;
  transition: opacity .2s;
}
.backup-bar:hover { opacity: 1; }
.backup-btn {
  background: var(--note-surface);
  border: 1px solid var(--note-border);
  color: var(--note-dim);
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 10px;
  font-family: var(--note-font), system-ui;
}
.backup-btn:hover { color: var(--note-text); }

/* Responsive */
@media (max-width: 600px) {
  .sidebar { width: 100%; position: absolute; z-index: 10; height: 100vh; }
  .sidebar.hidden { display: none; }
  .mobile-toggle {
    display: block;
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 20;
    background: var(--note-surface);
    border: 1px solid var(--note-border);
    color: var(--note-text);
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
}
@media (min-width: 601px) {
  .mobile-toggle { display: none; }
}
</style>
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-top">
      <span class="sidebar-title">Notes</span>
      <button class="btn-new" onclick="createNote()">+ Neu</button>
    </div>
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input id="searchInput" placeholder="Suchen..." oninput="filterNotes()">
    </div>
  </div>
  <div class="tag-bar" id="tagBar"></div>
  <div class="note-list" id="noteList"></div>
</div>

<div class="editor" id="editorPanel">
  <div class="empty-state" id="emptyState">Notiz auswaehlen oder neue erstellen</div>
</div>

<div class="backup-bar">
  <button class="backup-btn" onclick="downloadBackup()" title="Backup herunterladen">Export</button>
  <button class="backup-btn" onclick="uploadBackup()" title="Backup hochladen">Import</button>
</div>

<script src="/sdk.js" onerror="window.PulseOS=null"></script>
<script>
const APP_ID = 'notes';
const API_URL = '/app/notes/api/notes';
const STORAGE_KEY = 'pulseos-app-notes';

let notes = [];
let activeId = null;
let saveTimer = null;
let previewMode = false;
let searchQuery = '';
let filterTag = null;

// --- Data ---

async function saveData(data) {
  try {
    const r = await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (r.ok) return;
  } catch {}
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

async function loadData() {
  try {
    const r = await fetch(API_URL);
    if (r.ok) return await r.json();
  } catch {}
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { notes: [] }; }
  catch { return { notes: [] }; }
}

async function loadNotes() {
  const data = await loadData();
  notes = data.notes || [];
  renderTagBar();
  renderList();
  if (notes.length > 0 && !activeId) selectNote(getSorted()[0].id);
}

function getSorted() {
  const pinned = notes.filter(n => n.pinned);
  const rest = notes.filter(n => !n.pinned);
  const byDate = (a, b) => new Date(b.updated || b.created || 0) - new Date(a.updated || a.created || 0);
  pinned.sort(byDate);
  rest.sort(byDate);
  return [...pinned, ...rest];
}

function getFiltered() {
  let list = getSorted();
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(n =>
      (n.title || '').toLowerCase().includes(q) ||
      (n.content || '').toLowerCase().includes(q) ||
      (n.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }
  if (filterTag) {
    list = list.filter(n => (n.tags || []).includes(filterTag));
  }
  return list;
}

function getAllTags() {
  const tags = new Set();
  notes.forEach(n => (n.tags || []).forEach(t => tags.add(t)));
  return [...tags].sort();
}

// --- Render ---

function renderTagBar() {
  const tags = getAllTags();
  const bar = document.getElementById('tagBar');
  if (tags.length === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = tags.map(t =>
    '<span class="tag-pill' + (filterTag === t ? ' active' : '') + '" onclick="toggleTagFilter(\'' + esc(t) + '\')">' + esc(t) + '</span>'
  ).join('');
}

function renderList() {
  const list = document.getElementById('noteList');
  const filtered = getFiltered();
  if (filtered.length === 0 && (searchQuery || filterTag)) {
    list.innerHTML = '<div style="padding:20px 14px;color:var(--note-dim);font-size:12px;text-align:center;">Keine Ergebnisse</div>';
    return;
  }
  list.innerHTML = filtered.map(n => {
    const date = (n.updated || n.created) ? new Date(n.updated || n.created).toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: '2-digit' }) : '';
    const preview = (n.content || '').substring(0, 80).replace(/\n/g, ' ').replace(/#/g, '');
    const tags = (n.tags || []);
    return '<div class="note-item' + (n.id === activeId ? ' active' : '') + '" onclick="selectNote(\'' + n.id + '\')">' +
      '<div class="note-item-top">' +
        (n.pinned ? '<span class="note-item-pin" title="Angepinnt">&#128204;</span>' : '') +
        '<span class="note-item-title">' + esc(n.title || 'Ohne Titel') + '</span>' +
      '</div>' +
      '<div class="note-item-meta">' +
        '<span class="note-item-date">' + date + '</span>' +
        (tags.length ? '<span class="note-item-tags">' + tags.map(t => '<span class="note-item-tag">' + esc(t) + '</span>').join('') + '</span>' : '') +
      '</div>' +
      (preview ? '<div class="note-item-preview">' + esc(preview) + '</div>' : '') +
    '</div>';
  }).join('');
}

function selectNote(id) {
  savePending();
  activeId = id;
  previewMode = false;
  const note = notes.find(n => String(n.id) === String(id));
  if (!note) return;
  const panel = document.getElementById('editorPanel');
  const tags = note.tags || [];
  panel.innerHTML =
    '<div class="editor-toolbar">' +
      '<input id="titleInput" value="' + esc(note.title || '') + '" placeholder="Titel..." oninput="updateTitle(this.value)">' +
      '<button class="toolbar-btn" id="btnPin" onclick="togglePin()" title="Anpinnen">' + (note.pinned ? '&#128204;' : '&#128392;') + '</button>' +
      '<button class="toolbar-btn" id="btnPreview" onclick="togglePreview()">Preview</button>' +
      '<button class="toolbar-btn danger" onclick="deleteNote()">&#128465;</button>' +
    '</div>' +
    '<div class="tags-bar" id="tagsBar">' +
      tags.map(t => '<span class="tag-chip">' + esc(t) + '<span class="tag-remove" onclick="removeTag(\'' + esc(t) + '\')">&times;</span></span>').join('') +
      '<input class="tag-input" id="tagInput" placeholder="+ Tag" onkeydown="handleTagKey(event)">' +
    '</div>' +
    '<div class="content-wrap">' +
      '<textarea id="editor-area" placeholder="Schreibe hier... (Markdown wird unterstuetzt)" oninput="updateContent(this.value)">' + esc(note.content || '') + '</textarea>' +
      '<div id="preview-area"></div>' +
    '</div>' +
    '<div class="editor-status">' +
      '<span id="charCount">' + (note.content || '').length + ' Zeichen</span>' +
      '<span class="save-indicator"><span class="save-dot" id="saveDot"></span> <span id="saveLabel">gespeichert</span></span>' +
    '</div>';
  renderList();
  // Mobile: hide sidebar after selection
  if (window.innerWidth <= 600) {
    document.getElementById('sidebar').classList.add('hidden');
  }
}

// --- Actions ---

function createNote() {
  const note = {
    id: 'note-' + Date.now(),
    title: '',
    content: '',
    tags: [],
    pinned: false,
    created: new Date().toISOString(),
    updated: new Date().toISOString()
  };
  notes.unshift(note);
  selectNote(note.id);
  saveNotes();
  setTimeout(() => { const el = document.getElementById('titleInput'); if (el) { el.focus(); } }, 50);
}

function updateTitle(val) {
  const note = notes.find(n => String(n.id) === String(activeId));
  if (note) { note.title = val; note.updated = new Date().toISOString(); debounceSave(); renderList(); }
}

function updateContent(val) {
  const note = notes.find(n => String(n.id) === String(activeId));
  if (note) {
    note.content = val;
    note.updated = new Date().toISOString();
    const cc = document.getElementById('charCount');
    if (cc) cc.textContent = val.length + ' Zeichen';
    debounceSave();
  }
}

function deleteNote() {
  if (!activeId) return;
  notes = notes.filter(n => String(n.id) !== String(activeId));
  activeId = null;
  document.getElementById('editorPanel').innerHTML = '<div class="empty-state">Notiz auswaehlen oder neue erstellen</div>';
  renderTagBar();
  renderList();
  saveNotes();
  const sorted = getSorted();
  if (sorted.length > 0) selectNote(sorted[0].id);
}

function togglePin() {
  const note = notes.find(n => String(n.id) === String(activeId));
  if (!note) return;
  note.pinned = !note.pinned;
  note.updated = new Date().toISOString();
  const btn = document.getElementById('btnPin');
  if (btn) btn.innerHTML = note.pinned ? '&#128204;' : '&#128392;';
  renderList();
  debounceSave();
}

function togglePreview() {
  previewMode = !previewMode;
  const textarea = document.getElementById('editor-area');
  const preview = document.getElementById('preview-area');
  const btn = document.getElementById('btnPreview');
  if (!textarea || !preview) return;
  if (previewMode) {
    textarea.style.display = 'none';
    preview.style.display = 'block';
    preview.innerHTML = renderMarkdown(textarea.value);
    if (btn) { btn.classList.add('active'); btn.textContent = 'Edit'; }
  } else {
    textarea.style.display = '';
    preview.style.display = 'none';
    if (btn) { btn.classList.remove('active'); btn.textContent = 'Preview'; }
  }
}

// --- Tags ---

function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const input = document.getElementById('tagInput');
    const val = (input.value || '').trim().replace(/,/g, '');
    if (!val) return;
    const note = notes.find(n => String(n.id) === String(activeId));
    if (!note) return;
    if (!note.tags) note.tags = [];
    if (!note.tags.includes(val)) {
      note.tags.push(val);
      note.updated = new Date().toISOString();
      selectNote(activeId);
      renderTagBar();
      debounceSave();
    }
    input.value = '';
  }
}

function removeTag(tag) {
  const note = notes.find(n => String(n.id) === String(activeId));
  if (!note || !note.tags) return;
  note.tags = note.tags.filter(t => t !== tag);
  note.updated = new Date().toISOString();
  selectNote(activeId);
  renderTagBar();
  debounceSave();
}

// --- Search & Filter ---

function filterNotes() {
  searchQuery = (document.getElementById('searchInput').value || '').trim();
  renderList();
}

function toggleTagFilter(tag) {
  filterTag = filterTag === tag ? null : tag;
  renderTagBar();
  renderList();
}

// --- Save ---

function debounceSave() {
  clearTimeout(saveTimer);
  const dot = document.getElementById('saveDot');
  const label = document.getElementById('saveLabel');
  if (dot) dot.classList.add('saving');
  if (label) label.textContent = 'speichert...';
  saveTimer = setTimeout(() => {
    saveNotes();
    if (dot) dot.classList.remove('saving');
    if (label) label.textContent = 'gespeichert';
  }, 800);
}

function savePending() {
  if (saveTimer) {
    clearTimeout(saveTimer);
    saveTimer = null;
    saveNotes();
  }
}

async function saveNotes() {
  await saveData({ notes });
  // Emit to graph
  if (window.PulseOS && window.PulseOS.emit) {
    PulseOS.emit('notes', notes.map(n => ({ id: n.id, title: n.title, updated: n.updated, tags: n.tags })));
    const week = Date.now() - 7 * 86400000;
    const recent = notes.filter(n => new Date(n.updated || n.created || 0).getTime() > week);
    PulseOS.emit('recent-notes', recent);
  }
}

// --- Markdown ---

function renderMarkdown(text) {
  if (!text) return '<p style="color:var(--note-dim)">Kein Inhalt</p>';
  let html = esc(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold & italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Line breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs around blocks
  html = html.replace(/<p>(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

// --- Backup ---

function downloadBackup() {
  loadData().then(data => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'notes-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
  });
}

function uploadBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = () => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.notes) {
          saveData(data).then(() => location.reload());
        } else {
          alert('Ungueltige Backup-Datei (kein "notes" Array)');
        }
      } catch { alert('Ungueltige JSON-Datei'); }
    };
    reader.readAsText(input.files[0]);
  };
  input.click();
}

// --- Mobile ---

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

// --- Utils ---

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// --- PulseOS Integration ---

if (window.PulseOS) {
  if (PulseOS.onInput) {
    PulseOS.onInput('data', function(d) {
      if (!d) return;
      const note = {
        id: 'note-' + Date.now(),
        title: d.title || 'Neue Notiz',
        content: d.content || d.body || '',
        tags: d.tags || [],
        pinned: false,
        created: new Date().toISOString(),
        updated: new Date().toISOString()
      };
      notes.unshift(note);
      saveNotes().then(() => {
        renderTagBar();
        renderList();
        selectNote(note.id);
      });
    });
  }
  if (PulseOS.onDataChanged) {
    PulseOS.onDataChanged(function() { loadNotes(); });
  }
}

// --- Init ---

loadNotes();
</script>
