<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1;
            padding: 10px 15px;
            background: #1e293b;
            border: 1px solid #475569;
            color: #f1f5f9;
            border-radius: 6px;
        }
        input:focus { outline: none; border-color: #8b5cf6; }
        button {
            padding: 10px 20px;
            background: #8b5cf6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #7c3aed; }
        .status { margin-bottom: 15px; padding: 10px; background: #1e293b; border-radius: 6px; color: #94a3b8; }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .podcast-card {
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .podcast-card:hover { transform: translateY(-4px); }
        .podcast-cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        .podcast-info { padding: 12px; }
        .podcast-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .podcast-author { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Podcast</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Podcasts suchen...">
            <button onclick="searchPodcasts()">Suchen</button>
        </div>
        <div class="status" id="status"></div>
        <div class="results" id="results"></div>
    </div>
    <script>
        async function searchPodcasts() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { updateStatus('Bitte Podcast-Namen eingeben'); return; }
            updateStatus('🔍 Suche...');
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            try {
                const response = await fetch(
                    `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=podcast&limit=12`
                );
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    updateStatus(`✅ ${data.results.length} Ergebnisse`);
                    data.results.forEach(podcast => {
                        const card = document.createElement('div');
                        card.className = 'podcast-card';
                        card.innerHTML = `
                            <div class="podcast-cover">🎙️</div>
                            <div class="podcast-info">
                                <div class="podcast-title">${podcast.collectionName}</div>
                                <div class="podcast-author">${podcast.artistName}</div>
                            </div>
                        `;
                        card.onclick = () => window.open(podcast.collectionViewUrl);
                        resultsDiv.appendChild(card);
                    });
                } else {
                    updateStatus('Keine Podcasts gefunden');
                }
            } catch (error) {
                updateStatus(`❌ ${error.message}`);
            }
        }
        function updateStatus(msg) { document.getElementById('status').textContent = msg; }
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPodcasts();
        });
    </script>
</body>
</html>
