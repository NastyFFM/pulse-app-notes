<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d14;--surface:#111118;--text:rgba(255,255,255,.85);--dim:rgba(255,255,255,.4);--muted:rgba(255,255,255,.15);--acc:#4ade80;--border:rgba(255,255,255,.06);--font:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);height:100vh;display:flex;overflow:hidden}

.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.btn-new{background:var(--acc);color:#0d0d14;border:none;padding:3px 10px;border-radius:4px;font:600 10px var(--font);cursor:pointer}
.btn-new:hover{opacity:.9}
.entry-list{flex:1;overflow-y:auto;padding:4px 0}
.entry-item{padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .1s}
.entry-item:hover{background:rgba(255,255,255,.03)}
.entry-item.active{background:rgba(74,222,128,.05);border-left-color:var(--acc)}
.entry-date{font-size:11px;font-weight:600;color:var(--text)}
.entry-weekday{font-size:9px;color:var(--acc);margin-bottom:2px}
.entry-preview{font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.entry-mood{font-size:10px;margin-top:2px}

.editor{flex:1;display:flex;flex-direction:column}
.editor-toolbar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.entry-title-display{flex:1;font:600 14px var(--font);color:var(--acc)}
.mood-select{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);font:11px var(--font);padding:3px 6px;border-radius:4px;outline:none;cursor:pointer}
.toolbar-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);padding:3px 8px;border-radius:4px;font:10px var(--font);cursor:pointer;transition:all .15s}
.toolbar-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.toolbar-btn.save{background:var(--acc);color:#0d0d14;border-color:var(--acc)}
.toolbar-btn.save:hover{opacity:.9}
.toolbar-btn.danger:hover{color:#ef4444;border-color:rgba(239,68,68,.3)}

.prompts{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.prompt-chip{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:10px;font:9px var(--font);cursor:pointer;transition:all .1s}
.prompt-chip:hover{color:var(--text);border-color:rgba(255,255,255,.15)}

#editor-area{flex:1;padding:16px;background:none;border:none;color:var(--text);font:13px/1.8 var(--font);outline:none;resize:none;width:100%}
#editor-area::placeholder{color:var(--muted)}
.editor-status{padding:4px 16px;border-top:1px solid var(--border);font-size:9px;color:var(--muted);display:flex;justify-content:space-between}

.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted)}
.empty-state .icon{font-size:36px;opacity:.3}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">📓 Diary</span>
    <button class="btn-new" onclick="newEntry()">+ Heute</button>
  </div>
  <div class="entry-list" id="entryList"></div>
</div>

<div class="editor" id="editorPanel">
  <div class="empty-state" id="emptyState">
    <div class="icon">📓</div>
    <p>Wähle einen Eintrag oder schreibe heute</p>
    <button class="btn-new" onclick="newEntry()" style="padding:6px 16px;font-size:11px">+ Neuer Eintrag</button>
  </div>
</div>

<script>
const API = '/app/diary/api/entries';
const NOTIFY = '/api/notify-change';
let entries = [];
let currentId = null;
let saveTimer = null;

const MOODS = { '': '—', '😊': 'gut', '😐': 'okay', '😔': 'schwierig', '🔥': 'produktiv', '😴': 'müde', '🤩': 'großartig' };
const PROMPTS = ['Was war heute gut?', 'Was hat mich beschäftigt?', 'Was habe ich gelernt?', 'Wofür bin ich dankbar?', 'Was möchte ich morgen anders machen?'];
const WEEKDAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

async function load() {
  try {
    const r = await fetch(API);
    const data = await r.json();
    entries = data.entries || [];
  } catch { entries = []; }
  renderList();
}

async function save() {
  await fetch(API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entries }) });
  await fetch(NOTIFY, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ appId: 'diary', file: 'entries.json' }) });
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function getWeekday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return WEEKDAYS[d.getDay()];
}

function newEntry() {
  const today = todayStr();
  const existing = entries.find(e => e.date === today);
  if (existing) { openEntry(existing.id); return; }
  const entry = { id: 'diary-' + Date.now(), date: today, content: '', mood: '', created: new Date().toISOString(), updated: new Date().toISOString() };
  entries.unshift(entry);
  save();
  renderList();
  openEntry(entry.id);
}

function openEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  currentId = id;
  document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('ei-' + id);
  if (item) item.classList.add('active');

  const panel = document.getElementById('editorPanel');
  panel.innerHTML = `
    <div class="editor-toolbar">
      <span class="entry-title-display">${getWeekday(entry.date)}, ${formatDate(entry.date)}</span>
      <select class="mood-select" id="moodSelect" onchange="setMood(this.value)">
        ${Object.entries(MOODS).map(([k,v]) => `<option value="${k}"${entry.mood===k?' selected':''}>${k||'Stimmung'} ${v}</option>`).join('')}
      </select>
      <button class="toolbar-btn save" onclick="manualSave()">Speichern</button>
      <button class="toolbar-btn danger" onclick="deleteEntry('${id}')">Löschen</button>
    </div>
    <div class="prompts" id="promptBar">
      ${PROMPTS.map(p => `<span class="prompt-chip" onclick="insertPrompt(${JSON.stringify(p)})">${p}</span>`).join('')}
    </div>
    <textarea id="editor-area" placeholder="Was war heute los..." onkeyup="scheduleSave()">${escHtml(entry.content)}</textarea>
    <div class="editor-status">
      <span id="saveStatus">Ungespeichert</span>
      <span id="wordCount">0 Wörter</span>
    </div>`;

  updateWordCount();
  document.getElementById('saveStatus').textContent = 'Bereit';
}

function insertPrompt(text) {
  const ta = document.getElementById('editor-area');
  if (!ta) return;
  const cur = ta.value;
  const sep = cur && !cur.endsWith('\n') ? '\n\n' : '';
  ta.value = cur + sep + text + '\n';
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  scheduleSave();
}

function setMood(mood) {
  const entry = entries.find(e => e.id === currentId);
  if (!entry) return;
  entry.mood = mood;
  scheduleSave();
  renderList();
}

function scheduleSave() {
  updateWordCount();
  document.getElementById('saveStatus').textContent = '...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(manualSave, 1500);
}

async function manualSave() {
  const entry = entries.find(e => e.id === currentId);
  if (!entry) return;
  const ta = document.getElementById('editor-area');
  if (ta) entry.content = ta.value;
  const ms = document.getElementById('moodSelect');
  if (ms) entry.mood = ms.value;
  entry.updated = new Date().toISOString();
  await save();
  renderList();
  const status = document.getElementById('saveStatus');
  if (status) status.textContent = 'Gespeichert ✓';
}

function updateWordCount() {
  const ta = document.getElementById('editor-area');
  const wc = document.getElementById('wordCount');
  if (!ta || !wc) return;
  const words = ta.value.trim().split(/\s+/).filter(Boolean).length;
  wc.textContent = words + ' Wörter';
}

function deleteEntry(id) {
  if (!confirm('Eintrag wirklich löschen?')) return;
  entries = entries.filter(e => e.id !== id);
  currentId = null;
  save();
  renderList();
  document.getElementById('editorPanel').innerHTML = document.getElementById('emptyState')?.outerHTML || '<div class="empty-state"><div class="icon">📓</div><p>Wähle einen Eintrag</p></div>';
}

function renderList() {
  const list = document.getElementById('entryList');
  if (!entries.length) {
    list.innerHTML = '<div style="padding:12px 14px;font-size:10px;color:var(--muted)">Noch keine Einträge</div>';
    return;
  }
  list.innerHTML = entries.map(e => `
    <div class="entry-item${e.id===currentId?' active':''}" id="ei-${e.id}" onclick="openEntry('${e.id}')">
      <div class="entry-weekday">${getWeekday(e.date)}</div>
      <div class="entry-date">${formatDate(e.date)} ${e.mood || ''}</div>
      <div class="entry-preview">${e.content ? e.content.slice(0, 50).replace(/\n/g,' ') + '…' : 'Leer'}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
