<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--surface:var(--bg-surface, #111118);--dim:var(--text-dim, rgba(255,255,255,.4));--muted:rgba(255,255,255,.15);--green:#22c55e;--font:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}

.timer-display{text-align:center;margin-bottom:30px}
.timer-value{font-size:72px;font-weight:700;font-family:monospace;letter-spacing:.05em;color:var(--text);font-family:'IBM Plex Mono',monospace;line-height:1}
.timer-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-top:12px}

.input-group{display:flex;gap:8px;margin-bottom:30px;align-items:center;flex-direction:column;width:100%;max-width:300px}
.input-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.minute-input{font-size:14px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;color:var(--text);font:600 14px 'IBM Plex Mono',monospace;width:100%;text-align:center;outline:none}
.minute-input:focus{border-color:rgba(78,205,196,.3)}

.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:400px}
.btn{padding:10px 16px;background:rgba(78,205,196,.1);border:1.5px solid rgba(78,205,196,.3);color:var(--text);font:600 11px 'IBM Plex Mono',monospace;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:all .15s;flex:1;min-width:80px}
.btn:hover{background:rgba(78,205,196,.2);border-color:rgba(78,205,196,.5)}
.btn.active{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.btn.danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--text)}
.btn.danger:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.5)}

.status-bar{padding:8px 20px;border-top:1px solid var(--border);font-size:9px;color:var(--muted);flex-shrink:0}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">Countdown Timer</span>
</div>

<div class="container">
  <div class="timer-display">
    <div class="timer-value" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">bereit</div>
  </div>

  <div class="input-group">
    <label class="input-label">Minuten (1-60)</label>
    <input type="number" class="minute-input" id="minuteInput" min="1" max="60" value="5" />
  </div>

  <div class="controls">
    <button class="btn" id="startBtn" onclick="startTimer()">Start</button>
    <button class="btn" id="stopBtn" onclick="stopTimer()" style="display:none">Stop</button>
    <button class="btn danger" onclick="resetTimer()">Reset</button>
  </div>
</div>

<div class="status-bar" id="statusBar">bereit</div>

<script>
const DATA_URL = '/app/countdown/api/countdown';
let state = { minutes: 5, seconds: 0, totalSeconds: 300, isRunning: false };
let timerInterval = null;

async function loadState() {
  try {
    const r = await fetch(DATA_URL);
    if (r.ok) {
      const data = await r.json();
      state = { ...state, ...data };
      document.getElementById('minuteInput').value = state.minutes;
      updateDisplay();
    }
  } catch (e) {
    console.error('Load failed:', e);
  }
}

async function saveState() {
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
  } catch (e) {
    console.error('Save failed:', e);
  }
}

function updateDisplay() {
  const mins = Math.floor(state.totalSeconds / 60);
  const secs = state.totalSeconds % 60;
  const display = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
  document.getElementById('timerDisplay').textContent = display;

  if (state.isRunning) {
    document.getElementById('timerLabel').textContent = 'läuft...';
    document.getElementById('statusBar').textContent = `Timer läuft: ${display}`;
  } else if (state.totalSeconds === 0) {
    document.getElementById('timerLabel').textContent = 'fertig!';
    document.getElementById('statusBar').textContent = 'Timer abgelaufen';
  } else {
    document.getElementById('timerLabel').textContent = 'bereit';
    document.getElementById('statusBar').textContent = 'bereit';
  }

  document.getElementById('startBtn').style.display = state.isRunning ? 'none' : 'block';
  document.getElementById('stopBtn').style.display = state.isRunning ? 'block' : 'none';
}

function startTimer() {
  const mins = parseInt(document.getElementById('minuteInput').value) || 5;
  if (mins < 1 || mins > 60) {
    alert('Minuten müssen zwischen 1 und 60 liegen');
    return;
  }

  if (!state.isRunning) {
    if (state.totalSeconds === 0) {
      state.minutes = mins;
      state.totalSeconds = mins * 60;
    }
    state.isRunning = true;
    saveState();
    updateDisplay();

    timerInterval = setInterval(() => {
      if (state.totalSeconds > 0) {
        state.totalSeconds--;
        updateDisplay();
        if (state.totalSeconds === 0) {
          clearInterval(timerInterval);
          state.isRunning = false;
          saveState();
          updateDisplay();
          // Optional: Emit timer-finished für Graph-Integration
          if (window.PulseOS && window.PulseOS.emit) {
            window.PulseOS.emit('timer-finished', { minutes: state.minutes });
          }
        }
      }
    }, 1000);
  }
}

function stopTimer() {
  state.isRunning = false;
  clearInterval(timerInterval);
  saveState();
  updateDisplay();
}

function resetTimer() {
  state.isRunning = false;
  clearInterval(timerInterval);
  const mins = parseInt(document.getElementById('minuteInput').value) || 5;
  state.minutes = mins;
  state.totalSeconds = mins * 60;
  saveState();
  updateDisplay();
}

// Load initial state
loadState();

// Handle minute input change (reset timer)
document.getElementById('minuteInput').addEventListener('change', () => {
  if (!state.isRunning) {
    resetTimer();
  }
});
</script>
</body>
</html>
