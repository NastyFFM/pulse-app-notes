<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d14;--surface:#111118;--text:rgba(255,255,255,.85);--dim:rgba(255,255,255,.4);--muted:rgba(255,255,255,.15);--yt:#ff0000;--border:rgba(255,255,255,.06);--font:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.toolbar-title{font-size:11px;font-weight:700;color:var(--yt);letter-spacing:.05em;white-space:nowrap}
.search-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);font:12px var(--font);padding:5px 10px;border-radius:4px;outline:none}
.search-input:focus{border-color:rgba(255,0,0,.4)}
.search-input::placeholder{color:var(--muted)}
.btn{background:var(--yt);color:#fff;border:none;padding:5px 12px;border-radius:4px;font:600 11px var(--font);cursor:pointer}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}

.content{flex:1;display:flex;overflow:hidden}

/* Results sidebar */
.sidebar{width:240px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:6px 12px;border-bottom:1px solid var(--border);font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.results{flex:1;overflow-y:auto;padding:4px 0}
.result-item{padding:8px 12px;cursor:pointer;border-left:2px solid transparent;display:flex;flex-direction:column;gap:3px;transition:all .1s}
.result-item:hover{background:rgba(255,255,255,.03)}
.result-item.active{background:rgba(255,0,0,.05);border-left-color:var(--yt)}
.result-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:3px;background:#1a1a1a}
.result-title{font-size:10px;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-meta{font-size:9px;color:var(--muted)}
.empty{padding:16px 12px;font-size:10px;color:var(--muted);text-align:center}
.loading{padding:16px 12px;font-size:10px;color:var(--dim);text-align:center}

/* Player */
.player{flex:1;display:flex;flex-direction:column;background:#000}
.iframe-wrap{flex:1;position:relative}
.iframe-wrap iframe{width:100%;height:100%;border:none}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);background:var(--bg)}
.placeholder .icon{font-size:40px;opacity:.25}
.placeholder p{font-size:11px}
.now-playing{padding:6px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);background:var(--surface);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">▶ YouTube</span>
  <input class="search-input" id="searchInput" placeholder="Suche..." onkeydown="if(event.key==='Enter')search()">
  <button class="btn" id="searchBtn" onclick="search()">Suchen</button>
</div>

<div class="content">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebarHeader">Ergebnisse</div>
    <div class="results" id="results">
      <div class="empty">Suchbegriff eingeben</div>
    </div>
  </div>

  <div class="player">
    <div class="iframe-wrap" id="playerWrap">
      <div class="placeholder">
        <div class="icon">▶</div>
        <p>Video aus der Liste wählen</p>
      </div>
    </div>
    <div class="now-playing" id="nowPlaying" style="display:none"></div>
  </div>
</div>

<script>
let videoData = [];

async function fetchSearch(q) {
  try {
    const r = await fetch(`/api/youtube/search?q=${encodeURIComponent(q)}`, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) return null;
    const data = await r.json();
    return data.results || null;
  } catch(e) { return null; }
}

async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  const results = document.getElementById('results');
  const header = document.getElementById('sidebarHeader');

  btn.disabled = true;
  results.innerHTML = '<div class="loading">Suche läuft...</div>';
  header.textContent = 'Ergebnisse';

  const items = await fetchSearch(q);

  btn.disabled = false;

  if (!items) {
    results.innerHTML = '<div class="empty">Suche fehlgeschlagen.<br>Prüf die Verbindung.</div>';
    return;
  }
  if (!items.length) {
    results.innerHTML = '<div class="empty">Keine Ergebnisse</div>';
    return;
  }

  header.textContent = `${items.length} Ergebnisse`;

  videoData = items.slice(0, 20);

  results.innerHTML = videoData.map((v, i) => {
    const title = v.title || 'Unbekannt';
    const thumb = v.thumbnail || '';
    const duration = v.duration || '';
    const channel = v.channel || '';
    return `<div class="result-item" id="item-${i}" onclick="play(${i})">
      ${thumb ? `<img class="result-thumb" src="${thumb}" loading="lazy">` : ''}
      <div class="result-title">${escHtml(title)}</div>
      <div class="result-meta">${escHtml(channel)}${duration ? ' · ' + duration : ''}</div>
    </div>`;
  }).join('');
}

function play(idx) {
  const v = videoData[idx];
  if (!v) return;

  // Mark active
  document.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('item-' + idx);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }

  // Embed
  document.getElementById('playerWrap').innerHTML =
    `<iframe src="https://www.youtube-nocookie.com/embed/${v.videoId}?rel=0&modestbranding=1" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>`;

  // Now playing bar
  const bar = document.getElementById('nowPlaying');
  bar.textContent = '▶ ' + (v.title || v.videoId);
  bar.style.display = 'block';
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
