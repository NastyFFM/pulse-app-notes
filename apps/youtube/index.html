<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0f;height:100vh;color:#e2e8f0;display:flex;flex-direction:column;overflow:hidden}

.top-bar{display:flex;align-items:center;gap:16px;padding:14px 20px;background:rgba(15,15,25,.95);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;flex-wrap:wrap}
.top-bar h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:4px;margin-left:24px}
.tab{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:all .15s}
.tab:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.tab.active{background:rgba(239,68,68,.2);color:#f87171}
.search-box{margin-left:auto;display:flex;gap:8px;align-items:center}
.search-box input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;color:#e2e8f0;font-size:.82rem;width:320px;outline:none;font-family:inherit}
.search-box input:focus{border-color:rgba(239,68,68,.5)}
.search-box input::placeholder{color:rgba(255,255,255,.25)}
.search-box button{padding:8px 14px;border-radius:8px;border:none;background:rgba(239,68,68,.25);color:#f87171;cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit}
.search-box button:hover{background:rgba(239,68,68,.4)}

.main{flex:1;display:flex;overflow:hidden;min-height:0}

.video-list{flex:1;overflow-y:auto;padding:20px;min-height:0}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

.video-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;cursor:pointer;transition:all .15s;overflow:hidden}
.video-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
.thumb-wrap{position:relative;width:100%;padding-top:56.25%;background:#111;overflow:hidden}
.thumb-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.thumb-duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:.7rem;padding:2px 6px;border-radius:4px;font-weight:600}
.video-info{padding:12px 14px}
.video-title{font-size:.85rem;font-weight:600;color:#f1f5f9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.video-channel{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:4px}
.video-stats{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:3px;display:flex;gap:8px}
.fav-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:4px 8px;font-size:1.1rem;cursor:pointer;color:#fbbf24;line-height:1;z-index:2;transition:all .15s}
.fav-btn:hover{background:rgba(0,0,0,.9);transform:scale(1.15)}
.fav-btn.faved{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.4)}
.thumb-wrap .fav-btn{opacity:0;transition:opacity .15s,transform .15s}
.video-card:hover .fav-btn{opacity:1}

.player-panel{width:0;overflow:hidden;transition:width .3s;background:rgba(10,10,18,.98);border-left:1px solid rgba(255,255,255,.06);flex-shrink:0;display:flex;flex-direction:column}
.player-panel.open{width:520px}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.player-header h3{font-size:.9rem;font-weight:600}
.close-btn{background:none;border:none;color:rgba(255,255,255,.4);font-size:1.2rem;cursor:pointer}
.close-btn:hover{color:#fff}
.player-embed{width:100%;aspect-ratio:16/9;flex-shrink:0;background:#000}
.player-embed iframe{width:100%;height:100%;border:none}
.player-details{padding:16px;overflow-y:auto;flex:1}
.player-title{font-size:1rem;font-weight:700;color:#f1f5f9;line-height:1.4}
.player-channel{font-size:.85rem;color:rgba(255,255,255,.5);margin-top:6px}
.player-desc{font-size:.8rem;color:rgba(255,255,255,.35);margin-top:12px;line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;opacity:.4;text-align:center;gap:14px}
.empty-state .big{font-size:3.5rem}
.empty-state p{font-size:.9rem;max-width:300px;line-height:1.6}
.loading{text-align:center;padding:40px;opacity:.4;font-size:.9rem}

.trending-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.trending-chip{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .15s}
.trending-chip:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📺 YouTube</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')" id="tabBrowse">Entdecken</button>
    <button class="tab" onclick="switchTab('favourites')" id="tabFavs">Favoriten</button>
  </div>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Videos suchen..." onkeydown="if(event.key==='Enter')doSearch()" />
    <button onclick="doSearch()">Suchen</button>
  </div>
</div>

<div class="main">
  <div class="video-list" id="videoList">
    <div class="loading">Videos werden geladen...</div>
  </div>
  <div class="player-panel" id="playerPanel">
    <div class="player-header">
      <h3 id="panelTitle">Video</h3>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="fav-btn" id="playerFavBtn" onclick="togglePlayerFav()" style="position:static;opacity:1" title="Favorit">☆</button>
        <button class="close-btn" onclick="closePlayer()">✕</button>
      </div>
    </div>
    <div class="player-embed" id="playerEmbed"></div>
    <div class="player-details">
      <div class="player-title" id="playerVideoTitle"></div>
      <div class="player-channel" id="playerChannel"></div>
      <div class="player-desc" id="playerDesc"></div>
    </div>
  </div>
</div>

<script>
const API='api/youtube';
const YT_PROXY='/api/yt-proxy';
const CATEGORIES=['Music','Gaming','News','Sports','Education','Science','Comedy','Film','Technology','Cooking'];

let favourites=[];
let currentTab='browse';
let currentVideos=[];
let currentVideo=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Parse InnerTube search response into simple video objects
function parseSearchResults(data){
  const videos=[];
  try{
    const contents=data.contents?.twoColumnSearchResultsRenderer?.primaryContents?.sectionListRenderer?.contents||[];
    for(const section of contents){
      const items=section.itemSectionRenderer?.contents||[];
      for(const item of items){
        const vr=item.videoRenderer;
        if(!vr)continue;
        const thumbs=vr.thumbnail?.thumbnails||[];
        videos.push({
          id:vr.videoId||'',
          title:(vr.title?.runs||[]).map(r=>r.text).join('')||'',
          channel:(vr.longBylineText?.runs||vr.ownerText?.runs||[{text:''}])[0].text||'',
          thumbnail:thumbs.length?thumbs[thumbs.length-1].url:'',
          duration:vr.lengthText?.simpleText||'',
          views:vr.viewCountText?.simpleText||vr.shortViewCountText?.simpleText||'',
          published:vr.publishedTimeText?.simpleText||''
        });
      }
    }
  }catch(e){console.error('Parse error:',e)}
  return videos;
}

async function loadData(){
  try{const r=await fetch(API+'?t='+Date.now());if(!r.ok)throw 0;const d=await r.json();favourites=d.favourites||[]}catch{favourites=[]}
}
async function saveData(){
  try{await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({favourites},null,2)})}catch(e){console.error('Save error:',e)}
}

function doSearch(){
  const v=document.getElementById('searchInput').value.trim();
  if(v)searchVideos(v);
}

async function searchVideos(query){
  const list=document.getElementById('videoList');
  list.innerHTML='<div class="loading">Videos werden gesucht...</div>';
  try{
    const r=await fetch(YT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'search',query:query})});
    if(!r.ok)throw new Error('Proxy error');
    const data=await r.json();
    if(data.error)throw new Error(data.error);
    currentVideos=parseSearchResults(data);
    renderVideos();
  }catch(e){
    console.error('Search error:',e);
    list.innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>Fehler beim Laden. Bitte versuche es erneut.</p></div>';
  }
}

function renderVideos(){
  const list=document.getElementById('videoList');
  const videos=currentTab==='favourites'?favourites:currentVideos;
  let h='';
  
  if(currentTab==='browse'){
    h+='<div class="trending-chips">';
    CATEGORIES.forEach(c=>{h+='<button class="trending-chip" onclick="searchVideos(\''+c+'\')">'+c+'</button>'});
    h+='</div>';
  }
  
  if(!videos.length){
    h+='<div class="empty-state"><div class="big">'+(currentTab==='favourites'?'⭐':'🔍')+'</div><p>'+(currentTab==='favourites'?'Noch keine Favoriten. Suche Videos und speichere sie mit dem Stern.':'Suche nach Videos oder klicke auf eine Kategorie.')+'</p></div>';
    list.innerHTML=h;return;
  }
  
  h+='<div class="video-grid">';
  videos.forEach((v,i)=>{
    const isFav=favourites.some(f=>f.id===v.id);
    h+='<div class="video-card" onclick="openVideo('+i+')">';
    h+='<div class="thumb-wrap">';
    if(v.thumbnail)h+='<img src="'+esc(v.thumbnail)+'" onerror="this.style.display=\'none\'" loading="lazy" />';
    if(v.duration)h+='<span class="thumb-duration">'+esc(v.duration)+'</span>';
    h+='<button class="fav-btn'+(isFav?' faved':'')+'" onclick="event.stopPropagation();toggleFav('+i+')">'+(isFav?'⭐':'☆')+'</button>';
    h+='</div>';
    h+='<div class="video-info">';
    h+='<div class="video-title">'+esc(v.title)+'</div>';
    h+='<div class="video-channel">'+esc(v.channel)+'</div>';
    h+='<div class="video-stats">';
    if(v.views)h+='<span>'+esc(v.views)+'</span>';
    if(v.published)h+='<span>'+esc(v.published)+'</span>';
    h+='</div></div></div>';
  });
  h+='</div>';
  list.innerHTML=h;
}

function updatePlayerFavBtn(){
  const btn=document.getElementById('playerFavBtn');
  if(!btn||!currentVideo)return;
  const isFav=favourites.some(f=>f.id===currentVideo.id);
  btn.textContent=isFav?'⭐':'☆';
  btn.classList.toggle('faved',isFav);
  btn.title=isFav?'Favorit entfernen':'Als Favorit speichern';
}

async function togglePlayerFav(){
  if(!currentVideo)return;
  const fi=favourites.findIndex(f=>f.id===currentVideo.id);
  if(fi>=0){favourites.splice(fi,1)}
  else{favourites.unshift({...currentVideo})}
  await saveData();
  updatePlayerFavBtn();
  renderVideos();
}

function openVideo(idx){
  const videos=currentTab==='favourites'?favourites:currentVideos;
  const v=videos[idx];if(!v)return;
  currentVideo=v;
  const panel=document.getElementById('playerPanel');
  panel.classList.add('open');
  document.getElementById('playerEmbed').innerHTML='<iframe src="https://www.youtube-nocookie.com/embed/'+esc(v.id)+'?autoplay=1&rel=0" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>';
  document.getElementById('playerVideoTitle').textContent=v.title||'';
  document.getElementById('playerChannel').textContent=v.channel||'';
  document.getElementById('playerDesc').textContent='';
  updatePlayerFavBtn();
}

function closePlayer(){
  document.getElementById('playerPanel').classList.remove('open');
  document.getElementById('playerEmbed').innerHTML='';
  currentVideo=null;
}

async function toggleFav(idx){
  const videos=currentTab==='favourites'?favourites:currentVideos;
  const v=videos[idx];if(!v)return;
  const fi=favourites.findIndex(f=>f.id===v.id);
  if(fi>=0){favourites.splice(fi,1)}
  else{favourites.unshift({...v})}
  await saveData();
  renderVideos();
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabBrowse').classList.toggle('active',tab==='browse');
  document.getElementById('tabFavs').classList.toggle('active',tab==='favourites');
  if(tab==='favourites'){renderVideos()}
  else{if(!currentVideos.length)searchVideos('trending');else renderVideos()}
}

function connectSSE(){
  const es=new EventSource('/sse/youtube');
  es.onmessage=e=>{if(e.data==='connected')return;try{const d=JSON.parse(e.data);if(d.file==='youtube.json')loadData().then(()=>{if(currentTab==='favourites')renderVideos()})}catch{}};
  es.onerror=()=>{es.close();setTimeout(connectSSE,3000)}
}

async function init(){
  await loadData();
  await searchVideos('trending');
  connectSSE();
}
init();
</script>
</body>
</html>
