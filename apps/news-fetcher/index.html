<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Fetcher</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111110;--surface:#1a1a17;--border:rgba(255,255,255,0.08);--text:#e8e6de;--muted:#7a7870;--accent:#e85d24;--green:#1d9e75;--radius:8px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.title{font-weight:600;font-size:15px}
.status{margin-left:auto;font-size:11px;color:var(--muted)}
.status.active{color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font)}
.btn:hover{opacity:0.9}
.articles{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.article{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.article .art-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.article .art-source{font-size:11px;color:var(--muted)}
.article .art-time{font-size:10px;color:var(--muted);opacity:0.6}
.counter{font-size:11px;color:var(--muted);margin-top:12px}
</style>
</head>
<body>

<div class="header">
  <span>📰</span>
  <span class="title">News Fetcher</span>
  <span class="status" id="status">Bereit</span>
</div>

<button class="btn" onclick="run()">📡 News abrufen & senden</button>

<div class="articles" id="articles"></div>
<div class="counter" id="counter"></div>

<script>
// === PulseOS Graph Bridge ===
window.addEventListener('message', (e) => {
  if (e.data?.type === 'app-input') handleInput(e.data.inputName, e.data.data);
  if (e.data?.type === 'pulse') onPulse(e.data);
});

function emit(outputName, data) {
  if (window.PulseOS) {
    window.PulseOS.emit(outputName, data);
  } else {
    parent.postMessage({ type: 'graph-output', appId: 'news-fetcher', outputName, data }, '*');
  }
}

let fetchCount = 0;

async function run() {
  document.getElementById('status').textContent = 'Abrufen...';
  document.getElementById('status').classList.add('active');

  try {
    // Use Hacker News API (free, no key needed)
    const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
    const ids = await res.json();
    const top10 = ids.slice(0, 10);

    const articles = await Promise.all(top10.map(async id => {
      const r = await fetch('https://hacker-news.firebaseio.com/v0/item/' + id + '.json');
      const item = await r.json();
      return {
        title: item.title || 'Untitled',
        url: item.url || 'https://news.ycombinator.com/item?id=' + id,
        source: item.url ? new URL(item.url).hostname.replace('www.', '') : 'news.ycombinator.com',
        score: item.score || 0,
        comments: item.descendants || 0,
        time: new Date(item.time * 1000).toISOString(),
        hnId: id
      };
    }));

    fetchCount++;

    // Update UI
    document.getElementById('articles').innerHTML = articles.map(a =>
      '<div class="article">' +
      '<div class="art-title">' + escapeHtml(a.title) + '</div>' +
      '<div class="art-source">' + escapeHtml(a.source) + ' · ' + a.score + ' pts · ' + a.comments + ' comments</div>' +
      '</div>'
    ).join('');
    document.getElementById('counter').textContent = fetchCount + ' Abrufe · ' + articles.length + ' Artikel';
    document.getElementById('status').textContent = 'Gesendet #' + fetchCount;
    setTimeout(() => { document.getElementById('status').classList.remove('active'); }, 3000);

    // Emit to graph
    emit('articles', { articles, fetchedAt: new Date().toISOString(), count: articles.length });
    console.log('[news-fetcher] Emitted', articles.length, 'articles');

  } catch (err) {
    document.getElementById('status').textContent = 'Fehler: ' + err.message;
    document.getElementById('status').classList.remove('active');
    console.error('[news-fetcher]', err);
  }
}

function handleInput(inputName, data) { console.log('[news-fetcher] Input:', inputName, data); }
function onPulse(data) { console.log('[news-fetcher] Pulse, fetching...'); run(); }
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
