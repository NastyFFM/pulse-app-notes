<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:16px;overflow-x:hidden}
h1{font-size:1.1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
h1 span{font-size:1.3rem}

/* Stats bar */
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;flex:1;min-width:120px}
.stat-label{font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-value{font-size:1.4rem;font-weight:700}
.stat-value.green{color:#22C55E}
.stat-value.yellow{color:#EAB308}
.stat-value.red{color:#EF4444}

/* Agent cards */
.agents{display:flex;flex-direction:column;gap:10px}
.agent-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;transition:border-color .2s}
.agent-card:hover{border-color:rgba(255,255,255,.15)}
.agent-card.dead{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.agent-card.idle{border-color:rgba(234,179,8,.2)}

.agent-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.agent-name{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:8px}
.agent-type{font-size:.65rem;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:4px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em}
.agent-status{display:flex;align-items:center;gap:6px;font-size:.78rem}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.running{background:#22C55E;box-shadow:0 0 6px rgba(34,197,94,.5);animation:pulse 2s infinite}
.status-dot.idle{background:#EAB308}
.status-dot.dead{background:#EF4444}
.status-dot.stopped{background:#6B7280}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.agent-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;font-size:.78rem}
.detail{display:flex;flex-direction:column;gap:2px}
.detail-label{color:rgba(255,255,255,.35);font-size:.68rem;text-transform:uppercase;letter-spacing:.03em}
.detail-value{color:rgba(255,255,255,.8)}
.detail-value.model-badge{display:inline-flex;align-items:center;gap:4px}
.model-tag{font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:600}
.model-tag.haiku{background:rgba(34,197,94,.15);color:#22C55E}
.model-tag.sonnet{background:rgba(59,130,246,.15);color:#3B82F6}
.model-tag.opus{background:rgba(139,92,246,.15);color:#8B5CF6}

.agent-task{margin-top:8px;padding:8px 10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:8px;font-size:.78rem;color:rgba(255,255,255,.7)}
.agent-task strong{color:#60A5FA}

/* Modify queue */
.queue-section{margin-top:20px}
.queue-section h2{font-size:.9rem;font-weight:600;margin-bottom:10px;color:rgba(255,255,255,.6)}
.queue-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:.78rem;display:flex;justify-content:space-between;align-items:center}
.queue-item .qi-app{font-weight:600;color:#60A5FA}
.queue-item .qi-request{color:rgba(255,255,255,.6);flex:1;margin:0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-item .qi-status{font-size:.68rem;padding:2px 8px;border-radius:4px}
.qi-status.pending{background:rgba(234,179,8,.15);color:#EAB308}
.qi-status.processing{background:rgba(59,130,246,.15);color:#3B82F6}
.qi-status.stale{background:rgba(239,68,68,.15);color:#EF4444}

.empty{color:rgba(255,255,255,.25);font-size:.82rem;text-align:center;padding:30px;font-style:italic}
</style>
</head>
<body>
<h1><span>🤖</span> Agent Control</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Agenten</div>
    <div class="stat-value" id="totalAgents">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Online</div>
    <div class="stat-value green" id="onlineAgents">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Queue</div>
    <div class="stat-value" id="queueDepth">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Erledigt</div>
    <div class="stat-value" id="totalCompleted">0</div>
  </div>
</div>

<div class="agents" id="agentList">
  <div class="empty">Keine Agenten registriert. Starte einen Agent-Skill um loszulegen.</div>
</div>

<div class="queue-section">
  <h2>Modify-Warteschlange</h2>
  <div id="queueList">
    <div class="empty">Warteschlange leer</div>
  </div>
</div>

<script>
(function(){
  let agentsData = { agents: [] };
  let queueData = { pending: [] };

  function timeAgo(iso) {
    if (!iso) return '-';
    const s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 5) return 'gerade eben';
    if (s < 60) return s + 's';
    if (s < 3600) return Math.round(s/60) + 'min';
    return Math.round(s/3600) + 'h';
  }

  function getStatusClass(agent) {
    if (agent.status === 'dead') return 'dead';
    if (agent.status === 'stopped') return 'stopped';
    if (agent.lastActivity) {
      const idle = Date.now() - new Date(agent.lastActivity).getTime();
      if (idle > 60000) return 'idle';
    }
    return 'running';
  }

  function renderAgents() {
    const list = document.getElementById('agentList');
    const agents = agentsData.agents || [];

    // Stats
    document.getElementById('totalAgents').textContent = agents.length;
    document.getElementById('onlineAgents').textContent = agents.filter(a => a.status === 'running').length;
    document.getElementById('totalCompleted').textContent = agents.reduce((s, a) => s + (a.tasksCompleted || 0), 0);

    if (agents.length === 0) {
      list.innerHTML = '<div class="empty">Keine Agenten registriert. Starte einen Agent-Skill um loszulegen.</div>';
      return;
    }

    list.innerHTML = agents.map(a => {
      const sc = getStatusClass(a);
      const statusLabel = sc === 'dead' ? 'Offline' : sc === 'idle' ? 'Idle' : sc === 'stopped' ? 'Gestoppt' : 'Online';
      const modelClass = (a.model || 'sonnet').toLowerCase();
      return `<div class="agent-card ${sc}">
        <div class="agent-header">
          <div class="agent-name">
            ${a.type === 'chat' ? '💬' : a.type === 'modifier' ? '✏️' : '🤖'} ${a.id}
            <span class="agent-type">${a.type || 'unknown'}</span>
          </div>
          <div class="agent-status">
            <span class="status-dot ${sc}"></span>
            ${statusLabel}
          </div>
        </div>
        <div class="agent-details">
          <div class="detail">
            <div class="detail-label">Model</div>
            <div class="detail-value model-badge"><span class="model-tag ${modelClass}">${a.model || 'sonnet'}</span></div>
          </div>
          <div class="detail">
            <div class="detail-label">Heartbeat</div>
            <div class="detail-value">${timeAgo(a.lastHeartbeat)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">Letzte Aktivitaet</div>
            <div class="detail-value">${timeAgo(a.lastActivity)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">Erledigt</div>
            <div class="detail-value">${a.tasksCompleted || 0}</div>
          </div>
        </div>
        ${a.currentTask ? `<div class="agent-task"><strong>${a.currentTask.appId || 'task'}:</strong> ${(a.currentTask.request || a.currentTask.text || '').slice(0, 100)}</div>` : ''}
      </div>`;
    }).join('');
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    const items = queueData.pending || [];
    document.getElementById('queueDepth').textContent = items.length;

    if (items.length === 0) {
      list.innerHTML = '<div class="empty">Warteschlange leer</div>';
      return;
    }
    list.innerHTML = items.map(q => `<div class="queue-item">
      <span class="qi-app">${q.appId}</span>
      <span class="qi-request">${(q.request || '').slice(0, 80)}</span>
      <span class="model-tag ${(q.model || 'sonnet').toLowerCase()}">${q.model || 'sonnet'}</span>
      <span class="qi-status ${q.status}">${q.status}</span>
    </div>`).join('');
  }

  async function fetchData() {
    try {
      const [ar, qr] = await Promise.all([
        fetch('/api/agents').then(r => r.json()),
        fetch('/api/modify-queue').then(r => r.json())
      ]);
      agentsData = ar;
      queueData = qr;
    } catch {}
    renderAgents();
    renderQueue();
  }

  // SSE for live updates
  const sse = new EventSource('/sse/orchestrator');
  sse.onmessage = function(e) {
    if (e.data === 'connected') return;
    fetchData();
  };

  // Also listen to global data changes
  const sseDash = new EventSource('/sse/dashboard');
  sseDash.onmessage = function(e) {
    if (e.data === 'connected') return;
    // Refresh on any dashboard data change
  };

  // Initial load + periodic refresh
  fetchData();
  setInterval(fetchData, 5000);
})();
</script>
</body>
</html>
