<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<script src="/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    padding: 16px;
    min-height: 100vh;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .btn {
    background: var(--teal);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-sm {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 6px;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg-card-hover); color: var(--text); }
  .btn-danger {
    background: transparent;
    color: #ef4444;
    border: 1px solid #ef444440;
  }
  .btn-danger:hover { background: #ef444420; }

  .today-section {
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .today-date {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .habit-card {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }
  .habit-card:hover { background: var(--bg-card-hover); }
  .habit-card.done {
    border-color: transparent;
    opacity: 0.75;
  }

  .habit-check {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .habit-card.done .habit-check {
    border-color: transparent;
  }

  .habit-info { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .habit-streak {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .habit-streak .fire { color: #f59e0b; }

  .habit-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .habit-card:hover .habit-actions { opacity: 1; }

  /* Year grid */
  .grid-section {
    margin-bottom: 24px;
  }

  .habit-grid-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }

  .habit-grid-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .habit-grid-name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .habit-grid-stats {
    font-size: 11px;
    color: var(--text-dim);
  }

  .grid-cells {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }

  .grid-cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    background: var(--border);
    flex-shrink: 0;
  }
  .grid-cell.filled { opacity: 0.9; }
  .grid-cell.today-cell {
    outline: 2px solid var(--text);
    outline-offset: 1px;
  }

  /* Add habit modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    max-width: 90vw;
  }

  .modal h2 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--teal);
  }

  .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--bg-card);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 7px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--teal);
    color: #000;
  }

  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<div class="header-actions">
  <h1>🔥 Habit Tracker</h1>
  <button class="btn btn-sm" onclick="openModal()">+ Habit</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">Heute</div>
  <div class="tab" onclick="switchTab('grid')">Jahres-Grid</div>
</div>

<div id="view-today" class="view active">
  <div class="today-section">
    <div class="today-date" id="today-label"></div>
    <div class="habits-list" id="habits-list">
      <div class="empty-state">Keine Habits. Füge eine hinzu!</div>
    </div>
  </div>
</div>

<div id="view-grid" class="view">
  <div class="grid-section">
    <div class="section-title">Jahres-Übersicht</div>
    <div id="grids-container"></div>
  </div>
</div>

<!-- Add Habit Modal -->
<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Neue Habit</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="habit-name-input" placeholder="z.B. Meditation" maxlength="40">
    </div>
    <div class="form-group">
      <label>Emoji</label>
      <input type="text" id="habit-icon-input" placeholder="🌟" maxlength="2">
    </div>
    <div class="form-group">
      <label>Farbe</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-sm" onclick="saveHabit()">Speichern</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16'];
let habits = [];
let selectedColor = COLORS[0];
let currentTab = 'today';

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function formatDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

async function loadData() {
  try {
    const r = await fetch('/app/habit-tracker/api/habits');
    const d = await r.json();
    habits = d.habits || [];
    render();
  } catch(e) {
    console.error('Load error', e);
  }
}

async function saveData() {
  await fetch('/app/habit-tracker/api/habits', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ habits })
  });
  await fetch('/api/notify-change', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ appId: 'habit-tracker', file: 'habits.json' })
  });
}

function getStreak(habit) {
  if (!habit.completions || habit.completions.length === 0) return 0;
  const sorted = [...habit.completions].sort().reverse();
  let streak = 0;
  let check = new Date();
  // Check if today is done, if not start from yesterday
  const today = todayStr();
  if (!sorted.includes(today)) {
    check.setDate(check.getDate() - 1);
  }
  for (let i = 0; i < 365; i++) {
    const ds = check.toISOString().slice(0,10);
    if (sorted.includes(ds)) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getCompletionRate(habit) {
  if (!habit.completions || habit.completions.length === 0) return 0;
  const created = new Date(habit.createdAt + 'T12:00:00');
  const today = new Date();
  const days = Math.max(1, Math.ceil((today - created) / 86400000) + 1);
  return Math.round((habit.completions.length / days) * 100);
}

function render() {
  document.getElementById('today-label').textContent = formatDate(todayStr());
  renderToday();
  renderGrids();
}

function renderToday() {
  const list = document.getElementById('habits-list');
  if (!habits.length) {
    list.innerHTML = '<div class="empty-state">Keine Habits. Füge eine hinzu!</div>';
    return;
  }
  const today = todayStr();
  list.innerHTML = habits.map(h => {
    const done = h.completions && h.completions.includes(today);
    const streak = getStreak(h);
    return `
      <div class="habit-card ${done ? 'done' : ''}" id="card-${h.id}">
        <button class="habit-check" style="${done ? `background:${h.color};border-color:${h.color}` : `border-color:${h.color}`}" onclick="toggleToday('${h.id}')">
          ${done ? '✓' : ''}
        </button>
        <div class="habit-info">
          <div class="habit-name">${h.icon || ''} ${h.name}</div>
          <div class="habit-streak">
            ${streak > 0 ? `<span class="fire">🔥</span> ${streak} Tage Streak` : 'Noch kein Streak'}
            · ${getCompletionRate(h)}% diese Woche
          </div>
        </div>
        <div class="habit-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteHabit('${h.id}')">✕</button>
        </div>
      </div>
    `;
  }).join('');
}

function renderGrids() {
  const container = document.getElementById('grids-container');
  if (!habits.length) {
    container.innerHTML = '<div class="empty-state">Keine Habits vorhanden.</div>';
    return;
  }
  const today = new Date();
  const todayStr2 = today.toISOString().slice(0,10);

  // Build last 52 weeks (364 days) + today
  const days = [];
  for (let i = 363; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0,10));
  }

  container.innerHTML = habits.map(h => {
    const completionSet = new Set(h.completions || []);
    const cells = days.map(d => {
      const filled = completionSet.has(d);
      const isToday = d === todayStr2;
      return `<div class="grid-cell ${filled ? 'filled' : ''} ${isToday ? 'today-cell' : ''}" style="${filled ? `background:${h.color}` : ''}" title="${d}"></div>`;
    }).join('');
    const streak = getStreak(h);
    return `
      <div class="habit-grid-item">
        <div class="habit-grid-header">
          <div class="habit-grid-name">${h.icon || ''} ${h.name}</div>
          <div class="habit-grid-stats">🔥 ${streak} · ${h.completions ? h.completions.length : 0} Tage total</div>
        </div>
        <div class="grid-cells">${cells}</div>
      </div>
    `;
  }).join('');
}

async function toggleToday(id) {
  const today = todayStr();
  const habit = habits.find(h => h.id === id);
  if (!habit) return;
  if (!habit.completions) habit.completions = [];
  const idx = habit.completions.indexOf(today);
  if (idx >= 0) {
    habit.completions.splice(idx, 1);
  } else {
    habit.completions.push(today);
    // Emit streak update
    PulseOS.emit('streak-update', { id: habit.id, name: habit.name, streak: getStreak(habit) });
  }
  await saveData();
  render();
}

async function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  await saveData();
  render();
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('habit-name-input').value = '';
  document.getElementById('habit-icon-input').value = '';
  selectedColor = COLORS[0];
  renderColorPicker();
  document.getElementById('habit-name-input').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = COLORS.map(c =>
    `<div class="color-swatch ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c) {
  selectedColor = c;
  renderColorPicker();
}

async function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  const icon = document.getElementById('habit-icon-input').value.trim() || '⭐';
  if (!name) {
    document.getElementById('habit-name-input').focus();
    return;
  }
  const newHabit = {
    id: 'habit-' + Date.now(),
    name,
    icon,
    color: selectedColor,
    completions: [],
    createdAt: todayStr()
  };
  habits.push(newHabit);
  await saveData();
  closeModal();
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i === 0 && tab === 'today') || (i === 1 && tab === 'grid'));
  });
  document.getElementById('view-today').classList.toggle('active', tab === 'today');
  document.getElementById('view-grid').classList.toggle('active', tab === 'grid');
  if (tab === 'grid') renderGrids();
}

// PulseOS SDK integration
PulseOS.onInput('habit-add', function(data) {
  if (data && data.name) {
    habits.push({
      id: 'habit-' + Date.now(),
      name: data.name,
      icon: data.icon || '⭐',
      color: data.color || COLORS[0],
      completions: [],
      createdAt: todayStr()
    });
    saveData().then(() => render());
  }
});

PulseOS.onDataChanged(function() {
  loadData();
});

// Enter to submit
document.getElementById('habit-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveHabit();
});

// Init
renderColorPicker();
loadData();
</script>
</body>
</html>
