<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0d0d14; color:#e0e0e0; padding:16px; min-height:100vh; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
h1 { font-size:18px; font-weight:600; }
.week-nav { display:flex; align-items:center; gap:8px; }
.week-nav button { background:none; border:1px solid #2a2a3e; color:#888; width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.week-nav button:hover { border-color:#4ecdc4; color:#4ecdc4; }
.week-label { font-size:12px; color:#888; min-width:80px; text-align:center; }
.days-header { display:grid; grid-template-columns:140px repeat(7, 1fr); gap:4px; margin-bottom:8px; padding:0 4px; }
.days-header span { text-align:center; font-size:10px; color:#666; font-weight:600; text-transform:uppercase; }
.habit-row { display:grid; grid-template-columns:140px repeat(7, 1fr); gap:4px; margin-bottom:6px; padding:4px; border-radius:8px; background:#13131f; align-items:center; }
.habit-name { font-size:13px; font-weight:500; padding-left:8px; display:flex; align-items:center; gap:6px; overflow:hidden; }
.habit-name .emoji { font-size:16px; }
.habit-name .label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.day-cell { aspect-ratio:1; border-radius:6px; background:#1a1a2e; border:1px solid #2a2a3e; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; position:relative; }
.day-cell:hover { border-color:#4ecdc4; transform:scale(1.1); }
.day-cell.done { background:#4ecdc4; border-color:#4ecdc4; }
.day-cell.done::after { content:'✓'; color:#0d0d14; font-size:12px; font-weight:700; }
.day-cell.today { box-shadow:0 0 0 2px #4ecdc455; }
.day-cell.future { opacity:0.3; cursor:default; }
.streak-badge { font-size:10px; color:#4ecdc4; font-weight:600; margin-left:auto; padding-right:4px; white-space:nowrap; }
.add-bar { display:flex; gap:8px; margin-top:12px; }
.add-bar input { flex:1; padding:10px 12px; background:#13131f; border:1px solid #2a2a3e; border-radius:8px; color:#e0e0e0; font-size:13px; outline:none; }
.add-bar input:focus { border-color:#4ecdc4; }
.add-bar input::placeholder { color:#555; }
.add-bar button { background:#4ecdc4; color:#0d0d14; border:none; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; white-space:nowrap; }
.add-bar button:hover { opacity:0.9; }
.stats { display:flex; gap:12px; margin-bottom:16px; }
.stat-card { flex:1; background:#13131f; border-radius:8px; padding:12px; text-align:center; border:1px solid #2a2a3e; }
.stat-val { font-size:22px; font-weight:700; color:#4ecdc4; }
.stat-label { font-size:10px; color:#666; margin-top:2px; text-transform:uppercase; }
.empty { text-align:center; padding:40px 20px; color:#555; }
.empty .big { font-size:40px; margin-bottom:8px; }
.habit-row .delete-btn { display:none; position:absolute; right:4px; top:50%; transform:translateY(-50%); background:#ff4757; color:#fff; border:none; width:18px; height:18px; border-radius:50%; font-size:10px; cursor:pointer; line-height:1; }
.habit-row:hover .delete-btn { display:block; }
.habit-name { position:relative; }
</style>
</head>
<body>

<div class="header">
  <h1>Habit Tracker</h1>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">›</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="days-header" id="daysHeader"><span></span></div>
<div id="grid"></div>

<div class="add-bar">
  <input id="newHabit" placeholder="Neue Gewohnheit hinzufügen..." onkeydown="if(event.key==='Enter')addHabit()">
  <button onclick="addHabit()">+ Hinzufügen</button>
</div>

<script>
const EMOJIS = ['🏃','📚','💧','🧘','💪','🎯','✍️','🥗','😴','🎵','💊','🧹','📵','🌅','🧠'];
let habits = [];
let weekOffset = 0;
const DATA_URL = '/app/habit-tracker/api/habits';

async function load() {
  try {
    const r = await fetch(DATA_URL);
    if (r.ok) {
      const d = await r.json();
      habits = d.habits || [];
    }
  } catch {}
  render();
}

async function save() {
  try {
    await fetch(DATA_URL, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ habits }) });
  } catch {}
}

function getWeekDates(offset) {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + (offset * 7));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function fmt(d) {
  return d.toISOString().slice(0,10);
}

function todayStr() { return fmt(new Date()); }

function getStreak(habit) {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    if ((habit.done || []).includes(fmt(d))) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function render() {
  const dates = getWeekDates(weekOffset);
  const today = todayStr();

  // Week label
  const wl = document.getElementById('weekLabel');
  const d0 = dates[0], d6 = dates[6];
  wl.textContent = `${d0.getDate()}.${d0.getMonth()+1}. – ${d6.getDate()}.${d6.getMonth()+1}.`;

  // Days header
  const dh = document.getElementById('daysHeader');
  const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  dh.innerHTML = '<span></span>' + dates.map((d,i) => {
    const isToday = fmt(d) === today;
    return `<span style="${isToday ? 'color:#4ecdc4;font-weight:700;' : ''}">${dayNames[i]}<br>${d.getDate()}</span>`;
  }).join('');

  // Stats
  const statsEl = document.getElementById('stats');
  if (habits.length > 0) {
    const todayCount = habits.filter(h => (h.done||[]).includes(today)).length;
    const totalDone = habits.reduce((s,h) => s + (h.done||[]).length, 0);
    const bestStreak = Math.max(0, ...habits.map(getStreak));
    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-val">${todayCount}/${habits.length}</div><div class="stat-label">Heute</div></div>
      <div class="stat-card"><div class="stat-val">${totalDone}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-val">${bestStreak}🔥</div><div class="stat-label">Beste Streak</div></div>
    `;
  } else {
    statsEl.innerHTML = '';
  }

  // Grid
  const grid = document.getElementById('grid');
  if (habits.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="big">📋</div>Füge deine erste Gewohnheit hinzu!</div>';
    return;
  }

  grid.innerHTML = habits.map((h, hi) => {
    const streak = getStreak(h);
    const cells = dates.map(d => {
      const ds = fmt(d);
      const done = (h.done||[]).includes(ds);
      const isToday = ds === today;
      const isFuture = d > new Date();
      let cls = 'day-cell';
      if (done) cls += ' done';
      if (isToday) cls += ' today';
      if (isFuture) cls += ' future';
      return `<div class="${cls}" onclick="${isFuture ? '' : `toggle(${hi},'${ds}')`}"></div>`;
    }).join('');
    return `<div class="habit-row">
      <div class="habit-name"><span class="emoji">${h.emoji||'🎯'}</span><span class="label">${h.name}</span>${streak > 0 ? `<span class="streak-badge">${streak}🔥</span>` : ''}<button class="delete-btn" onclick="removeHabit(${hi})">✕</button></div>
      ${cells}
    </div>`;
  }).join('');
}

function toggle(hi, date) {
  const h = habits[hi];
  if (!h.done) h.done = [];
  const idx = h.done.indexOf(date);
  if (idx >= 0) h.done.splice(idx, 1);
  else h.done.push(date);
  save();
  render();
}

function addHabit() {
  const inp = document.getElementById('newHabit');
  const name = inp.value.trim();
  if (!name) return;
  const emoji = EMOJIS[habits.length % EMOJIS.length];
  habits.push({ name, emoji, done: [], created: todayStr() });
  inp.value = '';
  save();
  render();
}

function removeHabit(hi) {
  habits.splice(hi, 1);
  save();
  render();
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

// Live data refresh
if (window.PulseOS && window.PulseOS.onDataChanged) {
  window.PulseOS.onDataChanged(function() { load(); });
}

load();
</script>
</body>
</html>
