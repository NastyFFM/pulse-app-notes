<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<style>
:root {
  --bg-base: #0f172a;
  --bg-primary: #1e293b;
  --bg-secondary: #334155;
  --bg-tertiary: #475569;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #8B5CF6;
  --accent-hover: #7C3AED;
  --accent-dim: rgba(139,92,246,0.15);
  --border: #334155;
  --border-light: #475569;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --radius: 10px;
  --sidebar-w: 240px;
  --chat-w: 380px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-new {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.btn-new:hover { background: var(--accent); color: white; }

.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.project-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.15s;
  margin-bottom: 2px;
  position: relative;
}
.project-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
.project-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.project-item .icon { font-size: 16px; }
.project-item .badge {
  position: absolute;
  right: 8px;
  font-size: 10px;
  background: var(--bg-secondary);
  padding: 1px 6px;
  border-radius: 10px;
  color: var(--text-muted);
}
.project-item.nested { padding-left: 28px; font-size: 12px; }
.project-item .delete-btn {
  display: none;
  position: absolute;
  right: 8px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
}
.project-item:hover .delete-btn { display: block; }
.project-item:hover .badge { display: none; }

/* ── Chat Panel ── */
.chat-panel {
  width: var(--chat-w);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-header .project-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.chat-header-info { flex: 1; }
.chat-header-info .name {
  font-size: 14px;
  font-weight: 600;
}
.chat-header-info .name-input {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  width: 100%;
  outline: none;
}
.chat-header-info .name-input:focus {
  border-bottom: 1px solid var(--accent);
}
.chat-header-info .sub {
  font-size: 11px;
  color: var(--text-muted);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 92%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.agent, .msg.system {
  align-self: flex-start;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}
.msg.system {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 12px;
  max-width: 100%;
  text-align: center;
  border-radius: 8px;
}
.msg .time {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  display: block;
}
.msg.agent .time, .msg.system .time { color: var(--text-muted); }

.msg .widget-action {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  margin-top: 6px;
}

.typing-indicator {
  align-self: flex-start;
  padding: 12px 18px;
  background: var(--bg-secondary);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  display: none;
}
.typing-indicator.visible { display: flex; gap: 4px; }
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-muted); }

.btn-send {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.btn-send:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ── Widget Canvas ── */
.canvas-area {
  flex: 1;
  background: var(--bg-base);
  overflow: auto;
  position: relative;
}

.canvas-empty {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text-muted);
}
.canvas-empty .icon { font-size: 48px; margin-bottom: 12px; }
.canvas-empty .title { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
.canvas-empty .sub { font-size: 12px; max-width: 280px; }

.canvas-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 20px;
  align-content: flex-start;
}

/* ── Widgets ── */
.widget-frame {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.2s;
  position: relative;
  min-width: 280px;
}
.widget-frame:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.widget-frame.size-sm { width: 280px; }
.widget-frame.size-md { width: 380px; }
.widget-frame.size-lg { width: 580px; }
.widget-frame.size-full { width: 100%; }

.widget-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: grab;
  user-select: none;
}
.widget-head .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.widget-head .label {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.widget-head .actions {
  display: flex;
  gap: 4px;
}
.widget-head .actions button {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-head .actions button:hover { background: var(--bg-secondary); color: var(--text-primary); }

.widget-body {
  padding: 12px 14px;
  flex: 1;
  overflow: auto;
  max-height: 400px;
}

/* Widget: Todo List */
.w-todo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.w-todo-item:last-child { border: none; }
.w-todo-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.w-todo-item.done .text { text-decoration: line-through; color: var(--text-muted); }
.w-todo-item .text { flex: 1; }
.w-todo-item .priority {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 6px;
  font-weight: 500;
}
.w-todo-item .priority.high { background: rgba(239,68,68,0.15); color: var(--red); }
.w-todo-item .priority.medium { background: rgba(245,158,11,0.15); color: var(--amber); }
.w-todo-item .priority.low { background: rgba(34,197,94,0.15); color: var(--green); }
.w-todo-add {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.w-todo-add input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
  font-family: var(--font);
}
.w-todo-add input:focus { border-color: var(--accent); }
.w-todo-add button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 12px;
  cursor: pointer;
}

/* Widget: Notes */
.w-note-content {
  min-height: 80px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
  outline: none;
  padding: 4px;
  border-radius: 4px;
}
.w-note-content:focus {
  background: var(--bg-secondary);
}
.w-note-content[contenteditable]:empty:before {
  content: 'Notiz schreiben...';
  color: var(--text-muted);
}

/* Widget: Table */
.w-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.w-table th {
  text-align: left;
  padding: 6px 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.w-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
}
.w-table tr:hover td { background: rgba(255,255,255,0.02); }

/* Widget: Timeline */
.w-timeline-item {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  position: relative;
}
.w-timeline-item:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 7px;
  top: 24px;
  bottom: -8px;
  width: 2px;
  background: var(--border);
}
.w-timeline-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: var(--bg-primary);
  flex-shrink: 0;
  margin-top: 2px;
}
.w-timeline-content { flex: 1; }
.w-timeline-content .title { font-size: 13px; font-weight: 500; }
.w-timeline-content .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.w-timeline-content .time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Widget: KPI/Stat */
.w-kpi {
  text-align: center;
  padding: 8px 0;
}
.w-kpi .value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
}
.w-kpi .label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}
.w-kpi .change {
  font-size: 12px;
  margin-top: 4px;
}
.w-kpi .change.up { color: var(--green); }
.w-kpi .change.down { color: var(--red); }

/* Widget: Kanban (mini) */
.w-kanban-cols {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}
.w-kanban-col {
  min-width: 140px;
  flex: 1;
}
.w-kanban-col-head {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 4px 6px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.w-kanban-col-head .count {
  background: var(--bg-secondary);
  padding: 0px 5px;
  border-radius: 8px;
  font-size: 10px;
}
.w-kanban-card {
  background: var(--bg-secondary);
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s;
}
.w-kanban-card:hover { background: var(--bg-tertiary); }

/* Widget: Links/Resources */
.w-link-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.w-link-item:hover { color: var(--accent); }
.w-link-item:last-child { border: none; }
.w-link-item .link-icon { font-size: 14px; }

/* Widget: Progress */
.w-progress-bar {
  height: 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 6px;
}
.w-progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.w-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
}

/* Template card */
.tpl-card {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.tpl-card:hover { border-color: var(--accent); background: var(--accent-dim); }
.tpl-card .tpl-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.tpl-card .tpl-info { flex: 1; }
.tpl-card .tpl-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.tpl-card .tpl-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
.tpl-card .tpl-widgets {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.tpl-card .tpl-widgets span {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--bg-secondary);
  border-radius: 6px;
  color: var(--text-muted);
}
.tpl-card .tpl-usage {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Save as template button */
.btn-save-template {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}
.btn-save-template:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Scrollbars */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 60px; }
  .sidebar-header h2 span { display: none; }
  .project-item span:not(.icon) { display: none; }
  .chat-panel { width: 300px; }
}
</style>
</head>
<body>

<!-- Sidebar: Project List -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2><span>🧩</span> <span>Projekte</span></h2>
    <button class="btn-new" onclick="openTemplateModal()" title="Neues Projekt">+</button>
  </div>
  <div class="project-list" id="projectList"></div>
</div>

<!-- Chat Panel -->
<div class="chat-panel">
  <div class="chat-header">
    <div class="project-icon" id="chatIcon" style="background: var(--accent-dim)">🚀</div>
    <div class="chat-header-info">
      <input class="name-input" id="projectName" value="Projekt" spellcheck="false">
      <div class="sub" id="projectSub">0 Widgets</div>
    </div>
    <button class="btn-save-template" onclick="saveAsTemplate()" title="Als Template speichern">💾 Template</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="typing-indicator" id="typingIndicator">
    <span></span><span></span><span></span>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Was willst du bauen?" rows="1"></textarea>
    <button class="btn-send" id="btnSend" onclick="sendMessage()">&#9654;</button>
  </div>
</div>

<!-- Widget Canvas -->
<div class="canvas-area" id="canvasArea">
  <div class="canvas-empty" id="canvasEmpty">
    <div class="icon">🧩</div>
    <div class="title">Dein Projekt-Canvas</div>
    <div class="sub">Schreibe im Chat was du brauchst — Widgets erscheinen hier automatisch</div>
  </div>
  <div class="canvas-grid" id="canvasGrid"></div>
  <!-- Pending changes button -->
  <button id="pendingBtn" onclick="commitChanges()" style="display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;border:1px solid var(--accent);background:var(--accent);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);z-index:102;box-shadow:0 4px 20px rgba(139,92,246,0.4);transition:all 0.2s;display:none;align-items:center;gap:8px;">
    <span id="pendingIcon">💾</span> <span id="pendingLabel">0 Änderungen übernehmen</span>
  </button>
  <!-- Closed widgets toggle -->
  <button id="closedToggle" onclick="toggleClosedPanel()" style="display:none;position:fixed;bottom:16px;right:16px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:all 0.15s;">
    🗑️ <span id="closedCount">0</span> geschlossen
  </button>
  <!-- Closed widgets panel -->
  <div id="closedPanel" style="display:none;position:fixed;bottom:52px;right:16px;width:340px;max-height:300px;background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;z-index:101;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4);">
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;">
      <span>Geschlossene Widgets</span>
      <button onclick="toggleClosedPanel()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;">✕</button>
    </div>
    <div id="closedList" style="overflow-y:auto;flex:1;max-height:240px;"></div>
  </div>
</div>

<!-- Template Picker Modal -->
<div id="templateModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;align-items:center;justify-content:center;">
  <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:16px;width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <h3 style="font-size:15px;font-weight:600;">Neues Projekt erstellen</h3>
      <button onclick="closeTemplateModal()" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px 20px;overflow-y:auto;flex:1;" id="templateList">
      <!-- Templates rendered here -->
    </div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button onclick="createProject()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;cursor:pointer;font-family:var(--font);">
        📝 Leeres Projekt
      </button>
      <button onclick="closeTemplateModal()" style="padding:10px 16px;border-radius:8px;border:none;background:var(--bg-secondary);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:var(--font);">
        Abbrechen
      </button>
    </div>
  </div>
</div>

<script>
// ── State ──
let state = { projects: [], activeProject: null };
let saving = false;
let saveTimeout = null;
let saveVersion = 0; // track save generation to ignore stale SSE reloads
let processing = false;

const API_BASE = '';
const DATA_URL = `${API_BASE}/app/projects/api/projects`;

// ── Load / Save ──
async function load() {
  try {
    const res = await fetch(DATA_URL);
    const newState = await res.json();
    if (!newState.projects) newState.projects = [];
    state = newState;
    renderProjectList();
    if (state.activeProject) {
      selectProject(state.activeProject);
    } else if (state.projects.length > 0) {
      selectProject(state.projects[0].id);
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}

function save() {
  clearTimeout(saveTimeout);
  const myVersion = ++saveVersion;
  saveTimeout = setTimeout(async () => {
    if (saving) return;
    saving = true;
    try {
      await fetch(DATA_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
    } catch (e) { console.error('Save error:', e); }
    // Keep saving=true for a short window to ignore SSE bounce-back
    setTimeout(() => { if (saveVersion === myVersion) saving = false; }, 500);
  }, 200);
}

// ── SSE Live Sync ──
function connectSSE() {
  const es = new EventSource(`${API_BASE}/sse/projects`);
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'change' && !saving) {
        load();
      }
    } catch {}
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

// ── Project CRUD ──
function getProject(id) {
  return state.projects.find(p => p.id === id);
}

function createProject(parentId = null) {
  const id = 'proj-' + Date.now();
  const proj = {
    id,
    name: 'Neues Projekt',
    icon: ['🚀', '📦', '💡', '🎯', '🔧', '📊', '🌟', '🏗️'][Math.floor(Math.random() * 8)],
    color: ['#8B5CF6', '#3B82F6', '#22c55e', '#f59e0b', '#ef4444', '#ec4899'][Math.floor(Math.random() * 6)],
    parentId,
    created: new Date().toISOString(),
    updated: new Date().toISOString(),
    chat: [{
      id: 'msg-sys-' + Date.now(),
      role: 'system',
      text: 'Neues Projekt erstellt! Beschreibe was du bauen oder planen willst.',
      time: new Date().toISOString()
    }],
    canvas: { widgets: [] },
    data: {},
    children: []
  };

  if (parentId) {
    const parent = getProject(parentId);
    if (parent) parent.children.push(id);
  }

  state.projects.push(proj);
  state.activeProject = id;
  save();
  renderProjectList();
  selectProject(id);
}

function deleteProject(id) {
  const proj = getProject(id);
  if (!proj) return;
  if (proj.children?.length > 0) {
    // Remove children too
    for (const cid of proj.children) deleteProject(cid);
  }
  // Remove from parent
  if (proj.parentId) {
    const parent = getProject(proj.parentId);
    if (parent) parent.children = parent.children.filter(c => c !== id);
  }
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.activeProject === id) {
    state.activeProject = state.projects[0]?.id || null;
  }
  save();
  renderProjectList();
  if (state.activeProject) selectProject(state.activeProject);
}

function selectProject(id) {
  state.activeProject = id;
  const proj = getProject(id);
  if (!proj) return;

  // Update sidebar
  document.querySelectorAll('.project-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Update chat header
  document.getElementById('chatIcon').textContent = proj.icon;
  document.getElementById('chatIcon').style.background = proj.color + '22';
  document.getElementById('projectName').value = proj.name;
  document.getElementById('projectSub').textContent = `${proj.canvas.widgets.length} Widget${proj.canvas.widgets.length !== 1 ? 's' : ''}`;

  renderChat();
  renderCanvas();
  save();
}

// ── Render Project List ──
function renderProjectList() {
  const el = document.getElementById('projectList');
  el.innerHTML = '';

  function renderLevel(projects, depth = 0) {
    for (const p of projects) {
      const div = document.createElement('div');
      div.className = 'project-item' + (state.activeProject === p.id ? ' active' : '') + (depth > 0 ? ' nested' : '');
      div.style.paddingLeft = (12 + depth * 16) + 'px';
      div.dataset.id = p.id;
      div.innerHTML = `
        <span class="icon">${p.icon}</span>
        <span>${p.name}</span>
        <span class="badge">${p.canvas.widgets.length}</span>
        <button class="delete-btn" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</button>
      `;
      div.onclick = () => selectProject(p.id);
      el.appendChild(div);

      // Render children
      const children = state.projects.filter(c => c.parentId === p.id);
      if (children.length > 0) renderLevel(children, depth + 1);
    }
  }

  const topLevel = state.projects.filter(p => !p.parentId);
  renderLevel(topLevel);
}

// ── Render Chat ──
function renderChat() {
  const proj = getProject(state.activeProject);
  if (!proj) return;

  const el = document.getElementById('chatMessages');
  el.innerHTML = '';

  for (const msg of proj.chat) {
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;

    let html = escapeHtml(msg.text);

    // Render widget action badges
    if (msg.widgetActions) {
      for (const wa of msg.widgetActions) {
        html += `<div class="widget-action">${wa.icon || '🧩'} ${wa.label}</div>`;
      }
    }

    html += `<span class="time">${formatTime(msg.time)}</span>`;
    div.innerHTML = html;
    el.appendChild(div);
  }

  el.scrollTop = el.scrollHeight;
}

// ── Render Canvas ──
function renderCanvas() {
  const proj = getProject(state.activeProject);
  if (!proj) return;

  const grid = document.getElementById('canvasGrid');
  const empty = document.getElementById('canvasEmpty');

  if (proj.canvas.widgets.length === 0) {
    empty.style.display = 'block';
    grid.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = '';

  for (const widget of proj.canvas.widgets) {
    const frame = createWidgetFrame(widget, proj);
    grid.appendChild(frame);
  }

  // Show/hide closed widgets toggle
  const closedCount = (proj.closedWidgets || []).length;
  const closedToggle = document.getElementById('closedToggle');
  closedToggle.style.display = closedCount > 0 ? 'block' : 'none';
  document.getElementById('closedCount').textContent = closedCount;
  // Refresh panel if open
  const panel = document.getElementById('closedPanel');
  if (panel.style.display === 'flex') renderClosedPanel();
}

// ── Widget Factory ──
function createWidgetFrame(widget, proj) {
  const frame = document.createElement('div');
  frame.className = `widget-frame size-${widget.size || 'md'}`;
  frame.dataset.widgetId = widget.id;

  const color = widget.color || proj.color || 'var(--accent)';

  const typeLabel = getWidgetLabel(widget.type);
  const displayTitle = widget.title !== typeLabel ? widget.title : typeLabel;
  frame.innerHTML = `
    <div class="widget-head">
      <div class="dot" style="background:${color}"></div>
      <div class="label">${getWidgetIcon(widget.type)} ${displayTitle}</div>
      <div class="actions">
        <button onclick="toggleWidgetEdit('${widget.id}')" title="Widget bearbeiten" class="widget-edit-btn">✏️</button>
        <button onclick="resizeWidget('${widget.id}')" title="Resize">↔</button>
        <button onclick="removeWidget('${widget.id}')" title="Entfernen">✕</button>
      </div>
    </div>
    <div class="widget-cmd" id="wcmd-${widget.id}" style="display:none;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg-base);display:none;">
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="text" id="wcmd-input-${widget.id}" placeholder="z.B. Zeile hinzufügen, Wert ändern..."
          style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;font-family:var(--font);outline:none;"
          onkeydown="if(event.key==='Enter')sendWidgetCmd('${widget.id}')"
        />
        <button onclick="sendWidgetCmd('${widget.id}')" style="padding:5px 10px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap;">Senden</button>
      </div>
      <div id="wcmd-status-${widget.id}" style="font-size:11px;color:var(--text-muted);padding-top:4px;display:none;"></div>
    </div>
    <div class="widget-body" id="wb-${widget.id}"></div>
  `;

  const body = frame.querySelector('.widget-body');
  renderWidgetContent(body, widget, proj);

  return frame;
}

function renderWidgetContent(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};

  switch (widget.type) {
    case 'todo':
      renderTodoWidget(container, widget, proj);
      break;
    case 'notes':
      renderNotesWidget(container, widget, proj);
      break;
    case 'table':
      renderTableWidget(container, widget, proj);
      break;
    case 'timeline':
      renderTimelineWidget(container, widget, proj);
      break;
    case 'kpi':
      renderKpiWidget(container, widget, proj);
      break;
    case 'kanban':
      renderKanbanWidget(container, widget, proj);
      break;
    case 'links':
      renderLinksWidget(container, widget, proj);
      break;
    case 'progress':
      renderProgressWidget(container, widget, proj);
      break;
    case 'text':
      container.innerHTML = `<div class="w-note-content">${escapeHtml(data.text || widget.text || '')}</div>`;
      break;
    default:
      container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">Widget: ${widget.type}</div>`;
  }
}

// ── Widget Renderers ──
function renderTodoWidget(container, widget, proj) {
  const items = proj.data[widget.dataKey] || widget.data?.items || [];
  let html = '';
  for (const item of items) {
    html += `
      <div class="w-todo-item ${item.done ? 'done' : ''}">
        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleTodo('${widget.dataKey}','${item.id}')">
        <span class="text">${escapeHtml(item.text)}</span>
        ${item.priority ? `<span class="priority ${item.priority}">${item.priority}</span>` : ''}
      </div>
    `;
  }
  html += `
    <div class="w-todo-add">
      <input type="text" placeholder="Neue Aufgabe..." onkeydown="if(event.key==='Enter')addTodo('${widget.dataKey}',this)">
      <button onclick="addTodo('${widget.dataKey}',this.previousElementSibling)">+</button>
    </div>
  `;
  container.innerHTML = html;
}

function renderNotesWidget(container, widget, proj) {
  const text = proj.data[widget.dataKey]?.text || widget.data?.text || '';
  container.innerHTML = `<div class="w-note-content" contenteditable="true"
    onblur="updateNoteContent('${widget.dataKey}',this.innerText)">${escapeHtml(text)}</div>`;
}

function renderTableWidget(container, widget, proj) {
  const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
  const cols = widget.config?.columns || (rows.length > 0 ? Object.keys(rows[0]).filter(k => k !== 'id') : []);

  let html = '<table class="w-table"><thead><tr>';
  for (const col of cols) html += `<th>${col}</th>`;
  html += '</tr></thead><tbody>';
  for (let ri = 0; ri < rows.length; ri++) {
    html += '<tr>';
    for (const col of cols) {
      const val = escapeHtml(String(rows[ri][col] ?? ''));
      html += `<td contenteditable="true" data-row="${ri}" data-col="${escapeHtml(col)}" data-key="${widget.dataKey}" onblur="updateTableCell(this)" style="cursor:text;min-width:40px;">${val}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Daten</div>';
  container.innerHTML = html;
}

function updateTableCell(td) {
  const dataKey = td.dataset.key;
  const ri = parseInt(td.dataset.row);
  const col = td.dataset.col;
  const newVal = td.innerText.trim();
  const proj = getProject(state.activeProject);
  if (!proj) return;
  const rows = proj.data[dataKey];
  if (!rows || !rows[ri]) return;
  const oldVal = String(rows[ri][col] ?? '');
  if (oldVal === newVal) return;
  rows[ri][col] = newVal;
  logChange(proj, `📝 Tabelle: "${col}" Zeile ${ri+1} geaendert: "${oldVal}" → "${newVal}"`);
  save();
}

function renderTimelineWidget(container, widget, proj) {
  const items = proj.data[widget.dataKey] || widget.data?.items || [];
  let html = '';
  for (const item of items) {
    html += `
      <div class="w-timeline-item">
        <div class="w-timeline-dot" style="border-color:${item.color || 'var(--accent)'}"></div>
        <div class="w-timeline-content">
          <div class="title">${escapeHtml(item.title)}</div>
          ${item.description ? `<div class="desc">${escapeHtml(item.description)}</div>` : ''}
          ${item.time ? `<div class="time">${item.time}</div>` : ''}
        </div>
      </div>
    `;
  }
  if (items.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Eintraege</div>';
  container.innerHTML = html;
}

function renderKpiWidget(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};
  container.innerHTML = `
    <div class="w-kpi">
      <div class="value" contenteditable="true" data-key="${widget.dataKey}" data-field="value" onblur="updateKpiField(this)" style="cursor:text;">${data.value ?? '—'}</div>
      <div class="label" contenteditable="true" data-key="${widget.dataKey}" data-field="label" onblur="updateKpiField(this)" style="cursor:text;">${escapeHtml(data.label || widget.title || '')}</div>
      ${data.change != null ? `<div class="change ${data.change >= 0 ? 'up' : 'down'}">${data.change >= 0 ? '+' : ''}${data.change}%</div>` : ''}
    </div>
  `;
}

function updateKpiField(el) {
  const dataKey = el.dataset.key;
  const field = el.dataset.field;
  const newVal = el.innerText.trim();
  const proj = getProject(state.activeProject);
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = {};
  const oldVal = String(proj.data[dataKey][field] ?? '');
  if (oldVal === newVal) return;
  proj.data[dataKey][field] = newVal;
  const w = proj.canvas.widgets.find(w => w.dataKey === dataKey);
  logChange(proj, `📊 KPI "${w?.title || dataKey}": ${field} geaendert: "${oldVal}" → "${newVal}"`);
  save();
}

function renderKanbanWidget(container, widget, proj) {
  const columns = proj.data[widget.dataKey]?.columns || widget.data?.columns || [
    { id: 'todo', name: 'To Do', items: [] },
    { id: 'doing', name: 'In Progress', items: [] },
    { id: 'done', name: 'Done', items: [] }
  ];
  let html = '<div class="w-kanban-cols">';
  for (const col of columns) {
    html += `
      <div class="w-kanban-col">
        <div class="w-kanban-col-head">${col.name} <span class="count">${(col.items || []).length}</span></div>
        ${(col.items || []).map(item => `<div class="w-kanban-card">${escapeHtml(typeof item === 'string' ? item : item.text || item.title || '')}</div>`).join('')}
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderLinksWidget(container, widget, proj) {
  const links = proj.data[widget.dataKey] || widget.data?.links || [];
  let html = '';
  for (const link of links) {
    html += `
      <div class="w-link-item" onclick="window.open('${link.url}','_blank')">
        <span class="link-icon">${link.icon || '🔗'}</span>
        <span>${escapeHtml(link.title || link.url)}</span>
      </div>
    `;
  }
  if (links.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Links</div>';
  container.innerHTML = html;
}

function renderProgressWidget(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};
  const pct = Math.min(100, Math.max(0, data.percent || 0));
  const color = pct >= 80 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--accent)';
  container.innerHTML = `
    <div class="w-progress-bar"><div class="w-progress-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="w-progress-label"><span>${data.label || ''}</span><span>${pct}%</span></div>
  `;
}

// ── Pending Changes & Changelog ──
let pendingChanges = [];

function logChange(proj, summary) {
  // Accumulate as pending change (not written to changelog yet)
  pendingChanges.push({ time: new Date().toISOString(), summary });
  updatePendingBtn();
}

function flushChangelog(proj) {
  if (!proj.changelog) proj.changelog = [];
  for (const c of pendingChanges) {
    proj.changelog.push(c);
  }
  if (proj.changelog.length > 50) proj.changelog = proj.changelog.slice(-50);
  const flushed = [...pendingChanges];
  pendingChanges = [];
  updatePendingBtn();
  return flushed;
}

function updatePendingBtn() {
  const btn = document.getElementById('pendingBtn');
  if (!btn) return;
  const n = pendingChanges.length;
  btn.style.display = n > 0 ? 'flex' : 'none';
  document.getElementById('pendingLabel').textContent = `${n} Änderung${n !== 1 ? 'en' : ''} übernehmen`;
}

async function commitChanges() {
  const proj = getProject(state.activeProject);
  if (!proj || pendingChanges.length === 0) return;

  const changes = flushChangelog(proj);

  // Save immediately
  saving = true;
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
  } catch (e) { console.error('Save error:', e); }
  setTimeout(() => { saving = false; }, 800);

  // Build summary for AI
  const summary = changes.map(c => c.summary).join('\n');
  const autoMsg = `[Änderungen übernommen]\n${summary}`;

  // Send to AI as automatic message
  const userMsg = {
    id: 'msg-' + Date.now(),
    role: 'user',
    text: autoMsg,
    time: new Date().toISOString()
  };
  proj.chat.push(userMsg);
  renderChat();

  // Show typing
  processing = true;
  document.getElementById('typingIndicator').classList.add('visible');
  document.getElementById('btnSend').disabled = true;

  try {
    let response;
    try {
      response = await callProjectAgent(state.activeProject, autoMsg);
    } catch (agentErr) {
      console.log('Agent unavailable, using local fallback:', agentErr.message);
      response = { text: `Änderungen gespeichert:\n${summary}`, widgetActions: [] };
    }

    if (response._fromAgent) {
      const freshRes = await fetch(DATA_URL);
      const freshState = await freshRes.json();
      if (freshState.projects) {
        state.projects = freshState.projects;
        state.activeProject = freshState.activeProject || state.activeProject;
      }
      const freshProj = getProject(state.activeProject);
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    saving = true;
    try {
      await fetch(DATA_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
    } catch (e) { console.error('Save error:', e); }
    setTimeout(() => { saving = false; }, 800);

  } catch (e) {
    proj.chat.push({
      id: 'msg-err-' + Date.now(),
      role: 'system',
      text: 'Fehler: ' + e.message,
      time: new Date().toISOString()
    });
    save();
  }

  processing = false;
  document.getElementById('typingIndicator').classList.remove('visible');
  document.getElementById('btnSend').disabled = false;
  renderChat();
  renderCanvas();
}

function getWidgetTitle(proj, dataKey) {
  const w = proj.canvas.widgets.find(w => w.dataKey === dataKey);
  return w ? w.title : dataKey;
}

// ── Widget Data Mutations ──
function toggleTodo(dataKey, itemId) {
  const proj = getProject(state.activeProject);
  if (!proj) return;
  const items = proj.data[dataKey];
  if (!items) return;
  const item = items.find(i => i.id === itemId);
  if (item) {
    item.done = !item.done;
    logChange(proj, `${item.done ? '✅' : '⬜'} "${item.text}" in "${getWidgetTitle(proj, dataKey)}" ${item.done ? 'erledigt' : 'wieder offen'}`);
  }
  save();
  renderCanvas();
}

function addTodo(dataKey, input) {
  const text = input.value.trim();
  if (!text) return;
  const proj = getProject(state.activeProject);
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = [];
  proj.data[dataKey].push({ id: 't-' + Date.now(), text, done: false });
  logChange(proj, `➕ Neue Aufgabe "${text}" in "${getWidgetTitle(proj, dataKey)}" hinzugefuegt`);
  input.value = '';
  save();
  renderCanvas();
}

function updateNoteContent(dataKey, text) {
  const proj = getProject(state.activeProject);
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = {};
  const oldText = proj.data[dataKey].text || '';
  proj.data[dataKey].text = text;
  if (oldText !== text) {
    logChange(proj, `📝 Notiz "${getWidgetTitle(proj, dataKey)}" bearbeitet`);
  }
  save();
}

function removeWidget(widgetId) {
  const proj = getProject(state.activeProject);
  if (!proj) return;
  const w = proj.canvas.widgets.find(w => w.id === widgetId);
  if (!w) return;
  // Move to closedWidgets instead of deleting
  if (!proj.closedWidgets) proj.closedWidgets = [];
  proj.closedWidgets.push({ ...w, closedAt: new Date().toISOString() });
  proj.canvas.widgets = proj.canvas.widgets.filter(w => w.id !== widgetId);
  logChange(proj, `🗑️ Widget "${w.title}" geschlossen`);
  document.getElementById('projectSub').textContent = `${proj.canvas.widgets.length} Widgets`;
  save();
  renderCanvas();
}

function restoreWidget(widgetId) {
  const proj = getProject(state.activeProject);
  if (!proj || !proj.closedWidgets) return;
  const idx = proj.closedWidgets.findIndex(w => w.id === widgetId);
  if (idx === -1) return;
  const w = proj.closedWidgets.splice(idx, 1)[0];
  delete w.closedAt;
  proj.canvas.widgets.push(w);
  logChange(proj, `♻️ Widget "${w.title}" wiederhergestellt`);
  document.getElementById('projectSub').textContent = `${proj.canvas.widgets.length} Widgets`;
  save();
  renderCanvas();
}

function toggleClosedPanel() {
  const panel = document.getElementById('closedPanel');
  panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  if (panel.style.display === 'flex') renderClosedPanel();
}

function renderClosedPanel() {
  const proj = getProject(state.activeProject);
  const list = document.getElementById('closedList');
  const closed = proj?.closedWidgets || [];
  if (closed.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:12px;">Keine geschlossenen Widgets</div>';
    return;
  }
  list.innerHTML = closed.map(w => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;">
      <span>${getWidgetIcon(w.type)}</span>
      <span style="flex:1;color:var(--text-secondary)">${escapeHtml(w.title)}</span>
      <button onclick="restoreWidget('${w.id}')" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--accent-dim);color:var(--accent);font-size:11px;cursor:pointer;font-family:var(--font);">Wiederherstellen</button>
    </div>
  `).join('');
}

function toggleWidgetEdit(widgetId) {
  const cmd = document.getElementById('wcmd-' + widgetId);
  if (!cmd) return;
  const isOpen = cmd.style.display === 'block';
  // Close all other open cmd panels
  document.querySelectorAll('.widget-cmd').forEach(el => el.style.display = 'none');
  if (!isOpen) {
    cmd.style.display = 'block';
    const input = document.getElementById('wcmd-input-' + widgetId);
    if (input) input.focus();
  }
}

async function sendWidgetCmd(widgetId) {
  const input = document.getElementById('wcmd-input-' + widgetId);
  const status = document.getElementById('wcmd-status-' + widgetId);
  const text = input?.value.trim();
  if (!text || processing) return;

  const proj = getProject(state.activeProject);
  if (!proj) return;
  const widget = proj.canvas.widgets.find(w => w.id === widgetId);
  if (!widget) return;

  // Show status
  status.style.display = 'block';
  status.textContent = 'Wird verarbeitet...';
  status.style.color = 'var(--accent)';
  input.disabled = true;

  // Build context message that focuses on this widget
  const widgetData = proj.data[widget.dataKey] || widget.data || {};
  const widgetMeta = { id: widget.id, type: widget.type, title: widget.title, size: widget.size, dataKey: widget.dataKey, config: widget.config || {} };
  const contextMsg = `[Widget-Bearbeitung: "${widget.title}"]\nWidget-Definition: ${JSON.stringify(widgetMeta)}\nAktueller Inhalt (proj.data["${widget.dataKey}"]): ${JSON.stringify(widgetData).slice(0, 1500)}\n\nDu kannst ALLES an diesem Widget aendern:\n- Daten/Inhalt (proj.data["${widget.dataKey}"])\n- Widget-Eigenschaften (title, size, type, config, color)\n- Struktur (Spalten hinzufuegen/entfernen bei Tabellen, neue Items bei Todo/Kanban/Timeline)\n- Widget-Typ komplett aendern (z.B. von table zu kanban)\n\nAnweisung vom User: ${text}`;

  // Add to chat as user message
  proj.chat.push({
    id: 'msg-' + Date.now(),
    role: 'user',
    text: `✏️ ${widget.title}: ${text}`,
    time: new Date().toISOString()
  });
  renderChat();

  // Save before agent call
  saving = true;
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
  } catch (e) { console.error('Save error:', e); }
  setTimeout(() => { saving = false; }, 800);

  processing = true;
  try {
    let response;
    try {
      response = await callProjectAgent(state.activeProject, contextMsg);
    } catch (agentErr) {
      console.log('Agent unavailable:', agentErr.message);
      response = { text: 'Agent nicht verfuegbar. Bitte aendere die Daten manuell.', widgetActions: [] };
    }

    if (response._fromAgent) {
      const freshRes = await fetch(DATA_URL);
      const freshState = await freshRes.json();
      if (freshState.projects) {
        state.projects = freshState.projects;
        state.activeProject = freshState.activeProject || state.activeProject;
      }
      const freshProj = getProject(state.activeProject);
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    saving = true;
    try {
      await fetch(DATA_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
    } catch (e) { console.error('Save error:', e); }
    setTimeout(() => { saving = false; }, 800);

    status.textContent = 'Erledigt!';
    status.style.color = 'var(--green)';
    input.value = '';
    setTimeout(() => {
      status.style.display = 'none';
      document.getElementById('wcmd-' + widgetId).style.display = 'none';
    }, 1500);

  } catch (e) {
    status.textContent = 'Fehler: ' + e.message;
    status.style.color = 'var(--red)';
  }

  processing = false;
  input.disabled = false;
  renderChat();
  renderCanvas();
}

function resizeWidget(widgetId) {
  const proj = getProject(state.activeProject);
  if (!proj) return;
  const w = proj.canvas.widgets.find(w => w.id === widgetId);
  if (!w) return;
  const sizes = ['sm', 'md', 'lg', 'full'];
  const idx = sizes.indexOf(w.size || 'md');
  w.size = sizes[(idx + 1) % sizes.length];
  logChange(proj, `↔️ Widget "${w.title}" Groesse geaendert zu ${w.size}`);
  save();
  renderCanvas();
}

// ── Chat: Send Message ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || processing) return;

  const proj = getProject(state.activeProject);
  if (!proj) return;

  // Add user message
  const userMsg = {
    id: 'msg-' + Date.now(),
    role: 'user',
    text,
    time: new Date().toISOString()
  };
  proj.chat.push(userMsg);
  input.value = '';
  input.style.height = '42px';
  renderChat();

  // Save immediately (not debounced) so the server has the user message before agent call
  saving = true;
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
  } catch (e) { console.error('Save error:', e); }
  setTimeout(() => { saving = false; }, 800);

  // Show typing
  processing = true;
  document.getElementById('typingIndicator').classList.add('visible');
  document.getElementById('btnSend').disabled = true;

  try {
    // Try AI agent first, fall back to local pattern matching
    let response;
    try {
      response = await callProjectAgent(state.activeProject, text);
    } catch (agentErr) {
      console.log('Agent unavailable, using local fallback:', agentErr.message);
      response = await processProjectMessage(text, proj);
    }

    // If agent responded, reload full state from server (agent wrote directly to projects.json)
    if (response._fromAgent) {
      const freshRes = await fetch(DATA_URL);
      const freshState = await freshRes.json();
      if (freshState.projects) {
        state.projects = freshState.projects;
        state.activeProject = freshState.activeProject || state.activeProject;
      }
      // Re-get the project reference after state reload
      const freshProj = getProject(state.activeProject);
      if (freshProj) {
        // Add agent response to the fresh state
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      // Local fallback: add response to current proj
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    // Save with immediate flush
    saving = true;
    try {
      await fetch(DATA_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
    } catch (e) { console.error('Save error:', e); }
    setTimeout(() => { saving = false; }, 800);

  } catch (e) {
    proj.chat.push({
      id: 'msg-err-' + Date.now(),
      role: 'system',
      text: 'Fehler: ' + e.message,
      time: new Date().toISOString()
    });
    save();
  }

  processing = false;
  document.getElementById('typingIndicator').classList.remove('visible');
  document.getElementById('btnSend').disabled = false;
  renderChat();
  renderCanvas();
  document.getElementById('projectSub').textContent = `${proj.canvas.widgets.length} Widgets`;
}

// ── AI Agent Call ──
async function callProjectAgent(projectId, text) {
  const res = await fetch('/api/project-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ projectId, text })
  });

  if (!res.ok) throw new Error('Agent request failed');

  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Agent error');

  return {
    text: data.text,
    widgetActions: data.widgetActions || [],
    _fromAgent: true
  };
}

// ── Widget Detection Engine ──
// Analyzes chat messages and creates appropriate widgets
async function processProjectMessage(text, proj) {
  const lower = text.toLowerCase();
  const widgetActions = [];
  let responseText = '';

  // ── Widget creation patterns ──
  const patterns = [
    {
      match: /todo[s\-]?|aufgabe|task|checkliste|to-do/i,
      create: () => ({
        type: 'todo',
        title: extractTitle(text, 'Aufgaben'),
        size: 'md',
        dataKey: 'todos-' + Date.now(),
        data: { items: extractListItems(text) }
      }),
      label: 'Todo-Liste erstellt'
    },
    {
      match: /\bnotiz|\bnote\b|beschreibung|dokument/i,
      create: () => ({
        type: 'notes',
        title: extractTitle(text, 'Notizen'),
        size: 'md',
        dataKey: 'notes-' + Date.now(),
        data: { text: '' }
      }),
      label: 'Notiz erstellt'
    },
    {
      match: /tabelle|table|\buebersicht\b|vergleich/i,
      create: () => ({
        type: 'table',
        title: extractTitle(text, 'Tabelle'),
        size: 'lg',
        dataKey: 'table-' + Date.now(),
        config: {},
        data: { rows: [] }
      }),
      label: 'Tabelle erstellt'
    },
    {
      match: /timeline|zeitstrahl|\bablauf\b|chronolog|meilenstein|milestone|zeitplan/i,
      create: () => ({
        type: 'timeline',
        title: extractTitle(text, 'Timeline'),
        size: 'md',
        dataKey: 'timeline-' + Date.now(),
        data: { items: [] }
      }),
      label: 'Timeline erstellt'
    },
    {
      match: /kanban|board|spalten|workflow/i,
      create: () => ({
        type: 'kanban',
        title: extractTitle(text, 'Board'),
        size: 'lg',
        dataKey: 'kanban-' + Date.now(),
        data: { columns: [
          { id: 'todo', name: 'To Do', items: [] },
          { id: 'doing', name: 'In Arbeit', items: [] },
          { id: 'done', name: 'Erledigt', items: [] }
        ]}
      }),
      label: 'Kanban Board erstellt'
    },
    {
      match: /kpi|metrik|statistik|zahl|counter|zaehler/i,
      create: () => ({
        type: 'kpi',
        title: extractTitle(text, 'KPI'),
        size: 'sm',
        dataKey: 'kpi-' + Date.now(),
        data: { value: '0', label: extractTitle(text, 'Metrik') }
      }),
      label: 'KPI Widget erstellt'
    },
    {
      match: /link|resource|url|quelle|referenz/i,
      create: () => ({
        type: 'links',
        title: extractTitle(text, 'Links'),
        size: 'sm',
        dataKey: 'links-' + Date.now(),
        data: { links: [] }
      }),
      label: 'Link-Sammlung erstellt'
    },
    {
      match: /fortschritt|progress|prozent/i,
      create: () => ({
        type: 'progress',
        title: extractTitle(text, 'Fortschritt'),
        size: 'sm',
        dataKey: 'progress-' + Date.now(),
        data: { percent: 0, label: extractTitle(text, 'Fortschritt') }
      }),
      label: 'Fortschrittsanzeige erstellt'
    }
  ];

  let created = [];
  for (const p of patterns) {
    if (p.match.test(lower)) {
      const widget = p.create();
      widget.id = 'w-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
      widget.color = proj.color;

      // Store data in project
      if (widget.data && widget.dataKey) {
        proj.data[widget.dataKey] = widget.data.items || widget.data.columns || widget.data.rows || widget.data.links || widget.data;
      }

      proj.canvas.widgets.push(widget);
      created.push(widget);
      widgetActions.push({ icon: getWidgetIcon(widget.type), label: p.label });
    }
  }

  // ── Smart responses ──
  if (created.length > 0) {
    const names = created.map(w => `${getWidgetIcon(w.type)} ${w.title}`).join(', ');
    responseText = `Ich habe ${created.length} Widget${created.length > 1 ? 's' : ''} erstellt: ${names}.\n\nDu kannst sie rechts im Canvas sehen und direkt bearbeiten. Sag mir wenn du mehr brauchst!`;
  } else if (/hilfe|help|was kannst/i.test(lower)) {
    responseText = `Ich kann diese Widgets fuer dich erstellen:\n\n` +
      `• "Todo-Liste" — Aufgaben mit Checkboxen\n` +
      `• "Notiz" — Freitext-Notizen\n` +
      `• "Tabelle" — Daten in Spalten\n` +
      `• "Timeline" — Zeitstrahl mit Events\n` +
      `• "Kanban" — Board mit Spalten\n` +
      `• "KPI" — Zahlen/Metriken\n` +
      `• "Links" — URL-Sammlung\n` +
      `• "Fortschritt" — Prozentanzeige\n\n` +
      `Beschreibe einfach was du brauchst!`;
  } else if (/projekt|umbenennen|name/i.test(lower) && /aender|umbenen|nenn/i.test(lower)) {
    const newName = text.replace(/.*(?:nenn|aender|umbenen)[^\w]*(?:zu|in|auf)?\s*/i, '').replace(/['"]/g, '').trim();
    if (newName && newName.length < 50) {
      proj.name = newName;
      document.getElementById('projectName').value = newName;
      renderProjectList();
      responseText = `Projekt umbenannt zu "${newName}".`;
    } else {
      responseText = 'Wie soll das Projekt heissen?';
    }
  } else if (/unterprojekt|subprojekt|kindprojekt|verschachtel/i.test(lower)) {
    createProject(proj.id);
    responseText = 'Unterprojekt erstellt! Du findest es in der Sidebar unter diesem Projekt.';
    widgetActions.push({ icon: '📂', label: 'Unterprojekt erstellt' });
  } else {
    // Generic response — try to be helpful
    responseText = `Ich habe deine Nachricht verstanden. Um Widgets zu erstellen, verwende Begriffe wie:\n` +
      `"Erstelle eine Todo-Liste", "Ich brauche ein Kanban Board", "Mach eine Tabelle", etc.\n\n` +
      `Oder sag "Hilfe" fuer alle Optionen.`;

    // Try to also send to the PulseOS event bus for action chain routing
    try {
      fetch('/api/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'chat:message',
          source: 'project:' + proj.id,
          data: { text, projectId: proj.id, projectName: proj.name }
        })
      });
    } catch {}
  }

  return { text: responseText, widgetActions };
}

// ── Helpers ──
function extractTitle(text, fallback) {
  // Try to extract a quoted title first
  const quoted = text.match(/["']([^"']{2,30})["']/);
  if (quoted) return quoted[1].trim();
  // Otherwise use fallback (widget type label)
  return fallback;
}

function extractListItems(text) {
  // Try to extract items from text like "Todo: Einkaufen, Putzen, Kochen"
  const colonMatch = text.match(/:\s*(.+)/);
  if (colonMatch) {
    const items = colonMatch[1].split(/[,;]+/).map(s => s.trim()).filter(Boolean);
    if (items.length > 1) {
      return items.map((t, i) => ({ id: 't-' + Date.now() + '-' + i, text: t, done: false }));
    }
  }
  return [];
}

function getWidgetIcon(type) {
  const icons = { todo: '✅', notes: '📝', table: '📊', timeline: '⏱️', kpi: '📈', kanban: '📋', links: '🔗', progress: '📉', text: '📄' };
  return icons[type] || '🧩';
}

function getWidgetLabel(type) {
  const labels = { todo: 'Aufgaben', notes: 'Notizen', table: 'Tabelle', timeline: 'Timeline', kpi: 'KPI', kanban: 'Board', links: 'Links', progress: 'Fortschritt', text: 'Text' };
  return labels[type] || type;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTime(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

// ── Input handling ──
const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(120, this.scrollHeight) + 'px';
});
chatInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Project name editing
document.getElementById('projectName').addEventListener('change', function() {
  const proj = getProject(state.activeProject);
  if (proj) {
    proj.name = this.value;
    renderProjectList();
    save();
  }
});

// ── Templates ──
async function openTemplateModal() {
  const modal = document.getElementById('templateModal');
  modal.style.display = 'flex';

  try {
    const res = await fetch('/api/project-templates');
    const data = await res.json();
    const list = document.getElementById('templateList');
    const templates = data.templates || [];

    if (templates.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">Keine Templates vorhanden. Erstelle ein leeres Projekt!</div>';
      return;
    }

    const icons = { todo: '✅', notes: '📝', table: '📊', timeline: '⏱️', kpi: '📈', kanban: '📋', links: '🔗', progress: '📉' };
    list.innerHTML = templates.map(tpl => `
      <div class="tpl-card" onclick="createFromTemplate('${tpl.id}')">
        <div class="tpl-icon" style="background:${tpl.color}22">${tpl.icon}</div>
        <div class="tpl-info">
          <div class="tpl-name">${escapeHtml(tpl.name)}</div>
          <div class="tpl-desc">${escapeHtml(tpl.description || '')}</div>
          <div class="tpl-widgets">
            ${tpl.widgets.map(w => `<span>${icons[w.type] || '🧩'} ${w.title}</span>`).join('')}
          </div>
          ${tpl.usageCount > 0 ? `<div class="tpl-usage">${tpl.usageCount}x verwendet</div>` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Template load error:', e);
  }
}

function closeTemplateModal() {
  document.getElementById('templateModal').style.display = 'none';
}

async function createFromTemplate(templateId) {
  closeTemplateModal();
  try {
    const res = await fetch('/api/project-from-template', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ templateId })
    });
    const data = await res.json();
    if (data.ok) {
      await load();
      selectProject(data.projectId);
    }
  } catch (e) {
    console.error('Template creation error:', e);
  }
}

async function saveAsTemplate() {
  const proj = getProject(state.activeProject);
  if (!proj || proj.canvas.widgets.length === 0) {
    alert('Dieses Projekt hat keine Widgets — nichts zum Speichern als Template.');
    return;
  }

  try {
    const res = await fetch('/api/project-save-as-template', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId: proj.id })
    });
    const data = await res.json();
    if (data.ok) {
      // Add system message
      proj.chat.push({
        id: 'msg-tpl-' + Date.now(),
        role: 'system',
        text: `Projekt als Template "${data.name}" gespeichert! Du kannst es bei neuen Projekten wiederverwenden.`,
        time: new Date().toISOString()
      });
      save();
      renderChat();
    }
  } catch (e) {
    console.error('Save template error:', e);
  }
}

// Close modal on backdrop click
document.getElementById('templateModal').addEventListener('click', function(e) {
  if (e.target === this) closeTemplateModal();
});

load();
connectSSE();
