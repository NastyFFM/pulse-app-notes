}
.widget-change-banner:hover { background: rgba(139,92,246,0.2); }
.widget-change-banner .change-icon { color: var(--accent); flex-shrink: 0; }
.widget-change-banner .change-text { flex: 1; line-height: 1.4; }
.widget-change-banner .change-dismiss {
  color: var(--text-muted); cursor: pointer; font-size: 14px;
  background: none; border: none; padding: 0; flex-shrink: 0;
}
.widget-change-banner .change-dismiss:hover { color: var(--text-primary); }

.widget-body {
  padding: 12px 14px;
  flex: 1;
  overflow: auto;
  max-height: 400px;
}

/* Widget: Todo List */
.w-todo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.w-todo-item:last-child { border: none; }
.w-todo-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.w-todo-item.done .text { text-decoration: line-through; color: var(--text-muted); }
.w-todo-item .text { flex: 1; }
.w-todo-item .priority {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 6px;
  font-weight: 500;
}
.w-todo-item .priority.high { background: rgba(239,68,68,0.15); color: var(--red); }
.w-todo-item .priority.medium { background: rgba(245,158,11,0.15); color: var(--amber); }
.w-todo-item .priority.low { background: rgba(34,197,94,0.15); color: var(--green); }
.w-todo-add {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.w-todo-add input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
  font-family: var(--font);
}
.w-todo-add input:focus { border-color: var(--accent); }
.w-todo-add button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 12px;
  cursor: pointer;
}

/* Widget: Notes */
.w-note-content {
  min-height: 80px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
  outline: none;
  padding: 4px;
  border-radius: 4px;
}
.w-note-content:focus {
  background: var(--bg-secondary);
}
.w-note-content[contenteditable]:empty:before {
  content: 'Notiz schreiben...';
  color: var(--text-muted);
}

/* Widget: Table */
.w-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.w-table th {
  text-align: left;
  padding: 6px 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.w-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
}
.w-table tr:hover td { background: rgba(255,255,255,0.02); }

/* Widget: Timeline */
.w-timeline-item {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  position: relative;
}
.w-timeline-item:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 7px;
  top: 24px;
  bottom: -8px;
  width: 2px;
  background: var(--border);
}
.w-timeline-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: var(--bg-primary);
  flex-shrink: 0;
  margin-top: 2px;
}
.w-timeline-content { flex: 1; }
.w-timeline-content .title { font-size: 13px; font-weight: 500; }
.w-timeline-content .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.w-timeline-content .time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Widget: KPI/Stat */
.w-kpi {
  text-align: center;
  padding: 8px 0;
}
.w-kpi .value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
}
.w-kpi .label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}
.w-kpi .change {
  font-size: 12px;
  margin-top: 4px;
}
.w-kpi .change.up { color: var(--green); }
.w-kpi .change.down { color: var(--red); }

/* Widget: Kanban (mini) */
.w-kanban-cols {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}
.w-kanban-col {
  min-width: 140px;
  flex: 1;
}
.w-kanban-col-head {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 4px 6px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.w-kanban-col-head .count {
  background: var(--bg-secondary);
  padding: 0px 5px;
  border-radius: 8px;
  font-size: 10px;
}
.w-kanban-card {
  background: var(--bg-secondary);
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s;
}
.w-kanban-card:hover { background: var(--bg-tertiary); }

/* Widget: Links/Resources */
.w-link-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.w-link-item:hover { color: var(--accent); }
.w-link-item:last-child { border: none; }
.w-link-item .link-icon { font-size: 14px; }

/* Widget: Progress */
.w-progress-bar {
  height: 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 6px;
}
.w-progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.w-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
}

/* Template card */
.tpl-card {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.tpl-card:hover { border-color: var(--accent); background: var(--accent-dim); }
.tpl-card .tpl-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.tpl-card .tpl-info { flex: 1; }
.tpl-card .tpl-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.tpl-card .tpl-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
.tpl-card .tpl-widgets {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.tpl-card .tpl-widgets span {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--bg-secondary);
  border-radius: 6px;
  color: var(--text-muted);
}
.tpl-card .tpl-usage {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Save as template button */
.btn-save-template {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}
.btn-save-template:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Inherited Widgets */
.inherited-section {
  grid-column: 1 / -1;
  margin-top: 8px;
}
.inherited-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.inherited-label::before {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.inherited-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.widget-frame.inherited-widget {
  opacity: 0.85;
  border-style: dashed;
}
.widget-frame.inherited-widget:hover {
  opacity: 1;
}
.inherited-badge {
  font-size: 9px;
  color: var(--text-muted);
  background: var(--bg-secondary);
  padding: 1px 5px;
  border-radius: 4px;
  margin-left: 4px;
}

/* Perspective Toggle */
.widget-perspective-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-perspective-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.perspective-hint {
  font-size: 9px;
  color: var(--text-muted);
  margin-left: 4px;
  opacity: 0.7;
}

/* Scrollbars */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ── Graph Tab ── */
.main-content { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.content-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg-primary); flex-shrink: 0; }
.content-tab { padding: 8px 18px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border: none; background: none; font-family: var(--font); border-bottom: 2px solid transparent; transition: all 0.15s; }
.content-tab:hover { color: var(--text-secondary); }
.content-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.graph-area { flex: 1; position: relative; overflow: hidden; display: none; background: var(--bg-base); }
.graph-area.active { display: block; }
.canvas-area.active { display: block; }

.graph-toolbar { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 10; }
.graph-toolbar button { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-secondary); font-size: 12px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.graph-toolbar button:hover { border-color: var(--accent); color: var(--accent); }

.graph-svg { width: 100%; height: 100%; }
.graph-svg line { stroke: var(--border-light); stroke-width: 2; }
.graph-svg line.active { stroke: var(--accent); stroke-width: 3; animation: edgeFlash 0.6s ease; }
@keyframes edgeFlash { 0%,100% { stroke: var(--border-light); } 50% { stroke: var(--accent); stroke-width: 4; } }
.graph-svg marker path { fill: var(--border-light); }

.graph-node { position: absolute; width: 180px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: grab; user-select: none; transition: border-color 0.15s, box-shadow 0.15s; z-index: 5; }
.graph-node:hover { border-color: var(--accent); box-shadow: 0 0 16px rgba(139,92,246,0.15); }
.graph-node.dragging { cursor: grabbing; z-index: 20; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.graph-node .node-icon { font-size: 20px; margin-bottom: 4px; }
.graph-node .node-name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.graph-node .node-type { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.graph-node .node-ports { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.graph-node .port { font-size: 9px; padding: 2px 6px; border-radius: 4px; cursor: crosshair; }
.graph-node .port.output { background: rgba(139,92,246,0.15); color: var(--accent); border: 1px solid rgba(139,92,246,0.3); }
.graph-node .port.input { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
.graph-node .node-status-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
.graph-node .node-status-dot.running { background: var(--green); }
.graph-node.producer { border-left: 3px solid var(--green); }
.graph-node.transformer { border-left: 3px solid var(--amber); }
.graph-node.consumer { border-left: 3px solid var(--blue); }

.graph-empty { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-muted); }
.graph-empty .icon { font-size: 40px; margin-bottom: 8px; }
.graph-empty .title { font-size: 14px; color: var(--text-secondary); }
.graph-empty .sub { font-size: 11px; margin-top: 4px; }

/* Port drag & connect */
.port.drag-source { background: var(--accent) !important; color: #fff !important; transform: scale(1.2); }
.port.drop-target { background: var(--green) !important; color: #fff !important; transform: scale(1.3); box-shadow: 0 0 8px var(--green); }
.graph-svg .drag-line { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 6 3; opacity: 0.8; }
.graph-svg path.edge { fill: none; stroke: var(--border-light); stroke-width: 2; cursor: pointer; }
.graph-svg path.edge:hover { stroke: var(--accent); stroke-width: 3; }
.graph-svg path.edge.active { stroke: var(--accent); stroke-width: 3; animation: edgeFlash 0.6s ease; }
.graph-svg .edge-hitbox { fill: none; stroke: transparent; stroke-width: 14; cursor: pointer; }

/* Edge labels */
.graph-edge-label { position: absolute; font-size: 9px; color: var(--text-muted); background: var(--bg-base); padding: 1px 5px; border-radius: 4px; pointer-events: none; white-space: nowrap; z-index: 4; }

/* Context menu */
.graph-context-menu { position: fixed; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 4px; z-index: 100; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.graph-context-menu .menu-item { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
.graph-context-menu .menu-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.graph-context-menu .menu-item.danger { color: var(--red); }
.graph-context-menu .menu-item.danger:hover { background: rgba(239,68,68,0.1); }

/* Node delete button on hover */
.graph-node .node-delete { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; background: var(--red); color: #fff; font-size: 10px; display: none; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg-base); line-height: 1; z-index: 10; }
.graph-node:hover .node-delete { display: flex; }

/* Data flow popup */
.graph-data-popup { position: absolute; background: var(--bg-primary); border: 1px solid var(--accent); border-radius: 8px; padding: 10px 14px; max-width: 280px; font-size: 11px; color: var(--text-secondary); z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.graph-data-popup pre { margin: 4px 0 0; font-size: 10px; color: var(--text-muted); max-height: 120px; overflow: auto; white-space: pre-wrap; }

/* Running node pulse */
@keyframes nodePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 12px 4px rgba(34,197,94,0.2); } }
.graph-node .node-status-dot.running { background: var(--green); animation: nodePulse 1.5s ease infinite; }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 60px; }
  .sidebar-header h2 span { display: none; }
  .project-item span:not(.icon) { display: none; }
  .chat-panel { width: 300px; }
  .graph-node { width: 140px; padding: 10px; }
  .graph-node .node-name { font-size: 12px; }
  .graph-node .node-delete { display: flex; width: 24px; height: 24px; font-size: 12px; }
  .graph-toolbar { flex-wrap: wrap; }
  .graph-toolbar button { padding: 6px 10px; font-size: 11px; }
}
@media (max-width: 600px) {
  .sidebar { display: none; }
  .chat-panel { width: 100%; position: fixed; inset: 0; z-index: 100; display: none; }
  .graph-node { width: 120px; padding: 8px; }
  .graph-node .port { font-size: 8px; padding: 1px 4px; }
  .graph-edge-label { display: none; }
}
</style>
</head>
<body>

<!-- Sidebar: Project List -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2><span>🧩</span> <span>Projekte</span></h2>
    <button class="btn-new" onclick="openTemplateModal()" title="Neues Projekt">+</button>
  </div>
  <div class="sidebar-search">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="contextSearchInput" placeholder="Contexts durchsuchen..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="project-list" id="projectList"></div>
</div>

<!-- Chat Panel -->
<div class="chat-panel">
  <div class="chat-header">
    <div class="project-icon" id="chatIcon" style="background: var(--accent-dim)">🚀</div>
    <div class="chat-header-info">
      <input class="name-input" id="projectName" value="Projekt" spellcheck="false">
      <div class="sub" id="projectSub">0 Widgets</div>
    </div>
    <button class="btn-save-template" onclick="saveAsTemplate()" title="Als Template speichern">💾 Template</button>
  </div>
  <div class="breadcrumb-bar" id="breadcrumbBar"></div>
  <div class="plan-toggle" id="planToggle" onclick="togglePlan()">
    <span class="arrow">▶</span>
    <span class="plan-label">📋 Implementierungsplan</span>
    <span class="plan-status" id="planStatus">—</span>
    <button class="btn-refresh" id="btnRefreshPlan" onclick="event.stopPropagation();refreshPlan()" title="Plan aktualisieren">🔄</button>
  </div>
  <div class="plan-panel" id="planPanel">
    <div class="plan-content" id="planContent">
      <div class="plan-empty">Klicke 🔄 um einen Plan zu generieren</div>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="typing-indicator" id="typingIndicator">
    <span></span><span></span><span></span>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Was willst du bauen?" rows="1"></textarea>
    <button class="btn-send" id="btnSend" onclick="sendMessage()">&#9654;</button>
  </div>
</div>

<!-- Main Content (Canvas + Graph tabs) -->
<div class="main-content">
<div class="content-tabs" id="contentTabs">
  <button class="content-tab active" data-tab="canvas" onclick="switchContentTab('canvas')">Canvas</button>
  <button class="content-tab" data-tab="graph" onclick="switchContentTab('graph')">Graph</button>
</div>

<!-- Graph Editor -->
<div class="graph-area" id="graphArea">
  <div class="graph-toolbar">
    <button onclick="showAddNodeDialog()">+ App</button>
    <button onclick="runCurrentGraph()">&#9654; Run</button>
  </div>
  <svg class="graph-svg" id="graphSvg">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <path d="M0,0 L10,3.5 L0,7" fill="var(--border-light)"/>
      </marker>
    </defs>
  </svg>
  <div id="graphNodes"></div>
  <div class="graph-empty" id="graphEmpty">
    <div class="icon">🔗</div>
    <div class="title">App-Graph</div>
    <div class="sub">Verbinde Apps zu einem Datenfluss-Graphen</div>
  </div>
</div>

<!-- Widget Canvas -->
<div class="canvas-area active" id="canvasArea">
  <div class="canvas-empty" id="canvasEmpty">
    <div class="icon">🧩</div>
    <div class="title">Dein Projekt-Canvas</div>
    <div class="sub">Schreibe im Chat was du brauchst — Widgets erscheinen hier automatisch</div>
  </div>
  <div class="canvas-grid" id="canvasGrid"></div>
  <!-- Pending changes button -->
  <button id="pendingBtn" onclick="commitChanges()" style="display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;border:1px solid var(--accent);background:var(--accent);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);z-index:102;box-shadow:0 4px 20px rgba(139,92,246,0.4);transition:all 0.2s;display:none;align-items:center;gap:8px;">
    <span id="pendingIcon">💾</span> <span id="pendingLabel">0 Änderungen übernehmen</span>
  </button>
  <!-- Closed widgets toggle -->
  <button id="closedToggle" onclick="toggleClosedPanel()" style="display:none;position:fixed;bottom:16px;right:16px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:all 0.15s;">
    🗑️ <span id="closedCount">0</span> geschlossen
  </button>
  <!-- Closed widgets panel -->
  <div id="closedPanel" style="display:none;position:fixed;bottom:52px;right:16px;width:340px;max-height:300px;background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;z-index:101;flex-direction:column;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4);">
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;">
      <span>Geschlossene Widgets</span>
      <button onclick="toggleClosedPanel()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;">✕</button>
    </div>
    <div id="closedList" style="overflow-y:auto;flex:1;max-height:240px;"></div>
  </div>
</div>
</div><!-- /main-content -->

<!-- Template Picker Modal -->
<div id="templateModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;align-items:center;justify-content:center;">
  <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:16px;width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <h3 style="font-size:15px;font-weight:600;">Neues Projekt erstellen</h3>
      <button onclick="closeTemplateModal()" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:16px 20px;overflow-y:auto;flex:1;" id="templateList">
      <!-- Templates rendered here -->
    </div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button onclick="createProject()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;cursor:pointer;font-family:var(--font);">
        📝 Leeres Projekt
      </button>
      <button onclick="closeTemplateModal();showWidgetTemplatePicker()" style="padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;cursor:pointer;font-family:var(--font);">
        🧩 Widget einfügen
      </button>
      <button onclick="closeTemplateModal()" style="padding:10px 16px;border-radius:8px;border:none;background:var(--bg-secondary);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:var(--font);">
        Abbrechen
      </button>
    </div>
  </div>
</div>

<script>
// ── State ──
// contexts: L0 list from /api/contexts (id, name, icon, color, parentId, widgetCount)
// activeContextId: currently selected context ID
// activeContext: full context object from /api/context/:id
let state = { contexts: [], activeContextId: null, activeContext: null, inheritedWidgets: [], inheritedData: {}, inheritedSources: [] };
let saving = false;
let saveTimeout = null;
let saveVersion = 0; // track save generation to ignore stale SSE reloads
let processing = false;

const API_BASE = '';

// Compatibility: getProject(id) returns the active context if id matches
function getProject(id) {
  if (id === state.activeContextId && state.activeContext) return state.activeContext;
  return null;
}

// ── Load / Save ──
async function load() {
  try {
    const res = await fetch(`${API_BASE}/api/contexts`);
    const data = await res.json();
    state.contexts = data.contexts || [];
    // Normalize: ensure each context has canvas-like structure for badge display
    for (const c of state.contexts) {
      if (!c.canvas) c.canvas = { widgets: [] };
      // widgetCount comes from L0 data
      c.canvas.widgets = new Array(c.widgetCount || 0);
    }
    renderProjectList();
    if (state.activeContextId) {
      await selectProject(state.activeContextId);
    } else if (state.contexts.length > 0) {
      await selectProject(state.contexts[0].id);
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}

// Reload only the context list (L0) without re-selecting
async function reloadContextList() {
  try {
    const res = await fetch(`${API_BASE}/api/contexts`);
    const data = await res.json();
    state.contexts = data.contexts || [];
    for (const c of state.contexts) {
      if (!c.canvas) c.canvas = { widgets: [] };
      c.canvas.widgets = new Array(c.widgetCount || 0);
    }
    renderProjectList();
  } catch (e) {
    console.error('Reload context list error:', e);
  }
}

// Save data to a remote context via dataRef
async function saveDataRef(contextId, dataKey, value) {
  try {
    await fetch(`${API_BASE}/api/context/${contextId}/data/${dataKey}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value })
    });
  } catch (e) {
    console.error('saveDataRef error:', e);
  }
}

// Find widget by dataKey and check if it has a dataRef
function findWidgetDataRef(dataKey) {
  const proj = state.activeContext;
  if (!proj) return null;
  const w = (proj.widgets || []).find(w => w.dataKey === dataKey || (w.dataRef && w.dataRef.dataKey === dataKey));
  if (w && w.dataRef) return w.dataRef;
  return null;
}

// Save widget data — automatically routes to remote context if dataRef exists
function saveWidgetData(dataKey) {
  const ref = findWidgetDataRef(dataKey);
  if (ref) {
    const proj = state.activeContext;
    saveDataRef(ref.contextId, ref.dataKey, proj.data[dataKey]);
  } else {
    save();
  }
}

function save() {
  if (!state.activeContextId || !state.activeContext) return;
  clearTimeout(saveTimeout);
  const myVersion = ++saveVersion;
  saveTimeout = setTimeout(async () => {
    if (saving) return;
    saving = true;
    try {
      const resp = await fetch(`${API_BASE}/api/context/${state.activeContextId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state.activeContext)
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        if (err.validationErrors) showValidationToast(err.validationErrors);
      }
      // Also update the L0 entry in state.contexts
      const idx = state.contexts.findIndex(c => c.id === state.activeContextId);
      if (idx >= 0) {
        state.contexts[idx].name = state.activeContext.name;
        state.contexts[idx].icon = state.activeContext.icon;
        state.contexts[idx].color = state.activeContext.color;
        state.contexts[idx].widgetCount = (state.activeContext.widgets || []).length;
        state.contexts[idx].canvas = { widgets: state.activeContext.widgets || [] };
      }
    } catch (e) { console.error('Save error:', e); }
    // Keep saving=true for a short window to ignore SSE bounce-back
    setTimeout(() => { if (saveVersion === myVersion) saving = false; }, 500);
  }, 200);
}

// Immediate save (no debounce) - used before agent calls
async function saveImmediate() {
  if (!state.activeContextId || !state.activeContext) return;
  const myVersion = ++saveVersion;
  saving = true;
  try {
    const resp = await fetch(`${API_BASE}/api/context/${state.activeContextId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.activeContext)
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      if (err.validationErrors) showValidationToast(err.validationErrors);
    }
  } catch (e) { console.error('Save error:', e); }
  setTimeout(() => { if (saveVersion === myVersion) saving = false; }, 800);
}

// ── Schema Validation Toast ──
function showValidationToast(validationErrors) {
  const existing = document.getElementById('__validation-toast');
  if (existing) existing.remove();
  const msgs = validationErrors.map(ve =>
    `<b>${escapeHtml(ve.widget)}</b>: ${ve.errors.map(e => e.error).join(', ')}`
  ).join('<br>');
  const toast = document.createElement('div');
  toast.id = '__validation-toast';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:10000;background:var(--red);color:white;padding:12px 18px;border-radius:12px;font-size:12px;font-family:var(--font);max-width:400px;box-shadow:0 4px 16px rgba(0,0,0,.3);line-height:1.5;cursor:pointer;';
  toast.innerHTML = `<div style="font-weight:700;margin-bottom:4px;">⚠️ Schema-Validierung fehlgeschlagen</div>${msgs}`;
  toast.onclick = () => toast.remove();
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 8000);
}

// ── SSE Live Sync ──
function connectSSE() {
  const es = new EventSource(`${API_BASE}/sse/liveos`);
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'context-change' && !saving) {
        reloadContextList();
        if (d.contextId === state.activeContextId) {
          selectProject(state.activeContextId);
        }
        // If a parent context changed, reload scope chain to update inherited widgets
        const isParent = (state.inheritedSources || []).some(s => s.id === d.contextId);
        if (isParent && state.activeContextId && d.contextId !== state.activeContextId) {
          loadScopeChain().then(() => renderCanvas());
        }
      }
      // dataRef update: re-render widgets that reference the changed data
      if (d.type === 'dataref-update' && state.activeContext) {
        const affectedWidgets = (state.activeContext.widgets || []).filter(w =>
          w.dataRef && w.dataRef.contextId === d.sourceContextId && w.dataRef.dataKey === d.dataKey
        );
        if (affectedWidgets.length > 0) {
          renderCanvas(); // Re-render to fetch fresh data
        }
      }
      // Graph updates
      if (d.type === 'graph-updated' && d.projectId === state.activeContextId && currentGraphTab === 'graph') {
        loadAndRenderGraph();
      }
      if (d.type === 'graph-data-flow' && currentGraphTab === 'graph') {
        flashGraphEdge(d.fromAppId, d.toAppId);
        if (d.data) {
          const key = d.fromAppId + '.' + (d.outputName || '') + '->' + d.toAppId + '.' + (d.toInput || '');
          graphDataFlowCache[key] = d.data;
        }
      }
      if (d.type === 'context-deleted' && d.contextId === state.activeContextId) {
        state.activeContextId = null;
        state.activeContext = null;
        reloadContextList().then(() => {
          if (state.contexts.length > 0) selectProject(state.contexts[0].id);
        });
      }
    } catch {}
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

// ── App Bridge: receive status + interactions from app iframes ──
let _appBridgeSaveTimer = null;
window.addEventListener('message', (e) => {
  if (!e.data || !state.activeContext) return;

  // App status update from iframe
  if (e.data.type === 'app-status' && e.data.appId) {
    const widget = (state.activeContext.widgets || []).find(w =>
      w.type === 'app' && (state.activeContext.data?.[w.dataKey]?.appId === e.data.appId || w.data?.appId === e.data.appId)
    );
    if (widget && state.activeContext.data?.[widget.dataKey]) {
      state.activeContext.data[widget.dataKey].status = e.data.status;
      state.activeContext.data[widget.dataKey].lastInteraction = new Date().toISOString();
      // Update L0 badge if visible
      updateL0Badge(widget.id, e.data.status);
      // Debounced save
      clearTimeout(_appBridgeSaveTimer);
      _appBridgeSaveTimer = setTimeout(() => save(), 2000);
    }
  }

  // App interaction log from iframe
  if (e.data.type === 'app-interaction' && e.data.appId) {
    const widget = (state.activeContext.widgets || []).find(w =>
      w.type === 'app' && (state.activeContext.data?.[w.dataKey]?.appId === e.data.appId || w.data?.appId === e.data.appId)
    );
    if (widget && state.activeContext.data?.[widget.dataKey]) {
      const data = state.activeContext.data[widget.dataKey];
      if (!data.interactions) data.interactions = [];
      data.interactions.push({ action: e.data.action, detail: e.data.detail, time: e.data.time });
      // Cap at 50 interactions (FIFO)
      if (data.interactions.length > 50) data.interactions = data.interactions.slice(-50);
      data.lastInteraction = e.data.time;
      // Debounced save
      clearTimeout(_appBridgeSaveTimer);
      _appBridgeSaveTimer = setTimeout(() => save(), 2000);
    }
  }
});

// ── Project CRUD (now backed by Context API) ──

async function createProject(parentId = null) {
  const id = 'ctx-' + Date.now();
  const ctx = {
    id,
    name: 'Neues Projekt',
    icon: ['🚀', '📦', '💡', '🎯', '🔧', '📊', '🌟', '🏗️'][Math.floor(Math.random() * 8)],
    color: ['#8B5CF6', '#3B82F6', '#22c55e', '#f59e0b', '#ef4444', '#ec4899'][Math.floor(Math.random() * 6)],
    parentId: parentId || undefined,
    chat: [{
      id: 'msg-sys-' + Date.now(),
      role: 'system',
      text: 'Neues Projekt erstellt! Beschreibe was du bauen oder planen willst.',
      time: new Date().toISOString()
    }],
    widgets: [],
    data: {},
    connections: [],
    skills: []
  };

  try {
    const res = await fetch(`${API_BASE}/api/contexts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(ctx)
    });
    const result = await res.json();
    if (result.ok) {
      await reloadContextList();
      await selectProject(result.id || id);
    }
  } catch (e) {
    console.error('Create context error:', e);
  }
}

async function deleteProject(id) {
  // Delete children first
  const children = state.contexts.filter(c => c.parentId === id);
  for (const child of children) {
    await deleteProject(child.id);
  }

  try {
    await fetch(`${API_BASE}/api/context/${id}`, { method: 'DELETE' });
  } catch (e) {
    console.error('Delete context error:', e);
  }

  state.contexts = state.contexts.filter(c => c.id !== id);
  if (state.activeContextId === id) {
    state.activeContextId = state.contexts[0]?.id || null;
    state.activeContext = null;
  }
  renderProjectList();
  if (state.activeContextId) await selectProject(state.activeContextId);
}

async function loadScopeChain() {
  if (!state.activeContextId) return;
  const ctx = state.activeContext;
  if (!ctx || !ctx.parentId) {
    state.inheritedWidgets = [];
    state.inheritedData = {};
    state.inheritedSources = [];
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/api/context/${state.activeContextId}/scope-chain`);
    const data = await res.json();
    // Map inherited widgets with source context name from chain
    const chainMap = {};
    for (const c of (data.chain || [])) {
      chainMap[c.id] = c.name;
    }
    state.inheritedWidgets = (data.inheritedWidgets || []).map(w => ({
      ...w,
      _inheritedFrom: chainMap[w.fromContext] || 'Parent',
      _inheritedFromId: w.fromContext
    }));
    // Flatten inheritedData: { key: { value, fromContext } } → { key: value }
    const flatData = {};
    for (const [k, v] of Object.entries(data.inheritedData || {})) {
      flatData[k] = v.value;
    }
    state.inheritedData = flatData;
    state.inheritedSources = data.chain || [];
  } catch(e) {
    console.error('Scope chain load error:', e);
    state.inheritedWidgets = [];
    state.inheritedData = {};
    state.inheritedSources = [];
  }
}

async function selectProject(id) {
  state.activeContextId = id;

  // Cancel any pending debounced save to prevent stale data overwriting fresh load
  clearTimeout(saveTimeout);

  // Fetch the full context from the API
  try {
    const res = await fetch(`${API_BASE}/api/context/${id}`);
    if (!res.ok) { console.error('Context not found:', id); return; }
    const ctx = await res.json();

    // Normalize context to have canvas-like structure for compatibility
    if (!ctx.widgets) ctx.widgets = [];
    if (!ctx.canvas) ctx.canvas = { widgets: ctx.widgets };
    else ctx.canvas.widgets = ctx.widgets;
    if (!ctx.data) ctx.data = {};
    if (!ctx.chat) ctx.chat = [];
    if (!ctx.children) ctx.children = [];

    state.activeContext = ctx;
  } catch (e) {
    console.error('Load context error:', e);
    return;
  }

  const proj = state.activeContext;

  // Update sidebar — full re-render to update hierarchy, active state, and subproject buttons
  renderProjectList();

  // Update chat header
  document.getElementById('chatIcon').textContent = proj.icon;
  document.getElementById('chatIcon').style.background = (proj.color || '#8B5CF6') + '22';
  document.getElementById('projectName').value = proj.name;
  const wCount = proj.widgets.length;
  document.getElementById('projectSub').textContent = `${wCount} Widget${wCount !== 1 ? 's' : ''}`;

  renderBreadcrumb(proj);
  renderPlan(proj);
  renderChat();
  await loadScopeChain();
  renderCanvas();
  updatePendingBtn();
}

function renderBreadcrumb(proj) {
  const bar = document.getElementById('breadcrumbBar');
  // Build ancestor chain using L0 context list
  const chain = [];
  let currentId = proj.parentId;
  const visited = new Set();
  while (currentId && !visited.has(currentId)) {
    visited.add(currentId);
    const parent = state.contexts.find(c => c.id === currentId);
    if (!parent) break;
    chain.unshift(parent);
    currentId = parent.parentId;
  }

  if (chain.length === 0) {
    bar.classList.remove('visible');
    bar.innerHTML = '';
    return;
  }

  bar.classList.add('visible');
  let html = '';
  for (const ancestor of chain) {
    html += `<button class="bc-item" onclick="selectProject('${ancestor.id}')">${ancestor.icon} ${ancestor.name}</button>`;
    html += `<span class="bc-sep">›</span>`;
  }
  html += `<span class="bc-current">${proj.icon} ${proj.name}</span>`;
  bar.innerHTML = html;
}

// ── Render Project List ──
function renderProjectList() {
  const el = document.getElementById('projectList');
  el.innerHTML = '';

  function renderLevel(contexts, depth = 0) {
    for (const p of contexts) {
      const children = state.contexts.filter(c => c.parentId === p.id);
      const hasChildren = children.length > 0;
      const isActive = state.activeContextId === p.id;
      const wCount = p.widgetCount || 0;

      const div = document.createElement('div');
      div.className = 'project-item' + (isActive ? ' active' : '') + (depth > 0 ? ' nested' : '');
      div.style.paddingLeft = (12 + depth * 16) + 'px';
      div.dataset.id = p.id;
      div.innerHTML = `
        ${hasChildren ? '<span style="font-size:10px;opacity:.5;margin-right:2px;">▾</span>' : ''}
        <span class="icon">${p.icon || '🧩'}</span>
        <span>${p.name}</span>
        <span class="badge">${wCount}${hasChildren ? ' · ' + children.length + '↓' : ''}</span>
        <button class="delete-btn" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</button>
      `;
      div.onclick = () => selectProject(p.id);
      el.appendChild(div);

      // Render children indented
      if (hasChildren) renderLevel(children, depth + 1);

      // Show "add subproject" button for the active project
      if (isActive) {
        const subBtn = document.createElement('button');
        subBtn.className = 'btn-subproject';
        subBtn.style.marginLeft = (12 + (depth + 1) * 16) + 'px';
        subBtn.style.width = `calc(100% - ${24 + (depth + 1) * 16}px)`;
        subBtn.textContent = '+ Unterprojekt';
        subBtn.onclick = (e) => { e.stopPropagation(); createProject(p.id); };
        el.appendChild(subBtn);
      }
    }
  }

  const topLevel = state.contexts.filter(p => !p.parentId);
  renderLevel(topLevel);
}

// ── Render Chat ──
function renderChat() {
  const proj = state.activeContext;
  if (!proj) return;

  const el = document.getElementById('chatMessages');
  el.innerHTML = '';

  for (const msg of proj.chat) {
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;

    let html = escapeHtml(msg.text);

    // Render widget action badges
    if (msg.widgetActions) {
      for (const wa of msg.widgetActions) {
        html += `<div class="widget-action">${wa.icon || '🧩'} ${wa.label}</div>`;
      }
    }

    html += `<span class="time">${formatTime(msg.time)}</span>`;
    div.innerHTML = html;
    el.appendChild(div);
  }

  el.scrollTop = el.scrollHeight;
}

// ── Render Canvas ──
function renderCanvas() {
  const proj = state.activeContext;
  if (!proj) return;

  const grid = document.getElementById('canvasGrid');
  const empty = document.getElementById('canvasEmpty');

  const children = state.contexts.filter(c => c.parentId === proj.id);
  const hasWidgets = (proj.widgets || []).length > 0;
  const hasChildren = children.length > 0;
  const hasInherited = (state.inheritedWidgets || []).length > 0;

  if (!hasWidgets && !hasChildren && !hasInherited) {
    empty.style.display = 'block';
    grid.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = '';

  for (const widget of (proj.widgets || [])) {
    const frame = createWidgetFrame(widget, proj, false);
    grid.appendChild(frame);
  }

  // Render inherited widgets from scope chain
  if (state.inheritedWidgets && state.inheritedWidgets.length > 0) {
    const inheritSection = document.createElement('div');
    inheritSection.className = 'inherited-section';
    inheritSection.style.gridColumn = '1 / -1';

    // Group by source context
    const sourceMap = {};
    for (const w of state.inheritedWidgets) {
      const src = w._inheritedFrom || 'Parent';
      if (!sourceMap[src]) sourceMap[src] = [];
      sourceMap[src].push(w);
    }

    let html = '';
    for (const [sourceName, widgets] of Object.entries(sourceMap)) {
      html += `<div class="inherited-label">\u2197 Von ${escapeHtml(sourceName)}</div>`;
    }
    inheritSection.innerHTML = html;
    grid.appendChild(inheritSection);

    for (const w of state.inheritedWidgets) {
      // Create widget frame with inherited flag
      const mergedProj = { ...proj, data: { ...proj.data, ...state.inheritedData } };
      const frame = createWidgetFrame(w, mergedProj, true);
      frame.classList.add('inherited-widget');
      grid.appendChild(frame);
    }
  }

  // Render child contexts that are NOT already represented as context-type widgets
  if (hasChildren) {
    const existingContextRefs = new Set(
      (proj.widgets || []).filter(w => w.type === 'context' && w.contextRef).map(w => w.contextRef)
    );
    const unrepresented = children.filter(c => !existingContextRefs.has(c.id));
    for (const child of unrepresented) {
      const virtualWidget = {
        id: '__virtual-ctx-' + child.id,
        type: 'context',
        title: child.name,
        size: 'sm',
        contextRef: child.id,
        color: child.color,
        zoomLevel: 'L1'
      };
      const frame = createWidgetFrame(virtualWidget, proj);
      grid.appendChild(frame);
    }
  }

  // Show/hide closed widgets toggle
  const closedCount = (proj.closedWidgets || []).length;
  const closedToggle = document.getElementById('closedToggle');
  closedToggle.style.display = closedCount > 0 ? 'block' : 'none';
  document.getElementById('closedCount').textContent = closedCount;
  // Refresh panel if open
  const panel = document.getElementById('closedPanel');
  if (panel.style.display === 'flex') renderClosedPanel();

  // Re-apply AI change banners after re-render
  if (activeChangeBanners.length > 0) applyChangeBanners();
}

// ── AI Change Highlights ──
let activeChangeBanners = []; // persists across re-renders

function highlightAiChanges(widgetActions) {
  if (!widgetActions || widgetActions.length === 0) return;
  for (const action of widgetActions) {
    if (!action.widgetId && !action.dataKey) continue;
    // Store banner data with timestamp for auto-dismiss
    activeChangeBanners.push({ ...action, addedAt: Date.now() });
  }
  applyChangeBanners();
  // Auto-dismiss all banners after 20s
  setTimeout(() => {
    activeChangeBanners = [];
    document.querySelectorAll('.widget-change-banner').forEach(b => b.remove());
    document.querySelectorAll('.widget-frame.ai-changed').forEach(f => {
      f.classList.remove('ai-changed');
      f.style.borderColor = '';
    });
  }, 20000);
}

function applyChangeBanners() {
  for (const action of activeChangeBanners) {
    let frame = null;
    if (action.widgetId) {
      frame = document.querySelector(`.widget-frame[data-widget-id="${action.widgetId}"]`);
    }
    if (!frame && action.dataKey) {
      const proj = state.activeContext;
      const w = proj?.widgets?.find(w => w.dataKey === action.dataKey);
      if (w) frame = document.querySelector(`.widget-frame[data-widget-id="${w.id}"]`);
    }
    if (!frame) continue;

    // Add glow animation
    frame.classList.add('ai-changed');

    // Skip if banner already exists on this widget
    if (frame.querySelector('.widget-change-banner')) continue;

    const insertBefore = frame.querySelector('.widget-cmd') || frame.querySelector('.widget-body');
    const banner = document.createElement('div');
    banner.className = 'widget-change-banner';
    banner.innerHTML = `
      <span class="change-icon">${action.action === 'create' ? '✨' : '✏️'}</span>
      <span class="change-text">${escapeHtml(action.detail || action.label)}</span>
      <button class="change-dismiss" onclick="dismissChangeBanner(this, '${action.widgetId || action.dataKey}')">✕</button>
    `;
    frame.insertBefore(banner, insertBefore);
  }
}

function dismissChangeBanner(btn, id) {
  btn.parentElement.remove();
  activeChangeBanners = activeChangeBanners.filter(a => (a.widgetId || a.dataKey) !== id);
}

// ── Widget Factory ──
function createWidgetFrame(widget, proj, inherited = false) {
  const frame = document.createElement('div');
  const zoomLevel = widget.zoomLevel || 'L1';
  const zoomClass = zoomLevel === 'L0' ? ' zoom-l0' : zoomLevel === 'L2' ? ' zoom-l2' : '';
  frame.className = `widget-frame size-${widget.size || 'md'}${zoomClass}`;
  frame.dataset.widgetId = widget.id;

  const color = widget.color || proj.color || 'var(--accent)';

  const renderType = widget.renderAs || widget.type;
  const typeLabel = getWidgetLabel(widget.type);
  const displayTitle = widget.title !== typeLabel ? widget.title : typeLabel;
  const badge = zoomLevel === 'L0' ? ` · ${getL0Badge(widget, proj)}` : '';
  const zoomIcon = zoomLevel === 'L0' ? '🔹' : zoomLevel === 'L2' ? '🔷' : '🔸';
  const inheritedBadge = inherited ? `<span class="inherited-badge">\u2197 ${escapeHtml(widget._inheritedFrom || 'Parent')}</span>` : '';
  const dataRefBadge = widget.dataRef ? `<span class="inherited-badge" style="color:var(--blue);">📌 ${escapeHtml(state.contexts.find(c => c.id === widget.dataRef.contextId)?.name || widget.dataRef.contextId)}</span>` : '';
  const perspectiveHint = (widget.renderAs && widget.renderAs !== widget.type) ? `<span class="perspective-hint">${widget.type} \u2192 ${widget.renderAs}</span>` : '';
  const availableRenders = getAvailableRenders(widget);
  const perspectiveBtn = availableRenders.length > 1 && !inherited ? `<button onclick="cyclePerspective('${widget.id}')" title="Ansicht wechseln" class="widget-perspective-btn">\uD83D\uDC41</button>` : '';
  const removeBtn = inherited ? '' : `<button onclick="removeWidget('${widget.id}')" title="Entfernen">\u2715</button>`;
  const widgetId = inherited ? ('inh-' + widget.id) : widget.id;
  frame.dataset.widgetId = widgetId;

  frame.innerHTML = `
    <div class="widget-head">
      <div class="dot" style="background:${color}"></div>
      <div class="label">${getWidgetIcon(renderType)} ${displayTitle}${inheritedBadge}${dataRefBadge}${perspectiveHint}${badge}</div>
      <div class="actions">
        ${perspectiveBtn}
        <button onclick="cycleZoom('${widget.id}')" title="${zoomLevel === 'L0' ? 'Vergrößern' : 'Minimieren'}" class="widget-zoom-btn">${zoomIcon}</button>
        <button onclick="toggleWidgetEdit('${widgetId}')" title="Widget bearbeiten" class="widget-edit-btn">\u270F\uFE0F</button>
        <button onclick="resizeWidget('${widget.id}')" title="Resize">\u2194</button>
        ${removeBtn}
      </div>
    </div>
    <div class="widget-cmd" id="wcmd-${widgetId}" style="display:none;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg-base);display:none;">
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="text" id="wcmd-input-${widgetId}" placeholder="z.B. Zeile hinzuf\u00FCgen, Wert \u00E4ndern..."
          style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;font-family:var(--font);outline:none;"
          onkeydown="if(event.key==='Enter')sendWidgetCmd('${widgetId}')"
        />
        <button onclick="sendWidgetCmd('${widgetId}')" style="padding:5px 10px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap;">Senden</button>
      </div>
      <div id="wcmd-status-${widgetId}" style="font-size:11px;color:var(--text-muted);padding-top:4px;display:none;"></div>
      ${inherited ? `<div style="display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:10px;color:var(--yellow);background:rgba(255,200,0,.1);padding:2px 8px;border-radius:6px;">↗️ Änderung wird in <b>${escapeHtml(widget._inheritedFrom || 'Parent')}</b> gespeichert</span>
        <button onclick="overrideInheritedWidget('${widget.id}','${widget._inheritedFromId || ''}')" style="padding:3px 8px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-size:10px;cursor:pointer;font-family:var(--font);" title="Lokale Kopie erstellen (bricht Vererbung)">📋 Lokal überschreiben</button>
      </div>` : `<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
        <button onclick="showDataRefPicker('${widget.id}')" style="padding:3px 8px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-size:10px;cursor:pointer;font-family:var(--font);" title="Daten aus anderem Context verlinken">📌 Daten verlinken</button>
        <button onclick="saveWidgetAsTemplate('${widget.id}')" style="padding:3px 8px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-size:10px;cursor:pointer;font-family:var(--font);" title="Widget als Template speichern">💾 Als Template</button>
        ${widget.dataRef ? `<button onclick="removeDataRef('${widget.id}')" style="padding:3px 8px;border-radius:6px;border:1px dashed var(--red);background:transparent;color:var(--red);font-size:10px;cursor:pointer;font-family:var(--font);" title="Verlinkung entfernen">✕ Ref entfernen</button>` : ''}
      </div>`}
    </div>
    <div class="l0-actions" id="l0-${widgetId}">${getL0ActionsHtml(widget, proj, widgetId)}</div>
    <div class="widget-body" id="wb-${widgetId}"></div>
  `;

  const body = frame.querySelector('.widget-body');
  renderWidgetContent(body, widget, proj);

  // Bind L0 action events after DOM insertion
  if (zoomLevel === 'L0') {
    setTimeout(() => bindL0Actions(frame, widget, proj, widgetId), 0);
  }

  return frame;
}

async function loadDataRef(container, widget, proj) {
  const { contextId, dataKey } = widget.dataRef;
  container.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:11px;">📌 Lade Daten…</div>';
  try {
    const res = await fetch(`${API_BASE}/api/context/${contextId}/data/${dataKey}`);
    if (!res.ok) {
      container.innerHTML = '<div style="padding:12px;color:var(--red);font-size:11px;">❌ Daten nicht gefunden</div>';
      return;
    }
    const result = await res.json();
    // Inject remote data into a virtual proj object and render normally
    const virtualProj = {
      ...proj,
      data: { ...proj.data, [widget.dataKey || dataKey]: result.value }
    };
    // Set the dataKey to use for rendering if not set
    const virtualWidget = { ...widget, dataKey: widget.dataKey || dataKey };
    delete virtualWidget.dataRef; // Prevent infinite recursion

    const renderType = virtualWidget.renderAs || virtualWidget.type;
    const sourceType = virtualWidget.type;
    if (renderType !== sourceType) {
      renderCrossType(container, virtualWidget, virtualProj, sourceType, renderType);
    } else {
      switch (renderType) {
        case 'todo': renderTodoWidget(container, virtualWidget, virtualProj); break;
        case 'notes': renderNotesWidget(container, virtualWidget, virtualProj); break;
        case 'table': renderTableWidget(container, virtualWidget, virtualProj); break;
        case 'timeline': renderTimelineWidget(container, virtualWidget, virtualProj); break;
        case 'kpi': renderKpiWidget(container, virtualWidget, virtualProj); break;
        case 'kanban': renderKanbanWidget(container, virtualWidget, virtualProj); break;
        case 'progress': renderProgressWidget(container, virtualWidget, virtualProj); break;
        default: container.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px;">📌 ${escapeHtml(JSON.stringify(result.value).slice(0, 100))}</div>`;
      }
    }

    // Add source badge
    const srcName = result.contextName || contextId;
    const badge = document.createElement('div');
    badge.className = 'dataref-source-badge';
    badge.innerHTML = `📌 Daten aus <b>${escapeHtml(srcName)}</b>`;
    container.prepend(badge);
  } catch (e) {
    container.innerHTML = `<div style="padding:12px;color:var(--red);font-size:11px;">❌ ${escapeHtml(e.message)}</div>`;
  }
}

function renderCrossType(container, widget, proj, sourceType, renderType) {
  const rawData = proj.data[widget.dataKey] || widget.data || {};

  // todo → table: items become rows
  if (sourceType === 'todo' && renderType === 'table') {
    const items = proj.data[widget.dataKey] || widget.data?.items || [];
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['text', 'done', 'priority'] } };
    const rows = (Array.isArray(items) ? items : []).map(i => ({ text: i.text, done: i.done ? 'Ja' : 'Nein', priority: i.priority || '' }));
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // todo → kanban: group by priority or done status
  if (sourceType === 'todo' && renderType === 'kanban') {
    const items = proj.data[widget.dataKey] || widget.data?.items || [];
    const arr = Array.isArray(items) ? items : [];
    const columns = [
      { id: 'open', name: 'Offen', items: arr.filter(i => !i.done).map(i => ({ text: i.text })) },
      { id: 'done', name: 'Erledigt', items: arr.filter(i => i.done).map(i => ({ text: i.text })) }
    ];
    const virtualWidget = { ...widget, type: 'kanban' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: { columns } } };
    renderKanbanWidget(container, virtualWidget, virtualProj);
    return;
  }

  // kanban → table: flatten all items with column name
  if (sourceType === 'kanban' && renderType === 'table') {
    const kanbanData = proj.data[widget.dataKey] || widget.data || {};
    const columns = kanbanData.columns || [];
    const rows = [];
    for (const col of columns) {
      for (const item of (col.items || [])) {
        rows.push({ status: col.name, text: typeof item === 'string' ? item : item.text || item.title || '' });
      }
    }
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['status', 'text'] } };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // kanban → todo: flatten all items
  if (sourceType === 'kanban' && renderType === 'todo') {
    const kanbanData = proj.data[widget.dataKey] || widget.data || {};
    const columns = kanbanData.columns || [];
    const items = [];
    for (const col of columns) {
      for (const item of (col.items || [])) {
        const text = typeof item === 'string' ? item : item.text || item.title || '';
        const isDone = col.name.toLowerCase().includes('done') || col.name.toLowerCase().includes('erledigt');
        items.push({ id: 't-' + Math.random().toString(36).slice(2, 6), text, done: isDone });
      }
    }
    const virtualWidget = { ...widget, type: 'todo' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: items } };
    renderTodoWidget(container, virtualWidget, virtualProj);
    return;
  }

  // table → todo: rows become items
  if (sourceType === 'table' && renderType === 'todo') {
    const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
    const arr = Array.isArray(rows) ? rows : [];
    const items = arr.map((r, i) => ({
      id: 't-' + i,
      text: r.text || r.name || r.title || Object.values(r).filter(v => typeof v === 'string').join(' | '),
      done: r.done === true || r.done === 'Ja' || r.status === 'done'
    }));
    const virtualWidget = { ...widget, type: 'todo' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: items } };
    renderTodoWidget(container, virtualWidget, virtualProj);
    return;
  }

  // table → kanban: group by first column or 'status'
  if (sourceType === 'table' && renderType === 'kanban') {
    const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
    const arr = Array.isArray(rows) ? rows : [];
    const groupKey = arr.length > 0 ? (arr[0].status !== undefined ? 'status' : Object.keys(arr[0])[0]) : 'group';
    const groups = {};
    for (const r of arr) {
      const g = r[groupKey] || 'Andere';
      if (!groups[g]) groups[g] = [];
      const text = Object.entries(r).filter(([k]) => k !== groupKey && k !== 'id').map(([, v]) => v).join(' | ');
      groups[g].push({ text });
    }
    const columns = Object.entries(groups).map(([name, items]) => ({ id: name.toLowerCase(), name, items }));
    if (columns.length === 0) columns.push({ id: 'default', name: 'Items', items: [] });
    const virtualWidget = { ...widget, type: 'kanban' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: { columns } } };
    renderKanbanWidget(container, virtualWidget, virtualProj);
    return;
  }

  // timeline → table
  if (sourceType === 'timeline' && renderType === 'table') {
    const items = proj.data[widget.dataKey] || widget.data?.items || [];
    const arr = Array.isArray(items) ? items : [];
    const rows = arr.map(i => ({ title: i.title, description: i.description || '', time: i.time || '' }));
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['title', 'description', 'time'] } };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // links → table
  if (sourceType === 'links' && renderType === 'table') {
    const links = proj.data[widget.dataKey] || widget.data?.links || [];
    const arr = Array.isArray(links) ? links : [];
    const rows = arr.map(l => ({ title: l.title || l.url, url: l.url || '', icon: l.icon || '' }));
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['title', 'url'] } };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // Fallback: render as original type
  container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">Ansicht "${renderType}" nicht verfuegbar fuer "${sourceType}"</div>`;
}

function renderWidgetContent(container, widget, proj) {
  // If widget has a dataRef, load remote data first
  if (widget.dataRef && widget.dataRef.contextId && widget.dataRef.dataKey) {
    loadDataRef(container, widget, proj);
    return;
  }

  const data = proj.data[widget.dataKey] || widget.data || {};
  const renderType = widget.renderAs || widget.type;
  const sourceType = widget.type;

  // Cross-type rendering: adapt data for different perspectives
  if (renderType !== sourceType) {
    renderCrossType(container, widget, proj, sourceType, renderType);
    return;
  }

  switch (renderType) {
    case 'todo':
      renderTodoWidget(container, widget, proj);
      break;
    case 'notes':
      renderNotesWidget(container, widget, proj);
      break;
    case 'table':
      renderTableWidget(container, widget, proj);
      break;
    case 'timeline':
      renderTimelineWidget(container, widget, proj);
      break;
    case 'kpi':
      renderKpiWidget(container, widget, proj);
      break;
    case 'kanban':
      renderKanbanWidget(container, widget, proj);
      break;
    case 'links':
      renderLinksWidget(container, widget, proj);
      break;
    case 'progress':
      renderProgressWidget(container, widget, proj);
      break;
    case 'context': {
      const refCtx = state.contexts.find(c => c.id === widget.contextRef);
      if (!refCtx) {
        container.innerHTML = '<div style="padding:16px;color:var(--text-muted);">Context nicht gefunden</div>';
        break;
      }
      container.innerHTML = `
        <div onclick="selectProject('${refCtx.id}')" style="cursor:pointer;padding:16px;display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-size:24px;width:40px;height:40px;border-radius:10px;background:${refCtx.color || '#8B5CF6'}22;display:flex;align-items:center;justify-content:center;">${refCtx.icon || '🧩'}</div>
            <div>
              <div style="font-weight:600;font-size:14px;">${refCtx.name}</div>
              <div style="font-size:11px;color:var(--text-muted);">${refCtx.widgetCount || 0} Widgets</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Klicken zum Eintauchen →</div>
        </div>
      `;
      break;
    }
    case 'app': {
      renderAppWidget(container, widget, proj);
      break;
    }
    case 'custom': {
      renderCustomWidget(container, widget, proj);
      break;
    }
    case 'text':
      container.innerHTML = `<div class="w-note-content">${escapeHtml(data.text || widget.text || '')}</div>`;
      break;
    default:
      container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">Widget: ${widget.type}</div>`;
  }
}

// ── Widget Renderers ──
function renderTodoWidget(container, widget, proj) {
  const items = proj.data[widget.dataKey] || widget.data?.items || [];
  let html = '';
  for (const item of items) {
    html += `
      <div class="w-todo-item ${item.done ? 'done' : ''}">
        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleTodo('${widget.dataKey}','${item.id}')">
        <span class="text">${escapeHtml(item.text)}</span>
        ${item.priority ? `<span class="priority ${item.priority}">${item.priority}</span>` : ''}
      </div>
    `;
  }
  html += `
    <div class="w-todo-add">
      <input type="text" placeholder="Neue Aufgabe..." onkeydown="if(event.key==='Enter')addTodo('${widget.dataKey}',this)">
      <button onclick="addTodo('${widget.dataKey}',this.previousElementSibling)">+</button>
    </div>
  `;
  container.innerHTML = html;
}

function renderNotesWidget(container, widget, proj) {
  const text = proj.data[widget.dataKey]?.text || widget.data?.text || '';
  container.innerHTML = `<div class="w-note-content" contenteditable="true"
    onblur="updateNoteContent('${widget.dataKey}',this.innerText)">${escapeHtml(text)}</div>`;
}

function renderTableWidget(container, widget, proj) {
  const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
  const cols = widget.config?.columns || (rows.length > 0 ? Object.keys(rows[0]).filter(k => k !== 'id') : []);

  let html = '<table class="w-table"><thead><tr>';
  for (const col of cols) html += `<th>${col}</th>`;
  html += '</tr></thead><tbody>';
  for (let ri = 0; ri < rows.length; ri++) {
    html += '<tr>';
    for (const col of cols) {
      const val = escapeHtml(String(rows[ri][col] ?? ''));
      html += `<td contenteditable="true" data-row="${ri}" data-col="${escapeHtml(col)}" data-key="${widget.dataKey}" onblur="updateTableCell(this)" style="cursor:text;min-width:40px;">${val}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Daten</div>';
  container.innerHTML = html;
}

function updateTableCell(td) {
  const dataKey = td.dataset.key;
  const ri = parseInt(td.dataset.row);
  const col = td.dataset.col;
  const newVal = td.innerText.trim();
  const proj = state.activeContext;
  if (!proj) return;
  const rows = proj.data[dataKey];
  if (!rows || !rows[ri]) return;
  const oldVal = String(rows[ri][col] ?? '');
  if (oldVal === newVal) return;
  rows[ri][col] = newVal;
  logChange(proj, `📝 Tabelle: "${col}" Zeile ${ri+1} geaendert: "${oldVal}" → "${newVal}"`);
  save();
}

function renderTimelineWidget(container, widget, proj) {
  const items = proj.data[widget.dataKey] || widget.data?.items || [];
  let html = '';
  for (const item of items) {
    html += `
      <div class="w-timeline-item">
        <div class="w-timeline-dot" style="border-color:${item.color || 'var(--accent)'}"></div>
        <div class="w-timeline-content">
          <div class="title">${escapeHtml(item.title)}</div>
          ${item.description ? `<div class="desc">${escapeHtml(item.description)}</div>` : ''}
          ${item.time ? `<div class="time">${item.time}</div>` : ''}
        </div>
      </div>
    `;
  }
  if (items.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Eintraege</div>';
  container.innerHTML = html;
}

function renderKpiWidget(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};
  container.innerHTML = `
    <div class="w-kpi">
      <div class="value" contenteditable="true" data-key="${widget.dataKey}" data-field="value" onblur="updateKpiField(this)" style="cursor:text;">${data.value ?? '—'}</div>
      <div class="label" contenteditable="true" data-key="${widget.dataKey}" data-field="label" onblur="updateKpiField(this)" style="cursor:text;">${escapeHtml(data.label || widget.title || '')}</div>
      ${data.change != null ? `<div class="change ${data.change >= 0 ? 'up' : 'down'}">${data.change >= 0 ? '+' : ''}${data.change}%</div>` : ''}
    </div>
  `;
}

function updateKpiField(el) {
  const dataKey = el.dataset.key;
  const field = el.dataset.field;
  const newVal = el.innerText.trim();
  const proj = state.activeContext;
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = {};
  const oldVal = String(proj.data[dataKey][field] ?? '');
  if (oldVal === newVal) return;
  proj.data[dataKey][field] = newVal;
  const w = (proj.widgets || []).find(w => w.dataKey === dataKey);
  logChange(proj, `📊 KPI "${w?.title || dataKey}": ${field} geaendert: "${oldVal}" → "${newVal}"`);
  saveWidgetData(dataKey);
}

function renderKanbanWidget(container, widget, proj) {

    { id: 'todo', name: 'To Do', items: [] },
    { id: 'doing', name: 'In Progress', items: [] },

function renderLinksWidget(container, widget, proj) {

// ── Pending Changes & Changelog ──
// Map of projectId → array of pending changes
let pendingChangesMap = {};

function getPendingChanges(projectId) {
  return pendingChangesMap[projectId || state.activeContextId] || [];
}

function logChange(proj, summary) {
  const pid = proj.id;
  if (!pendingChangesMap[pid]) pendingChangesMap[pid] = [];
  pendingChangesMap[pid].push({ time: new Date().toISOString(), summary });
  updatePendingBtn();
}

function flushChangelog(proj) {
  if (!proj.changelog) proj.changelog = [];
  const changes = pendingChangesMap[proj.id] || [];
  for (const c of changes) {
    proj.changelog.push(c);
  }
  if (proj.changelog.length > 50) proj.changelog = proj.changelog.slice(-50);
  const flushed = [...changes];
  pendingChangesMap[proj.id] = [];
  updatePendingBtn();
  return flushed;
}

function updatePendingBtn() {
  const btn = document.getElementById('pendingBtn');
  if (!btn) return;
  // Count changes for the CURRENT context only
  const currentChanges = getPendingChanges(state.activeContextId);
  const n = currentChanges.length;
  // Also check if OTHER contexts have pending changes
  const totalOther = Object.entries(pendingChangesMap)
    .filter(([pid]) => pid !== state.activeContextId)
    .reduce((sum, [, arr]) => sum + arr.length, 0);
  btn.style.display = (n > 0 || totalOther > 0) ? 'flex' : 'none';
  if (n > 0 && totalOther > 0) {
    document.getElementById('pendingLabel').textContent = `${n} Änderung${n !== 1 ? 'en' : ''} übernehmen (+${totalOther} in anderen Projekten)`;
  } else if (n > 0) {
    document.getElementById('pendingLabel').textContent = `${n} Änderung${n !== 1 ? 'en' : ''} übernehmen`;
  } else if (totalOther > 0) {
    document.getElementById('pendingLabel').textContent = `${totalOther} Änderung${totalOther !== 1 ? 'en' : ''} in anderen Projekten`;
  }
}

async function commitChanges() {
  let commitActions = [];
  const proj = state.activeContext;
  const currentChanges = getPendingChanges(state.activeContextId);
  if (!proj || currentChanges.length === 0) return;

  const changes = flushChangelog(proj);

  // Save immediately
  await saveImmediate();

  // Build summary for AI
  const summary = changes.map(c => c.summary).join('\n');
  const autoMsg = `[Änderungen übernommen]\n${summary}`;

  // Send to AI as automatic message
  const userMsg = {
    id: 'msg-' + Date.now(),
    role: 'user',
    text: autoMsg,
    time: new Date().toISOString()
  };
  proj.chat.push(userMsg);
  renderChat();

  // Show typing
  processing = true;
  document.getElementById('typingIndicator').classList.add('visible');
  document.getElementById('btnSend').disabled = true;

  let response;
  try {
    try {
      response = await callProjectAgent(state.activeContextId, autoMsg);
    } catch (agentErr) {
      console.log('Agent unavailable, using local fallback:', agentErr.message);
      response = { text: `Änderungen gespeichert:\n${summary}`, widgetActions: [] };
    }

    if (response._fromAgent) {
      // Reload context from API (agent may have written to it)
      await selectProject(state.activeContextId);
      const freshProj = state.activeContext;
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    await saveImmediate();

  } catch (e) {
    proj.chat.push({
      id: 'msg-err-' + Date.now(),
      role: 'system',
      text: 'Fehler: ' + e.message,
      time: new Date().toISOString()
    });
    save();
  }

  commitActions = response?.widgetActions || [];
  processing = false;
  document.getElementById('typingIndicator').classList.remove('visible');
  document.getElementById('btnSend').disabled = false;
  renderChat();
  renderCanvas();
  highlightAiChanges(commitActions);
}

function getWidgetTitle(proj, dataKey) {
  const w = (proj.widgets || []).find(w => w.dataKey === dataKey);
  return w ? w.title : dataKey;
}

// ── Widget Data Mutations ──
function toggleTodo(dataKey, itemId) {
  const proj = state.activeContext;
  if (!proj) return;
  const items = proj.data[dataKey];
  if (!items) return;
  const item = items.find(i => i.id === itemId);
  if (item) {
    item.done = !item.done;
    logChange(proj, `${item.done ? '✅' : '⬜'} "${item.text}" in "${getWidgetTitle(proj, dataKey)}" ${item.done ? 'erledigt' : 'wieder offen'}`);
  }
  saveWidgetData(dataKey);
  renderCanvas();
}

function addTodo(dataKey, input) {
  const text = input.value.trim();
  if (!text) return;
  const proj = state.activeContext;
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = [];
  proj.data[dataKey].push({ id: 't-' + Date.now(), text, done: false });
  logChange(proj, `➕ Neue Aufgabe "${text}" in "${getWidgetTitle(proj, dataKey)}" hinzugefuegt`);
  input.value = '';
  saveWidgetData(dataKey);
  renderCanvas();
}

function updateNoteContent(dataKey, text) {
  const proj = state.activeContext;
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = {};
  const oldText = proj.data[dataKey].text || '';
  proj.data[dataKey].text = text;
  if (oldText !== text) {
    logChange(proj, `📝 Notiz "${getWidgetTitle(proj, dataKey)}" bearbeitet`);
  }
  saveWidgetData(dataKey);
}

function removeWidget(widgetId) {
  const proj = state.activeContext;
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  // Move to closedWidgets instead of deleting
  if (!proj.closedWidgets) proj.closedWidgets = [];
  proj.closedWidgets.push({ ...w, closedAt: new Date().toISOString() });
  proj.widgets = (proj.widgets || []).filter(w => w.id !== widgetId);
  proj.canvas = { widgets: proj.widgets };
  logChange(proj, `🗑️ Widget "${w.title}" geschlossen`);
  document.getElementById('projectSub').textContent = `${proj.widgets.length} Widgets`;
  save();
  renderCanvas();
}

function restoreWidget(widgetId) {
  const proj = state.activeContext;
  if (!proj || !proj.closedWidgets) return;
  const idx = proj.closedWidgets.findIndex(w => w.id === widgetId);
  if (idx === -1) return;
  const w = proj.closedWidgets.splice(idx, 1)[0];
  delete w.closedAt;
  if (!proj.widgets) proj.widgets = [];
  proj.widgets.push(w);
  proj.canvas = { widgets: proj.widgets };
  logChange(proj, `♻️ Widget "${w.title}" wiederhergestellt`);
  document.getElementById('projectSub').textContent = `${proj.widgets.length} Widgets`;
  save();
  renderCanvas();
}

function toggleClosedPanel() {

  panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  if (panel.style.display === 'flex') renderClosedPanel();
}

function renderClosedPanel() {

// ── dataRef Picker ──
async function showDataRefPicker(widgetId) {
  const proj = state.activeContext;
  if (!proj) return;
  const widget = (proj.widgets || []).find(w => w.id === widgetId);
  if (!widget) return;

  // Build a simple picker dialog
