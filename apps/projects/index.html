<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<style>
:root {
  --bg-base: #0f172a;
  --bg-primary: #1e293b;
  --bg-secondary: #334155;
  --bg-tertiary: #475569;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #8B5CF6;
  --accent-hover: #7C3AED;
  --accent-dim: rgba(139,92,246,0.15);
  --border: #334155;
  --border-light: #475569;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --radius: 10px;
  --sidebar-w: 240px;
  --chat-w: 380px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-new {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.btn-new:hover { background: var(--accent); color: white; }

/* ── Sidebar Search ── */
.sidebar-search {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 10px 7px 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-muted); }
.sidebar-search .search-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--text-muted);
  pointer-events: none;
}
.search-results {
  position: absolute;
  top: 100%;
  left: 8px;
  right: 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}
.search-results.active { display: block; }
.search-result-item {
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg-secondary); }
.search-result-item .sr-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-result-item .sr-badge {
  font-size: 11px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.search-no-results {
  padding: 12px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.project-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.15s;
  margin-bottom: 2px;
  position: relative;
}
.project-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
.project-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.project-item .icon { font-size: 16px; }
.project-item .badge {
  position: absolute;
  right: 8px;
  font-size: 10px;
  background: var(--bg-secondary);
  padding: 1px 6px;
  border-radius: 10px;
  color: var(--text-muted);
}
.project-item.nested { padding-left: 28px; font-size: 12px; }
.project-item .delete-btn {
  display: none;
  position: absolute;
  right: 8px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
}
.project-item:hover .delete-btn { display: block; }
.project-item:hover .badge { display: none; }

/* ── Chat Panel ── */
.chat-panel {
  width: var(--chat-w);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-header .project-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.chat-header-info { flex: 1; }
.chat-header-info .name {
  font-size: 14px;
  font-weight: 600;
}
.chat-header-info .name-input {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  width: 100%;
  outline: none;
}
.chat-header-info .name-input:focus {
  border-bottom: 1px solid var(--accent);
}
.chat-header-info .sub {
  font-size: 11px;
  color: var(--text-muted);
}

/* ── Breadcrumb Navigation ── */
.breadcrumb-bar {
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  display: none;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-secondary);
}
.breadcrumb-bar.visible { display: flex; }
.breadcrumb-bar .bc-item {
  cursor: pointer;
  color: var(--text-muted);
  background: none;
  border: none;
  font-family: var(--font);
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all .15s;
}
.breadcrumb-bar .bc-item:hover { color: var(--accent); background: var(--accent-dim); }
.breadcrumb-bar .bc-sep { color: var(--text-muted); opacity: .5; }
.breadcrumb-bar .bc-current { color: var(--text-primary); font-weight: 500; }

/* ── Subproject Button ── */
.btn-subproject {
  background: none;
  border: 1px dashed var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--font);
  padding: 4px 8px;
  margin: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  width: calc(100% - 24px);
  transition: all .15s;
}
.btn-subproject:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── Plan Panel ── */
.plan-panel {
  border-bottom: 1px solid var(--border);
  background: var(--bg-primary);
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.plan-panel.open { max-height: 400px; overflow-y: auto; }
.plan-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-primary);
  user-select: none;
  transition: background .15s;
}
.plan-toggle:hover { background: var(--bg-secondary); }
.plan-toggle .arrow { font-size: 10px; transition: transform .2s; }
.plan-toggle.open .arrow { transform: rotate(90deg); }
.plan-toggle .plan-label { flex: 1; font-weight: 500; }
.plan-toggle .plan-status {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-dim);
  color: var(--accent);
}
.plan-toggle .btn-refresh {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all .15s;
}
.plan-toggle .btn-refresh:hover { color: var(--accent); background: var(--accent-dim); }
.plan-toggle .btn-refresh.spinning { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.plan-content {
  padding: 12px 16px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.plan-content .plan-phase {
  margin-bottom: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--bg-secondary);
  border-left: 3px solid var(--border);
}
.plan-content .plan-phase.active { border-left-color: var(--accent); background: var(--accent-dim); }
.plan-content .plan-phase.done { border-left-color: var(--green); opacity: .7; }
.plan-content .plan-phase .phase-title {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 12px;
  margin-bottom: 4px;
}
.plan-content .plan-phase .phase-items { padding-left: 12px; }
.plan-content .plan-phase .phase-item { margin: 2px 0; }
.plan-content .plan-phase .phase-item.done { text-decoration: line-through; opacity: .6; }
.plan-content .subproject-status {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--bg-secondary);
  font-size: 11px;
}
.plan-content .subproject-status .sp-name { font-weight: 500; color: var(--text-primary); }
.plan-content .plan-empty {
  text-align: center;
  padding: 16px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Subproject Cards ── */
.subproject-card {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.subproject-card:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-2px); }
.subproject-card .sp-header { display: flex; align-items: center; gap: 8px; }
.subproject-card .sp-icon { font-size: 20px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.subproject-card .sp-name { font-weight: 600; font-size: 14px; }
.subproject-card .sp-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; }
.subproject-card .sp-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--bg-secondary); color: var(--text-secondary); }
.subproject-card .sp-widgets { font-size: 11px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.subproject-card .sp-widgets .sp-wtag { background: var(--bg-secondary); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
.subprojects-section { margin-top: 8px; }
.subprojects-section .sp-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding: 0 4px; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 92%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.agent, .msg.system {
  align-self: flex-start;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}
.msg.system {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 12px;
  max-width: 100%;
  text-align: center;
  border-radius: 8px;
}
.msg .time {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  display: block;
}
.msg.agent .time, .msg.system .time { color: var(--text-muted); }

.msg .widget-action {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  margin-top: 6px;
}

.typing-indicator {
  align-self: flex-start;
  padding: 12px 18px;
  background: var(--bg-secondary);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  display: none;
}
.typing-indicator.visible { display: flex; gap: 4px; }
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-muted); }

.btn-send {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.btn-send:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ── Widget Canvas ── */
.canvas-area {
  flex: 1;
  background: var(--bg-base);
  overflow: auto;
  position: relative;
}

.canvas-empty {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text-muted);
}
.canvas-empty .icon { font-size: 48px; margin-bottom: 12px; }
.canvas-empty .title { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
.canvas-empty .sub { font-size: 12px; max-width: 280px; }

.canvas-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 20px;
  align-content: flex-start;
}

/* ── Widgets ── */
.widget-frame {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.2s;
  position: relative;
  min-width: 280px;
}
.widget-frame:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.widget-frame.size-sm { width: 280px; }
.widget-frame.size-md { width: 380px; }
.widget-frame.size-lg { width: 580px; }
.widget-frame.size-full { width: 100%; }

/* Zoom Levels */
.widget-frame.zoom-l0 {
  max-height: none;
  overflow: visible;
}
.widget-frame.zoom-l0 .widget-body { display: none; }
.widget-frame.zoom-l0 .widget-cmd { display: none !important; }
.widget-frame.zoom-l0 .widget-head .actions button:not(.widget-zoom-btn) { display: none; }
.widget-frame.zoom-l0 .widget-head .label { font-size: 12px; }
.widget-frame.zoom-l0 .widget-head { padding: 6px 10px; min-height: 36px; }

/* L0 Quick-Actions Zone */
.l0-actions {
  display: none;
  padding: 4px 10px 6px;
  border-top: 1px solid var(--border);
  background: var(--bg-primary);
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
}
.widget-frame.zoom-l0 .l0-actions { display: flex; }
.widget-frame:not(.zoom-l0) .l0-actions { display: none; }

/* L2 Zoom: full-width expanded view */
.widget-frame.zoom-l2 { width: 100% !important; }
.widget-frame.zoom-l2 .widget-cmd { display: none !important; }

/* App Widget L2 iframe container */
.app-widget-l2 {
  width: 100%;
  height: 70vh;
  min-height: 400px;
  max-height: 85vh;
  position: relative;
}

/* L0 Todo mini-checkboxes */
.l0-todo-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 1px 6px;
  border-radius: 4px;
  transition: background 0.1s;
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.l0-todo-item:hover { background: var(--bg-secondary); }
.l0-todo-item.done { text-decoration: line-through; opacity: 0.5; }
.l0-todo-item input[type="checkbox"] {
  width: 12px; height: 12px; margin: 0; cursor: pointer; accent-color: var(--accent);
}

/* L0 Quick-Action Buttons */
.l0-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  flex-shrink: 0;
}
.l0-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* L0 Inline KPI Edit */
.l0-kpi-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  padding: 1px 6px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  min-width: 40px;
  text-align: center;
  font-family: var(--font);
  transition: border-color 0.15s;
}
.l0-kpi-value:hover { border-color: var(--border); }
.l0-kpi-value:focus { border-color: var(--accent); outline: none; background: var(--bg-secondary); }
.l0-kpi-unit { font-size: 10px; color: var(--text-muted); }
.l0-kpi-trend { font-size: 12px; margin-left: 2px; }

/* L0 Notes preview */
.l0-note-preview {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
  cursor: pointer;
  padding: 1px 4px;
}
.l0-note-preview:hover { color: var(--text-primary); }

/* L0 Kanban mini badges */
.l0-kanban-col {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
}
.l0-kanban-col .count { font-weight: 600; color: var(--text-primary); }

/* dataRef source badge */
.dataref-source-badge {
  padding: 4px 10px;
  font-size: 10px;
  color: var(--text-muted);
  background: var(--accent-dim);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
}
.dataref-source-badge b { color: var(--accent); font-weight: 500; }

/* L0 Timeline */
.l0-next-event {
  font-size: 11px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.l0-next-event .date { color: var(--accent); font-weight: 500; }

.widget-frame.zoom-l2 {
  grid-column: 1 / -1;
}

.widget-zoom-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-zoom-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

.widget-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: grab;
  user-select: none;
}
.widget-head .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.widget-head .label {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.widget-head .actions {
  display: flex;
  gap: 4px;
}
.widget-head .actions button {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-head .actions button:hover { background: var(--bg-secondary); color: var(--text-primary); }

/* AI Change Highlight */
@keyframes aiGlow {
  0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.5); }
  50% { box-shadow: 0 0 20px 4px rgba(139,92,246,0.3); }
  100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.0); }
}
.widget-frame.ai-changed {
  animation: aiGlow 1.5s ease-out;
  border-color: var(--accent) !important;
  transition: border-color 3s ease;
}
.widget-change-banner {
  padding: 8px 12px;
  background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1));
  border-bottom: 1px solid rgba(139,92,246,0.3);
  font-size: 12px;
