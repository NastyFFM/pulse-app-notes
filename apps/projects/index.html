  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;';

  // Fetch all contexts
  const otherContexts = state.contexts.filter(c => c.id !== state.activeContextId);

  let html = `<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:400px;width:90%;max-height:70vh;overflow-y:auto;">
    <h3 style="margin-bottom:12px;font-size:14px;">📌 Daten verlinken</h3>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">Wähle einen Context und Datenschlüssel. Das Widget zeigt dann Live-Daten aus diesem Context.</p>
    <div style="margin-bottom:12px;">
      <label style="font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px;">Context:</label>
      <select id="dataref-ctx-select" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;font-family:var(--font);">
        ${otherContexts.map(c => `<option value="${c.id}">${c.icon || '🧩'} ${escapeHtml(c.name)}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px;">Datenschlüssel:</label>
      <select id="dataref-key-select" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;font-family:var(--font);">
        <option value="">Lade...</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button id="dataref-cancel" style="padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);">Abbrechen</button>
      <button id="dataref-confirm" style="padding:6px 14px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:12px;cursor:pointer;font-family:var(--font);">Verlinken</button>
    </div>
  </div>`;

  overlay.innerHTML = html;
  document.body.appendChild(overlay);

  const ctxSelect = overlay.querySelector('#dataref-ctx-select');
  const keySelect = overlay.querySelector('#dataref-key-select');

  // Load data keys when context changes
  async function loadKeys() {
    const ctxId = ctxSelect.value;
    if (!ctxId) return;
    try {
      const res = await fetch(`${API_BASE}/api/context/${ctxId}`);
      const ctx = await res.json();
      const keys = Object.keys(ctx.data || {});
      keySelect.innerHTML = keys.length > 0
        ? keys.map(k => `<option value="${k}">${escapeHtml(k)}</option>`).join('')
        : '<option value="">Keine Daten vorhanden</option>';
    } catch {
      keySelect.innerHTML = '<option value="">Fehler beim Laden</option>';
    }
  }

  ctxSelect.addEventListener('change', loadKeys);
  loadKeys(); // Initial load

  overlay.querySelector('#dataref-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#dataref-confirm').addEventListener('click', () => {
    const ctxId = ctxSelect.value;
    const dataKey = keySelect.value;
    if (!ctxId || !dataKey) return;

    widget.dataRef = { contextId: ctxId, dataKey };
    if (!widget.dataKey) widget.dataKey = dataKey;
    save();
    renderCanvas();
    overlay.remove();
  });
}

function removeDataRef(widgetId) {
  const proj = state.activeContext;
  if (!proj) return;
  const widget = (proj.widgets || []).find(w => w.id === widgetId);
  if (!widget) return;
  delete widget.dataRef;
  save();
  renderCanvas();
}

// ── Scope-Override: Copy inherited widget locally (breaks inheritance) ──
function overrideInheritedWidget(inheritedWidgetId, fromContextId) {
  const proj = state.activeContext;
  if (!proj) return;
  const widget = (state.inheritedWidgets || []).find(w => w.id === inheritedWidgetId);
  if (!widget) return;
  if (!confirm(`Lokale Kopie von "${widget.title}" erstellen?\nDas Widget wird nicht mehr automatisch vom Parent aktualisiert.`)) return;
  // Create local copy
  const localCopy = {
    id: 'w-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
    type: widget.type,
    title: widget.title,
    size: widget.size || 'md',
    dataKey: widget.dataKey + '-local',
    color: widget.color || proj.color,
    config: JSON.parse(JSON.stringify(widget.config || {})),
    scope: 'local',
    zoomLevel: widget.zoomLevel || 'L1'
  };
  // Copy data from inherited data
  const inheritedValue = state.inheritedData[widget.dataKey] || widget.data || {};
  if (!proj.data) proj.data = {};
  proj.data[localCopy.dataKey] = JSON.parse(JSON.stringify(inheritedValue));
  if (!proj.widgets) proj.widgets = [];
  proj.widgets.push(localCopy);
  logChange(proj, `📋 Lokale Kopie von "${widget.title}" erstellt (Vererbung getrennt)`);
  save();
  renderCanvas();
}

function toggleWidgetEdit(widgetId) {
  const cmd = document.getElementById('wcmd-' + widgetId);
  if (!cmd) return;
  const isOpen = cmd.style.display === 'block';
  // Close all other open cmd panels
  document.querySelectorAll('.widget-cmd').forEach(el => el.style.display = 'none');
  if (!isOpen) {
    cmd.style.display = 'block';
    const input = document.getElementById('wcmd-input-' + widgetId);
    if (input) input.focus();
  }
}

async function sendWidgetCmd(widgetId) {
  const input = document.getElementById('wcmd-input-' + widgetId);
  const status = document.getElementById('wcmd-status-' + widgetId);
  const text = input?.value.trim();
  if (!text || processing) return;
  let lastActions = [];

  const proj = state.activeContext;
  if (!proj) return;

  // Support inherited widgets (prefixed with 'inh-')
  const isInherited = widgetId.startsWith('inh-');
  const realWidgetId = isInherited ? widgetId.slice(4) : widgetId;
  let widget, targetContextId, targetContextName;

  if (isInherited) {
    widget = (state.inheritedWidgets || []).find(w => w.id === realWidgetId);
    if (!widget) return;
    targetContextId = widget._inheritedFromId || widget.fromContext;
    targetContextName = widget._inheritedFrom || 'Parent';
  } else {
    widget = (proj.widgets || []).find(w => w.id === widgetId);
    if (!widget) return;
    targetContextId = state.activeContextId;
    targetContextName = proj.name;
  }

  // Show status
  status.style.display = 'block';
  status.textContent = isInherited ? `Wird in "${targetContextName}" gespeichert...` : 'Wird verarbeitet...';
  status.style.color = 'var(--accent)';
  input.disabled = true;

  // Build context message that focuses on this widget
  const widgetData = isInherited ? (state.inheritedData[widget.dataKey] || widget.data || {}) : (proj.data[widget.dataKey] || widget.data || {});
  const widgetMeta = { id: widget.id, type: widget.type, title: widget.title, size: widget.size, dataKey: widget.dataKey, config: widget.config || {} };
  const inheritedNote = isInherited ? `\nWICHTIG: Dieses Widget ist GEERBT von Context "${targetContextName}" (${targetContextId}). Aenderungen werden dort gespeichert.\n` : '';
  const contextMsg = `[Widget-Bearbeitung: "${widget.title}"]${inheritedNote}\nWidget-Definition: ${JSON.stringify(widgetMeta)}\nAktueller Inhalt (proj.data["${widget.dataKey}"]): ${JSON.stringify(widgetData).slice(0, 1500)}\n\nDu kannst ALLES an diesem Widget aendern:\n- Daten/Inhalt (proj.data["${widget.dataKey}"])\n- Widget-Eigenschaften (title, size, type, config, color)\n- Struktur (Spalten hinzufuegen/entfernen bei Tabellen, neue Items bei Todo/Kanban/Timeline)\n- Widget-Typ komplett aendern (z.B. von table zu kanban)\n\nAnweisung vom User: ${text}`;

  // Add to chat as user message
  proj.chat.push({
    id: 'msg-' + Date.now(),
    role: 'user',
    text: `✏️ ${widget.title}: ${text}`,
    time: new Date().toISOString()
  });
  renderChat();

  // Save before agent call
  await saveImmediate();

  processing = true;
  try {
    let response;
    try {
      // Route to correct context for inherited widgets
      response = await callProjectAgent(isInherited ? targetContextId : state.activeContextId, contextMsg);
    } catch (agentErr) {
      console.log('Agent unavailable:', agentErr.message);
      response = { text: 'Agent nicht verfuegbar. Bitte aendere die Daten manuell.', widgetActions: [] };
    }

    if (response._fromAgent) {
      // Reload both contexts if inherited
      if (isInherited) await selectProject(state.activeContextId);
      else {
        await selectProject(state.activeContextId);
        const freshProj = state.activeContext;
        if (freshProj) {
          freshProj.chat.push({
            id: 'msg-' + Date.now(),
            role: 'agent',
            text: response.text,
            widgetActions: response.widgetActions || [],
            time: new Date().toISOString()
          });
          freshProj.updated = new Date().toISOString();
        }
      }
    } else {
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    await saveImmediate();

    lastActions = response?.widgetActions || [];
    status.textContent = 'Erledigt!';
    status.style.color = 'var(--green)';
    input.value = '';
    setTimeout(() => {
      status.style.display = 'none';
      document.getElementById('wcmd-' + widgetId).style.display = 'none';
    }, 1500);

  } catch (e) {
    status.textContent = 'Fehler: ' + e.message;
    status.style.color = 'var(--red)';
  }

  processing = false;
  input.disabled = false;
  renderChat();
  renderCanvas();
  highlightAiChanges(lastActions);
}

function resizeWidget(widgetId) {
  const proj = state.activeContext;
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  const sizes = ['sm', 'md', 'lg', 'full'];
  const idx = sizes.indexOf(w.size || 'md');
  w.size = sizes[(idx + 1) % sizes.length];
  logChange(proj, `↔️ Widget "${w.title}" Groesse geaendert zu ${w.size}`);
  save();
  renderCanvas();
}

// ── Chat: Send Message ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || processing) return;

  const proj = state.activeContext;
  if (!proj) return;

  // Add user message
  const userMsg = {
    id: 'msg-' + Date.now(),
    role: 'user',
    text,
    time: new Date().toISOString()
  };
  proj.chat.push(userMsg);
  input.value = '';
  input.style.height = '42px';
  renderChat();

  // Save immediately (not debounced) so the server has the user message before agent call
  await saveImmediate();

  // Show typing
  processing = true;
  document.getElementById('typingIndicator').classList.add('visible');
  document.getElementById('btnSend').disabled = true;
  let lastWidgetActions = [];

  try {
    // Try AI agent first, fall back to local pattern matching
    let response;
    try {
      response = await callProjectAgent(state.activeContextId, text);
    } catch (agentErr) {
      console.log('Agent unavailable, using local fallback:', agentErr.message);
      response = await processProjectMessage(text, proj);
    }

    // If agent responded, reload context from API
    if (response._fromAgent) {
      await selectProject(state.activeContextId);
      const freshProj = state.activeContext;
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      // Local fallback: add response to current proj
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    lastWidgetActions = response.widgetActions || [];

    // Save with immediate flush
    await saveImmediate();

  } catch (e) {
    proj.chat.push({
      id: 'msg-err-' + Date.now(),
      role: 'system',
      text: 'Fehler: ' + e.message,
      time: new Date().toISOString()
    });
    save();
  }

  processing = false;
  document.getElementById('typingIndicator').classList.remove('visible');
  document.getElementById('btnSend').disabled = false;

  // Force reload fresh context from server to ensure UI matches server state
  await selectProject(state.activeContextId);
  renderChat();
  highlightAiChanges(lastWidgetActions);
  document.getElementById('projectSub').textContent = `${(state.activeContext?.widgets || []).length} Widgets`;
}

// ── AI Agent Call ──
async function callProjectAgent(projectId, text) {
  const res = await fetch('/api/context-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contextId: projectId, text })
  });

  if (!res.ok) throw new Error('Agent request failed');

  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Agent error');

  return {
    text: data.text,
    widgetActions: data.widgetActions || [],
    _fromAgent: true
  };
}

// ── Widget Detection Engine ──
// Analyzes chat messages and creates appropriate widgets
async function processProjectMessage(text, proj) {
  const lower = text.toLowerCase();
  const widgetActions = [];
  let responseText = '';

  // ── Widget creation patterns ──
  const patterns = [
    {
      match: /todo[s\-]?|aufgabe|task|checkliste|to-do/i,
      create: () => ({
        type: 'todo',
        title: extractTitle(text, 'Aufgaben'),
        size: 'md',
        dataKey: 'todos-' + Date.now(),
        data: { items: extractListItems(text) }
      }),
      label: 'Todo-Liste erstellt'
    },
    {
      match: /\bnotiz|\bnote\b|beschreibung|dokument/i,
      create: () => ({
        type: 'notes',
        title: extractTitle(text, 'Notizen'),
        size: 'md',
        dataKey: 'notes-' + Date.now(),
        data: { text: '' }
      }),
      label: 'Notiz erstellt'
    },
    {
      match: /tabelle|table|\buebersicht\b|vergleich/i,
      create: () => ({
        type: 'table',
        title: extractTitle(text, 'Tabelle'),
        size: 'lg',
        dataKey: 'table-' + Date.now(),
        config: {},
        data: { rows: [] }
      }),
      label: 'Tabelle erstellt'
    },
    {
      match: /timeline|zeitstrahl|\bablauf\b|chronolog|meilenstein|milestone|zeitplan/i,
      create: () => ({
        type: 'timeline',
        title: extractTitle(text, 'Timeline'),
        size: 'md',
        dataKey: 'timeline-' + Date.now(),
        data: { items: [] }
      }),
      label: 'Timeline erstellt'
    },
    {
      match: /kanban|board|spalten|workflow/i,
      create: () => ({
        type: 'kanban',
        title: extractTitle(text, 'Board'),
        size: 'lg',
        dataKey: 'kanban-' + Date.now(),
        data: { columns: [
          { id: 'todo', name: 'To Do', items: [] },
          { id: 'doing', name: 'In Arbeit', items: [] },
          { id: 'done', name: 'Erledigt', items: [] }
        ]}
      }),
      label: 'Kanban Board erstellt'
    },
    {
      match: /kpi|metrik|statistik|zahl|counter|zaehler/i,
      create: () => ({
        type: 'kpi',
        title: extractTitle(text, 'KPI'),
        size: 'sm',
        dataKey: 'kpi-' + Date.now(),
        data: { value: '0', label: extractTitle(text, 'Metrik') }
      }),
      label: 'KPI Widget erstellt'
    },
    {
      match: /link|resource|url|quelle|referenz/i,
      create: () => ({
        type: 'links',
        title: extractTitle(text, 'Links'),
        size: 'sm',
        dataKey: 'links-' + Date.now(),
        data: { links: [] }
      }),
      label: 'Link-Sammlung erstellt'
    },
    {
      match: /fortschritt|progress|prozent/i,
      create: () => ({
        type: 'progress',
        title: extractTitle(text, 'Fortschritt'),
        size: 'sm',
        dataKey: 'progress-' + Date.now(),
        data: { percent: 0, label: extractTitle(text, 'Fortschritt') }
      }),
      label: 'Fortschrittsanzeige erstellt'
    }
  ];

  let created = [];
  for (const p of patterns) {
    if (p.match.test(lower)) {
      const widget = p.create();
      widget.id = 'w-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
      widget.color = proj.color;

      // Store data in project
      if (widget.data && widget.dataKey) {
        proj.data[widget.dataKey] = widget.data.items || widget.data.columns || widget.data.rows || widget.data.links || widget.data;
      }

      if (!proj.widgets) proj.widgets = [];
      proj.widgets.push(widget);
      // Keep canvas.widgets in sync
      proj.canvas = { widgets: proj.widgets };
      created.push(widget);
      widgetActions.push({ icon: getWidgetIcon(widget.type), label: p.label });
    }
  }

  // ── Smart responses ──
  if (created.length > 0) {
    const names = created.map(w => `${getWidgetIcon(w.type)} ${w.title}`).join(', ');
    responseText = `Ich habe ${created.length} Widget${created.length > 1 ? 's' : ''} erstellt: ${names}.\n\nDu kannst sie rechts im Canvas sehen und direkt bearbeiten. Sag mir wenn du mehr brauchst!`;
  } else if (/hilfe|help|was kannst/i.test(lower)) {
    responseText = `Ich kann diese Widgets fuer dich erstellen:\n\n` +
      `• "Todo-Liste" — Aufgaben mit Checkboxen\n` +
      `• "Notiz" — Freitext-Notizen\n` +
      `• "Tabelle" — Daten in Spalten\n` +
      `• "Timeline" — Zeitstrahl mit Events\n` +
      `• "Kanban" — Board mit Spalten\n` +
      `• "KPI" — Zahlen/Metriken\n` +
      `• "Links" — URL-Sammlung\n` +
      `• "Fortschritt" — Prozentanzeige\n\n` +
      `Beschreibe einfach was du brauchst!`;
  } else if (/projekt|umbenennen|name/i.test(lower) && /aender|umbenen|nenn/i.test(lower)) {
    const newName = text.replace(/.*(?:nenn|aender|umbenen)[^\w]*(?:zu|in|auf)?\s*/i, '').replace(/['"]/g, '').trim();
    if (newName && newName.length < 50) {
      proj.name = newName;
      document.getElementById('projectName').value = newName;
      renderProjectList();
      responseText = `Projekt umbenannt zu "${newName}".`;
    } else {
      responseText = 'Wie soll das Projekt heissen?';
    }
  } else if (/unterprojekt|subprojekt|kindprojekt|verschachtel/i.test(lower)) {
    createProject(proj.id);
    responseText = 'Unterprojekt erstellt! Du findest es in der Sidebar unter diesem Projekt.';
    widgetActions.push({ icon: '📂', label: 'Unterprojekt erstellt' });
  } else {
    // Generic response — try to be helpful
    responseText = `Ich habe deine Nachricht verstanden. Um Widgets zu erstellen, verwende Begriffe wie:\n` +
      `"Erstelle eine Todo-Liste", "Ich brauche ein Kanban Board", "Mach eine Tabelle", etc.\n\n` +
      `Oder sag "Hilfe" fuer alle Optionen.`;

    // Try to also send to the PulseOS event bus for action chain routing
    try {
      fetch('/api/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'chat:message',
          source: 'project:' + proj.id,
          data: { text, projectId: proj.id, projectName: proj.name }
        })
      });
    } catch {}
  }

  return { text: responseText, widgetActions };
}

// ── Perspective Switch ──
function getAvailableRenders(widget) {
  const type = widget.type;
  if (type === 'todo' || type === 'kanban' || type === 'table') {
    return ['todo', 'kanban', 'table'];
  }
  if (type === 'timeline') return ['timeline', 'table'];
  if (type === 'links') return ['links', 'table'];
  if (type === 'kpi') return ['kpi'];
  if (type === 'notes') return ['notes'];
  if (type === 'progress') return ['progress'];
  if (type === 'context') return ['context'];
  return [type];
}

function cyclePerspective(widgetId) {
  const proj = getProject(state.activeContextId);
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  const renders = getAvailableRenders(w);
  if (renders.length <= 1) return;
  const currentRender = w.renderAs || w.type;
  const idx = renders.indexOf(currentRender);
  w.renderAs = renders[(idx + 1) % renders.length];
  save();
  renderCanvas();
}

// ── Zoom Level ──
function cycleZoom(widgetId) {
  const proj = getProject(state.activeContextId);
  if (!proj) return;

  // Virtual context-widgets (sub-projects) — toggle zoom on the DOM frame directly
  if (widgetId.startsWith('__virtual-ctx-')) {
    const frame = document.querySelector(`.widget-frame[data-widget-id="${widgetId}"]`);
    if (!frame) return;
    const current = frame.dataset.zoomLevel || 'L1';
    const next = current === 'L1' ? 'L0' : 'L1';
    frame.dataset.zoomLevel = next;
    frame.classList.remove('zoom-l0', 'zoom-l2');
    if (next === 'L0') frame.classList.add('zoom-l0');
    // Update button icon
    const btn = frame.querySelector('.widget-zoom-btn');
    if (btn) btn.textContent = next === 'L0' ? '🔹' : '🔸';
    return;
  }

  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  const current = w.zoomLevel || 'L1';
  // App widgets: 3-state cycle L0 → L1 → L2 → L0
  if (w.type === 'app') {
    w.zoomLevel = current === 'L0' ? 'L1' : current === 'L1' ? 'L2' : 'L0';
    if (w.zoomLevel === 'L2') w.size = 'full';
    else if (w._prevSize) { w.size = w._prevSize; delete w._prevSize; }
    if (current === 'L1') w._prevSize = w.size || 'md';
  } else {
    // Simple toggle: L1 ↔ L0 (use resize button for size changes)
    w.zoomLevel = current === 'L0' ? 'L1' : 'L0';
  }
  save();
  renderCanvas();
}

// ── L0 Quick-Actions ──

function getL0ActionsHtml(widget, proj, widgetId) {
  const type = widget.type;
  const dk = widget.dataKey;

  switch (type) {
    case 'todo': {
      const items = proj.data?.[dk] || widget.data?.items || [];
      const arr = Array.isArray(items) ? items : [];
      const visible = arr.slice(0, 5); // Show max 5 items in L0
      let html = visible.map((item, i) => `
        <label class="l0-todo-item${item.done ? ' done' : ''}" title="${escapeHtml(item.text)}">
          <input type="checkbox" ${item.done ? 'checked' : ''} data-idx="${i}" class="l0-todo-check"/>
          ${escapeHtml(item.text.slice(0, 20))}${item.text.length > 20 ? '…' : ''}
        </label>
      `).join('');
      if (arr.length > 5) html += `<span style="font-size:10px;color:var(--text-muted)">+${arr.length - 5}</span>`;
      html += `<button class="l0-btn l0-add-todo" title="Neues Item">+</button>`;
      return html;
    }

    case 'kpi': {
      const kpiData = proj.data?.[dk] || widget.data || {};
      const val = kpiData.value ?? '';
      const unit = kpiData.unit || '';
      const prev = kpiData.previousValue;
      let trend = '';
      if (prev !== undefined && prev !== null && val !== '') {
        const diff = Number(val) - Number(prev);
        trend = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
        const trendColor = diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text-muted)';
        trend = `<span class="l0-kpi-trend" style="color:${trendColor}">${trend}</span>`;
      }
      return `
        <input type="text" class="l0-kpi-value" value="${escapeHtml(String(val))}" data-dk="${dk}" placeholder="—" />
        <span class="l0-kpi-unit">${escapeHtml(unit)}</span>
        ${trend}
      `;
    }

    case 'notes': {
      const noteData = proj.data?.[dk] || widget.data || {};
      const txt = noteData.text || noteData.content || '';
      const charCount = txt.length;
      const firstLine = txt.split('\n')[0] || '';
      const preview = firstLine.slice(0, 50) + (firstLine.length > 50 ? '…' : '');
      return `<span class="l0-note-preview" title="Klick zum Öffnen">${escapeHtml(preview) || '<i style="opacity:.4">Leer</i>'}</span><span style="font-size:9px;color:var(--text-muted);margin-left:auto;">${charCount}z</span>`;
    }

    case 'table': {
      const rows = proj.data?.[dk] || widget.data?.rows || [];
      const arr = Array.isArray(rows) ? rows : [];
      const count = arr.length;
      let lastPreview = '';
      if (count > 0) {
        const last = arr[count - 1];
        const vals = Object.values(last).filter(v => typeof v === 'string' || typeof v === 'number');
        lastPreview = vals.slice(0, 2).join(' · ').slice(0, 30);
      }
      return `
        <span style="font-size:11px;color:var(--text-secondary)">${count} Zeilen${lastPreview ? ' · <span style="opacity:.6">' + escapeHtml(lastPreview) + '</span>' : ''}</span>
        <button class="l0-btn l0-add-table-row" title="Neue Zeile" style="margin-left:auto;">+</button>
      `;
    }

    case 'kanban': {
      const kanbanData = proj.data?.[dk] || widget.data || {};
      const cols = Array.isArray(kanbanData) ? kanbanData : (kanbanData.columns || []);
      return cols.map(c => `
        <div class="l0-kanban-col l0-kanban-expand" data-wid="${widget.id}" title="${escapeHtml(c.name || c.id)}" style="cursor:pointer;">
          ${escapeHtml((c.name || c.id).slice(0, 8))} <span class="count">${(c.items || []).length}</span>
        </div>
      `).join('');
    }

    case 'timeline': {
      const tItems = proj.data?.[dk] || widget.data?.items || [];
      const arr = Array.isArray(tItems) ? tItems : [];
      // Find next upcoming event
      const now = new Date();
      const upcoming = arr.filter(i => i.date && new Date(i.date) >= now).sort((a, b) => new Date(a.date) - new Date(b.date));
      if (upcoming.length > 0) {
        const next = upcoming[0];
        const d = new Date(next.date);
        const diffDays = Math.ceil((d - now) / 86400000);
        const relTime = diffDays === 0 ? 'Heute' : diffDays === 1 ? 'Morgen' : `in ${diffDays}d`;
        return `<div class="l0-next-event">📅 <span class="date">${relTime}</span> ${escapeHtml((next.text || next.title || '').slice(0, 25))}</div>`;
      }
      return `<span style="font-size:11px;color:var(--text-muted)">${arr.length} Events</span>`;
    }

    case 'context': {
      const refCtx = state.contexts.find(c => c.id === widget.contextRef);
      if (refCtx) {
        const ago = refCtx.updated ? timeAgo(refCtx.updated) : '';
        return `<span style="font-size:11px;color:var(--text-secondary)">${refCtx.widgetCount || 0}w${ago ? ' · ' + ago : ''}</span>`;
      }
      return '';
    }

    case 'app': {
      const appData = proj.data?.[dk] || widget.data || {};
      const appId = appData.appId || '';
      const status = appData.status || '';
      return `
        <span style="font-size:11px;color:var(--text-secondary)">${status ? escapeHtml(status.slice(0, 30)) : escapeHtml(appId)}</span>
        <button class="l0-btn l0-open-app" data-appid="${escapeHtml(appId)}" title="Im Dashboard öffnen" style="margin-left:auto;">🚀</button>
      `;
    }

    case 'progress': {
      const progData = proj.data?.[dk] || widget.data || {};
      const pct = progData.percent ?? 0;
      const barColor = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--amber)';
      return `
        <div style="flex:1;min-width:80px;height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;">
          <div style="width:${Math.min(pct, 100)}%;height:100%;background:${barColor};border-radius:4px;transition:width .3s;"></div>
        </div>
        <span style="font-size:11px;font-weight:600;color:var(--text-primary);min-width:30px;text-align:right;">${pct}%</span>
      `;
    }

    default:
      return '';
  }
}

function timeAgo(dateStr) {
  try {
    const d = new Date(dateStr);
    const diff = Date.now() - d.getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'jetzt';
    if (mins < 60) return `${mins}m`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h`;
    const days = Math.floor(hrs / 24);
    return `${days}d`;
  } catch { return ''; }
}

function bindL0Actions(frame, widget, proj, widgetId) {
  const type = widget.type;
  const dk = widget.dataKey;

  // Todo: checkbox toggles
  if (type === 'todo') {
    frame.querySelectorAll('.l0-todo-check').forEach(cb => {
      cb.addEventListener('change', (e) => {
        e.stopPropagation();
        const idx = parseInt(cb.dataset.idx);
        const items = proj.data?.[dk] || widget.data?.items || [];
        if (Array.isArray(items) && items[idx]) {
          items[idx].done = cb.checked;
          cb.closest('.l0-todo-item').classList.toggle('done', cb.checked);
          // Update badge in header
          const done = items.filter(i => i.done).length;
          updateL0Badge(widgetId, `${done}/${items.length} ✓`);
          save();
        }
      });
    });
    // Todo: add button
    const addBtn = frame.querySelector('.l0-add-todo');
    if (addBtn) {
      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const text = prompt('Neues Todo:');
        if (!text) return;
        if (!proj.data[dk]) proj.data[dk] = [];
        const items = proj.data[dk];
        items.push({ id: 't-' + Date.now(), text, done: false });
        save();
        renderCanvas();
      });
    }
  }

  // KPI: inline edit
  if (type === 'kpi') {
    const input = frame.querySelector('.l0-kpi-value');
    if (input) {
      input.addEventListener('blur', () => {
        const newVal = input.value.trim();
        if (!proj.data[dk]) proj.data[dk] = {};
        const old = proj.data[dk].value;
        if (old !== undefined && old !== null) proj.data[dk].previousValue = old;
        proj.data[dk].value = isNaN(Number(newVal)) ? newVal : Number(newVal);
        save();
        // Refresh to update trend arrow
        renderCanvas();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { input.value = proj.data?.[dk]?.value ?? ''; input.blur(); }
      });
    }
  }

  // Notes: click to expand
  if (type === 'notes') {
    const preview = frame.querySelector('.l0-note-preview');
    if (preview) {
      preview.addEventListener('click', (e) => {
        e.stopPropagation();
        cycleZoom(widget.id); // Expand to L1
      });
    }
  }

  // Table: add row
  if (type === 'table') {
    const addBtn = frame.querySelector('.l0-add-table-row');
    if (addBtn) {
      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!proj.data[dk]) proj.data[dk] = [];
        const rows = proj.data[dk];
        const cols = widget.config?.columns || ['Name', 'Wert'];
        const newRow = {};
        cols.forEach(c => newRow[c] = '');
        rows.push(newRow);
        save();
        // Switch to L1 so user can edit the new row
        const w = (proj.widgets || []).find(w => w.id === widget.id);
        if (w) { w.zoomLevel = 'L1'; save(); }
        renderCanvas();
      });
    }
  }

  // Kanban: click column badge → expand to L1
  if (type === 'kanban') {
    frame.querySelectorAll('.l0-kanban-expand').forEach(badge => {
      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        cycleZoom(widget.id); // Expand to L1
      });
    });
  }

  // App: open in dashboard
  if (type === 'app') {
    const openBtn = frame.querySelector('.l0-open-app');
    if (openBtn) {
      openBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openAppFromWidget(openBtn.dataset.appid);
      });
    }
  }
}

function updateL0Badge(widgetId, badgeText) {

  if (!frame) return;

  if (label) {

    const base = label.textContent.split(' · ')[0];
    label.innerHTML = label.innerHTML.replace(/ · [^<]*/, ` · ${badgeText}`);
  }
}

function getL0Badge(widget, proj) {
  const data = proj.data?.[widget.dataKey] || widget.data || {};
  switch (widget.type) {
    case 'todo': {
      const items = proj.data?.[widget.dataKey] || widget.data?.items || [];
      const done = Array.isArray(items) ? items.filter(i => i.done).length : 0;
      const total = Array.isArray(items) ? items.length : 0;
      return `${done}/${total} ✓`;
    }
    case 'kpi': {
      const kpiData = proj.data?.[widget.dataKey] || widget.data || {};
      return kpiData.value ?? '—';
    }
    case 'table': {
      const rows = proj.data?.[widget.dataKey] || widget.data?.rows || [];
      return `${Array.isArray(rows) ? rows.length : 0} Zeilen`;
    }
    case 'kanban': {
      const kanbanData = proj.data?.[widget.dataKey] || widget.data || {};
      const cols = Array.isArray(kanbanData) ? kanbanData : (kanbanData.columns || []);
      return cols.map(c => (c.items || []).length).join('/');
    }
    case 'notes': {
      const noteData = proj.data?.[widget.dataKey] || widget.data || {};
      const txt = noteData.text || '';
      return txt.slice(0, 30) + (txt.length > 30 ? '…' : '');
    }
    case 'context': {
      const refCtx = state.contexts.find(c => c.id === widget.contextRef);
      return refCtx ? `${refCtx.widgetCount || 0} W` : '—';
    }
    case 'timeline': {
      const tItems = proj.data?.[widget.dataKey] || widget.data?.items || [];
      return `${Array.isArray(tItems) ? tItems.length : 0} Items`;
    }
    case 'progress': {
      const progData = proj.data?.[widget.dataKey] || widget.data || {};
      return `${progData.percent ?? 0}%`;
    }
    case 'app': {
      const appData = proj.data?.[widget.dataKey] || widget.data || {};
      return appData.status || appData.appId || '—';
    }
    default:
      return '';
  }
}

// ── Helpers ──
function extractTitle(text, fallback) {
  // Try to extract a quoted title first
  const quoted = text.match(/["']([^"']{2,30})["']/);
  if (quoted) return quoted[1].trim();
  // Otherwise use fallback (widget type label)
  return fallback;
}

function extractListItems(text) {
  // Try to extract items from text like "Todo: Einkaufen, Putzen, Kochen"
  const colonMatch = text.match(/:\s*(.+)/);
  if (colonMatch) {
    const items = colonMatch[1].split(/[,;]+/).map(s => s.trim()).filter(Boolean);
    if (items.length > 1) {
      return items.map((t, i) => ({ id: 't-' + Date.now() + '-' + i, text: t, done: false }));
    }
  }
  return [];
}

function togglePlan() {

function renderPlan(proj) {
  const content = document.getElementById('planContent');
  const status = document.getElementById('planStatus');
  if (!proj || !proj.plan) {
    content.innerHTML = '<div class="plan-empty">Klicke 🔄 um einen Plan zu generieren</div>';
    status.textContent = '—';
    return;
  }

  const plan = proj.plan;
  status.textContent = plan.status || '—';

  let html = '';

  // Render phases
  if (plan.phases && plan.phases.length > 0) {
    for (const phase of plan.phases) {
      const cls = phase.state === 'done' ? 'done' : phase.state === 'active' ? 'active' : '';
      const icon = phase.state === 'done' ? '✅' : phase.state === 'active' ? '▶' : '⬜';
      html += `<div class="plan-phase ${cls}">`;
      html += `<div class="phase-title">${icon} ${phase.title}</div>`;
      if (phase.items && phase.items.length > 0) {
        html += '<div class="phase-items">';
        for (const item of phase.items) {
          const itemCls = item.done ? 'done' : '';
          html += `<div class="phase-item ${itemCls}">${item.done ? '☑' : '☐'} ${item.text}</div>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }
  }

  // Render subproject statuses
  const children = state.contexts.filter(c => c.parentId === proj.id);
  if (children.length > 0) {
    html += '<div style="margin-top:10px;font-weight:600;font-size:11px;color:var(--text-muted);margin-bottom:4px;">UNTERPROJEKTE</div>';
    for (const child of children) {
      const wCount = child.widgetCount || 0;
      html += `<div class="subproject-status">
        <span class="sp-name">${child.icon || '🧩'} ${child.name}</span>
        <span style="float:right;color:var(--text-muted);">${wCount} Widgets</span>
      </div>`;
    }
  }

  if (plan.summary) {
    html += `<div style="margin-top:10px;padding:8px;border-radius:6px;background:var(--bg-secondary);font-size:11px;color:var(--text-muted);">${plan.summary}</div>`;
  }

  content.innerHTML = html || '<div class="plan-empty">Plan ist leer</div>';
}

async function refreshPlan() {
  const proj = state.activeContext;
  if (!proj) return;

  const btn = document.getElementById('btnRefreshPlan');
  btn.classList.add('spinning');

  // Open the plan panel if closed
  const panel = document.getElementById('planPanel');
  const toggle = document.getElementById('planToggle');
  if (!panel.classList.contains('open')) {
    panel.classList.add('open');
    toggle.classList.add('open');
  }

  const content = document.getElementById('planContent');
  content.innerHTML = '<div class="plan-empty" style="color:var(--accent);">⏳ Plan wird generiert...</div>';

  try {
    const res = await fetch('/api/context-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contextId: proj.id })
    });
    const result = await res.json();
    if (result.ok && result.plan) {
      proj.plan = result.plan;
      renderPlan(proj);
    } else {
      console.error('Plan error:', result.error, result.raw);
      content.innerHTML = `<div class="plan-empty">Plan konnte nicht generiert werden</div>`;
    }
  } catch (e) {
    console.error('Plan refresh error:', e);
    content.innerHTML = `<div class="plan-empty">Fehler bei der Plan-Generierung</div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

(function initContextSearch() {
  const searchInput = document.getElementById('contextSearchInput');
  const searchResults = document.getElementById('searchResults');
  if (!searchInput || !searchResults) return;

  let searchTimer = null;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const query = searchInput.value.trim();
    if (!query) {
      searchResults.classList.remove('active');
      searchResults.innerHTML = '';
      return;
    }
    searchTimer = setTimeout(() => performSearch(query), 300);
  });

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchResults.classList.remove('active');
      searchResults.innerHTML = '';
      searchInput.blur();
    }
  });

  // Close on click outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.sidebar-search')) {
      searchResults.classList.remove('active');
    }
  });

  async function performSearch(query) {
    try {
      const res = await fetch(`${API_BASE}/api/context-search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, limit: 8 })
      });
      const data = await res.json();
      if (!data.ok || !data.results || data.results.length === 0) {
        searchResults.innerHTML = '<div class="search-no-results">Keine Ergebnisse</div>';
        searchResults.classList.add('active');
        return;
      }
      searchResults.innerHTML = data.results.map(r => {
        const ctx = r.context || {};
        const icon = ctx.icon || '';
        const name = ctx.name || r.name || 'Unbekannt';
        const widgetCount = ctx.widgetCount || 0;
        const abstract = r.abstract || `${widgetCount} Widgets`;
        // Truncate abstract for display
        const badge = abstract.length > 80 ? abstract.slice(0, 80) + '...' : abstract;
        return `<div class="search-result-item" data-id="${ctx.id || ''}" style="border-left: 3px solid ${ctx.color || 'var(--accent)'}">
          <div class="sr-name">${icon} ${name}</div>
          <div class="sr-badge">${badge}</div>
        </div>`;
      }).join('');

      // Click handlers
      searchResults.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          const ctxId = el.dataset.id;
          if (ctxId) {
            selectProject(ctxId);
            searchInput.value = '';
            searchResults.classList.remove('active');
            searchResults.innerHTML = '';
          }
        });
      });

      searchResults.classList.add('active');
    } catch (e) {
      console.error('Context search error:', e);
      searchResults.innerHTML = '<div class="search-no-results">Suchfehler</div>';
      searchResults.classList.add('active');
    }
  }
})();

async function loadAndRenderGraph() {

  try {
    const [graphRes, regRes] = await Promise.all([
      fetch(API_BASE + '/api/graphs/' + ctxId).then(r => r.json()),
      fetch(API_BASE + '/api/app-registry').then(r => r.json())
    ]);
    graphCache = graphRes;
    registryCache = regRes;
    renderGraphView();
  } catch (e) {
    console.error('[graph] Load error:', e);
  }
}

function renderGraphView() {
  const g = graphCache;
  const reg = registryCache;
  const nodesEl = document.getElementById('graphNodes');
  const svgEl = document.getElementById('graphSvg');
  const emptyEl = document.getElementById('graphEmpty');

  if (!g || !g.nodes || g.nodes.length === 0) {
    nodesEl.innerHTML = '';
    svgEl.innerHTML = svgEl.querySelector('defs').outerHTML;
    emptyEl.style.display = '';
    return;
  }
  emptyEl.style.display = 'none';

  // Render nodes
  nodesEl.innerHTML = g.nodes.map(n => {
    const app = (reg.apps || []).find(a => a.id === n.appId);
    const manifest = app?.manifest || {};
    const icon = manifest.icon || '📦';
    const name = manifest.name || n.appId;
    const outputs = (manifest.outputs || []).map(o => '<span class="port output" data-app="' + n.appId + '" data-port="' + o.name + '" data-dir="output">' + escapeHtml(o.name) + '</span>').join('');
    const inputs = (manifest.inputs || []).map(i => '<span class="port input" data-app="' + n.appId + '" data-port="' + i.name + '" data-dir="input">' + escapeHtml(i.name) + '</span>').join('');
    const status = (app?.status === 'running') ? 'running' : '';
    return '<div class="graph-node ' + (n.nodeType || '') + '" data-app-id="' + n.appId + '" style="left:' + (n.x || 80) + 'px;top:' + (n.y || 80) + 'px;">' +
      '<div class="node-delete" title="Entfernen">✕</div>' +
      '<div class="node-status-dot ' + status + '"></div>' +
      '<div class="node-icon">' + icon + '</div>' +
      '<div class="node-name">' + escapeHtml(name) + '</div>' +
      '<div class="node-type">' + (n.nodeType || 'app') + '</div>' +
      (outputs || inputs ? '<div class="node-ports">' + outputs + inputs + '</div>' : '') +
      '</div>';
  }).join('');

  // Render edges as curved paths
  renderGraphEdges();

  // Bind node drag (mouse + touch)
  nodesEl.querySelectorAll('.graph-node').forEach(el => {
    el.addEventListener('mousedown', startNodeDrag);
    el.addEventListener('touchstart', startNodeDragTouch, { passive: false });
  });

  // Bind port drag for connections
  nodesEl.querySelectorAll('.port').forEach(portEl => {
    portEl.addEventListener('mousedown', startPortDrag);
  });

  // Bind node delete buttons
  nodesEl.querySelectorAll('.node-delete').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteGraphNode(this.closest('.graph-node').dataset.appId);
    });
  });
}

function renderGraphEdges() {
  const g = graphCache;
  const svgEl = document.getElementById('graphSvg');
  if (!g || !g.edges) return;
  const defsHtml = svgEl.querySelector('defs')?.outerHTML || '';
  // Remove old edge labels
  document.querySelectorAll('.graph-edge-label').forEach(l => l.remove());
  const graphArea = document.getElementById('graphArea');

  const paths = g.edges.map((e, i) => {
    const fromEl = document.querySelector('.graph-node[data-app-id="' + e.from.appId + '"]');
    const toEl = document.querySelector('.graph-node[data-app-id="' + e.to.appId + '"]');
    if (!fromEl || !toEl) return '';
    const fx = parseInt(fromEl.style.left) + 180;
    const fy = parseInt(fromEl.style.top) + 40;
    const tx = parseInt(toEl.style.left);
    const ty = parseInt(toEl.style.top) + 40;
    const dx = Math.abs(tx - fx) * 0.5;
    const d = 'M' + fx + ',' + fy + ' C' + (fx + dx) + ',' + fy + ' ' + (tx - dx) + ',' + ty + ' ' + tx + ',' + ty;
    const edgeId = 'edge-' + i;
    // Edge label
    const mx = (fx + tx) / 2, my = (fy + ty) / 2;
    const label = document.createElement('div');
    label.className = 'graph-edge-label';
    label.style.left = mx + 'px';
    label.style.top = (my - 10) + 'px';
    label.textContent = (e.from.output || '') + ' → ' + (e.to.input || '');
    graphArea?.appendChild(label);
    // Invisible hitbox for clicking + visible path
    return '<path class="edge-hitbox" d="' + d + '" data-edge-idx="' + i + '" data-from="' + e.from.appId + '" data-to="' + e.to.appId + '"/>' +
           '<path class="edge" d="' + d + '" marker-end="url(#arrowhead)" data-from="' + e.from.appId + '" data-to="' + e.to.appId + '" data-edge-idx="' + i + '"/>';
  }).join('');
  svgEl.innerHTML = defsHtml + paths;

  // Bind edge right-click
  svgEl.querySelectorAll('.edge-hitbox, .edge').forEach(el => {
    el.addEventListener('contextmenu', function(ev) {
      ev.preventDefault();
      ev.stopPropagation();
      const idx = parseInt(this.dataset.edgeIdx);
      const edge = graphCache.edges[idx];
      if (!edge) return;
      showGraphContextMenu(ev.clientX, ev.clientY, [
        { label: '🗑 Verbindung löschen', danger: true, action: () => deleteGraphEdge(edge.from.appId, edge.from.output, edge.to.appId, edge.to.input) },
        { label: '📋 ' + edge.from.output + ' → ' + edge.to.input, action: () => {} }
      ]);
    });
  });
}

// --- Port-to-Port Drag & Connect ---
let portDragState = null;

function startPortDrag(e) {
  e.stopPropagation();
  e.preventDefault();
  const port = e.target;
  const dir = port.dataset.dir;
  // Only start drag from output ports
  if (dir !== 'output') return;

  const svgEl = document.getElementById('graphSvg');
  const graphArea = document.getElementById('graphArea');
  const rect = graphArea.getBoundingClientRect();

  port.classList.add('drag-source');
  portDragState = {
    fromApp: port.dataset.app,
    fromPort: port.dataset.port,
    startX: e.clientX - rect.left,
    startY: e.clientY - rect.top
  };

  // Create temp drag line
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.classList.add('drag-line');
  line.setAttribute('x1', portDragState.startX);
  line.setAttribute('y1', portDragState.startY);
  line.setAttribute('x2', portDragState.startX);
  line.setAttribute('y2', portDragState.startY);
  svgEl.appendChild(line);
  portDragState.line = line;

  function onMove(ev) {
    const mx = ev.clientX - rect.left;
    const my = ev.clientY - rect.top;
    line.setAttribute('x2', mx);
    line.setAttribute('y2', my);

    // Highlight input ports under cursor
    document.querySelectorAll('.port.drop-target').forEach(p => p.classList.remove('drop-target'));
    const target = document.elementFromPoint(ev.clientX, ev.clientY);
    if (target && target.classList.contains('port') && target.dataset.dir === 'input' && target.dataset.app !== portDragState.fromApp) {
      target.classList.add('drop-target');
    }
  }

  function onUp(ev) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    line.remove();
    port.classList.remove('drag-source');
    document.querySelectorAll('.port.drop-target').forEach(p => p.classList.remove('drop-target'));

    // Check if dropped on an input port
    const target = document.elementFromPoint(ev.clientX, ev.clientY);
    if (target && target.classList.contains('port') && target.dataset.dir === 'input') {
      const toApp = target.dataset.app;
      const toPort = target.dataset.port;
      if (toApp !== portDragState.fromApp) {
        createGraphEdge(portDragState.fromApp, portDragState.fromPort, toApp, toPort);
      }
    }
    portDragState = null;
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

async function createGraphEdge(fromApp, fromOutput, toApp, toInput) {
  const ctxId = getCtxId();
  if (!ctxId) return;
  // Check for duplicate
  if (graphCache && graphCache.edges.some(e => e.from.appId === fromApp && e.from.output === fromOutput && e.to.appId === toApp && e.to.input === toInput)) return;
  await fetch(API_BASE + '/api/graphs/' + ctxId + '/connect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fromApp, fromOutput, toApp, toInput })
  });
  await loadAndRenderGraph();
}

// --- Context Menu ---
function showGraphContextMenu(x, y, items) {
  document.querySelectorAll('.graph-context-menu').forEach(m => m.remove());
  const menu = document.createElement('div');
  menu.className = 'graph-context-menu';
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.innerHTML = items.map((item, i) =>
    '<div class="menu-item' + (item.danger ? ' danger' : '') + '" data-idx="' + i + '">' + escapeHtml(item.label) + '</div>'
  ).join('');
  document.body.appendChild(menu);
  menu.querySelectorAll('.menu-item').forEach(el => {
    el.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      items[idx].action();
      menu.remove();
    });
  });
  // Close on click outside
  setTimeout(() => {
    document.addEventListener('click', function handler() {
      menu.remove();
      document.removeEventListener('click', handler);
    });
  }, 10);
}

// --- Delete Edge & Node ---
async function deleteGraphEdge(fromApp, fromOutput, toApp, toInput) {
  const ctxId = getCtxId();
  if (!ctxId || !graphCache) return;
  graphCache.edges = graphCache.edges.filter(e =>
    !(e.from.appId === fromApp && e.from.output === fromOutput && e.to.appId === toApp && e.to.input === toInput)
  );
  await saveCurrentGraph();
  renderGraphView();
}

async function deleteGraphNode(appId) {
  if (!graphCache) return;
  graphCache.nodes = graphCache.nodes.filter(n => n.appId !== appId);
  graphCache.edges = graphCache.edges.filter(e => e.from.appId !== appId && e.to.appId !== appId);
  await saveCurrentGraph();
  renderGraphView();
}

// --- Data flow cache for popup ---
const graphDataFlowCache = {};

function showDataFlowPopup(edgeIdx, x, y) {
  document.querySelectorAll('.graph-data-popup').forEach(p => p.remove());
  const edge = graphCache?.edges?.[edgeIdx];
  if (!edge) return;
  const key = edge.from.appId + '.' + edge.from.output + '->' + edge.to.appId + '.' + edge.to.input;
  const cached = graphDataFlowCache[key];
  const popup = document.createElement('div');
  popup.className = 'graph-data-popup';
  const graphArea = document.getElementById('graphArea');
  const rect = graphArea.getBoundingClientRect();
  popup.style.left = (x - rect.left) + 'px';
  popup.style.top = (y - rect.top + 12) + 'px';
  popup.innerHTML = '<div style="font-weight:600;margin-bottom:4px;">' + edge.from.output + ' → ' + edge.to.input + '</div>' +
    (cached ? '<pre>' + escapeHtml(JSON.stringify(cached, null, 2).substring(0, 500)) + '</pre>' : '<div style="color:var(--text-muted);">Noch keine Daten geflossen</div>');
  graphArea.appendChild(popup);
  setTimeout(() => {
    document.addEventListener('click', function handler() {
      popup.remove();
      document.removeEventListener('click', handler);
    });
  }, 10);
}

function startNodeDrag(e) {
  if (e.target.classList.contains('port')) return;
  const node = e.currentTarget;
  node.classList.add('dragging');
  const startX = e.clientX - parseInt(node.style.left);
  const startY = e.clientY - parseInt(node.style.top);
  const appId = node.dataset.appId;

  function onMove(ev) {
    node.style.left = (ev.clientX - startX) + 'px';
    node.style.top = (ev.clientY - startY) + 'px';
    renderGraphEdges();
  }
  function onUp() {
    node.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    // Save position
    if (graphCache) {
      const n = graphCache.nodes.find(n => n.appId === appId);
      if (n) {
        n.x = parseInt(node.style.left);
        n.y = parseInt(node.style.top);
        clearTimeout(graphSaveTimer);
        graphSaveTimer = setTimeout(() => saveCurrentGraph(), 500);
      }
    }
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startNodeDragTouch(e) {
  if (e.target.classList.contains('port') || e.target.classList.contains('node-delete')) return;
  e.preventDefault();
  const touch = e.touches[0];
  const node = e.currentTarget;
  node.classList.add('dragging');
  const startX = touch.clientX - parseInt(node.style.left);
  const startY = touch.clientY - parseInt(node.style.top);
  const appId = node.dataset.appId;

  function onMove(ev) {
    ev.preventDefault();
    const t = ev.touches[0];
    node.style.left = (t.clientX - startX) + 'px';
    node.style.top = (t.clientY - startY) + 'px';
    renderGraphEdges();
  }
  function onEnd() {
    node.classList.remove('dragging');
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    if (graphCache) {
      const n = graphCache.nodes.find(n => n.appId === appId);
      if (n) {
        n.x = parseInt(node.style.left);
        n.y = parseInt(node.style.top);
        clearTimeout(graphSaveTimer);
        graphSaveTimer = setTimeout(() => saveCurrentGraph(), 500);
      }
    }
  }
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

async function saveCurrentGraph() {
  const ctxId = getCtxId();
  if (!graphCache || !ctxId) return;
  await fetch(API_BASE + '/api/graphs/' + ctxId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(graphCache)
  });
}

async function showAddNodeDialog() {
  if (!getCtxId()) return;
  if (!registryCache) registryCache = await fetch(API_BASE + '/api/app-registry').then(r => r.json());
  const existing = graphCache?.nodes?.map(n => n.appId) || [];
  const available = (registryCache.apps || []).filter(a => !existing.includes(a.id));

  const html = available.map(a => {
    const m = a.manifest || {};
    return '<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;" onclick="addNodeToGraph(\'' + a.id + '\')">' +
      '<span>' + (m.icon || '📦') + '</span>' +
      '<span style="font-size:13px;font-weight:500;">' + escapeHtml(m.name || a.id) + '</span>' +
      '<span style="font-size:10px;color:var(--text-muted);margin-left:auto;">' + (m.nodeType || 'app') + '</span>' +
      '</div>';
  }).join('');

  const modal = document.createElement('div');
  modal.id = 'addNodeModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;';
  modal.innerHTML = '<div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;width:360px;max-height:400px;overflow:hidden;display:flex;flex-direction:column;">' +
    '<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"><span style="font-size:14px;font-weight:600;">App zum Graph hinzufuegen</span><button onclick="this.closest(\'#addNodeModal\').remove()" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;">x</button></div>' +
    '<div style="overflow-y:auto;flex:1;">' + (html || '<div style="padding:16px;color:var(--text-muted);text-align:center;">Alle Apps bereits im Graph</div>') + '</div></div>';
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function getCtxId() {
  return state.activeContextId || new URLSearchParams(window.location.search).get('contextId');
}

async function addNodeToGraph(appId) {
  document.getElementById('addNodeModal')?.remove();
  const ctxId = getCtxId();
  if (!ctxId) return;
  // Initialize graph if empty
  if (!graphCache || !graphCache.nodes) {
    graphCache = { projectId: ctxId, nodes: [], edges: [] };
  }
  // Skip if already in graph
  if (graphCache.nodes.some(n => n.appId === appId)) return;
  // Get nodeType from registry
  const app = registryCache?.apps?.find(a => a.id === appId);
  const nodeType = app?.manifest?.nodeType || 'consumer';
  // Position: grid layout, wrap after 3 columns
  const cols = 3, gapX = 220, gapY = 160;
  const idx = graphCache.nodes.length;
  const x = 60 + (idx % cols) * gapX;
  const y = 60 + Math.floor(idx / cols) * gapY;
  graphCache.nodes.push({ appId, nodeType, x, y });
  await saveCurrentGraph();
  renderGraphView();
}

async function runCurrentGraph() {
  const ctxId = getCtxId();
  if (!ctxId) return;
  const result = await fetch(API_BASE + '/api/graphs/' + ctxId + '/run', { method: 'POST' }).then(r => r.json());
  if (result.triggered) {
    result.triggered.forEach(t => {
      const dot = document.querySelector('.graph-node[data-app-id="' + t.appId + '"] .node-status-dot');
      if (dot) { dot.classList.add('running'); setTimeout(() => dot.classList.remove('running'), 3000); }
    });
  }
}

function flashGraphEdge(fromAppId, toAppId) {
  const path = document.querySelector('.graph-svg path.edge[data-from="' + fromAppId + '"][data-to="' + toAppId + '"]');
  if (path) {
    path.classList.add('active');
    setTimeout(() => path.classList.remove('active'), 600);
  }
  // Flash source node status dot
  const dot = document.querySelector('.graph-node[data-app-id="' + fromAppId + '"] .node-status-dot');
  if (dot) { dot.classList.add('running'); setTimeout(() => dot.classList.remove('running'), 2000); }
}
</script>
