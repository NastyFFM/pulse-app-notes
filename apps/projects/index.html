async function sendWidgetCmd(widgetId) {
  const input = document.getElementById('wcmd-input-' + widgetId);
  const status = document.getElementById('wcmd-status-' + widgetId);
  const text = input?.value.trim();
  if (!text || processing) return;
  let lastActions = [];

  const proj = state.activeContext;
  if (!proj) return;
  const widget = (proj.widgets || []).find(w => w.id === widgetId);
  if (!widget) return;

  // Show status
  status.style.display = 'block';
  status.textContent = 'Wird verarbeitet...';
  status.style.color = 'var(--accent)';
  input.disabled = true;

  // Build context message that focuses on this widget
  const widgetData = proj.data[widget.dataKey] || widget.data || {};
  const widgetMeta = { id: widget.id, type: widget.type, title: widget.title, size: widget.size, dataKey: widget.dataKey, config: widget.config || {} };
  const contextMsg = `[Widget-Bearbeitung: "${widget.title}"]\nWidget-Definition: ${JSON.stringify(widgetMeta)}\nAktueller Inhalt (proj.data["${widget.dataKey}"]): ${JSON.stringify(widgetData).slice(0, 1500)}\n\nDu kannst ALLES an diesem Widget aendern:\n- Daten/Inhalt (proj.data["${widget.dataKey}"])\n- Widget-Eigenschaften (title, size, type, config, color)\n- Struktur (Spalten hinzufuegen/entfernen bei Tabellen, neue Items bei Todo/Kanban/Timeline)\n- Widget-Typ komplett aendern (z.B. von table zu kanban)\n\nAnweisung vom User: ${text}`;

  // Add to chat as user message
  proj.chat.push({
    id: 'msg-' + Date.now(),
    role: 'user',
    text: `✏️ ${widget.title}: ${text}`,
    time: new Date().toISOString()
  });
  renderChat();

  // Save before agent call
  await saveImmediate();

  processing = true;
  try {
    let response;
    try {
      response = await callProjectAgent(state.activeContextId, contextMsg);
    } catch (agentErr) {
      console.log('Agent unavailable:', agentErr.message);
      response = { text: 'Agent nicht verfuegbar. Bitte aendere die Daten manuell.', widgetActions: [] };
    }

    if (response._fromAgent) {
      // Reload context from API
      await selectProject(state.activeContextId);
      const freshProj = state.activeContext;
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    await saveImmediate();

    lastActions = response?.widgetActions || [];
    status.textContent = 'Erledigt!';
    status.style.color = 'var(--green)';
    input.value = '';
    setTimeout(() => {
      status.style.display = 'none';
      document.getElementById('wcmd-' + widgetId).style.display = 'none';
    }, 1500);

  } catch (e) {
    status.textContent = 'Fehler: ' + e.message;
    status.style.color = 'var(--red)';
  }

  processing = false;
  input.disabled = false;
  renderChat();
  renderCanvas();
  highlightAiChanges(lastActions);
}

function resizeWidget(widgetId) {
  const proj = state.activeContext;
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  const sizes = ['sm', 'md', 'lg', 'full'];
  const idx = sizes.indexOf(w.size || 'md');
  w.size = sizes[(idx + 1) % sizes.length];
  logChange(proj, `↔️ Widget "${w.title}" Groesse geaendert zu ${w.size}`);
  save();
  renderCanvas();
}

// ── Chat: Send Message ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || processing) return;

  const proj = state.activeContext;
  if (!proj) return;

  // Add user message
  const userMsg = {
    id: 'msg-' + Date.now(),
    role: 'user',
    text,
    time: new Date().toISOString()
  };
  proj.chat.push(userMsg);
  input.value = '';
  input.style.height = '42px';
  renderChat();

  // Save immediately (not debounced) so the server has the user message before agent call
  await saveImmediate();

  // Show typing
  processing = true;
  document.getElementById('typingIndicator').classList.add('visible');
  document.getElementById('btnSend').disabled = true;
  let lastWidgetActions = [];

  try {
    // Try AI agent first, fall back to local pattern matching
    let response;
    try {
      response = await callProjectAgent(state.activeContextId, text);
    } catch (agentErr) {
      console.log('Agent unavailable, using local fallback:', agentErr.message);
      response = await processProjectMessage(text, proj);
    }

    // If agent responded, reload context from API
    if (response._fromAgent) {
      await selectProject(state.activeContextId);
      const freshProj = state.activeContext;
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      // Local fallback: add response to current proj
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    lastWidgetActions = response.widgetActions || [];

    // Save with immediate flush
    await saveImmediate();

  } catch (e) {
    proj.chat.push({
      id: 'msg-err-' + Date.now(),
      role: 'system',
      text: 'Fehler: ' + e.message,
      time: new Date().toISOString()
    });
    save();
  }

  processing = false;
  document.getElementById('typingIndicator').classList.remove('visible');
  document.getElementById('btnSend').disabled = false;
  renderChat();
  renderCanvas();
  highlightAiChanges(lastWidgetActions);
  document.getElementById('projectSub').textContent = `${(state.activeContext?.widgets || []).length} Widgets`;
}

// ── AI Agent Call ──
async function callProjectAgent(projectId, text) {
  const res = await fetch('/api/context-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contextId: projectId, text })
  });

  if (!res.ok) throw new Error('Agent request failed');

  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Agent error');

  return {
    text: data.text,
    widgetActions: data.widgetActions || [],
    _fromAgent: true
  };
}

// ── Widget Detection Engine ──
// Analyzes chat messages and creates appropriate widgets
async function processProjectMessage(text, proj) {
  const lower = text.toLowerCase();
  const widgetActions = [];
  let responseText = '';

  // ── Widget creation patterns ──
  const patterns = [
    {
      match: /todo[s\-]?|aufgabe|task|checkliste|to-do/i,
      create: () => ({
        type: 'todo',
        title: extractTitle(text, 'Aufgaben'),
        size: 'md',
        dataKey: 'todos-' + Date.now(),
        data: { items: extractListItems(text) }
      }),
      label: 'Todo-Liste erstellt'
    },
    {
      match: /\bnotiz|\bnote\b|beschreibung|dokument/i,
      create: () => ({
        type: 'notes',
        title: extractTitle(text, 'Notizen'),
        size: 'md',
        dataKey: 'notes-' + Date.now(),
        data: { text: '' }
      }),
      label: 'Notiz erstellt'
    },
    {
      match: /tabelle|table|\buebersicht\b|vergleich/i,
      create: () => ({
        type: 'table',
        title: extractTitle(text, 'Tabelle'),
        size: 'lg',
        dataKey: 'table-' + Date.now(),
        config: {},
        data: { rows: [] }
      }),
      label: 'Tabelle erstellt'
    },
    {
      match: /timeline|zeitstrahl|\bablauf\b|chronolog|meilenstein|milestone|zeitplan/i,
      create: () => ({
        type: 'timeline',
        title: extractTitle(text, 'Timeline'),
        size: 'md',
        dataKey: 'timeline-' + Date.now(),
        data: { items: [] }
      }),
      label: 'Timeline erstellt'
    },
    {
      match: /kanban|board|spalten|workflow/i,
      create: () => ({
        type: 'kanban',
        title: extractTitle(text, 'Board'),
        size: 'lg',
        dataKey: 'kanban-' + Date.now(),
        data: { columns: [
          { id: 'todo', name: 'To Do', items: [] },
          { id: 'doing', name: 'In Arbeit', items: [] },
          { id: 'done', name: 'Erledigt', items: [] }
        ]}
      }),
      label: 'Kanban Board erstellt'
    },
    {
      match: /kpi|metrik|statistik|zahl|counter|zaehler/i,
      create: () => ({
        type: 'kpi',
        title: extractTitle(text, 'KPI'),
        size: 'sm',
        dataKey: 'kpi-' + Date.now(),
        data: { value: '0', label: extractTitle(text, 'Metrik') }
      }),
      label: 'KPI Widget erstellt'
    },
    {
      match: /link|resource|url|quelle|referenz/i,
      create: () => ({
        type: 'links',
        title: extractTitle(text, 'Links'),
        size: 'sm',
        dataKey: 'links-' + Date.now(),
        data: { links: [] }
      }),
      label: 'Link-Sammlung erstellt'
    },
    {
      match: /fortschritt|progress|prozent/i,
      create: () => ({
        type: 'progress',
        title: extractTitle(text, 'Fortschritt'),
        size: 'sm',
        dataKey: 'progress-' + Date.now(),
        data: { percent: 0, label: extractTitle(text, 'Fortschritt') }
      }),
      label: 'Fortschrittsanzeige erstellt'
    }
  ];

  let created = [];
  for (const p of patterns) {
    if (p.match.test(lower)) {
      const widget = p.create();
      widget.id = 'w-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
      widget.color = proj.color;

      // Store data in project
      if (widget.data && widget.dataKey) {
        proj.data[widget.dataKey] = widget.data.items || widget.data.columns || widget.data.rows || widget.data.links || widget.data;
      }

      if (!proj.widgets) proj.widgets = [];
      proj.widgets.push(widget);
      // Keep canvas.widgets in sync
      proj.canvas = { widgets: proj.widgets };
      created.push(widget);
      widgetActions.push({ icon: getWidgetIcon(widget.type), label: p.label });
    }
  }

  // ── Smart responses ──
  if (created.length > 0) {
    const names = created.map(w => `${getWidgetIcon(w.type)} ${w.title}`).join(', ');
    responseText = `Ich habe ${created.length} Widget${created.length > 1 ? 's' : ''} erstellt: ${names}.\n\nDu kannst sie rechts im Canvas sehen und direkt bearbeiten. Sag mir wenn du mehr brauchst!`;
  } else if (/hilfe|help|was kannst/i.test(lower)) {
    responseText = `Ich kann diese Widgets fuer dich erstellen:\n\n` +
      `• "Todo-Liste" — Aufgaben mit Checkboxen\n` +
      `• "Notiz" — Freitext-Notizen\n` +
      `• "Tabelle" — Daten in Spalten\n` +
      `• "Timeline" — Zeitstrahl mit Events\n` +
      `• "Kanban" — Board mit Spalten\n` +
      `• "KPI" — Zahlen/Metriken\n` +
      `• "Links" — URL-Sammlung\n` +
      `• "Fortschritt" — Prozentanzeige\n\n` +
      `Beschreibe einfach was du brauchst!`;
  } else if (/projekt|umbenennen|name/i.test(lower) && /aender|umbenen|nenn/i.test(lower)) {
    const newName = text.replace(/.*(?:nenn|aender|umbenen)[^\w]*(?:zu|in|auf)?\s*/i, '').replace(/['"]/g, '').trim();
    if (newName && newName.length < 50) {
      proj.name = newName;
      document.getElementById('projectName').value = newName;
      renderProjectList();
      responseText = `Projekt umbenannt zu "${newName}".`;
    } else {
      responseText = 'Wie soll das Projekt heissen?';
    }
  } else if (/unterprojekt|subprojekt|kindprojekt|verschachtel/i.test(lower)) {
    createProject(proj.id);
    responseText = 'Unterprojekt erstellt! Du findest es in der Sidebar unter diesem Projekt.';
    widgetActions.push({ icon: '📂', label: 'Unterprojekt erstellt' });
  } else {
    // Generic response — try to be helpful
    responseText = `Ich habe deine Nachricht verstanden. Um Widgets zu erstellen, verwende Begriffe wie:\n` +
      `"Erstelle eine Todo-Liste", "Ich brauche ein Kanban Board", "Mach eine Tabelle", etc.\n\n` +
      `Oder sag "Hilfe" fuer alle Optionen.`;

    // Try to also send to the PulseOS event bus for action chain routing
    try {
      fetch('/api/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'chat:message',
          source: 'project:' + proj.id,
          data: { text, projectId: proj.id, projectName: proj.name }
        })
      });
    } catch {}
  }

  return { text: responseText, widgetActions };
}

// ── Perspective Switch ──
function getAvailableRenders(widget) {
  const type = widget.type;
  if (type === 'todo' || type === 'kanban' || type === 'table') {
    return ['todo', 'kanban', 'table'];
  }
  if (type === 'timeline') return ['timeline', 'table'];
  if (type === 'links') return ['links', 'table'];
  if (type === 'kpi') return ['kpi'];
  if (type === 'notes') return ['notes'];
  if (type === 'progress') return ['progress'];
  if (type === 'context') return ['context'];
  return [type];
}

function cyclePerspective(widgetId) {
  const proj = getProject(state.activeContextId);
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  const renders = getAvailableRenders(w);
  if (renders.length <= 1) return;
  const currentRender = w.renderAs || w.type;
  const idx = renders.indexOf(currentRender);
  w.renderAs = renders[(idx + 1) % renders.length];
  save();
  renderCanvas();
}

// ── Zoom Level ──
function cycleZoom(widgetId) {
  const proj = getProject(state.activeContextId);
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  const levels = ['L0', 'L1', 'L2'];
  const idx = levels.indexOf(w.zoomLevel || 'L1');
  w.zoomLevel = levels[(idx + 1) % 3];
  save();
  renderCanvas();
}

function getL0Badge(widget, proj) {
  const data = proj.data?.[widget.dataKey] || widget.data || {};
  switch (widget.type) {
    case 'todo': {
      const items = proj.data?.[widget.dataKey] || widget.data?.items || [];
      const done = Array.isArray(items) ? items.filter(i => i.done).length : 0;
      const total = Array.isArray(items) ? items.length : 0;
      return `${done}/${total} ✓`;
    }
    case 'kpi': {
      const kpiData = proj.data?.[widget.dataKey] || widget.data || {};
      return kpiData.value ?? '—';
    }
    case 'table': {
      const rows = proj.data?.[widget.dataKey] || widget.data?.rows || [];
      return `${Array.isArray(rows) ? rows.length : 0} Zeilen`;
    }
    case 'kanban': {
      const kanbanData = proj.data?.[widget.dataKey] || widget.data || {};
      const cols = kanbanData.columns || [];
      return cols.map(c => (c.items || []).length).join('/');
    }
    case 'notes': {
      const noteData = proj.data?.[widget.dataKey] || widget.data || {};
      const txt = noteData.text || '';
      return txt.slice(0, 30) + (txt.length > 30 ? '…' : '');
    }
    case 'context': {
      const refCtx = state.contexts.find(c => c.id === widget.contextRef);
      return refCtx ? `${refCtx.widgetCount || 0} W` : '—';
    }
    case 'timeline': {
      const tItems = proj.data?.[widget.dataKey] || widget.data?.items || [];
      return `${Array.isArray(tItems) ? tItems.length : 0} Items`;
    }
    default:
      return '';
  }
}

// ── Helpers ──
function extractTitle(text, fallback) {
  // Try to extract a quoted title first
  const quoted = text.match(/["']([^"']{2,30})["']/);
  if (quoted) return quoted[1].trim();
  // Otherwise use fallback (widget type label)
  return fallback;
}

function extractListItems(text) {
  // Try to extract items from text like "Todo: Einkaufen, Putzen, Kochen"
  const colonMatch = text.match(/:\s*(.+)/);
  if (colonMatch) {
    const items = colonMatch[1].split(/[,;]+/).map(s => s.trim()).filter(Boolean);
    if (items.length > 1) {
      return items.map((t, i) => ({ id: 't-' + Date.now() + '-' + i, text: t, done: false }));
    }
  }
  return [];
}

function getWidgetIcon(type) {
  const icons = { todo: '✅', notes: '📝', table: '📊', timeline: '⏱️', kpi: '📈', kanban: '📋', links: '🔗', progress: '📉', text: '📄', context: '📂' };
  return icons[type] || '🧩';
}

function getWidgetLabel(type) {
  const labels = { todo: 'Aufgaben', notes: 'Notizen', table: 'Tabelle', timeline: 'Timeline', kpi: 'KPI', kanban: 'Board', links: 'Links', progress: 'Fortschritt', text: 'Text', context: 'Kontext' };
  return labels[type] || type;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTime(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

// ── Templates ──
async function openTemplateModal() {
  const modal = document.getElementById('templateModal');
  modal.style.display = 'flex';

  try {
    const res = await fetch('/api/project-templates');
    const data = await res.json();
    const list = document.getElementById('templateList');
    const templates = data.templates || [];

    if (templates.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">Keine Templates vorhanden. Erstelle ein leeres Projekt!</div>';
      return;
    }

    const icons = { todo: '✅', notes: '📝', table: '📊', timeline: '⏱️', kpi: '📈', kanban: '📋', links: '🔗', progress: '📉' };
    list.innerHTML = templates.map(tpl => `
      <div class="tpl-card" onclick="createFromTemplate('${tpl.id}')">
        <div class="tpl-icon" style="background:${tpl.color}22">${tpl.icon}</div>
        <div class="tpl-info">
          <div class="tpl-name">${escapeHtml(tpl.name)}</div>
          <div class="tpl-desc">${escapeHtml(tpl.description || '')}</div>
          <div class="tpl-widgets">
            ${tpl.widgets.map(w => `<span>${icons[w.type] || '🧩'} ${w.title}</span>`).join('')}
          </div>
          ${tpl.usageCount > 0 ? `<div class="tpl-usage">${tpl.usageCount}x verwendet</div>` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Template load error:', e);
  }
}

function closeTemplateModal() {
  document.getElementById('templateModal').style.display = 'none';
}

async function createFromTemplate(templateId) {
  closeTemplateModal();
  try {
    const res = await fetch('/api/project-from-template', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ templateId })
    });
    const data = await res.json();
    if (data.ok) {
      await load();
      selectProject(data.projectId);
    }
  } catch (e) {
    console.error('Template creation error:', e);
  }
}

async function saveAsTemplate() {
  const proj = state.activeContext;
  if (!proj || (proj.widgets || []).length === 0) {
    alert('Dieses Projekt hat keine Widgets — nichts zum Speichern als Template.');
    return;
  }

  try {
    const res = await fetch('/api/project-save-as-template', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId: proj.id })
    });
    const data = await res.json();
    if (data.ok) {
      // Add system message
      proj.chat.push({
        id: 'msg-tpl-' + Date.now(),
        role: 'system',
        text: `Projekt als Template "${data.name}" gespeichert! Du kannst es bei neuen Projekten wiederverwenden.`,
        time: new Date().toISOString()
      });
      save();
      renderChat();
    }
  } catch (e) {
    console.error('Save template error:', e);
  }
}

// Close modal on backdrop click
document.getElementById('templateModal').addEventListener('click', function(e) {

});

// ── Plan Panel ──
function togglePlan() {
  const toggle = document.getElementById('planToggle');
  const panel = document.getElementById('planPanel');
  toggle.classList.toggle('open');
  panel.classList.toggle('open');
}

function renderPlan(proj) {
  const content = document.getElementById('planContent');
  const status = document.getElementById('planStatus');
  if (!proj || !proj.plan) {
    content.innerHTML = '<div class="plan-empty">Klicke 🔄 um einen Plan zu generieren</div>';
    status.textContent = '—';
    return;
  }

  const plan = proj.plan;
  status.textContent = plan.status || '—';

  let html = '';

  // Render phases
  if (plan.phases && plan.phases.length > 0) {
    for (const phase of plan.phases) {
      const cls = phase.state === 'done' ? 'done' : phase.state === 'active' ? 'active' : '';
      const icon = phase.state === 'done' ? '✅' : phase.state === 'active' ? '▶' : '⬜';
      html += `<div class="plan-phase ${cls}">`;
      html += `<div class="phase-title">${icon} ${phase.title}</div>`;
      if (phase.items && phase.items.length > 0) {
        html += '<div class="phase-items">';
        for (const item of phase.items) {
          const itemCls = item.done ? 'done' : '';
          html += `<div class="phase-item ${itemCls}">${item.done ? '☑' : '☐'} ${item.text}</div>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }
  }

  // Render subproject statuses
  const children = state.contexts.filter(c => c.parentId === proj.id);
  if (children.length > 0) {
    html += '<div style="margin-top:10px;font-weight:600;font-size:11px;color:var(--text-muted);margin-bottom:4px;">UNTERPROJEKTE</div>';
    for (const child of children) {
      const wCount = child.widgetCount || 0;
      html += `<div class="subproject-status">
        <span class="sp-name">${child.icon || '🧩'} ${child.name}</span>
        <span style="float:right;color:var(--text-muted);">${wCount} Widgets</span>
      </div>`;
    }
  }

  if (plan.summary) {
    html += `<div style="margin-top:10px;padding:8px;border-radius:6px;background:var(--bg-secondary);font-size:11px;color:var(--text-muted);">${plan.summary}</div>`;
  }

  content.innerHTML = html || '<div class="plan-empty">Plan ist leer</div>';
}

async function refreshPlan() {
  const proj = state.activeContext;
  if (!proj) return;

  const btn = document.getElementById('btnRefreshPlan');
  btn.classList.add('spinning');

  // Open the plan panel if closed
  const panel = document.getElementById('planPanel');
  const toggle = document.getElementById('planToggle');
  if (!panel.classList.contains('open')) {
    panel.classList.add('open');
    toggle.classList.add('open');
  }

  const content = document.getElementById('planContent');
  content.innerHTML = '<div class="plan-empty" style="color:var(--accent);">⏳ Plan wird generiert...</div>';

  try {
    const res = await fetch('/api/context-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contextId: proj.id })
    });
    const result = await res.json();
    if (result.ok && result.plan) {
      proj.plan = result.plan;
      renderPlan(proj);
    } else {
      console.error('Plan error:', result.error, result.raw);
      content.innerHTML = `<div class="plan-empty">Plan konnte nicht generiert werden</div>`;
    }
  } catch (e) {
    console.error('Plan refresh error:', e);
    content.innerHTML = `<div class="plan-empty">Fehler bei der Plan-Generierung</div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── Context Search (Viking) ──
(function initContextSearch() {
  const searchInput = document.getElementById('contextSearchInput');
  const searchResults = document.getElementById('searchResults');
  if (!searchInput || !searchResults) return;

  let searchTimer = null;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const query = searchInput.value.trim();
    if (!query) {
      searchResults.classList.remove('active');
      searchResults.innerHTML = '';
      return;
    }
    searchTimer = setTimeout(() => performSearch(query), 300);
  });

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchResults.classList.remove('active');
      searchResults.innerHTML = '';
      searchInput.blur();
    }
  });

  // Close on click outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.sidebar-search')) {
      searchResults.classList.remove('active');
    }
  });

  async function performSearch(query) {
    try {
      const res = await fetch(`${API_BASE}/api/context-search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, limit: 8 })
      });
      const data = await res.json();
      if (!data.ok || !data.results || data.results.length === 0) {
        searchResults.innerHTML = '<div class="search-no-results">Keine Ergebnisse</div>';
        searchResults.classList.add('active');
        return;
      }
      searchResults.innerHTML = data.results.map(r => {
        const ctx = r.context || {};
        const icon = ctx.icon || '';
        const name = ctx.name || r.name || 'Unbekannt';
        const widgetCount = ctx.widgetCount || 0;
        const abstract = r.abstract || `${widgetCount} Widgets`;
        // Truncate abstract for display
        const badge = abstract.length > 80 ? abstract.slice(0, 80) + '...' : abstract;
        return `<div class="search-result-item" data-id="${ctx.id || ''}" style="border-left: 3px solid ${ctx.color || 'var(--accent)'}">
          <div class="sr-name">${icon} ${name}</div>
          <div class="sr-badge">${badge}</div>
        </div>`;
      }).join('');

      // Click handlers
      searchResults.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          const ctxId = el.dataset.id;
          if (ctxId) {
            selectProject(ctxId);
            searchInput.value = '';
            searchResults.classList.remove('active');
            searchResults.innerHTML = '';
          }
        });
      });

      searchResults.classList.add('active');
    } catch (e) {
      console.error('Context search error:', e);
      searchResults.innerHTML = '<div class="search-no-results">Suchfehler</div>';
      searchResults.classList.add('active');
    }
  }
})();
