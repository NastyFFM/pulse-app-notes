<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<style>
:root {
  --bg-base: #0f172a;
  --bg-primary: #1e293b;
  --bg-secondary: #334155;
  --bg-tertiary: #475569;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #8B5CF6;
  --accent-hover: #7C3AED;
  --accent-dim: rgba(139,92,246,0.15);
  --border: #334155;
  --border-light: #475569;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --radius: 10px;
  --sidebar-w: 240px;
  --chat-w: 380px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h2 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-new {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.btn-new:hover { background: var(--accent); color: white; }

/* ── Sidebar Search ── */
.sidebar-search {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 10px 7px 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-muted); }
.sidebar-search .search-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--text-muted);
  pointer-events: none;
}
.search-results {
  position: absolute;
  top: 100%;
  left: 8px;
  right: 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}
.search-results.active { display: block; }
.search-result-item {
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg-secondary); }
.search-result-item .sr-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-result-item .sr-badge {
  font-size: 11px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.search-no-results {
  padding: 12px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.project-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.15s;
  margin-bottom: 2px;
  position: relative;
}
.project-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
.project-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.project-item .icon { font-size: 16px; }
.project-item .badge {
  position: absolute;
  right: 8px;
  font-size: 10px;
  background: var(--bg-secondary);
  padding: 1px 6px;
  border-radius: 10px;
  color: var(--text-muted);
}
.project-item.nested { padding-left: 28px; font-size: 12px; }
.project-item .delete-btn {
  display: none;
  position: absolute;
  right: 8px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
}
.project-item:hover .delete-btn { display: block; }
.project-item:hover .badge { display: none; }

/* ── Chat Panel ── */
.chat-panel {
  width: var(--chat-w);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-header .project-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.chat-header-info { flex: 1; }
.chat-header-info .name {
  font-size: 14px;
  font-weight: 600;
}
.chat-header-info .name-input {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  width: 100%;
  outline: none;
}
.chat-header-info .name-input:focus {
  border-bottom: 1px solid var(--accent);
}
.chat-header-info .sub {
  font-size: 11px;
  color: var(--text-muted);
}

/* ── Breadcrumb Navigation ── */
.breadcrumb-bar {
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  display: none;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-secondary);
}
.breadcrumb-bar.visible { display: flex; }
.breadcrumb-bar .bc-item {
  cursor: pointer;
  color: var(--text-muted);
  background: none;
  border: none;
  font-family: var(--font);
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all .15s;
}
.breadcrumb-bar .bc-item:hover { color: var(--accent); background: var(--accent-dim); }
.breadcrumb-bar .bc-sep { color: var(--text-muted); opacity: .5; }
.breadcrumb-bar .bc-current { color: var(--text-primary); font-weight: 500; }

/* ── Subproject Button ── */
.btn-subproject {
  background: none;
  border: 1px dashed var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-family: var(--font);
  padding: 4px 8px;
  margin: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  width: calc(100% - 24px);
  transition: all .15s;
}
.btn-subproject:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── Plan Panel ── */
.plan-panel {
  border-bottom: 1px solid var(--border);
  background: var(--bg-primary);
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.plan-panel.open { max-height: 400px; overflow-y: auto; }
.plan-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-primary);
  user-select: none;
  transition: background .15s;
}
.plan-toggle:hover { background: var(--bg-secondary); }
.plan-toggle .arrow { font-size: 10px; transition: transform .2s; }
.plan-toggle.open .arrow { transform: rotate(90deg); }
.plan-toggle .plan-label { flex: 1; font-weight: 500; }
.plan-toggle .plan-status {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-dim);
  color: var(--accent);
}
.plan-toggle .btn-refresh {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all .15s;
}
.plan-toggle .btn-refresh:hover { color: var(--accent); background: var(--accent-dim); }
.plan-toggle .btn-refresh.spinning { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.plan-content {
  padding: 12px 16px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.plan-content .plan-phase {
  margin-bottom: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--bg-secondary);
  border-left: 3px solid var(--border);
}
.plan-content .plan-phase.active { border-left-color: var(--accent); background: var(--accent-dim); }
.plan-content .plan-phase.done { border-left-color: var(--green); opacity: .7; }
.plan-content .plan-phase .phase-title {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 12px;
  margin-bottom: 4px;
}
.plan-content .plan-phase .phase-items { padding-left: 12px; }
.plan-content .plan-phase .phase-item { margin: 2px 0; }
.plan-content .plan-phase .phase-item.done { text-decoration: line-through; opacity: .6; }
.plan-content .subproject-status {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--bg-secondary);
  font-size: 11px;
}
.plan-content .subproject-status .sp-name { font-weight: 500; color: var(--text-primary); }
.plan-content .plan-empty {
  text-align: center;
  padding: 16px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Subproject Cards ── */
.subproject-card {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.subproject-card:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-2px); }
.subproject-card .sp-header { display: flex; align-items: center; gap: 8px; }
.subproject-card .sp-icon { font-size: 20px; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.subproject-card .sp-name { font-weight: 600; font-size: 14px; }
.subproject-card .sp-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; }
.subproject-card .sp-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--bg-secondary); color: var(--text-secondary); }
.subproject-card .sp-widgets { font-size: 11px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.subproject-card .sp-widgets .sp-wtag { background: var(--bg-secondary); padding: 1px 6px; border-radius: 4px; font-size: 10px; }
.subprojects-section { margin-top: 8px; }
.subprojects-section .sp-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding: 0 4px; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 92%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.agent, .msg.system {
  align-self: flex-start;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}
.msg.system {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 12px;
  max-width: 100%;
  text-align: center;
  border-radius: 8px;
}
.msg .time {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  display: block;
}
.msg.agent .time, .msg.system .time { color: var(--text-muted); }

.msg .widget-action {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  margin-top: 6px;
}

.typing-indicator {
  align-self: flex-start;
  padding: 12px 18px;
  background: var(--bg-secondary);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  display: none;
}
.typing-indicator.visible { display: flex; gap: 4px; }
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-muted); }

.btn-send {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.btn-send:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ── Widget Canvas ── */
.canvas-area {
  flex: 1;
  background: var(--bg-base);
  overflow: auto;
  position: relative;
}

.canvas-empty {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text-muted);
}
.canvas-empty .icon { font-size: 48px; margin-bottom: 12px; }
.canvas-empty .title { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
.canvas-empty .sub { font-size: 12px; max-width: 280px; }

.canvas-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 20px;
  align-content: flex-start;
}

/* ── Widgets ── */
.widget-frame {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.2s;
  position: relative;
  min-width: 280px;
}
.widget-frame:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.widget-frame.size-sm { width: 280px; }
.widget-frame.size-md { width: 380px; }
.widget-frame.size-lg { width: 580px; }
.widget-frame.size-full { width: 100%; }

/* Zoom Levels */
.widget-frame.zoom-l0 {
  max-height: 44px;
  overflow: hidden;
}
.widget-frame.zoom-l0 .widget-body { display: none; }
.widget-frame.zoom-l0 .widget-cmd { display: none !important; }
.widget-frame.zoom-l0 .widget-head .actions { display: none; }
.widget-frame.zoom-l0 .widget-head .label { font-size: 12px; }

.widget-frame.zoom-l2 {
  grid-column: 1 / -1;
}

.widget-zoom-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-zoom-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

.widget-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: grab;
  user-select: none;
}
.widget-head .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.widget-head .label {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.widget-head .actions {
  display: flex;
  gap: 4px;
}
.widget-head .actions button {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.widget-head .actions button:hover { background: var(--bg-secondary); color: var(--text-primary); }

/* AI Change Highlight */
@keyframes aiGlow {
  0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.5); }
  50% { box-shadow: 0 0 20px 4px rgba(139,92,246,0.3); }
  100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.0); }
}
.widget-frame.ai-changed {
  animation: aiGlow 1.5s ease-out;
  border-color: var(--accent) !important;
  transition: border-color 3s ease;
}
.widget-change-banner {
  padding: 8px 12px;
  background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1));
  border-bottom: 1px solid rgba(139,92,246,0.3);
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: flex-start;
  gap: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
.widget-change-banner:hover { background: rgba(139,92,246,0.2); }
.widget-change-banner .change-icon { color: var(--accent); flex-shrink: 0; }
.widget-change-banner .change-text { flex: 1; line-height: 1.4; }
.widget-change-banner .change-dismiss {
  color: var(--text-muted); cursor: pointer; font-size: 14px;
  background: none; border: none; padding: 0; flex-shrink: 0;
}
.widget-change-banner .change-dismiss:hover { color: var(--text-primary); }

.widget-body {
  padding: 12px 14px;
  flex: 1;
  overflow: auto;
  max-height: 400px;
}

/* Widget: Todo List */
.w-todo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.w-todo-item:last-child { border: none; }
.w-todo-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.w-todo-item.done .text { text-decoration: line-through; color: var(--text-muted); }
.w-todo-item .text { flex: 1; }
.w-todo-item .priority {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 6px;
  font-weight: 500;
}
.w-todo-item .priority.high { background: rgba(239,68,68,0.15); color: var(--red); }
.w-todo-item .priority.medium { background: rgba(245,158,11,0.15); color: var(--amber); }
.w-todo-item .priority.low { background: rgba(34,197,94,0.15); color: var(--green); }
.w-todo-add {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.w-todo-add input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
  font-family: var(--font);
}
.w-todo-add input:focus { border-color: var(--accent); }
.w-todo-add button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 12px;
  cursor: pointer;
}

/* Widget: Notes */
.w-note-content {
  min-height: 80px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
  outline: none;
  padding: 4px;
  border-radius: 4px;
}
.w-note-content:focus {
  background: var(--bg-secondary);
}
.w-note-content[contenteditable]:empty:before {
  content: 'Notiz schreiben...';
  color: var(--text-muted);
}

/* Widget: Table */
.w-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.w-table th {
  text-align: left;
  padding: 6px 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);

</head>
<body>

<!-- Sidebar: Project List -->
<div class="sidebar">

<!-- Widget Canvas -->

  <!-- Pending changes button -->
  <button id="pendingBtn" onclick="commitChanges()" style="display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;border:1px solid var(--accent);background:var(--accent);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);z-index:102;box-shadow:0 4px 20px rgba(139,92,246,0.4);transition:all 0.2s;display:none;align-items:center;gap:8px;">

  </button>
  <!-- Closed widgets toggle -->

<!-- Template Picker Modal -->
<div id="templateModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;align-items:center;justify-content:center;">
  <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:16px;width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">

    </div>

      <!-- Templates rendered here -->
    </div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button onclick="createProject()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;cursor:pointer;font-family:var(--font);">
        📝 Leeres Projekt
      </button>
      <button onclick="closeTemplateModal()" style="padding:10px 16px;border-radius:8px;border:none;background:var(--bg-secondary);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:var(--font);">
        Abbrechen
      </button>
    </div>

<script>
// ── State ──
// contexts: L0 list from /api/contexts (id, name, icon, color, parentId, widgetCount)
// activeContextId: currently selected context ID
// activeContext: full context object from /api/context/:id
let state = { contexts: [], activeContextId: null, activeContext: null, inheritedWidgets: [], inheritedData: {}, inheritedSources: [] };
let saving = false;
let saveTimeout = null;
let saveVersion = 0; // track save generation to ignore stale SSE reloads
let processing = false;

const API_BASE = '';

// Compatibility: getProject(id) returns the active context if id matches
function getProject(id) {
  if (id === state.activeContextId && state.activeContext) return state.activeContext;
  return null;
}

// ── Load / Save ──
async function load() {
  try {
    const res = await fetch(`${API_BASE}/api/contexts`);
    const data = await res.json();
    state.contexts = data.contexts || [];
    // Normalize: ensure each context has canvas-like structure for badge display
    for (const c of state.contexts) {
      if (!c.canvas) c.canvas = { widgets: [] };
      // widgetCount comes from L0 data
      c.canvas.widgets = new Array(c.widgetCount || 0);
    }
    renderProjectList();
    if (state.activeContextId) {
      await selectProject(state.activeContextId);
    } else if (state.contexts.length > 0) {
      await selectProject(state.contexts[0].id);
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}

// Reload only the context list (L0) without re-selecting
async function reloadContextList() {
  try {
    const res = await fetch(`${API_BASE}/api/contexts`);
    const data = await res.json();
    state.contexts = data.contexts || [];
    for (const c of state.contexts) {
      if (!c.canvas) c.canvas = { widgets: [] };
      c.canvas.widgets = new Array(c.widgetCount || 0);
    }
    renderProjectList();
  } catch (e) {
    console.error('Reload context list error:', e);
  }
}

function save() {
  if (!state.activeContextId || !state.activeContext) return;
  clearTimeout(saveTimeout);
  const myVersion = ++saveVersion;
  saveTimeout = setTimeout(async () => {
    if (saving) return;
    saving = true;
    try {
      await fetch(`${API_BASE}/api/context/${state.activeContextId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state.activeContext)
      });
      // Also update the L0 entry in state.contexts
      const idx = state.contexts.findIndex(c => c.id === state.activeContextId);
      if (idx >= 0) {
        state.contexts[idx].name = state.activeContext.name;
        state.contexts[idx].icon = state.activeContext.icon;
        state.contexts[idx].color = state.activeContext.color;
        state.contexts[idx].widgetCount = (state.activeContext.widgets || []).length;
        state.contexts[idx].canvas = { widgets: state.activeContext.widgets || [] };
      }
    } catch (e) { console.error('Save error:', e); }
    // Keep saving=true for a short window to ignore SSE bounce-back
    setTimeout(() => { if (saveVersion === myVersion) saving = false; }, 500);
  }, 200);
}

// Immediate save (no debounce) - used before agent calls
async function saveImmediate() {
  if (!state.activeContextId || !state.activeContext) return;
  const myVersion = ++saveVersion;
  saving = true;
  try {
    await fetch(`${API_BASE}/api/context/${state.activeContextId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.activeContext)
    });
  } catch (e) { console.error('Save error:', e); }
  setTimeout(() => { if (saveVersion === myVersion) saving = false; }, 800);
}

// ── SSE Live Sync ──
function connectSSE() {
  const es = new EventSource(`${API_BASE}/sse/liveos`);
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'context-change' && !saving) {
        reloadContextList();
        if (d.contextId === state.activeContextId) {
          selectProject(state.activeContextId);
        }
      }
      if (d.type === 'context-deleted' && d.contextId === state.activeContextId) {
        state.activeContextId = null;
        state.activeContext = null;
        reloadContextList().then(() => {
          if (state.contexts.length > 0) selectProject(state.contexts[0].id);
        });
      }
    } catch {}
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

// ── Project CRUD (now backed by Context API) ──

async function createProject(parentId = null) {
  const id = 'ctx-' + Date.now();
  const ctx = {
    id,
    name: 'Neues Projekt',
    icon: ['🚀', '📦', '💡', '🎯', '🔧', '📊', '🌟', '🏗️'][Math.floor(Math.random() * 8)],
    color: ['#8B5CF6', '#3B82F6', '#22c55e', '#f59e0b', '#ef4444', '#ec4899'][Math.floor(Math.random() * 6)],
    parentId: parentId || undefined,
    chat: [{
      id: 'msg-sys-' + Date.now(),
      role: 'system',
      text: 'Neues Projekt erstellt! Beschreibe was du bauen oder planen willst.',
      time: new Date().toISOString()
    }],
    widgets: [],
    data: {},
    connections: [],
    skills: []
  };

  try {
    const res = await fetch(`${API_BASE}/api/contexts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(ctx)
    });
    const result = await res.json();
    if (result.ok) {
      await reloadContextList();
      await selectProject(result.id || id);
    }
  } catch (e) {
    console.error('Create context error:', e);
  }
}

async function deleteProject(id) {
  // Delete children first
  const children = state.contexts.filter(c => c.parentId === id);
  for (const child of children) {
    await deleteProject(child.id);
  }

  try {
    await fetch(`${API_BASE}/api/context/${id}`, { method: 'DELETE' });
  } catch (e) {
    console.error('Delete context error:', e);
  }

  state.contexts = state.contexts.filter(c => c.id !== id);
  if (state.activeContextId === id) {
    state.activeContextId = state.contexts[0]?.id || null;
    state.activeContext = null;
  }
  renderProjectList();
  if (state.activeContextId) await selectProject(state.activeContextId);
}

async function loadScopeChain() {
  if (!state.activeContextId) return;
  const ctx = state.activeContext;
  if (!ctx || !ctx.parentId) {
    state.inheritedWidgets = [];
    state.inheritedData = {};
    state.inheritedSources = [];
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/api/context/${state.activeContextId}/scope-chain`);
    const data = await res.json();
    // Map inherited widgets with source context name from chain
    const chainMap = {};
    for (const c of (data.chain || [])) {
      chainMap[c.id] = c.name;
    }
    state.inheritedWidgets = (data.inheritedWidgets || []).map(w => ({
      ...w,
      _inheritedFrom: chainMap[w.fromContext] || 'Parent',
      _inheritedFromId: w.fromContext
    }));
    // Flatten inheritedData: { key: { value, fromContext } } → { key: value }
    const flatData = {};
    for (const [k, v] of Object.entries(data.inheritedData || {})) {
      flatData[k] = v.value;
    }
    state.inheritedData = flatData;
    state.inheritedSources = data.chain || [];
  } catch(e) {
    console.error('Scope chain load error:', e);
    state.inheritedWidgets = [];
    state.inheritedData = {};
    state.inheritedSources = [];
  }
}

async function selectProject(id) {
  state.activeContextId = id;

  // Fetch the full context from the API
  try {
    const res = await fetch(`${API_BASE}/api/context/${id}`);
    if (!res.ok) { console.error('Context not found:', id); return; }
    const ctx = await res.json();

    // Normalize context to have canvas-like structure for compatibility
    if (!ctx.widgets) ctx.widgets = [];
    if (!ctx.canvas) ctx.canvas = { widgets: ctx.widgets };
    else ctx.canvas.widgets = ctx.widgets;
    if (!ctx.data) ctx.data = {};
    if (!ctx.chat) ctx.chat = [];
    if (!ctx.children) ctx.children = [];

    state.activeContext = ctx;
  } catch (e) {
    console.error('Load context error:', e);
    return;
  }

  const proj = state.activeContext;

  // Update sidebar
  document.querySelectorAll('.project-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Update chat header
  document.getElementById('chatIcon').textContent = proj.icon;
  document.getElementById('chatIcon').style.background = (proj.color || '#8B5CF6') + '22';
  document.getElementById('projectName').value = proj.name;
  const wCount = proj.widgets.length;
  document.getElementById('projectSub').textContent = `${wCount} Widget${wCount !== 1 ? 's' : ''}`;

  renderBreadcrumb(proj);
  renderPlan(proj);
  renderChat();
  await loadScopeChain();
  renderCanvas();
  updatePendingBtn();
}

function renderBreadcrumb(proj) {
  const bar = document.getElementById('breadcrumbBar');
  // Build ancestor chain using L0 context list
  const chain = [];
  let currentId = proj.parentId;
  const visited = new Set();
  while (currentId && !visited.has(currentId)) {
    visited.add(currentId);
    const parent = state.contexts.find(c => c.id === currentId);
    if (!parent) break;
    chain.unshift(parent);
    currentId = parent.parentId;
  }

  if (chain.length === 0) {
    bar.classList.remove('visible');
    bar.innerHTML = '';
    return;
  }

  bar.classList.add('visible');
  let html = '';
  for (const ancestor of chain) {
    html += `<button class="bc-item" onclick="selectProject('${ancestor.id}')">${ancestor.icon} ${ancestor.name}</button>`;
    html += `<span class="bc-sep">›</span>`;
  }
  html += `<span class="bc-current">${proj.icon} ${proj.name}</span>`;
  bar.innerHTML = html;
}

// ── Render Project List ──
function renderProjectList() {
  const el = document.getElementById('projectList');
  el.innerHTML = '';

  function renderLevel(contexts, depth = 0) {
    for (const p of contexts) {
      const children = state.contexts.filter(c => c.parentId === p.id);
      const hasChildren = children.length > 0;
      const isActive = state.activeContextId === p.id;
      const wCount = p.widgetCount || 0;

      const div = document.createElement('div');
      div.className = 'project-item' + (isActive ? ' active' : '') + (depth > 0 ? ' nested' : '');
      div.style.paddingLeft = (12 + depth * 16) + 'px';
      div.dataset.id = p.id;
      div.innerHTML = `
        ${hasChildren ? '<span style="font-size:10px;opacity:.5;margin-right:2px;">▾</span>' : ''}
        <span class="icon">${p.icon || '🧩'}</span>
        <span>${p.name}</span>
        <span class="badge">${wCount}${hasChildren ? ' · ' + children.length + '↓' : ''}</span>
        <button class="delete-btn" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</button>
      `;
      div.onclick = () => selectProject(p.id);
      el.appendChild(div);

      // Render children indented
      if (hasChildren) renderLevel(children, depth + 1);

      // Show "add subproject" button for the active project
      if (isActive) {
        const subBtn = document.createElement('button');
        subBtn.className = 'btn-subproject';
        subBtn.style.marginLeft = (12 + (depth + 1) * 16) + 'px';
        subBtn.style.width = `calc(100% - ${24 + (depth + 1) * 16}px)`;
        subBtn.textContent = '+ Unterprojekt';
        subBtn.onclick = (e) => { e.stopPropagation(); createProject(p.id); };
        el.appendChild(subBtn);
      }
    }
  }

  const topLevel = state.contexts.filter(p => !p.parentId);
  renderLevel(topLevel);
}

// ── Render Chat ──
function renderChat() {
  const proj = state.activeContext;
  if (!proj) return;

  const el = document.getElementById('chatMessages');
  el.innerHTML = '';

  for (const msg of proj.chat) {
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;

    let html = escapeHtml(msg.text);

    // Render widget action badges
    if (msg.widgetActions) {
      for (const wa of msg.widgetActions) {
        html += `<div class="widget-action">${wa.icon || '🧩'} ${wa.label}</div>`;
      }
    }

    html += `<span class="time">${formatTime(msg.time)}</span>`;
    div.innerHTML = html;
    el.appendChild(div);
  }

  el.scrollTop = el.scrollHeight;
}

// ── Render Canvas ──
function renderCanvas() {
  const proj = state.activeContext;
  if (!proj) return;

  const grid = document.getElementById('canvasGrid');
  const empty = document.getElementById('canvasEmpty');

  const children = state.contexts.filter(c => c.parentId === proj.id);
  const hasWidgets = (proj.widgets || []).length > 0;
  const hasChildren = children.length > 0;
  const hasInherited = (state.inheritedWidgets || []).length > 0;

  if (!hasWidgets && !hasChildren && !hasInherited) {
    empty.style.display = 'block';
    grid.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = '';

  for (const widget of (proj.widgets || [])) {
    const frame = createWidgetFrame(widget, proj, false);
    grid.appendChild(frame);
  }

  // Render inherited widgets from scope chain
  if (state.inheritedWidgets && state.inheritedWidgets.length > 0) {
    const inheritSection = document.createElement('div');
    inheritSection.className = 'inherited-section';
    inheritSection.style.gridColumn = '1 / -1';

    // Group by source context
    const sourceMap = {};
    for (const w of state.inheritedWidgets) {
      const src = w._inheritedFrom || 'Parent';
      if (!sourceMap[src]) sourceMap[src] = [];
      sourceMap[src].push(w);
    }

    let html = '';
    for (const [sourceName, widgets] of Object.entries(sourceMap)) {
      html += `<div class="inherited-label">\u2197 Von ${escapeHtml(sourceName)}</div>`;
    }
    inheritSection.innerHTML = html;
    grid.appendChild(inheritSection);

    for (const w of state.inheritedWidgets) {
      // Create widget frame with inherited flag
      const mergedProj = { ...proj, data: { ...proj.data, ...state.inheritedData } };
      const frame = createWidgetFrame(w, mergedProj, true);
      frame.classList.add('inherited-widget');
      grid.appendChild(frame);
    }
  }

  // Render child contexts that are NOT already represented as context-type widgets
  if (hasChildren) {
    const existingContextRefs = new Set(
      (proj.widgets || []).filter(w => w.type === 'context' && w.contextRef).map(w => w.contextRef)
    );
    const unrepresented = children.filter(c => !existingContextRefs.has(c.id));
    for (const child of unrepresented) {
      const virtualWidget = {
        id: '__virtual-ctx-' + child.id,
        type: 'context',
        title: child.name,
        size: 'sm',
        contextRef: child.id,
        color: child.color,
        zoomLevel: 'L1'
      };
      const frame = createWidgetFrame(virtualWidget, proj);
      grid.appendChild(frame);
    }
  }

  // Show/hide closed widgets toggle
  const closedCount = (proj.closedWidgets || []).length;
  const closedToggle = document.getElementById('closedToggle');
  closedToggle.style.display = closedCount > 0 ? 'block' : 'none';
  document.getElementById('closedCount').textContent = closedCount;
  // Refresh panel if open
  const panel = document.getElementById('closedPanel');
  if (panel.style.display === 'flex') renderClosedPanel();

  // Re-apply AI change banners after re-render
  if (activeChangeBanners.length > 0) applyChangeBanners();
}

// ── AI Change Highlights ──
let activeChangeBanners = []; // persists across re-renders

function highlightAiChanges(widgetActions) {
  if (!widgetActions || widgetActions.length === 0) return;
  for (const action of widgetActions) {
    if (!action.widgetId && !action.dataKey) continue;
    // Store banner data with timestamp for auto-dismiss
    activeChangeBanners.push({ ...action, addedAt: Date.now() });
  }
  applyChangeBanners();
  // Auto-dismiss all banners after 20s
  setTimeout(() => {
    activeChangeBanners = [];
    document.querySelectorAll('.widget-change-banner').forEach(b => b.remove());
    document.querySelectorAll('.widget-frame.ai-changed').forEach(f => {
      f.classList.remove('ai-changed');
      f.style.borderColor = '';
    });
  }, 20000);
}

function applyChangeBanners() {
  for (const action of activeChangeBanners) {
    let frame = null;
    if (action.widgetId) {
      frame = document.querySelector(`.widget-frame[data-widget-id="${action.widgetId}"]`);
    }
    if (!frame && action.dataKey) {
      const proj = state.activeContext;
      const w = proj?.widgets?.find(w => w.dataKey === action.dataKey);
      if (w) frame = document.querySelector(`.widget-frame[data-widget-id="${w.id}"]`);
    }
    if (!frame) continue;

    // Add glow animation
    frame.classList.add('ai-changed');

    // Skip if banner already exists on this widget
    if (frame.querySelector('.widget-change-banner')) continue;

    const insertBefore = frame.querySelector('.widget-cmd') || frame.querySelector('.widget-body');
    const banner = document.createElement('div');
    banner.className = 'widget-change-banner';
    banner.innerHTML = `
      <span class="change-icon">${action.action === 'create' ? '✨' : '✏️'}</span>
      <span class="change-text">${escapeHtml(action.detail || action.label)}</span>
      <button class="change-dismiss" onclick="dismissChangeBanner(this, '${action.widgetId || action.dataKey}')">✕</button>
    `;
    frame.insertBefore(banner, insertBefore);
  }
}

function dismissChangeBanner(btn, id) {
  btn.parentElement.remove();
  activeChangeBanners = activeChangeBanners.filter(a => (a.widgetId || a.dataKey) !== id);
}

// ── Widget Factory ──
function createWidgetFrame(widget, proj, inherited = false) {
  const frame = document.createElement('div');
  const zoomLevel = widget.zoomLevel || 'L1';
  const zoomClass = zoomLevel === 'L0' ? ' zoom-l0' : zoomLevel === 'L2' ? ' zoom-l2' : '';
  frame.className = `widget-frame size-${widget.size || 'md'}${zoomClass}`;
  frame.dataset.widgetId = widget.id;

  const color = widget.color || proj.color || 'var(--accent)';

  const renderType = widget.renderAs || widget.type;
  const typeLabel = getWidgetLabel(widget.type);
  const displayTitle = widget.title !== typeLabel ? widget.title : typeLabel;
  const badge = zoomLevel === 'L0' ? ` · ${getL0Badge(widget, proj)}` : '';
  const zoomIcon = zoomLevel === 'L0' ? '🔹' : zoomLevel === 'L2' ? '🔷' : '🔸';
  const inheritedBadge = inherited ? `<span class="inherited-badge">\u2197 ${escapeHtml(widget._inheritedFrom || 'Parent')}</span>` : '';
  const perspectiveHint = (widget.renderAs && widget.renderAs !== widget.type) ? `<span class="perspective-hint">${widget.type} \u2192 ${widget.renderAs}</span>` : '';
  const availableRenders = getAvailableRenders(widget);
  const perspectiveBtn = availableRenders.length > 1 && !inherited ? `<button onclick="cyclePerspective('${widget.id}')" title="Ansicht wechseln" class="widget-perspective-btn">\uD83D\uDC41</button>` : '';
  const removeBtn = inherited ? '' : `<button onclick="removeWidget('${widget.id}')" title="Entfernen">\u2715</button>`;
  const widgetId = inherited ? ('inh-' + widget.id) : widget.id;
  frame.dataset.widgetId = widgetId;

  frame.innerHTML = `
    <div class="widget-head">
      <div class="dot" style="background:${color}"></div>
      <div class="label">${getWidgetIcon(renderType)} ${displayTitle}${inheritedBadge}${perspectiveHint}${badge}</div>
      <div class="actions">
        ${perspectiveBtn}
        <button onclick="cycleZoom('${widget.id}')" title="Zoom" class="widget-zoom-btn">${zoomIcon}</button>
        <button onclick="toggleWidgetEdit('${widgetId}')" title="Widget bearbeiten" class="widget-edit-btn">\u270F\uFE0F</button>
        <button onclick="resizeWidget('${widget.id}')" title="Resize">\u2194</button>
        ${removeBtn}
      </div>
    </div>
    <div class="widget-cmd" id="wcmd-${widgetId}" style="display:none;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg-base);display:none;">
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="text" id="wcmd-input-${widgetId}" placeholder="z.B. Zeile hinzuf\u00FCgen, Wert \u00E4ndern..."
          style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;font-family:var(--font);outline:none;"
          onkeydown="if(event.key==='Enter')sendWidgetCmd('${widgetId}')"
        />
        <button onclick="sendWidgetCmd('${widgetId}')" style="padding:5px 10px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap;">Senden</button>
      </div>
      <div id="wcmd-status-${widgetId}" style="font-size:11px;color:var(--text-muted);padding-top:4px;display:none;"></div>
    </div>
    <div class="widget-body" id="wb-${widgetId}"></div>
  `;

  const body = frame.querySelector('.widget-body');
  renderWidgetContent(body, widget, proj);

  return frame;
}

function renderCrossType(container, widget, proj, sourceType, renderType) {
  const rawData = proj.data[widget.dataKey] || widget.data || {};

  // todo → table: items become rows
  if (sourceType === 'todo' && renderType === 'table') {
    const items = proj.data[widget.dataKey] || widget.data?.items || [];
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['text', 'done', 'priority'] } };
    const rows = (Array.isArray(items) ? items : []).map(i => ({ text: i.text, done: i.done ? 'Ja' : 'Nein', priority: i.priority || '' }));
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // todo → kanban: group by priority or done status
  if (sourceType === 'todo' && renderType === 'kanban') {
    const items = proj.data[widget.dataKey] || widget.data?.items || [];
    const arr = Array.isArray(items) ? items : [];
    const columns = [
      { id: 'open', name: 'Offen', items: arr.filter(i => !i.done).map(i => ({ text: i.text })) },
      { id: 'done', name: 'Erledigt', items: arr.filter(i => i.done).map(i => ({ text: i.text })) }
    ];
    const virtualWidget = { ...widget, type: 'kanban' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: { columns } } };
    renderKanbanWidget(container, virtualWidget, virtualProj);
    return;
  }

  // kanban → table: flatten all items with column name
  if (sourceType === 'kanban' && renderType === 'table') {
    const kanbanData = proj.data[widget.dataKey] || widget.data || {};
    const columns = kanbanData.columns || [];
    const rows = [];
    for (const col of columns) {
      for (const item of (col.items || [])) {
        rows.push({ status: col.name, text: typeof item === 'string' ? item : item.text || item.title || '' });
      }
    }
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['status', 'text'] } };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // kanban → todo: flatten all items
  if (sourceType === 'kanban' && renderType === 'todo') {
    const kanbanData = proj.data[widget.dataKey] || widget.data || {};
    const columns = kanbanData.columns || [];
    const items = [];
    for (const col of columns) {
      for (const item of (col.items || [])) {
        const text = typeof item === 'string' ? item : item.text || item.title || '';
        const isDone = col.name.toLowerCase().includes('done') || col.name.toLowerCase().includes('erledigt');
        items.push({ id: 't-' + Math.random().toString(36).slice(2, 6), text, done: isDone });
      }
    }
    const virtualWidget = { ...widget, type: 'todo' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: items } };
    renderTodoWidget(container, virtualWidget, virtualProj);
    return;
  }

  // table → todo: rows become items
  if (sourceType === 'table' && renderType === 'todo') {
    const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
    const arr = Array.isArray(rows) ? rows : [];
    const items = arr.map((r, i) => ({
      id: 't-' + i,
      text: r.text || r.name || r.title || Object.values(r).filter(v => typeof v === 'string').join(' | '),
      done: r.done === true || r.done === 'Ja' || r.status === 'done'
    }));
    const virtualWidget = { ...widget, type: 'todo' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: items } };
    renderTodoWidget(container, virtualWidget, virtualProj);
    return;
  }

  // table → kanban: group by first column or 'status'
  if (sourceType === 'table' && renderType === 'kanban') {
    const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
    const arr = Array.isArray(rows) ? rows : [];
    const groupKey = arr.length > 0 ? (arr[0].status !== undefined ? 'status' : Object.keys(arr[0])[0]) : 'group';
    const groups = {};
    for (const r of arr) {
      const g = r[groupKey] || 'Andere';
      if (!groups[g]) groups[g] = [];
      const text = Object.entries(r).filter(([k]) => k !== groupKey && k !== 'id').map(([, v]) => v).join(' | ');
      groups[g].push({ text });
    }
    const columns = Object.entries(groups).map(([name, items]) => ({ id: name.toLowerCase(), name, items }));
    if (columns.length === 0) columns.push({ id: 'default', name: 'Items', items: [] });
    const virtualWidget = { ...widget, type: 'kanban' };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: { columns } } };
    renderKanbanWidget(container, virtualWidget, virtualProj);
    return;
  }

  // timeline → table
  if (sourceType === 'timeline' && renderType === 'table') {
    const items = proj.data[widget.dataKey] || widget.data?.items || [];
    const arr = Array.isArray(items) ? items : [];
    const rows = arr.map(i => ({ title: i.title, description: i.description || '', time: i.time || '' }));
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['title', 'description', 'time'] } };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // links → table
  if (sourceType === 'links' && renderType === 'table') {
    const links = proj.data[widget.dataKey] || widget.data?.links || [];
    const arr = Array.isArray(links) ? links : [];
    const rows = arr.map(l => ({ title: l.title || l.url, url: l.url || '', icon: l.icon || '' }));
    const virtualWidget = { ...widget, type: 'table', config: { columns: ['title', 'url'] } };
    const virtualProj = { ...proj, data: { ...proj.data, [widget.dataKey]: rows } };
    renderTableWidget(container, virtualWidget, virtualProj);
    return;
  }

  // Fallback: render as original type
  container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">Ansicht "${renderType}" nicht verfuegbar fuer "${sourceType}"</div>`;
}

function renderWidgetContent(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};
  const renderType = widget.renderAs || widget.type;
  const sourceType = widget.type;

  // Cross-type rendering: adapt data for different perspectives
  if (renderType !== sourceType) {
    renderCrossType(container, widget, proj, sourceType, renderType);
    return;
  }

  switch (renderType) {
    case 'todo':
      renderTodoWidget(container, widget, proj);
      break;
    case 'notes':
      renderNotesWidget(container, widget, proj);
      break;
    case 'table':
      renderTableWidget(container, widget, proj);
      break;
    case 'timeline':
      renderTimelineWidget(container, widget, proj);
      break;
    case 'kpi':
      renderKpiWidget(container, widget, proj);
      break;
    case 'kanban':
      renderKanbanWidget(container, widget, proj);
      break;
    case 'links':
      renderLinksWidget(container, widget, proj);
      break;
    case 'progress':
      renderProgressWidget(container, widget, proj);
      break;
    case 'context': {
      const refCtx = state.contexts.find(c => c.id === widget.contextRef);
      if (!refCtx) {
        container.innerHTML = '<div style="padding:16px;color:var(--text-muted);">Context nicht gefunden</div>';
        break;
      }
      container.innerHTML = `
        <div onclick="selectProject('${refCtx.id}')" style="cursor:pointer;padding:16px;display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-size:24px;width:40px;height:40px;border-radius:10px;background:${refCtx.color || '#8B5CF6'}22;display:flex;align-items:center;justify-content:center;">${refCtx.icon || '🧩'}</div>
            <div>
              <div style="font-weight:600;font-size:14px;">${refCtx.name}</div>
              <div style="font-size:11px;color:var(--text-muted);">${refCtx.widgetCount || 0} Widgets</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Klicken zum Eintauchen →</div>
        </div>
      `;
      break;
    }
    case 'text':
      container.innerHTML = `<div class="w-note-content">${escapeHtml(data.text || widget.text || '')}</div>`;
      break;
    default:
      container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">Widget: ${widget.type}</div>`;
  }
}

// ── Widget Renderers ──
function renderTodoWidget(container, widget, proj) {
  const items = proj.data[widget.dataKey] || widget.data?.items || [];
  let html = '';
  for (const item of items) {
    html += `
      <div class="w-todo-item ${item.done ? 'done' : ''}">
        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleTodo('${widget.dataKey}','${item.id}')">
        <span class="text">${escapeHtml(item.text)}</span>
        ${item.priority ? `<span class="priority ${item.priority}">${item.priority}</span>` : ''}
      </div>
    `;
  }
  html += `
    <div class="w-todo-add">
      <input type="text" placeholder="Neue Aufgabe..." onkeydown="if(event.key==='Enter')addTodo('${widget.dataKey}',this)">
      <button onclick="addTodo('${widget.dataKey}',this.previousElementSibling)">+</button>
    </div>
  `;
  container.innerHTML = html;
}

function renderNotesWidget(container, widget, proj) {
  const text = proj.data[widget.dataKey]?.text || widget.data?.text || '';
  container.innerHTML = `<div class="w-note-content" contenteditable="true"
    onblur="updateNoteContent('${widget.dataKey}',this.innerText)">${escapeHtml(text)}</div>`;
}

function renderTableWidget(container, widget, proj) {
  const rows = proj.data[widget.dataKey] || widget.data?.rows || [];
  const cols = widget.config?.columns || (rows.length > 0 ? Object.keys(rows[0]).filter(k => k !== 'id') : []);

  let html = '<table class="w-table"><thead><tr>';
  for (const col of cols) html += `<th>${col}</th>`;
  html += '</tr></thead><tbody>';
  for (let ri = 0; ri < rows.length; ri++) {
    html += '<tr>';
    for (const col of cols) {
      const val = escapeHtml(String(rows[ri][col] ?? ''));
      html += `<td contenteditable="true" data-row="${ri}" data-col="${escapeHtml(col)}" data-key="${widget.dataKey}" onblur="updateTableCell(this)" style="cursor:text;min-width:40px;">${val}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Daten</div>';
  container.innerHTML = html;
}

function updateTableCell(td) {
  const dataKey = td.dataset.key;
  const ri = parseInt(td.dataset.row);
  const col = td.dataset.col;
  const newVal = td.innerText.trim();
  const proj = state.activeContext;
  if (!proj) return;
  const rows = proj.data[dataKey];
  if (!rows || !rows[ri]) return;
  const oldVal = String(rows[ri][col] ?? '');
  if (oldVal === newVal) return;
  rows[ri][col] = newVal;
  logChange(proj, `📝 Tabelle: "${col}" Zeile ${ri+1} geaendert: "${oldVal}" → "${newVal}"`);
  save();
}

function renderTimelineWidget(container, widget, proj) {
  const items = proj.data[widget.dataKey] || widget.data?.items || [];
  let html = '';
  for (const item of items) {
    html += `
      <div class="w-timeline-item">
        <div class="w-timeline-dot" style="border-color:${item.color || 'var(--accent)'}"></div>
        <div class="w-timeline-content">
          <div class="title">${escapeHtml(item.title)}</div>
          ${item.description ? `<div class="desc">${escapeHtml(item.description)}</div>` : ''}
          ${item.time ? `<div class="time">${item.time}</div>` : ''}
        </div>
      </div>
    `;
  }
  if (items.length === 0) html = '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px;">Keine Eintraege</div>';
  container.innerHTML = html;
}

function renderKpiWidget(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};
  container.innerHTML = `
    <div class="w-kpi">
      <div class="value" contenteditable="true" data-key="${widget.dataKey}" data-field="value" onblur="updateKpiField(this)" style="cursor:text;">${data.value ?? '—'}</div>
      <div class="label" contenteditable="true" data-key="${widget.dataKey}" data-field="label" onblur="updateKpiField(this)" style="cursor:text;">${escapeHtml(data.label || widget.title || '')}</div>
      ${data.change != null ? `<div class="change ${data.change >= 0 ? 'up' : 'down'}">${data.change >= 0 ? '+' : ''}${data.change}%</div>` : ''}
    </div>
  `;
}

function updateKpiField(el) {
  const dataKey = el.dataset.key;
  const field = el.dataset.field;
  const newVal = el.innerText.trim();
  const proj = state.activeContext;
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = {};
  const oldVal = String(proj.data[dataKey][field] ?? '');
  if (oldVal === newVal) return;
  proj.data[dataKey][field] = newVal;
  const w = (proj.widgets || []).find(w => w.dataKey === dataKey);
  logChange(proj, `📊 KPI "${w?.title || dataKey}": ${field} geaendert: "${oldVal}" → "${newVal}"`);
  save();
}

function renderKanbanWidget(container, widget, proj) {
  const columns = proj.data[widget.dataKey]?.columns || widget.data?.columns || [
    { id: 'todo', name: 'To Do', items: [] },
    { id: 'doing', name: 'In Progress', items: [] },
    { id: 'done', name: 'Done', items: [] }
  ];
  let html = '<div class="w-kanban-cols">';
  for (const col of columns) {
    html += `
      <div class="w-kanban-col">
        <div class="w-kanban-col-head">${col.name} <span class="count">${(col.items || []).length}</span></div>
        ${(col.items || []).map(item => `<div class="w-kanban-card">${escapeHtml(typeof item === 'string' ? item : item.text || item.title || '')}</div>`).join('')}
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderLinksWidget(container, widget, proj) {
  const links = proj.data[widget.dataKey] || widget.data?.links || [];
  let html = '';
  for (const link of links) {
    html += `
      <div class="w-link-item" onclick="window.open('${link.url}','_blank')">
        <span class="link-icon">${link.icon || '🔗'}</span>

function renderProgressWidget(container, widget, proj) {
  const data = proj.data[widget.dataKey] || widget.data || {};
  const pct = Math.min(100, Math.max(0, data.percent || 0));
  const color = pct >= 80 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--accent)';
  container.innerHTML = `
    <div class="w-progress-bar"><div class="w-progress-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="w-progress-label"><span>${data.label || ''}</span><span>${pct}%</span></div>
  `;
}

// ── Pending Changes & Changelog ──
// Map of projectId → array of pending changes
let pendingChangesMap = {};

function getPendingChanges(projectId) {
  return pendingChangesMap[projectId || state.activeContextId] || [];
}

function logChange(proj, summary) {
  const pid = proj.id;
  if (!pendingChangesMap[pid]) pendingChangesMap[pid] = [];
  pendingChangesMap[pid].push({ time: new Date().toISOString(), summary });
  updatePendingBtn();
}

function flushChangelog(proj) {
  if (!proj.changelog) proj.changelog = [];
  const changes = pendingChangesMap[proj.id] || [];
  for (const c of changes) {
    proj.changelog.push(c);
  }
  if (proj.changelog.length > 50) proj.changelog = proj.changelog.slice(-50);
  const flushed = [...changes];
  pendingChangesMap[proj.id] = [];
  updatePendingBtn();
  return flushed;
}

function updatePendingBtn() {
  const btn = document.getElementById('pendingBtn');
  if (!btn) return;
  // Count changes for the CURRENT context only
  const currentChanges = getPendingChanges(state.activeContextId);
  const n = currentChanges.length;
  // Also check if OTHER contexts have pending changes
  const totalOther = Object.entries(pendingChangesMap)
    .filter(([pid]) => pid !== state.activeContextId)
    .reduce((sum, [, arr]) => sum + arr.length, 0);
  btn.style.display = (n > 0 || totalOther > 0) ? 'flex' : 'none';
  if (n > 0 && totalOther > 0) {
    document.getElementById('pendingLabel').textContent = `${n} Änderung${n !== 1 ? 'en' : ''} übernehmen (+${totalOther} in anderen Projekten)`;
  } else if (n > 0) {
    document.getElementById('pendingLabel').textContent = `${n} Änderung${n !== 1 ? 'en' : ''} übernehmen`;
  } else if (totalOther > 0) {
    document.getElementById('pendingLabel').textContent = `${totalOther} Änderung${totalOther !== 1 ? 'en' : ''} in anderen Projekten`;
  }
}

async function commitChanges() {
  let commitActions = [];
  const proj = state.activeContext;
  const currentChanges = getPendingChanges(state.activeContextId);
  if (!proj || currentChanges.length === 0) return;

  const changes = flushChangelog(proj);

  // Save immediately
  await saveImmediate();

  // Build summary for AI
  const summary = changes.map(c => c.summary).join('\n');
  const autoMsg = `[Änderungen übernommen]\n${summary}`;

  // Send to AI as automatic message
  const userMsg = {
    id: 'msg-' + Date.now(),
    role: 'user',
    text: autoMsg,
    time: new Date().toISOString()
  };
  proj.chat.push(userMsg);
  renderChat();

  // Show typing
  processing = true;
  document.getElementById('typingIndicator').classList.add('visible');
  document.getElementById('btnSend').disabled = true;

  let response;
  try {
    try {
      response = await callProjectAgent(state.activeContextId, autoMsg);
    } catch (agentErr) {
      console.log('Agent unavailable, using local fallback:', agentErr.message);
      response = { text: `Änderungen gespeichert:\n${summary}`, widgetActions: [] };
    }

    if (response._fromAgent) {
      // Reload context from API (agent may have written to it)
      await selectProject(state.activeContextId);
      const freshProj = state.activeContext;
      if (freshProj) {
        freshProj.chat.push({
          id: 'msg-' + Date.now(),
          role: 'agent',
          text: response.text,
          widgetActions: response.widgetActions || [],
          time: new Date().toISOString()
        });
        freshProj.updated = new Date().toISOString();
      }
    } else {
      proj.chat.push({
        id: 'msg-' + Date.now(),
        role: 'agent',
        text: response.text,
        widgetActions: response.widgetActions || [],
        time: new Date().toISOString()
      });
      proj.updated = new Date().toISOString();
    }

    await saveImmediate();

  } catch (e) {
    proj.chat.push({
      id: 'msg-err-' + Date.now(),
      role: 'system',
      text: 'Fehler: ' + e.message,
      time: new Date().toISOString()
    });
    save();
  }

  commitActions = response?.widgetActions || [];
  processing = false;
  document.getElementById('typingIndicator').classList.remove('visible');
  document.getElementById('btnSend').disabled = false;
  renderChat();
  renderCanvas();
  highlightAiChanges(commitActions);
}

function getWidgetTitle(proj, dataKey) {
  const w = (proj.widgets || []).find(w => w.dataKey === dataKey);
  return w ? w.title : dataKey;
}

// ── Widget Data Mutations ──
function toggleTodo(dataKey, itemId) {
  const proj = state.activeContext;
  if (!proj) return;
  const items = proj.data[dataKey];
  if (!items) return;
  const item = items.find(i => i.id === itemId);
  if (item) {
    item.done = !item.done;
    logChange(proj, `${item.done ? '✅' : '⬜'} "${item.text}" in "${getWidgetTitle(proj, dataKey)}" ${item.done ? 'erledigt' : 'wieder offen'}`);
  }
  save();
  renderCanvas();
}

function addTodo(dataKey, input) {
  const text = input.value.trim();
  if (!text) return;
  const proj = state.activeContext;
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = [];
  proj.data[dataKey].push({ id: 't-' + Date.now(), text, done: false });
  logChange(proj, `➕ Neue Aufgabe "${text}" in "${getWidgetTitle(proj, dataKey)}" hinzugefuegt`);
  input.value = '';
  save();
  renderCanvas();
}

function updateNoteContent(dataKey, text) {
  const proj = state.activeContext;
  if (!proj) return;
  if (!proj.data[dataKey]) proj.data[dataKey] = {};
  const oldText = proj.data[dataKey].text || '';
  proj.data[dataKey].text = text;
  if (oldText !== text) {
    logChange(proj, `📝 Notiz "${getWidgetTitle(proj, dataKey)}" bearbeitet`);
  }
  save();
}

function removeWidget(widgetId) {
  const proj = state.activeContext;
  if (!proj) return;
  const w = (proj.widgets || []).find(w => w.id === widgetId);
  if (!w) return;
  // Move to closedWidgets instead of deleting
  if (!proj.closedWidgets) proj.closedWidgets = [];
  proj.closedWidgets.push({ ...w, closedAt: new Date().toISOString() });
  proj.widgets = (proj.widgets || []).filter(w => w.id !== widgetId);
  proj.canvas = { widgets: proj.widgets };
  logChange(proj, `🗑️ Widget "${w.title}" geschlossen`);
  document.getElementById('projectSub').textContent = `${proj.widgets.length} Widgets`;
  save();
  renderCanvas();
}

function restoreWidget(widgetId) {
  const proj = state.activeContext;
  if (!proj || !proj.closedWidgets) return;
  const idx = proj.closedWidgets.findIndex(w => w.id === widgetId);
  if (idx === -1) return;
  const w = proj.closedWidgets.splice(idx, 1)[0];
  delete w.closedAt;
  if (!proj.widgets) proj.widgets = [];
  proj.widgets.push(w);
  proj.canvas = { widgets: proj.widgets };
  logChange(proj, `♻️ Widget "${w.title}" wiederhergestellt`);
  document.getElementById('projectSub').textContent = `${proj.widgets.length} Widgets`;
  save();
  renderCanvas();
}

function toggleClosedPanel() {
