<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;z-index:10;flex-shrink:0}
header .icon{font-size:1.4rem}
header h1{font-size:1rem;font-weight:600;color:#f1f5f9}
header .spacer{flex:1}
.toolbar-btn{padding:5px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.7);font-size:.78rem;cursor:pointer;font-family:inherit}
.toolbar-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.toolbar-btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.toolbar-btn.primary:hover{background:#2563EB}
.modify-btn{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}
.modify-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
header .home{text-decoration:none;color:rgba(255,255,255,.4);font-size:.8rem}
header .home:hover{color:#fff}

.color-palette{display:flex;gap:4px;margin:0 8px}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-dot:hover{transform:scale(1.2)}
.color-dot.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}

.canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab}
.canvas-wrap.grabbing{cursor:grabbing}
.canvas-wrap.connecting{cursor:crosshair}

svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
svg line{stroke:rgba(255,255,255,.2);stroke-width:2}
svg line.temp{stroke:rgba(59,130,246,.5);stroke-width:2;stroke-dasharray:6 4}

.node{position:absolute;min-width:80px;padding:8px 16px;border-radius:10px;font-size:.85rem;font-weight:500;color:#fff;cursor:grab;user-select:none;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.15);transition:box-shadow .15s;z-index:5}
.node:hover{box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:6}
.node.dragging{cursor:grabbing;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:10}
.node.selected{border-color:#fff;box-shadow:0 0 20px rgba(59,130,246,.4)}
.node .connect-handle{position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#3B82F6;border:2px solid #0a0a1a;cursor:crosshair;opacity:0;transition:opacity .15s}
.node:hover .connect-handle{opacity:1}
.node .delete-btn{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#EF4444;color:#fff;font-size:.6rem;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;border:2px solid #0a0a1a;line-height:1}
.node:hover .delete-btn{opacity:1}

.node-edit{background:transparent;border:none;color:#fff;font-size:.85rem;font-weight:500;text-align:center;outline:none;width:100%;font-family:inherit}

.help-text{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:.72rem;color:rgba(255,255,255,.25);pointer-events:none;z-index:1}
</style>
</head>
<body>
<header>
  <span class="icon">🧠</span>
  <h1>MindMap</h1>
  <button class="toolbar-btn primary" onclick="addNode()">+ Knoten</button>
  <button class="toolbar-btn" id="connectBtn" onclick="toggleConnect()">Verbinden</button>
  <div class="color-palette" id="palette"></div>
  <span class="spacer"></span>
  <button class="modify-btn" onclick="typeof __mcToggle==='function'&&__mcToggle()">Anpassen</button>
  <a href="/" class="home">Dashboard</a>
</header>

<div class="canvas-wrap" id="canvas" onmousedown="canvasMouseDown(event)" onmousemove="canvasMouseMove(event)" onmouseup="canvasMouseUp(event)">
  <svg id="svg"></svg>
  <div class="help-text">Doppelklick auf Knoten zum Bearbeiten | Rechter Kreis zum Verbinden | Scroll zum Zoomen</div>
</div>

<script>
const COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];
let data = {nodes:[],edges:[],nextId:1};
let selectedNode = null;
let draggingNode = null;
let dragOff = {x:0,y:0};
let connecting = false;
let connectFrom = null;
let tempLine = null;
let selectedColor = COLORS[0];
let panX = 0, panY = 0;
let isPanning = false;
let panStart = {x:0,y:0};

// Color palette
const palette = document.getElementById('palette');
COLORS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'color-dot' + (c===selectedColor?' active':'');
  d.style.background = c;
  d.onclick = () => {
    document.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
    selectedColor = c;
    if (selectedNode) {
      const n = data.nodes.find(x=>x.id===selectedNode);
      if (n) { n.color = c; renderNodes(); save(); }
    }
  };
  palette.appendChild(d);
});

async function loadData() {
  try {
    const r = await fetch('/app/mindmap/api/mindmap');
    data = await r.json();
    render();
  } catch(e) { console.error(e); }
}

function render() {
  renderEdges();
  renderNodes();
}

function renderEdges() {
  const svg = document.getElementById('svg');
  svg.innerHTML = data.edges.map(e => {
    const from = data.nodes.find(n=>n.id===e.from);
    const to = data.nodes.find(n=>n.id===e.to);
    if (!from || !to) return '';
    return `<line x1="${from.x+40}" y1="${from.y+18}" x2="${to.x+40}" y2="${to.y+18}"/>`;
  }).join('') + (tempLine ? `<line class="temp" x1="${tempLine.x1}" y1="${tempLine.y1}" x2="${tempLine.x2}" y2="${tempLine.y2}"/>` : '');
}

function renderNodes() {
  // Remove old nodes
  document.querySelectorAll('.node').forEach(n=>n.remove());
  const canvas = document.getElementById('canvas');

  data.nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.id===selectedNode?' selected':'');
    el.id = 'node-'+n.id;
    el.style.left = n.x+'px';
    el.style.top = n.y+'px';
    el.style.background = n.color || '#3B82F6';
    el.textContent = n.text;

    // Connect handle
    const handle = document.createElement('div');
    handle.className = 'connect-handle';
    handle.onmousedown = (e) => { e.stopPropagation(); startConnect(n.id, e); };
    el.appendChild(handle);

    // Delete button
    const del = document.createElement('div');
    del.className = 'delete-btn';
    del.textContent = 'x';
    del.onclick = (e) => { e.stopPropagation(); deleteNode(n.id); };
    el.appendChild(del);

    // Drag
    el.onmousedown = (e) => {
      if (e.target.classList.contains('connect-handle') || e.target.classList.contains('delete-btn')) return;
      if (connecting) { finishConnect(n.id); return; }
      e.stopPropagation();
      selectedNode = n.id;
      draggingNode = n.id;
      dragOff.x = e.clientX - n.x;
      dragOff.y = e.clientY - n.y;
      el.classList.add('dragging');
      renderNodes();
    };

    // Double click to edit
    el.ondblclick = (e) => {
      e.stopPropagation();
      el.textContent = '';
      const input = document.createElement('input');
      input.className = 'node-edit';
      input.value = n.text;
      input.onblur = () => { n.text = input.value || 'Knoten'; renderNodes(); save(); };
      input.onkeydown = (ev) => { if(ev.key==='Enter') input.blur(); };
      el.appendChild(input);
      input.focus();
      input.select();
    };

    canvas.appendChild(el);
  });
}

function addNode() {
  const id = 'n' + data.nextId++;
  const cx = window.innerWidth/2 + (Math.random()-0.5)*200;
  const cy = window.innerHeight/2 + (Math.random()-0.5)*150;
  data.nodes.push({id, text:'Neuer Knoten', x:Math.round(cx), y:Math.round(cy), color:selectedColor});
  render();
  save();
}

function deleteNode(id) {
  data.nodes = data.nodes.filter(n=>n.id!==id);
  data.edges = data.edges.filter(e=>e.from!==id && e.to!==id);
  if (selectedNode===id) selectedNode=null;
  render();
  save();
}

function toggleConnect() {
  connecting = !connecting;
  connectFrom = null;
  document.getElementById('connectBtn').classList.toggle('primary', connecting);
  document.getElementById('canvas').classList.toggle('connecting', connecting);
}

function startConnect(nodeId, e) {
  connecting = true;
  connectFrom = nodeId;
  const n = data.nodes.find(x=>x.id===nodeId);
  tempLine = {x1:n.x+40, y1:n.y+18, x2:e.clientX, y2:e.clientY-document.querySelector('header').offsetHeight};
  document.getElementById('canvas').classList.add('connecting');
}

function finishConnect(nodeId) {
  if (connectFrom && connectFrom !== nodeId) {
    const exists = data.edges.some(e => (e.from===connectFrom&&e.to===nodeId) || (e.from===nodeId&&e.to===connectFrom));
    if (!exists) {
      data.edges.push({from:connectFrom, to:nodeId});
      save();
    }
  }
  connecting = false;
  connectFrom = null;
  tempLine = null;
  document.getElementById('connectBtn').classList.remove('primary');
  document.getElementById('canvas').classList.remove('connecting');
  render();
}

function canvasMouseDown(e) {
  if (connecting && !connectFrom) return;
  if (!draggingNode && !connecting) {
    isPanning = false; // Could implement pan later
    selectedNode = null;
    renderNodes();
  }
}

function canvasMouseMove(e) {
  if (draggingNode) {
    const n = data.nodes.find(x=>x.id===draggingNode);
    if (n) {
      n.x = e.clientX - dragOff.x;
      n.y = e.clientY - dragOff.y;
      const el = document.getElementById('node-'+n.id);
      if (el) { el.style.left = n.x+'px'; el.style.top = n.y+'px'; }
      renderEdges();
    }
  }
  if (connectFrom && tempLine) {
    const headerH = document.querySelector('header').offsetHeight;
    tempLine.x2 = e.clientX;
    tempLine.y2 = e.clientY - headerH;
    renderEdges();
  }
}

function canvasMouseUp(e) {
  if (draggingNode) {
    const el = document.getElementById('node-'+draggingNode);
    if (el) el.classList.remove('dragging');
    draggingNode = null;
    save();
  }
  if (connectFrom && !e.target.closest('.node')) {
    connecting = false;
    connectFrom = null;
    tempLine = null;
    document.getElementById('connectBtn').classList.remove('primary');
    document.getElementById('canvas').classList.remove('connecting');
    renderEdges();
  }
}

async function save() {
  await fetch('/app/mindmap/api/mindmap', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}

// SSE
const evtSrc = new EventSource('/sse/mindmap');
evtSrc.onmessage = e => {
  try {
    const d = JSON.parse(e.data);
    if (d.type==='change' && d.file==='mindmap.json') loadData();
  } catch{}
};

// Delete edge on right-click (future)
document.addEventListener('keydown', e => {
  if (e.key === 'Delete' && selectedNode) {
    deleteNode(selectedNode);
  }
});

loadData();
</script>
</body>
</html>
