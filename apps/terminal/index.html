<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --dim:var(--text-dim, rgba(255,255,255,.4)); --font:'IBM Plex Mono',monospace; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.6 var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#output{flex:1;overflow-y:auto;padding:12px 16px;white-space:pre-wrap;word-break:break-all;font-size:12px}
#output .line{margin-bottom:1px}
#output .line.error{color:#ef4444}
#output .line.system{color:var(--teal)}
#output .line.dim{color:var(--dim)}
.input-row{display:flex;align-items:center;padding:8px 16px;border-top:1px solid var(--border);gap:8px;flex-shrink:0}
.prompt{color:var(--teal);font-weight:600;flex-shrink:0;font-size:12px}
#input{flex:1;background:none;border:none;color:var(--text);font:12px var(--font);outline:none;caret-color:var(--teal)}
#input::placeholder{color:rgba(255,255,255,.15)}
.status-bar{padding:4px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);display:flex;justify-content:space-between;flex-shrink:0}
</style>
</head>
<body>
<div id="output">
<div class="line system">PulseOS Terminal v1.0</div>
<div class="line dim">Tippe Befehle ein. Ausgabe erscheint hier.</div>
<div class="line dim">---</div>
</div>
<div class="input-row">
  <span class="prompt">&gt;</span>
  <input id="input" type="text" placeholder="Befehl eingeben..." autofocus spellcheck="false">
</div>
<div class="status-bar">
  <span id="statusLeft">bereit</span>
  <span id="statusRight">PulseOS Terminal</span>
</div>
<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const statusLeft = document.getElementById('statusLeft');
const history = [];
let historyIdx = -1;

function addLine(text, cls) {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

async function execute(cmd) {
  cmd = cmd.trim();
  if (!cmd) return;
  history.unshift(cmd);
  historyIdx = -1;
  addLine('> ' + cmd, 'dim');
  statusLeft.textContent = 'ausfuehrend...';

  try {
    const r = await fetch('/api/terminal/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd })
    });
    const data = await r.json();
    if (data.output) addLine(data.output);
    if (data.error) addLine(data.error, 'error');
    statusLeft.textContent = 'exit ' + (data.exitCode || 0);
  } catch (e) {
    addLine('Fehler: ' + e.message, 'error');
    statusLeft.textContent = 'fehler';
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    execute(input.value);
    input.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx < history.length - 1) { historyIdx++; input.value = history[historyIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) { historyIdx--; input.value = history[historyIdx]; }
    else { historyIdx = -1; input.value = ''; }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
    addLine('Terminal geleert', 'system');
  }
});

input.focus();
document.addEventListener('click', () => input.focus());
</script>
</body>
</html>
