<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #1a1b26; }
#terminal-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}
#status-bar {
  height: 24px;
  background: #16161e;
  color: #565f89;
  font: 12px/24px 'SF Mono', 'Menlo', monospace;
  padding: 0 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #292e42;
  flex-shrink: 0;
}
#status-bar .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
#status-bar .dot.green { background: #9ece6a; }
#status-bar .dot.yellow { background: #e0af68; }
#status-bar .dot.red { background: #f7768e; }
#status-bar .label { color: #7aa2f7; }
#xterm-wrap { flex: 1; overflow: hidden; }
#overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(26,27,38,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 16px;
}
#overlay.visible { display: flex; }
#overlay button {
  background: #7aa2f7;
  color: #1a1b26;
  border: none;
  padding: 8px 24px;
  border-radius: 6px;
  font: 14px/1.4 'SF Mono', 'Menlo', monospace;
  cursor: pointer;
}
#overlay button:hover { background: #89b4fa; }
#overlay .msg { color: #a9b1d6; font: 14px/1.4 'SF Mono', 'Menlo', monospace; }
</style>
</head>
<body>
<div id="terminal-container">
  <div id="status-bar">
    <span><span class="dot red" id="status-dot"></span></span>
    <span id="status-text">Verbinde...</span>
    <span style="flex:1"></span>
    <span class="label" id="session-info">PTY</span>
  </div>
  <div id="xterm-wrap"></div>
  <div id="overlay">
    <div class="msg" id="overlay-msg">Verbindung getrennt</div>
    <button onclick="connect()">Neu verbinden</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
const term = new window.Terminal({
  fontFamily: "'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace",
  fontSize: 14,
  lineHeight: 1.3,
  theme: {
    background: '#1a1b26',
    foreground: '#a9b1d6',
    cursor: '#c0caf5',
    cursorAccent: '#1a1b26',
    selectionBackground: '#33467c',
    black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
    blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
    brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a', brightYellow: '#e0af68',
    brightBlue: '#7aa2f7', brightMagenta: '#bb9af7', brightCyan: '#7dcfff', brightWhite: '#c0caf5',
  },
  cursorBlink: true,
  cursorStyle: 'bar',
  scrollback: 10000,
  allowProposedApi: true,
});

const fitAddon = new window.FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.loadAddon(new window.WebLinksAddon.WebLinksAddon());
term.open(document.getElementById('xterm-wrap'));
fitAddon.fit();

const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const overlay = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlay-msg');

let sse = null;
let inputQueue = [];
let sending = false;
let reconnectTimer = null;
let reconnectDelay = 1000; // start with 1s, increase on repeated failures
const MAX_RECONNECT_DELAY = 10000;

function setStatus(state, text) {
  statusDot.className = 'dot ' + state;
  statusText.textContent = text;
}

// Send keystroke to PTY via POST
async function sendInput(data) {
  inputQueue.push(data);
  if (sending) return;
  sending = true;
  while (inputQueue.length > 0) {
    const batch = inputQueue.splice(0, inputQueue.length).join('');
    try {
      await fetch('/api/terminal/input', { method: 'POST', body: batch });
    } catch {}
  }
  sending = false;
}

// Send resize
function sendResize() {
  const cols = term.cols, rows = term.rows;
  fetch('/api/terminal/resize', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cols, rows })
  }).catch(() => {});
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  setStatus('yellow', 'Reconnect in ' + Math.round(reconnectDelay/1000) + 's...');
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, reconnectDelay);
  // Exponential backoff with cap
  reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY);
}

function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  overlay.classList.remove('visible');
  setStatus('yellow', 'Verbinde...');

  if (sse) { sse.close(); sse = null; }

  sse = new EventSource('/sse/terminal');

  sse.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'connected') {
        setStatus('green', 'Verbunden');
        reconnectDelay = 1000; // reset on successful connect
        document.getElementById('session-info').textContent = 'Claude Interactive';
        setTimeout(sendResize, 100);
        return;
      }
      if (msg.type === 'output' && msg.data) {
        const raw = atob(msg.data);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        term.write(bytes);
        return;
      }
      if (msg.type === 'exit') {
        setStatus('yellow', 'Claude beendet — starte neu...');
        if (sse) { sse.close(); sse = null; }
        // Auto-restart: reconnect after short delay (server will spawn new PTY)
        setTimeout(connect, 1500);
        return;
      }
    } catch (e) {
      console.error('[terminal] SSE parse error:', e);
    }
  };

  sse.onerror = () => {
    if (sse) { sse.close(); sse = null; }
    setStatus('red', 'Getrennt');
    // Auto-reconnect instead of showing overlay
    scheduleReconnect();
  };
}

// Keystrokes → POST → PTY
term.onData(data => sendInput(data));

// Handle resize
window.addEventListener('resize', () => { fitAddon.fit(); sendResize(); });
new ResizeObserver(() => { fitAddon.fit(); sendResize(); }).observe(document.getElementById('xterm-wrap'));

// Start
connect();
</script>
</body>
</html>
