<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zitat-Anzeige</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111110;--surface:#1a1a17;--border:rgba(255,255,255,0.08);--text:#e8e6de;--muted:#7a7870;--accent:#8B5CF6;--green:#1d9e75;--radius:8px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.title{font-weight:600;font-size:15px}
.status{margin-left:auto;font-size:11px;color:var(--muted)}
.status.active{color:var(--green)}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 16px}
.empty .icon{font-size:32px;margin-bottom:8px}
.quote-list{display:flex;flex-direction:column;gap:8px}
.quote-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.quote-item.latest{border-color:var(--accent);box-shadow:0 0 12px rgba(139,92,246,0.15)}
.quote-item .text{font-size:15px;font-style:italic;line-height:1.5;margin-bottom:6px}
.quote-item .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.counter{font-size:11px;color:var(--muted);margin-top:12px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <span>📜</span>
  <span class="title">Zitat-Anzeige</span>
  <span class="status" id="status">Warte auf Daten...</span>
</div>

<div id="content">
  <div class="empty" id="emptyState">
    <div class="icon">📭</div>
    <div>Noch keine Zitate empfangen.</div>
    <div style="font-size:11px;margin-top:4px;">Verbinde den Zitat-Generator im Graph!</div>
  </div>
</div>

<div class="counter" id="counter"></div>

<script>
// === PulseOS Graph Bridge ===
window.addEventListener('message', (e) => {
  if (e.data?.type === 'app-input') handleInput(e.data.inputName, e.data.data);
  if (e.data?.type === 'pulse') onPulse(e.data);
});

// === State ===
const receivedQuotes = [];

function handleInput(inputName, data) {
  console.log('[quote-display] Input received:', inputName, data);

  if (inputName === 'quote' && data) {
    receivedQuotes.unshift(data);
    if (receivedQuotes.length > 20) receivedQuotes.pop();
    render();

    // Flash status
    document.getElementById('status').textContent = 'Zitat #' + (data.index || receivedQuotes.length) + ' empfangen!';
    document.getElementById('status').classList.add('active');
    setTimeout(() => {
      document.getElementById('status').textContent = receivedQuotes.length + ' Zitate';
      document.getElementById('status').classList.remove('active');
    }, 3000);
  }
}

function render() {
  const content = document.getElementById('content');
  const empty = document.getElementById('emptyState');

  if (receivedQuotes.length === 0) {
    if (empty) empty.style.display = '';
    return;
  }
  if (empty) empty.style.display = 'none';

  content.innerHTML = '<div class="quote-list">' + receivedQuotes.map((q, i) => {
    const time = q.generatedAt ? new Date(q.generatedAt).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
    return '<div class="quote-item' + (i === 0 ? ' latest' : '') + '">' +
      '<div class="text">"' + escapeHtml(q.text || '') + '"</div>' +
      '<div class="meta"><span>— ' + escapeHtml(q.author || '?') + '</span><span>' + time + '</span></div>' +
    '</div>';
  }).join('') + '</div>';

  document.getElementById('counter').textContent = receivedQuotes.length + ' Zitate empfangen';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onPulse(data) {
  console.log('[quote-display] Pulse (ignored for consumer)');
}
</script>
</body>
</html>
