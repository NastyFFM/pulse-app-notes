<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workers</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg, #0d0d14); color:var(--text, #e0e0e0); font:13px/1.5 -apple-system, system-ui, sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.header { padding:10px 16px; border-bottom:1px solid var(--border, #1e1e2e); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.header h1 { font-size:14px; font-weight:600; }
.header .count { font-size:11px; color:var(--text-dim, #888); margin-left:auto; }
.new-btn { background:var(--teal, #4ecdc4); border:none; color:#000; padding:5px 12px; border-radius:6px; font-size:11px; cursor:pointer; font-weight:600; }

.content { flex:1; overflow-y:auto; padding:12px; }

.worker-card { background:var(--bg-card, #151520); border:1px solid var(--border, #1e1e2e); border-radius:10px; padding:12px; margin-bottom:10px; }
.worker-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-dot.running { background:#f59e0b; animation:pulse 1s infinite; }
.status-dot.done { background:#22c55e; }
.status-dot.error { background:#ef4444; }
.status-dot.stopped { background:#6b7280; }
.status-dot.pending { background:#3b82f6; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }

.worker-task { font-size:12px; font-weight:500; flex:1; }
.worker-time { font-size:10px; color:var(--text-dim, #888); }
.worker-progress { font-size:11px; color:var(--text-dim, #888); margin:6px 0; padding:6px 8px; background:var(--bg, #0d0d14); border-radius:4px; max-height:60px; overflow:hidden; }

.worker-actions { display:flex; gap:6px; margin-top:8px; }
.worker-actions button { padding:4px 10px; border-radius:4px; border:1px solid var(--border, #1e1e2e); background:var(--bg-card, #151520); color:var(--text, #e0e0e0); font-size:10px; cursor:pointer; }
.worker-actions button:hover { background:var(--bg-card-hover, #1a1a2e); }
.worker-actions .stop-btn { border-color:#ef4444; color:#ef4444; }

.log-panel { margin-top:8px; padding:8px; background:var(--bg, #0d0d14); border-radius:6px; max-height:200px; overflow-y:auto; font-size:10px; font-family:'SF Mono', monospace; }
.log-entry { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.log-entry .time { color:var(--text-dim, #555); }
.log-entry.error { color:#ef4444; }
.log-entry.progress { color:var(--teal, #4ecdc4); }
.log-entry.user-message { color:#f59e0b; }

.empty { text-align:center; color:var(--text-dim, #555); padding:40px 20px; }
.empty-icon { font-size:32px; margin-bottom:8px; }

/* New worker dialog */
.dialog-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; }
.dialog { background:var(--bg-surface, #12121c); border:1px solid var(--border, #1e1e2e); border-radius:12px; padding:20px; width:90%; max-width:400px; }
.dialog h2 { font-size:14px; margin-bottom:12px; }
.dialog textarea { width:100%; padding:8px; background:var(--bg-card, #151520); border:1px solid var(--border, #1e1e2e); color:var(--text, #e0e0e0); border-radius:6px; font:12px -apple-system, system-ui, sans-serif; resize:vertical; min-height:80px; }
.dialog select { width:100%; padding:8px; background:var(--bg-card, #151520); border:1px solid var(--border, #1e1e2e); color:var(--text, #e0e0e0); border-radius:6px; font-size:12px; margin-top:8px; }
.dialog .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
.dialog .btn-cancel { padding:6px 14px; border:1px solid var(--border, #1e1e2e); background:none; color:var(--text-dim, #888); border-radius:6px; cursor:pointer; font-size:11px; }
.dialog .btn-start { padding:6px 14px; background:var(--teal, #4ecdc4); border:none; color:#000; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; }
</style>
</head>
<body>

<div class="header">
  <h1>Workers</h1>
  <span class="count" id="workerCount">0 Worker</span>
  <button class="new-btn" onclick="showNewWorkerDialog()">+ Neuer Worker</button>
</div>

<div class="content" id="workerList">
  <div class="empty">
    <div class="empty-icon">⚙</div>
    <div>Keine Worker aktiv</div>
    <div style="font-size:11px;margin-top:4px;color:var(--text-dim,#555);">Starte einen Worker um Aufgaben im Hintergrund zu erledigen</div>
  </div>
</div>

<script>
let workers = [];
let expandedLogs = {};

async function loadWorkers() {
  try {
    const r = await fetch('/api/workers');
    const data = await r.json();
    workers = data.workers || [];
    renderWorkers();
  } catch {}
}

function renderWorkers() {
  const el = document.getElementById('workerList');
  document.getElementById('workerCount').textContent = workers.length + ' Worker' + (workers.length !== 1 ? 's' : '');

  if (!workers.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚙</div><div>Keine Worker aktiv</div></div>';
    return;
  }

  el.innerHTML = workers.map(w => {
    const elapsed = w.startedAt ? timeSince(new Date(w.startedAt)) : '';
    const showLog = expandedLogs[w.id];
    return '<div class="worker-card">' +
      '<div class="worker-header">' +
        '<div class="status-dot ' + w.status + '"></div>' +
        '<div class="worker-task">' + esc(w.task.substring(0, 100)) + '</div>' +
        '<div class="worker-time">' + elapsed + '</div>' +
      '</div>' +
      (w.progress ? '<div class="worker-progress">' + esc(w.progress) + '</div>' : '') +
      (w.result && w.status !== 'running' ? '<div style="font-size:11px;margin:6px 0;padding:6px 8px;background:' + (w.status === 'done' ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)') + ';border-radius:4px;">' + esc(w.result) + '</div>' : '') +
      '<div class="worker-actions">' +
        '<button onclick="toggleLog(\'' + w.id + '\')">' + (showLog ? 'Log ▲' : 'Log ▼') + '</button>' +
        (w.status === 'running' ? '<button class="stop-btn" onclick="stopWorker(\'' + w.id + '\')">Stoppen</button>' : '') +
        (w.status !== 'running' ? '<button onclick="deleteWorker(\'' + w.id + '\')">Entfernen</button>' : '') +
      '</div>' +
      (showLog ? '<div class="log-panel">' + (w.log || []).map(l =>
        '<div class="log-entry ' + (l.type || '') + '"><span class="time">' + new Date(l.time).toLocaleTimeString() + '</span> ' + esc(l.text) + '</div>'
      ).join('') + '</div>' : '') +
    '</div>';
  }).join('');
}

function toggleLog(id) {
  expandedLogs[id] = !expandedLogs[id];
  renderWorkers();
}

async function stopWorker(id) {
  await fetch('/api/workers/' + id, { method: 'DELETE' });
  loadWorkers();
}

async function deleteWorker(id) {
  // Just remove from UI (file stays for history)
  workers = workers.filter(w => w.id !== id);
  renderWorkers();
}

function showNewWorkerDialog() {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = '<div class="dialog">' +
    '<h2>Neuen Worker starten</h2>' +
    '<textarea id="workerTask" placeholder="Beschreibe die Aufgabe...&#10;z.B. Erstelle eine Fitness-App mit Übungsübersicht und Timer"></textarea>' +
    '<select id="workerModel"><option value="sonnet">Sonnet (schnell)</option><option value="opus">Opus (klüger)</option><option value="haiku">Haiku (günstig)</option></select>' +
    '<div class="btn-row">' +
      '<button class="btn-cancel" onclick="this.closest(\'.dialog-overlay\').remove()">Abbrechen</button>' +
      '<button class="btn-start" onclick="startWorker()">Starten</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  document.getElementById('workerTask').focus();
}

async function startWorker() {
  const task = document.getElementById('workerTask').value.trim();
  const model = document.getElementById('workerModel').value;
  if (!task) return;
  document.querySelector('.dialog-overlay')?.remove();

  try {
    const r = await fetch('/api/workers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, model })
    });
    const data = await r.json();
    if (data.ok) loadWorkers();
  } catch {}
}

function timeSince(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'min';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// Auto-refresh every 5s
loadWorkers();
setInterval(loadWorkers, 5000);

// Graph input support
if (window.PulseOS) {
  window.PulseOS.onInput('task', function(data) {
    if (data && data.text) {
      fetch('/api/workers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task: data.text, model: data.model || 'sonnet' })
      }).then(() => loadWorkers());
    }
  });
}
</script>
</body>
</html>
