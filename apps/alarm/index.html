<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wecker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    background: #111;
    border-bottom: 2px solid #F59E0B;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .title { font-size: 18px; font-weight: bold; color: #F59E0B; }
  .clock-display {
    text-align: center;
    padding: 40px 20px 20px;
    flex-shrink: 0;
  }
  .clock-time {
    font-size: 80px;
    font-weight: 200;
    color: #F59E0B;
    font-variant-numeric: tabular-nums;
    letter-spacing: 4px;
  }
  .clock-seconds {
    font-size: 32px;
    color: #F59E0B88;
    vertical-align: super;
  }
  .clock-date {
    font-size: 16px;
    color: #888;
    margin-top: 8px;
  }
  .tabs {
    display: flex;
    border-bottom: 1px solid #222;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 24px;
    cursor: pointer;
    color: #888;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-size: 14px;
  }
  .tab:hover { color: #ccc; }
  .tab.active { color: #F59E0B; border-bottom-color: #F59E0B; }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Alarm List */
  .alarm-item {
    background: #151515;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.2s;
  }
  .alarm-item:hover { border-color: #333; }
  .alarm-item.disabled { opacity: 0.4; }
  .alarm-time { font-size: 36px; font-weight: 300; color: #fff; font-variant-numeric: tabular-nums; }
  .alarm-label { font-size: 13px; color: #888; margin-top: 4px; }
  .alarm-days { font-size: 11px; color: #666; margin-top: 4px; }
  .alarm-days span { margin-right: 4px; }
  .alarm-days span.active { color: #F59E0B; font-weight: bold; }
  .toggle {
    width: 50px; height: 26px;
    background: #333;
    border-radius: 13px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .toggle.on { background: #F59E0B; }
  .toggle::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.3s;
  }
  .toggle.on::after { transform: translateX(24px); }

  /* Add Alarm */
  .add-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .add-bar input[type="time"] {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 18px;
    font-family: inherit;
  }
  .add-bar input[type="text"] {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    flex: 1;
    font-family: inherit;
  }
  .btn {
    background: #F59E0B;
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-delete {
    background: none;
    border: 1px solid #444;
    color: #888;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 12px;
  }
  .btn-delete:hover { border-color: #EF4444; color: #EF4444; }

  /* Stopwatch */
  .stopwatch {
    text-align: center;
    padding-top: 40px;
  }
  .sw-display {
    font-size: 64px;
    font-weight: 200;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    margin-bottom: 30px;
  }
  .sw-ms { font-size: 32px; color: #888; }
  .sw-buttons { display: flex; gap: 16px; justify-content: center; }
  .sw-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid;
    background: none;
    color: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .sw-btn.start { border-color: #10B981; color: #10B981; }
  .sw-btn.start:hover { background: #10B98122; }
  .sw-btn.stop { border-color: #EF4444; color: #EF4444; }
  .sw-btn.stop:hover { background: #EF444422; }
  .sw-btn.reset { border-color: #666; color: #666; }
  .sw-btn.reset:hover { background: #66666622; }
  .sw-btn.lap { border-color: #3B82F6; color: #3B82F6; }
  .sw-btn.lap:hover { background: #3B82F622; }
  .laps {
    margin-top: 30px;
    max-height: 200px;
    overflow-y: auto;
  }
  .lap-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 40px;
    font-size: 14px;
    color: #888;
    border-bottom: 1px solid #1a1a1a;
  }

  /* Timer */
  .timer-setup {
    text-align: center;
    padding-top: 30px;
  }
  .timer-inputs {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 30px;
  }
  .timer-inputs input {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    width: 70px;
    padding: 12px;
    border-radius: 8px;
    font-size: 28px;
    text-align: center;
    font-family: inherit;
  }
  .timer-inputs span { font-size: 28px; color: #555; }
  .timer-display {
    font-size: 72px;
    font-weight: 200;
    color: #fff;
    font-variant-numeric: tabular-nums;
    text-align: center;
    padding: 40px 0;
  }
  .timer-display.alarm { color: #EF4444; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  /* Alarm ringing overlay */
  .alarm-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .alarm-overlay.active { display: flex; }
  .alarm-overlay .alarm-icon { font-size: 80px; animation: shake 0.3s infinite alternate; }
  .alarm-overlay .alarm-text { font-size: 48px; color: #F59E0B; margin: 20px 0; }
  .alarm-overlay .alarm-label-text { font-size: 20px; color: #888; margin-bottom: 30px; }
  .alarm-overlay .dismiss-btn {
    background: #EF4444;
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
  }
  @keyframes shake {
    from { transform: rotate(-15deg); }
    to { transform: rotate(15deg); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">Wecker</div>
</div>

<div class="clock-display">
  <div class="clock-time" id="clockTime">--:--</div>
  <div class="clock-date" id="clockDate"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="alarms">Alarme</div>
  <div class="tab" data-tab="stopwatch">Stoppuhr</div>
  <div class="tab" data-tab="timer">Timer</div>
</div>

<div class="content">
  <!-- Alarms Panel -->
  <div class="panel active" id="panel-alarms">
    <div class="add-bar">
      <input type="time" id="newTime" value="07:00">
      <input type="text" id="newLabel" placeholder="Bezeichnung...">
      <button class="btn" onclick="addAlarm()">+ Alarm</button>
    </div>
    <div id="alarmList"></div>
  </div>

  <!-- Stopwatch Panel -->
  <div class="panel" id="panel-stopwatch">
    <div class="stopwatch">
      <div class="sw-display"><span id="swTime">00:00</span><span class="sw-ms" id="swMs">.00</span></div>
      <div class="sw-buttons">
        <button class="sw-btn reset" onclick="swReset()">Reset</button>
        <button class="sw-btn start" id="swStartBtn" onclick="swToggle()">Start</button>
        <button class="sw-btn lap" onclick="swLap()">Runde</button>
      </div>
      <div class="laps" id="lapList"></div>
    </div>
  </div>

  <!-- Timer Panel -->
  <div class="panel" id="panel-timer">
    <div class="timer-setup" id="timerSetup">
      <div class="timer-inputs">
        <input type="number" id="timerH" value="0" min="0" max="23">
        <span>h</span>
        <input type="number" id="timerM" value="5" min="0" max="59">
        <span>m</span>
        <input type="number" id="timerS" value="0" min="0" max="59">
        <span>s</span>
      </div>
      <button class="btn" onclick="startTimer()">Timer starten</button>
    </div>
    <div style="display:none; text-align:center;" id="timerRunning">
      <div class="timer-display" id="timerDisplay">05:00</div>
      <div class="sw-buttons">
        <button class="sw-btn stop" onclick="stopTimer()">Stop</button>
        <button class="sw-btn reset" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  </div>
</div>

<!-- Alarm Ringing Overlay -->
<div class="alarm-overlay" id="alarmOverlay">
  <div class="alarm-icon">⏰</div>
  <div class="alarm-text" id="alarmRingTime"></div>
  <div class="alarm-label-text" id="alarmRingLabel"></div>
  <button class="dismiss-btn" onclick="dismissAlarm()">Alarm aus</button>
</div>

<script>
const BASE = window.location.origin;
const DAY_NAMES = ['So','Mo','Di','Mi','Do','Fr','Sa'];
let alarms = [];
let audioCtx = null;

// === CLOCK ===
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').innerHTML = `${h}:${m}<span class="clock-seconds">${s}</span>`;
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('clockDate').textContent = now.toLocaleDateString('de-DE', opts);
  checkAlarms(now, h, m, s);
}
setInterval(updateClock, 1000);
updateClock();

// === TABS ===
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// === ALARMS ===
async function loadAlarms() {
  try {
    const r = await fetch(BASE + '/app/alarm/api/alarms');
    const data = await r.json();
    alarms = data.alarms || [];
    renderAlarms();
  } catch(e) { console.error('Load alarms failed', e); }
}

async function saveAlarms() {
  try {
    await fetch(BASE + '/app/alarm/api/alarms', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ alarms }, null, 2)
    });
  } catch(e) { console.error('Save failed', e); }
}

function renderAlarms() {
  const list = document.getElementById('alarmList');
  if (!alarms.length) {
    list.innerHTML = '<div style="text-align:center;color:#555;padding:40px;">Keine Alarme gesetzt</div>';
    return;
  }
  list.innerHTML = alarms.map(a => {
    const daysHtml = DAY_NAMES.map((d,i) =>
      `<span class="${a.days && a.days.includes(i) ? 'active' : ''}">${d}</span>`
    ).join('');
    return `
      <div class="alarm-item ${a.enabled ? '' : 'disabled'}">
        <div>
          <div class="alarm-time">${a.time}</div>
          <div class="alarm-label">${a.label || 'Alarm'}</div>
          <div class="alarm-days">${daysHtml}</div>
        </div>
        <div style="display:flex;align-items:center;">
          <div class="toggle ${a.enabled ? 'on' : ''}" onclick="toggleAlarm('${a.id}')"></div>
          <button class="btn-delete" onclick="deleteAlarm('${a.id}')">Loeschen</button>
        </div>
      </div>`;
  }).join('');
}

function addAlarm() {
  const time = document.getElementById('newTime').value;
  const label = document.getElementById('newLabel').value || 'Alarm';
  if (!time) return;
  alarms.push({
    id: 'alarm-' + Date.now(),
    time, label, enabled: true, days: []
  });
  document.getElementById('newLabel').value = '';
  renderAlarms();
  saveAlarms();
}

function toggleAlarm(id) {
  const a = alarms.find(x => x.id === id);
  if (a) { a.enabled = !a.enabled; renderAlarms(); saveAlarms(); }
}

function deleteAlarm(id) {
  alarms = alarms.filter(x => x.id !== id);
  renderAlarms();
  saveAlarms();
}

let lastAlarmMinute = '';
function checkAlarms(now, h, m, s) {
  if (s !== '00') return;
  const key = h + ':' + m;
  if (key === lastAlarmMinute) return;
  const day = now.getDay();
  for (const a of alarms) {
    if (!a.enabled) continue;
    if (a.time !== key) continue;
    if (a.days && a.days.length > 0 && !a.days.includes(day)) continue;
    lastAlarmMinute = key;
    ringAlarm(a);
    return;
  }
}

function ringAlarm(a) {
  document.getElementById('alarmRingTime').textContent = a.time;
  document.getElementById('alarmRingLabel').textContent = a.label || 'Alarm';
  document.getElementById('alarmOverlay').classList.add('active');
  playAlarmSound();
}

function dismissAlarm() {
  document.getElementById('alarmOverlay').classList.remove('active');
  stopAlarmSound();
}

let alarmOsc = null;
function playAlarmSound() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    alarmOsc = { osc, gain };
    // beep pattern
    let on = true;
    const iv = setInterval(() => {
      if (!alarmOsc) { clearInterval(iv); return; }
      gain.gain.value = on ? 0.3 : 0;
      on = !on;
    }, 500);
    alarmOsc.interval = iv;
  } catch(e) {}
}

function stopAlarmSound() {
  if (alarmOsc) {
    clearInterval(alarmOsc.interval);
    alarmOsc.osc.stop();
    alarmOsc = null;
  }
}

// === STOPWATCH ===
let swRunning = false, swStart = 0, swElapsed = 0, swTimer = null, laps = [];

function swToggle() {
  if (swRunning) {
    clearInterval(swTimer);
    swElapsed += Date.now() - swStart;
    swRunning = false;
    document.getElementById('swStartBtn').textContent = 'Start';
    document.getElementById('swStartBtn').className = 'sw-btn start';
  } else {
    swStart = Date.now();
    swRunning = true;
    document.getElementById('swStartBtn').textContent = 'Stop';
    document.getElementById('swStartBtn').className = 'sw-btn stop';
    swTimer = setInterval(swUpdate, 10);
  }
}

function swUpdate() {
  const total = swElapsed + (Date.now() - swStart);
  const mins = Math.floor(total / 60000);
  const secs = Math.floor((total % 60000) / 1000);
  const ms = Math.floor((total % 1000) / 10);
  document.getElementById('swTime').textContent =
    String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
  document.getElementById('swMs').textContent = '.' + String(ms).padStart(2,'0');
}

function swReset() {
  clearInterval(swTimer);
  swRunning = false;
  swElapsed = 0;
  laps = [];
  document.getElementById('swTime').textContent = '00:00';
  document.getElementById('swMs').textContent = '.00';
  document.getElementById('swStartBtn').textContent = 'Start';
  document.getElementById('swStartBtn').className = 'sw-btn start';
  document.getElementById('lapList').innerHTML = '';
}

function swLap() {
  if (!swRunning) return;
  const total = swElapsed + (Date.now() - swStart);
  laps.push(total);
  const list = document.getElementById('lapList');
  const mins = Math.floor(total / 60000);
  const secs = Math.floor((total % 60000) / 1000);
  const ms = Math.floor((total % 1000) / 10);
  const t = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '.' + String(ms).padStart(2,'0');
  list.innerHTML = `<div class="lap-item"><span>Runde ${laps.length}</span><span>${t}</span></div>` + list.innerHTML;
}

// === TIMER ===
let timerTotal = 0, timerRemain = 0, timerInterval = null;

function startTimer() {
  const h = parseInt(document.getElementById('timerH').value) || 0;
  const m = parseInt(document.getElementById('timerM').value) || 0;
  const s = parseInt(document.getElementById('timerS').value) || 0;
  timerTotal = h * 3600 + m * 60 + s;
  if (timerTotal <= 0) return;
  timerRemain = timerTotal;
  document.getElementById('timerSetup').style.display = 'none';
  document.getElementById('timerRunning').style.display = 'block';
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemain--;
    updateTimerDisplay();
    if (timerRemain <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timerDisplay').classList.add('alarm');
      ringAlarm({ time: '', label: 'Timer abgelaufen!' });
    }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(timerRemain / 3600);
  const m = Math.floor((timerRemain % 3600) / 60);
  const s = timerRemain % 60;
  let text = '';
  if (h > 0) text = String(h).padStart(2,'0') + ':';
  text += String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  document.getElementById('timerDisplay').textContent = text;
}

function stopTimer() {
  clearInterval(timerInterval);
}

function resetTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerDisplay').classList.remove('alarm');
  document.getElementById('timerSetup').style.display = 'block';
  document.getElementById('timerRunning').style.display = 'none';
}

// === POLLING ===
setInterval(loadAlarms, 5000);
loadAlarms();
</script>
</body>
</html>
