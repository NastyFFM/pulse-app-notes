<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Radio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0f;height:100vh;color:#e2e8f0;display:flex;flex-direction:column;overflow:hidden}

.top-bar{display:flex;align-items:center;gap:16px;padding:14px 20px;background:rgba(15,15,25,.95);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.top-bar h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:4px;margin-left:24px}
.tab{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:all .15s}
.tab:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.tab.active{background:rgba(139,92,246,.2);color:#a78bfa}
.search-box{margin-left:auto;display:flex;gap:8px;align-items:center}
.search-box input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;color:#e2e8f0;font-size:.82rem;width:260px;outline:none;font-family:inherit}
.search-box input:focus{border-color:rgba(139,92,246,.5)}
.search-box input::placeholder{color:rgba(255,255,255,.25)}
.search-box button{padding:8px 14px;border-radius:8px;border:none;background:rgba(139,92,246,.25);color:#a78bfa;cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit}
.search-box button:hover{background:rgba(139,92,246,.4)}

.content{flex:1;overflow-y:auto;padding:20px;min-height:0}

.station-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.station-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
.station-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
.station-card.playing{border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.08)}
.station-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(59,130,246,.3));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden}
.station-icon img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.station-info{flex:1;min-width:0}
.station-name{font-size:.9rem;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.station-meta{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.station-meta span{display:flex;align-items:center;gap:3px}
.station-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.station-tag{font-size:.65rem;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.fav-btn{flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;font-size:1.3rem;cursor:pointer;transition:all .15s;color:#fbbf24;line-height:1;z-index:2}
.fav-btn:hover{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.4);transform:scale(1.1)}
.fav-btn.faved{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.4)}

.player-bar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:rgba(15,15,25,.98);border-top:1px solid rgba(255,255,255,.06);min-height:72px;flex-shrink:0}
.player-bar.hidden{display:none}
.player-art{width:48px;height:48px;border-radius:10px;background:rgba(139,92,246,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden}
.player-art img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.player-info{flex:1;min-width:0}
.player-name{font-size:.9rem;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-detail{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px}
.player-controls{display:flex;align-items:center;gap:12px}
.ctrl-btn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(139,92,246,.25);color:#a78bfa;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ctrl-btn:hover{background:rgba(139,92,246,.4)}
.ctrl-btn.play{width:48px;height:48px;background:rgba(139,92,246,.5);color:#fff;font-size:1.3rem}
.ctrl-btn.play:hover{background:rgba(139,92,246,.7)}
.volume-wrap{display:flex;align-items:center;gap:8px;margin-left:12px}
.volume-wrap span{font-size:.8rem;opacity:.5}
.volume-wrap input[type=range]{width:100px;accent-color:#a78bfa;height:4px}

.eq-bars{display:flex;align-items:flex-end;gap:2px;height:20px;margin-left:8px}
.eq-bar{width:3px;background:#a78bfa;border-radius:1px;animation:eqAnim .8s ease-in-out infinite alternate}
.eq-bar:nth-child(1){height:8px;animation-delay:0s}
.eq-bar:nth-child(2){height:14px;animation-delay:.15s}
.eq-bar:nth-child(3){height:10px;animation-delay:.3s}
.eq-bar:nth-child(4){height:18px;animation-delay:.1s}
.eq-bar:nth-child(5){height:6px;animation-delay:.25s}
@keyframes eqAnim{0%{transform:scaleY(.3)}100%{transform:scaleY(1)}}
.eq-bars.paused .eq-bar{animation-play-state:paused}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;opacity:.4;text-align:center;gap:14px}
.empty-state .big{font-size:3.5rem}
.empty-state p{font-size:.9rem;max-width:300px;line-height:1.6}

.loading{text-align:center;padding:40px;opacity:.4;font-size:.9rem}
.genre-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.genre-chip{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .15s}
.genre-chip:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.genre-chip.active{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.3);color:#a78bfa}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📻 Internet Radio</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')" id="tabBrowse">Entdecken</button>
    <button class="tab" onclick="switchTab('favourites')" id="tabFavs">Favoriten</button>
  </div>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter')doSearch()" />
    <button onclick="doSearch()">Suchen</button>
  </div>
</div>

<div class="content" id="content">
  <div class="loading" id="loadingMsg">Sender werden geladen...</div>
</div>

<div class="player-bar hidden" id="playerBar">
  <div class="player-art" id="playerArt">📻</div>
  <div class="player-info">
    <div class="player-name" id="playerName">-</div>
    <div class="player-detail" id="playerDetail">-</div>
  </div>
  <button class="fav-btn" id="playerFavBtn" onclick="togglePlayerFav()" title="Favorit">☆</button>
  <div class="eq-bars paused" id="eqBars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  <div class="player-controls">
    <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="stopPlayback()" title="Stop">■</button>
  </div>
  <div class="volume-wrap">
    <span>🔊</span>
    <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)" id="volumeSlider" />
  </div>
</div>

<audio id="audioEl" crossorigin="anonymous"></audio>

<script>
const API='api/radio';
const RADIO_API='https://de1.api.radio-browser.info/json';
const GENRES=['Pop','Rock','Jazz','Classical','Electronic','Hip Hop','News','Talk','Ambient','Chillout','Latin','Country','Reggae','Metal','Indie','80s','90s','Schlager'];

let favourites=[];
let currentTab='browse';
let currentStations=[];
let playingStation=null;
let isPlaying=false;
const audio=document.getElementById('audioEl');

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function loadFavourites(){
  try{const r=await fetch(API+'?t='+Date.now());if(!r.ok)throw 0;const d=await r.json();favourites=d.favourites||[]}catch{favourites=[]}
}
async function saveFavourites(){
  try{
    await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({favourites},null,2)});
  }catch(e){console.error('Save error:',e)}
}

function doSearch(){
  const v=document.getElementById('searchInput').value.trim();
  if(v)searchStations(v);
}

async function searchStations(query,tag){
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading">Sender werden gesucht...</div>';
  try{
    let url;
    if(tag){url=RADIO_API+'/stations/bytag/'+encodeURIComponent(tag)+'?limit=60&order=clickcount&reverse=true&hidebroken=true'}
    else if(query){url=RADIO_API+'/stations/byname/'+encodeURIComponent(query)+'?limit=60&order=clickcount&reverse=true&hidebroken=true'}
    else{url=RADIO_API+'/stations/topclick/60?hidebroken=true'}
    const r=await fetch(url);
    if(!r.ok)throw new Error('API error');
    currentStations=await r.json();
    renderStations(currentStations);
  }catch(e){
    content.innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>Fehler beim Laden der Sender. Bitte versuche es erneut.</p></div>';
  }
}

function renderGenreChips(activeTag){
  let h='<div class="genre-chips">';
  GENRES.forEach(g=>{h+='<button class="genre-chip'+(activeTag===g?' active':'')+'" onclick="browseGenre(\''+g+'\')">'+g+'</button>'});
  h+='</div>';
  return h;
}

function browseGenre(tag){
  searchStations(null,tag);
}

function renderStations(stations){
  const content=document.getElementById('content');
  let h=currentTab==='browse'?renderGenreChips():'';
  if(!stations.length){
    h+='<div class="empty-state"><div class="big">'+(currentTab==='favourites'?'⭐':'🔍')+'</div><p>'+(currentTab==='favourites'?'Noch keine Favoriten gespeichert. Durchsuche Sender und speichere deine Lieblingssender.':'Keine Sender gefunden. Versuche einen anderen Suchbegriff.')+'</p></div>';
    content.innerHTML=h;return;
  }
  h+='<div class="station-grid">';
  stations.forEach((s,i)=>{
    const isFav=favourites.some(f=>f.stationuuid===s.stationuuid);
    const playing=playingStation&&playingStation.stationuuid===s.stationuuid;
    h+='<div class="station-card'+(playing?' playing':'')+'" onclick="playStation('+i+')" data-idx="'+i+'">';
    h+='<div class="station-icon">'+(s.favicon?'<img src="'+esc(s.favicon)+'" onerror="this.parentNode.textContent=\'📻\'" />':'📻')+'</div>';
    h+='<div class="station-info"><div class="station-name">'+esc(s.name)+'</div>';
    h+='<div class="station-meta">';
    if(s.country)h+='<span>🌍 '+esc(s.country)+'</span>';
    if(s.bitrate)h+='<span>'+s.bitrate+' kbps</span>';
    if(s.codec)h+='<span>'+esc(s.codec)+'</span>';
    h+='</div>';
    if(s.tags){const tags=s.tags.split(',').slice(0,3).filter(t=>t.trim());if(tags.length){h+='<div class="station-tags">';tags.forEach(t=>{h+='<span class="station-tag">'+esc(t.trim())+'</span>'});h+='</div>'}}
    h+='</div>';
    h+='<button class="fav-btn'+(isFav?' faved':'')+'" onclick="event.stopPropagation();toggleFav('+i+')" title="'+(isFav?'Aus Favoriten entfernen':'Zu Favoriten hinzufuegen')+'">'+(isFav?'⭐':'☆')+'</button>';
    h+='</div>';
  });
  h+='</div>';
  content.innerHTML=h;
}

function playStation(idx){
  const stations=currentTab==='favourites'?favourites:currentStations;
  const s=stations[idx];
  if(!s||!s.url_resolved&&!s.url)return;
  playingStation=s;
  audio.src=s.url_resolved||s.url;
  audio.play().catch(()=>{});
  isPlaying=true;
  updatePlayer();
  renderStations(stations);
  try{fetch(RADIO_API+'/url/'+s.stationuuid,{method:'GET'}).catch(()=>{})}catch{}
}

function togglePlay(){
  if(!playingStation)return;
  if(isPlaying){audio.pause();isPlaying=false}
  else{audio.play().catch(()=>{});isPlaying=true}
  updatePlayer();
}

function stopPlayback(){
  audio.pause();audio.src='';isPlaying=false;playingStation=null;
  document.getElementById('playerBar').classList.add('hidden');
  renderStations(currentTab==='favourites'?favourites:currentStations);
}

function setVolume(v){audio.volume=v/100}

function updatePlayer(){
  const bar=document.getElementById('playerBar');
  if(!playingStation){bar.classList.add('hidden');return}
  bar.classList.remove('hidden');
  document.getElementById('playerName').textContent=playingStation.name||'Unbekannt';
  document.getElementById('playerDetail').textContent=[playingStation.country,playingStation.tags?playingStation.tags.split(',').slice(0,2).join(', '):''].filter(Boolean).join(' · ')||'Internet Radio';
  const art=document.getElementById('playerArt');
  art.innerHTML=playingStation.favicon?'<img src="'+esc(playingStation.favicon)+'" onerror="this.parentNode.textContent=\'📻\'" />':'📻';
  document.getElementById('playBtn').textContent=isPlaying?'⏸':'▶';
  document.getElementById('eqBars').classList.toggle('paused',!isPlaying);
  const pfb=document.getElementById('playerFavBtn');
  if(playingStation){const isFav=favourites.some(f=>f.stationuuid===playingStation.stationuuid);pfb.textContent=isFav?'⭐':'☆';pfb.classList.toggle('faved',isFav);pfb.title=isFav?'Aus Favoriten entfernen':'Zu Favoriten hinzufuegen'}
}

async function togglePlayerFav(){
  if(!playingStation)return;
  const fi=favourites.findIndex(f=>f.stationuuid===playingStation.stationuuid);
  if(fi>=0){favourites.splice(fi,1)}else{favourites.push({...playingStation})}
  await saveFavourites();
  updatePlayer();
  renderStations(currentTab==='favourites'?favourites:currentStations);
}

async function toggleFav(idx){
  const stations=currentTab==='favourites'?favourites:currentStations;
  const s=stations[idx];if(!s)return;
  const fi=favourites.findIndex(f=>f.stationuuid===s.stationuuid);
  if(fi>=0){
    favourites.splice(fi,1);
    if(currentTab==='favourites'){renderStations(favourites);await saveFavourites();return}
  }else{
    favourites.push({...s});
  }
  await saveFavourites();
  renderStations(stations);
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabBrowse').classList.toggle('active',tab==='browse');
  document.getElementById('tabFavs').classList.toggle('active',tab==='favourites');
  if(tab==='favourites'){renderStations(favourites)}
  else{searchStations()}
}

audio.addEventListener('error',()=>{
  if(playingStation){document.getElementById('playerDetail').textContent='Verbindungsfehler - Sender nicht erreichbar'}
});

// SSE
function connectSSE(){const es=new EventSource('/sse/radio');es.onmessage=e=>{if(e.data==='connected')return;try{const d=JSON.parse(e.data);if(d.file==='radio.json')loadFavourites().then(()=>{if(currentTab==='favourites')renderStations(favourites)})}catch{}};es.onerror=()=>{es.close();setTimeout(connectSSE,3000)}}

async function init(){
  await loadFavourites();
  audio.volume=0.8;
  await searchStations();
  connectSSE();
}
init();
</script>
</body>
</html>
