<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rezepte</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:240px;background:#16213e;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header h2{font-size:1.1rem;color:#F97316;display:flex;align-items:center;gap:8px}
.search-box{width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:.85rem;margin-top:10px;outline:none}
.search-box:focus{border-color:#F97316}
.search-box::placeholder{color:rgba(255,255,255,.3)}

.cat-list{padding:8px;flex:1;overflow-y:auto}
.cat-item{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:.85rem;color:rgba(255,255,255,.6);transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.cat-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.cat-item.active{background:rgba(249,115,22,.15);color:#F97316;font-weight:600}
.cat-count{font-size:.75rem;background:rgba(255,255,255,.08);padding:2px 7px;border-radius:10px}

.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.btn-add{width:100%;padding:10px;border-radius:8px;border:1px dashed rgba(249,115,22,.4);background:transparent;color:#F97316;cursor:pointer;font-size:.85rem;transition:all .15s}
.btn-add:hover{background:rgba(249,115,22,.1);border-color:#F97316}

/* Header */
.main-header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
.main-header h1{font-size:1.2rem;font-weight:600}
.view-toggle{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:8px;padding:3px}
.view-btn{padding:6px 10px;border:none;background:transparent;color:rgba(255,255,255,.4);cursor:pointer;border-radius:6px;font-size:.8rem}
.view-btn.active{background:rgba(249,115,22,.2);color:#F97316}
.sort-select{padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e0e0e0;font-size:.8rem;outline:none;cursor:pointer}

/* Recipe Grid */
.recipe-grid{flex:1;overflow-y:auto;padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;align-content:start}
.recipe-grid.list-view{grid-template-columns:1fr}

.recipe-card{background:#16213e;border-radius:12px;border:1px solid rgba(255,255,255,.06);overflow:hidden;cursor:pointer;transition:all .2s}
.recipe-card:hover{border-color:rgba(249,115,22,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-img{height:140px;background:linear-gradient(135deg,#F97316,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative}
.list-view .card-img{height:80px;width:120px;flex-shrink:0;font-size:2rem}
.list-view .recipe-card{display:flex}
.list-view .card-body{padding:12px 16px}
.card-fav{position:absolute;top:8px;right:8px;font-size:1.2rem;cursor:pointer;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));transition:transform .15s}
.card-fav:hover{transform:scale(1.2)}
.card-body{padding:14px 16px}
.card-title{font-size:.95rem;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.card-meta{display:flex;gap:12px;font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:8px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:10px;font-size:.7rem;background:rgba(249,115,22,.12);color:#fb923c}

/* Detail View */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.detail-overlay.open{display:flex}
.detail{background:#16213e;border-radius:16px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.detail-hero{height:180px;background:linear-gradient(135deg,#F97316,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative}
.detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.3);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:rgba(0,0,0,.5)}
.detail-content{padding:24px}
.detail-title{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.detail-meta{display:flex;gap:16px;font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:16px;flex-wrap:wrap}
.detail-meta span{display:flex;align-items:center;gap:4px}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:.9rem;font-weight:600;color:#F97316;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.ingredient-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.ingredient-list li{padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px;font-size:.85rem;display:flex;align-items:center;gap:8px}
.ingredient-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:#F97316;flex-shrink:0}
.step-list{list-style:none;counter-reset:steps}
.step-list li{counter-increment:steps;padding:10px 10px 10px 44px;background:rgba(255,255,255,.04);border-radius:8px;font-size:.85rem;margin-bottom:6px;position:relative;line-height:1.5}
.step-list li::before{content:counter(steps);position:absolute;left:10px;top:10px;width:24px;height:24px;border-radius:50%;background:rgba(249,115,22,.2);color:#F97316;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.3);gap:12px}
.empty-icon{font-size:3rem}

/* Difficulty badge */
.diff{padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.diff-einfach{background:rgba(34,197,94,.15);color:#22c55e}
.diff-mittel{background:rgba(249,115,22,.15);color:#f97316}
.diff-schwer{background:rgba(239,68,68,.15);color:#ef4444}

/* Online Search */
.online-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.online-overlay.open{display:flex}
.online-panel{background:#16213e;border-radius:16px;width:92%;max-width:820px;max-height:88vh;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.online-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.online-search-row{display:flex;gap:8px;flex:1}
.online-search-input{flex:1;padding:9px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:.9rem;outline:none;font-family:inherit}
.online-search-input:focus{border-color:#22c55e}
.btn-search{padding:9px 18px;border-radius:10px;border:none;background:#22c55e;color:#fff;font-size:.85rem;cursor:pointer;font-weight:600;white-space:nowrap}
.btn-search:hover{background:#16a34a}
.online-results{flex:1;overflow-y:auto;padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.online-card{background:rgba(255,255,255,.04);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:all .2s}
.online-card:hover{border-color:rgba(34,197,94,.3)}
.online-card-img{height:120px;background-size:cover;background-position:center}
.online-card-body{padding:12px}
.online-card-title{font-size:.88rem;font-weight:600;margin-bottom:5px;line-height:1.3}
.online-card-meta{font-size:.74rem;color:rgba(255,255,255,.4);margin-bottom:8px}
.btn-import{width:100%;padding:7px;border-radius:7px;border:none;background:rgba(34,197,94,.15);color:#22c55e;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s}
.btn-import:hover{background:rgba(34,197,94,.3)}
.btn-import.imported{background:rgba(249,115,22,.12);color:#F97316;cursor:default}
.online-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:rgba(255,255,255,.3);gap:12px;text-align:center}
.online-status{padding:8px 20px;font-size:.78rem;color:rgba(255,255,255,.35);border-top:1px solid rgba(255,255,255,.06)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* Add/Edit Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#16213e;border-radius:16px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;border:1px solid rgba(255,255,255,.1);padding:24px}
.modal h2{font-size:1.2rem;margin-bottom:16px;color:#F97316}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:.85rem;outline:none;font-family:inherit}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#F97316}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:500}
.btn-primary{background:#F97316;color:#fff}
.btn-primary:hover{background:#ea580c}
.btn-secondary{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.btn-secondary:hover{background:rgba(255,255,255,.15)}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444}
.btn-danger:hover{background:rgba(239,68,68,.25)}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🍳 Rezepte</h2>
      <input class="search-box" id="searchBox" placeholder="Rezept suchen..." oninput="filterRecipes()">
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-footer">
      <button class="btn-add" onclick="openAddModal()">+ Neues Rezept</button>
      <button class="btn-add" style="margin-top:6px;border-color:rgba(34,197,94,.4);color:#22c55e" onclick="openOnline()">🌐 Online suchen</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <h1 id="mainTitle">Alle Rezepte</h1>
      <div style="display:flex;gap:10px;align-items:center">
        <select class="sort-select" id="sortSelect" onchange="filterRecipes()">
          <option value="name">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="time">Schnellste zuerst</option>
          <option value="newest">Neueste zuerst</option>
          <option value="favorites">Favoriten zuerst</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')">▦</button>
          <button class="view-btn" id="listBtn" onclick="setView('list')">☰</button>
        </div>
      </div>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detailContent"></div>
</div>

<!-- Online Search Overlay -->
<div class="online-overlay" id="onlineOverlay" onclick="if(event.target===this)closeOnline()">
  <div class="online-panel">
    <div class="online-header">
      <div class="online-search-row">
        <input class="online-search-input" id="onlineInput" placeholder="Rezept suchen... (z.B. pasta, chicken, cake)" onkeydown="if(event.key==='Enter')searchOnline()">
        <button class="btn-search" onclick="searchOnline()">🔍 Suchen</button>
      </div>
      <button class="btn btn-secondary" onclick="closeOnline()">✕</button>
    </div>
    <div class="online-results" id="onlineResults">
      <div class="online-empty"><span style="font-size:2.5rem">🌐</span><span>Rezepte aus aller Welt entdecken</span><span style="font-size:.78rem;opacity:.6">Powered by TheMealDB</span></div>
    </div>
    <div class="online-status" id="onlineStatus"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">Neues Rezept</h2>
    <div class="form-row">
      <div class="form-group"><label>Name</label><input id="fTitle" placeholder="z.B. Spaghetti Bolognese"></div>
      <div class="form-group" style="max-width:140px"><label>Kategorie</label><select id="fCategory"></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Zeit (Min)</label><input id="fTime" type="number" placeholder="30"></div>
      <div class="form-group"><label>Portionen</label><input id="fServings" type="number" placeholder="4"></div>
      <div class="form-group"><label>Schwierigkeit</label>
        <select id="fDifficulty">
          <option value="einfach">Einfach</option>
          <option value="mittel">Mittel</option>
          <option value="schwer">Schwer</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Zutaten (eine pro Zeile)</label><textarea id="fIngredients" placeholder="400g Spaghetti&#10;200g Hackfleisch&#10;..."></textarea></div>
    <div class="form-group"><label>Zubereitung (ein Schritt pro Zeile)</label><textarea id="fSteps" placeholder="Nudeln kochen.&#10;Sauce zubereiten.&#10;..."></textarea></div>
    <div class="form-group"><label>Tags (kommagetrennt)</label><input id="fTags" placeholder="italienisch, schnell, pasta"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelete" style="display:none;margin-right:auto" onclick="deleteRecipe()">Löschen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Speichern</button>
    </div>
  </div>
</div>

<script>
const DATA_URL = '/app/recipes/api/recipes';
let state = { recipes: [], categories: [] };
let activeCategory = 'Alle';
let viewMode = 'grid';
let editingId = null;

const categoryIcons = {
  'Alle':'📋','Pasta':'🍝','Hauptgericht':'🥘','Salat':'🥗','Suppe':'🍲',
  'Backen':'🧁','Frühstück':'🥞','Dessert':'🍰','Snack':'🥨'
};

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    const d = await r.json();
    state = d;
    render();
  } catch(e) { console.error('Load error', e); }
}

function render() {
  renderCategories();
  renderRecipes();
}

function renderCategories() {
  const list = document.getElementById('catList');
  const counts = {};
  state.recipes.forEach(r => { counts[r.category] = (counts[r.category]||0)+1; });

  let html = '';
  (state.categories || []).forEach(cat => {
    const count = cat === 'Alle' ? state.recipes.length : (counts[cat]||0);
    const icon = categoryIcons[cat] || '📁';
    html += `<div class="cat-item${activeCategory===cat?' active':''}" onclick="selectCategory('${cat}')">
      <span>${icon} ${cat}</span><span class="cat-count">${count}</span></div>`;
  });

  // Favoriten
  const favCount = state.recipes.filter(r => r.favorite).length;
  html += `<div class="cat-item${activeCategory==='Favoriten'?' active':''}" onclick="selectCategory('Favoriten')">
    <span>❤️ Favoriten</span><span class="cat-count">${favCount}</span></div>`;

  list.innerHTML = html;
}

function getFiltered() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  let recipes = state.recipes || [];

  if (activeCategory === 'Favoriten') {
    recipes = recipes.filter(r => r.favorite);
  } else if (activeCategory !== 'Alle') {
    recipes = recipes.filter(r => r.category === activeCategory);
  }

  if (q) {
    recipes = recipes.filter(r =>
      r.title.toLowerCase().includes(q) ||
      (r.tags||[]).some(t => t.toLowerCase().includes(q)) ||
      (r.ingredients||[]).some(i => i.toLowerCase().includes(q)) ||
      r.category.toLowerCase().includes(q)
    );
  }

  const sort = document.getElementById('sortSelect').value;
  recipes = [...recipes];
  if (sort === 'name') recipes.sort((a,b) => a.title.localeCompare(b.title));
  else if (sort === 'name-desc') recipes.sort((a,b) => b.title.localeCompare(a.title));
  else if (sort === 'time') recipes.sort((a,b) => a.time - b.time);
  else if (sort === 'newest') recipes.sort((a,b) => new Date(b.created) - new Date(a.created));
  else if (sort === 'favorites') recipes.sort((a,b) => (b.favorite?1:0) - (a.favorite?1:0));

  return recipes;
}

function renderRecipes() {
  const grid = document.getElementById('recipeGrid');
  const recipes = getFiltered();
  document.getElementById('mainTitle').textContent =
    activeCategory + (activeCategory === 'Alle' ? ' Rezepte' : '') + ` (${recipes.length})`;

  if (recipes.length === 0) {
    grid.innerHTML = '<div class="empty"><span class="empty-icon">🔍</span><span>Keine Rezepte gefunden</span></div>';
    return;
  }

  grid.innerHTML = recipes.map(r => {
    const diffClass = 'diff-' + (r.difficulty||'einfach');
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      <div class="card-img" style="${r.image?`background:url(${r.image}) center/cover`:''}">
        ${r.image?'':(categoryIcons[r.category]||'🍽️')}
        <span class="card-fav" onclick="event.stopPropagation();toggleFav('${r.id}')">${r.favorite?'❤️':'🤍'}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${r.title} <span class="diff ${diffClass}">${r.difficulty||'einfach'}</span></div>
        <div class="card-meta">
          <span>⏱ ${r.time} Min</span>
          <span>👥 ${r.servings} Portionen</span>
          <span>📂 ${r.category}</span>
        </div>
        <div class="card-tags">${(r.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

function openDetail(id) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  const diffClass = 'diff-' + (r.difficulty||'einfach');
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero" style="${r.image?`background:url(${r.image}) center/cover`:''}">
      ${r.image?'':(categoryIcons[r.category]||'🍽️')}
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-content">
      <div class="detail-title">${r.title}</div>
      <div class="detail-meta">
        <span>⏱ ${r.time} Min</span>
        <span>👥 ${r.servings} Portionen</span>
        <span class="diff ${diffClass}">${r.difficulty||'einfach'}</span>
        <span>📂 ${r.category}</span>
        <span style="cursor:pointer" onclick="toggleFav('${r.id}')">${r.favorite?'❤️ Favorit':'🤍 Favorit'}</span>
        <span style="cursor:pointer;margin-left:auto;color:#F97316" onclick="closeDetail();openEditModal('${r.id}')">✏️ Bearbeiten</span>
      </div>
      <div class="detail-section">
        <h3>Zutaten</h3>
        <ul class="ingredient-list">${(r.ingredients||[]).map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>
      <div class="detail-section">
        <h3>Zubereitung</h3>
        <ol class="step-list">${(r.steps||[]).map(s=>`<li>${s}</li>`).join('')}</ol>
      </div>
      <div class="detail-tags">${(r.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

async function toggleFav(id) {
  const r = state.recipes.find(x => x.id === id);
  if (r) { r.favorite = !r.favorite; render(); await saveData(); }
  // Re-render detail if open
  if (document.getElementById('detailOverlay').classList.contains('open')) openDetail(id);
}

function selectCategory(cat) {
  activeCategory = cat;
  render();
}

function setView(mode) {
  viewMode = mode;
  const grid = document.getElementById('recipeGrid');
  grid.classList.toggle('list-view', mode === 'list');
  document.getElementById('gridBtn').classList.toggle('active', mode === 'grid');
  document.getElementById('listBtn').classList.toggle('active', mode === 'list');
}

function filterRecipes() { renderRecipes(); renderCategories(); }

// Add / Edit
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Neues Rezept';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('fTitle').value = '';
  populateCategorySelect();
  document.getElementById('fTime').value = '';
  document.getElementById('fServings').value = '';
  document.getElementById('fDifficulty').value = 'einfach';
  document.getElementById('fIngredients').value = '';
  document.getElementById('fSteps').value = '';
  document.getElementById('fTags').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  const r = state.recipes.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Rezept bearbeiten';
  document.getElementById('btnDelete').style.display = '';
  document.getElementById('fTitle').value = r.title;
  populateCategorySelect(r.category);
  document.getElementById('fTime').value = r.time;
  document.getElementById('fServings').value = r.servings;
  document.getElementById('fDifficulty').value = r.difficulty || 'einfach';
  document.getElementById('fIngredients').value = (r.ingredients||[]).join('\n');
  document.getElementById('fSteps').value = (r.steps||[]).join('\n');
  document.getElementById('fTags').value = (r.tags||[]).join(', ');
  document.getElementById('modalOverlay').classList.add('open');
}

function populateCategorySelect(selected) {
  const sel = document.getElementById('fCategory');
  sel.innerHTML = (state.categories||[]).filter(c=>c!=='Alle').map(c =>
    `<option value="${c}"${c===selected?' selected':''}>${c}</option>`
  ).join('');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function saveRecipe() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) return;

  const data = {
    title,
    category: document.getElementById('fCategory').value,
    time: parseInt(document.getElementById('fTime').value) || 30,
    servings: parseInt(document.getElementById('fServings').value) || 4,
    difficulty: document.getElementById('fDifficulty').value,
    image: '',
    ingredients: document.getElementById('fIngredients').value.split('\n').map(s=>s.trim()).filter(Boolean),
    steps: document.getElementById('fSteps').value.split('\n').map(s=>s.trim()).filter(Boolean),
    tags: document.getElementById('fTags').value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean)
  };

  if (editingId) {
    const r = state.recipes.find(x => x.id === editingId);
    if (r) Object.assign(r, data);
  } else {
    data.id = Date.now().toString();
    data.favorite = false;
    data.created = new Date().toISOString();
    state.recipes.push(data);
  }

  closeModal();
  render();
  await saveData();
}

async function deleteRecipe() {
  if (!editingId) return;
  state.recipes = state.recipes.filter(r => r.id !== editingId);
  closeModal();
  render();
  await saveData();
}

async function saveData() {
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(state, null, 2)
    });
  } catch(e) { console.error('Save error', e); }
}

// Online Search (TheMealDB)
let importedIds = new Set();

function openOnline() {
  document.getElementById('onlineOverlay').classList.add('open');
  setTimeout(() => document.getElementById('onlineInput').focus(), 50);
}

function closeOnline() {
  document.getElementById('onlineOverlay').classList.remove('open');
}

async function searchOnline() {
  const q = document.getElementById('onlineInput').value.trim();
  if (!q) return;
  const results = document.getElementById('onlineResults');
  const status = document.getElementById('onlineStatus');
  results.innerHTML = '<div class="online-empty"><span style="font-size:2rem">⏳</span><span>Suche läuft...</span></div>';
  status.textContent = '';
  try {
    const r = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(q));
    const d = await r.json();
    const meals = d.meals || [];
    status.textContent = meals.length ? meals.length + ' Rezepte gefunden (TheMealDB)' : '';
    if (!meals.length) {
      results.innerHTML = '<div class="online-empty"><span style="font-size:2rem">😕</span><span>Keine Rezepte gefunden</span><span style="font-size:.8rem">Versuche einen anderen Begriff</span></div>';
      return;
    }
    results.innerHTML = meals.map(m => {
      const imp = importedIds.has(m.idMeal);
      return '<div class="online-card">' +
        '<div class="online-card-img" style="background-image:url(' + m.strMealThumb + ')"></div>' +
        '<div class="online-card-body">' +
        '<div class="online-card-title">' + m.strMeal + '</div>' +
        '<div class="online-card-meta">📂 ' + m.strCategory + ' · 🌍 ' + (m.strArea||'International') + '</div>' +
        '<button class="btn-import' + (imp?' imported':'') + '" id="imp-' + m.idMeal + '" onclick="importMeal(\'' + m.idMeal + '\')"' + (imp?' disabled':'') + '>' +
        (imp ? '✓ Importiert' : '+ Importieren') + '</button>' +
        '</div></div>';
    }).join('');
  } catch(e) {
    results.innerHTML = '<div class="online-empty"><span style="font-size:2rem">❌</span><span>Fehler beim Laden</span></div>';
  }
}

async function importMeal(mealId) {
  try {
    const r = await fetch('https://www.themealdb.com/api/json/v1/1/lookup.php?i=' + mealId);
    const d = await r.json();
    const m = d.meals[0];
    const ingredients = [];
    for (let i = 1; i <= 20; i++) {
      const ing = m['strIngredient' + i];
      const meas = m['strMeasure' + i];
      if (ing && ing.trim()) ingredients.push(((meas && meas.trim()) ? meas.trim() + ' ' : '') + ing.trim());
    }
    const steps = (m.strInstructions || '').split(/\r?\n+/).map(s=>s.trim()).filter(s=>s.length>8).slice(0,20);
    const cat = m.strCategory || 'Hauptgericht';
    const recipe = {
      id: 'mdb-' + m.idMeal,
      title: m.strMeal,
      category: (state.categories||[]).includes(cat) ? cat : ((state.categories||[]).find(c=>c!=='Alle') || 'Hauptgericht'),
      time: 35,
      servings: 4,
      difficulty: 'mittel',
      image: m.strMealThumb || '',
      ingredients,
      steps,
      tags: [m.strArea||'international', (m.strCategory||'').toLowerCase()].filter(Boolean),
      favorite: false,
      created: new Date().toISOString()
    };
    if (!state.recipes.find(x => x.id === recipe.id)) {
      state.recipes.push(recipe);
      await saveData();
      render();
    }
    importedIds.add(mealId);
    const btn = document.getElementById('imp-' + mealId);
    if (btn) { btn.textContent = '✓ Importiert'; btn.classList.add('imported'); btn.disabled = true; }
  } catch(e) {
    alert('Import fehlgeschlagen: ' + e.message);
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeModal(); closeOnline(); }
});

// Init + polling
loadData();
setInterval(loadData, 3000);
</script>
