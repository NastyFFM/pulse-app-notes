<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column}

header{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
header .icon{font-size:1.6rem}
header h1{font-size:1.1rem;font-weight:600;color:#f1f5f9}
header .counter{font-size:.8rem;color:rgba(255,255,255,.4);margin-left:4px}
header .spacer{flex:1}
header .home{text-decoration:none;color:rgba(255,255,255,.4);font-size:.85rem}
header .home:hover{color:#fff}
.modify-btn{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;margin-right:8px}
.modify-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}

.toolbar{display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid rgba(255,255,255,.05);flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;color:#fff;font-size:.82rem;outline:none;font-family:inherit}
.toolbar select:focus,.toolbar input:focus{border-color:rgba(59,130,246,.5)}
.toolbar input{flex:1;min-width:150px}
.btn-new{padding:6px 16px;background:#3B82F6;border:none;border-radius:8px;color:#fff;font-size:.82rem;cursor:pointer;font-weight:600}
.btn-new:hover{background:#2563EB}
.view-toggle{display:flex;gap:2px;background:rgba(255,255,255,.06);border-radius:8px;padding:2px}
.view-toggle button{padding:5px 10px;background:none;border:none;color:rgba(255,255,255,.5);font-size:.8rem;cursor:pointer;border-radius:6px}
.view-toggle button.active{background:rgba(59,130,246,.3);color:#fff}

.main{flex:1;overflow:auto;padding:16px 24px}

/* Board View */
.board{display:flex;gap:16px;min-height:400px}
.board-col{flex:1;min-width:220px;background:rgba(255,255,255,.03);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.col-header{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.5);padding:4px 6px;display:flex;justify-content:space-between;align-items:center}
.col-count{background:rgba(255,255,255,.1);border-radius:10px;padding:1px 8px;font-size:.7rem;font-weight:600}

.ticket-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s}
.ticket-card:hover{border-color:rgba(59,130,246,.3);background:rgba(255,255,255,.08);transform:translateY(-1px)}
.ticket-card .ticket-id{font-size:.7rem;color:rgba(255,255,255,.35);font-weight:600;margin-bottom:4px}
.ticket-card .ticket-title{font-size:.85rem;font-weight:500;color:#f1f5f9;margin-bottom:6px;line-height:1.3}
.ticket-card .ticket-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.badge.bug{background:rgba(239,68,68,.2);color:#f87171}
.badge.feature{background:rgba(59,130,246,.2);color:#60a5fa}
.badge.task{background:rgba(34,197,94,.2);color:#4ade80}
.badge.improvement{background:rgba(168,85,247,.2);color:#c084fc}
.badge.low{background:rgba(148,163,184,.15);color:#94a3b8}
.badge.medium{background:rgba(251,191,36,.2);color:#fbbf24}
.badge.high{background:rgba(249,115,22,.2);color:#fb923c}
.badge.critical{background:rgba(239,68,68,.25);color:#f87171}
.ticket-card .assignee{font-size:.72rem;color:rgba(255,255,255,.4);margin-left:auto}
.ticket-card.dragging{opacity:.3;transform:scale(.95)}
.board-col.drag-over{background:rgba(59,130,246,.08);outline:2px dashed rgba(59,130,246,.3);outline-offset:-2px}

/* List View */
.list-table{width:100%;border-collapse:collapse}
.list-table th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-weight:600}
.list-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;cursor:pointer}
.list-table tr:hover td{background:rgba(255,255,255,.04)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1a1a2e;border-radius:14px;border:1px solid rgba(255,255,255,.1);width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.modal-header h2{font-size:1rem;font-weight:600}
.modal-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:1.3rem;cursor:pointer}
.modal-close:hover{color:#fff}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.78rem;color:rgba(255,255,255,.5);margin-bottom:4px;font-weight:600}
.form-group input,.form-group textarea,.form-group select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;color:#fff;font-size:.88rem;outline:none;font-family:inherit}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:rgba(59,130,246,.5)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:.85rem;cursor:pointer;font-weight:600;font-family:inherit}
.btn-primary{background:#3B82F6;color:#fff}
.btn-primary:hover{background:#2563EB}
.btn-secondary{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.btn-secondary:hover{background:rgba(255,255,255,.15)}
.btn-danger{background:rgba(239,68,68,.2);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.3)}
</style>
</head>
<body>
<header>
  <span class="icon">🎫</span>
  <h1>Ticket System</h1>
  <span class="counter" id="counter"></span>
  <span class="spacer"></span>
  <button class="modify-btn" onclick="typeof __mcToggle==='function'&&__mcToggle()">Anpassen</button>
  <a href="/" class="home">Dashboard</a>
</header>

<div class="toolbar">
  <button class="btn-new" onclick="openModal()">+ Neues Ticket</button>
  <input type="text" id="search" placeholder="Suchen..." oninput="renderView()">
  <select id="filterStatus" onchange="renderView()"><option value="">Alle Status</option></select>
  <select id="filterPriority" onchange="renderView()"><option value="">Alle Prioritaeten</option></select>
  <select id="filterType" onchange="renderView()"><option value="">Alle Typen</option></select>
  <div class="view-toggle">
    <button id="vBoard" class="active" onclick="setView('board')">Board</button>
    <button id="vList" onclick="setView('list')">Liste</button>
  </div>
</div>

<div class="main" id="main"></div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Neues Ticket</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Titel</label><input id="fTitle" placeholder="Ticket-Titel"></div>
      <div class="form-group"><label>Beschreibung</label><textarea id="fDesc" placeholder="Beschreibung..."></textarea></div>
      <div class="form-group"><label>Typ</label><select id="fType"></select></div>
      <div class="form-group"><label>Prioritaet</label><select id="fPriority"></select></div>
      <div class="form-group"><label>Status</label><select id="fStatus"></select></div>
      <div class="form-group"><label>Zugewiesen an</label><input id="fAssignee" placeholder="Name"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btnDelete" style="display:none;margin-right:auto" onclick="deleteTicket()">Loeschen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveTicket()">Speichern</button>
    </div>
  </div>
</div>

<script>
let data = { nextId: 1, prefix: 'TICK', statuses: [], priorities: [], types: [], tickets: [] };
let currentView = 'board';
let editingId = null;

async function loadData() {
  try {
    const r = await fetch('/app/tickets/api/tickets');
    data = await r.json();
    populateFilters();
    renderView();
  } catch (e) { console.error('Load error:', e); }
}

function populateFilters() {
  const fs = document.getElementById('filterStatus');
  const fp = document.getElementById('filterPriority');
  const ft = document.getElementById('filterType');
  const fType = document.getElementById('fType');
  const fPri = document.getElementById('fPriority');
  const fSta = document.getElementById('fStatus');

  // Keep first option, replace rest
  [fs, fp, ft].forEach(s => { while (s.options.length > 1) s.remove(1); });
  [fType, fPri, fSta].forEach(s => { s.innerHTML = ''; });

  data.statuses.forEach(s => { fs.add(new Option(s, s)); fSta.add(new Option(s, s)); });
  data.priorities.forEach(p => { fp.add(new Option(p, p)); fPri.add(new Option(p, p)); });
  data.types.forEach(t => { ft.add(new Option(t, t)); fType.add(new Option(t, t)); });
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const priority = document.getElementById('filterPriority').value;
  const type = document.getElementById('filterType').value;
  return data.tickets.filter(t => {
    if (status && t.status !== status) return false;
    if (priority && t.priority !== priority) return false;
    if (type && t.type !== type) return false;
    if (search && !t.title.toLowerCase().includes(search) && !(t.description||'').toLowerCase().includes(search)) return false;
    return true;
  });
}

function setView(v) {
  currentView = v;
  document.getElementById('vBoard').classList.toggle('active', v === 'board');
  document.getElementById('vList').classList.toggle('active', v === 'list');
  renderView();
}

function renderView() {
  const tickets = getFiltered();
  document.getElementById('counter').textContent = data.tickets.length + ' Tickets';
  if (currentView === 'board') renderBoard(tickets);
  else renderList(tickets);
}

function renderBoard(tickets) {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="board">' + data.statuses.map(s => {
    const col = tickets.filter(t => t.status === s);
    return `<div class="board-col" data-status="${esc(s)}" ondragover="colDragOver(event)" ondragleave="colDragLeave(event)" ondrop="colDrop(event,'${esc(s)}')">
      <div class="col-header">${esc(s)}<span class="col-count">${col.length}</span></div>
      ${col.map(t => ticketCard(t)).join('')}
    </div>`;
  }).join('') + '</div>';
}

let dragTicketId = null;
function ticketCard(t) {
  return `<div class="ticket-card" draggable="true" ondragstart="cardDragStart(event,${t.id})" ondragend="cardDragEnd(event)" onclick="openModal(${t.id})">
    <div class="ticket-id">${data.prefix}-${t.id}</div>
    <div class="ticket-title">${esc(t.title)}</div>
    <div class="ticket-meta">
      <span class="badge ${t.type.toLowerCase()}">${esc(t.type)}</span>
      <span class="badge ${t.priority.toLowerCase()}">${esc(t.priority)}</span>
      ${t.assignee ? `<span class="assignee">${esc(t.assignee)}</span>` : ''}
    </div>
  </div>`;
}

function renderList(tickets) {
  const main = document.getElementById('main');
  main.innerHTML = `<table class="list-table">
    <thead><tr><th>ID</th><th>Titel</th><th>Typ</th><th>Prioritaet</th><th>Status</th><th>Zugewiesen</th></tr></thead>
    <tbody>${tickets.map(t => `<tr onclick="openModal(${t.id})">
      <td>${data.prefix}-${t.id}</td>
      <td>${esc(t.title)}</td>
      <td><span class="badge ${t.type.toLowerCase()}">${esc(t.type)}</span></td>
      <td><span class="badge ${t.priority.toLowerCase()}">${esc(t.priority)}</span></td>
      <td>${esc(t.status)}</td>
      <td>${esc(t.assignee||'-')}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function openModal(id) {
  editingId = id || null;
  const t = id ? data.tickets.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = t ? `${data.prefix}-${t.id}: Bearbeiten` : 'Neues Ticket';
  document.getElementById('fTitle').value = t ? t.title : '';
  document.getElementById('fDesc').value = t ? (t.description || '') : '';
  document.getElementById('fType').value = t ? t.type : data.types[0];
  document.getElementById('fPriority').value = t ? t.priority : data.priorities[1];
  document.getElementById('fStatus').value = t ? t.status : data.statuses[0];
  document.getElementById('fAssignee').value = t ? (t.assignee || '') : '';
  document.getElementById('btnDelete').style.display = t ? 'inline-block' : 'none';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null;
}

async function saveTicket() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) return;
  const now = Date.now();

  if (editingId) {
    const t = data.tickets.find(x => x.id === editingId);
    if (t) {
      t.title = title;
      t.description = document.getElementById('fDesc').value;
      t.type = document.getElementById('fType').value;
      t.priority = document.getElementById('fPriority').value;
      t.status = document.getElementById('fStatus').value;
      t.assignee = document.getElementById('fAssignee').value;
      t.updated = now;
    }
  } else {
    data.tickets.push({
      id: data.nextId++,
      title,
      description: document.getElementById('fDesc').value,
      type: document.getElementById('fType').value,
      priority: document.getElementById('fPriority').value,
      status: document.getElementById('fStatus').value,
      assignee: document.getElementById('fAssignee').value,
      created: now,
      updated: now
    });
  }
  await saveData();
  closeModal();
  renderView();
}

async function deleteTicket() {
  if (!editingId) return;
  data.tickets = data.tickets.filter(t => t.id !== editingId);
  await saveData();
  closeModal();
  renderView();
}

async function saveData() {
  await fetch('/app/tickets/api/tickets', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}

// Drag & Drop
function cardDragStart(e, id) {
  dragTicketId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
}
function cardDragEnd(e) {
  e.target.classList.remove('dragging');
  dragTicketId = null;
  document.querySelectorAll('.board-col').forEach(c => c.classList.remove('drag-over'));
}
function colDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function colDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
async function colDrop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragTicketId == null) return;
  const t = data.tickets.find(x => x.id === dragTicketId);
  if (t && t.status !== status) {
    t.status = status;
    t.updated = Date.now();
    await saveData();
    renderView();
  }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// SSE for live updates
const evtSrc = new EventSource('/sse/tickets');
evtSrc.onmessage = e => {
  try {
    const d = JSON.parse(e.data);
    if (d.type === 'change' && d.file === 'tickets.json') loadData();
  } catch {}
};

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadData();
</script>
</body>
</html>
