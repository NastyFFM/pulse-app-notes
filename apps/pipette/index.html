<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipette</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#8B5CF6 0%,#6D28D9 100%);min-height:100vh;color:#fff;display:flex;flex-direction:column;align-items:center;padding:24px}

h1{font-size:1.4rem;font-weight:700;margin-bottom:24px;opacity:.9}

.pick-area{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:32px}

.preview{width:180px;height:180px;border-radius:24px;background:#fff;border:4px solid rgba(255,255,255,.3);box-shadow:0 8px 32px rgba(0,0,0,.2);transition:background .2s;position:relative;display:flex;align-items:center;justify-content:center}
.preview-empty{font-size:3rem;opacity:.3}

.pick-btn{padding:14px 32px;border-radius:14px;border:none;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.pick-btn:hover{background:rgba(255,255,255,.35);transform:scale(1.03)}
.pick-btn:active{transform:scale(.98)}
.pick-btn .icon{font-size:1.3rem}

.color-info{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.color-val{background:rgba(0,0,0,.25);backdrop-filter:blur(8px);border-radius:10px;padding:8px 14px;font-family:'SF Mono',Monaco,monospace;font-size:.85rem;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.1);position:relative}
.color-val:hover{background:rgba(0,0,0,.4)}
.color-val .label{font-size:.65rem;opacity:.5;display:block;margin-bottom:2px}
.copied{animation:copiedFlash .6s ease}
@keyframes copiedFlash{0%{background:rgba(34,197,94,.5)}100%{background:rgba(0,0,0,.25)}}

.save-btn{padding:8px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:.85rem;cursor:pointer;transition:all .15s}
.save-btn:hover{background:rgba(255,255,255,.15)}

.divider{width:100%;max-width:700px;height:1px;background:rgba(255,255,255,.15);margin:8px 0 24px}

.palettes{width:100%;max-width:700px}
.palette{margin-bottom:24px}
.palette-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.palette-name{font-size:1rem;font-weight:600;opacity:.85}
.palette-count{font-size:.75rem;opacity:.5}

.color-grid{display:flex;flex-wrap:wrap;gap:10px}
.color-swatch{width:64px;height:64px;border-radius:14px;border:2px solid rgba(255,255,255,.2);cursor:pointer;position:relative;transition:all .15s;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.color-swatch:hover{transform:scale(1.08);border-color:rgba(255,255,255,.5)}
.color-swatch .swatch-hex{font-size:.55rem;font-family:'SF Mono',Monaco,monospace;background:rgba(0,0,0,.5);width:100%;text-align:center;padding:3px 0;backdrop-filter:blur(4px)}
.color-swatch .delete-swatch{position:absolute;top:2px;right:4px;font-size:.65rem;opacity:0;cursor:pointer;background:rgba(0,0,0,.5);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.color-swatch:hover .delete-swatch{opacity:1}

.empty-palette{opacity:.4;font-size:.85rem;padding:16px 0}

.no-support{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:20px;text-align:center;max-width:500px}
.no-support p{margin-top:8px;font-size:.85rem;opacity:.7}

.history-section{width:100%;max-width:700px;margin-top:8px}
.history-header{font-size:.85rem;font-weight:600;opacity:.6;margin-bottom:10px}
.history-list{display:flex;flex-wrap:wrap;gap:6px}
.history-dot{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.15);cursor:pointer;transition:all .15s}
.history-dot:hover{transform:scale(1.15);border-color:rgba(255,255,255,.4)}
</style>
</head>
<body>

<h1>🎨 Pipette</h1>

<div id="app"></div>

<script>
var DATA_URL = 'api/colors';
var data = { colors: [], palettes: [{ id: 'default', name: 'Meine Farben', colors: [] }] };
var currentColor = null;
var hasEyeDropper = typeof window.EyeDropper !== 'undefined';

async function loadData() {
  try {
    var r = await fetch(DATA_URL + '?t=' + Date.now());
    if (r.ok) {
      var d = await r.json();
      if (d.palettes) data = d;
    }
  } catch(e) {}
  render();
}

async function saveData() {
  await fetch(DATA_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data, null, 2)
  });
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return { r: r, g: g, b: b };
}

function hexToHsl(hex) {
  var rgb = hexToRgb(hex);
  var r = rgb.r / 255, g = rgb.g / 255, b = rgb.b / 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    var d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function contrastColor(hex) {
  var rgb = hexToRgb(hex);
  var lum = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
  return lum > 0.5 ? '#000' : '#fff';
}

async function pickColor() {
  if (!hasEyeDropper) return;
  try {
    var dropper = new EyeDropper();
    var result = await dropper.open();
    var hex = result.sRGBHex.toUpperCase();
    currentColor = hex;
    // Add to history
    data.colors = data.colors.filter(function(c) { return c !== hex; });
    data.colors.unshift(hex);
    if (data.colors.length > 50) data.colors.pop();
    await saveData();
    render();
  } catch(e) {
    // user cancelled
  }
}

function copyToClipboard(text, el) {
  navigator.clipboard.writeText(text).then(function() {
    if (el) {
      el.classList.remove('copied');
      void el.offsetWidth;
      el.classList.add('copied');
    }
  });
}

async function saveToDefault() {
  if (!currentColor) return;
  var pal = data.palettes.find(function(p) { return p.id === 'default'; });
  if (!pal) {
    pal = { id: 'default', name: 'Meine Farben', colors: [] };
    data.palettes.push(pal);
  }
  if (pal.colors.indexOf(currentColor) === -1) {
    pal.colors.push(currentColor);
    await saveData();
    render();
  }
}

async function removeFromPalette(paletteId, hex) {
  var pal = data.palettes.find(function(p) { return p.id === paletteId; });
  if (pal) {
    pal.colors = pal.colors.filter(function(c) { return c !== hex; });
    await saveData();
    render();
  }
}

function selectFromHistory(hex) {
  currentColor = hex;
  render();
}

function render() {
  var app = document.getElementById('app');

  if (!hasEyeDropper) {
    app.innerHTML = '<div class="no-support"><div style="font-size:2rem">⚠️</div><strong>EyeDropper API nicht verfuegbar</strong><p>Diese App benoetigt Chrome oder Edge. Safari und Firefox unterstuetzen die EyeDropper API leider noch nicht.</p></div>';
    return;
  }

  var html = '<div class="pick-area">';

  // Preview
  html += '<div class="preview" style="' + (currentColor ? 'background:' + currentColor : '') + '">';
  if (!currentColor) html += '<span class="preview-empty">💧</span>';
  html += '</div>';

  // Pick button
  html += '<button class="pick-btn" onclick="pickColor()"><span class="icon">💧</span> Farbe aufnehmen</button>';

  // Color info
  if (currentColor) {
    var rgb = hexToRgb(currentColor);
    var hsl = hexToHsl(currentColor);
    html += '<div class="color-info">';
    html += '<div class="color-val" onclick="copyToClipboard(\'' + currentColor + '\', this)"><span class="label">HEX</span>' + currentColor + '</div>';
    html += '<div class="color-val" onclick="copyToClipboard(\'rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')\', this)"><span class="label">RGB</span>' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + '</div>';
    html += '<div class="color-val" onclick="copyToClipboard(\'hsl(' + hsl.h + ', ' + hsl.s + '%, ' + hsl.l + '%)\', this)"><span class="label">HSL</span>' + hsl.h + '°, ' + hsl.s + '%, ' + hsl.l + '%</div>';
    html += '</div>';
    html += '<button class="save-btn" onclick="saveToDefault()">💾 In Palette speichern</button>';
  }

  html += '</div>';

  // Palettes
  html += '<div class="divider"></div>';
  html += '<div class="palettes">';
  data.palettes.forEach(function(pal) {
    html += '<div class="palette">';
    html += '<div class="palette-header"><span class="palette-name">' + esc(pal.name) + '</span><span class="palette-count">' + pal.colors.length + ' Farben</span></div>';
    if (pal.colors.length === 0) {
      html += '<div class="empty-palette">Noch keine Farben gespeichert. Nimm eine Farbe auf und speichere sie hier.</div>';
    } else {
      html += '<div class="color-grid">';
      pal.colors.forEach(function(hex) {
        html += '<div class="color-swatch" style="background:' + hex + '" onclick="currentColor=\'' + hex + '\';render()" title="' + hex + '">';
        html += '<span class="delete-swatch" onclick="event.stopPropagation();removeFromPalette(\'' + pal.id + '\',\'' + hex + '\')">✕</span>';
        html += '<span class="swatch-hex">' + hex + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  // History
  if (data.colors.length > 0) {
    html += '<div class="history-section">';
    html += '<div class="history-header">Zuletzt aufgenommen</div>';
    html += '<div class="history-list">';
    data.colors.forEach(function(hex) {
      html += '<div class="history-dot" style="background:' + hex + '" onclick="selectFromHistory(\'' + hex + '\')" title="' + hex + '"></div>';
    });
    html += '</div></div>';
  }

  app.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
