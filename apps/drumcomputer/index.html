<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Drum Computer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: #111;
    border-bottom: 2px solid #EF4444;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  .title { font-size: 18px; font-weight: bold; color: #EF4444; letter-spacing: 3px; text-transform: uppercase; }

  /* Transport Controls */
  .transport { display: flex; align-items: center; gap: 12px; }
  .btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    transition: all 0.1s;
  }
  .btn:hover { background: #252525; border-color: #555; }
  .btn.play { border-color: #10B981; color: #10B981; }
  .btn.play:hover { background: #10B98122; }
  .btn.play.active { background: #10B981; color: #000; }
  .btn.stop { border-color: #EF4444; color: #EF4444; }
  .btn.stop:hover { background: #EF444422; }

  /* BPM */
  .bpm-control { display: flex; align-items: center; gap: 8px; }
  .bpm-label { color: #666; font-size: 12px; letter-spacing: 1px; }
  .bpm-value { font-size: 22px; font-weight: bold; color: #F59E0B; min-width: 50px; text-align: center; }
  .bpm-btn { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; width: 28px; height: 28px; border-radius: 3px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .bpm-btn:hover { background: #252525; }

  /* Main Area */
  .main { flex: 1; padding: 20px; overflow-y: auto; }

  /* Sequencer */
  .sequencer { display: flex; flex-direction: column; gap: 10px; }

  .track-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 10px 14px;
  }

  .track-label {
    width: 80px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .track-vol {
    width: 60px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .track-vol label { font-size: 9px; color: #555; }
  .vol-slider {
    width: 52px;
    height: 4px;
    -webkit-appearance: none;
    background: #333;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #666;
    cursor: pointer;
  }

  .steps {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .step-group {
    display: flex;
    gap: 3px;
    margin-right: 6px;
  }
  .step-group:last-child { margin-right: 0; }

  .step {
    width: 38px;
    height: 38px;
    border-radius: 4px;
    border: 1px solid #2a2a2a;
    background: #1a1a1a;
    cursor: pointer;
    transition: all 0.08s;
    position: relative;
  }
  .step:hover { border-color: #444; background: #222; }
  .step.active {
    border-color: var(--track-color);
    background: var(--track-color);
    box-shadow: 0 0 8px var(--track-color);
  }
  .step.playing {
    filter: brightness(1.5);
    transform: scale(0.95);
  }
  .step.cursor {
    outline: 2px solid rgba(255,255,255,0.4);
    outline-offset: -2px;
  }

  /* Playhead bar at top of steps */
  .steps-container { position: relative; flex: 1; }
  .playhead-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
    padding-left: 0;
  }
  .playhead-cell {
    width: 38px;
    height: 4px;
    background: #222;
    border-radius: 2px;
    transition: background 0.05s;
  }
  .playhead-cell.group-gap { margin-right: 6px; }
  .playhead-cell.lit { background: #fff; }

  /* Pattern controls */
  .pattern-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #0f0f0f;
    border: 1px solid #222;
    border-radius: 6px;
    margin-top: 4px;
  }
  .pattern-controls label { font-size: 11px; color: #555; letter-spacing: 1px; }
  .pattern-name-input {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 5px 10px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    width: 140px;
  }
  .spacer { flex: 1; }

  /* Swing */
  .swing-control { display: flex; align-items: center; gap: 8px; }
  .swing-label { color: #666; font-size: 12px; }
  .swing-val { color: #6366F1; font-size: 13px; font-weight: bold; min-width: 30px; }
  input[type=range].swing-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: #333;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range].swing-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #6366F1;
    cursor: pointer;
  }

  /* Saved patterns */
  .saved-patterns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pattern-chip {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #aaa;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .pattern-chip:hover { border-color: #555; color: #e0e0e0; }
  .pattern-chip.active { border-color: #EF4444; color: #EF4444; }

  /* Status bar */
  .status-bar {
    background: #0d0d0d;
    border-top: 1px solid #222;
    padding: 6px 20px;
    font-size: 11px;
    color: #444;
    display: flex;
    gap: 20px;
    flex-shrink: 0;
  }
  .status-bar span { color: #666; }
</style>
</head>
<body>

<div class="header">
  <div class="title">🥁 Drum Computer</div>
  <div class="transport">
    <button class="btn play" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn stop" onclick="stopSequencer()">■ STOP</button>
  </div>
  <div class="bpm-control">
    <span class="bpm-label">BPM</span>
    <button class="bpm-btn" onclick="changeBPM(-5)">−</button>
    <span class="bpm-value" id="bpmDisplay">120</span>
    <button class="bpm-btn" onclick="changeBPM(5)">+</button>
  </div>
  <div class="swing-control">
    <span class="swing-label">SWING</span>
    <input type="range" class="swing-slider" min="0" max="50" value="0" id="swingSlider" oninput="updateSwing(this.value)">
    <span class="swing-val" id="swingVal">0%</span>
  </div>
</div>

<div class="main">
  <div class="sequencer" id="sequencer"></div>

  <div class="pattern-controls" style="margin-top: 16px;">
    <label>PATTERN</label>
    <input class="pattern-name-input" id="patternNameInput" value="Default" placeholder="Pattern name...">
    <button class="btn" onclick="savePattern()">💾 SAVE</button>
    <button class="btn" onclick="clearPattern()">🗑 CLEAR</button>
    <div class="spacer"></div>
    <div class="saved-patterns" id="savedPatterns"></div>
  </div>
</div>

<div class="status-bar">
  <span id="statusStep">Step: 1/16</span>
  <span id="statusBeat">Beat: 1.1</span>
  <span id="statusInfo">Ready</span>
</div>

<script>
// ============================================================
// State
// ============================================================
const NUM_STEPS = 16;
const NUM_TRACKS = 4;

let state = {
  bpm: 120,
  swing: 0,
  playing: false,
  currentStep: -1,
  tracks: [
    { name: 'Kick',    color: '#EF4444', volume: 0.9, steps: Array(NUM_STEPS).fill(0) },
    { name: 'Snare',   color: '#F59E0B', volume: 0.8, steps: Array(NUM_STEPS).fill(0) },
    { name: 'Hi-Hat',  color: '#10B981', volume: 0.6, steps: Array(NUM_STEPS).fill(0) },
    { name: 'Open HH', color: '#6366F1', volume: 0.5, steps: Array(NUM_STEPS).fill(0) }
  ],
  savedPatterns: {},
  currentPattern: 'default'
};

let audioCtx = null;
let nextStepTime = 0;
let schedulerTimer = null;
let lookahead = 0.1;      // seconds
let scheduleInterval = 25; // ms

// ============================================================
// Audio Engine
// ============================================================
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playKick(time, volume) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
  gain.gain.setValueAtTime(volume, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
  osc.start(time); osc.stop(time + 0.35);
}

function playSnare(time, volume) {
  const ctx = getAudioCtx();
  // Tone
  const osc = ctx.createOscillator();
  const oscGain = ctx.createGain();
  osc.connect(oscGain); oscGain.connect(ctx.destination);
  osc.frequency.setValueAtTime(200, time);
  osc.frequency.exponentialRampToValueAtTime(100, time + 0.15);
  oscGain.gain.setValueAtTime(volume * 0.5, time);
  oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  osc.start(time); osc.stop(time + 0.15);
  // Noise
  const bufSize = ctx.sampleRate * 0.2;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'highpass';
  noiseFilter.frequency.value = 1000;
  const noiseGain = ctx.createGain();
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);
  noiseGain.gain.setValueAtTime(volume * 0.8, time);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
  noise.start(time); noise.stop(time + 0.2);
}

function playHiHat(time, volume, open = false) {
  const ctx = getAudioCtx();
  const bufSize = ctx.sampleRate * (open ? 0.4 : 0.08);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = open ? 6000 : 8000;
  const gain = ctx.createGain();
  noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  const decay = open ? 0.4 : 0.05;
  gain.gain.setValueAtTime(volume, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + decay);
  noise.start(time); noise.stop(time + decay);
}

function playSoundForTrack(trackIndex, time, volume) {
  switch (trackIndex) {
    case 0: playKick(time, volume); break;
    case 1: playSnare(time, volume); break;
    case 2: playHiHat(time, volume, false); break;
    case 3: playHiHat(time, volume, true); break;
  }
}

// ============================================================
// Sequencer
// ============================================================
let stepQueue = [];

function scheduler() {
  const ctx = getAudioCtx();
  while (nextStepTime < ctx.currentTime + lookahead) {
    scheduleStep(state.currentStep, nextStepTime);
    advanceStep();
  }
}

function scheduleStep(step, time) {
  const s = (step + 1) % NUM_STEPS; // next step
  // Schedule visuals
  stepQueue.push({ step: s, time });
  // Schedule sounds
  state.tracks.forEach((track, ti) => {
    if (track.steps[s] === 1) {
      playSoundForTrack(ti, time, track.volume);
    }
  });
}

function advanceStep() {
  const secondsPerBeat = 60.0 / state.bpm;
  const secondsPerStep = secondsPerBeat / 4;
  let stepTime = secondsPerStep;
  // Swing: odd steps (1,3,5...) delayed
  const nextStep = (state.currentStep + 1) % NUM_STEPS;
  if (state.swing > 0 && nextStep % 2 === 1) {
    stepTime += secondsPerStep * (state.swing / 100);
  }
  nextStepTime += stepTime;
  state.currentStep = (state.currentStep + 1) % NUM_STEPS;
}

function startScheduler() {
  const ctx = getAudioCtx();
  nextStepTime = ctx.currentTime;
  schedulerTimer = setInterval(scheduler, scheduleInterval);
}

function stopSchedulerLoop() {
  clearInterval(schedulerTimer);
  schedulerTimer = null;
}

// Visual update from queue
function drawLoop() {
  const ctx2 = audioCtx;
  if (ctx2 && stepQueue.length > 0) {
    const now = ctx2.currentTime;
    while (stepQueue.length > 0 && stepQueue[0].time <= now) {
      const { step } = stepQueue.shift();
      updatePlayhead(step);
    }
  }
  requestAnimationFrame(drawLoop);
}

function updatePlayhead(step) {
  // Remove old playhead cells
  document.querySelectorAll('.playhead-cell.lit').forEach(el => el.classList.remove('lit'));
  // Light up current column
  const cells = document.querySelectorAll(`.playhead-cell[data-step="${step}"]`);
  cells.forEach(c => c.classList.add('lit'));
  // Update step buttons highlight
  document.querySelectorAll('.step.cursor').forEach(el => el.classList.remove('cursor'));
  document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('cursor'));
  // Status
  document.getElementById('statusStep').textContent = `Step: ${step + 1}/16`;
  document.getElementById('statusBeat').textContent = `Beat: ${Math.floor(step/4)+1}.${(step%4)+1}`;
}

// ============================================================
// Transport
// ============================================================
function togglePlay() {
  if (state.playing) {
    pauseSequencer();
  } else {
    startSequencer();
  }
}

function startSequencer() {
  getAudioCtx().resume();
  state.playing = true;
  state.currentStep = NUM_STEPS - 1;
  document.getElementById('playBtn').classList.add('active');
  document.getElementById('playBtn').textContent = '⏸ PAUSE';
  document.getElementById('statusInfo').textContent = 'Playing';
  startScheduler();
}

function pauseSequencer() {
  state.playing = false;
  stopSchedulerLoop();
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playBtn').textContent = '▶ PLAY';
  document.getElementById('statusInfo').textContent = 'Paused';
}

function stopSequencer() {
  state.playing = false;
  stopSchedulerLoop();
  state.currentStep = -1;
  stepQueue = [];
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playBtn').textContent = '▶ PLAY';
  document.querySelectorAll('.playhead-cell.lit').forEach(el => el.classList.remove('lit'));
  document.querySelectorAll('.step.cursor').forEach(el => el.classList.remove('cursor'));
  document.getElementById('statusInfo').textContent = 'Stopped';
  document.getElementById('statusStep').textContent = 'Step: 1/16';
  document.getElementById('statusBeat').textContent = 'Beat: 1.1';
}

// ============================================================
// BPM & Swing
// ============================================================
function changeBPM(delta) {
  state.bpm = Math.max(40, Math.min(250, state.bpm + delta));
  document.getElementById('bpmDisplay').textContent = state.bpm;
  saveToServer();
}

function updateSwing(val) {
  state.swing = parseInt(val);
  document.getElementById('swingVal').textContent = val + '%';
  saveToServer();
}

// ============================================================
// Step Toggle
// ============================================================
function toggleStep(trackIdx, stepIdx) {
  state.tracks[trackIdx].steps[stepIdx] = state.tracks[trackIdx].steps[stepIdx] ? 0 : 1;
  const btn = document.querySelector(`.step[data-track="${trackIdx}"][data-step="${stepIdx}"]`);
  if (btn) {
    btn.classList.toggle('active', !!state.tracks[trackIdx].steps[stepIdx]);
  }
  // Preview sound on activate
  if (state.tracks[trackIdx].steps[stepIdx] && !state.playing) {
    getAudioCtx().resume().then(() => {
      playSoundForTrack(trackIdx, getAudioCtx().currentTime, state.tracks[trackIdx].volume);
    });
  }
  saveToServer();
}

// ============================================================
// Volume
// ============================================================
function setVolume(trackIdx, val) {
  state.tracks[trackIdx].volume = parseFloat(val);
  saveToServer();
}

// ============================================================
// Pattern Save/Load/Clear
// ============================================================
function savePattern() {
  const name = document.getElementById('patternNameInput').value.trim() || 'Unnamed';
  const id = name.toLowerCase().replace(/\s+/g, '-');
  state.savedPatterns[id] = {
    name,
    tracks: state.tracks.map(t => ({ ...t, steps: [...t.steps] }))
  };
  state.currentPattern = id;
  renderSavedPatterns();
  saveToServer();
}

function loadPattern(id) {
  if (!state.savedPatterns[id]) return;
  const p = state.savedPatterns[id];
  p.tracks.forEach((pt, i) => {
    state.tracks[i].steps = [...pt.steps];
    state.tracks[i].volume = pt.volume;
  });
  state.currentPattern = id;
  document.getElementById('patternNameInput').value = p.name;
  renderStepButtons();
  renderSavedPatterns();
  saveToServer();
}

function clearPattern() {
  state.tracks.forEach(t => t.steps = Array(NUM_STEPS).fill(0));
  renderStepButtons();
  saveToServer();
}

// ============================================================
// Render
// ============================================================
function renderSequencer() {
  const seq = document.getElementById('sequencer');
  seq.innerHTML = '';

  // Playhead row
  const phRow = document.createElement('div');
  phRow.style.cssText = 'display:flex; gap:4px; padding: 0 14px 0 calc(14px + 80px + 10px + 60px + 10px);';
  for (let g = 0; g < 4; g++) {
    const grp = document.createElement('div');
    grp.style.cssText = 'display:flex; gap:3px; margin-right:6px;';
    if (g === 3) grp.style.marginRight = '0';
    for (let s = 0; s < 4; s++) {
      const stepIdx = g * 4 + s;
      const cell = document.createElement('div');
      cell.className = 'playhead-cell';
      cell.dataset.step = stepIdx;
      cell.style.cssText = 'width:38px; height:4px; background:#222; border-radius:2px;';
      grp.appendChild(cell);
    }
    phRow.appendChild(grp);
  }
  seq.appendChild(phRow);

  // Track rows
  state.tracks.forEach((track, ti) => {
    const row = document.createElement('div');
    row.className = 'track-row';

    const label = document.createElement('div');
    label.className = 'track-label';
    label.style.color = track.color;
    label.textContent = track.name;
    row.appendChild(label);

    const volCtrl = document.createElement('div');
    volCtrl.className = 'track-vol';
    volCtrl.innerHTML = `<label>VOL</label><input type="range" class="vol-slider" min="0" max="1" step="0.05" value="${track.volume}" oninput="setVolume(${ti}, this.value)" style="accent-color:${track.color}">`;
    row.appendChild(volCtrl);

    const stepsDiv = document.createElement('div');
    stepsDiv.className = 'steps';

    for (let g = 0; g < 4; g++) {
      const grp = document.createElement('div');
      grp.className = 'step-group';
      for (let s = 0; s < 4; s++) {
        const stepIdx = g * 4 + s;
        const btn = document.createElement('div');
        btn.className = 'step' + (track.steps[stepIdx] ? ' active' : '');
        btn.dataset.track = ti;
        btn.dataset.step = stepIdx;
        btn.style.setProperty('--track-color', track.color);
        btn.onclick = () => toggleStep(ti, stepIdx);
        grp.appendChild(btn);
      }
      stepsDiv.appendChild(grp);
    }

    row.appendChild(stepsDiv);
    seq.appendChild(row);
  });
}

function renderStepButtons() {
  state.tracks.forEach((track, ti) => {
    track.steps.forEach((active, si) => {
      const btn = document.querySelector(`.step[data-track="${ti}"][data-step="${si}"]`);
      if (btn) btn.classList.toggle('active', !!active);
    });
  });
}

function renderSavedPatterns() {
  const container = document.getElementById('savedPatterns');
  container.innerHTML = '';
  Object.entries(state.savedPatterns).forEach(([id, p]) => {
    const chip = document.createElement('div');
    chip.className = 'pattern-chip' + (id === state.currentPattern ? ' active' : '');
    chip.textContent = p.name;
    chip.onclick = () => loadPattern(id);
    container.appendChild(chip);
  });
}

// ============================================================
// Server Sync
// ============================================================
async function loadFromServer() {
  try {
    const res = await fetch('api/drumcomputer');
    if (!res.ok) return;
    const data = await res.json();
    state.bpm = data.bpm || 120;
    state.swing = data.swing || 0;
    document.getElementById('bpmDisplay').textContent = state.bpm;
    document.getElementById('swingSlider').value = state.swing;
    document.getElementById('swingVal').textContent = state.swing + '%';

    if (data.patterns && data.patterns.saved) {
      state.savedPatterns = {};
      Object.entries(data.patterns.saved).forEach(([id, p]) => {
        state.savedPatterns[id] = p;
      });
      const currentId = data.patterns.current || 'default';
      if (state.savedPatterns[currentId]) {
        const p = state.savedPatterns[currentId];
        p.tracks.forEach((pt, i) => {
          if (i < state.tracks.length) {
            state.tracks[i].steps = [...pt.steps];
            state.tracks[i].volume = pt.volume != null ? pt.volume : state.tracks[i].volume;
            state.tracks[i].name = pt.name || state.tracks[i].name;
          }
        });
        state.currentPattern = currentId;
        document.getElementById('patternNameInput').value = p.name || currentId;
      }
    }
    renderSequencer();
    renderSavedPatterns();
  } catch(e) {
    console.log('Load error:', e);
  }
}

async function saveToServer() {
  try {
    const payload = {
      bpm: state.bpm,
      swing: state.swing,
      patterns: {
        current: state.currentPattern,
        saved: state.savedPatterns
      }
    };
    await fetch('api/drumcomputer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {}
}

// ============================================================
// Keyboard shortcuts
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'Escape') stopSequencer();
  if (e.code === 'ArrowUp') changeBPM(5);
  if (e.code === 'ArrowDown') changeBPM(-5);
});
