<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1;
            padding: 10px 15px;
            background: #1e293b;
            border: 1px solid #475569;
            color: #f1f5f9;
            border-radius: 6px;
        }
        input:focus { outline: none; border-color: #06b6d4; }
        button {
            padding: 10px 20px;
            background: #06b6d4;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #0891b2; }
        .status { margin-bottom: 15px; padding: 10px; background: #1e293b; border-radius: 6px; color: #94a3b8; }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .station-card {
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .station-card:hover { transform: translateY(-4px); }
        .station-icon {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        .station-info { padding: 12px; }
        .station-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .station-country { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Internet Radio</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Radiosender suchen...">
            <button onclick="searchStations()">Suchen</button>
        </div>
        <div class="status" id="status"></div>
        <div class="results" id="results"></div>
    </div>
    <script>
        async function searchStations() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { updateStatus('Bitte Sender-Name eingeben'); return; }
            updateStatus('🔍 Suche...');
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            try {
                const response = await fetch(
                    `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}&limit=12`
                );
                const data = await response.json();
                if (data && data.length > 0) {
                    updateStatus(`✅ ${data.length} Sender gefunden`);
                    data.forEach(station => {
                        const card = document.createElement('div');
                        card.className = 'station-card';
                        card.innerHTML = `
                            <div class="station-icon">📻</div>
                            <div class="station-info">
                                <div class="station-name">${station.name}</div>
                                <div class="station-country">${station.country || 'Unbekannt'}</div>
                            </div>
                        `;
                        if (station.url) card.onclick = () => window.open(station.url);
                        resultsDiv.appendChild(card);
                    });
                } else {
                    updateStatus('Keine Sender gefunden');
                }
            } catch (error) {
                updateStatus(`❌ ${error.message}`);
            }
        }
        function updateStatus(msg) { document.getElementById('status').textContent = msg; }
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchStations();
        });
    </script>
</body>
</html>
