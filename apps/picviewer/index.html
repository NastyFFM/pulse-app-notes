<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }

  .header {
    padding: 16px 24px;
    background: linear-gradient(135deg, #4a1942 0%, #831843 100%);
    border-bottom: 1px solid rgba(236, 72, 153, 0.3);
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 1.2rem; font-weight: 600; color: #fbcfe8; }
  .header .icon { font-size: 1.4rem; }
  .header .count { margin-left: auto; font-size: 0.8rem; color: rgba(251,207,232,0.5); }

  .toolbar {
    padding: 12px 24px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 8px; align-items: center;
  }
  .toolbar input {
    flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 0.85rem; outline: none;
  }
  .toolbar input:focus { border-color: rgba(236,72,153,0.5); }
  .toolbar input::placeholder { color: rgba(255,255,255,0.3); }
  .view-btn {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 8px 12px; color: rgba(255,255,255,0.6); cursor: pointer;
    font-size: 1rem; transition: all 0.15s;
  }
  .view-btn:hover, .view-btn.active { background: rgba(236,72,153,0.2); color: #f9a8d4; border-color: rgba(236,72,153,0.4); }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }
  .gallery.list-view {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }
  .card:hover { border-color: rgba(236,72,153,0.3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .card img {
    width: 100%; height: 180px; object-fit: cover; display: block;
    background: rgba(255,255,255,0.02);
  }
  .card .info { padding: 12px; }
  .card .title { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
  .card .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .card .tag {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
    background: rgba(236,72,153,0.15); color: #f9a8d4;
  }

  .gallery.list-view .card {
    display: flex; align-items: center;
  }
  .gallery.list-view .card img { width: 120px; height: 80px; border-radius: 8px; margin: 8px; }
  .gallery.list-view .card .info { flex: 1; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    backdrop-filter: blur(10px); z-index: 1000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .lightbox .lb-title { color: #fff; font-size: 1.1rem; margin-top: 16px; font-weight: 500; }
  .lightbox .lb-close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; color: rgba(255,255,255,0.6);
    font-size: 1.8rem; cursor: pointer; z-index: 1001;
  }
  .lightbox .lb-close:hover { color: #fff; }
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    font-size: 2rem; padding: 12px 16px; cursor: pointer; border-radius: 8px;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.2); }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  .empty { padding: 60px 24px; text-align: center; color: rgba(255,255,255,0.3); font-size: 1.1rem; }
</style>
</head>
<body>

<div class="header">
  <span class="icon">🖼️</span>
  <h1>Picture Viewer</h1>
  <span class="count" id="imgCount"></span>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search by title or tag..." oninput="filterImages()">
  <button class="view-btn active" id="gridBtn" onclick="setView('grid')">▦</button>
  <button class="view-btn" id="listBtn" onclick="setView('list')">☰</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" onclick="navLightbox(-1)">‹</button>
  <button class="lb-nav lb-next" onclick="navLightbox(1)">›</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-title" id="lbTitle"></div>
</div>

<script>
const BASE = '/app/picviewer/api/gallery';
let images = [];
let filtered = [];
let currentLbIndex = -1;
let viewMode = 'grid';

async function loadData() {
  try {
    const r = await fetch(BASE);
    const data = await r.json();
    images = data.images || [];
    filterImages();
  } catch(e) {
    document.getElementById('gallery').innerHTML = '<div class="empty">Failed to load images</div>';
  }
}

function filterImages() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (!q) {
    filtered = [...images];
  } else {
    filtered = images.filter(img =>
      img.title.toLowerCase().includes(q) ||
      (img.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }
  render();
}

function render() {
  const g = document.getElementById('gallery');
  document.getElementById('imgCount').textContent = `${filtered.length} image${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    g.innerHTML = '<div class="empty">No images found</div>';
    return;
  }

  g.innerHTML = filtered.map((img, i) => `
    <div class="card" onclick="openLightbox(${i})">
      <img src="${img.thumb}" alt="${img.title}" loading="lazy">
      <div class="info">
        <div class="title">${img.title}</div>
        <div class="tags">${(img.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function setView(mode) {
  viewMode = mode;
  const g = document.getElementById('gallery');
  g.classList.toggle('list-view', mode === 'list');
  document.getElementById('gridBtn').classList.toggle('active', mode === 'grid');
  document.getElementById('listBtn').classList.toggle('active', mode === 'list');
}

function openLightbox(index) {
  currentLbIndex = index;
  const img = filtered[index];
  document.getElementById('lbImg').src = img.url;
  document.getElementById('lbTitle').textContent = img.title;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  currentLbIndex = -1;
}

function navLightbox(dir) {
  if (filtered.length === 0) return;
  currentLbIndex = (currentLbIndex + dir + filtered.length) % filtered.length;
  const img = filtered[currentLbIndex];
  document.getElementById('lbImg').src = img.url;
  document.getElementById('lbTitle').textContent = img.title;
}

document.addEventListener('keydown', e => {
  if (currentLbIndex < 0) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
