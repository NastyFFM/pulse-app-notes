<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalender</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .nav-btns { display: flex; gap: 6px; margin-left: auto; }
    .nav-btn { background: #334155; border: none; color: #cbd5e1; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
    .nav-btn:hover { background: #475569; }
    .nav-btn.active { background: #10B981; color: white; }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .month-nav button { background: #334155; border: none; color: #cbd5e1; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .month-nav button:hover { background: #475569; }
    .month-title { font-size: 16px; font-weight: 600; min-width: 160px; text-align: center; }
    .today-btn { background: #10B981; border: none; color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }

    /* Main Layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Calendar Grid */
    .calendar-area { flex: 1; overflow-y: auto; padding: 16px; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
    .weekday { text-align: center; font-size: 12px; color: #64748b; font-weight: 600; padding: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; gap: 2px; }
    .day-cell { background: #1e293b; border-radius: 8px; height: 90px; padding: 6px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; position: relative; overflow: hidden; }
    .day-cell:hover { background: #253347; border-color: #334155; }
    .day-cell.other-month { opacity: 0.35; }
    .day-cell.today { border-color: #10B981; }
    .day-cell.selected { background: #1a3a2e; border-color: #10B981; }
    .day-number { font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 4px; }
    .day-cell.today .day-number { background: #10B981; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .event-chip { font-size: 11px; padding: 1px 5px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; cursor: pointer; }
    .more-events { font-size: 10px; color: #64748b; padding-left: 4px; }

    /* Sidebar */
    .sidebar { width: 280px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header h3 { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .add-btn { background: #10B981; border: none; color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .events-list { flex: 1; overflow-y: auto; padding: 12px; }
    .event-item { background: #0f172a; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid #10B981; cursor: pointer; transition: opacity 0.15s; }
    .event-item:hover { opacity: 0.85; }
    .event-item .ev-title { font-size: 13px; font-weight: 600; color: #f1f5f9; margin-bottom: 2px; }
    .event-item .ev-time { font-size: 11px; color: #64748b; }
    .event-item .ev-desc { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .no-events { color: #475569; font-size: 13px; text-align: center; padding: 24px 0; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.hidden { display: none; }
    .modal { background: #1e293b; border-radius: 12px; padding: 24px; width: 380px; max-width: 90vw; border: 1px solid #334155; }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #f1f5f9; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: 500; }
    .form-group input, .form-group textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color 0.15s; }
    .form-group input:focus, .form-group textarea:focus { border-color: #10B981; }
    .form-group textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    .time-row { display: flex; gap: 10px; }
    .time-row .form-group { flex: 1; }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: white; transform: scale(1.15); }
    .allday-row { display: flex; align-items: center; gap: 8px; }
    .allday-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #10B981; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .btn { padding: 8px 18px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #10B981; color: white; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-secondary { background: #334155; color: #cbd5e1; }

    /* Selected day label */
    .selected-label { padding: 0 16px 8px; font-size: 12px; color: #64748b; }

    /* View toggle buttons */
    .view-btns { display: flex; gap: 4px; }
    .view-btn { background: #334155; border: none; color: #cbd5e1; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: background 0.15s; }
    .view-btn:hover { background: #475569; }
    .view-btn.active { background: #10B981; color: white; }

    /* Week View */
    .week-view { display: none; }
    .week-view.active { display: block; }
    .week-header { display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 0; border-bottom: 1px solid #334155; }
    .week-header-cell { text-align: center; padding: 8px 4px; font-size: 11px; color: #64748b; font-weight: 600; }
    .week-header-cell.today-col { color: #10B981; }
    .week-header-cell .wh-num { font-size: 20px; font-weight: 700; color: #cbd5e1; display: block; }
    .week-header-cell.today-col .wh-num { color: #10B981; }
    .week-time-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); position: relative; }
    .week-time-label { font-size: 10px; color: #475569; text-align: right; padding-right: 8px; height: 48px; line-height: 12px; transform: translateY(-6px); }
    .week-day-col { border-left: 1px solid rgba(51,65,85,0.5); position: relative; }
    .week-hour-line { height: 48px; border-bottom: 1px solid rgba(51,65,85,0.3); }
    .week-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 2px 4px; font-size: 10px; color: white; overflow: hidden; cursor: pointer; z-index: 2; line-height: 1.3; }
    .week-event:hover { opacity: 0.85; filter: brightness(1.1); }
    .week-allday-row { display: grid; grid-template-columns: 50px repeat(7, 1fr); border-bottom: 1px solid #334155; min-height: 24px; }
    .week-allday-label { font-size: 10px; color: #475569; text-align: right; padding-right: 8px; padding-top: 4px; }
    .week-allday-cell { border-left: 1px solid rgba(51,65,85,0.5); padding: 2px; }
    .week-allday-chip { font-size: 10px; padding: 1px 4px; border-radius: 3px; color: white; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

    /* Day View */
    .day-view { display: none; }
    .day-view.active { display: block; }
    .day-view-header { text-align: center; padding: 12px; font-size: 14px; font-weight: 600; color: #f1f5f9; border-bottom: 1px solid #334155; }
    .day-view-header .dv-weekday { color: #64748b; font-weight: 400; font-size: 12px; display: block; margin-bottom: 2px; }
    .day-allday-area { padding: 6px 12px 6px 62px; border-bottom: 1px solid #334155; min-height: 28px; }
    .day-allday-chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; color: white; margin-right: 6px; margin-bottom: 2px; cursor: pointer; }
    .day-time-grid { display: grid; grid-template-columns: 50px 1fr; position: relative; }
    .day-hour-row { display: contents; }
    .day-time-label { font-size: 10px; color: #475569; text-align: right; padding-right: 8px; height: 48px; line-height: 12px; transform: translateY(-6px); }
    .day-hour-cell { border-bottom: 1px solid rgba(51,65,85,0.3); border-left: 1px solid rgba(51,65,85,0.5); position: relative; height: 48px; cursor: pointer; }
    .day-hour-cell:hover { background: rgba(16,185,129,0.05); }
    .day-event { position: absolute; left: 4px; right: 4px; border-radius: 5px; padding: 4px 8px; font-size: 12px; color: white; overflow: hidden; cursor: pointer; z-index: 2; }
    .day-event:hover { opacity: 0.85; filter: brightness(1.1); }
    .day-event .de-title { font-weight: 600; }
    .day-event .de-time { font-size: 10px; opacity: 0.8; }
  </style>
</head>
<body>

<div class="header">
  <h1>📅 Kalender</h1>
  <div class="month-nav">
    <button id="prevMonth">‹</button>
    <span class="month-title" id="monthTitle"></span>
    <button id="nextMonth">›</button>
  </div>
  <button class="today-btn" id="todayBtn">Heute</button>
  <div class="view-btns">
    <button class="view-btn active" data-view="month">Monat</button>
    <button class="view-btn" data-view="week">Woche</button>
    <button class="view-btn" data-view="day">Tag</button>
  </div>
</div>

<div class="main">
  <div class="calendar-area">
    <div class="weekdays">
      <div class="weekday">Mo</div>
      <div class="weekday">Di</div>
      <div class="weekday">Mi</div>
      <div class="weekday">Do</div>
      <div class="weekday">Fr</div>
      <div class="weekday">Sa</div>
      <div class="weekday">So</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
    <div class="week-view" id="weekView"></div>
    <div class="day-view" id="dayView"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3 id="sidebarTitle">Termine</h3>
      <button class="add-btn" id="addBtn" title="Termin hinzufügen">+</button>
    </div>
    <div class="selected-label" id="selectedLabel"></div>
    <div class="events-list" id="eventsList"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Neuer Termin</h2>
    <div class="form-group">
      <label>Titel *</label>
      <input type="text" id="evTitle" placeholder="Terminname...">
    </div>
    <div class="form-group">
      <label>Datum</label>
      <input type="date" id="evDate">
    </div>
    <div class="allday-row form-group">
      <input type="checkbox" id="evAllDay">
      <label for="evAllDay" style="margin:0;font-size:13px;color:#e2e8f0;">Ganztägig</label>
    </div>
    <div class="time-row" id="timeRow">
      <div class="form-group">
        <label>Von</label>
        <input type="time" id="evStart">
      </div>
      <div class="form-group">
        <label>Bis</label>
        <input type="time" id="evEnd">
      </div>
    </div>
    <div class="form-group">
      <label>Beschreibung</label>
      <textarea id="evDesc" placeholder="Optional..."></textarea>
    </div>
    <div class="form-group">
      <label>Farbe</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger hidden" id="deleteBtn">Löschen</button>
      <button class="btn btn-secondary" id="cancelBtn">Abbrechen</button>
      <button class="btn btn-primary" id="saveBtn">Speichern</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#10B981','#3B82F6','#8B5CF6','#F59E0B','#EF4444','#EC4899','#06B6D4','#64748b'];
const DATA_URL = 'api/calendar';

let data = { events: [] };
let currentYear, currentMonth;
let selectedDate = null;
let editingId = null;
let selectedColor = COLORS[0];
let lastModified = 0;
let currentView = 'month'; // 'month', 'week', 'day'
let weekStart = null; // Date object for Monday of current week

const today = new Date();
currentYear = today.getFullYear();
currentMonth = today.getMonth();

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateDE(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}

function monthName(m, y) {
  return new Date(y, m, 1).toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const mod = res.headers.get('last-modified');
    if (mod && mod === lastModified) return;
    lastModified = mod;
    data = await res.json();
    render();
  } catch(e) {}
}

function eventsForDate(dateStr) {
  return data.events.filter(e => e.date === dateStr).sort((a,b) => (a.time||'25:00').localeCompare(b.time||'25:00'));
}

function render() {
  const weekdays = document.querySelector('.weekdays');
  const daysGrid = document.getElementById('daysGrid');
  const weekView = document.getElementById('weekView');
  const dayView = document.getElementById('dayView');

  weekdays.style.display = currentView === 'month' ? '' : 'none';
  daysGrid.style.display = currentView === 'month' ? '' : 'none';
  weekView.className = 'week-view' + (currentView === 'week' ? ' active' : '');
  dayView.className = 'day-view' + (currentView === 'day' ? ' active' : '');

  if (currentView === 'month') renderCalendar();
  else if (currentView === 'week') renderWeekView();
  else if (currentView === 'day') renderDayView();
  renderSidebar();
  updateTitle();
}

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function updateTitle() {
  const titleEl = document.getElementById('monthTitle');
  if (currentView === 'month') {
    titleEl.textContent = monthName(currentMonth, currentYear);
  } else if (currentView === 'week') {
    if (!weekStart) weekStart = getMonday(today);
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 6);
    const fmt = d => d.getDate() + '.' + (d.getMonth()+1) + '.';
    titleEl.textContent = fmt(weekStart) + ' – ' + fmt(end) + ' ' + end.getFullYear();
  } else if (currentView === 'day') {
    if (!selectedDate) selectedDate = toDateStr(today);
    const d = new Date(selectedDate + 'T00:00:00');
    const wd = d.toLocaleDateString('de-DE', { weekday: 'long' });
    titleEl.textContent = wd + ', ' + d.getDate() + '. ' + d.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
  }
}

function renderWeekView() {
  if (!weekStart) weekStart = getMonday(today);
  const container = document.getElementById('weekView');
  const todayStr = toDateStr(today);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push({ date: d, str: toDateStr(d) });
  }
  const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  let html = '<div class="week-header"><div class="week-header-cell"></div>';
  days.forEach((d, i) => {
    const isToday = d.str === todayStr;
    html += `<div class="week-header-cell${isToday ? ' today-col' : ''}" onclick="selectDate('${d.str}');switchView('day')"><span class="wh-num">${d.date.getDate()}</span>${dayNames[i]}</div>`;
  });
  html += '</div>';

  // All-day row
  html += '<div class="week-allday-row"><div class="week-allday-label">Ganzt.</div>';
  days.forEach(d => {
    const allDayEvs = eventsForDate(d.str).filter(e => e.allDay);
    html += '<div class="week-allday-cell">';
    allDayEvs.forEach(ev => {
      html += `<div class="week-allday-chip" style="background:${ev.color||'#10B981'}" onclick="openEdit(findEvent('${ev.id}'))">${ev.title}</div>`;
    });
    html += '</div>';
  });
  html += '</div>';

  // Time grid
  html += '<div class="week-time-grid">';
  for (let h = 0; h < 24; h++) {
    html += `<div class="week-time-label">${String(h).padStart(2,'0')}:00</div>`;
    days.forEach(d => {
      html += `<div class="week-hour-line" onclick="quickAdd('${d.str}','${String(h).padStart(2,'0')}:00')"></div>`;
    });
  }
  html += '</div>';

  container.innerHTML = html;

  // Place timed events
  const gridEl = container.querySelector('.week-time-grid');
  days.forEach((d, colIdx) => {
    const timedEvs = eventsForDate(d.str).filter(e => !e.allDay && e.time);
    timedEvs.forEach(ev => {
      const [hh, mm] = ev.time.split(':').map(Number);
      const top = (hh * 48) + (mm / 60 * 48);
      let duration = 48; // default 1h
      if (ev.endTime) {
        const [eh, em] = ev.endTime.split(':').map(Number);
        duration = Math.max(20, ((eh * 60 + em) - (hh * 60 + mm)) / 60 * 48);
      }
      const left = 50 + colIdx * ((gridEl.offsetWidth - 50) / 7);
      const width = (gridEl.offsetWidth - 50) / 7 - 4;
      const el = document.createElement('div');
      el.className = 'week-event';
      el.style.cssText = `top:${top}px;left:${50 + colIdx * ((gridEl.offsetWidth - 50) / 7) + 2}px;width:${width}px;height:${duration}px;background:${ev.color||'#10B981'}`;
      el.textContent = ev.time + ' ' + ev.title;
      el.onclick = () => openEdit(ev);
      gridEl.style.position = 'relative';
      gridEl.appendChild(el);
    });
  });
}

function renderDayView() {
  if (!selectedDate) selectedDate = toDateStr(today);
  const container = document.getElementById('dayView');
  const d = new Date(selectedDate + 'T00:00:00');
  const wd = d.toLocaleDateString('de-DE', { weekday: 'long' });

  const evs = eventsForDate(selectedDate);
  const allDayEvs = evs.filter(e => e.allDay);
  const timedEvs = evs.filter(e => !e.allDay && e.time);

  let html = '';

  // All-day events
  if (allDayEvs.length > 0) {
    html += '<div class="day-allday-area">';
    allDayEvs.forEach(ev => {
      html += `<div class="day-allday-chip" style="background:${ev.color||'#10B981'}" onclick="openEdit(findEvent('${ev.id}'))">${ev.title}</div>`;
    });
    html += '</div>';
  }

  // Hourly grid
  html += '<div class="day-time-grid" id="dayTimeGrid">';
  for (let h = 0; h < 24; h++) {
    html += `<div class="day-time-label">${String(h).padStart(2,'0')}:00</div>`;
    html += `<div class="day-hour-cell" onclick="quickAdd('${selectedDate}','${String(h).padStart(2,'0')}:00')"></div>`;
  }
  html += '</div>';

  container.innerHTML = html;

  // Place timed events
  const gridEl = document.getElementById('dayTimeGrid');
  if (gridEl) {
    timedEvs.forEach(ev => {
      const [hh, mm] = ev.time.split(':').map(Number);
      const top = (hh * 48) + (mm / 60 * 48);
      let duration = 48;
      if (ev.endTime) {
        const [eh, em] = ev.endTime.split(':').map(Number);
        duration = Math.max(24, ((eh * 60 + em) - (hh * 60 + mm)) / 60 * 48);
      }
      const el = document.createElement('div');
      el.className = 'day-event';
      el.style.cssText = `top:${top}px;height:${duration}px;background:${ev.color||'#10B981'}`;
      el.innerHTML = `<div class="de-title">${ev.title}</div><div class="de-time">${ev.time}${ev.endTime ? ' – ' + ev.endTime : ''}</div>`;
      el.onclick = () => openEdit(ev);
      gridEl.appendChild(el);
    });
  }
}

function findEvent(id) {
  return data.events.find(e => e.id === id);
}

function quickAdd(dateStr, time) {
  selectedDate = dateStr;
  openNew();
  document.getElementById('evStart').value = time;
  const h = parseInt(time);
  document.getElementById('evEnd').value = String(h+1).padStart(2,'0') + ':00';
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  if (view === 'week' && !weekStart) weekStart = getMonday(selectedDate ? new Date(selectedDate + 'T00:00:00') : today);
  if (view === 'day' && !selectedDate) selectedDate = toDateStr(today);
  render();
}

function renderCalendar() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1);
  // Monday-start: 0=Mo..6=So
  let startDow = firstDay.getDay(); // 0=Su
  startDow = (startDow + 6) % 7; // convert to Mon-start

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const todayStr = toDateStr(today);

  // Prev month filler
  const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const d = prevMonthDays - i;
    const dateStr = toDateStr(new Date(currentYear, currentMonth - 1, d));
    grid.appendChild(makeCell(d, dateStr, true));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = toDateStr(new Date(currentYear, currentMonth, d));
    grid.appendChild(makeCell(d, dateStr, false, dateStr === todayStr));
  }

  // Next month filler
  const totalCells = grid.children.length;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    const dateStr = toDateStr(new Date(currentYear, currentMonth + 1, d));
    grid.appendChild(makeCell(d, dateStr, true));
  }
}

function makeCell(dayNum, dateStr, otherMonth, isToday) {
  const cell = document.createElement('div');
  cell.className = 'day-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '') + (dateStr === selectedDate ? ' selected' : '');

  const numEl = document.createElement('div');
  numEl.className = 'day-number';
  numEl.textContent = dayNum;
  cell.appendChild(numEl);

  const evs = eventsForDate(dateStr);
  const maxShow = 3;
  evs.slice(0, maxShow).forEach(ev => {
    const chip = document.createElement('div');
    chip.className = 'event-chip';
    chip.style.background = ev.color || '#10B981';
    chip.textContent = (ev.allDay ? '' : (ev.time ? ev.time + ' ' : '')) + ev.title;
    chip.onclick = (e) => { e.stopPropagation(); openEdit(ev); };
    cell.appendChild(chip);
  });
  if (evs.length > maxShow) {
    const more = document.createElement('div');
    more.className = 'more-events';
    more.textContent = `+${evs.length - maxShow} weitere`;
    cell.appendChild(more);
  }

  cell.onclick = () => selectDate(dateStr);
  return cell;
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  render();
}

function renderSidebar() {
  const list = document.getElementById('eventsList');
  const label = document.getElementById('selectedLabel');
  const title = document.getElementById('sidebarTitle');

  if (selectedDate) {
    label.textContent = formatDateDE(selectedDate);
    title.textContent = 'Termine';
    const evs = eventsForDate(selectedDate);
    if (evs.length === 0) {
      list.innerHTML = '<div class="no-events">Keine Termine<br><small>Klicke + um einen hinzuzufügen</small></div>';
    } else {
      list.innerHTML = '';
      evs.forEach(ev => {
        const item = document.createElement('div');
        item.className = 'event-item';
        item.style.borderLeftColor = ev.color || '#10B981';
        item.innerHTML = `
          <div class="ev-title">${ev.title}</div>
          <div class="ev-time">${ev.allDay ? 'Ganztägig' : (ev.time ? ev.time + (ev.endTime ? ' – ' + ev.endTime : '') : '')}</div>
          ${ev.description ? `<div class="ev-desc">${ev.description}</div>` : ''}
        `;
        item.onclick = () => openEdit(ev);
        list.appendChild(item);
      });
    }
  } else {
    // Show all upcoming events
    label.textContent = '';
    title.textContent = 'Nächste Termine';
    const todayStr = toDateStr(today);
    const upcoming = data.events
      .filter(e => e.date >= todayStr)
      .sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''))
      .slice(0, 10);
    if (upcoming.length === 0) {
      list.innerHTML = '<div class="no-events">Keine anstehenden Termine</div>';
    } else {
      list.innerHTML = '';
      upcoming.forEach(ev => {
        const item = document.createElement('div');
        item.className = 'event-item';
        item.style.borderLeftColor = ev.color || '#10B981';
        item.innerHTML = `
          <div class="ev-title">${ev.title}</div>
          <div class="ev-time">${formatDateDE(ev.date)} ${ev.allDay ? '· Ganztägig' : (ev.time ? '· ' + ev.time : '')}</div>
          ${ev.description ? `<div class="ev-desc">${ev.description}</div>` : ''}
        `;
        item.onclick = () => openEdit(ev);
        list.appendChild(item);
      });
    }
  }
}

// Color picker setup
function setupColorPicker() {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
    dot.style.background = c;
    dot.onclick = () => { selectedColor = c; setupColorPicker(); };
    row.appendChild(dot);
  });
}

function openNew() {
  editingId = null;
  selectedColor = COLORS[0];
  document.getElementById('modalTitle').textContent = 'Neuer Termin';
  document.getElementById('evTitle').value = '';
  document.getElementById('evDate').value = selectedDate || toDateStr(today);
  document.getElementById('evAllDay').checked = false;
  document.getElementById('evStart').value = '';
  document.getElementById('evEnd').value = '';
  document.getElementById('evDesc').value = '';
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('timeRow').style.display = '';
  setupColorPicker();
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('evTitle').focus();
}

function openEdit(ev) {
  editingId = ev.id;
  selectedColor = ev.color || COLORS[0];
  document.getElementById('modalTitle').textContent = 'Termin bearbeiten';
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value = ev.date;
  document.getElementById('evAllDay').checked = !!ev.allDay;
  document.getElementById('evStart').value = ev.time || '';
  document.getElementById('evEnd').value = ev.endTime || '';
  document.getElementById('evDesc').value = ev.description || '';
  document.getElementById('deleteBtn').classList.remove('hidden');
  document.getElementById('timeRow').style.display = ev.allDay ? 'none' : '';
  setupColorPicker();
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('evTitle').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { document.getElementById('evTitle').focus(); return; }
  const ev = {
    id: editingId || String(Date.now()),
    title,
    date: document.getElementById('evDate').value,
    allDay: document.getElementById('evAllDay').checked,
    time: document.getElementById('evAllDay').checked ? '' : document.getElementById('evStart').value,
    endTime: document.getElementById('evAllDay').checked ? '' : document.getElementById('evEnd').value,
    description: document.getElementById('evDesc').value.trim(),
    color: selectedColor
  };
  if (editingId) {
    data.events = data.events.map(e => e.id === editingId ? ev : e);
  } else {
    data.events.push(ev);
  }
  selectedDate = ev.date;
  await saveData();
  closeModal();
}

async function deleteEvent() {
  if (!editingId) return;
  data.events = data.events.filter(e => e.id !== editingId);
  await saveData();
  closeModal();
}

async function saveData() {
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data, null, 2)
    });
    render();
  } catch(e) {
    console.error('Save failed:', e);
  }
}

// Event listeners
document.getElementById('addBtn').onclick = openNew;
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('saveBtn').onclick = saveEvent;
document.getElementById('deleteBtn').onclick = deleteEvent;
document.getElementById('prevMonth').onclick = () => {
  if (currentView === 'month') { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } }
  else if (currentView === 'week') { weekStart.setDate(weekStart.getDate() - 7); }
  else if (currentView === 'day') { const d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate() - 1); selectedDate = toDateStr(d); }
  render();
};
document.getElementById('nextMonth').onclick = () => {
  if (currentView === 'month') { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } }
  else if (currentView === 'week') { weekStart.setDate(weekStart.getDate() + 7); }
  else if (currentView === 'day') { const d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate() + 1); selectedDate = toDateStr(d); }
  render();
};
document.getElementById('todayBtn').onclick = () => { currentYear = today.getFullYear(); currentMonth = today.getMonth(); selectedDate = toDateStr(today); weekStart = getMonday(today); render(); };
document.querySelectorAll('.view-btn').forEach(b => b.onclick = () => switchView(b.dataset.view));
document.getElementById('evAllDay').onchange = () => {
  document.getElementById('timeRow').style.display = document.getElementById('evAllDay').checked ? 'none' : '';
};
document.getElementById('modalOverlay').onclick = (e) => { if (e.target === document.getElementById('modalOverlay')) closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
selectedDate = toDateStr(today);
loadData();
setInterval(loadData, 2000);
</script>
