<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header {
    padding: 12px 20px;
    background: linear-gradient(135deg, #0d3331 0%, #134e4a 100%);
    border-bottom: 1px solid rgba(20,184,166,0.3);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .header h1 { font-size: 1.1rem; font-weight: 600; color: #99f6e4; }
  .header .icon { font-size: 1.3rem; }

  .main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  .camera-view {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #000; position: relative; overflow: hidden;
  }
  #video { width: 100%; height: 100%; object-fit: cover; }
  #canvas { display: none; }

  .filter-label {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    padding: 6px 16px; border-radius: 20px;
    font-size: 0.8rem; color: rgba(255,255,255,0.8);
    pointer-events: none;
  }

  .controls {
    padding: 16px 20px;
    background: rgba(10,10,20,0.95);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; gap: 12px; flex-shrink: 0;
  }

  .filters {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 0;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 6px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
    font-size: 0.78rem; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .filter-btn:hover { background: rgba(20,184,166,0.15); color: #5eead4; }
  .filter-btn.active { background: rgba(20,184,166,0.25); color: #5eead4; border-color: rgba(20,184,166,0.5); }

  .btn-row { display: flex; gap: 12px; justify-content: center; align-items: center; }

  .capture-btn {
    width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid #14b8a6; background: transparent;
    cursor: pointer; position: relative; transition: all 0.15s;
  }
  .capture-btn::after {
    content: ''; position: absolute; inset: 5px; border-radius: 50%;
    background: #14b8a6; transition: all 0.15s;
  }
  .capture-btn:hover::after { background: #5eead4; }
  .capture-btn:active::after { transform: scale(0.85); }

  .switch-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
    color: #fff; font-size: 1.2rem; cursor: pointer; transition: all 0.15s;
  }
  .switch-btn:hover { background: rgba(255,255,255,0.15); }

  .gallery-strip {
    display: flex; gap: 8px; overflow-x: auto; padding: 8px 0;
    scrollbar-width: none;
  }
  .gallery-strip::-webkit-scrollbar { display: none; }
  .gallery-strip img {
    width: 48px; height: 48px; border-radius: 8px; object-fit: cover;
    border: 2px solid transparent; cursor: pointer; flex-shrink: 0;
  }
  .gallery-strip img:hover { border-color: #14b8a6; }

  .flash {
    position: absolute; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; transition: opacity 0.1s;
  }
  .flash.active { opacity: 0.8; }

  .no-camera {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: rgba(255,255,255,0.4); font-size: 0.95rem;
  }
  .no-camera span { font-size: 3rem; }

  /* Photo preview overlay */
  .preview-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    backdrop-filter: blur(10px); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .preview-overlay.open { display: flex; }
  .preview-overlay img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }
  .preview-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: rgba(255,255,255,0.6);
    font-size: 1.6rem; cursor: pointer;
  }
  .preview-close:hover { color: #fff; }
</style>
</head>
<body>

<div class="header">
  <span class="icon">📷</span>
  <h1>Camera</h1>
</div>

<div class="main">
  <div class="camera-view" id="cameraView">
    <video id="video" autoplay playsinline></video>
    <div class="flash" id="flash"></div>
    <div class="filter-label" id="filterLabel">Normal</div>
  </div>

  <div class="controls">
    <div class="filters" id="filters"></div>
    <div class="btn-row">
      <button class="switch-btn" onclick="switchCamera()" title="Switch camera">&#x21bb;</button>
      <button class="capture-btn" onclick="capture()" title="Take photo"></button>
      <button class="switch-btn" style="visibility:hidden"></button>
    </div>
    <div class="gallery-strip" id="galleryStrip"></div>
  </div>
</div>

<canvas id="canvas"></canvas>

<div class="preview-overlay" id="previewOverlay">
  <button class="preview-close" onclick="closePreview()">&#x2715;</button>
  <img id="previewImg" src="" alt="">
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const filters = [
  { name: 'Normal', css: 'none' },
  { name: 'Grayscale', css: 'grayscale(100%)' },
  { name: 'Sepia', css: 'sepia(100%)' },
  { name: 'Warm', css: 'saturate(1.5) hue-rotate(-10deg)' },
  { name: 'Cool', css: 'saturate(1.2) hue-rotate(30deg)' },
  { name: 'Vintage', css: 'sepia(40%) contrast(1.1) brightness(0.9)' },
  { name: 'Bright', css: 'brightness(1.3) contrast(1.1)' },
  { name: 'High Contrast', css: 'contrast(1.6) brightness(1.05)' },
  { name: 'Invert', css: 'invert(100%)' },
  { name: 'Blur', css: 'blur(2px)' }
];

let currentFilter = 0;
let facingMode = 'user';
let photos = [];
let stream = null;

// Render filter buttons
function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = filters.map((f, i) =>
    `<button class="filter-btn ${i === currentFilter ? 'active' : ''}" onclick="setFilter(${i})">${f.name}</button>`
  ).join('');
}

function setFilter(index) {
  currentFilter = index;
  video.style.filter = filters[index].css;
  document.getElementById('filterLabel').textContent = filters[index].name;
  renderFilters();
}

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.style.filter = filters[currentFilter].css;
  } catch(e) {
    document.getElementById('cameraView').innerHTML =
      '<div class="no-camera"><span>📷</span><div>Camera access denied or not available</div></div>';
  }
}

function switchCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
}

function capture() {
  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 200);

  // Capture frame
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.filter = filters[currentFilter].css;
  ctx.drawImage(video, 0, 0);
  ctx.filter = 'none';

  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  photos.unshift({ id: 'photo-' + Date.now(), data: dataUrl, time: new Date().toISOString(), filter: filters[currentFilter].name });
  if (photos.length > 20) photos.pop();
  renderGallery();
}

function renderGallery() {
  const strip = document.getElementById('galleryStrip');
  strip.innerHTML = photos.map((p, i) =>
    `<img src="${p.data}" alt="Photo ${i+1}" onclick="showPreview(${i})">`
  ).join('');
}

function showPreview(index) {
  document.getElementById('previewImg').src = photos[index].data;
  document.getElementById('previewOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePreview();
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); capture(); }
});

renderFilters();
startCamera();
</script>
</body>
</html>
