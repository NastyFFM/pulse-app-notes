<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notizen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: #16213e;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2d3748;
    flex-shrink: 0;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #F59E0B; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-primary { background: #F59E0B; color: #1a1a2e; }
  .btn-primary:hover { background: #D97706; }
  .btn-secondary { background: #2d3748; color: #e2e8f0; }
  .btn-secondary:hover { background: #4a5568; }
  .btn-danger { background: #EF4444; color: white; }
  .btn-danger:hover { background: #DC2626; }

  /* Search */
  .search-bar {
    padding: 12px 20px;
    background: #16213e;
    border-bottom: 1px solid #2d3748;
    flex-shrink: 0;
  }
  .search-input {
    width: 100%;
    padding: 8px 14px;
    background: #2d3748;
    border: 1px solid #4a5568;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
  }
  .search-input:focus { border-color: #F59E0B; }
  .search-input::placeholder { color: #718096; }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Notes grid */
  .notes-panel {
    width: 340px;
    flex-shrink: 0;
    background: #16213e;
    border-right: 1px solid #2d3748;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #718096;
    font-weight: 600;
    padding: 4px 0;
  }

  .note-card {
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
    position: relative;
  }
  .note-card:hover { filter: brightness(0.95); }
  .note-card.active { border-color: #F59E0B; }
  .note-card .pin-icon {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 14px;
    opacity: 0.6;
  }
  .note-card .card-title {
    font-weight: 700;
    font-size: 14px;
    color: #1a1a2e;
    margin-bottom: 5px;
    padding-right: 20px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-card .card-preview {
    font-size: 12px;
    color: #374151;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .note-card .card-date {
    font-size: 11px;
    color: #6B7280;
    margin-top: 6px;
  }

  /* Editor */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-toolbar {
    padding: 12px 20px;
    background: #1e2a4a;
    border-bottom: 1px solid #2d3748;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .title-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
    min-width: 0;
  }
  .title-input::placeholder { color: #4a5568; }

  .color-picker {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .color-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s;
  }
  .color-dot:hover, .color-dot.active { transform: scale(1.3); border-color: white; }

  .content-textarea {
    flex: 1;
    background: #1e2a4a;
    border: none;
    outline: none;
    color: #e2e8f0;
    font-size: 15px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    font-family: inherit;
  }
  .content-textarea::placeholder { color: #4a5568; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #4a5568;
    gap: 12px;
  }
  .empty-state .icon { font-size: 64px; }
  .empty-state p { font-size: 16px; }

  /* Status */
  .status-bar {
    padding: 6px 20px;
    background: #16213e;
    border-top: 1px solid #2d3748;
    font-size: 12px;
    color: #718096;
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .status-bar .saved { color: #10B981; }

  /* Empty notes list */
  .no-notes {
    text-align: center;
    color: #4a5568;
    padding: 40px 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:24px">📝</span>
  <h1>Notizen</h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="newNote()">+ Neue Notiz</button>
  </div>
</div>

<div class="search-bar">
  <input class="search-input" type="text" placeholder="Notizen durchsuchen..." oninput="filterNotes(this.value)" id="searchInput">
</div>

<div class="main">
  <div class="notes-panel" id="notesList"></div>

  <div class="editor-panel" id="editorPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">📝</div>
      <p>Wähle eine Notiz oder erstelle eine neue</p>
      <button class="btn btn-primary" onclick="newNote()">+ Neue Notiz</button>
    </div>

    <div id="editor" style="display:none; flex-direction:column; height:100%;">
      <div class="editor-toolbar">
        <input class="title-input" id="titleInput" placeholder="Titel..." oninput="onTitleChange(this.value)">
        <div class="color-picker" id="colorPicker"></div>
        <button class="btn btn-secondary" onclick="togglePin()" id="pinBtn" title="Anheften">📌</button>
        <button class="btn btn-danger" onclick="deleteNote()">🗑️</button>
      </div>
      <textarea class="content-textarea" id="contentInput" placeholder="Schreibe hier deine Notiz..." oninput="onContentChange(this.value)"></textarea>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="countStatus">0 Notizen</span>
  <span id="saveStatus"></span>
</div>

<script>
const DATA_URL = '/api/apps/notes/data/notes.json';
const NOTE_COLORS = ['#FEF3C7','#DBEAFE','#D1FAE5','#FCE7F3','#EDE9FE','#FEE2E2','#E0F2FE','#FFF7ED'];

let notes = [];
let currentId = null;
let saveTimer = null;
let filterText = '';

async function loadNotes() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await r.json();
    const prevId = currentId;
    notes = data.notes || [];
    renderList();
    if (prevId && notes.find(n => n.id === prevId)) {
      // keep current note selected, don't re-render editor
    }
    updateCount();
  } catch(e) {}
}

function renderList() {
  const list = document.getElementById('notesList');
  const q = filterText.toLowerCase();

  const filtered = notes.filter(n =>
    !q || n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
  );

  const pinned = filtered.filter(n => n.pinned);
  const unpinned = filtered.filter(n => !n.pinned);

  let html = '';
  if (pinned.length) {
    html += `<div class="section-label">📌 Angeheftet</div>`;
    pinned.forEach(n => html += noteCard(n));
  }
  if (unpinned.length) {
    if (pinned.length) html += `<div class="section-label" style="margin-top:8px">Alle Notizen</div>`;
    unpinned.forEach(n => html += noteCard(n));
  }
  if (!filtered.length) {
    html = `<div class="no-notes">Keine Notizen gefunden</div>`;
  }

  list.innerHTML = html;
}

function noteCard(n) {
  const active = n.id === currentId ? 'active' : '';
  const date = new Date(n.updated).toLocaleDateString('de-DE', {day:'2-digit',month:'short',year:'numeric'});
  return `
    <div class="note-card ${active}" style="background:${n.color||'#FEF3C7'}" onclick="selectNote('${n.id}')">
      ${n.pinned ? '<span class="pin-icon">📌</span>' : ''}
      <div class="card-title">${escHtml(n.title||'Ohne Titel')}</div>
      <div class="card-preview">${escHtml(n.content||'')}</div>
      <div class="card-date">${date}</div>
    </div>`;
}

function selectNote(id) {
  currentId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;

  document.getElementById('emptyState').style.display = 'none';
  const ed = document.getElementById('editor');
  ed.style.display = 'flex';

  document.getElementById('titleInput').value = note.title || '';
  document.getElementById('contentInput').value = note.content || '';
  document.getElementById('pinBtn').style.opacity = note.pinned ? '1' : '0.5';

  renderColorPicker(note.color);
  renderList();
}

function renderColorPicker(activeColor) {
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = NOTE_COLORS.map(c => `
    <div class="color-dot ${c===activeColor?'active':''}"
         style="background:${c}"
         onclick="setColor('${c}')"
         title="${c}"></div>
  `).join('');
}

function setColor(color) {
  const note = notes.find(n => n.id === currentId);
  if (!note) return;
  note.color = color;
  renderColorPicker(color);
  scheduleSave();
  renderList();
}

function onTitleChange(val) {
  const note = notes.find(n => n.id === currentId);
  if (!note) return;
  note.title = val;
  note.updated = new Date().toISOString();
  scheduleSave();
  renderList();
}

function onContentChange(val) {
  const note = notes.find(n => n.id === currentId);
  if (!note) return;
  note.content = val;
  note.updated = new Date().toISOString();
  scheduleSave();
}

function togglePin() {
  const note = notes.find(n => n.id === currentId);
  if (!note) return;
  note.pinned = !note.pinned;
  document.getElementById('pinBtn').style.opacity = note.pinned ? '1' : '0.5';
  scheduleSave();
  renderList();
}

function newNote() {
  const id = Date.now().toString();
  const color = NOTE_COLORS[notes.length % NOTE_COLORS.length];
  const note = {
    id,
    title: '',
    content: '',
    color,
    pinned: false,
    created: new Date().toISOString(),
    updated: new Date().toISOString()
  };
  notes.unshift(note);
  selectNote(id);
  saveNow();
  document.getElementById('titleInput').focus();
}

function deleteNote() {
  if (!currentId) return;
  if (!confirm('Notiz löschen?')) return;
  notes = notes.filter(n => n.id !== currentId);
  currentId = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('editor').style.display = 'none';
  saveNow();
  renderList();
  updateCount();
}

function filterNotes(q) {
  filterText = q;
  renderList();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  document.getElementById('saveStatus').textContent = 'Nicht gespeichert...';
  document.getElementById('saveStatus').className = '';
  saveTimer = setTimeout(saveNow, 800);
}

async function saveNow() {
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ notes }, null, 2)
    });
    document.getElementById('saveStatus').textContent = '✓ Gespeichert';
    document.getElementById('saveStatus').className = 'saved';
    updateCount();
  } catch(e) {
    document.getElementById('saveStatus').textContent = '⚠ Fehler beim Speichern';
  }
}

function updateCount() {
  document.getElementById('countStatus').textContent = `${notes.length} Notiz${notes.length!==1?'en':''}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
loadNotes();
setInterval(loadNotes, 2000);
</script>
</body>
</html>
