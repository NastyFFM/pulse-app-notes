<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0F172A;min-height:100vh;color:#fff;overflow-x:hidden}

/* Header */
.header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;background:rgba(15,23,42,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#A78BFA,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{font-size:.75rem;color:rgba(255,255,255,.4)}
.header-right{display:flex;align-items:center;gap:8px}
.refresh-btn{padding:6px 12px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.25);border-radius:8px;color:#A78BFA;font-size:.78rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{background:rgba(139,92,246,.3)}
.refresh-btn.loading .spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.timestamp{font-size:.7rem;color:rgba(255,255,255,.3)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;animation:pulse-dot 2s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px 24px}
.grid-full{grid-column:1/-1}

/* Cards */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:rgba(255,255,255,.15)}
.card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
.card-icon{font-size:1.1rem;margin-right:8px}
.card-title{font-size:.82rem;font-weight:600;color:rgba(255,255,255,.8);flex:1}
.card-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.card-body{padding:14px 16px}

/* Metrics row */
.metrics{display:flex;gap:8px;flex-wrap:wrap}
.metric{flex:1;min-width:70px;background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;text-align:center}
.metric-value{font-size:1.4rem;font-weight:700;line-height:1}
.metric-label{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* Lists */
.item-list{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.03);transition:background .15s;cursor:default}
.item:hover{background:rgba(255,255,255,.07)}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-text{flex:1;font-size:.8rem;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:.7rem;color:rgba(255,255,255,.35);flex-shrink:0}
.item-priority{font-size:.6rem;padding:1px 6px;border-radius:4px;font-weight:600;flex-shrink:0}

/* Insights */
.insight{padding:10px 14px;border-radius:8px;border-left:3px solid;margin-bottom:6px;font-size:.8rem;color:rgba(255,255,255,.7);line-height:1.4}
.insight.warn{border-color:#F59E0B;background:rgba(245,158,11,.08)}
.insight.info{border-color:#3B82F6;background:rgba(59,130,246,.08)}
.insight.good{border-color:#22C55E;background:rgba(34,197,94,.08)}
.insight.urgent{border-color:#EF4444;background:rgba(239,68,68,.08)}
.insight-icon{margin-right:6px}

/* System status */
.sys-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sys-row:last-child{border:none}
.sys-label{font-size:.75rem;color:rgba(255,255,255,.5);flex:1}
.sys-value{font-size:.75rem;font-weight:600}
.sys-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sys-dot.on{background:#22C55E}
.sys-dot.off{background:#EF4444}
.sys-dot.warn{background:#F59E0B}

/* AI Brief */
.brief-btn{width:100%;padding:10px;background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(129,140,248,.2));border:1px solid rgba(139,92,246,.3);border-radius:10px;color:#C4B5FD;font-size:.82rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.brief-btn:hover{background:linear-gradient(135deg,rgba(139,92,246,.35),rgba(129,140,248,.35));transform:translateY(-1px)}
.brief-btn:disabled{opacity:.5;cursor:default;transform:none}
.brief-text{font-size:.82rem;color:rgba(255,255,255,.7);line-height:1.5;white-space:pre-wrap}

/* Empty state */
.empty{text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:.8rem}

/* Progress bar */
.progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Pulse</h1>
    <span class="subtitle">Cross-App Intelligence</span>
  </div>
  <div class="header-right">
    <span class="timestamp" id="lastUpdate"></span>
    <span class="live-dot" id="liveDot"></span>
    <button class="refresh-btn" onclick="refreshAll()" id="refreshBtn">
      <span class="spin">&#x21bb;</span> Refresh
    </button>
  </div>
</div>

<div class="grid" id="grid">
  <!-- Rendered dynamically -->
</div>

<script>
const BASE = location.origin;
let data = {};

// --- Data fetching ---
async function fetchJSON(appId, file) {
  try {
    const r = await fetch(`${BASE}/app/${appId}/api/${file}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fetchApi(path) {
  try {
    const r = await fetch(`${BASE}${path}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function loadAllData() {
  const [tickets, kanban, calendar, budget, notes, chat, agents, health] = await Promise.all([
    fetchJSON('tickets', 'tickets'),
    fetchJSON('kanban', 'board'),
    fetchJSON('calendar', 'calendar'),
    fetchJSON('budget', 'budget'),
    fetchJSON('notes', 'notes'),
    fetchJSON('chat', 'chat'),
    fetchApi('/api/agents'),
    fetchApi('/api/orchestrator-health'),
  ]);
  data = { tickets, kanban, calendar, budget, notes, chat, agents, health };
  return data;
}

// --- Analysis ---
function analyzeTickets(d) {
  if (!d?.tickets) return { total: 0, open: 0, critical: 0, items: [], progress: 0 };
  const t = d.tickets;
  const open = t.filter(x => x.status !== 'Done');
  const critical = open.filter(x => x.priority === 'Critical' || x.priority === 'High');
  const done = t.filter(x => x.status === 'Done').length;
  return {
    total: t.length,
    open: open.length,
    critical: critical.length,
    done,
    progress: t.length ? Math.round(done / t.length * 100) : 0,
    items: open.slice(0, 5).map(x => ({
      text: `${d.prefix || 'TICK'}-${x.id} ${x.title}`,
      priority: x.priority,
      meta: x.status,
      color: x.priority === 'Critical' ? '#EF4444' : x.priority === 'High' ? '#F59E0B' : '#3B82F6'
    }))
  };
}

function analyzeKanban(d) {
  if (!d?.columns) return { total: 0, columns: [], items: [] };
  let total = 0;
  const columns = d.columns.map(c => {
    total += c.tasks.length;
    return { name: c.name, count: c.tasks.length, color: c.color };
  });
  const recentTasks = d.columns.flatMap(c => c.tasks.map(t => ({ ...t, column: c.name, colColor: c.color })))
    .sort((a, b) => (b.created || '').localeCompare(a.created || ''))
    .slice(0, 4);
  return {
    total,
    columns,
    items: recentTasks.map(t => ({
      text: t.title,
      meta: t.column,
      color: t.colColor
    }))
  };
}

function analyzeCalendar(d) {
  if (!d?.events) return { total: 0, upcoming: [], today: 0 };
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  const upcoming = d.events
    .filter(e => e.date >= todayStr)
    .sort((a, b) => (a.date + (a.time || '')).localeCompare(b.date + (b.time || '')))
    .slice(0, 5);
  const today = d.events.filter(e => e.date === todayStr).length;
  return {
    total: d.events.length,
    today,
    upcoming: upcoming.map(e => ({
      text: e.title,
      meta: formatDate(e.date) + (e.time ? ' ' + e.time : ''),
      color: e.color || '#10B981'
    }))
  };
}

function analyzeBudget(d) {
  if (!d?.transactions) return { balance: 0, income: 0, expenses: 0, recent: [] };
  let income = 0, expenses = 0;
  for (const t of d.transactions) {
    if (t.type === 'income') income += t.amount;
    else expenses += t.amount;
  }
  const recent = [...d.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 4);
  return {
    balance: income - expenses,
    income,
    expenses,
    recent: recent.map(t => ({
      text: t.description,
      meta: (t.type === 'income' ? '+' : '-') + t.amount.toFixed(0) + ' EUR',
      color: t.type === 'income' ? '#22C55E' : '#EF4444'
    }))
  };
}

function analyzeNotes(d) {
  if (!d?.notes) return { total: 0, pinned: 0, recent: [] };
  const pinned = d.notes.filter(n => n.pinned).length;
  const recent = [...d.notes].sort((a, b) => (b.updated || b.created || '').localeCompare(a.updated || a.created || '')).slice(0, 3);
  return {
    total: d.notes.length,
    pinned,
    recent: recent.map(n => ({
      text: n.title,
      meta: formatDate(n.updated || n.created),
      color: n.color || '#F59E0B'
    }))
  };
}

function analyzeSystem(agents, health) {
  const agentList = agents?.agents || [];
  const running = agentList.filter(a => a.status === 'running').length;
  const dead = agentList.filter(a => a.status === 'dead').length;
  return {
    agents: agentList,
    running,
    dead,
    total: agentList.length,
    orchestratorAlive: health?.alive || false,
    supervisorRunning: !!(health?.supervisor?.running),
    supervisor: health?.supervisor || null
  };
}

// --- Insights generation ---
function generateInsights() {
  const insights = [];
  const tickets = analyzeTickets(data.tickets);
  const calendar = analyzeCalendar(data.calendar);
  const budget = analyzeBudget(data.budget);
  const system = analyzeSystem(data.agents, data.health);

  if (tickets.critical > 0) {
    insights.push({ type: 'urgent', icon: '🔴', text: `${tickets.critical} Ticket${tickets.critical > 1 ? 's' : ''} mit hoher/kritischer Prioritaet offen` });
  }
  if (tickets.progress >= 80) {
    insights.push({ type: 'good', icon: '✅', text: `Ticket-Fortschritt bei ${tickets.progress}% — fast geschafft!` });
  }
  if (calendar.today > 0) {
    insights.push({ type: 'info', icon: '📅', text: `${calendar.today} Termin${calendar.today > 1 ? 'e' : ''} heute` });
  }
  if (budget.balance < 0) {
    insights.push({ type: 'warn', icon: '💸', text: `Budget im Minus: ${budget.balance.toFixed(0)} EUR` });
  } else if (budget.expenses > budget.income * 0.8 && budget.income > 0) {
    insights.push({ type: 'warn', icon: '⚠️', text: `Ausgaben bei ${Math.round(budget.expenses / budget.income * 100)}% der Einnahmen` });
  }
  if (system.dead > 0) {
    insights.push({ type: 'urgent', icon: '🤖', text: `${system.dead} Agent${system.dead > 1 ? 's' : ''} offline${system.supervisorRunning ? ' — Supervisor startet neu' : ''}` });
  }
  if (system.running > 0 && system.dead === 0) {
    insights.push({ type: 'good', icon: '🟢', text: `Alle ${system.running} Agents online` });
  }
  if (insights.length === 0) {
    insights.push({ type: 'good', icon: '👍', text: 'Alles im gruenen Bereich' });
  }
  return insights;
}

// --- Helpers ---
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  const dateStr = d.slice(0, 10);
  if (dateStr === todayStr) return 'Heute';
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  if (dateStr === tomorrow.toISOString().slice(0, 10)) return 'Morgen';
  return date.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function priorityColor(p) {
  return p === 'Critical' ? '#EF4444' : p === 'High' ? '#F59E0B' : p === 'Medium' ? '#3B82F6' : '#6B7280';
}

// --- Render ---
function render() {
  const tickets = analyzeTickets(data.tickets);
  const kanban = analyzeKanban(data.kanban);
  const calendar = analyzeCalendar(data.calendar);
  const budget = analyzeBudget(data.budget);
  const notes = analyzeNotes(data.notes);
  const system = analyzeSystem(data.agents, data.health);
  const insights = generateInsights();

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // --- Insights Card (full width) ---
  grid.innerHTML += `
    <div class="card grid-full">
      <div class="card-header">
        <span class="card-icon">🧠</span>
        <span class="card-title">AI Insights</span>
        <button class="brief-btn" onclick="generateBrief()" id="briefBtn" style="width:auto;padding:4px 12px;font-size:.72rem">
          <span class="spin">✨</span> Daily Brief
        </button>
      </div>
      <div class="card-body">
        ${insights.map(i => `<div class="insight ${i.type}"><span class="insight-icon">${i.icon}</span>${esc(i.text)}</div>`).join('')}
        <div id="briefArea"></div>
      </div>
    </div>`;

  // --- Tickets ---
  grid.innerHTML += `
    <div class="card">
      <div class="card-header">
        <span class="card-icon">🎫</span>
        <span class="card-title">Tickets</span>
        <span class="card-badge" style="background:rgba(59,130,246,.15);color:#60A5FA">${tickets.open} offen</span>
      </div>
      <div class="card-body">
        <div class="metrics">
          <div class="metric"><div class="metric-value">${tickets.total}</div><div class="metric-label">Gesamt</div></div>
          <div class="metric"><div class="metric-value" style="color:#F59E0B">${tickets.critical}</div><div class="metric-label">Kritisch</div></div>
          <div class="metric"><div class="metric-value" style="color:#22C55E">${tickets.done}</div><div class="metric-label">Done</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${tickets.progress}%;background:linear-gradient(90deg,#8B5CF6,#22C55E)"></div></div>
        ${tickets.items.length ? '<div class="item-list" style="margin-top:10px">' + tickets.items.map(i => `
          <div class="item">
            <div class="item-dot" style="background:${i.color}"></div>
            <span class="item-text">${esc(i.text)}</span>
            <span class="item-priority" style="background:${i.color}20;color:${i.color}">${i.priority}</span>
          </div>`).join('') + '</div>' : '<div class="empty">Keine offenen Tickets</div>'}
      </div>
    </div>`;

  // --- Calendar ---
  grid.innerHTML += `
    <div class="card">
      <div class="card-header">
        <span class="card-icon">📅</span>
        <span class="card-title">Kalender</span>
        <span class="card-badge" style="background:rgba(16,185,129,.15);color:#34D399">${calendar.today} heute</span>
      </div>
      <div class="card-body">
        ${calendar.upcoming.length ? '<div class="item-list">' + calendar.upcoming.map(i => `
          <div class="item">
            <div class="item-dot" style="background:${i.color}"></div>
            <span class="item-text">${esc(i.text)}</span>
            <span class="item-meta">${esc(i.meta)}</span>
          </div>`).join('') + '</div>' : '<div class="empty">Keine anstehenden Termine</div>'}
      </div>
    </div>`;

  // --- Budget ---
  grid.innerHTML += `
    <div class="card">
      <div class="card-header">
        <span class="card-icon">💰</span>
        <span class="card-title">Budget</span>
        <span class="card-badge" style="background:${budget.balance >= 0 ? 'rgba(34,197,94,.15);color:#22C55E' : 'rgba(239,68,68,.15);color:#EF4444'}">${budget.balance >= 0 ? '+' : ''}${budget.balance.toFixed(0)} EUR</span>
      </div>
      <div class="card-body">
        <div class="metrics">
          <div class="metric"><div class="metric-value" style="color:#22C55E">${budget.income.toFixed(0)}</div><div class="metric-label">Einnahmen</div></div>
          <div class="metric"><div class="metric-value" style="color:#EF4444">${budget.expenses.toFixed(0)}</div><div class="metric-label">Ausgaben</div></div>
        </div>
        ${budget.recent.length ? '<div class="item-list" style="margin-top:10px">' + budget.recent.map(i => `
          <div class="item">
            <div class="item-dot" style="background:${i.color}"></div>
            <span class="item-text">${esc(i.text)}</span>
            <span class="item-meta" style="color:${i.color}">${esc(i.meta)}</span>
          </div>`).join('') + '</div>' : ''}
      </div>
    </div>`;

  // --- Kanban ---
  grid.innerHTML += `
    <div class="card">
      <div class="card-header">
        <span class="card-icon">📋</span>
        <span class="card-title">Kanban</span>
        <span class="card-badge" style="background:rgba(59,130,246,.15);color:#60A5FA">${kanban.total} Tasks</span>
      </div>
      <div class="card-body">
        <div class="metrics">
          ${kanban.columns.map(c => `<div class="metric"><div class="metric-value" style="color:${c.color}">${c.count}</div><div class="metric-label">${esc(c.name)}</div></div>`).join('')}
        </div>
        ${kanban.items.length ? '<div class="item-list" style="margin-top:10px">' + kanban.items.map(i => `
          <div class="item">
            <div class="item-dot" style="background:${i.color}"></div>
            <span class="item-text">${esc(i.text)}</span>
            <span class="item-meta">${esc(i.meta)}</span>
          </div>`).join('') + '</div>' : ''}
      </div>
    </div>`;

  // --- Notes ---
  grid.innerHTML += `
    <div class="card">
      <div class="card-header">
        <span class="card-icon">📝</span>
        <span class="card-title">Notizen</span>
        <span class="card-badge" style="background:rgba(245,158,11,.15);color:#F59E0B">${notes.total} Notizen</span>
      </div>
      <div class="card-body">
        <div class="metrics">
          <div class="metric"><div class="metric-value">${notes.total}</div><div class="metric-label">Gesamt</div></div>
          <div class="metric"><div class="metric-value" style="color:#F59E0B">${notes.pinned}</div><div class="metric-label">Angepinnt</div></div>
        </div>
        ${notes.recent.length ? '<div class="item-list" style="margin-top:10px">' + notes.recent.map(i => `
          <div class="item">
            <div class="item-dot" style="background:${i.color}"></div>
            <span class="item-text">${esc(i.text)}</span>
            <span class="item-meta">${esc(i.meta)}</span>
          </div>`).join('') + '</div>' : ''}
      </div>
    </div>`;

  // --- System Status ---
  grid.innerHTML += `
    <div class="card">
      <div class="card-header">
        <span class="card-icon">⚙️</span>
        <span class="card-title">System</span>
        <span class="card-badge" style="background:${system.running > 0 && system.dead === 0 ? 'rgba(34,197,94,.15);color:#22C55E' : 'rgba(245,158,11,.15);color:#F59E0B'}">${system.running}/${system.total} online</span>
      </div>
      <div class="card-body">
        <div class="sys-row">
          <span class="sys-dot ${system.orchestratorAlive ? 'on' : 'off'}"></span>
          <span class="sys-label">Chat-Orchestrator</span>
          <span class="sys-value" style="color:${system.orchestratorAlive ? '#22C55E' : '#EF4444'}">${system.orchestratorAlive ? 'Online' : 'Offline'}</span>
        </div>
        <div class="sys-row">
          <span class="sys-dot ${system.supervisorRunning ? 'on' : 'off'}"></span>
          <span class="sys-label">Supervisor</span>
          <span class="sys-value" style="color:${system.supervisorRunning ? '#22C55E' : '#6B7280'}">${system.supervisorRunning ? 'Aktiv (' + (system.supervisor?.uptimeSeconds || 0) + 's)' : 'Inaktiv'}</span>
        </div>
        ${system.agents.map(a => `
          <div class="sys-row">
            <span class="sys-dot ${a.status === 'running' ? 'on' : 'off'}"></span>
            <span class="sys-label">${esc(a.id.replace('agent-',''))}</span>
            <span class="sys-value" style="color:${a.status === 'running' ? '#22C55E' : '#EF4444'}">${a.status} (${a.model})</span>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('lastUpdate').textContent = 'Aktualisiert ' + new Date().toLocaleTimeString('de-DE');
}

// --- AI Daily Brief ---
async function generateBrief() {
  const btn = document.getElementById('briefBtn');
  const area = document.getElementById('briefArea');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin" style="display:inline-block;animation:spin 1s linear infinite">✨</span> Generiere...';

  const tickets = analyzeTickets(data.tickets);
  const calendar = analyzeCalendar(data.calendar);
  const budget = analyzeBudget(data.budget);
  const kanban = analyzeKanban(data.kanban);
  const notes = analyzeNotes(data.notes);

  const context = `Erstelle ein kurzes Daily Briefing (3-5 Saetze, auf Deutsch) basierend auf diesen Daten:
- Tickets: ${tickets.total} gesamt, ${tickets.open} offen, ${tickets.critical} kritisch, ${tickets.progress}% erledigt
- Kalender: ${calendar.today} Termine heute, naechste: ${calendar.upcoming.slice(0,3).map(u => u.text + ' (' + u.meta + ')').join(', ') || 'keine'}
- Budget: ${budget.balance.toFixed(0)} EUR Saldo, ${budget.income.toFixed(0)} Einnahmen, ${budget.expenses.toFixed(0)} Ausgaben
- Kanban: ${kanban.total} Tasks (${kanban.columns.map(c => c.name + ': ' + c.count).join(', ')})
- Notizen: ${notes.total} Notizen, ${notes.pinned} angepinnt
Sei konkret und hilfreich. Keine Floskeln.`;

  try {
    const r = await fetch(`${BASE}/api/chat-respond`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pulse: true, prompt: context })
    });
    // Fallback: use a simple fetch to the chat API or claude -p endpoint
    // For now, use the orchestrator health endpoint's fallback
  } catch {}

  // Simple fallback: format a brief locally based on data
  const lines = [];
  if (tickets.critical > 0) lines.push(`⚡ ${tickets.critical} kritische Tickets brauchen Aufmerksamkeit.`);
  if (calendar.today > 0) lines.push(`📅 ${calendar.today} Termin${calendar.today > 1 ? 'e' : ''} heute.`);
  else lines.push('📅 Heute keine Termine — guter Tag fuer Deep Work.');
  if (budget.balance < 0) lines.push(`💸 Budget im Minus (${budget.balance.toFixed(0)} EUR).`);
  else lines.push(`💰 Budget: ${budget.balance.toFixed(0)} EUR Saldo.`);
  lines.push(`📋 Kanban: ${kanban.total} Tasks, davon ${kanban.columns[0]?.count || 0} im Backlog.`);
  if (tickets.progress > 0) lines.push(`📊 Ticket-Fortschritt: ${tickets.progress}%.`);

  area.innerHTML = `<div class="brief-text" style="margin-top:10px;padding:12px;background:rgba(139,92,246,.08);border-radius:8px;border:1px solid rgba(139,92,246,.15)">${lines.join('\n')}</div>`;
  btn.disabled = false;
  btn.innerHTML = '<span class="spin">✨</span> Daily Brief';
}

// --- Refresh ---
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  await loadAllData();
  render();
  btn.classList.remove('loading');
}

// --- SSE for live updates ---
function connectSSE() {
  const sources = ['tickets', 'kanban', 'calendar', 'budget', 'notes', 'chat'];
  sources.forEach(appId => {
    const es = new EventSource(`${BASE}/sse/${appId}`);
    es.onmessage = () => {
      // Debounce: reload data after a short delay
      clearTimeout(window._pulseDebounce);
      window._pulseDebounce = setTimeout(refreshAll, 1000);
    };
    es.onerror = () => {
      setTimeout(() => connectSSE(), 5000);
      es.close();
    };
  });
}

// --- Init ---
(async () => {
  await loadAllData();
  render();
  connectSSE();
  // Auto-refresh every 30s
  setInterval(refreshAll, 30000);
})();
</script>
