<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wetter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #00BCD4;
      box-shadow: 0 0 8px rgba(0, 188, 212, 0.2);
    }
    button {
      padding: 10px 16px;
      background: #00BCD4;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #00ACC1;
    }
    button:active {
      transform: scale(0.98);
    }
    .weather-display {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .city-name {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .weather-icon {
      font-size: 56px;
      line-height: 1;
    }
    .temperature {
      font-size: 48px;
      font-weight: 300;
      color: #00BCD4;
    }
    .weather-condition {
      font-size: 16px;
      color: #cbd5e1;
    }
    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
      font-size: 13px;
    }
    .detail-item {
      background: #0f172a;
      padding: 8px;
      border-radius: 6px;
      border-left: 2px solid #00BCD4;
    }
    .detail-label {
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .detail-value {
      color: #f1f5f9;
      font-weight: 500;
    }
    .loading {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }
    .error {
      background: #7f1d1d;
      border: 1px solid #dc2626;
      color: #fecaca;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Stadt eingeben..." autocomplete="off">
      <button onclick="searchWeather()">Suchen</button>
    </div>
    <div class="weather-display" id="weatherDisplay">
      <p class="loading">Gib eine Stadt ein</p>
    </div>
  </div>

  <script>
    const weatherIcons = {
      'clear': '☀️', 'sunny': '☀️', 'partly_cloudy': '⛅', 'cloudy': '☁️',
      'overcast': '☁️', 'rainy': '🌧️', 'rain': '🌧️', 'thunderstorm': '⛈️',
      'snow': '❄️', 'sleet': '🌨️', 'windy': '💨', 'fog': '🌫️'
    };

    async function searchWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return;

      const display = document.getElementById('weatherDisplay');
      display.innerHTML = '<p class="loading">Lädt...</p>';

      try {
        // Geocode: Stadt → Koordinaten
        const geoRes = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=de&format=json`
        );
        const geoData = await geoRes.json();

        if (!geoData.results || geoData.results.length === 0) {
          display.innerHTML = '<p class="error">Stadt nicht gefunden. Bitte versuche es erneut.</p>';
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];

        // Wetter: Koordinaten → Wetterdaten
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&temperature_unit=celsius&timezone=auto`
        );
        const weatherData = await weatherRes.json();
        const current = weatherData.current;

        // WMO Weather Code → Beschreibung & Icon
        const code = current.weather_code;
        const iconMap = {
          0: ['☀️', 'Klar'], 1: ['⛅', 'Leicht bewölkt'], 2: ['⛅', 'Teilweise bewölkt'],
          3: ['☁️', 'Bedeckt'], 45: ['🌫️', 'Neblig'], 48: ['🌫️', 'Rauhreif'],
          51: ['🌧️', 'Nieselregen'], 53: ['🌧️', 'Mäßiger Regen'], 55: ['🌧️', 'Starker Regen'],
          61: ['🌧️', 'Leichter Regen'], 63: ['🌧️', 'Mäßiger Regen'], 65: ['🌧️', 'Starker Regen'],
          71: ['❄️', 'Leichter Schnee'], 73: ['❄️', 'Schnee'], 75: ['❄️', 'Starker Schnee'],
          80: ['🌧️', 'Schauer'], 81: ['🌧️', 'Starke Schauer'], 82: ['🌧️', 'Heftige Schauer'],
          85: ['❄️', 'Schneeregenschauer'], 86: ['❄️', 'Starke Schneeregenschauer'],
          95: ['⛈️', 'Gewitter'], 96: ['⛈️', 'Gewitter mit Hagel'], 99: ['⛈️', 'Starkes Gewitter']
        };

        const [icon, description] = iconMap[code] || ['🌡️', 'Unbekannt'];
        const temp = Math.round(current.temperature_2m);
        const humidity = current.relative_humidity_2m;
        const wind = current.wind_speed_10m.toFixed(1);

        display.innerHTML = `
          <div class="city-name">${name}, ${country}</div>
          <div class="weather-icon">${icon}</div>
          <div class="temperature">${temp}°C</div>
          <div class="weather-condition">${description}</div>
          <div class="details">
            <div class="detail-item">
              <div class="detail-label">Luftfeuchte</div>
              <div class="detail-value">${humidity}%</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Windgeschwindigkeit</div>
              <div class="detail-value">${wind} km/h</div>
            </div>
          </div>
        `;

        PulseOS.reportStatus(`${name}: ${temp}°C, ${description}`);
      } catch (error) {
        display.innerHTML = `<p class="error">Fehler beim Abrufen: ${error.message}</p>`;
      }
    }

    // Enter-Taste
    document.getElementById('cityInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchWeather();
    });
  </script>
</body>
</html>
