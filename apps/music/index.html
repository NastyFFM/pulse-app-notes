<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d14;--surface:#111118;--text:rgba(255,255,255,.85);--dim:rgba(255,255,255,.4);--muted:rgba(255,255,255,.15);--teal:#4ecdc4;--amber:#f5a623;--lila:#a855f7;--red:#ef4444;--green:#22c55e;--border:rgba(255,255,255,.06);--font:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.header-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.station-list{flex:1;overflow-y:auto;padding:8px}
.station{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .15s;background:var(--surface)}
.station:hover{border-color:rgba(78,205,196,.15);background:rgba(78,205,196,.02)}
.station.active{border-color:var(--teal);background:rgba(78,205,196,.05)}
.station.playing{border-color:var(--green);background:rgba(34,197,94,.05)}
.play-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s}
.station.playing .play-btn{background:var(--green);color:var(--bg);border-color:var(--green)}
.station:hover .play-btn{background:rgba(255,255,255,.1);color:var(--text)}
.station-info{flex:1;min-width:0}
.station-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.station-genre{font-size:10px;color:var(--dim);margin-top:2px}
.station-genre-tag{display:inline-block;background:rgba(168,85,247,.1);color:var(--lila);padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600}

/* Player bar */
.player-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:16px}
.player-bar.hidden{display:none}
.player-info{flex:1;min-width:0}
.player-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-status{font-size:9px;color:var(--green);margin-top:2px}
.player-controls{display:flex;align-items:center;gap:12px}
.ctrl-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.ctrl-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.ctrl-btn.active{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.volume-wrap{display:flex;align-items:center;gap:8px}
.volume-label{font-size:9px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;width:80px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--teal);cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Internet Radio</span>
  <span style="font-size:10px;color:var(--muted)" id="stationCount"></span>
</div>

<div class="main">
  <div class="station-list" id="stationList"></div>
</div>

<div class="player-bar hidden" id="playerBar">
  <div class="player-info">
    <div class="player-name" id="playerName">--</div>
    <div class="player-status" id="playerStatus">Gestoppt</div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btnPlay" onclick="togglePlay()">|></button>
    <button class="ctrl-btn" onclick="stopPlay()">[]</button>
  </div>
  <div class="volume-wrap">
    <span class="volume-label">Vol</span>
    <input type="range" min="0" max="100" value="70" id="volumeSlider" oninput="setVolume(this.value)">
  </div>
</div>

<script>
const DATA_URL = '/app/music/api/stations';
let stations = [];
let currentIndex = -1;
let isPlaying = false;
const audio = new Audio();
audio.crossOrigin = 'anonymous';

async function loadStations() {
  try {
    const r = await fetch(DATA_URL);
    if (r.ok) { const d = await r.json(); stations = d.stations || []; }
  } catch { stations = []; }
  document.getElementById('stationCount').textContent = stations.length + ' Sender';
  render();
}

function render() {
  const list = document.getElementById('stationList');
  list.innerHTML = stations.map((s, i) => {
    const cls = i === currentIndex ? (isPlaying ? ' playing' : ' active') : '';
    return '<div class="station' + cls + '" onclick="selectStation(' + i + ')">' +
      '<div class="play-btn">' + (i === currentIndex && isPlaying ? '||' : '|>') + '</div>' +
      '<div class="station-info">' +
        '<div class="station-name">' + esc(s.name) + '</div>' +
        '<div class="station-genre"><span class="station-genre-tag">' + esc(s.genre) + '</span></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function selectStation(index) {
  if (currentIndex === index && isPlaying) {
    togglePlay();
    return;
  }
  currentIndex = index;
  const station = stations[index];
  audio.src = station.url;
  audio.volume = document.getElementById('volumeSlider').value / 100;
  audio.play().catch(() => {});
  isPlaying = true;
  updatePlayer();
  render();
}

function togglePlay() {
  if (currentIndex < 0) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().catch(() => {});
    isPlaying = true;
  }
  updatePlayer();
  render();
}

function stopPlay() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  currentIndex = -1;
  updatePlayer();
  render();
}

function setVolume(val) {
  audio.volume = val / 100;
}

function updatePlayer() {
  const bar = document.getElementById('playerBar');
  if (currentIndex < 0) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  const station = stations[currentIndex];
  document.getElementById('playerName').textContent = station.name;
  document.getElementById('playerStatus').textContent = isPlaying ? 'Laeuft' : 'Pausiert';
  document.getElementById('playerStatus').style.color = isPlaying ? 'var(--green)' : 'var(--amber)';
  document.getElementById('btnPlay').textContent = isPlaying ? '||' : '|>';
  document.getElementById('btnPlay').classList.toggle('active', isPlaying);
}

audio.addEventListener('error', () => {
  document.getElementById('playerStatus').textContent = 'Fehler beim Laden';
  document.getElementById('playerStatus').style.color = 'var(--red)';
});

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadStations();
</script>
</body>
</html>
