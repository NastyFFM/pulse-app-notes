<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .clock-container {
            text-align: center;
        }
        
        .time {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 1.5rem;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
        }
        
        .date {
            font-size: 1.5rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        
        .weekday {
            font-size: 1.25rem;
            color: #94a3b8;
        }
        
        @media (max-width: 768px) {
            .time { font-size: 4rem; }
            .date { font-size: 1.25rem; }
            .weekday { font-size: 1rem; }
        }
        
        @media (max-width: 480px) {
            .time { font-size: 2.5rem; }
            .date { font-size: 1rem; }
            .weekday { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">Datum</div>
        <div class="weekday" id="weekday">Wochentag</div>
    </div>
    
    <script>
        const de = {
            weekdays: ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'],
            months: ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember']
        };
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const day = now.getDate();
            const month = de.months[now.getMonth()];
            const year = now.getFullYear();
            const weekday = de.weekdays[now.getDay()];
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('date').textContent = `${day}. ${month} ${year}`;
            document.getElementById('weekday').textContent = weekday;
        }
        
        updateClock();
        setInterval(updateClock, 1000);
        
        if (window.PulseOS && window.PulseOS.reportStatus) {
            window.PulseOS.reportStatus('Uhr läuft...');
        }
    </script>
</body>
</html>
