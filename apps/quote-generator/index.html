<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zitat-Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111110;--surface:#1a1a17;--border:rgba(255,255,255,0.08);--text:#e8e6de;--muted:#7a7870;--accent:#e85d24;--green:#1d9e75;--radius:8px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.title{font-weight:600;font-size:15px}
.status{margin-left:auto;font-size:11px;color:var(--muted)}
.status.active{color:var(--green)}
.quote-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.quote-text{font-size:16px;font-style:italic;color:var(--text);margin-bottom:8px;line-height:1.5}
.quote-author{font-size:12px;color:var(--muted);text-align:right}
.quote-meta{font-size:10px;color:var(--muted);margin-top:8px;opacity:0.6}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);transition:opacity 0.15s}
.btn:hover{opacity:0.9}
.counter{font-size:11px;color:var(--muted);margin-top:12px}
</style>
</head>
<body>

<div class="header">
  <span>💬</span>
  <span class="title">Zitat-Generator</span>
  <span class="status" id="status">Bereit</span>
</div>

<div id="currentQuote" class="quote-card">
  <div class="quote-text" id="quoteText">Klicke "Generieren" oder warte auf den Pulse...</div>
  <div class="quote-author" id="quoteAuthor"></div>
</div>

<button class="btn" onclick="run()">⚡ Generieren & Senden</button>
<div class="counter" id="counter">0 Zitate generiert</div>

<script>
// === PulseOS Graph Bridge ===
window.addEventListener('message', (e) => {
  if (e.data?.type === 'app-input') handleInput(e.data.inputName, e.data.data);
  if (e.data?.type === 'pulse') onPulse(e.data);
});

function emit(outputName, data) {
  if (window.PulseOS) {
    window.PulseOS.emit(outputName, data);
  } else {
    parent.postMessage({ type: 'graph-output', appId: 'quote-generator', outputName, data }, '*');
  }
}

// === Zitat-Datenbank ===
const quotes = [
  { text: "Die beste Zeit einen Baum zu pflanzen war vor 20 Jahren. Die zweitbeste ist jetzt.", author: "Chinesisches Sprichwort" },
  { text: "Code is like humor. When you have to explain it, it's bad.", author: "Cory House" },
  { text: "Einfachheit ist die hoechste Stufe der Vollendung.", author: "Leonardo da Vinci" },
  { text: "First, solve the problem. Then, write the code.", author: "John Johnson" },
  { text: "Das Geheimnis des Erfolgs ist anzufangen.", author: "Mark Twain" },
  { text: "Talk is cheap. Show me the code.", author: "Linus Torvalds" },
  { text: "Perfektion ist nicht dann erreicht, wenn man nichts mehr hinzufuegen kann, sondern wenn man nichts mehr weglassen kann.", author: "Antoine de Saint-Exupery" },
  { text: "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", author: "Martin Fowler" },
  { text: "The most dangerous phrase in the language is: We've always done it this way.", author: "Grace Hopper" },
  { text: "Wer aufhoert besser zu werden, hat aufgehoert gut zu sein.", author: "Philip Rosenthal" }
];

let count = 0;

function getRandomQuote() {
  return quotes[Math.floor(Math.random() * quotes.length)];
}

// === App-Logik ===
function run() {
  const q = getRandomQuote();
  count++;
  const payload = {
    text: q.text,
    author: q.author,
    generatedAt: new Date().toISOString(),
    index: count
  };

  // Update UI
  document.getElementById('quoteText').textContent = '"' + q.text + '"';
  document.getElementById('quoteAuthor').textContent = '— ' + q.author;
  document.getElementById('counter').textContent = count + ' Zitate generiert';
  document.getElementById('status').textContent = 'Gesendet #' + count;
  document.getElementById('status').classList.add('active');
  setTimeout(() => document.getElementById('status').classList.remove('active'), 2000);

  // Emit to graph
  emit('quote', payload);
  console.log('[quote-generator] Emitted quote #' + count, payload);
}

function handleInput(inputName, data) {
  console.log('[quote-generator] Input:', inputName, data);
}

function onPulse(pulseData) {
  console.log('[quote-generator] Pulse received, generating...');
  run();
}
</script>
</body>
</html>
