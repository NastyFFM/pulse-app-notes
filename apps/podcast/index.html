<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcasts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0f;height:100vh;color:#e2e8f0;display:flex;flex-direction:column;overflow:hidden}

.top-bar{display:flex;align-items:center;gap:16px;padding:14px 20px;background:rgba(15,15,25,.95);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.top-bar h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:4px;margin-left:24px}
.tab{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:all .15s}
.tab:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.tab.active{background:rgba(234,88,12,.2);color:#fb923c}
.search-box{margin-left:auto;display:flex;gap:8px;align-items:center}
.search-box input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;color:#e2e8f0;font-size:.82rem;width:280px;outline:none;font-family:inherit}
.search-box input:focus{border-color:rgba(234,88,12,.5)}
.search-box input::placeholder{color:rgba(255,255,255,.25)}
.search-box button{padding:8px 14px;border-radius:8px;border:none;background:rgba(234,88,12,.25);color:#fb923c;cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit}
.search-box button:hover{background:rgba(234,88,12,.4)}

.content{flex:1;overflow-y:auto;padding:20px;min-height:0}

/* Podcast grid */
.podcast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.podcast-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
.podcast-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
.podcast-card.active{border-color:rgba(234,88,12,.4);background:rgba(234,88,12,.08)}
.podcast-art{width:60px;height:60px;border-radius:12px;background:linear-gradient(135deg,rgba(234,88,12,.3),rgba(251,146,60,.3));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden}
.podcast-art img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.podcast-info{flex:1;min-width:0}
.podcast-name{font-size:.9rem;font-weight:600;color:#f1f5f9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.podcast-author{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podcast-genre{font-size:.65rem;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);margin-top:5px;display:inline-block}
.fav-btn{flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;font-size:1.3rem;cursor:pointer;transition:all .15s;color:#fbbf24;line-height:1;z-index:2}
.fav-btn:hover{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.4);transform:scale(1.1)}
.fav-btn.faved{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.4)}

/* Episode list (detail view) */
.detail-view{display:none}
.detail-view.open{display:block}
.detail-header{display:flex;gap:20px;margin-bottom:20px;align-items:flex-start}
.detail-art{width:120px;height:120px;border-radius:16px;overflow:hidden;flex-shrink:0;background:rgba(234,88,12,.15);display:flex;align-items:center;justify-content:center;font-size:3rem}
.detail-art img{width:100%;height:100%;object-fit:cover}
.detail-info h2{font-size:1.2rem;font-weight:700;color:#f1f5f9;margin-bottom:6px}
.detail-info .author{font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:8px}
.detail-info .desc{font-size:.8rem;color:rgba(255,255,255,.35);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:.8rem;font-family:inherit;margin-bottom:16px}
.back-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.episode-list{display:flex;flex-direction:column;gap:8px}
.episode-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.episode-item:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
.episode-item.playing{border-color:rgba(234,88,12,.4);background:rgba(234,88,12,.08)}
.ep-play{width:36px;height:36px;border-radius:50%;background:rgba(234,88,12,.25);border:none;color:#fb923c;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ep-play:hover{background:rgba(234,88,12,.4)}
.ep-info{flex:1;min-width:0}
.ep-title{font-size:.85rem;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-meta{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:3px;display:flex;gap:10px}
.ep-desc{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}

/* Player bar */
.player-bar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:rgba(15,15,25,.98);border-top:1px solid rgba(255,255,255,.06);min-height:72px;flex-shrink:0}
.player-bar.hidden{display:none}
.player-art-sm{width:48px;height:48px;border-radius:10px;background:rgba(234,88,12,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden}
.player-art-sm img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.player-info{flex:1;min-width:0}
.player-name{font-size:.9rem;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-detail{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-controls{display:flex;align-items:center;gap:10px}
.ctrl-btn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(234,88,12,.25);color:#fb923c;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ctrl-btn:hover{background:rgba(234,88,12,.4)}
.ctrl-btn.play{width:48px;height:48px;background:rgba(234,88,12,.5);color:#fff;font-size:1.3rem}
.ctrl-btn.play:hover{background:rgba(234,88,12,.7)}
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:200px}
.progress-wrap span{font-size:.7rem;color:rgba(255,255,255,.4);min-width:38px}
.progress-wrap input[type=range]{flex:1;accent-color:#fb923c;height:4px}
.volume-wrap{display:flex;align-items:center;gap:8px;margin-left:8px}
.volume-wrap span{font-size:.8rem;opacity:.5}
.volume-wrap input[type=range]{width:80px;accent-color:#fb923c;height:4px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;opacity:.4;text-align:center;gap:14px}
.empty-state .big{font-size:3.5rem}
.empty-state p{font-size:.9rem;max-width:300px;line-height:1.6}
.loading{text-align:center;padding:40px;opacity:.4;font-size:.9rem}

.genre-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.genre-chip{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .15s}
.genre-chip:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.genre-chip.active{background:rgba(234,88,12,.2);border-color:rgba(234,88,12,.3);color:#fb923c}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🎙️ Podcasts</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')" id="tabBrowse">Entdecken</button>
    <button class="tab" onclick="switchTab('favourites')" id="tabFavs">Favoriten</button>
  </div>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Podcasts suchen..." onkeydown="if(event.key==='Enter')doSearch()" />
    <button onclick="doSearch()">Suchen</button>
  </div>
</div>

<div class="content" id="content">
  <div class="loading" id="loadingMsg">Podcasts werden geladen...</div>
</div>

<div class="player-bar hidden" id="playerBar">
  <div class="player-art-sm" id="playerArt">🎙️</div>
  <div class="player-info">
    <div class="player-name" id="playerName">-</div>
    <div class="player-detail" id="playerDetail">-</div>
  </div>
  <button class="fav-btn" id="playerFavBtn" onclick="togglePlayerFav()" title="Favorit">☆</button>
  <div class="progress-wrap">
    <span id="curTime">0:00</span>
    <input type="range" min="0" max="100" value="0" id="progressBar" oninput="seekTo(this.value)" />
    <span id="durTime">0:00</span>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" onclick="skipTime(-30)" title="-30s">⏪</button>
    <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="skipTime(30)" title="+30s">⏩</button>
  </div>
  <div class="volume-wrap">
    <span>🔊</span>
    <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)" id="volumeSlider" />
  </div>
</div>

<audio id="audioEl"></audio>

<script>
const API='api/podcast';
const ITUNES='https://itunes.apple.com';
const GENRES=['Technology','Comedy','True Crime','News','Business','Health','Science','Education','Society','Sports','Music','Arts','History'];

let favourites=[];
let currentTab='browse';
let currentPodcasts=[];
let selectedPodcast=null;
let episodes=[];
let playingEpisode=null;
let playingPodcast=null;
let isPlaying=false;
const audio=document.getElementById('audioEl');

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function loadFavourites(){
  try{const r=await fetch(API+'?t='+Date.now());if(!r.ok)throw 0;const d=await r.json();favourites=d.favourites||[]}catch{favourites=[]}
}
async function saveFavourites(){
  try{await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({favourites},null,2)})}catch(e){console.error('Save error:',e)}
}

function doSearch(){
  const v=document.getElementById('searchInput').value.trim();
  if(v)searchPodcasts(v);
}

async function searchPodcasts(query,genre){
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading">Podcasts werden gesucht...</div>';
  selectedPodcast=null;
  try{
    let url;
    if(genre){url=ITUNES+'/search?term='+encodeURIComponent(genre)+'&media=podcast&limit=60&country=DE&genreIndex='+encodeURIComponent(genre)}
    else if(query){url=ITUNES+'/search?term='+encodeURIComponent(query)+'&media=podcast&limit=60&country=DE'}
    else{url=ITUNES+'/search?term=top+podcasts&media=podcast&limit=60&country=DE'}
    const r=await fetch(url);
    if(!r.ok)throw new Error('API error');
    const data=await r.json();
    currentPodcasts=data.results||[];
    renderPodcasts(currentPodcasts);
  }catch(e){
    content.innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>Fehler beim Laden. Bitte versuche es erneut.</p></div>';
  }
}

function renderGenreChips(active){
  let h='<div class="genre-chips">';
  GENRES.forEach(g=>{h+='<button class="genre-chip'+(active===g?' active':'')+'" onclick="browseGenre(\''+g+'\')">'+g+'</button>'});
  h+='</div>';
  return h;
}

function browseGenre(g){searchPodcasts(g,g)}

function renderPodcasts(pods){
  const content=document.getElementById('content');
  let h=currentTab==='browse'?renderGenreChips():'';
  if(!pods.length){
    h+='<div class="empty-state"><div class="big">'+(currentTab==='favourites'?'⭐':'🔍')+'</div><p>'+(currentTab==='favourites'?'Noch keine Favoriten. Durchsuche Podcasts und speichere deine Lieblingssendungen.':'Keine Podcasts gefunden. Versuche einen anderen Suchbegriff.')+'</p></div>';
    content.innerHTML=h;return;
  }
  h+='<div class="podcast-grid">';
  pods.forEach((p,i)=>{
    const id=p.collectionId||p.trackId;
    const isFav=favourites.some(f=>(f.collectionId||f.trackId)===id);
    h+='<div class="podcast-card" onclick="showPodcast('+i+')" data-idx="'+i+'">';
    h+='<div class="podcast-art">'+(p.artworkUrl100?'<img src="'+esc(p.artworkUrl100)+'" onerror="this.parentNode.textContent=\'🎙️\'" />':'🎙️')+'</div>';
    h+='<div class="podcast-info"><div class="podcast-name">'+esc(p.collectionName||p.trackName)+'</div>';
    h+='<div class="podcast-author">'+esc(p.artistName)+'</div>';
    if(p.primaryGenreName)h+='<span class="podcast-genre">'+esc(p.primaryGenreName)+'</span>';
    h+='</div>';
    h+='<button class="fav-btn'+(isFav?' faved':'')+'" onclick="event.stopPropagation();toggleFav('+i+')" title="'+(isFav?'Entfernen':'Favorisieren')+'">'+(isFav?'⭐':'☆')+'</button>';
    h+='</div>';
  });
  h+='</div>';
  content.innerHTML=h;
}

async function showPodcast(idx){
  const pods=currentTab==='favourites'?favourites:currentPodcasts;
  const p=pods[idx];if(!p)return;
  selectedPodcast=p;
  const content=document.getElementById('content');
  const id=p.collectionId||p.trackId;
  const isFav=favourites.some(f=>(f.collectionId||f.trackId)===id);

  content.innerHTML='<div class="loading">Episoden werden geladen...</div>';

  let h='<button class="back-btn" onclick="goBack()">← Zurueck</button>';
  h+='<div class="detail-header">';
  h+='<div class="detail-art">'+(p.artworkUrl600||p.artworkUrl100?'<img src="'+esc(p.artworkUrl600||p.artworkUrl100)+'" />':'🎙️')+'</div>';
  h+='<div class="detail-info"><h2>'+esc(p.collectionName||p.trackName)+'</h2>';
  h+='<div class="author">'+esc(p.artistName)+'</div>';
  h+='<button class="fav-btn'+(isFav?' faved':'')+'" onclick="toggleFavDirect()" style="margin-top:8px">'+(isFav?'⭐ Favorisiert':'☆ Favorisieren')+'</button>';
  h+='</div></div>';

  // Fetch episodes via feed
  try{
    if(p.feedUrl){
      const proxyUrl='/api/rss-proxy?url='+encodeURIComponent(p.feedUrl);
      const r=await fetch(proxyUrl);
      const xml=await r.text();
      const parser=new DOMParser();
      const doc=parser.parseFromString(xml,'text/xml');
      const items=doc.querySelectorAll('item');
      episodes=[];
      items.forEach((item,i)=>{
        if(i>=50)return;
        const enc=item.querySelector('enclosure');
        const dur=item.querySelector('itunes\\:duration,duration');
        episodes.push({
          title:item.querySelector('title')?.textContent||'Untitled',
          description:item.querySelector('description')?.textContent||'',
          pubDate:item.querySelector('pubDate')?.textContent||'',
          audioUrl:enc?enc.getAttribute('url'):'',
          duration:dur?dur.textContent:''
        });
      });
    }else{episodes=[];}
  }catch{episodes=[];}

  if(episodes.length){
    h+='<div class="episode-list">';
    episodes.forEach((ep,i)=>{
      const isEpPlaying=playingEpisode&&playingEpisode.audioUrl===ep.audioUrl;
      const date=ep.pubDate?new Date(ep.pubDate).toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'}):'';
      h+='<div class="episode-item'+(isEpPlaying?' playing':'')+'">';
      h+='<button class="ep-play" onclick="playEpisode('+i+')">'+(isEpPlaying&&isPlaying?'⏸':'▶')+'</button>';
      h+='<div class="ep-info" onclick="playEpisode('+i+')">';
      h+='<div class="ep-title">'+esc(ep.title)+'</div>';
      h+='<div class="ep-meta"><span>'+date+'</span>';
      if(ep.duration)h+='<span>'+esc(ep.duration)+'</span>';
      h+='</div>';
      h+='</div></div>';
    });
    h+='</div>';
  }else{
    h+='<div class="empty-state" style="height:20vh"><div class="big">📭</div><p>Keine Episoden gefunden.</p></div>';
  }

  content.innerHTML=h;
}

function goBack(){
  selectedPodcast=null;
  episodes=[];
  if(currentTab==='favourites')renderPodcasts(favourites);
  else renderPodcasts(currentPodcasts);
}

function playEpisode(idx){
  const ep=episodes[idx];if(!ep||!ep.audioUrl)return;
  if(playingEpisode&&playingEpisode.audioUrl===ep.audioUrl&&isPlaying){
    audio.pause();isPlaying=false;
  }else{
    playingEpisode=ep;
    playingPodcast=selectedPodcast;
    audio.src=ep.audioUrl;
    audio.play().catch(()=>{});
    isPlaying=true;
  }
  updatePlayer();
  if(selectedPodcast)showPodcast(currentTab==='favourites'?favourites.findIndex(f=>(f.collectionId||f.trackId)===(selectedPodcast.collectionId||selectedPodcast.trackId)):currentPodcasts.indexOf(selectedPodcast));
}

function togglePlay(){
  if(!playingEpisode)return;
  if(isPlaying){audio.pause();isPlaying=false}
  else{audio.play().catch(()=>{});isPlaying=true}
  updatePlayer();
}

function skipTime(s){audio.currentTime=Math.max(0,Math.min(audio.duration||0,audio.currentTime+s))}
function setVolume(v){audio.volume=v/100}
function seekTo(v){if(audio.duration)audio.currentTime=(v/100)*audio.duration}

function fmtTime(s){
  if(!s||isNaN(s))return'0:00';
  const m=Math.floor(s/60);const sec=Math.floor(s%60);
  return m+':'+String(sec).padStart(2,'0');
}

function updatePlayer(){
  const bar=document.getElementById('playerBar');
  if(!playingEpisode){bar.classList.add('hidden');return}
  bar.classList.remove('hidden');
  document.getElementById('playerName').textContent=playingEpisode.title||'Unbekannt';
  document.getElementById('playerDetail').textContent=playingPodcast?(playingPodcast.collectionName||playingPodcast.trackName||''):'Podcast';
  const art=document.getElementById('playerArt');
  art.innerHTML=playingPodcast&&(playingPodcast.artworkUrl100||playingPodcast.artworkUrl60)?'<img src="'+esc(playingPodcast.artworkUrl100||playingPodcast.artworkUrl60)+'" onerror="this.parentNode.textContent=\'🎙️\'" />':'🎙️';
  document.getElementById('playBtn').textContent=isPlaying?'⏸':'▶';
  // Update fav button in player
  const pfb=document.getElementById('playerFavBtn');
  if(playingPodcast){
    const id=playingPodcast.collectionId||playingPodcast.trackId;
    const isFav=favourites.some(f=>(f.collectionId||f.trackId)===id);
    pfb.textContent=isFav?'⭐':'☆';
    pfb.classList.toggle('faved',isFav);
    pfb.title=isFav?'Aus Favoriten entfernen':'Favorisieren';
  }
}

audio.addEventListener('timeupdate',()=>{
  document.getElementById('curTime').textContent=fmtTime(audio.currentTime);
  document.getElementById('durTime').textContent=fmtTime(audio.duration);
  if(audio.duration)document.getElementById('progressBar').value=(audio.currentTime/audio.duration)*100;
});
audio.addEventListener('ended',()=>{isPlaying=false;updatePlayer()});

async function togglePlayerFav(){
  if(!playingPodcast)return;
  const id=playingPodcast.collectionId||playingPodcast.trackId;
  const fi=favourites.findIndex(f=>(f.collectionId||f.trackId)===id);
  if(fi>=0)favourites.splice(fi,1);else favourites.push({...playingPodcast});
  await saveFavourites();
  updatePlayer();
}

async function toggleFav(idx){
  const pods=currentTab==='favourites'?favourites:currentPodcasts;
  const p=pods[idx];if(!p)return;
  const id=p.collectionId||p.trackId;
  const fi=favourites.findIndex(f=>(f.collectionId||f.trackId)===id);
  if(fi>=0){
    favourites.splice(fi,1);
    if(currentTab==='favourites'){renderPodcasts(favourites);await saveFavourites();return}
  }else{
    favourites.push({...p});
  }
  await saveFavourites();
  renderPodcasts(pods);
}

async function toggleFavDirect(){
  if(!selectedPodcast)return;
  const id=selectedPodcast.collectionId||selectedPodcast.trackId;
  const fi=favourites.findIndex(f=>(f.collectionId||f.trackId)===id);
  if(fi>=0)favourites.splice(fi,1);else favourites.push({...selectedPodcast});
  await saveFavourites();
  const idx=currentTab==='favourites'?favourites.findIndex(f=>(f.collectionId||f.trackId)===id):currentPodcasts.indexOf(selectedPodcast);
  if(idx>=0)showPodcast(idx);
}

function switchTab(tab){
  currentTab=tab;
  selectedPodcast=null;episodes=[];
  document.getElementById('tabBrowse').classList.toggle('active',tab==='browse');
  document.getElementById('tabFavs').classList.toggle('active',tab==='favourites');
  if(tab==='favourites')renderPodcasts(favourites);
  else searchPodcasts();
}

// SSE
function connectSSE(){const es=new EventSource('/sse/podcast');es.onmessage=e=>{if(e.data==='connected')return;try{const d=JSON.parse(e.data);if(d.file==='podcast.json')loadFavourites().then(()=>{if(currentTab==='favourites'&&!selectedPodcast)renderPodcasts(favourites)})}catch{}};es.onerror=()=>{es.close();setTimeout(connectSSE,3000)}}

async function init(){
  await loadFavourites();
  audio.volume=0.8;
  await searchPodcasts('popular');
  connectSSE();
}
init();
</script>
</body>
</html>
