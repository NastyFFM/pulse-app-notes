<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<script src="/sdk.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 13px; }

.header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--bg-card); }
.header-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; flex: 1; }
.search-wrap { display: flex; gap: 6px; flex: 2; }
.search-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); font: 12px system-ui; padding: 5px 10px; border-radius: 6px; outline: none; }
.search-input:focus { border-color: var(--teal); }
.btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; border-radius: 6px; font: 11px system-ui; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.btn.primary { background: var(--teal); color: #000; border-color: var(--teal); font-weight: 600; }
.btn.primary:hover { opacity: 0.85; }
.btn.danger { color: #ef4444; }
.btn.danger:hover { background: rgba(239,68,68,0.1); border-color: #ef4444; }

.main { flex: 1; overflow-y: auto; padding: 20px 16px; }

.status-bar { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; min-height: 16px; }
.status-bar.loading { color: var(--teal); }
.status-bar.error { color: #ef4444; }

.city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

.city-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; position: relative; cursor: pointer; transition: border-color 0.15s; }
.city-card:hover { border-color: rgba(78, 205, 196, 0.3); }
.city-card.selected { border-color: var(--teal); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.city-name { font-size: 15px; font-weight: 600; }
.city-country { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.card-icon { font-size: 36px; line-height: 1; }

.card-mid { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 14px; }
.city-temp { font-size: 44px; font-weight: 700; color: var(--teal); line-height: 1; }
.city-temp-unit { font-size: 18px; color: var(--text-dim); font-weight: 400; margin-bottom: 6px; }
.city-feels { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.city-condition { font-size: 12px; color: var(--text); }

.card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
.stat { text-align: center; }
.stat-val { font-size: 13px; font-weight: 600; color: var(--text); }
.stat-lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

.card-remove { position: absolute; top: 10px; right: 10px; background: none; border: none; color: rgba(255,255,255,0.2); font-size: 14px; cursor: pointer; padding: 2px 5px; border-radius: 4px; opacity: 0; transition: opacity 0.15s; }
.city-card:hover .card-remove { opacity: 1; }
.card-remove:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

.city-updated { font-size: 9px; color: rgba(255,255,255,0.15); margin-top: 10px; text-align: right; }

/* Forecast strip */
.forecast-strip { display: flex; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); overflow-x: auto; }
.fc-day { flex: 0 0 auto; text-align: center; min-width: 42px; }
.fc-day-name { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.fc-day-icon { font-size: 18px; margin: 4px 0; }
.fc-day-hi { font-size: 12px; font-weight: 600; }
.fc-day-lo { font-size: 10px; color: var(--text-dim); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text-dim); gap: 10px; }
.empty-icon { font-size: 48px; opacity: 0.4; }
.empty-hint { font-size: 11px; opacity: 0.5; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Weather</span>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Stadt suchen..." onkeydown="if(event.key==='Enter')searchCity()">
    <button class="btn primary" onclick="searchCity()">+ Hinzufuegen</button>
  </div>
</div>

<div class="main">
  <div class="status-bar" id="status"></div>
  <div id="content"></div>
</div>

<script>
const DATA_URL = '/app/weather/api/weather';
let cities = [];

// WMO weather code → emoji + German description
function wmoInfo(code) {
  if (code === 0) return { icon: '☀️', desc: 'Klar' };
  if (code === 1) return { icon: '🌤️', desc: 'Überwiegend klar' };
  if (code === 2) return { icon: '⛅', desc: 'Teils bewölkt' };
  if (code === 3) return { icon: '☁️', desc: 'Bedeckt' };
  if (code <= 49) return { icon: '🌫️', desc: 'Nebel' };
  if (code <= 57) return { icon: '🌧️', desc: 'Nieselregen' };
  if (code <= 67) return { icon: '🌧️', desc: 'Regen' };
  if (code <= 77) return { icon: '❄️', desc: 'Schnee' };
  if (code <= 82) return { icon: '🌦️', desc: 'Regenschauer' };
  if (code <= 86) return { icon: '🌨️', desc: 'Schneeschauer' };
  if (code <= 99) return { icon: '⛈️', desc: 'Gewitter' };
  return { icon: '🌡️', desc: 'Unbekannt' };
}

function windDir(deg) {
  const dirs = ['N','NO','O','SO','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function dayName(dateStr) {
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return days[new Date(dateStr).getDay()];
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

async function loadData() {
  try {
    const r = await fetch(DATA_URL);
    if (r.ok) {
      const d = await r.json();
      cities = d.cities || [];
    }
  } catch { cities = []; }
  render();
}

async function searchCity() {
  const val = document.getElementById('searchInput').value.trim();
  if (!val) return;
  setStatus('Suche nach ' + val + '...', 'loading');
  try {
    const geo = await fetch(
      'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(val) + '&count=1&language=de'
    ).then(r => r.json());
    if (!geo.results || geo.results.length === 0) {
      setStatus('Stadt nicht gefunden: ' + val, 'error');
      return;
    }
    const result = geo.results[0];
    if (cities.find(c => Math.abs(c.lat - result.latitude) < 0.01 && Math.abs(c.lon - result.longitude) < 0.01)) {
      setStatus(result.name + ' ist bereits hinzugefuegt.', 'error');
      return;
    }
    const city = {
      id: Date.now(),
      city: result.name,
      country: result.country || '',
      admin: result.admin1 || '',
      lat: result.latitude,
      lon: result.longitude,
      updated: null,
      current: null,
      forecast: []
    };
    cities.push(city);
    await saveData();
    await refreshCity(city);
    document.getElementById('searchInput').value = '';
    setStatus('');
  } catch (e) {
    setStatus('Fehler: ' + e.message, 'error');
  }
}

async function refreshCity(city) {
  try {
    setStatus('Lade Wetter für ' + city.city + '...', 'loading');
    const url = 'https://api.open-meteo.com/v1/forecast?' +
      'latitude=' + city.lat + '&longitude=' + city.lon +
      '&current=temperature_2m,apparent_temperature,relative_humidity_2m,' +
      'weather_code,wind_speed_10m,wind_direction_10m' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
      '&timezone=auto&forecast_days=7';
    const d = await fetch(url).then(r => r.json());

    city.current = {
      temp: Math.round(d.current.temperature_2m),
      feels: Math.round(d.current.apparent_temperature),
      humidity: d.current.relative_humidity_2m,
      wmo: d.current.weather_code,
      wind: Math.round(d.current.wind_speed_10m),
      windDir: windDir(d.current.wind_direction_10m)
    };
    city.forecast = d.daily.time.slice(1).map((t, i) => ({
      day: dayName(t),
      wmo: d.daily.weather_code[i + 1],
      hi: Math.round(d.daily.temperature_2m_max[i + 1]),
      lo: Math.round(d.daily.temperature_2m_min[i + 1])
    }));
    city.updated = new Date().toISOString();
    await saveData();
    setStatus('');
    render();

    // emit output
    if (window.PulseOS) {
      PulseOS.emit('cities', { cities: cities.map(c => ({ city: c.city, temp: c.current ? c.current.temp : null, condition: c.current ? wmoInfo(c.current.wmo).desc : null })) });
    }
  } catch (e) {
    setStatus('Wetter-Fehler: ' + e.message, 'error');
    render();
  }
}

async function refreshAll() {
  for (const city of cities) {
    await refreshCity(city);
  }
}

async function removeCity(id) {
  cities = cities.filter(c => c.id !== id);
  await saveData();
  render();
}

async function saveData() {
  try {
    await fetch(DATA_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cities })
    });
  } catch (e) { console.error('Save error:', e); }
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const el = document.getElementById('content');
  if (cities.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🌤️</div><div>Keine Staedte hinzugefuegt</div><div class="empty-hint">Suche nach einer Stadt um das Wetter zu sehen</div></div>';
    return;
  }

  el.innerHTML = '<div class="city-grid">' + cities.map(city => {
    const cur = city.current;
    const info = cur ? wmoInfo(cur.wmo) : { icon: '?', desc: '—' };
    const updStr = city.updated
      ? new Date(city.updated).toLocaleString('de-DE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
      : 'Noch nicht geladen';

    const fcHTML = city.forecast && city.forecast.length
      ? '<div class="forecast-strip">' + city.forecast.map(f => {
          const fi = wmoInfo(f.wmo);
          return '<div class="fc-day">' +
            '<div class="fc-day-name">' + f.day + '</div>' +
            '<div class="fc-day-icon">' + fi.icon + '</div>' +
            '<div class="fc-day-hi">' + f.hi + '°</div>' +
            '<div class="fc-day-lo">' + f.lo + '°</div>' +
          '</div>';
        }).join('') + '</div>'
      : '<div style="font-size:11px;color:var(--text-dim);margin-top:10px">Keine Vorhersage</div>';

    return '<div class="city-card">' +
      '<button class="card-remove" onclick="removeCity(' + city.id + ')">✕</button>' +
      '<div class="card-top">' +
        '<div><div class="city-name">' + esc(city.city) + '</div>' +
        '<div class="city-country">' + esc(city.country) + (city.admin ? ', ' + esc(city.admin) : '') + '</div></div>' +
        '<div class="card-icon">' + info.icon + '</div>' +
      '</div>' +
      (cur
        ? '<div class="card-mid">' +
            '<div class="city-temp">' + cur.temp + '</div>' +
            '<div><div class="city-temp-unit">°C</div></div>' +
          '</div>' +
          '<div class="city-feels">Gefühlt ' + cur.feels + '°C &nbsp;·&nbsp; ' + esc(info.desc) + '</div>' +
          '<div class="card-stats">' +
            '<div class="stat"><div class="stat-val">' + cur.humidity + '%</div><div class="stat-lbl">Feuchte</div></div>' +
            '<div class="stat"><div class="stat-val">' + cur.wind + ' km/h</div><div class="stat-lbl">Wind</div></div>' +
            '<div class="stat"><div class="stat-val">' + cur.windDir + '</div><div class="stat-lbl">Richtung</div></div>' +
          '</div>' +
          fcHTML
        : '<div style="font-size:12px;color:var(--text-dim);margin:16px 0"><button class="btn" onclick="refreshCity(cities.find(c=>c.id==' + city.id + '))">Wetter laden</button></div>'
      ) +
      '<div class="city-updated">Aktualisiert: ' + updStr + '</div>' +
    '</div>';
  }).join('') + '</div>';
}

// PulseOS SDK
if (window.PulseOS) {
  PulseOS.onDataChanged(loadData);
  PulseOS.onInput('data', function(d) {
    if (d && d.city) {
      document.getElementById('searchInput').value = d.city;
      searchCity();
    }
  });
}

loadData();

// Auto-refresh every 15 minutes
setInterval(() => {
  if (cities.length > 0) refreshAll();
}, 15 * 60 * 1000);
</script>
</body>
</html>
