<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0EA5E9 0%,#0369A1 100%);height:100vh;color:#fff;display:flex;overflow:hidden}

.sidebar{width:240px;min-width:240px;background:rgba(0,0,0,.2);backdrop-filter:blur(12px);border-right:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-header h1{font-size:1.1rem;font-weight:700;opacity:.9}
.city-list{flex:1;overflow-y:auto;padding:8px 0}
.city-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .15s;position:relative}
.city-item:hover{background:rgba(255,255,255,.1)}
.city-item.active{background:rgba(255,255,255,.15)}
.city-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;background:#7DD3FC}
.city-item .ci-icon{font-size:1.3rem;flex-shrink:0}
.city-item .ci-info{flex:1;min-width:0}
.city-item .ci-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-item .ci-temp{font-size:.75rem;opacity:.7}
.city-item .ci-delete{opacity:0;background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;padding:2px 4px;transition:opacity .15s}
.city-item:hover .ci-delete{opacity:1}
.city-item .ci-delete:hover{color:#f87171}

.add-city-area{padding:10px 12px;border-top:1px solid rgba(255,255,255,.1)}
.add-city-row{display:flex;gap:6px}
.add-city-row input{flex:1;padding:8px 10px;border-radius:8px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:.85rem;outline:none}
.add-city-row input::placeholder{color:rgba(255,255,255,.45)}
.add-city-row button{padding:8px 12px;border-radius:8px;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:.85rem;cursor:pointer;font-weight:600}
.add-city-row button:hover{background:rgba(255,255,255,.3)}

.main{flex:1;overflow-y:auto;padding:24px}

.card{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);border-radius:20px;padding:28px;margin-bottom:16px;border:1px solid rgba(255,255,255,.2)}

.city-name-big{font-size:2rem;font-weight:700;margin-bottom:4px}
.city-date{font-size:.85rem;opacity:.7;margin-bottom:24px}

.current{display:flex;align-items:center;gap:24px;margin-bottom:24px}
.temp-big{font-size:5rem;font-weight:300;line-height:1}
.weather-icon{font-size:4rem}
.weather-details{flex:1}
.weather-desc{font-size:1.1rem;font-weight:600;margin-bottom:8px;text-transform:capitalize}
.feels-like{font-size:.85rem;opacity:.75}

.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px}
.metric{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:center}
.metric-val{font-size:1.3rem;font-weight:700}
.metric-lbl{font-size:.72rem;opacity:.7;margin-top:4px}

.forecast{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{background:rgba(255,255,255,.1);border-radius:12px;padding:12px 8px;text-align:center}
.day-name{font-size:.72rem;opacity:.7;margin-bottom:6px}
.day-icon{font-size:1.4rem;margin-bottom:6px}
.day-max{font-size:.95rem;font-weight:700}
.day-min{font-size:.78rem;opacity:.65}

.error{background:rgba(239,68,68,.25);border-radius:10px;padding:14px;text-align:center;margin-bottom:16px}
.loading-msg{opacity:.6;text-align:center;padding:40px;font-size:1.1rem}
.no-city{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;opacity:.6;text-align:center;gap:12px}
.no-city .big{font-size:4rem}
.no-city p{font-size:.95rem;max-width:240px;line-height:1.5}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header"><h1>🌤️ Wetter</h1></div>
  <div class="city-list" id="cityList"></div>
  <div class="add-city-area">
    <div class="add-city-row">
      <input id="addCityInput" type="text" placeholder="Stadt hinzufügen..." />
      <button onclick="addCity()">+</button>
    </div>
  </div>
</div>

<div class="main" id="mainArea">
</div>

<script>
var DATA_URL = 'api/weather';
var DAYS_DE = ['So','Mo','Di','Mi','Do','Fr','Sa'];
var MONTHS_DE = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

var WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  77:'🌨️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  85:'🌨️', 86:'❄️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};
var WMO_DESC = {
  0:'Klar', 1:'Überwiegend klar', 2:'Teilweise bewölkt', 3:'Bedeckt',
  45:'Nebel', 48:'Eisnebel',
  51:'Leichter Nieselregen', 53:'Nieselregen', 55:'Starker Nieselregen',
  61:'Leichter Regen', 63:'Regen', 65:'Starker Regen',
  71:'Leichter Schnee', 73:'Schnee', 75:'Starker Schnee',
  77:'Schneekörner',
  80:'Leichte Schauer', 81:'Schauer', 82:'Starke Schauer',
  85:'Leichte Schneeschauer', 86:'Schneeschauer',
  95:'Gewitter', 96:'Gewitter mit Hagel', 99:'Starkes Gewitter mit Hagel'
};

var cities = [];
var activeCityId = null;
var weatherCache = {};

function showEmpty() {
  document.getElementById('mainArea').innerHTML = '<div class="no-city"><div class="big">🌍</div><p>Waehle eine Stadt aus der Liste oder fuege eine neue hinzu.</p></div>';
}

async function loadData() {
  try {
    var r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error();
    var d = await r.json();
    cities = d.cities || [];
  } catch(e) {
    cities = [];
  }
  renderCityList();
}

async function saveData() {
  await fetch(DATA_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cities: cities }, null, 2)
  });
}

async function geocode(city) {
  var url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1&language=de&format=json';
  var res = await fetch(url);
  var data = await res.json();
  if (!data.results || data.results.length === 0) throw new Error('Stadt "' + city + '" nicht gefunden');
  return data.results[0];
}

async function fetchWeather(lat, lon) {
  var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
    '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,precipitation,weather_code' +
    '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
    '&wind_speed_unit=kmh&timezone=auto&forecast_days=7';
  var res = await fetch(url);
  if (!res.ok) throw new Error('Wetter-API nicht erreichbar');
  return res.json();
}

function renderCityList() {
  var list = document.getElementById('cityList');
  list.innerHTML = '';
  if (cities.length === 0) {
    list.innerHTML = '<div style="padding:20px 16px;font-size:.8rem;opacity:.5;text-align:center">Noch keine Staedte.<br>Fuege eine hinzu!</div>';
    return;
  }
  cities.forEach(function(city) {
    var el = document.createElement('div');
    el.className = 'city-item' + (activeCityId === city.id ? ' active' : '');
    var cached = weatherCache[city.id];
    var tempStr = cached ? Math.round(cached.current.temperature_2m) + '°' : '';
    var iconStr = cached ? (WMO_ICONS[cached.current.weather_code] || '🌡️') : '⏳';
    el.innerHTML = '<span class="ci-icon">' + iconStr + '</span><div class="ci-info"><div class="ci-name">' + esc(city.name) + '</div><div class="ci-temp">' + tempStr + '</div></div><button class="ci-delete" onclick="event.stopPropagation();deleteCity(\'' + city.id + '\')" title="Entfernen">✕</button>';
    el.addEventListener('click', function() { selectCity(city.id); });
    list.appendChild(el);
  });
}

async function selectCity(cityId) {
  activeCityId = cityId;
  renderCityList();
  var city = cities.find(function(c) { return c.id === cityId; });
  if (!city) return;

  if (weatherCache[cityId]) {
    renderWeather(weatherCache[cityId], city.name);
  } else {
    document.getElementById('mainArea').innerHTML = '<div class="loading-msg">Wetterdaten fuer ' + esc(city.name) + ' werden geladen...</div>';
    try {
      var data = await fetchWeather(city.latitude, city.longitude);
      weatherCache[cityId] = data;
      renderCityList();
      if (activeCityId === cityId) {
        renderWeather(data, city.name);
      }
    } catch(e) {
      document.getElementById('mainArea').innerHTML = '<div class="error">⚠️ ' + esc(e.message) + '</div>';
    }
  }
}

function renderWeather(data, cityName) {
  var c = data.current;
  var d = data.daily;
  var now = new Date();
  var dateStr = DAYS_DE[now.getDay()] + ', ' + now.getDate() + '. ' + MONTHS_DE[now.getMonth()] + ' ' + now.getFullYear();

  var html = '<div class="card">';
  html += '<div class="city-name-big">' + esc(cityName) + '</div>';
  html += '<div class="city-date">' + dateStr + '</div>';
  html += '<div class="current">';
  html += '<div class="temp-big">' + Math.round(c.temperature_2m) + '°</div>';
  html += '<div class="weather-icon">' + (WMO_ICONS[c.weather_code] || '🌡️') + '</div>';
  html += '<div class="weather-details">';
  html += '<div class="weather-desc">' + (WMO_DESC[c.weather_code] || 'Unbekannt') + '</div>';
  html += '<div class="feels-like">Gefuehlt ' + Math.round(c.apparent_temperature) + '°</div>';
  html += '</div></div>';
  html += '<div class="metrics">';
  html += '<div class="metric"><div class="metric-val">' + Math.round(c.wind_speed_10m) + '</div><div class="metric-lbl">Wind km/h</div></div>';
  html += '<div class="metric"><div class="metric-val">' + c.relative_humidity_2m + '</div><div class="metric-lbl">Luftfeuchte %</div></div>';
  html += '<div class="metric"><div class="metric-val">' + c.precipitation.toFixed(1) + '</div><div class="metric-lbl">Niederschlag mm</div></div>';
  html += '</div></div>';

  html += '<div class="card"><div class="forecast">';
  for (var i = 0; i < 7; i++) {
    var date = new Date(d.time[i]);
    html += '<div class="day">';
    html += '<div class="day-name">' + (i === 0 ? 'Heute' : DAYS_DE[date.getDay()]) + '</div>';
    html += '<div class="day-icon">' + (WMO_ICONS[d.weather_code[i]] || '🌡️') + '</div>';
    html += '<div class="day-max">' + Math.round(d.temperature_2m_max[i]) + '°</div>';
    html += '<div class="day-min">' + Math.round(d.temperature_2m_min[i]) + '°</div>';
    html += '</div>';
  }
  html += '</div></div>';

  document.getElementById('mainArea').innerHTML = html;
}

async function addCity() {
  var input = document.getElementById('addCityInput');
  var val = input.value.trim();
  if (!val) return;
  input.disabled = true;

  try {
    var geo = await geocode(val);
    var name = geo.name + (geo.country ? ', ' + geo.country : '');
    var id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

    var existing = cities.find(function(c) { return c.id === id; });
    if (existing) {
      selectCity(existing.id);
      input.value = '';
      input.disabled = false;
      return;
    }

    var city = { id: id, name: name, latitude: geo.latitude, longitude: geo.longitude };
    cities.push(city);
    await saveData();
    input.value = '';
    renderCityList();
    selectCity(city.id);
  } catch(e) {
    alert(e.message);
  }
  input.disabled = false;
}

async function deleteCity(id) {
  cities = cities.filter(function(c) { return c.id !== id; });
  delete weatherCache[id];
  await saveData();
  if (activeCityId === id) {
    activeCityId = null;
    showEmpty();
  }
  renderCityList();
}

document.getElementById('addCityInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addCity();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function init() {
  await loadData();
  for (var i = 0; i < cities.length; i++) {
    (function(city) {
      fetchWeather(city.latitude, city.longitude).then(function(data) {
        weatherCache[city.id] = data;
        renderCityList();
        if (activeCityId === city.id) renderWeather(data, city.name);
      }).catch(function() {});
    })(cities[i]);
  }
  if (cities.length > 0) {
    selectCity(cities[0].id);
  } else {
    showEmpty();
  }
  setInterval(function() {
    for (var i = 0; i < cities.length; i++) {
      (function(city) {
        fetchWeather(city.latitude, city.longitude).then(function(data) {
          weatherCache[city.id] = data;
          renderCityList();
          if (activeCityId === city.id) renderWeather(data, city.name);
        }).catch(function() {});
      })(cities[i]);
    }
  }, 5 * 60 * 1000);
  setInterval(loadData, 5000);
}

init();
</script>
</body>
</html>
