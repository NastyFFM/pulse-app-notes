<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d14;--surface:#111118;--text:rgba(255,255,255,.85);--dim:rgba(255,255,255,.4);--muted:rgba(255,255,255,.15);--teal:#4ecdc4;--amber:#f5a623;--lila:#a855f7;--red:#ef4444;--green:#22c55e;--border:rgba(255,255,255,.06);--font:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.header-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);padding:5px 12px;border-radius:4px;font:11px var(--font);cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.btn.primary{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.btn.primary:hover{opacity:.9}

.main{flex:1;overflow-y:auto;padding:24px}

.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;max-width:800px;margin:0 auto}

.city-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;position:relative;transition:all .15s}
.city-card:hover{border-color:rgba(78,205,196,.15)}
.city-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.city-condition{font-size:11px;color:var(--dim);margin-bottom:16px}
.city-temp{font-size:48px;font-weight:700;color:var(--teal);line-height:1}
.city-temp span{font-size:20px;color:var(--dim);font-weight:400}
.city-remove{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);font:11px var(--font);cursor:pointer;padding:2px 6px;border-radius:3px}
.city-remove:hover{color:var(--red);background:rgba(239,68,68,.1)}
.city-updated{font-size:9px;color:var(--muted);margin-top:12px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:12px;gap:12px}

/* Add form */
.add-form{display:none;max-width:400px;margin:0 auto 24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.add-form.active{display:block}
.add-form h3{font-size:13px;font-weight:600;color:var(--teal);margin-bottom:14px}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-row input,.form-row select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font:12px var(--font);padding:6px 8px;border-radius:4px;outline:none}
.form-row input:focus{border-color:var(--teal)}
.form-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Weather</span>
  <button class="btn" onclick="toggleForm()">+ Stadt hinzufuegen</button>
</div>

<div class="main">
  <div class="add-form" id="addForm">
    <h3>Stadt hinzufuegen</h3>
    <div class="form-row">
      <input type="text" id="inputCity" placeholder="Stadt...">
    </div>
    <div class="form-row">
      <input type="number" id="inputTemp" placeholder="Temperatur (C)">
      <select id="inputCondition">
        <option value="Sonnig">Sonnig</option>
        <option value="Bewoelkt">Bewoelkt</option>
        <option value="Regen">Regen</option>
        <option value="Schnee">Schnee</option>
        <option value="Nebel">Nebel</option>
        <option value="Gewitter">Gewitter</option>
        <option value="Windig">Windig</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="toggleForm()">Abbrechen</button>
      <button class="btn primary" onclick="addCity()">Hinzufuegen</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
const DATA_URL = '/app/weather/api/weather';
let cities = [];

async function loadData() {
  try {
    const r = await fetch(DATA_URL);
    if (r.ok) { const d = await r.json(); cities = d.cities || []; }
  } catch { cities = []; }
  render();
}

function render() {
  const el = document.getElementById('content');
  if (cities.length === 0) {
    el.innerHTML = '<div class="empty-state"><div>Keine Staedte hinzugefuegt</div><div style="font-size:10px">Klicke "+ Stadt hinzufuegen" um zu beginnen</div></div>';
    return;
  }
  el.innerHTML = '<div class="city-grid">' + cities.map((c, i) => {
    const condIcon = getConditionSymbol(c.condition);
    const updated = c.updated ? new Date(c.updated).toLocaleString('de-DE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    return '<div class="city-card">' +
      '<button class="city-remove" onclick="removeCity(' + i + ')">x</button>' +
      '<div class="city-name">' + esc(c.city) + '</div>' +
      '<div class="city-condition">' + condIcon + ' ' + esc(c.condition) + '</div>' +
      '<div class="city-temp">' + esc(String(c.temp)) + '<span>&#176;C</span></div>' +
      '<div class="city-updated">Aktualisiert: ' + updated + '</div>' +
    '</div>';
  }).join('') + '</div>';
}

function getConditionSymbol(cond) {
  const map = { 'Sonnig':'*', 'Bewoelkt':'~', 'Regen':':', 'Schnee':'.', 'Nebel':'=', 'Gewitter':'!', 'Windig':'>' };
  return map[cond] || '-';
}

function toggleForm() {
  document.getElementById('addForm').classList.toggle('active');
  setTimeout(() => document.getElementById('inputCity').focus(), 50);
}

function addCity() {
  const city = document.getElementById('inputCity').value.trim();
  const temp = parseInt(document.getElementById('inputTemp').value);
  const condition = document.getElementById('inputCondition').value;
  if (!city || isNaN(temp)) return;
  cities.push({ city, temp, condition, updated: new Date().toISOString() });
  saveData();
  render();
  document.getElementById('addForm').classList.remove('active');
  document.getElementById('inputCity').value = '';
  document.getElementById('inputTemp').value = '';
}

function removeCity(index) {
  cities.splice(index, 1);
  saveData();
  render();
}

async function saveData() {
  try {
    await fetch(DATA_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cities }) });
  } catch (e) { console.error('Save error:', e); }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadData();
</script>
</body>
</html>
