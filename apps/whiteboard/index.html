<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiteboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e2e8f0;font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.toolbar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.08);z-index:20;flex-shrink:0;flex-wrap:wrap}
.toolbar .title{font-size:.9rem;font-weight:600;margin-right:8px;display:flex;align-items:center;gap:6px}
.toolbar .sep{width:1px;height:20px;background:rgba(255,255,255,.12);margin:0 4px}
.tool-btn{padding:5px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.7);font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.tool-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.tool-btn.active{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);color:#60a5fa}
.color-pick{display:flex;gap:3px;margin:0 4px}
.cpick{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:.1s}
.cpick:hover{transform:scale(1.15)}
.cpick.active{border-color:#fff}
.spacer{flex:1}
.home-link{color:rgba(255,255,255,.4);text-decoration:none;font-size:.78rem}
.home-link:hover{color:#fff}
.modify-btn{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:.72rem}

.canvas-area{flex:1;position:relative;overflow:hidden;cursor:default}
.canvas-area.mode-select{cursor:default}
.canvas-area.mode-draw{cursor:crosshair}
.canvas-area.mode-pan{cursor:grab}
.canvas-area.mode-pan.panning{cursor:grabbing}
.canvas-area.mode-sticky{cursor:cell}
.canvas-area.mode-rect{cursor:crosshair}
.canvas-area.mode-circle{cursor:crosshair}
.canvas-area.mode-line{cursor:crosshair}

.board{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0}

/* Grid background */
.canvas-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}

canvas#drawCanvas{position:absolute;top:0;left:0;z-index:1;pointer-events:none}
.canvas-area.mode-draw canvas#drawCanvas{pointer-events:all}

.sticky{position:absolute;border-radius:4px;padding:10px;font-size:.82rem;color:#1a1a1a;cursor:grab;user-select:none;box-shadow:2px 3px 10px rgba(0,0,0,.3);z-index:5;display:flex;flex-direction:column;overflow:hidden;line-height:1.4;font-weight:500;min-width:100px;min-height:80px}
.sticky:hover{box-shadow:2px 3px 16px rgba(0,0,0,.4);z-index:6}
.sticky.dragging{cursor:grabbing;opacity:.85;z-index:10}
.sticky .del{position:absolute;top:2px;right:4px;font-size:.65rem;cursor:pointer;opacity:0;color:rgba(0,0,0,.4);padding:2px}
.sticky:hover .del{opacity:1}
.sticky .del:hover{color:#dc2626}
.sticky textarea{background:transparent;border:none;color:#1a1a1a;font-size:.82rem;font-family:inherit;resize:none;outline:none;flex:1;width:100%;line-height:1.4;font-weight:500}

.prim{position:absolute;z-index:4;cursor:grab;user-select:none}
.prim:hover{z-index:6}
.prim.dragging{cursor:grabbing;opacity:.85;z-index:10}
.prim .del{position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#fff;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;z-index:12;border:none;line-height:1}
.prim:hover .del{opacity:1}
.prim .prim-resize{position:absolute;bottom:-5px;right:-5px;width:12px;height:12px;cursor:nwse-resize;z-index:11;opacity:0;background:rgba(59,130,246,.6);border:1px solid #3b82f6;border-radius:2px}
.prim:hover .prim-resize{opacity:1}

/* Shape preview while drawing */
.shape-preview{position:absolute;z-index:15;pointer-events:none;border:2px dashed rgba(59,130,246,.6)}

.resize-grip{position:absolute;bottom:-4px;right:-4px;width:10px;height:10px;cursor:nwse-resize;z-index:11;opacity:0}
.sticky:hover .resize-grip{opacity:1}
.resize-grip::after{content:'';position:absolute;bottom:2px;right:2px;width:6px;height:6px;border-right:2px solid rgba(0,0,0,.3);border-bottom:2px solid rgba(0,0,0,.3)}

.zoom-info{position:absolute;bottom:10px;right:14px;font-size:.7rem;color:rgba(255,255,255,.3);z-index:20;pointer-events:none}

/* Shape dropdown */
.shape-dropdown{position:relative;display:inline-flex}
.shape-menu{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:rgba(20,20,40,.95);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:4px;z-index:30;min-width:120px;backdrop-filter:blur(10px)}
.shape-menu.open{display:block}
.shape-menu-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:5px;cursor:pointer;font-size:.78rem;color:rgba(255,255,255,.7);white-space:nowrap}
.shape-menu-item:hover{background:rgba(255,255,255,.12);color:#fff}
</style>
</head>
<body>
<div class="toolbar">
  <span class="title">📋 Whiteboard</span>
  <div class="sep"></div>
  <button class="tool-btn active" data-mode="select" onclick="setMode('select')">↖ Select</button>
  <button class="tool-btn" data-mode="sticky" onclick="setMode('sticky')">📝 Sticky</button>
  <div class="shape-dropdown">
    <button class="tool-btn" id="shapeBtn" data-mode="shape" onclick="toggleShapeMenu(event)">▭ Rect ▾</button>
    <div class="shape-menu" id="shapeMenu">
      <div class="shape-menu-item" onclick="selectShape('rect')">▭ Rechteck</div>
      <div class="shape-menu-item" onclick="selectShape('circle')">⚪ Kreis</div>
      <div class="shape-menu-item" onclick="selectShape('line')">╱ Linie</div>
    </div>
  </div>
  <button class="tool-btn" data-mode="draw" onclick="setMode('draw')">✏️ Draw</button>
  <button class="tool-btn" data-mode="pan" onclick="setMode('pan')">✋ Pan</button>
  <div class="sep"></div>
  <div class="color-pick" id="colorPick"></div>
  <div class="sep"></div>
  <button class="tool-btn" onclick="clearDrawing()">🗑 Clear Drawing</button>
  <span class="spacer"></span>
</div>

<div class="canvas-area mode-select" id="canvasArea">
  <div class="board" id="board"></div>
  <canvas id="drawCanvas"></canvas>
  <div class="zoom-info" id="zoomInfo">100%</div>
</div>

<script>
const STICKY_COLORS = ['#FEF08A','#BBF7D0','#BFDBFE','#FBCFE8','#FED7AA','#E9D5FF','#CFFAFE','#FCA5A5'];
const SHAPE_COLORS = ['#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#fff','#64748B'];
let data = {stickies:[],shapes:[],drawings:[],nextId:1};
let mode = 'select';
let shapeType = 'rect';
let selectedColor = STICKY_COLORS[0];
let drawColor = '#fff';
let panX=0, panY=0, zoom=1;
let isPanning=false, panStart={x:0,y:0};
let dragSticky=null, dragOff={x:0,y:0};
let dragPrim=null, dragPrimOff={x:0,y:0};
let resizingSticky=null, resizeStart={x:0,y:0,w:0,h:0};
let resizingPrim=null, resizePrimStart={x:0,y:0,w:0,h:0};
let isDrawing=false;
let isShapeDrawing=false, shapeStart={x:0,y:0}, shapePreview=null;

// Color picker
const cp = document.getElementById('colorPick');
STICKY_COLORS.forEach((c,i) => {
  const d = document.createElement('div');
  d.className = 'cpick'+(i===0?' active':'');
  d.style.background = c;
  d.onclick = () => {
    document.querySelectorAll('.cpick').forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
    selectedColor = c;
  };
  cp.appendChild(d);
});

// Shape menu
function toggleShapeMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('shapeMenu');
  menu.classList.toggle('open');
}

function selectShape(type) {
  shapeType = type;
  document.getElementById('shapeMenu').classList.remove('open');
  const labels = {rect:'▭ Rect', circle:'⚪ Circle', line:'╱ Line'};
  document.getElementById('shapeBtn').textContent = (labels[type]||'▭ Rect') + ' ▾';
  setMode(type);
}

document.addEventListener('click', () => {
  document.getElementById('shapeMenu').classList.remove('open');
});

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tool-btn[data-mode]').forEach(b => {
    const isShape = ['rect','circle','line'].includes(m);
    if (b.dataset.mode === 'shape') {
      b.classList.toggle('active', isShape);
    } else {
      b.classList.toggle('active', b.dataset.mode===m);
    }
  });
  const ca = document.getElementById('canvasArea');
  ca.className = 'canvas-area mode-'+m;
}

async function loadData() {
  try {
    const r = await fetch('/app/whiteboard/api/board');
    data = await r.json();
    if (!data.shapes) data.shapes = [];
    renderAll();
  } catch(e) { console.error(e); }
}

function renderAll() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  data.shapes.forEach(s => renderShape(s, board));
  data.stickies.forEach(s => renderStickyEl(s, board));
}

function renderStickyEl(s, board) {
  const el = document.createElement('div');
  el.className = 'sticky';
  el.id = 'sticky-'+s.id;
  el.style.left = s.x+'px';
  el.style.top = s.y+'px';
  el.style.width = (s.w||180)+'px';
  el.style.height = (s.h||120)+'px';
  el.style.background = s.color;

  const del = document.createElement('span');
  del.className = 'del';
  del.textContent = '\u2715';
  del.onclick = (e) => { e.stopPropagation(); deleteSticky(s.id); };

  const ta = document.createElement('textarea');
  ta.value = s.text || '';
  ta.onblur = () => { s.text = ta.value; save(); };

  const grip = document.createElement('div');
  grip.className = 'resize-grip';
  grip.onmousedown = (e) => {
    e.stopPropagation();
    resizingSticky = s;
    resizeStart = {x:e.clientX, y:e.clientY, w:s.w||180, h:s.h||120};
  };

  el.appendChild(del);
  el.appendChild(ta);
  el.appendChild(grip);

  el.onmousedown = (e) => {
    if (mode !== 'select' && mode !== 'sticky') return;
    if (e.target === ta || e.target === del || e.target === grip) return;
    e.preventDefault();
    dragSticky = s;
    dragOff.x = e.clientX - s.x;
    dragOff.y = e.clientY - s.y;
    el.classList.add('dragging');
  };

  board.appendChild(el);
}

function renderShape(s, board) {
  const el = document.createElement('div');
  el.className = 'prim';
  el.id = 'prim-'+s.id;
  el.style.left = s.x+'px';
  el.style.top = s.y+'px';
  el.style.width = (s.w||100)+'px';
  el.style.height = (s.h||100)+'px';

  if (s.type === 'rect') {
    el.style.background = s.fill || 'transparent';
    el.style.border = '2px solid '+(s.stroke || '#3B82F6');
    el.style.borderRadius = '4px';
  } else if (s.type === 'circle') {
    el.style.background = s.fill || 'transparent';
    el.style.border = '2px solid '+(s.stroke || '#3B82F6');
    el.style.borderRadius = '50%';
  } else if (s.type === 'line') {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','100%');
    svg.setAttribute('height','100%');
    svg.style.position = 'absolute';
    svg.style.top = '0';
    svg.style.left = '0';
    svg.style.overflow = 'visible';
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','0');
    line.setAttribute('y1','0');
    line.setAttribute('x2', s.w||100);
    line.setAttribute('y2', s.h||100);
    line.setAttribute('stroke', s.stroke || '#3B82F6');
    line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
    el.appendChild(svg);
    el.style.background = 'transparent';
  }

  const del = document.createElement('button');
  del.className = 'del';
  del.textContent = '\u2715';
  del.onclick = (e) => { e.stopPropagation(); deleteShape(s.id); };

  const grip = document.createElement('div');
  grip.className = 'prim-resize';
  grip.onmousedown = (e) => {
    e.stopPropagation();
    resizingPrim = s;
    resizePrimStart = {x:e.clientX, y:e.clientY, w:s.w||100, h:s.h||100};
  };

  el.appendChild(del);
  el.appendChild(grip);

  el.onmousedown = (e) => {
    if (mode !== 'select') return;
    if (e.target === del || e.target === grip) return;
    e.preventDefault();
    dragPrim = s;
    dragPrimOff.x = e.clientX - s.x;
    dragPrimOff.y = e.clientY - s.y;
    el.classList.add('dragging');
  };

  board.appendChild(el);
}

function addSticky(x, y) {
  const id = 's' + data.nextId++;
  data.stickies.push({id, text:'', x:x-90, y:y-60, color:selectedColor, w:180, h:120});
  renderAll();
  save();
  setTimeout(() => {
    const el = document.getElementById('sticky-'+id);
    if (el) el.querySelector('textarea').focus();
  }, 50);
}

function deleteSticky(id) {
  data.stickies = data.stickies.filter(s=>s.id!==id);
  renderAll();
  save();
}

function addShape(type, x, y, w, h) {
  const id = 'p' + data.nextId++;
  const idx = STICKY_COLORS.indexOf(selectedColor);
  const stroke = idx >= 0 && idx < SHAPE_COLORS.length ? SHAPE_COLORS[idx] : selectedColor;
  data.shapes.push({id, type, x, y, w:Math.abs(w), h:Math.abs(h), stroke, fill:'transparent'});
  renderAll();
  save();
}

function deleteShape(id) {
  data.shapes = data.shapes.filter(s=>s.id!==id);
  renderAll();
  save();
}

// Canvas area events
const canvasArea = document.getElementById('canvasArea');

canvasArea.onmousedown = (e) => {
  if (e.target.closest('.sticky') || e.target.closest('.prim')) return;
  if (mode === 'pan') {
    isPanning = true;
    panStart = {x:e.clientX-panX, y:e.clientY-panY};
    canvasArea.classList.add('panning');
  }
  if (mode === 'sticky') {
    const rect = canvasArea.getBoundingClientRect();
    addSticky(e.clientX - rect.left, e.clientY - rect.top);
    setMode('select');
  }
  if (mode === 'rect' || mode === 'circle' || mode === 'line') {
    const rect = canvasArea.getBoundingClientRect();
    isShapeDrawing = true;
    shapeStart = {x:e.clientX - rect.left, y:e.clientY - rect.top};
    shapePreview = document.createElement('div');
    shapePreview.className = 'shape-preview';
    shapePreview.style.left = shapeStart.x+'px';
    shapePreview.style.top = shapeStart.y+'px';
    shapePreview.style.width = '0px';
    shapePreview.style.height = '0px';
    if (mode === 'circle') shapePreview.style.borderRadius = '50%';
    document.getElementById('board').appendChild(shapePreview);
  }
};

document.onmousemove = (e) => {
  if (dragSticky) {
    dragSticky.x = e.clientX - dragOff.x;
    dragSticky.y = e.clientY - dragOff.y;
    const el = document.getElementById('sticky-'+dragSticky.id);
    if (el) { el.style.left = dragSticky.x+'px'; el.style.top = dragSticky.y+'px'; }
  }
  if (dragPrim) {
    dragPrim.x = e.clientX - dragPrimOff.x;
    dragPrim.y = e.clientY - dragPrimOff.y;
    const el = document.getElementById('prim-'+dragPrim.id);
    if (el) { el.style.left = dragPrim.x+'px'; el.style.top = dragPrim.y+'px'; }
  }
  if (resizingSticky) {
    const dx = e.clientX - resizeStart.x;
    const dy = e.clientY - resizeStart.y;
    resizingSticky.w = Math.max(100, resizeStart.w + dx);
    resizingSticky.h = Math.max(80, resizeStart.h + dy);
    const el = document.getElementById('sticky-'+resizingSticky.id);
    if (el) { el.style.width = resizingSticky.w+'px'; el.style.height = resizingSticky.h+'px'; }
  }
  if (resizingPrim) {
    const dx = e.clientX - resizePrimStart.x;
    const dy = e.clientY - resizePrimStart.y;
    resizingPrim.w = Math.max(20, resizePrimStart.w + dx);
    resizingPrim.h = Math.max(20, resizePrimStart.h + dy);
    const el = document.getElementById('prim-'+resizingPrim.id);
    if (el) {
      el.style.width = resizingPrim.w+'px';
      el.style.height = resizingPrim.h+'px';
      if (resizingPrim.type === 'line') {
        const line = el.querySelector('line');
        if (line) { line.setAttribute('x2', resizingPrim.w); line.setAttribute('y2', resizingPrim.h); }
      }
    }
  }
  if (isPanning) {
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    document.getElementById('board').style.transform = `translate(${panX}px,${panY}px)`;
  }
  if (isShapeDrawing && shapePreview) {
    const rect = canvasArea.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const x = Math.min(shapeStart.x, cx);
    const y = Math.min(shapeStart.y, cy);
    const w = Math.abs(cx - shapeStart.x);
    const h = Math.abs(cy - shapeStart.y);
    shapePreview.style.left = x+'px';
    shapePreview.style.top = y+'px';
    shapePreview.style.width = w+'px';
    shapePreview.style.height = h+'px';
  }
};

document.onmouseup = (e) => {
  if (dragSticky) {
    const el = document.getElementById('sticky-'+dragSticky.id);
    if (el) el.classList.remove('dragging');
    dragSticky = null;
    save();
  }
  if (dragPrim) {
    const el = document.getElementById('prim-'+dragPrim.id);
    if (el) el.classList.remove('dragging');
    dragPrim = null;
    save();
  }
  if (resizingSticky) { resizingSticky = null; save(); }
  if (resizingPrim) { resizingPrim = null; save(); }
  if (isPanning) { isPanning = false; canvasArea.classList.remove('panning'); }
  if (isShapeDrawing) {
    isShapeDrawing = false;
    if (shapePreview) { shapePreview.remove(); shapePreview = null; }
    const rect = canvasArea.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const x = Math.min(shapeStart.x, cx);
    const y = Math.min(shapeStart.y, cy);
    const w = Math.abs(cx - shapeStart.x);
    const h = Math.abs(cy - shapeStart.y);
    if (w > 10 || h > 10) {
      addShape(mode, x, y, w, h);
    }
    setMode('select');
  }
};

// Drawing canvas
const drawCanvas = document.getElementById('drawCanvas');
const ctx = drawCanvas.getContext('2d');

function resizeCanvas() {
  const rect = canvasArea.getBoundingClientRect();
  drawCanvas.width = rect.width;
  drawCanvas.height = rect.height;
  redrawAll();
}

function redrawAll() {
  ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  data.drawings.forEach(d => {
    if (d.points.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = d.color || '#fff';
    ctx.lineWidth = d.width || 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.moveTo(d.points[0].x, d.points[0].y);
    for (let i=1; i<d.points.length; i++) ctx.lineTo(d.points[i].x, d.points[i].y);
    ctx.stroke();
  });
}

let currentStroke = null;
drawCanvas.onmousedown = (e) => {
  if (mode !== 'draw') return;
  isDrawing = true;
  const rect = drawCanvas.getBoundingClientRect();
  currentStroke = {color:drawColor, width:2, points:[{x:e.clientX-rect.left, y:e.clientY-rect.top}]};
};

drawCanvas.onmousemove = (e) => {
  if (!isDrawing || !currentStroke) return;
  const rect = drawCanvas.getBoundingClientRect();
  const pt = {x:e.clientX-rect.left, y:e.clientY-rect.top};
  currentStroke.points.push(pt);
  const pts = currentStroke.points;
  if (pts.length >= 2) {
    ctx.beginPath();
    ctx.strokeStyle = currentStroke.color;
    ctx.lineWidth = currentStroke.width;
    ctx.lineCap = 'round';
    ctx.moveTo(pts[pts.length-2].x, pts[pts.length-2].y);
    ctx.lineTo(pt.x, pt.y);
    ctx.stroke();
  }
};

drawCanvas.onmouseup = () => {
  if (currentStroke && currentStroke.points.length > 1) {
    data.drawings.push(currentStroke);
    save();
  }
  currentStroke = null;
  isDrawing = false;
};

function clearDrawing() {
  data.drawings = [];
  redrawAll();
  save();
}

async function save() {
  await fetch('/app/whiteboard/api/board', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
}

// SSE
const evtSrc = new EventSource('/sse/whiteboard');
evtSrc.onmessage = e => {
  try {
    const d = JSON.parse(e.data);
    if (d.type==='change' && d.file==='board.json') loadData();
  } catch{}
};

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
loadData();
</script>
</body>
</html>
