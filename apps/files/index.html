<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Files</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--surface:var(--bg-surface, #111118);--dim:var(--text-dim, rgba(255,255,255,.4));--muted:rgba(255,255,255,.15);--lila:#a855f7;--red:#ef4444;--green:#22c55e;--font:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);height:100vh;display:flex;overflow:hidden}

.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.app-count{font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);padding:2px 6px;border-radius:3px}
.folder-list{flex:1;overflow-y:auto;padding:4px 0}
.folder-item{padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .1s;display:flex;align-items:center;gap:8px}
.folder-item:hover{background:rgba(255,255,255,.03)}
.folder-item.active{background:rgba(78,205,196,.05);border-left-color:var(--teal)}
.folder-icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bg);flex-shrink:0}
.folder-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-desc{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.detail{width:320px;flex-shrink:0;overflow-y:auto;padding:24px 20px;border-right:1px solid var(--border)}
.detail-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.detail-header{margin-bottom:20px}
.detail-name{font-size:18px;font-weight:600;margin-bottom:4px}
.detail-desc{font-size:12px;color:var(--dim)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--dim)}
.info-value{color:var(--text);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.file-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s;border-radius:3px;padding-left:4px}
.file-item:last-child{border-bottom:none}
.file-item:hover{background:rgba(255,255,255,.04)}
.file-item.active{background:rgba(78,205,196,.08)}
.file-type{font-size:9px;color:var(--amber);background:rgba(245,166,35,.1);padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0}
.file-name{color:var(--text)}

.preview{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.preview-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.preview-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.preview-filename{font-size:11px;color:var(--teal)}
.preview-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.preview-content{flex:1;overflow:auto;padding:16px}
.preview-content pre{font:12px/1.6 var(--font);color:var(--text);white-space:pre-wrap;word-break:break-all}
.preview-loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Files</span>
    <span class="app-count" id="appCount">--</span>
  </div>
  <div class="folder-list" id="folderList"></div>
</div>

<div class="detail" id="detail">
  <div class="detail-empty">Waehle eine App um Details zu sehen</div>
</div>

<div class="preview" id="preview">
  <div class="preview-header">
    <span class="preview-title">Preview</span>
    <span class="preview-filename" id="previewFilename"></span>
  </div>
  <div class="preview-empty" id="previewEmpty">Datei anklicken um Inhalt zu sehen</div>
  <div class="preview-content" id="previewContent" style="display:none"><pre id="previewPre"></pre></div>
</div>

<script>
let apps = [];
let registry = {};
let selectedApp = null;
let selectedFile = null;

async function init() {
  try {
    const r = await fetch('/api/app-registry');
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data)) {
        data.forEach(a => { registry[a.id] = a; });
        apps = data;
      } else if (data.apps) {
        data.apps.forEach(a => { registry[a.id] = a; });
        apps = data.apps;
      } else {
        Object.entries(data).forEach(([id, info]) => {
          registry[id] = { id, ...info };
          apps.push({ id, ...info });
        });
      }
    }
  } catch {}

  // fallback: try /api/apps
  if (apps.length === 0) {
    try {
      const r2 = await fetch('/api/apps');
      if (r2.ok) {
        const list = await r2.json();
        apps = (Array.isArray(list) ? list : []).map(id => ({ id, name: id }));
      }
    } catch {}
  }

  apps.sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));
  document.getElementById('appCount').textContent = apps.length + ' Apps';
  renderList();
}

function renderList() {
  const list = document.getElementById('folderList');
  list.innerHTML = apps.map(a => {
    const color = a.color || '#333';
    const icon = a.icon || a.id.charAt(0).toUpperCase();
    return '<div class="folder-item' + (selectedApp === a.id ? ' active' : '') + '" onclick="selectApp(\'' + esc(a.id) + '\')">' +
      '<div class="folder-icon" style="background:' + color + '">' + esc(icon) + '</div>' +
      '<div><div class="folder-name">' + esc(a.name || a.id) + '</div>' +
      (a.description ? '<div class="folder-desc">' + esc(a.description) + '</div>' : '') +
      '</div></div>';
  }).join('');
}

async function selectApp(id) {
  selectedApp = id;
  renderList();
  const app = apps.find(a => a.id === id) || { id };
  const detail = document.getElementById('detail');

  let html = '<div class="detail-header">' +
    '<div class="detail-name">' + esc(app.name || app.id) + '</div>' +
    '<div class="detail-desc">' + esc(app.description || '') + '</div>' +
    '</div>';

  // Manifest card
  html += '<div class="card"><div class="card-title">Manifest</div>';
  html += '<div class="info-row"><span class="info-label">ID</span><span class="info-value">' + esc(app.id) + '</span></div>';
  html += '<div class="info-row"><span class="info-label">Name</span><span class="info-value">' + esc(app.name || '--') + '</span></div>';
  html += '<div class="info-row"><span class="info-label">Icon</span><span class="info-value">' + esc(app.icon || '--') + '</span></div>';
  html += '<div class="info-row"><span class="info-label">Farbe</span><span class="info-value">' + esc(app.color || '--') + '</span></div>';
  html += '<div class="info-row"><span class="info-label">Pfad</span><span class="info-value">apps/' + esc(app.id) + '/</span></div>';
  html += '</div>';

  // Files card — detect API data files
  let apiFiles = [];
  try {
    const r = await fetch('/app/' + id + '/api/');
    if (r.ok) {
      const listing = await r.json();
      if (Array.isArray(listing)) apiFiles = listing;
      else if (listing.files) apiFiles = listing.files;
    }
  } catch {}

  html += '<div class="card"><div class="card-title">Dateien</div>';
  html += '<div class="file-item' + (selectedFile === id + '/index.html' ? ' active' : '') + '" onclick="previewFile(\'' + esc(id) + '\', \'index.html\', \'static\')">' +
    '<span class="file-type">HTML</span><span class="file-name">index.html</span></div>';
  html += '<div class="file-item' + (selectedFile === id + '/manifest.json' ? ' active' : '') + '" onclick="previewFile(\'' + esc(id) + '\', \'manifest.json\', \'static\')">' +
    '<span class="file-type">JSON</span><span class="file-name">manifest.json</span></div>';

  apiFiles.forEach(f => {
    const fname = typeof f === 'string' ? f : f.name || f;
    html += '<div class="file-item' + (selectedFile === id + '/api/' + fname ? ' active' : '') + '" onclick="previewFile(\'' + esc(id) + '\', \'' + esc(fname) + '\', \'api\')">' +
      '<span class="file-type" style="color:var(--lila);background:rgba(168,85,247,.1)">DATA</span><span class="file-name">' + esc(fname) + '</span></div>';
  });

  html += '</div>';

  // Open button
  html += '<div style="margin-top:16px"><a href="/app/' + esc(app.id) + '" target="_blank" style="display:inline-block;background:var(--teal);color:var(--bg);padding:6px 16px;border-radius:4px;font:600 11px var(--font);text-decoration:none">App oeffnen</a></div>';

  detail.innerHTML = html;
}

async function previewFile(appId, filename, type) {
  selectedFile = appId + (type === 'api' ? '/api/' : '/') + filename;
  document.getElementById('previewFilename').textContent = filename;
  document.getElementById('previewEmpty').style.display = 'none';
  document.getElementById('previewContent').style.display = 'none';

  // Show loading state
  const empty = document.getElementById('previewEmpty');
  empty.textContent = 'Lade...';
  empty.style.display = 'flex';

  try {
    let url, text;
    if (filename === 'manifest.json') {
      // Manifest via registry API
      const reg = await fetch('/api/app-registry');
      const data = await reg.json();
      const appList = data.apps || data;
      const appEntry = (Array.isArray(appList) ? appList : Object.values(appList)).find(a => a.id === appId);
      text = JSON.stringify(appEntry || {}, null, 2);
    } else if (filename === 'index.html') {
      url = '/app/' + appId + '/';
      const r = await fetch(url);
      text = await r.text();
    } else {
      // API data file
      url = '/app/' + appId + '/api/' + filename.replace(/\.json$/, '');
      const r = await fetch(url);
      text = await r.text();
    }

    if (!text) throw new Error('Leere Antwort');
    // Try to pretty-print JSON
    let display = text;
    try { display = JSON.stringify(JSON.parse(text), null, 2); } catch {}

    document.getElementById('previewPre').textContent = display;
    empty.style.display = 'none';
    document.getElementById('previewContent').style.display = 'block';

    // Update active class on file items without full re-render
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('active', el.getAttribute('onclick') && el.getAttribute('onclick').includes(filename));
    });
  } catch (e) {
    empty.textContent = 'Fehler beim Laden: ' + e.message;
    empty.style.display = 'flex';
  }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

init();
</script>
</body>
</html>
