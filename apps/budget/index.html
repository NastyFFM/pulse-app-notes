<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .month-nav { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .month-nav button { background: #334155; border: none; color: #cbd5e1; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .month-nav button:hover { background: #475569; }
    .month-title { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }
    .add-btn { background: #F59E0B; border: none; color: white; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .add-btn:hover { background: #D97706; }

    /* Main layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Left: Transactions */
    .transactions-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

    /* Summary cards */
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 6px; }
    .summary-card { background: #1e293b; border-radius: 10px; padding: 14px 16px; border: 1px solid #334155; }
    .summary-card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .summary-card .amount { font-size: 22px; font-weight: 700; }
    .summary-card.income .amount { color: #10B981; }
    .summary-card.expense .amount { color: #EF4444; }
    .summary-card.balance .amount { color: #F59E0B; }

    /* Transaction list */
    .section-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 0 8px; }
    .transaction-item { background: #1e293b; border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; cursor: pointer; transition: background 0.15s; }
    .transaction-item:hover { background: #253347; }
    .tx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 14px; color: #f1f5f9; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 12px; color: #64748b; margin-top: 2px; }
    .tx-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .tx-amount.income { color: #10B981; }
    .tx-amount.expense { color: #EF4444; }
    .tx-date { font-size: 12px; color: #64748b; flex-shrink: 0; min-width: 60px; text-align: right; }

    /* Right: Sidebar */
    .sidebar { width: 260px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-section { padding: 16px; border-bottom: 1px solid #334155; }
    .sidebar-section h3 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .cat-name { font-size: 12px; color: #cbd5e1; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-amount { font-size: 12px; font-weight: 600; color: #f1f5f9; min-width: 55px; text-align: right; }
    .progress-bar { height: 4px; background: #334155; border-radius: 2px; flex: 1; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .cat-block { margin-bottom: 10px; }
    .cat-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .cat-limit { font-size: 11px; color: #64748b; }
    .over-budget { color: #EF4444 !important; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e293b; border-radius: 12px; padding: 24px; width: 380px; border: 1px solid #334155; }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: #f1f5f9; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
    .form-row input, .form-row select { width: 100%; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; padding: 8px 10px; border-radius: 6px; font-size: 14px; }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: #F59E0B; }
    .type-toggle { display: flex; gap: 8px; }
    .type-btn { flex: 1; padding: 8px; border: 1px solid #334155; background: #0f172a; color: #94a3b8; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .type-btn.active.income { background: #064e3b; border-color: #10B981; color: #10B981; }
    .type-btn.active.expense { background: #450a0a; border-color: #EF4444; color: #EF4444; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 9px; background: #334155; border: none; color: #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-save { flex: 1; padding: 9px; background: #F59E0B; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-delete { padding: 9px 16px; background: #7f1d1d; border: none; color: #fca5a5; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .empty { color: #475569; font-size: 14px; text-align: center; padding: 40px 0; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">💰</span>
  <h1>Budget-Tracker</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="month-title" id="monthTitle"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <button class="add-btn" onclick="openModal()">+ Eintrag</button>
</div>

<div class="main">
  <div class="transactions-area">
    <div class="summary" id="summary"></div>
    <div class="section-title">Transaktionen</div>
    <div id="transactionList"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section" style="flex:1; overflow-y:auto;">
      <h3>Ausgaben nach Kategorie</h3>
      <div id="categoryBreakdown"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Neuer Eintrag</h2>
    <div class="form-row">
      <label>Typ</label>
      <div class="type-toggle">
        <button class="type-btn active income" onclick="setType('income')">+ Einnahme</button>
        <button class="type-btn expense" onclick="setType('expense')">− Ausgabe</button>
      </div>
    </div>
    <div class="form-row">
      <label>Betrag (€)</label>
      <input type="number" id="inputAmount" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-row">
      <label>Beschreibung</label>
      <input type="text" id="inputDesc" placeholder="z.B. Wocheneinkauf">
    </div>
    <div class="form-row">
      <label>Kategorie</label>
      <select id="inputCategory"></select>
    </div>
    <div class="form-row">
      <label>Datum</label>
      <input type="date" id="inputDate">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteTransaction()">Löschen</button>
      <button class="btn-save" onclick="saveTransaction()">Speichern</button>
    </div>
  </div>
</div>

<script>
  let data = { transactions: [], categories: { income: [], expense: [] }, budget_limits: {} };
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth(); // 0-indexed
  let editingId = null;
  let currentType = 'income';

  const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

  async function load() {
    try {
      const r = await fetch('api/budget');
      data = await r.json();
      render();
    } catch(e) { console.error(e); }
  }

  async function save() {
    await fetch('api/budget', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  }

  function getMonthTransactions() {
    return data.transactions.filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
    }).sort((a,b) => new Date(b.date) - new Date(a.date));
  }

  function fmt(n) {
    return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
  }

  function render() {
    document.getElementById('monthTitle').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
    const txs = getMonthTransactions();

    const income = txs.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = txs.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('summary').innerHTML = `
      <div class="summary-card income">
        <div class="label">Einnahmen</div>
        <div class="amount">+${fmt(income)} €</div>
      </div>
      <div class="summary-card expense">
        <div class="label">Ausgaben</div>
        <div class="amount">-${fmt(expense)} €</div>
      </div>
      <div class="summary-card balance">
        <div class="label">Bilanz</div>
        <div class="amount" style="color:${balance >= 0 ? '#10B981' : '#EF4444'}">${balance >= 0 ? '+' : ''}${fmt(balance)} €</div>
      </div>
    `;

    if (txs.length === 0) {
      document.getElementById('transactionList').innerHTML = '<div class="empty">Keine Transaktionen in diesem Monat</div>';
    } else {
      document.getElementById('transactionList').innerHTML = txs.map(t => {
        const d = new Date(t.date);
        const dateStr = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
        const sign = t.type === 'income' ? '+' : '-';
        return `<div class="transaction-item" onclick="openModal('${t.id}')">
          <div class="tx-dot" style="background:${t.color || (t.type==='income'?'#10B981':'#EF4444')}"></div>
          <div class="tx-info">
            <div class="tx-desc">${t.description}</div>
            <div class="tx-meta">${t.category}</div>
          </div>
          <div class="tx-amount ${t.type}">${sign}${fmt(t.amount)} €</div>
          <div class="tx-date">${dateStr}.</div>
        </div>`;
      }).join('');
    }

    // Category breakdown (expenses only)
    const expTxs = txs.filter(t => t.type === 'expense');
    const catTotals = {};
    expTxs.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });
    const maxVal = Math.max(...Object.values(catTotals), 1);

    document.getElementById('categoryBreakdown').innerHTML = Object.entries(catTotals)
      .sort((a,b) => b[1] - a[1])
      .map(([cat, total]) => {
        const limit = data.budget_limits[cat];
        const pct = limit ? Math.min((total / limit) * 100, 100) : (total / maxVal) * 100;
        const color = limit && total > limit ? '#EF4444' : '#F59E0B';
        const overBudget = limit && total > limit;
        return `<div class="cat-block">
          <div class="cat-header">
            <span class="cat-name">${cat}</span>
            <span class="cat-amount ${overBudget ? 'over-budget' : ''}">${fmt(total)} €</span>
          </div>
          ${limit ? `<div class="cat-limit">Limit: ${fmt(limit)} €</div>` : ''}
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }).join('') || '<div class="empty" style="padding:10px 0">Keine Ausgaben</div>';
  }

  function openModal(id) {
    editingId = id || null;
    const modal = document.getElementById('modalOverlay');
    modal.classList.add('open');
    document.getElementById('btnDelete').style.display = id ? 'block' : 'none';
    document.getElementById('modalTitle').textContent = id ? 'Eintrag bearbeiten' : 'Neuer Eintrag';

    if (id) {
      const t = data.transactions.find(x => x.id === id);
      if (!t) return;
      setType(t.type);
      document.getElementById('inputAmount').value = t.amount;
      document.getElementById('inputDesc').value = t.description;
      document.getElementById('inputDate').value = t.date;
      updateCategories(t.type);
      document.getElementById('inputCategory').value = t.category;
    } else {
      setType('expense');
      document.getElementById('inputAmount').value = '';
      document.getElementById('inputDesc').value = '';
      const today = new Date();
      document.getElementById('inputDate').value = today.toISOString().split('T')[0];
      updateCategories('expense');
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function setType(type) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.type-btn.${type}`).classList.add('active');
    updateCategories(type);
  }

  function updateCategories(type) {
    const sel = document.getElementById('inputCategory');
    const cats = data.categories[type] || [];
    sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function saveTransaction() {
    const amount = parseFloat(document.getElementById('inputAmount').value);
    const desc = document.getElementById('inputDesc').value.trim();
    const category = document.getElementById('inputCategory').value;
    const date = document.getElementById('inputDate').value;

    if (!amount || !desc || !date) return;

    const colors = { income: '#10B981', expense: '#EF4444', Wohnen: '#6366f1', Lebensmittel: '#F59E0B', Transport: '#3B82F6', Abonnements: '#8B5CF6', Gesundheit: '#EC4899', Freizeit: '#14B8A6', Kleidung: '#F97316', Gehalt: '#10B981', Nebeneinkommen: '#34D399' };
    const color = colors[category] || (currentType === 'income' ? '#10B981' : '#EF4444');

    if (editingId) {
      const idx = data.transactions.findIndex(t => t.id === editingId);
      if (idx >= 0) {
        data.transactions[idx] = { ...data.transactions[idx], type: currentType, amount, description: desc, category, date, color };
      }
    } else {
      data.transactions.push({
        id: 't' + Date.now(),
        type: currentType,
        amount, description: desc, category, date, color
      });
    }

    save();
    closeModal();
    render();
  }

  function deleteTransaction() {
    if (!editingId) return;
    data.transactions = data.transactions.filter(t => t.id !== editingId);
    save();
    closeModal();
    render();
  }

  // Close on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  load();
  setInterval(load, 2000);
</script>
</body>
</html>
