<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPlayer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #94a3b8; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab:hover { color: #f1f5f9; }
        .tab.active { color: #a78bfa; border-color: #a78bfa; }
        .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .panel.active { display: flex; }
        /* YouTube */
        .search-bar { display: flex; gap: 8px; padding: 14px 16px; background: #1e293b; flex-shrink: 0; }
        .search-bar input { flex: 1; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; padding: 9px 14px; border-radius: 8px; font-size: 14px; outline: none; }
        .search-bar input:focus { border-color: #a78bfa; }
        .search-bar button { background: #7c3aed; color: white; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .search-bar button:hover { background: #6d28d9; }
        #yt-wrap { flex: 1; background: #000; }
        #yt-wrap iframe { width: 100%; height: 100%; border: none; }
        .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #475569; flex-direction: column; gap: 10px; }
        .placeholder .ico { font-size: 52px; }
        .placeholder small { font-size: 12px; color: #334155; }
        /* Radio */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 16px; overflow-y: auto; flex: 1; }
        .radio-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .radio-card:hover { border-color: #a78bfa; }
        .radio-card.playing { border-color: #a78bfa; background: #2d1b69; }
        .radio-card .si { font-size: 30px; margin-bottom: 8px; }
        .radio-card .sn { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .radio-card .sg { font-size: 11px; color: #64748b; }
        .radio-bar { background: #1e293b; border-top: 1px solid #334155; padding: 11px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .radio-bar .np { flex: 1; font-size: 13px; color: #94a3b8; }
        .radio-bar .np b { color: #a78bfa; }
        .radio-bar input[type=range] { accent-color: #a78bfa; width: 80px; }
        .stop-btn { background: #dc2626; color: white; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        /* Podcasts */
        .pod-list { flex: 1; overflow-y: auto; padding: 16px; }
        .ep { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
        .ep:hover { border-color: #a78bfa; }
        .ep.playing { border-color: #a78bfa; background: #2d1b69; }
        .ep .et { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .ep .ed { font-size: 12px; color: #64748b; }
        .ep .edesc { font-size: 12px; color: #94a3b8; margin-top: 5px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pod-player { background: #1e293b; border-top: 1px solid #334155; padding: 12px 16px; flex-shrink: 0; }
        .pod-player .pt { font-size: 13px; font-weight: 600; color: #a78bfa; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pod-player audio { width: 100%; height: 32px; accent-color: #a78bfa; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #0f172a; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .pulse { animation: pulse 1.2s infinite; }
    </style>
</head>
<body>
<div class="tabs">
    <div class="tab active" onclick="switchTab('yt')">▶️ YouTube</div>
    <div class="tab" onclick="switchTab('radio')">📻 Radio</div>
    <div class="tab" onclick="switchTab('pod')">🎙️ Podcasts</div>
</div>

<!-- YouTube -->
<div class="panel active" id="panel-yt">
    <div class="search-bar">
        <input id="yt-in" placeholder="YouTube-URL oder Video-ID..." onkeydown="if(event.key==='Enter')loadYT()">
        <button onclick="loadYT()">▶ Laden</button>
    </div>
    <div id="yt-wrap">
        <div class="placeholder"><div class="ico">▶️</div><div>YouTube-URL oder Video-ID eingeben</div><small>z.B. https://youtu.be/dQw4w9WgXcQ</small></div>
    </div>
</div>

<!-- Radio -->
<div class="panel" id="panel-radio">
    <div class="radio-grid" id="rgrid"></div>
    <div class="radio-bar">
        <div class="np" id="rstat">Kein Sender aktiv</div>
        🔊 <input type="range" min="0" max="1" step="0.05" value="0.7" oninput="rAudio.volume=+this.value">
        <button class="stop-btn" onclick="stopR()">⏹ Stop</button>
    </div>
    <audio id="raudio"></audio>
</div>

<!-- Podcasts -->
<div class="panel" id="panel-pod">
    <div class="search-bar">
        <input id="pod-in" placeholder="Podcast RSS-Feed URL..." onkeydown="if(event.key==='Enter')loadPod()">
        <button onclick="loadPod()">📥 Laden</button>
    </div>
    <div class="pod-list" id="pod-list">
        <div class="placeholder" style="height:200px"><div class="ico">🎙️</div><div>RSS-Feed URL eingeben</div><small>z.B. https://feeds.simplecast.com/54nAGcIl</small></div>
    </div>
    <div class="pod-player" id="pod-player" style="display:none">
        <div class="pt" id="pod-title">-</div>
        <audio id="paudio" controls></audio>
    </div>
</div>

<script>
const PulseOS = { reportStatus: s => { try { window.parent.postMessage({type:'appStatus',status:s},'*'); } catch(e){} } };

// Tab
function switchTab(name) {
    ['yt','radio','pod'].forEach((n,i) => {
        document.querySelectorAll('.tab')[i].classList.toggle('active', n===name);
        document.getElementById('panel-'+n).classList.toggle('active', n===name);
    });
    PulseOS.reportStatus(name==='yt'?'▶️ YouTube':name==='radio'?'📻 Radio':'🎙️ Podcasts');
}

// YouTube
function loadYT() {
    const v = document.getElementById('yt-in').value.trim();
    if (!v) return;
    let id = v;
    const m = v.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
    if (m) id = m[1];
    document.getElementById('yt-wrap').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
    PulseOS.reportStatus('▶️ ' + id);
}

// Radio
const STATIONS = [
    {n:'Bayern 3',g:'Pop',u:'https://streams.br.de/bayern3_2.m3u8',i:'🎵'},
    {n:'1LIVE',g:'Pop/Jung',u:'https://wdr-1live-live.icecastssl.wdr.de/wdr/1live/live/mp3/128/stream.mp3',i:'🔥'},
    {n:'SWR3',g:'Pop/Rock',u:'https://liveradio.swr.de/sw282p3/swr3/play.mp3',i:'🎸'},
    {n:'NDR 2',g:'Pop/News',u:'https://icecast.ndr.de/ndr/ndr2/hamburg/mp3/128/stream.mp3',i:'🌊'},
    {n:'WDR 2',g:'Pop/NRW',u:'https://wdr-wdr2-ruhrgebiet.icecastssl.wdr.de/wdr/wdr2/ruhrgebiet/mp3/128/stream.mp3',i:'📡'},
    {n:'Antenne Bayern',g:'Bayern',u:'https://s2-webradio.antenne.de/antenne',i:'⚡'},
    {n:'Radio Hamburg',g:'Pop',u:'https://stream.radiohamburg.de/rhh-live/mp3-192/stream.mp3',i:'🚢'},
    {n:'Energy Berlin',g:'EDM',u:'https://edge50.streamonkey.net/energy-berlin-live',i:'💃'},
    {n:'Classic FM',g:'Klassik',u:'https://media-ice.musicradio.com/ClassicFMMP3',i:'🎻'},
    {n:'Deutschlandfunk',g:'News',u:'https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3',i:'📰'},
    {n:'Jazz Radio',g:'Jazz',u:'http://jazz.streamr.ru/jazz-64.mp3',i:'🎷'},
    {n:'Lofi Chill',g:'Lofi',u:'https://streams.ilovemusic.de/iloveradio17.mp3',i:'☕'},
];
const rAudio = document.getElementById('raudio');
rAudio.volume = 0.7;
function renderRadio() {
    document.getElementById('rgrid').innerHTML = STATIONS.map((s,i)=>`
        <div class="radio-card" id="rc${i}" onclick="playR(${i})">
            <div class="si">${s.i}</div><div class="sn">${s.n}</div><div class="sg">${s.g}</div>
        </div>`).join('');
}
function playR(i) {
    document.querySelectorAll('.radio-card').forEach(c=>c.classList.remove('playing'));
    document.getElementById('rc'+i).classList.add('playing');
    rAudio.src = STATIONS[i].u; rAudio.play().catch(()=>{});
    document.getElementById('rstat').innerHTML = `Spielt: <b>${STATIONS[i].n}</b>`;
    PulseOS.reportStatus('📻 '+STATIONS[i].n);
}
function stopR() {
    rAudio.pause(); rAudio.src='';
    document.querySelectorAll('.radio-card').forEach(c=>c.classList.remove('playing'));
    document.getElementById('rstat').textContent='Kein Sender aktiv';
    PulseOS.reportStatus('📻 Bereit');
}

// Podcasts
const PROXY = 'https://api.allorigins.win/get?url=';
async function loadPod() {
    const url = document.getElementById('pod-in').value.trim();
    if (!url) return;
    const el = document.getElementById('pod-list');
    el.innerHTML = '<div class="placeholder" style="height:150px"><div class="pulse" style="font-size:36px">⏳</div><div>Lade Feed...</div></div>';
    try {
        const r = await fetch(PROXY + encodeURIComponent(url));
        const j = await r.json();
        const xml = new DOMParser().parseFromString(j.contents,'text/xml');
        const items = [...xml.querySelectorAll('item')].slice(0,60);
        if (!items.length) throw new Error('Keine Episoden gefunden');
        el.innerHTML = items.map((item,i) => {
            const t = item.querySelector('title')?.textContent || 'Unbekannt';
            const d = item.querySelector('pubDate')?.textContent || '';
            const desc = (item.querySelector('description')?.textContent||'').replace(/<[^>]*>/g,'').trim().slice(0,180);
            const au = item.querySelector('enclosure')?.getAttribute('url')||'';
            return `<div class="ep" id="ep${i}" onclick="playEp(${i},${JSON.stringify(t)},${JSON.stringify(au)})">
                <div class="et">${t}</div>
                <div class="ed">${d ? new Date(d).toLocaleDateString('de-DE') : ''}</div>
                ${desc?`<div class="edesc">${desc}</div>`:''}
            </div>`;
        }).join('');
        PulseOS.reportStatus('🎙️ '+items.length+' Episoden');
    } catch(e) {
        el.innerHTML = `<div class="placeholder" style="height:150px"><div>❌ Fehler: ${e.message}</div></div>`;
    }
}
function playEp(i, title, url) {
    document.querySelectorAll('.ep').forEach(e=>e.classList.remove('playing'));
    document.getElementById('ep'+i).classList.add('playing');
    const pp = document.getElementById('pod-player');
    pp.style.display='block';
    document.getElementById('pod-title').textContent = title;
    const a = document.getElementById('paudio');
    a.src = url; a.play().catch(()=>{});
    PulseOS.reportStatus('🎙️ '+title.slice(0,28));
}

renderRadio();
PulseOS.reportStatus('🎵 Bereit');
</script>
</body>
</html>
