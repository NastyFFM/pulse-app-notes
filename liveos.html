<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live.OS</title>
<link rel="stylesheet" href="/theme.css">
<style>
body { margin: 0; background: var(--los-bg-base); color: var(--los-text-primary); font-family: var(--los-font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

/* Top Bar */
.topbar { display: flex; align-items: center; padding: 6px 16px; background: rgba(15,23,42,.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--los-border); z-index: 100; flex-shrink: 0; gap: 12px; }
.topbar-logo { font-weight: 700; font-size: 14px; color: var(--los-accent); letter-spacing: .02em; }
.topbar-logo span { color: var(--los-text-muted); font-weight: 400; }
.context-tabs { display: flex; gap: 2px; flex: 1; margin: 0 12px; overflow-x: auto; }
.ctx-tab { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--los-text-muted); cursor: pointer; border: none; background: transparent; font-family: var(--los-font); white-space: nowrap; transition: all 150ms; }
.ctx-tab:hover { color: var(--los-text-secondary); background: rgba(255,255,255,.05); }
.ctx-tab.active { background: var(--los-accent); color: #fff; }
.ctx-tab.add { color: var(--los-text-dim); font-size: 14px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-right .clock { font-size: 12px; color: var(--los-text-muted); font-variant-numeric: tabular-nums; }
.topbar-right .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--los-green); }
.topbar-btn { background: rgba(255,255,255,.08); border: none; color: var(--los-text-secondary); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: var(--los-font); }
.topbar-btn:hover { background: rgba(255,255,255,.14); color: var(--los-text-primary); }

/* Canvas */
.canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; }
.canvas-container.dragging { cursor: grabbing; }
.canvas { position: absolute; transform-origin: 0 0; }

/* SVG connections layer */
.connections-svg { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
.connection-line { fill: none; stroke: var(--los-accent); stroke-width: 2; opacity: .5; }
.connection-line:hover { opacity: 1; stroke-width: 3; }

/* Widget containers on canvas */
.widget-frame { position: absolute; background: var(--los-bg-primary); border: 1px solid var(--los-border-light); border-radius: 12px; box-shadow: var(--los-shadow); display: flex; flex-direction: column; overflow: visible; z-index: 10; }
.widget-frame.focused { border-color: var(--los-accent); box-shadow: var(--los-shadow-lg), 0 0 0 1px var(--los-accent); z-index: 20; }
.widget-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: rgba(0,0,0,.25); border-radius: 12px 12px 0 0; cursor: grab; flex-shrink: 0; }
.widget-header:active { cursor: grabbing; }
.widget-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.widget-label { font-size: 11px; font-weight: 600; color: var(--los-text-secondary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.widget-type-badge { font-size: 9px; color: var(--los-text-dim); background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 10px; }
.widget-close { background: none; border: none; color: var(--los-text-dim); cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.widget-close:hover { color: var(--los-red); }
.widget-body { flex: 1; overflow: hidden; border-radius: 0 0 12px 12px; }
.widget-body iframe { width: 100%; height: 100%; border: none; }

/* Resize handle */
.widget-resize { position: absolute; right: -2px; bottom: -2px; width: 14px; height: 14px; cursor: nwse-resize; z-index: 15; }
.widget-resize::after { content: ''; position: absolute; right: 3px; bottom: 3px; width: 8px; height: 8px; border-right: 2px solid var(--los-text-dim); border-bottom: 2px solid var(--los-text-dim); opacity: .4; }
.widget-resize:hover::after { opacity: .8; }

/* Ports */
.port { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--los-bg-tertiary); border: 2px solid var(--los-text-dim); cursor: crosshair; z-index: 20; transition: all 150ms; }
.port:hover { transform: scale(1.5); border-color: var(--los-accent); background: var(--los-accent); }
.port-output { right: -5px; }
.port-input { left: -5px; }

/* AI Node */
.ai-node { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--los-accent), #6366F1); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--los-shadow-glow); cursor: move; z-index: 15; border: 2px solid rgba(255,255,255,.2); }
.ai-node-label { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--los-accent); font-weight: 600; white-space: nowrap; text-transform: uppercase; letter-spacing: .08em; }

/* Add widget button on canvas */
.add-widget-btn { position: fixed; bottom: 20px; right: 20px; background: var(--los-accent); color: #fff; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: var(--los-shadow-lg); z-index: 100; display: flex; align-items: center; justify-content: center; }
.add-widget-btn:hover { background: var(--los-accent-hover); transform: scale(1.1); }

/* Widget picker */
.widget-picker { position: fixed; bottom: 80px; right: 20px; background: var(--los-bg-primary); border: 1px solid var(--los-border-light); border-radius: 12px; padding: 12px; z-index: 200; box-shadow: var(--los-shadow-lg); min-width: 220px; }
.widget-picker.hidden { display: none; }
.widget-picker h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--los-text-muted); margin-bottom: 8px; }
.wp-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 150ms; }
.wp-item:hover { background: rgba(255,255,255,.06); }
.wp-item .icon { font-size: 20px; }
.wp-item .info { flex: 1; }
.wp-item .name { font-size: 12px; font-weight: 600; }
.wp-item .desc { font-size: 10px; color: var(--los-text-muted); }

/* Zoom indicator */
.zoom-info { position: fixed; bottom: 20px; left: 20px; font-size: 11px; color: var(--los-text-dim); z-index: 100; }

/* Dashboard link */
.dash-link { font-size: 11px; color: var(--los-text-dim); text-decoration: none; }
.dash-link:hover { color: var(--los-text-secondary); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">/Live<span>.OS</span></div>
  <div class="context-tabs" id="contextTabs"></div>
  <div class="topbar-right">
    <a href="/" class="dash-link">Dashboard</a>
    <span class="clock" id="clock"></span>
    <span class="sync-dot" id="syncDot"></span>
  </div>
</div>

<div class="canvas-container" id="canvasContainer">
  <svg class="connections-svg" id="connectionsSvg"></svg>
  <div class="canvas" id="canvas"></div>
</div>

<button class="add-widget-btn" id="addWidgetBtn" title="Widget hinzufügen">+</button>
<div class="widget-picker hidden" id="widgetPicker">
  <h3>Widget hinzufügen</h3>
  <div id="widgetTypeList"></div>
</div>

<div class="zoom-info" id="zoomInfo">100%</div>

<script>
// ============================================================
// Live.OS - Context-based Widget Canvas
// ============================================================

let contexts = [];
let activeContextId = null;
let context = null; // current context data
let widgetTypes = [];
let widgetFrames = {}; // instanceId -> { el, iframe }

// Canvas state
let canvasX = 0, canvasY = 0, zoom = 1;
let isPanning = false, panStart = { x: 0, y: 0 };
let dragWidget = null, dragOff = { x: 0, y: 0 };
let resizeWidget = null, resizeStart = {};

// SSE
let sse = null;

// ---- Init ----
async function init() {
  await Promise.all([loadContexts(), loadWidgetTypes()]);
  if (contexts.length > 0) {
    activeContextId = contexts[0].id;
    await loadContext(activeContextId);
  }
  renderContextTabs();
  connectSSE();
  startClock();
}

// ---- Data loading ----
async function loadContexts() {
  try {
    const r = await fetch('/api/contexts');
    const d = await r.json();
    contexts = d.contexts || [];
  } catch { contexts = []; }
}

async function loadWidgetTypes() {
  try {
    const r = await fetch('/api/widget-types');
    const d = await r.json();
    widgetTypes = d.types || [];
  } catch { widgetTypes = []; }
}

async function loadContext(ctxId) {
  try {
    const r = await fetch('/api/context/' + ctxId);
    context = await r.json();
    activeContextId = ctxId;
    renderCanvas();
    renderContextTabs();
  } catch(e) { console.error('Failed to load context:', e); }
}

async function saveContext() {
  if (!context) return;
  // Update widget positions from DOM
  for (const w of context.widgets) {
    const frame = widgetFrames[w.instanceId];
    if (frame) {
      w.position.x = parseInt(frame.el.style.left) || 0;
      w.position.y = parseInt(frame.el.style.top) || 0;
      w.size.w = parseInt(frame.el.style.width) || 400;
      w.size.h = parseInt(frame.el.style.height) || 300;
    }
  }
  try {
    await fetch('/api/context/' + context.id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(context, null, 2)
    });
  } catch {}
}

// ---- SSE ----
function connectSSE() {
  if (sse) sse.close();
  sse = new EventSource('/sse/liveos');
  sse.onmessage = e => {
    if (e.data === 'connected') return;
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'widget-data-change') {
        // Reload affected widget iframes
        for (const [id, frame] of Object.entries(widgetFrames)) {
          const w = context?.widgets.find(w => w.instanceId === id);
          if (w && d.source === w.dataSource) {
            // Don't reload iframe, widget polls itself
          }
        }
      }
      if (d.type === 'context-change' && d.contextId === activeContextId) {
        loadContext(activeContextId);
      }
    } catch {}
  };
  sse.onerror = () => { document.getElementById('syncDot').style.background = 'var(--los-red)'; setTimeout(connectSSE, 5000); };
}

// ---- Render Context Tabs ----
function renderContextTabs() {
  const tabs = document.getElementById('contextTabs');
  tabs.innerHTML = '';
  contexts.forEach(ctx => {
    const tab = document.createElement('button');
    tab.className = 'ctx-tab' + (ctx.id === activeContextId ? ' active' : '');
    tab.textContent = (ctx.icon || '') + ' ' + (ctx.name || ctx.id);
    tab.onclick = () => loadContext(ctx.id);
    tabs.appendChild(tab);
  });
  const addTab = document.createElement('button');
  addTab.className = 'ctx-tab add';
  addTab.textContent = '+';
  addTab.title = 'Neuer Kontext';
  addTab.onclick = createNewContext;
  tabs.appendChild(addTab);
}

async function createNewContext() {
  const name = prompt('Name des neuen Kontexts:');
  if (!name) return;
  const id = 'ctx-' + Date.now();
  try {
    await fetch('/api/contexts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name, icon: '📁', widgets: [], connections: [], aiNode: { position: { x: 300, y: 50 } } })
    });
    await loadContexts();
    await loadContext(id);
  } catch(e) { console.error(e); }
}

// ---- Render Canvas ----
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  widgetFrames = {};

  if (!context) return;

  // AI Node
  if (context.aiNode) {
    const ai = document.createElement('div');
    ai.className = 'ai-node';
    ai.style.left = context.aiNode.position.x + 'px';
    ai.style.top = context.aiNode.position.y + 'px';
    ai.innerHTML = '<div class="ai-node-label">AI Agent</div>🧠';
    ai.onmousedown = e => startWidgetDrag(e, ai, '__ai__');
    canvas.appendChild(ai);
  }

  // Widgets
  for (const w of context.widgets) {
    const type = widgetTypes.find(t => t.typeId === w.typeId);
    const frame = document.createElement('div');
    frame.className = 'widget-frame';
    frame.style.left = w.position.x + 'px';
    frame.style.top = w.position.y + 'px';
    frame.style.width = (w.size?.w || type?.defaultSize?.w || 400) + 'px';
    frame.style.height = (w.size?.h || type?.defaultSize?.h || 300) + 'px';
    frame.dataset.instanceId = w.instanceId;

    const color = type?.color || '#3B82F6';
    frame.innerHTML = `
      <div class="widget-header" onmousedown="startWidgetDrag(event, this.parentElement, '${w.instanceId}')">
        <div class="widget-dot" style="background:${color}"></div>
        <span class="widget-label">${w.label || type?.name || w.typeId}</span>
        <span class="widget-type-badge">${type?.icon || ''} ${type?.name || w.typeId}</span>
        <button class="widget-close" onclick="removeWidget('${w.instanceId}')" title="Entfernen">×</button>
      </div>
      <div class="widget-body">
        <iframe src="/widget/${w.typeId}?id=${w.instanceId}&source=${encodeURIComponent(w.dataSource || '')}&config=${encodeURIComponent(JSON.stringify(w.config || {}))}"></iframe>
      </div>
      <div class="widget-resize" onmousedown="startWidgetResize(event, '${w.instanceId}')"></div>
    `;

    // Ports
    if (type?.outputs) {
      type.outputs.forEach((port, i) => {
        const portEl = document.createElement('div');
        portEl.className = 'port port-output';
        portEl.style.top = (50 + i * 20) + 'px';
        portEl.title = port;
        portEl.dataset.instanceId = w.instanceId;
        portEl.dataset.port = port;
        portEl.dataset.dir = 'output';
        frame.appendChild(portEl);
      });
    }
    if (type?.accepts) {
      type.accepts.forEach((port, i) => {
        const portEl = document.createElement('div');
        portEl.className = 'port port-input';
        portEl.style.top = (50 + i * 20) + 'px';
        portEl.title = port;
        portEl.dataset.instanceId = w.instanceId;
        portEl.dataset.port = port;
        portEl.dataset.dir = 'input';
        frame.appendChild(portEl);
      });
    }

    frame.onmousedown = () => focusWidget(w.instanceId);
    canvas.appendChild(frame);

    const iframe = frame.querySelector('iframe');
    widgetFrames[w.instanceId] = { el: frame, iframe };
  }

  drawConnections();
  updateCanvasTransform();
}

// ---- Connections SVG ----
function drawConnections() {
  const svg = document.getElementById('connectionsSvg');
  svg.innerHTML = '';
  if (!context?.connections) return;

  for (const conn of context.connections) {
    const fromFrame = widgetFrames[conn.from.instanceId];
    const toFrame = widgetFrames[conn.to.instanceId];
    if (!fromFrame || !toFrame) continue;

    const fromRect = fromFrame.el;
    const toRect = toFrame.el;

    const x1 = parseInt(fromRect.style.left) + parseInt(fromRect.style.width);
    const y1 = parseInt(fromRect.style.top) + 50;
    const x2 = parseInt(toRect.style.left);
    const y2 = parseInt(toRect.style.top) + 50;

    const cpx = Math.abs(x2 - x1) * 0.4;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${x1+cpx},${y1} ${x2-cpx},${y2} ${x2},${y2}`);
    path.setAttribute('class', 'connection-line');
    svg.appendChild(path);
  }
}

// ---- Widget Drag ----
function startWidgetDrag(e, el, instanceId) {
  if (e.target.classList.contains('widget-close') || e.target.classList.contains('widget-resize')) return;
  e.preventDefault();
  e.stopPropagation();

  dragWidget = { el, instanceId };
  dragOff.x = (e.clientX / zoom) - parseInt(el.style.left || 0);
  dragOff.y = (e.clientY / zoom) - parseInt(el.style.top || 0);

  // Disable iframe pointer events during drag
  document.querySelectorAll('.widget-body iframe').forEach(f => f.style.pointerEvents = 'none');
}
window.startWidgetDrag = startWidgetDrag;

function focusWidget(instanceId) {
  document.querySelectorAll('.widget-frame').forEach(f => f.classList.remove('focused'));
  const frame = widgetFrames[instanceId];
  if (frame) frame.el.classList.add('focused');
}

// ---- Widget Resize ----
function startWidgetResize(e, instanceId) {
  e.preventDefault();
  e.stopPropagation();
  const frame = widgetFrames[instanceId];
  if (!frame) return;
  resizeWidget = {
    el: frame.el,
    instanceId,
    startX: e.clientX,
    startY: e.clientY,
    startW: parseInt(frame.el.style.width),
    startH: parseInt(frame.el.style.height)
  };
  document.querySelectorAll('.widget-body iframe').forEach(f => f.style.pointerEvents = 'none');
}
window.startWidgetResize = startWidgetResize;

// ---- Canvas Pan ----
const container = document.getElementById('canvasContainer');
container.addEventListener('mousedown', e => {
  if (e.target === container || e.target.id === 'connectionsSvg') {
    isPanning = true;
    panStart.x = e.clientX - canvasX;
    panStart.y = e.clientY - canvasY;
    container.classList.add('dragging');
  }
});

document.addEventListener('mousemove', e => {
  if (isPanning) {
    canvasX = e.clientX - panStart.x;
    canvasY = e.clientY - panStart.y;
    updateCanvasTransform();
  }
  if (dragWidget) {
    const x = (e.clientX / zoom) - dragOff.x - (canvasX / zoom);
    const y = (e.clientY / zoom) - dragOff.y - (canvasY / zoom);
    dragWidget.el.style.left = Math.round(x) + 'px';
    dragWidget.el.style.top = Math.round(y) + 'px';
    drawConnections();
  }
  if (resizeWidget) {
    const dx = (e.clientX - resizeWidget.startX) / zoom;
    const dy = (e.clientY - resizeWidget.startY) / zoom;
    resizeWidget.el.style.width = Math.max(250, resizeWidget.startW + dx) + 'px';
    resizeWidget.el.style.height = Math.max(180, resizeWidget.startH + dy) + 'px';
  }
});

document.addEventListener('mouseup', () => {
  if (isPanning) { isPanning = false; container.classList.remove('dragging'); }
  if (dragWidget) {
    dragWidget = null;
    document.querySelectorAll('.widget-body iframe').forEach(f => f.style.pointerEvents = '');
    saveContext();
  }
  if (resizeWidget) {
    resizeWidget = null;
    document.querySelectorAll('.widget-body iframe').forEach(f => f.style.pointerEvents = '');
    saveContext();
  }
});

// Zoom
container.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.95 : 1.05;
  zoom = Math.min(2, Math.max(0.3, zoom * delta));
  updateCanvasTransform();
  document.getElementById('zoomInfo').textContent = Math.round(zoom * 100) + '%';
}, { passive: false });

function updateCanvasTransform() {
  const canvas = document.getElementById('canvas');
  canvas.style.transform = `translate(${canvasX}px, ${canvasY}px) scale(${zoom})`;

  // SVG also needs transform
  const svg = document.getElementById('connectionsSvg');
  svg.style.transform = `translate(${canvasX}px, ${canvasY}px) scale(${zoom})`;
  svg.style.transformOrigin = '0 0';
}

// ---- postMessage routing (widget-to-widget data flow) ----
window.addEventListener('message', e => {
  if (e.data?.type === 'widget-output') {
    const { instanceId, port, value } = e.data;
    if (!context?.connections) return;
    const conns = context.connections.filter(c =>
      c.from.instanceId === instanceId && c.from.port === port
    );
    for (const conn of conns) {
      const target = widgetFrames[conn.to.instanceId];
      if (target?.iframe?.contentWindow) {
        target.iframe.contentWindow.postMessage({
          type: 'widget-input',
          port: conn.to.port,
          value
        }, '*');
      }
    }
  }
});

// ---- Add Widget ----
document.getElementById('addWidgetBtn').onclick = () => {
  const picker = document.getElementById('widgetPicker');
  picker.classList.toggle('hidden');
  if (!picker.classList.contains('hidden')) renderWidgetPicker();
};

function renderWidgetPicker() {
  const list = document.getElementById('widgetTypeList');
  list.innerHTML = '';
  widgetTypes.forEach(type => {
    const item = document.createElement('div');
    item.className = 'wp-item';
    item.innerHTML = `<span class="icon">${type.icon || '📦'}</span><div class="info"><div class="name">${type.name}</div><div class="desc">${type.description || ''}</div></div>`;
    item.onclick = () => addWidgetToContext(type);
    list.appendChild(item);
  });
}

async function addWidgetToContext(type) {
  if (!context) return;
  const label = prompt('Label fuer dieses Widget:', type.name);
  if (!label) return;

  // Create data file for this widget in the context
  const dataFileName = type.typeId.replace('-view', '') + '-' + Date.now() + '.json';
  const dataSource = 'contexts/' + context.id + '/' + dataFileName;

  // Create initial data
  let initialData = {};
  if (type.typeId === 'calendar-view') initialData = { events: [] };

  await fetch('/api/widget-data?source=' + encodeURIComponent(dataSource), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(initialData, null, 2)
  });

  const instanceId = 'wi-' + Date.now();
  context.widgets.push({
    instanceId,
    typeId: type.typeId,
    label,
    dataSource,
    position: { x: 200 + Math.random() * 200, y: 150 + Math.random() * 150 },
    size: { w: type.defaultSize?.w || 400, h: type.defaultSize?.h || 300 },
    config: {}
  });

  await saveContext();
  renderCanvas();
  document.getElementById('widgetPicker').classList.add('hidden');
}

function removeWidget(instanceId) {
  if (!context || !confirm('Widget entfernen?')) return;
  context.widgets = context.widgets.filter(w => w.instanceId !== instanceId);
  context.connections = context.connections.filter(c => c.from.instanceId !== instanceId && c.to.instanceId !== instanceId);
  saveContext();
  renderCanvas();
}
window.removeWidget = removeWidget;

// ---- Clock ----
function startClock() {
  const update = () => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  };
  update();
  setInterval(update, 30000);
}

// ---- Start ----
init();
</script>
</body>
</html>
