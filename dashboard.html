<script>
// ── State ──
let state = null, lastHash = '';
let openWindows = [], nextZ = 300, windowIdCounter = 0;
let mutationQueue = [], batchTimer = null;
const feed = [];
let launcherOpen = false, ccOpen = false;
let activeTabWinId = null;
let currentMode = localStorage.getItem('pulseMode') || 'flow';

// ── Modes ──
function setMode(mode) {
  currentMode = mode;
  localStorage.setItem('pulseMode', mode);
  document.body.className = 'mode-' + mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1));
  if (btn) btn.classList.add('active');
  if (mode === 'builder') {
    const app = state?.apps?.find(a => a.id === 'projects');
    if (app) openApp(app);
  }
}

// ── Themes ──
const THEMES = ['dark', 'light', 'midnight', 'terminal', 'warm', 'highcontrast'];
function setTheme(theme) {
  if (!THEMES.includes(theme)) theme = 'dark';
  if (theme === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('pulseTheme', theme);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.title = 'Theme: ' + theme + ' (Cmd+T)';
  // Broadcast theme to all app iframes
  openWindows.filter(w => !w.closed).forEach(w => {
    try { w.el.querySelector('iframe').contentWindow.postMessage({ type: 'set-theme', theme }, '*'); } catch {}
  });
}
function cycleTheme() {
  const cur = localStorage.getItem('pulseTheme') || 'dark';
  setTheme(THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length]);
}
setTheme(localStorage.getItem('pulseTheme') || 'dark');

// ── SSE ──
let sse = null;
function connectSSE() {
  if (sse) sse.close();
  sse = new EventSource('/sse/dashboard');
  sse.onmessage = e => {
    sseLastEvent = Date.now();
    setSyncStatus('live');
    if (e.data === 'connected') return;
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'tunnel') {
        handleTunnelSSE(msg);
        return;
      }
      if (msg.type === 'app-html-changed' && msg.appId) {
        // App HTML was edited by worker — force iframe reload with cache-bust
        openWindows.filter(w => w.appId === msg.appId && !w.closed).forEach(w => {
          const iframe = w.el.querySelector('iframe');
          if (iframe) { const base = iframe.src.split('?')[0]; iframe.src = base + '?_t=' + Date.now(); }
        });
        const appName = (state.apps || []).find(a => a.id === msg.appId)?.name || msg.appId;
        addFeed(appName + ': App aktualisiert', 'mutation');
      } else if (msg.type === 'app-data-changed' && msg.appId) {
        // Forward to open app iframes so they auto-reload
        openWindows.filter(w => w.appId === msg.appId && !w.closed).forEach(w => {
          try { w.el.querySelector('iframe').contentWindow.postMessage({ type: 'data-changed', appId: msg.appId, file: msg.file }, '*'); } catch {}
        });
        const appName = (state.apps || []).find(a => a.id === msg.appId)?.name || msg.appId;
        const fileName = (msg.file || '').replace('.json', '');
        addFeed(appName + ': ' + (fileName || 'Daten') + ' geändert', 'sse');
        loadQuickStats();
      } else if (msg.type === 'worker-update' && msg.workerId) {
        // Mark worker as reported so polling doesn't duplicate
        if (msg.status === 'done' || msg.status === 'error') workerDoneReported.add(msg.workerId);
        // Reload app list when worker finishes (new apps may have been created)
        if (msg.status === 'done') fetch('/api/state').then(r => r.json()).then(s => { state = s; render(); }).catch(() => {});
        updateWorkerBadge();
      } else if (msg.type === 'chat-message' && msg.message) {
        renderChatMsg(msg.message);
        if (!systemChatOpen) {
          showAgentAlert(msg.message.text || 'Neue Nachricht');
          notifyNewMessage(msg.message.text || 'Neue Nachricht', msg.message.from === 'agent' ? 'ClaudeOS' : msg.message.from);
        }
        if (msg.message.from === 'agent') {
          const preview = (msg.message.text || '').substring(0, 40);
          addFeed('ClaudeOS: ' + preview + (preview.length >= 40 ? '...' : ''), 'chat');
          // Forward ClaudeOS response to peer chats with claude enabled (WebRTC only, no double-save)
          if (msg.message.source === 'telegram' || msg.message.source === 'pulseos') {
            (chatsList || []).filter(c => c.id.startsWith('chat-peer-') && c.claudeEnabled).forEach(c => {
              if (window.sendChatToPeers) {
                window.sendChatToPeers(msg.message.text, c.id);
                console.log('[chat] Forwarded ClaudeOS response to peer:', c.id);
              }
            });
          }
        }
      } else if (msg.type === 'agent-alert' && msg.alert) {
        showAgentAlert(msg.alert.text);
        notifyNewMessage(msg.alert.text, 'ClaudeOS');
      } else if (msg.type === 'app-installed' || msg.type === 'app-uninstalled' || msg.type === 'app-updated') {
        addFeed(msg.type.replace('app-', 'App ') + ': ' + (msg.appId || ''), 'install');
        load();
      } else if (msg.type === 'profile-published') {
        addFeed('Profil publiziert', 'sse');
        // Push profile update to all connected peers
        if (window.sendToAllPeers) {
          window.sendToAllPeers({ type: 'profile-updated', url: msg.url, handle: userProfile?.handle, time: Date.now() });
        }
      } else if (msg.type === 'bridge-room-changed' && msg.roomId) {
        window.startBridgeHost(msg.roomId);
        addFeed('Bridge Room gewechselt', 'sse');
      }
    } catch {}
    load();
  };
  sse.onopen = () => { setSyncStatus('live'); sseLastEvent = Date.now(); };
  sse.onerror = () => { setSyncStatus('error'); setTimeout(connectSSE, 5000); };
}
// SSE heartbeat: if no event received in 60s, reconnect
let sseLastEvent = Date.now();
setInterval(() => {
  if (Date.now() - sseLastEvent > 60000 && sse) {
    console.warn('[SSE] No events in 60s, reconnecting...');
    connectSSE();
  }
}, 15000);

// ── Pulse SSE ──
let pulseSSE = null;
function connectPulseSSE() {
  if (pulseSSE) pulseSSE.close();
  pulseSSE = new EventSource('/sse/pulse');
  pulseSSE.onmessage = e => {
    if (e.data === 'connected') return;
    try {
      const evt = JSON.parse(e.data);
      // Flash pulse dot
      const dot = document.getElementById('pulseDot');
      dot.classList.remove('flash');
      void dot.offsetWidth;
      dot.classList.add('flash');
      setTimeout(() => dot.classList.remove('flash'), 500);
      // Update agent bar with friendly text
      const evtType = evt.type || 'event';
      const detail = evt.data ? (evt.data.appId || evt.data.from || '') : '';
      const friendlyMap = {
        'data:changed': detail ? (detail + ' aktualisiert') : 'Daten aktualisiert',
        'webrtc:message': 'WebRTC Verbindung',
        'agent:heartbeat': 'Agent aktiv',
        'event': 'System Event'
      };
      document.getElementById('agentText').textContent = friendlyMap[evtType] || (evtType + (detail ? ' · ' + detail : ''));
      document.getElementById('agentTime').textContent = 'jetzt';
      lastPulseTime = Date.now();
      // Add to feed
      addPulseEntry('*', (evt.type || 'event') + (detail ? ' · ' + detail : ''), 'success');
    } catch {}
  };
  pulseSSE.onerror = () => setTimeout(connectPulseSSE, 5000);
}
let lastPulseTime = 0;

// ── Data ──
async function load() {
  try {
    const r = await fetch('/api/apps');
    const data = await r.json();
    const hash = JSON.stringify(data);
    if (hash !== lastHash) { state = data; lastHash = hash; render(); }
    setSyncStatus('saved');
  } catch { setSyncStatus('error'); }
  // Dismiss splash after first load
  const splash = document.getElementById('splash');
  if (splash && splash.style.opacity !== '0') {
    setTimeout(() => {
      splash.style.opacity = '0';
      splash.style.visibility = 'hidden';
      setTimeout(() => splash.remove(), 800);
    }, 1500);
  }
}

async function save() {
  setSyncStatus('syncing');
  state.meta = state.meta || {};
  try {
    await fetch('/api/apps', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
    lastHash = JSON.stringify(state);
    setSyncStatus('saved');
  } catch { setSyncStatus('error'); }
}

function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  dot.className = 'topbar-sync' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
}

// ── Render ──
function render() {
  if (!state) return;
  renderLauncher();
  renderAppGrid();
  renderTopbarTabs(); renderDock();
}

function renderAppGrid() {
  const apps = state.apps.filter(a => a.installed).sort((a, b) => (a.position || 0) - (b.position || 0));
  const grid = document.getElementById('appGrid');
  // Show first 9 pinned apps on home screen (including Settings)
  const shown = apps.slice(0, 9);
  grid.innerHTML = '<div class="app-item" onclick="quickCreateApp()" title="Neue App erstellen">' +
    '<div class="app-icon" style="background:var(--teal);font-size:28px;display:flex;align-items:center;justify-content:center;">+</div>' +
    '<div class="app-name">Neue App</div></div>' +
    shown.map(app =>
    '<div class="app-item" onclick="const a=state.apps.find(x=>x.id===\'' + app.id + '\');if(a)openApp(a);else console.warn(\'App not found:\',\'' + app.id + '\')">' +
    '<div class="app-icon" style="background:' + app.color + '">' + app.icon + '</div>' +
    '<div class="app-name">' + app.name + '</div></div>'
  ).join('');
}

function renderLauncher() {
  const apps = state.apps.filter(a => a.installed).sort((a, b) => (a.position || 0) - (b.position || 0));
  const grid = document.getElementById('launcherGrid');
  grid.innerHTML = '';
  // "+" Kachel als erstes Element
  const createEl = document.createElement('div');
  createEl.className = 'launcher-app';
  createEl.dataset.name = 'neue app';
  createEl.onclick = () => { quickCreateApp(); toggleLauncher(); };
  createEl.innerHTML = '<div class="icon" style="background:var(--teal);font-size:28px;display:flex;align-items:center;justify-content:center;">+</div><div class="name">Neue App</div>';
  grid.appendChild(createEl);
  apps.forEach(app => {
    const el = document.createElement('div');
    el.className = 'launcher-app';
    el.dataset.name = app.name.toLowerCase();
    el.onclick = () => { openApp(app); toggleLauncher(); };
    el.oncontextmenu = (e) => { e.preventDefault(); showAppContextMenu(e, app); };
    el.innerHTML = '<div class="icon" style="background:' + app.color + '">' + app.icon + '</div><div class="name">' + app.name + '</div>';
    grid.appendChild(el);
  });
}

function showAppContextMenu(e, app) {
  // Remove existing menu
  document.getElementById('appCtxMenu')?.remove();
  const isSystem = !app.created && !app.source;
  const menu = document.createElement('div');
  menu.id = 'appCtxMenu';
  menu.style.cssText = 'position:fixed;z-index:99999;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:12px;';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
  const items = [
    { label: 'Öffnen', action: () => { openApp(app); toggleLauncher(); } },
    { label: 'Sichtbarkeit: ' + (app.visibility || 'private'), action: () => cycleVisibility(app) },
  ];
  if (app.source) {
    items.push({ label: 'Update prüfen', action: () => checkAppUpdate(app) });
  }
  items.push({ label: 'Daten teilen', action: () => shareAppData(app.id, app.name) });
  if (!isSystem) {
    items.push({ label: 'Deinstallieren', action: () => uninstallApp(app), color: '#e74c3c' });
  }
  items.forEach(item => {
    const btn = document.createElement('div');
    btn.style.cssText = 'padding:6px 14px;cursor:pointer;color:' + (item.color || 'var(--text)') + ';';
    btn.onmouseover = () => btn.style.background = 'var(--bg-card)';
    btn.onmouseout = () => btn.style.background = 'none';
    btn.textContent = item.label;
    btn.onclick = () => { menu.remove(); item.action(); };
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close); } };
  setTimeout(() => document.addEventListener('click', close), 0);
}

async function cycleVisibility(app) {
  const levels = ['private', 'unlisted', 'public', 'invite'];
  const cur = levels.indexOf(app.visibility || 'private');
  const next = levels[(cur + 1) % levels.length];
  try {
    await fetch('/api/apps/' + app.id + '/visibility', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ visibility: next }) });
    app.visibility = next;
    showToast(app.name + ' → ' + next, 'success');
  } catch (e) { showToast('Fehler: ' + e.message, 'error'); }
}

async function checkAppUpdate(app) {
  showToast('Prüfe Update für ' + app.name + '...', 'info');
  try {
    const r = await fetch('/api/apps/check-update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: app.id }) });
    const d = await r.json();
    if (d.hasUpdate) {
      if (confirm(app.name + ': Update verfügbar!\n\nJetzt aktualisieren?')) {
        const r2 = await fetch('/api/apps/update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: app.id }) });
        const d2 = await r2.json();
        if (d2.ok) { showToast(app.name + ' aktualisiert!', 'success'); await load(); render(); }
        else showToast(d2.error || 'Update fehlgeschlagen', 'error');
      }
    } else {
      showToast(app.name + ' ist aktuell', 'success');
    }
  } catch (e) { showToast('Fehler: ' + e.message, 'error'); }
}

async function uninstallApp(app) {
  const hasSource = !!app.source;
  const options = ['Nur ausblenden (Dateien behalten)', 'Lokal loeschen'];
  if (hasSource) options.push('Ueberall loeschen (auch GitHub)');
  const choice = prompt(app.name + ' deinstallieren?\n\n1 = ' + options[0] + '\n2 = ' + options[1] + (hasSource ? '\n3 = ' + options[2] : '') + '\n\nNummer eingeben:');
  if (!choice) return;
  try {
    if (choice === '1') {
      await fetch('/api/apps/' + app.id + '/hide', { method: 'POST' });
      showToast(app.name + ' ausgeblendet', 'success');
    } else if (choice === '2') {
      await fetch('/api/apps/uninstall', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: app.id }) });
      showToast(app.name + ' geloescht', 'success');
    } else if (choice === '3' && hasSource) {
      await fetch('/api/apps/uninstall', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: app.id }) });
      await fetch('/api/apps/' + app.id + '/delete-remote', { method: 'POST' });
      showToast(app.name + ' ueberall geloescht', 'success');
    }
    await load(); render(); renderLauncher();
  } catch (e) { showToast('Fehler: ' + e.message, 'error'); }
}

function filterApps(q) {
  const query = q.toLowerCase();
  document.querySelectorAll('.launcher-app').forEach(el => {
    el.classList.toggle('hidden', query && !el.dataset.name.includes(query));
  });
}

// ── Topbar Tabs ──
function renderTopbarTabs() {
  const tabs = document.getElementById('topbarTabs');
  if (!tabs) return;
  const active = openWindows.filter(w => !w.closed);
  const isHome = activeTabWinId === null || !active.find(w => w.winId === activeTabWinId);
  if (isHome) activeTabWinId = null;

  let html = '<div class="tab' + (isHome ? ' active' : '') + '" onclick="showHome()" title="Home"><span class="tab-icon">~</span></div>';
  active.forEach(w => {
    const app = state.apps.find(a => a.id === w.appId);
    if (!app) return;
    const isActive = w.winId === activeTabWinId && !w.minimized;
    html += '<div class="tab' + (isActive ? ' active' : '') + '" onclick="focusTab(\'' + w.winId + '\')" title="' + (app.name || w.appId) + '">' +
      '<span class="tab-icon">' + (app.icon || '#') + '</span>' +
      '<span class="tab-name">' + (app.name || w.appId) + '</span>' +
      '<span class="tab-close" onclick="event.stopPropagation();closeWin(\'' + w.winId + '\')">x</span>' +
    '</div>';
  });
  tabs.innerHTML = html;
}

function showHome() {
  activeTabWinId = null;
  renderTopbarTabs(); renderDock();
}

function focusTab(winId) {
  const win = openWindows.find(w => w.winId === winId);
  if (!win || win.closed) return;
  if (win.minimized) { win.minimized = false; win.el.classList.remove('minimized'); }
  win.el.style.display = '';
  if (window.innerWidth <= 768) {
    openWindows.filter(w => !w.closed && w.winId !== winId).forEach(w => { w.el.style.display = 'none'; });
  }
  focusWindow(winId);
  activeTabWinId = winId;
  renderTopbarTabs(); renderDock();
}

function renderDockWindows() { renderTopbarTabs(); renderDock(); }

// ── Bottom Dock ──
const DOCK_FAVORITES = JSON.parse(localStorage.getItem('dockFavorites') || '["notes","tasks","calendar","terminal","settings"]');

function renderDock() {
  const dock = document.getElementById('dock');
  if (!dock || !state || !state.apps) return;
  // Preserve scroll position
  const scrollArea = dock.querySelector('.dock-scroll');
  const savedScroll = scrollArea ? scrollArea.scrollLeft : 0;
  const active = openWindows.filter(w => !w.closed);
  const activeIds = active.map(w => w.appId);

  // Scrollable: Favorites + open apps
  let html = '<div class="dock-scroll">';

  // Favorite apps
  DOCK_FAVORITES.forEach(id => {
    const app = state.apps.find(a => a.id === id);
    if (!app) return;
    const isOpen = activeIds.includes(id);
    const isActive = active.find(w => w.appId === id && w.winId === activeTabWinId);
    html += '<div class="dock-item' + (isActive ? ' active' : '') + '" data-app-id="' + id + '" onclick="dockClick(\'' + id + '\')" title="' + (app.name || id) + '">' +
      '<div class="dock-icon" style="background:' + (app.color || '#1a2a3a') + '">' + (app.icon || id[0].toUpperCase()) + '</div>' +
      '<span class="dock-label">' + (app.name || id) + '</span>' +
      (isOpen ? '<div class="dock-dot"></div>' : '') +
    '</div>';
  });

  // Open apps not in favorites
  const extraOpen = active.filter(w => !DOCK_FAVORITES.includes(w.appId));
  if (extraOpen.length > 0) {
    html += '<div class="dock-divider"></div>';
    extraOpen.forEach(w => {
      const app = state.apps.find(a => a.id === w.appId);
      if (!app) return;
      const isActive = w.winId === activeTabWinId;
      html += '<div class="dock-item' + (isActive ? ' active' : '') + '" data-app-id="' + w.appId + '" onclick="focusTab(\'' + w.winId + '\')" title="' + (app.name || w.appId) + '">' +
        '<div class="dock-icon" style="background:' + (app.color || '#1a2a3a') + '">' + (app.icon || w.appId[0].toUpperCase()) + '</div>' +
        '<span class="dock-label">' + (app.name || w.appId) + '</span>' +
        '<div class="dock-dot"></div>' +
      '</div>';
    });
  }

  html += '</div>';

  // Fixed right: Chat + Apps launcher
  const chatOpen = document.getElementById('systemChat')?.classList.contains('open');
  const unread = parseInt(document.getElementById('chatBadge')?.textContent || '0') || 0;
  html += '<div class="dock-fixed" style="gap:2px;display:flex;">' +
    '<div class="dock-item' + (chatOpen ? ' active' : '') + '" onclick="toggleSystemChat()" title="Chat">' +
    '<div class="dock-icon" style="background:rgba(168,85,247,0.25);position:relative;">💬' +
    (unread > 0 ? '<span id="chatBadge" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:8px;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;">' + unread + '</span>' : '') +
    '</div>' +
    '<span class="dock-label">Chat</span>' +
    '</div>' +
    '<div class="dock-item" onclick="quickCreateApp()" title="Neue App">' +
    '<div class="dock-icon" style="background:var(--teal);font-size:20px;">+</div>' +
    '<span class="dock-label">Neu</span>' +
    '</div>' +
    '<div class="dock-item all-apps" onclick="toggleLauncher()" title="Alle Apps">' +
    '<div class="dock-icon">⊞</div>' +
    '<span class="dock-label">Apps</span>' +
    '</div></div>';

  const prevCount = dock.querySelectorAll('.dock-item[data-app-id]').length;
  dock.innerHTML = html;
  const newScrollArea = dock.querySelector('.dock-scroll');
  if (newScrollArea) {
    const newCount = dock.querySelectorAll('.dock-item[data-app-id]').length;
    if (newCount > prevCount) {
      // New app opened — scroll to end
      newScrollArea.scrollLeft = newScrollArea.scrollWidth;
    } else if (savedScroll > 0) {
      newScrollArea.scrollLeft = savedScroll;
    }
  }
}

function dockClick(appId) {
  const win = openWindows.find(w => w.appId === appId && !w.closed);
  if (win) {
    if (win.winId === activeTabWinId) {
      showHome();
    } else {
      focusTab(win.winId);
    }
  } else {
    const app = state.apps.find(a => a.id === appId);
    if (app) openApp(app);
  }
}

function dockClose(appId, e) {
  e.preventDefault();
  e.stopPropagation();
  const win = openWindows.find(w => w.appId === appId && !w.closed);
  if (win) closeWin(win.winId);
}

// Right-click on dock items to close
document.getElementById('dock').addEventListener('contextmenu', e => {
  const item = e.target.closest('.dock-item[data-app-id]');
  if (!item) return;
  dockClose(item.dataset.appId, e);
});

// Long-press on dock items to close app (touch)
let dockLPTimer = null;
document.getElementById('dock').addEventListener('touchstart', e => {
  const item = e.target.closest('.dock-item[data-app-id]');
  if (!item) return;
  const appId = item.dataset.appId;
  dockLPTimer = setTimeout(() => {
    const win = openWindows.find(w => w.appId === appId && !w.closed);
    if (win) {
      navigator.vibrate && navigator.vibrate(50);
      closeWin(win.winId);
    }
  }, 500);
}, { passive: true });
document.getElementById('dock').addEventListener('touchend', () => clearTimeout(dockLPTimer), { passive: true });
document.getElementById('dock').addEventListener('touchmove', () => clearTimeout(dockLPTimer), { passive: true });

function focusWindow(winId) {
  const w = document.getElementById(winId);
  if (w) w.style.zIndex = ++nextZ;
}

function editWin(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    // Closing — stop all polling
    epStopAllPolling(winId);
    panel.style.display = 'none';
    return;
  }
  // Opening
  panel.style.display = 'flex';
  if (!panel._epState) epInitState(panel);
  const appId = panel.dataset.appid;
  loadEditChat(winId, appId);
  loadTemplateDropdown(winId);
  loadAccountsList(winId);
  loadAgentsList(winId);
  loadSkillsList(winId);
  loadMcpServers(winId);
  loadAppLinks(winId);
  renderEditActions(winId, appId);
  document.getElementById('edit-inp-' + winId)?.focus();
  // Load kanban data in background
  epLoadPlanMd(winId, appId);
  // SSE listener for live edit-chat updates (agent writes to chat)
  if (!panel._sseSetup) {
    panel._sseSetup = true;
    const chatSSE = new EventSource('/sse/' + appId);
    chatSSE.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'change' && d.file === 'edit-chat.json' && !panel._polling) loadEditChat(winId, appId);
        // Reload kanban/files when app files change (worker creates PLAN.md etc.)
        if (d.type === 'change' && panel._epState) {
          // Always reload kanban data so it's ready when user switches tab
          epLoadPlanMd(winId, appId);
          const tab = panel._epState.activeTab;
          if (tab === 'files') epLoadFile(winId, panel._epState.activeFile || 'PLAN.md');
        }
      } catch {}
    };
    panel._chatSSE = chatSSE;
  }
}

function renderTplMiniGraph(tpl) {
  const phases = (tpl.agents?.phases || []).map(p => p.charAt(0).toUpperCase() + p.slice(1));
  if (tpl.deploySteps?.length) phases.push('Deploy');
  phases.push('Git');
  const count = phases.length;
  if (!count) return '';

  const cx = 100, cy = 95, radius = 65;
  const colors = { Planning:'#3498db', Coding:'#e67e22', Testing:'#9b59b6', Review:'#f1c40f', Deploy:'#27ae60', Git:'#95a5a6' };
  const icons = { Planning:'📋', Coding:'⚡', Testing:'🧪', Review:'🔍', Deploy:'🚀', Git:'📊' };

  // Map phases to agent names for labels
  const agentMap = { Planning: tpl.agents?.planAgent, Coding: tpl.agents?.codeAgent, Testing: tpl.agents?.testAgent, Review: tpl.agents?.reviewAgent, Deploy: 'deploy', Git: 'git' };

  let lines = '', nodes = '';
  phases.forEach((phase, i) => {
    const angle = (-Math.PI / 2) + (i / count) * 2 * Math.PI;
    const x = Math.round(cx + radius * Math.cos(angle));
    const y = Math.round(cy + radius * Math.sin(angle));
    const color = colors[phase] || '#95a5a6';
    const icon = icons[phase] || '⚙';
    const agentName = agentMap[phase] || phase.toLowerCase();
    lines += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x + '" y2="' + y + '" stroke="' + color + '" stroke-width="1" opacity="0.3"/>';
    nodes += '<g transform="translate(' + x + ',' + y + ')"><circle r="16" fill="' + color + '11" stroke="' + color + '" stroke-width="1.5"/><text x="0" y="-1" text-anchor="middle" fill="' + color + '" font-size="10">' + icon + '</text><text x="0" y="9" text-anchor="middle" fill="' + color + '" font-size="5" font-weight="600">' + agentName + '</text></g>';
  });

  // Check for missing agents
  const agentNames = [tpl.agents?.planAgent, tpl.agents?.codeAgent, tpl.agents?.testAgent, tpl.agents?.reviewAgent].filter(Boolean);
  let missingHtml = '';
  // We'll check asynchronously and update — for now show the graph
  // The missing check happens in renderTemplateDetails caller via _checkMissingAgents

  return '<div class="ep-tpl-group"><div class="ep-tpl-group-title">Agent Graph</div>' +
    '<svg viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:160px;">' +
    lines +
    '<g transform="translate(' + cx + ',' + cy + ')"><circle r="20" fill="rgba(78,205,196,0.08)" stroke="#4ecdc4" stroke-width="1.5"/><text x="0" y="-2" text-anchor="middle" fill="#4ecdc4" font-size="11">🎯</text><text x="0" y="8" text-anchor="middle" fill="#4ecdc4" font-size="5.5" font-weight="700">Orchestrator</text></g>' +
    nodes + '</svg>' +
    '<div class="ep-tpl-missing-agents"></div>' +
    '</div>';
}

// Check missing agents async and show warnings
async function checkMissingAgents(winId, tpl) {
  const container = document.querySelector('#ep-tpl-details-' + winId + ' .ep-tpl-missing-agents');
  if (!container) return;
  try {
    const r = await fetch('/api/agent-system/agents');
    const data = await r.json();
    const existing = new Set((data.agents || []).map(a => a.name));
    const referenced = [tpl.agents?.planAgent, tpl.agents?.codeAgent, tpl.agents?.testAgent, tpl.agents?.reviewAgent].filter(Boolean);
    const missing = referenced.filter(n => !existing.has(n));
    if (missing.length) {
      container.innerHTML = missing.map(name =>
        '<div style="display:flex;align-items:center;gap:4px;padding:3px 0;font-size:9px;">' +
          '<span style="color:#e74c3c;">⚠ Agent "' + name + '" fehlt</span>' +

        '</div>'
      ).join('');
    }
  } catch {}
}

  ],

    { name: 'Railway Deploy', action: 'railway-deploy', command: 'railway up --detach', description: 'App auf Railway deployen', urlPattern: 'https://pulse-app-${appId}-production.up.railway.app' }
  ],
  'vercel': [

  ]

function addTplDeployStep(winId, preset) {
  if (!_tplEditDeploySteps[winId]) {
    const tpls = _tplCache[winId] || [];
    const selId = document.getElementById('edit-tpl-' + winId)?.value;
    const tpl = tpls.find(t => t.id === selId);
    _tplEditDeploySteps[winId] = [...(tpl?.deploySteps || [])];
  }
  const steps = _tplEditDeploySteps[winId];
  const presetSteps = _deployStepPresets[preset] || [];
  for (const s of presetSteps) {
    if (!steps.some(existing => existing.action === s.action)) steps.push(s);
  }
  _renderDeploySteps(winId);
}

function removeTplDeployStep(winId, index) {
  if (!_tplEditDeploySteps[winId]) {
    const tpls = _tplCache[winId] || [];
    const selId = document.getElementById('edit-tpl-' + winId)?.value;
    const tpl = tpls.find(t => t.id === selId);
    _tplEditDeploySteps[winId] = [...(tpl?.deploySteps || [])];
  }
  _tplEditDeploySteps[winId].splice(index, 1);
  _renderDeploySteps(winId);
}

function _renderDeploySteps(winId) {
  const el = document.getElementById('tpl-ed-deploysteps-' + winId);
  if (!el) return;
  const steps = _tplEditDeploySteps[winId] || [];
  el.innerHTML = steps.length
    ? steps.map((s, i) =>
        '<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);">' +
        '<span style="flex:1;">' + (i+1) + '. ' + s.name + ' <span style="color:var(--text-dim);">(' + s.action + ')</span></span>' +
        '<button onclick="removeTplDeployStep(\'' + winId + '\',' + i + ')" style="border:none;background:none;color:#e74c3c;cursor:pointer;font-size:10px;">✕</button></div>'
      ).join('')
    : '<div style="color:var(--text-dim);padding:3px 0;">Keine Deploy-Steps definiert</div>';
}

async function saveEditTemplate(winId, tplId) {
  const g = (id) => document.getElementById(id)?.value?.trim() || '';
  const update = {
    name: g('tpl-ed-name-' + winId),
    description: g('tpl-ed-desc-' + winId),
    icon: g('tpl-ed-icon-' + winId),
    stacks: g('tpl-ed-stacks-' + winId).split(/[,\s]+/).map(s => s.trim()).filter(s => s),
    agents: { phases: g('tpl-ed-phases-' + winId).split(/[,\s]+/).map(s => s.trim()).filter(s => s) },
    scaffold: { files: g('tpl-ed-scaffold-' + winId).split(/[,\s]+/).map(s => s.trim()).filter(s => s) },
    envVars: g('tpl-ed-envvars-' + winId).split('\n').filter(l => l.includes('=')).map(l => {
      const [key, ...rest] = l.split('=');
      return { key: key.trim(), required: true, description: rest.join('=').trim() };
    }),
    git: {
      autoBranch: document.getElementById('tpl-ed-branch-' + winId)?.checked || false,
      autoCommit: document.getElementById('tpl-ed-commit-' + winId)?.checked || false,
      autoPR: document.getElementById('tpl-ed-pr-' + winId)?.checked || false
    },
    monitoring: { logLevel: g('tpl-ed-loglevel-' + winId) || 'normal' },
    deploySteps: _tplEditDeploySteps[winId] || undefined
  };
  try {
    const r = await fetch('/api/templates/' + tplId, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(update)
    });
    const d = await r.json();
    if (d.ok) {
      // Close edit, refresh
      document.getElementById('ep-tpl-edit-' + winId).style.display = 'none';
      document.getElementById('ep-tpl-details-' + winId).style.display = '';
      // Invalidate cache and reload
      delete _tplCache[winId];
      delete _tplEditDeploySteps[winId];
      // Also exit template maker chat if active
      exitTemplateMakerMode(winId);
      loadTemplateDropdown(winId);
      // If template was already published, ask user if they want to push to GitHub
      const tpl = d.template;
      if (tpl && tpl.publishedAt && tpl.source) {
        if (confirm('Template lokal gespeichert.\n\nAuch auf GitHub aktualisieren?\n(' + tpl.source + ')')) {
          try {
            const pubRes = await fetch('/api/templates/' + tplId + '/publish', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
            const pubData = await pubRes.json();
            if (pubData.ok) { alert('Auf GitHub aktualisiert!'); }
            else { alert('GitHub-Push fehlgeschlagen: ' + (pubData.error || 'Unbekannt')); }
          } catch (pubErr) { alert('GitHub-Push fehlgeschlagen: ' + pubErr.message); }
        }
      }
    } else { alert('Fehler: ' + (d.error || 'Unbekannt')); }
  } catch (e) { alert('Fehler: ' + e.message); }
}

  } else {
    options = '<div style="padding:4px 8px;color:var(--text-dim);font-size:9px;font-weight:600;">TEMPLATE VERWALTEN</div>' +
      '<button class="tpl-del-option" onclick="deleteTemplateLocal(\'' + winId + '\',\'' + tplId + '\')">🗑 Lokal löschen' + (isPublished ? '<br><span style="font-size:8px;color:var(--text-dim);">Bleibt auf GitHub — kann neu installiert werden</span>' : '') + '</button>' +
      (isPublished ? '<button class="tpl-del-option" onclick="deleteTemplateGithub(\'' + winId + '\',\'' + tplId + '\')">📦 Von GitHub entfernen<br><span style="font-size:8px;color:var(--text-dim);">Bleibt lokal erhalten</span></button>' : '') +
      (isPublished ? '<button class="tpl-del-option" style="color:#e74c3c;" onclick="deleteTemplateBoth(\'' + winId + '\',\'' + tplId + '\')">⚠ Überall löschen<br><span style="font-size:8px;color:var(--text-dim);">Lokal + GitHub Repo</span></button>' : '') +
      '<hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">' +
      '<button class="tpl-del-option" onclick="publishTemplateFromMenu(\'' + winId + '\',\'' + tplId + '\')">' + (isPublished ? '🔄 Auf GitHub aktualisieren' : '📦 Auf GitHub publishen') + '<br><span style="font-size:8px;color:var(--text-dim);">Als pulse-template-' + tplId + '</span></button>';
  }
  menu.innerHTML = options;
  document.body.appendChild(menu);
  // Close on click outside
  setTimeout(() => document.addEventListener('click', function _close(e) {
    if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', _close); }
  }), 50);
}

  document.getElementById('tpl-delete-menu')?.remove();
  if (!confirm('Template "' + tplId + '" auf Defaults zurücksetzen? Alle Änderungen werden verworfen.')) return;
  try {
    // PUT with empty object — server will apply defaults
    await fetch('/api/templates/' + tplId, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ deploySteps: [], updatedAt: null })
    });
    document.getElementById('ep-tpl-edit-' + winId).style.display = 'none';
    document.getElementById('ep-tpl-details-' + winId).style.display = '';
    delete _tplCache[winId];
    loadTemplateDropdown(winId);
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function loadAppLinks(winId) {
  const el = document.getElementById('ep-app-links-' + winId);
  if (!el) return;
  const panel = document.getElementById('edit-' + winId);
  const appId = panel?.dataset?.appid;
  if (!appId) { el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Keine App</div>'; return; }
  try {
    const [appsRes, tplRes, profileRes] = await Promise.all([
      fetch('/api/apps').then(r => r.json()),
      fetch('/api/templates').then(r => r.json()),
      fetch('/api/profile').then(r => r.json()).catch(() => ({}))
    ]);
    const app = (appsRes.apps || []).find(a => a.id === appId) || {};
    const tpl = (tplRes.templates || []).find(t => t.id === (app.template || 'frontend'));
    const ghUser = profileRes.github || 'NastyFFM';
    const links = [];

    // PulseOS local
    links.push({ icon: '💻', label: 'PulseOS Lokal', url: 'http://localhost:3000/app/' + appId, badge: 'live', badgeText: 'Live' });

    // GitHub Repo
    if (app.source) {
      links.push({ icon: '📦', label: 'GitHub Repo', url: app.source, badge: 'repo', badgeText: 'Repo' });
    }

    // Deploy URL (Railway/Vercel)
    if (app.deployUrl) {
      links.push({ icon: '🚀', label: 'Deployed App', url: app.deployUrl, badge: 'live', badgeText: 'Live' });
    }
    if (app.railwayUrl) {
      links.push({ icon: '🚂', label: 'Railway', url: app.railwayUrl, badge: 'live', badgeText: 'Live' });
    }
    if (app.vercelUrl) {
      links.push({ icon: '▲', label: 'Vercel', url: app.vercelUrl, badge: 'live', badgeText: 'Live' });
    }

    // GitHub Pages — from deployResults, pagesUrl, or template deploySteps
    if (app.pagesUrl) {
      links.push({ icon: '🌐', label: 'GitHub Pages', url: app.pagesUrl, badge: 'live', badgeText: 'Pages' });
    } else {
      const ghPagesStep = (tpl?.deploySteps || []).find(s => s.action === 'github-pages');
      const ghPagesResult = (app.deployResults || []).find(r => r.action === 'github-pages' && r.success);
      if (ghPagesResult?.url) {
        links.push({ icon: '🌐', label: 'GitHub Pages', url: ghPagesResult.url, badge: 'live', badgeText: 'Pages' });
      } else if (ghPagesStep && app.source) {
        const repoName = app.source.split('/').pop() || ('pulse-app-' + appId);
        const ghPagesUrl = 'https://' + ghUser + '.github.io/' + repoName + '/';
        links.push({ icon: '🌐', label: 'GitHub Pages', url: ghPagesUrl, badge: 'live', badgeText: 'Pages' });
      } else if (ghPagesStep) {
        links.push({ icon: '🌐', label: 'GitHub Pages', url: null, badge: 'pending', badgeText: 'Noch nicht deployed' });
      }
    }

    // Railway Dashboard
    if (app.railwayProjectId) {
      links.push({ icon: '📊', label: 'Railway Dashboard', url: 'https://railway.com/project/' + app.railwayProjectId, badge: 'repo', badgeText: 'Dashboard' });
    }

    // Template deploy steps that haven't been deployed yet
    const deployedActions = new Set();
    if (app.source) deployedActions.add('github-publish');
    if (app.deployUrl || app.railwayUrl) deployedActions.add('railway-deploy');
    if (app.vercelUrl) deployedActions.add('vercel-deploy');
    if (app.pagesUrl) deployedActions.add('github-pages');
    // Also check deployResults
    for (const r of (app.deployResults || [])) {
      if (r.success) deployedActions.add(r.action);
    }

    for (const step of (tpl?.deploySteps || [])) {
      if (!deployedActions.has(step.action)) {
        links.push({ icon: '⏳', label: step.name + (step.stage > 1 ? ' (Stage ' + step.stage + ')' : ''), url: null, badge: 'pending', badgeText: 'Ausstehend' });
      }
    }

    if (!links.length) {
      el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Keine Links konfiguriert</div>';
      return;
    }

    el.innerHTML = links.map(l =>
      (l.url
        ? '<a class="ep-app-link" href="' + l.url + '" target="_blank">'
        : '<div class="ep-app-link" style="opacity:0.5;">') +
      '<span class="ep-app-link-icon">' + l.icon + '</span>' +
      '<div class="ep-app-link-info">' +
        '<div class="ep-app-link-label">' + l.label + '</div>' +
        (l.url ? '<div class="ep-app-link-url">' + l.url + '</div>' : '') +
      '</div>' +
      '<span class="ep-app-link-badge ' + l.badge + '">' + l.badgeText + '</span>' +
      (l.url ? '</a>' : '</div>')
    ).join('');
  } catch (e) {
    console.error('loadAppLinks error:', e);
    el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Fehler beim Laden</div>';
  }
}

async function loadAgentsList(winId) {
  const el = document.getElementById('ep-agents-' + winId);
  if (!el) return;
  try {
    const [agentsRes, tplRes] = await Promise.all([
      fetch('/api/agent-system/agents').then(r => r.json()),
      fetch('/api/templates').then(r => r.json())
    ]);
    const agents = agentsRes.agents || [];
    const templates = tplRes.templates || [];
    if (!agents.length) { el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Keine Agents gefunden</div>'; return; }

    // Build usage map: agent name → list of template names
    const usageMap = {};
    for (const t of templates) {
      const a = t.agents || {};
      for (const agentName of [a.planAgent, a.codeAgent, a.testAgent, a.reviewAgent].filter(Boolean)) {
        if (!usageMap[agentName]) usageMap[agentName] = [];
        usageMap[agentName].push(t.name || t.id);
      }
    }

    const icons = { planner:'📋', 'code-generator':'⚡', 'test-writer':'🧪', 'code-reviewer':'🔍', 'deploy-configurator':'🚀', 'progress-tracker':'📊' };

    el.innerHTML = agents.map(a => {
      const icon = icons[a.name] || '🤖';
      const used = usageMap[a.name] || [];
      const usedHint = used.length ? used.length + ' Template' + (used.length > 1 ? 's' : '') : '';
      return '<div class="ep-agent-card" id="ep-agent-' + winId + '-' + a.name + '">' +
        '<span class="ep-agent-icon" onclick="toggleAgentEdit(\'' + winId + '\',\'' + a.name + '\')">' + icon + '</span>' +
        '<div class="ep-agent-info" onclick="toggleAgentEdit(\'' + winId + '\',\'' + a.name + '\')">' +
          '<div class="ep-agent-name">' + a.name + (usedHint ? ' <span style="font-size:8px;color:var(--text-dim);font-weight:400;">(' + usedHint + ')</span>' : '') +
            ((a.skills && a.skills.length) ? ' ' + a.skills.map(s => '<span style="font-size:7px;padding:0 3px;border-radius:2px;background:rgba(78,205,196,0.12);color:var(--teal);">' + s + '</span>').join(' ') : '') +
          '</div>' +
          '<div class="ep-agent-desc">' + (a.description || '').slice(0, 80) + '</div>' +
        '</div>' +
        '<button onclick="event.stopPropagation(); deleteAgent(\'' + winId + '\',\'' + a.name + '\')" style="border:none;background:none;color:' + (used.length ? 'var(--text-dim)' : '#e74c3c') + ';cursor:pointer;font-size:11px;padding:2px 4px;opacity:0.5;" title="' + (used.length ? 'Verwendet von: ' + used.join(', ') : 'Agent löschen') + '">✕</button>' +
      '</div>';
    }).join('');
  } catch (e) {
    el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Fehler: ' + e.message + '</div>';
  }
}

async function toggleAgentEdit(winId, agentName) {
  const card = document.getElementById('ep-agent-' + winId + '-' + agentName);
  if (!card) return;
  // Toggle off if already editing
  const existing = card.querySelector('.ep-agent-edit-area');
  if (existing) { existing.remove(); card.classList.remove('editing'); return; }
  // Close other open editors
  card.parentElement.querySelectorAll('.ep-agent-edit-area').forEach(e => e.remove());
  card.parentElement.querySelectorAll('.ep-agent-card').forEach(c => c.classList.remove('editing'));

  card.classList.add('editing');
  // Load agent content + all skills
  try {
    const [agentRes, skillsRes] = await Promise.all([
      fetch('/api/agent-system/agents/' + agentName).then(r => r.json()),
      fetch('/api/agent-system/skills').then(r => r.json())
    ]);
    const content = agentRes.content || '';
    const allSkills = skillsRes.skills || [];
    // Parse assigned skills from frontmatter
    const skillsMatch = content.match(/skills:\n((?:\s+-\s+.+\n)*)/);
    const assignedSkills = new Set();
    if (skillsMatch) {
      skillsMatch[1].replace(/\s+-\s+(.+)/g, (_, s) => assignedSkills.add(s.trim()));
    }

    const skillListId = 'ep-skill-list-' + winId + '-' + agentName;
    const skillCheckboxes = allSkills.length
      ? '<div style="margin-top:4px;"><div style="font-size:8px;color:var(--text-dim);font-weight:600;margin-bottom:2px;">SKILLS ZUWEISEN:</div>' +
        '<input type="text" class="ep-filter-input" placeholder="Skill filtern..." oninput="epFilterList(this,\'' + skillListId + '\')" style="margin-bottom:3px;">' +
        '<div id="' + skillListId + '" style="display:flex;flex-wrap:wrap;gap:2px;max-height:120px;overflow-y:auto;">' +
        allSkills.map(s =>
          '<label style="display:inline-flex;align-items:center;gap:3px;font-size:8px;color:var(--text-dim);padding:2px 4px;border-radius:3px;border:1px solid var(--border);cursor:pointer;">' +
          '<input type="checkbox" class="ep-agent-skill-cb" data-skill="' + s.id + '"' + (assignedSkills.has(s.id) ? ' checked' : '') + ' style="width:10px;height:10px;"> ' + (s.name || s.id) +
          '</label>'
        ).join('') +
        '</div></div>'
      : '';

    const area = document.createElement('div');
    area.className = 'ep-agent-edit-area';
    area.innerHTML =
      '<textarea id="ep-agent-txt-' + winId + '-' + agentName + '">' + content.replace(/</g, '&lt;') + '</textarea>' +
      skillCheckboxes +
      '<div style="margin-top:4px;"><input id="ep-agent-improve-' + winId + '-' + agentName + '" placeholder="Anweisung zur Ueberarbeitung (z.B. \'Mache ihn strenger beim Review\')" style="width:100%;padding:4px 6px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:9px;box-sizing:border-box;"></div>' +
      '<div id="ep-agent-edit-status-' + winId + '-' + agentName + '" style="font-size:8px;color:var(--text-dim);margin-top:2px;min-height:12px;"></div>' +
      '<div class="ep-agent-edit-actions">' +
        '<button class="ep-agent-edit-btn ep-agent-cancel" onclick="event.stopPropagation(); toggleAgentEdit(\'' + winId + '\',\'' + agentName + '\')">Abbrechen</button>' +
        '<button class="ep-agent-edit-btn" onclick="event.stopPropagation(); regenerateAgent(\'' + winId + '\',\'' + agentName + '\')" style="background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border);">Ueberarbeiten</button>' +
        '<button class="ep-agent-edit-btn ep-agent-save" onclick="event.stopPropagation(); saveAgent(\'' + winId + '\',\'' + agentName + '\')">Speichern</button>' +
      '</div>';
    area.onclick = (e) => e.stopPropagation();
    card.appendChild(area);
  } catch (e) { console.error('toggleAgentEdit error:', e); }
}

async function regenerateAgent(winId, agentName) {
  const textarea = document.getElementById('ep-agent-txt-' + winId + '-' + agentName);
  const improveInput = document.getElementById('ep-agent-improve-' + winId + '-' + agentName);
  const statusEl = document.getElementById('ep-agent-edit-status-' + winId + '-' + agentName);
  const instruction = improveInput?.value.trim() || 'Verbessere diesen Agent';
  if (!textarea) return;
  statusEl.innerHTML = '<span style="animation:pulse 1s infinite;">Claude ueberarbeitet...</span>';
  statusEl.style.color = 'var(--teal)';
  try {
    const r = await fetch('/api/agent-system/agents/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: instruction + '\n\nUEBERARBEITE DIESEN BESTEHENDEN AGENT:\n' + textarea.value })
    });
    const d = await r.json();
    if (!d.ok || !d.sessionId) { statusEl.textContent = 'Fehler: ' + (d.error || 'fehlgeschlagen'); statusEl.style.color = '#e74c3c'; return; }
    const pollId = setInterval(async () => {
      try {
        const pr = await fetch('/api/agent-system/agents/generate/' + d.sessionId);
        const ps = await pr.json();
        if (ps.output) { textarea.value = ps.output; textarea.scrollTop = textarea.scrollHeight; }
        if (ps.status === 'done' || ps.status === 'error') {
          clearInterval(pollId);
          if (ps.status === 'done') { textarea.value = ps.result || ps.output; statusEl.textContent = 'Ueberarbeitet! Prüfe und klicke Speichern.'; }
          else { statusEl.textContent = 'Fehler: ' + (ps.error || 'fehlgeschlagen'); statusEl.style.color = '#e74c3c'; }
        }
      } catch {}
    }, 500);
    setTimeout(() => clearInterval(pollId), 60000);
  } catch (e) { statusEl.textContent = 'Fehler: ' + e.message; statusEl.style.color = '#e74c3c'; }
}

async function saveAgent(winId, agentName) {
  const textarea = document.getElementById('ep-agent-txt-' + winId + '-' + agentName);
  if (!textarea) return;
  let content = textarea.value;

  // Collect checked skills from checkboxes
  const card = document.getElementById('ep-agent-' + winId + '-' + agentName);
  const checkedSkills = [];
  if (card) {
    card.querySelectorAll('.ep-agent-skill-cb:checked').forEach(cb => checkedSkills.push(cb.dataset.skill));
  }

  // Update skills in frontmatter
  if (content.includes('---')) {
    // Remove existing skills block
    content = content.replace(/skills:\n((?:\s+-\s+.+\n)*)/, '');
    // Insert skills before closing ---
    if (checkedSkills.length) {
      const skillsBlock = 'skills:\n' + checkedSkills.map(s => '  - ' + s).join('\n') + '\n';
      content = content.replace(/---\n\n/, '---\n' + skillsBlock + '---\n\n');
      // If that didn't work (no double newline), try another pattern
      if (!content.includes(skillsBlock)) {
        const parts = content.split('---');
        if (parts.length >= 3) {
          content = '---' + parts[1] + skillsBlock + '---' + parts.slice(2).join('---');
        }
      }
    }
  }

  try {
    const r = await fetch('/api/agent-system/agents/' + agentName, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const d = await r.json();
    if (d.ok) {
      toggleAgentEdit(winId, agentName);
      loadAgentsList(winId);
    } else { alert('Fehler: ' + (d.error || 'Unbekannt')); }
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function deleteAgent(winId, agentName) {
  try {
    const r = await fetch('/api/agent-system/agents/' + agentName, { method: 'DELETE' });
    const d = await r.json();
    if (d.ok) {
      loadAgentsList(winId);
    } else if (d.usedBy) {
      alert('Agent "' + agentName + '" kann nicht gelöscht werden.\n\nVerwendet von Templates:\n• ' + d.usedBy.join('\n• '));
    } else {
      alert('Fehler: ' + (d.error || 'Unbekannt'));
    }
  } catch (e) { alert('Fehler: ' + e.message); }
}

function showCreateAgent(winId) {

async function generateAgent(winId) {
  const promptEl = document.getElementById('ep-agent-prompt-' + winId);
  const previewEl = document.getElementById('ep-agent-preview-' + winId);
  const contentEl = document.getElementById('ep-agent-gen-content-' + winId);
  const statusEl = document.getElementById('ep-agent-gen-status-' + winId);
  const btn = document.getElementById('ep-agent-gen-btn-' + winId);
  const prompt = promptEl?.value.trim();
  if (!prompt) return;

  // If preview is visible, this is the "Speichern" step
  if (previewEl.style.display !== 'none' && contentEl.value.trim()) {
    let content = contentEl.value.trim();
    // Strip markdown code fences if Claude wrapped it
    if (content.startsWith('```')) content = content.replace(/^```\w*\n/, '').replace(/\n```$/, '').trim();
    // Parse name from frontmatter
    const nameMatch = content.match(/name:\s*(.+)/);
    const name = nameMatch ? nameMatch[1].trim().replace(/['"]/g, '') : prompt.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30);
    try {
      // Try POST first (new agent), fall back to PUT (existing)
      let r = await fetch('/api/agent-system/agents', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content })
      });
      let d = await r.json();
      if (d.error && d.error.includes('existiert bereits')) {
        // Agent exists — update it
        r = await fetch('/api/agent-system/agents/' + name, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        d = await r.json();
      }
      if (d.ok) {
        document.getElementById('ep-agent-create-' + winId)?.remove();
        loadAgentsList(winId);
      } else {
        statusEl.textContent = 'Fehler: ' + (d.error || 'Unbekannt'); statusEl.style.color = '#e74c3c';
      }
    } catch (e) { statusEl.textContent = 'Fehler: ' + e.message; statusEl.style.color = '#e74c3c'; }
    return;
  }

  // Start Claude CLI generation (streaming)
  btn.textContent = 'Generiere...';
  btn.disabled = true;
  statusEl.innerHTML = '<span style="animation:pulse 1s infinite;">Claude generiert den Agent...</span>';
  statusEl.style.color = 'var(--teal)';
  previewEl.style.display = '';
  contentEl.value = '';

  try {
    const r = await fetch('/api/agent-system/agents/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const d = await r.json();
    if (!d.ok || !d.sessionId) {
      statusEl.textContent = 'Fehler: ' + (d.error || 'Start fehlgeschlagen');
      statusEl.style.color = '#e74c3c';
      btn.textContent = 'Generieren'; btn.disabled = false;
      return;
    }
    // Poll for streaming output
    const pollId = setInterval(async () => {
      try {
        const pr = await fetch('/api/agent-system/agents/generate/' + d.sessionId);
        const ps = await pr.json();
        if (ps.output) {
          contentEl.value = ps.output;
          contentEl.scrollTop = contentEl.scrollHeight;
          statusEl.innerHTML = '<span style="animation:pulse 1s infinite;">Claude schreibt... (' + ps.output.length + ' Zeichen)</span>';
        }
        if (ps.status === 'done' || ps.status === 'error') {
          clearInterval(pollId);
          if (ps.status === 'done') {
            contentEl.value = ps.result || ps.output;
            btn.textContent = 'Speichern';
            btn.disabled = false;
            statusEl.textContent = 'Agent generiert! Prüfe und klicke Speichern.';
          } else {
            statusEl.textContent = 'Fehler: ' + (ps.error || 'Generierung fehlgeschlagen');
            statusEl.style.color = '#e74c3c';
            btn.textContent = 'Generieren'; btn.disabled = false;
          }
        }
      } catch {}
    }, 500);
    // Timeout after 60s
    setTimeout(() => { clearInterval(pollId); if (btn.disabled) { btn.textContent = 'Generieren'; btn.disabled = false; statusEl.textContent = 'Timeout'; } }, 60000);
  } catch (e) {
    statusEl.textContent = 'Fehler: ' + e.message;
    statusEl.style.color = '#e74c3c';
    btn.textContent = 'Generieren'; btn.disabled = false;
  }
}

async function loadAccountsList(winId) {
  const el = document.getElementById('ep-accounts-' + winId);
  if (!el) return;
  try {
    const [stacksRes, envRes] = await Promise.all([
      fetch('/api/stacks').then(r => r.json()),
      fetch('/api/env').then(r => r.json())
    ]);
    const stacks = stacksRes.stacks || [];
    if (!stacks.length) { el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Keine Services konfiguriert</div>'; return; }
    el.innerHTML = stacks.map(s => {
      const vars = s.requiredEnvVars || [];
      const allSet = vars.length > 0 && vars.every(v => envRes[v]);
      const anySet = vars.some(v => envRes[v]);
      const status = vars.length === 0 ? 'ready' : (allSet ? 'ready' : 'missing');
      const tokenPreview = vars.map(v => {
        const val = envRes[v];
        if (!val) return v + ': nicht gesetzt';
        return v + ': ****' + val.slice(-6);
      }).join(' | ');
      return '<div class="ep-account-card">' +
        '<span class="ep-account-icon">' + (s.icon || '☁') + '</span>' +
        '<div class="ep-account-info">' +
          '<div class="ep-account-name">' + s.name + '</div>' +
          '<div class="ep-account-token">' + tokenPreview + '</div>' +
        '</div>' +
        '<div class="ep-account-status ' + status + '" title="' + (allSet ? 'Bereit' : 'Token fehlt') + '"></div>' +
        (anySet ? '<button class="ep-account-remove" onclick="removeAccount(\'' + winId + '\',\'' + s.id + '\')" title="Token entfernen">✗</button>' : '') +
      '</div>';
    }).join('');
  } catch (e) {
    console.error('loadAccountsList error:', e);
    el.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Fehler beim Laden</div>';
  }
}

async function removeAccount(winId, stackId) {
  if (!confirm('Token fuer diesen Service wirklich entfernen?')) return;
  try {
    const [stacksRes, envRes] = await Promise.all([
      fetch('/api/stacks').then(r => r.json()),
      fetch('/api/env').then(r => r.json())
    ]);
    const stack = (stacksRes.stacks || []).find(s => s.id === stackId);
    if (!stack) return;
    // Remove all env vars for this stack
    const vars = stack.requiredEnvVars || [];
    const updated = { ...envRes };
    vars.forEach(v => { delete updated[v]; });
    await fetch('/api/env', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updated)
    });
    // Reload accounts list and env textarea
    loadAccountsList(winId);
    // Also refresh the env textarea
    const textarea = document.getElementById('edit-envtxt-' + winId);
    if (textarea) {
      textarea.value = Object.entries(updated).map(([k,v]) => k + '=' + v).join('\n');
    }
  } catch (e) { console.error('removeAccount error:', e); }
}

async function loadTemplateDropdown(winId) {
  const select = document.getElementById('edit-tpl-' + winId);
  if (!select) return;
  try {
    // Get the app's saved template
    const editPanel = document.getElementById('edit-' + winId);
    const appId = editPanel?.dataset?.appid || '';
    let savedTemplate = 'frontend';
    if (appId) {
      try {
        const appsRes = await fetch('/api/apps');
        const appsData = await appsRes.json();
        const appObj = (appsData.apps || []).find(a => a.id === appId);
        if (appObj?.template) savedTemplate = appObj.template;
      } catch {}
    }
    // Use profile default template if no saved template
    if (savedTemplate === 'frontend') {
      try {
        const profileRes = await fetch('/api/profile');
        const profile = await profileRes.json();
        if (profile.defaultTemplate) savedTemplate = profile.defaultTemplate;
      } catch {}
    }
    const r = await fetch('/api/templates');
    const data = await r.json();
    const tpls = data.templates || [];
    _tplCache[winId] = tpls;
    if (tpls.length) {
      select.innerHTML = tpls.map(t =>
        '<option value="' + t.id + '"' + (t.id === savedTemplate ? ' selected' : '') + '>' + (t.icon || '') + ' ' + t.name + '</option>'
      ).join('');
      // Render details for selected template
      const selected = tpls.find(t => t.id === savedTemplate) || tpls[0];
      renderTemplateDetails(winId, selected);
      checkMissingAgents(winId, selected);
    } else {
      select.innerHTML = '<option value="frontend">PulseOS Frontend</option>';
    }
  } catch (e) {
    console.error('loadTemplateDropdown error:', e);
    select.innerHTML = '<option value="frontend">PulseOS Frontend</option>';
  }
}

async function saveTemplateChoice(winId, templateId) {
  const editPanel = document.getElementById('edit-' + winId);
  const appId = editPanel?.dataset?.appid;
  if (!appId || !templateId) return;
  // Get template stacks + render details
  let stacks = [];
  try {
    let tpls = _tplCache[winId];
    if (!tpls) {
      const r = await fetch('/api/templates');
      const data = await r.json();
      tpls = data.templates || [];
      _tplCache[winId] = tpls;
    }
    const tpl = tpls.find(t => t.id === templateId);
    if (tpl) {
      stacks = tpl.stacks || [];
      renderTemplateDetails(winId, tpl);
      checkMissingAgents(winId, tpl);
    }
  } catch {}
  // Save to app
  try {
    await fetch('/api/apps/' + appId + '/meta', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template: templateId, stacks })
    });
  } catch (e) { console.error('saveTemplateChoice error:', e); }
}

async function startTemplateMaker(winId) {
  const input = document.getElementById('tpl-prompt-input');
  const prompt = input?.value.trim();
  if (!prompt) return;
  const btn = document.getElementById('tpl-create-btn');
  btn.textContent = 'Starte...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/template-maker/start', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const d = await r.json();
    if (d.ok && d.sessionId) {
      document.getElementById('tpl-create-modal')?.remove();
      // Switch to chat tab in template-maker mode
      enterTemplateMakerMode(winId, d.sessionId);

      alert('Fehler: ' + (d.error || 'Unbekannt'));
      btn.textContent = 'Template Maker starten'; btn.disabled = false;
    }
  } catch (e) {
    alert('Fehler: ' + e.message);
    btn.textContent = 'Template Maker starten'; btn.disabled = false;

function enterTemplateMakerMode(winId, sessionId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel) return;
  if (!panel._epState) panel._epState = {};
  panel._epState.templateMakerSession = sessionId;

  // Switch to chat tab
  const tabs = panel.querySelectorAll('.ep-tab');
  const panels = panel.querySelectorAll('.ep-tab-panel');
  tabs.forEach(t => t.classList.toggle('active', t.dataset.eptab === 'chat'));
  panels.forEach(p => p.classList.toggle('active', p.dataset.eptab === 'chat'));

  // Show template-maker banner in chat area
  const msgsEl = document.getElementById('edit-msgs-' + winId);
  if (msgsEl) {
    msgsEl.innerHTML = '<div class="tm-banner">📋 Template Maker <button class="tm-exit-btn" onclick="exitTemplateMakerMode(\'' + winId + '\')">✕ Beenden</button></div>';
  }

  // Load initial messages
  tmPollMessages(winId, sessionId);

  // Start polling
  panel._epState.tmPollTimer = setInterval(() => tmPollMessages(winId, sessionId), 2000);
}

function exitTemplateMakerMode(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel?._epState) return;
  clearInterval(panel._epState.tmPollTimer);
  panel._epState.templateMakerSession = null;
  panel._epState.tmPollTimer = null;
  delete _tmLastMsgHash[winId];
  // Restore normal chat
  const msgsEl = document.getElementById('edit-msgs-' + winId);
  if (msgsEl) msgsEl.innerHTML = '<div class="edit-welcome">Was moechtest du aendern?</div>';
  // Refresh template dropdown
  loadTemplateDropdown(winId);
  loadAccountsList(winId);
}

let _tmLastMsgHash = {};

async function tmPollMessages(winId, sessionId) {
  try {
    const r = await fetch('/api/template-maker/' + sessionId);
    const session = await r.json();
    if (!session.messages) return;

    // Build a hash from message count + last message text to detect any change
    const lastMsg = session.messages[session.messages.length - 1];
    const hash = session.messages.length + ':' + (lastMsg?.text || '').slice(0, 50) + ':' + (lastMsg?.pending || false);
    if (_tmLastMsgHash[winId] === hash) return;
    _tmLastMsgHash[winId] = hash;

    const msgsEl = document.getElementById('edit-msgs-' + winId);
    if (!msgsEl) return;

    // Re-render all messages (keep banner)
    let html = '<div class="tm-banner">📋 Template Maker' +
      (session.status === 'done' ? ' — Fertig!' : ' — Schritt: ' + session.step) +
      '<button class="tm-exit-btn" onclick="exitTemplateMakerMode(\'' + winId + '\')">✕ Beenden</button></div>';

    for (const msg of session.messages) {
      if (msg.pending) {
        // Show thinking indicator
        html += '<div class="edit-msg-agent" style="opacity:0.5;font-style:italic;">' + msg.text + '</div>';
        continue;
      }
      const cls = msg.from === 'agent' ? 'edit-msg-agent' : 'edit-msg-user';
      // Parse markdown-like formatting
      let text = msg.text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      // Render quick-reply buttons
      text = text.replace(/\[BUTTON:([^\]]+)\]/g, (_, label) =>
        '<button class="tm-quick-btn" onclick="tmQuickReply(\'' + winId + '\',\'' + sessionId + '\',\'' + label.replace(/'/g, "\\'") + '\')">' + label + '</button>'
      );
      html += '<div class="' + cls + '">' + text + '</div>';
    }

    msgsEl.innerHTML = html;
    msgsEl.scrollTop = msgsEl.scrollHeight;

    // If done, auto-refresh template dropdown
    if (session.status === 'done') {
      clearInterval(document.getElementById('edit-' + winId)?._epState?.tmPollTimer);
      loadTemplateDropdown(winId);
    }
  } catch (e) { console.error('tmPollMessages error:', e); }
}

async function tmSendMessage(winId) {
  const panel = document.getElementById('edit-' + winId);
  const sessionId = panel?._epState?.templateMakerSession;
  if (!sessionId) return;
  const inp = document.getElementById('edit-inp-' + winId);

  } catch (e) { console.error('tmSendMessage error:', e); }
}

async function sendEdit(winId) {
  // If template-maker mode is active, route to TM
  const tmPanel = document.getElementById('edit-' + winId);
  if (tmPanel?._epState?.templateMakerSession) { tmSendMessage(winId); return; }

  const input = document.getElementById('edit-inp-' + winId);
  let text = input?.value.trim();
  if (!text) return;
  input.value = '';
  const panel = document.getElementById('edit-' + winId);
  const appId = panel?.dataset.appid;
  if (!appId) return;
  const msgs = document.getElementById('edit-msgs-' + winId);
  const tpl = document.getElementById('edit-tpl-' + winId)?.value || 'frontend';

  // Auto-enrich deploy/publish keywords with template context
  const lower = text.toLowerCase();
  if (lower.match(/\b(deploy|publish|veröffentlich|release|ship)\b/) && !lower.includes('template')) {
    const tplSelect = document.getElementById('edit-tpl-' + winId);
    const tplName = tplSelect?.options[tplSelect.selectedIndex]?.textContent || tpl;
    text = text + ' (Template: ' + tplName + ')';
  }

  // Show user message
  const userDiv = document.createElement('div');
  userDiv.className = 'edit-msg-user';
  userDiv.textContent = text;
  msgs.appendChild(userDiv);

  // Show spinner + block SSE reload during worker
  const editPanel = document.getElementById('edit-' + winId);
  if (editPanel) editPanel._polling = true;
  const spinner = document.createElement('div');
  spinner.className = 'edit-spinner';
  spinner.textContent = '⏳ Worker arbeitet...';
  msgs.appendChild(spinner);
  msgs.scrollTop = msgs.scrollHeight;

  // Save to edit-chat history
  const chatMsg = { from: 'user', text, time: new Date().toISOString() };
  try {
    const existing = await fetch('/app/' + appId + '/api/edit-chat').then(r => r.ok ? r.json() : { messages: [] }).catch(() => ({ messages: [] }));
    existing.messages = existing.messages || [];
    existing.messages.push(chatMsg);
    await fetch('/app/' + appId + '/api/edit-chat', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(existing) });
  } catch {}

  // Send to worker — smart autodetect: orchestrated for big changes, quick for small edits
  const editPanelEl = document.getElementById('edit-' + winId);
  const isNewApp = editPanelEl && editPanelEl.dataset.newapp === 'true';
  const textLower = text.toLowerCase();
  const orchestrateKeywords = ['erstelle', 'baue', 'füge hinzu', 'integriere', 'auth', 'api', 'deploy', 'refactor', 'neue funktion', 'feature', 'komplett', 'umbauen', 'add', 'create', 'build', 'implement'];
  const quickKeywords = ['ändere', 'fixe', 'farbe', 'color', 'text', 'größe', 'size', 'position', 'style', 'css', 'font', 'margin', 'padding', 'border', 'icon', 'titel', 'title'];
  const wantsOrchestrate = isNewApp || orchestrateKeywords.some(k => textLower.includes(k));
  const wantsQuick = quickKeywords.some(k => textLower.includes(k));
  const useOrchestrated = wantsOrchestrate && !wantsQuick;
  if (isNewApp) editPanelEl.dataset.newapp = 'false';
  const appInfo = state.apps?.find(a => a.id === appId);
  const isStandalone = appInfo?.standalone || false;
  try {
    const workerBody = useOrchestrated
      ? { task: 'Erstelle/Erweitere die App "' + appId + '": ' + text, model: 'sonnet', appId, template: tpl, orchestrated: true, standalone: isStandalone }
      : { task: 'Modifiziere die App "' + appId + '": ' + text, model: 'sonnet', appId, template: tpl, editMode: true, standalone: isStandalone };
    const r = await fetch('/api/workers', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(workerBody)
    });
    const d = await r.json();
    if (d.ok && d.worker) {
      // Poll worker status
      const workerId = d.worker.id;
      // Safety timeout: clear spinner after 5 min max
      const pollTimeout = setTimeout(() => { clearInterval(pollEdit); try { spinner.remove(); } catch {} if (editPanel) editPanel._polling = false; }, 300000);
      const pollEdit = setInterval(async () => {
        try {
          const wr = await fetch('/api/workers/' + workerId);
          const w = await wr.json();
          // Show live progress in spinner (with phases if orchestrated)
          if (spinner.parentNode) {
            if (w.phases && w.phases.length > 0) {
              const phaseIcons = w.phases.map(p => p.status === 'done' ? '✅' : p.status === 'running' ? '⏳' : '⬜').join('');
              const currentPhase = w.phases.find(p => p.status === 'running') || w.phases[w.phases.length - 1];
              spinner.innerHTML = '<div style="font-size:11px;">' + phaseIcons + '</div><div>' + (w.progress || currentPhase?.name || 'Arbeitet...') + '</div>';
            } else if (w.progress) {
              spinner.textContent = '⏳ ' + w.progress;
            }
          }
          if (w.status === 'done') {
            clearTimeout(pollTimeout);
            clearInterval(pollEdit);
            if (editPanel) editPanel._polling = false;
            spinner.remove();
            const agentDiv = document.createElement('div');
            agentDiv.className = 'edit-msg-agent';
            agentDiv.innerHTML = renderChatMarkdown('✅ ' + (w.result || 'Fertig!'));
            msgs.appendChild(agentDiv);
            msgs.scrollTop = msgs.scrollHeight;
            // Save agent response
            try {
              const existing = await fetch('/app/' + appId + '/api/edit-chat').then(r => r.ok ? r.json() : { messages: [] }).catch(() => ({ messages: [] }));
              existing.messages.push({ from: 'agent', text: w.result || 'Fertig', time: new Date().toISOString() });
              await fetch('/app/' + appId + '/api/edit-chat', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(existing) });
            } catch {}
            // Reload iframe
            const win = document.getElementById(winId);
            const iframe = win?.querySelector('iframe');
            if (iframe) { const base = iframe.src.split('?')[0]; iframe.src = base + '?_t=' + Date.now(); }
          } else if (w.status === 'error') {
            clearTimeout(pollTimeout);
            clearInterval(pollEdit);
            if (editPanel) editPanel._polling = false;
            spinner.remove();
            const errDiv = document.createElement('div');
            errDiv.className = 'edit-msg-agent';
            errDiv.textContent = '❌ ' + (w.result || 'Fehler');
            msgs.appendChild(errDiv);
            msgs.scrollTop = msgs.scrollHeight;
          }
        } catch {}
      }, 5000);
    } else {
      // Worker creation failed or no worker returned
      if (editPanel) editPanel._polling = false;
      spinner.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'edit-msg-agent';
      errDiv.textContent = '❌ ' + (d.error || 'Worker konnte nicht gestartet werden');
      msgs.appendChild(errDiv);
    }
  } catch (e) {
    if (editPanel) editPanel._polling = false;
    spinner.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'edit-msg-agent';
    errDiv.textContent = '❌ ' + e.message;
    msgs.appendChild(errDiv);
  }
}
