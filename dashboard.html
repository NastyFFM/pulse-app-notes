// Dynamic phases — loaded from template, with fallback defaults
let EP_PHASES = ['Planning', 'Coding', 'Testing', 'Review', 'Git'];
let EP_PHASE_AGENT = { Planning:'planner', Coding:'code-generator', Testing:'test-writer', Review:'code-reviewer', Git:'progress-tracker' };

const EP_PHASE_ICONS = { planning:'📋', coding:'⚡', testing:'🧪', review:'🔍', deploy:'🚀', git:'📊' };
const EP_PHASE_COLORS = { planning:'#3498db', coding:'#e67e22', testing:'#9b59b6', review:'#f1c40f', deploy:'#27ae60', git:'#95a5a6' };

function epLoadPhaseConfig(winId) {
  // Try to get template phases from cache
  const tpls = _tplCache[winId] || [];
  const panel = document.getElementById('edit-' + winId);
  const appId = panel?.dataset?.appid;
  if (!appId || !tpls.length) return;

  // Find app's template
  try {
    const app = state.apps?.find(a => a.id === appId);
    const tpl = app?.template ? tpls.find(t => t.id === app.template) : tpls[0];
    if (tpl?.agents?.phases) {
      const phases = tpl.agents.phases.map(p => p.charAt(0).toUpperCase() + p.slice(1));
      if (tpl.deploySteps?.length) phases.push('Deploy');
      phases.push('Git');
      EP_PHASES = phases;

      EP_PHASE_AGENT = {};
      const agentMap = { Planning: tpl.agents.planAgent, Coding: tpl.agents.codeAgent, Testing: tpl.agents.testAgent, Review: tpl.agents.reviewAgent };
      for (const p of phases) {
        EP_PHASE_AGENT[p] = agentMap[p] || p.toLowerCase();
      }
      EP_PHASE_AGENT.Deploy = 'deploy-configurator';
      EP_PHASE_AGENT.Git = 'progress-tracker';
    }
  } catch {}
}

function epRenderDynamicGraph(winId) {
  const container = document.getElementById('ep-graph-container-' + winId);
  if (!container) return;
  epLoadPhaseConfig(winId);

  const agents = EP_PHASES.filter(p => p !== 'Git'); // Git is implicit
  const count = agents.length;
  const cx = 150, cy = 140, radius = 90;

  let lines = '', nodes = '';
  agents.forEach((phase, i) => {
    const angle = (-Math.PI / 2) + (i / count) * 2 * Math.PI;
    const x = Math.round(cx + radius * Math.cos(angle));
    const y = Math.round(cy + radius * Math.sin(angle));
    const phaseLower = phase.toLowerCase();
    const color = EP_PHASE_COLORS[phaseLower] || '#95a5a6';
    const icon = EP_PHASE_ICONS[phaseLower] || '⚙';
    const agentName = EP_PHASE_AGENT[phase] || phaseLower;

    lines += '<line data-agent="' + agentName + '" class="ep-graph-line idle" x1="' + cx + '" y1="' + cy + '" x2="' + x + '" y2="' + y + '"/>';
    nodes += '<g data-agent="' + agentName + '" class="ep-graph-node idle" transform="translate(' + x + ',' + y + ')"><circle r="22" fill="' + color + '11" stroke="' + color + '" stroke-width="2"/><text x="0" y="-2" text-anchor="middle" fill="' + color + '" font-size="12">' + icon + '</text><text x="0" y="10" text-anchor="middle" fill="' + color + '" font-size="7" font-weight="600">' + phase + '</text></g>';
  });

  container.innerHTML = '<svg class="ep-graph-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">' +
    '<g class="ep-graph-lines">' + lines + '</g>' +
    '<g data-agent="orchestrator" class="ep-graph-node idle" transform="translate(' + cx + ',' + cy + ')"><circle r="28" fill="rgba(78,205,196,0.08)" stroke="#4ecdc4" stroke-width="2"/><text x="0" y="-3" text-anchor="middle" fill="#4ecdc4" font-size="14">🎯</text><text x="0" y="11" text-anchor="middle" fill="#4ecdc4" font-size="8" font-weight="700">Orchestrator</text></g>' +
    nodes + '</svg>';
}

function epFmtTime(ts) {
  if (!ts) return '--:--';
  return new Date(ts).toTimeString().slice(0, 8);
}
function epFmtDuration(startedAt) {
  if (!startedAt) return '';
  const secs = Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000);
  return secs < 60 ? secs + 's' : Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
}
function epDetectPhase(worker) {
  // 1. Check explicit phases array from worker API (most reliable)
  if (Array.isArray(worker.phases) && worker.phases.length) {
    const running = worker.phases.find(p => p.status === 'running');
    if (running) {
      const name = running.name.replace(/\+.*/, '').trim(); // "Git+PR" → "Git"
      const capitalized = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
      if (EP_PHASES.includes(capitalized)) return capitalized;
      if (EP_PHASES.includes(name)) return name;
    }
    // If no running, find last done
    const donePhases = worker.phases.filter(p => p.status === 'done');
    if (donePhases.length) {
      const last = donePhases[donePhases.length - 1];
      const name = last.name.replace(/\+.*/, '').trim();
      const capitalized = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
      if (EP_PHASES.includes(capitalized)) return capitalized;
      if (EP_PHASES.includes(name)) return name;
    }
  }
  // 2. Check explicit phase field
  if (worker.phase) { const ph = worker.phase.charAt(0).toUpperCase() + worker.phase.slice(1).toLowerCase(); if (EP_PHASES.includes(ph)) return ph; }
  // 3. Fallback: detect from progress text and log
  const prog = (worker.progress || '').toLowerCase();
  const log = (Array.isArray(worker.log) ? worker.log.map(l => typeof l === 'string' ? l : l.text || '').join(' ') : '').toLowerCase();
  const text = prog + ' ' + log;
  if (text.includes('git') || text.includes('commit') || text.includes('push')) return 'Git';
  if (text.includes('review') || text.includes('prüf')) return 'Review';
  if (text.includes('test') || text.includes('playwright')) return 'Test';
  if (text.includes('code') || text.includes('implement') || text.includes('generier') || text.includes('schreib')) return 'Code';
  if (text.includes('plan') || text.includes('erstell')) return 'Plan';
  return 'Plan'; // default to Plan (first phase) not Code
}
function epPhaseIndex(phase) { return EP_PHASES.indexOf(phase); }
function epCalcProgress(worker) {
  if (worker.status === 'done' || worker.status === 'error') return 100;
  return Math.round(((epPhaseIndex(epDetectPhase(worker)) + 0.5) / EP_PHASES.length) * 100);
}
function epDetectLogLevel(line) {
  const l = line.toLowerCase();
  if (l.includes('error') || l.includes('fail')) return 'error';
  if (l.includes('warn')) return 'warn';
  if (l.includes('done') || l.includes('finish') || l.includes('success')) return 'done';
  if (l.includes('start') || l.includes('init') || l.includes('begin')) return 'start';
  return 'info';
}

/* ── Tab Switching + Polling Lifecycle ── */
function epSwitchTab(winId, tabName) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel) return;
  if (!panel._epState) epInitState(panel);
  panel._epState.activeTab = tabName;

  // Toggle tab buttons
  panel.querySelectorAll('.ep-tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.eptab === tabName));
  // Toggle tab panels
  panel.querySelectorAll('.ep-tab-panel').forEach(p => p.classList.toggle('active', p.dataset.eptab === tabName));

  const appId = panel.dataset.appid;

  // Start/stop polling based on tab
  epStopAllPolling(winId);
  if (tabName === 'monitor' || tabName === 'graph' || tabName === 'kanban') {
    epStartWorkerPoll(winId);
    if (tabName === 'graph') epRenderDynamicGraph(winId);
    if (tabName === 'kanban') epLoadPlanMd(winId, panel.dataset.appid); // always fresh load
  } else if (tabName === 'git') {
    epStartGitPoll(winId);
  } else if (tabName === 'files') {
    if (!panel._epState.filesLoaded) {
      panel._epState.filesLoaded = true;
      epLoadFile(winId, 'PLAN.md');
    }
  } else if (tabName === 'settings') {
    loadTemplateDropdown(winId);
    epLoadEnvVars(winId, panel.dataset.appid);
  }
}

function epInitState(panel) {
  panel._epState = {
    activeTab: 'chat',
    workers: [],
    logEntries: [],
    logKeys: new Set(),
    kanbanTasks: [],
    gitData: null,
    activeFile: 'PLAN.md',
    filesLoaded: false,
    timers: { workers: null, git: null }
  };
}

function epStartWorkerPoll(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  if (panel._epState.timers.workers) return; // already polling
  epPollWorkers(winId); // immediate first poll
  panel._epState.timers.workers = setInterval(() => epPollWorkers(winId), 3000);
}

function epStartGitPoll(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  if (panel._epState.timers.git) return;
  epPollGit(winId);
  panel._epState.timers.git = setInterval(() => epPollGit(winId), 10000);
}

function epStopAllPolling(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  if (panel._epState.timers.workers) { clearInterval(panel._epState.timers.workers); panel._epState.timers.workers = null; }
  if (panel._epState.timers.git) { clearInterval(panel._epState.timers.git); panel._epState.timers.git = null; }
}

/* ── Monitor Tab ── */
async function epPollWorkers(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  try {
    const res = await fetch('/api/workers');
    if (!res.ok) return;
    const data = await res.json();
    const all = Array.isArray(data) ? data : (data.workers || []);
    const appId = panel.dataset.appid;
    // Filter workers relevant to this app
    const workers = all.filter(w => !appId || w.appId === appId || (w.task && w.task.includes(appId)));
    panel._epState.workers = workers;

    const tab = panel._epState.activeTab;
    if (tab === 'monitor') { epRenderMonitor(winId, workers); epAppendLogs(winId, workers); }
    if (tab === 'graph') epRenderGraph(winId, all); // graph shows all agents
    if (tab === 'kanban') epRenderKanban(winId);
  } catch {}
}

function epRenderMonitor(winId, workers) {
  const el = document.getElementById('ep-workers-' + winId);
  if (!el) return;
  const esc = escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));

  if (!workers.length) {
    el.innerHTML = '<div class="ep-empty"><div class="icon">🤖</div>Keine aktiven Worker</div>';
    return;
  }
  const sorted = [...workers].sort((a, b) => {
    if (a.status === 'running' && b.status !== 'running') return -1;
    if (b.status === 'running' && a.status !== 'running') return 1;
    return (b.startedAt || '').localeCompare(a.startedAt || '');
  }).slice(0, 10);

  el.innerHTML = sorted.map(w => {
    const st = w.status || 'pending';
    const phase = epDetectPhase(w);
    const phIdx = epPhaseIndex(phase);
    const prog = epCalcProgress(w);
    const phases = EP_PHASES.map((p, i) => {
      let cls = 'pending';
      if (st === 'done') cls = 'done';
      else if (i < phIdx) cls = 'done';
      else if (i === phIdx && st === 'running') cls = 'running';
      const icon = cls === 'done' ? '✓' : (cls === 'running' ? '⏳' : '○');
      return '<div class="ep-phase-step ' + cls + '"><div class="ep-phase-circle">' + icon + '</div><div class="ep-phase-label">' + esc(p) + '</div></div>';
    }).join('');
    const dur = w.startedAt ? epFmtDuration(w.startedAt) : '';
    return '<div class="ep-worker-card ' + esc(st) + '">' +
      '<div class="ep-worker-header"><span class="ep-status-badge ' + esc(st) + '">' + esc(st) + '</span><span class="ep-worker-task">' + esc(w.task || w.appId || 'Worker') + '</span></div>' +
      '<div class="ep-worker-meta"><span>🤖 ' + esc(w.model || 'sonnet') + '</span>' + (dur ? '<span>⏱ ' + dur + '</span>' : '') + '</div>' +
      '<div class="ep-phase-bar">' + phases + '</div>' +
      '<div class="ep-progress-track"><div class="ep-progress-fill ' + esc(st) + '" style="width:' + prog + '%"></div></div>' +
    '</div>';
  }).join('');
}

function epAppendLogs(winId, workers) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  const st = panel._epState;
  const esc = escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));

  workers.forEach(w => {
    const logArr = Array.isArray(w.log) ? w.log : [];
    logArr.slice(-3).forEach(logItem => {
      const text = (typeof logItem === 'string' ? logItem : (logItem.text || '')).trim();
      if (!text) return;
      const entry = {
        time: logItem.time ? epFmtTime(new Date(logItem.time)) : epFmtTime(new Date()),
        workerId: (w.id || w.appId || '?').slice(-8),
        text, level: epDetectLogLevel(text)
      };
      const key = entry.workerId + '|' + entry.text;
      if (!st.logKeys.has(key)) {
        st.logKeys.add(key);
        st.logEntries.push(entry);
        if (st.logEntries.length > 20) { const rm = st.logEntries.shift(); st.logKeys.delete(rm.workerId + '|' + rm.text); }
      }
    });
  });

  const el = document.getElementById('ep-log-' + winId);
  if (!el) return;
  if (!st.logEntries.length) {
    el.innerHTML = '<div class="ep-log-entry"><span class="ep-log-time">--:--:--</span><span class="ep-log-text info">Warte auf Worker...</span></div>';
    return;
  }
  el.innerHTML = st.logEntries.map(e =>
    '<div class="ep-log-entry"><span class="ep-log-time">' + esc(e.time) + '</span><span class="ep-log-wid">[' + esc(e.workerId) + ']</span><span class="ep-log-text ' + esc(e.level) + '">' + esc(e.text) + '</span></div>'
  ).join('');
  el.scrollTop = el.scrollHeight;
}

/* ── Graph Tab ── */
function epRenderGraph(winId, workers) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel) return;
  const svg = panel.querySelector('.ep-graph-svg');
  if (!svg) return;
  const appId = panel.dataset.appid;

  const allAgents = ['orchestrator', ...Object.values(EP_PHASE_AGENT)];
  const active = new Set();

  // Only consider workers for THIS app that are actually running
  const appWorkers = workers.filter(w => w.status === 'running' && (w.appId === appId || (w.task && w.task.includes(appId))));
  appWorkers.forEach(w => {
    // Use explicit phases array to light up ALL active/done agents, not just current
    if (Array.isArray(w.phases) && w.phases.length) {
      active.add('orchestrator');
      w.phases.forEach(p => {
        if (p.status === 'running' || p.status === 'done') {
          // Dynamic mapping: phase name → agent name from EP_PHASE_AGENT
          const pName = p.name.replace(/\+.*/, '').trim();
          const pCapitalized = pName.charAt(0).toUpperCase() + pName.slice(1).toLowerCase();
          const agent = EP_PHASE_AGENT[pCapitalized] || EP_PHASE_AGENT[pName] || pName.toLowerCase();
          if (agent) active.add(agent);
        }
      });
    } else {
      // Fallback: single phase detection
      active.add('orchestrator');
      const agent = EP_PHASE_AGENT[epDetectPhase(w)];
      if (agent) active.add(agent);
    }
  });

  allAgents.forEach(id => {
    const node = svg.querySelector('[data-agent="' + id + '"].ep-graph-node');
    if (!node) return;
    node.classList.toggle('idle', !active.has(id));
    node.classList.toggle('active', active.has(id));
  });
  Object.values(EP_PHASE_AGENT).forEach(agent => {
    const line = svg.querySelector('line[data-agent="' + agent + '"]');
    if (!line) return;
    line.classList.toggle('idle', !active.has(agent));
    line.classList.toggle('flowing', active.has(agent));
  });

  const statusEl = document.getElementById('ep-graph-status-' + winId);
  if (statusEl) {
    if (!active.size) statusEl.innerHTML = 'Kein aktiver Agent';
    else {
      const list = [...active].filter(a => a !== 'orchestrator');
      statusEl.innerHTML = list.length ? 'Aktiv: <span class="active-agent">' + (escapeHtml ? escapeHtml(list.join(', ')) : list.join(', ')) + '</span>' : 'Orchestrator koordiniert...';
    }
  }
}

/* ── Kanban Tab ── */
async function epLoadPlanMd(winId, appId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  if (!appId) { panel._epState.kanbanTasks = []; epRenderKanban(winId); return; }
  try {
    const res = await fetch('/api/app-files/' + appId + '/PLAN.md');
    if (!res.ok) throw new Error('Not found');
    const text = await res.text();
    panel._epState.kanbanTasks = epParsePlanMd(text);
  } catch { panel._epState.kanbanTasks = []; }
  epRenderKanban(winId);
}

function epParsePlanMd(text) {
  const tasks = [];
  const regex = /- \[([ xX])\] (TASK-\d+):\s*(.+)/gm;
  let m;
  while ((m = regex.exec(text)) !== null) {
    tasks.push({ checked: m[1].toLowerCase() === 'x', id: m[2], desc: m[3].trim() });
  }
  return tasks;
}

function epGetTaskStatus(task, workers, appId) {
  if (task.checked) return 'done';
  const running = workers.filter(w => w.status === 'running' && (w.appId === appId || (w.task && w.task.includes(task.id))));
  if (running.length) {
    const phase = epDetectPhase(running[0]);
    return phase === 'Review' ? 'review' : 'inprogress';
  }
  return 'backlog';
}

function epRenderKanban(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  const el = document.getElementById('ep-kanban-' + winId);
  if (!el) return;
  const esc = escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  const tasks = panel._epState.kanbanTasks;
  const appId = panel.dataset.appid;

  if (!tasks.length) {
    el.innerHTML = '<div class="ep-empty"><div class="icon">📋</div>Noch keine Tasks<br><span style="font-size:9px;color:var(--text-dim)">PLAN.md wird vom Worker erstellt</span></div>';
    return;
  }

  const cols = { backlog: [], inprogress: [], review: [], done: [] };
  tasks.forEach(t => { cols[epGetTaskStatus(t, panel._epState.workers, appId)].push(t); });

  const labels = { backlog: 'Backlog', inprogress: 'In Progress', review: 'Review', done: 'Done' };
  el.innerHTML = ['backlog', 'inprogress', 'review', 'done'].map(col =>
    '<div class="ep-kanban-section ' + col + '">' +
      '<div class="ep-kanban-header"><span class="ep-kanban-title">' + labels[col] + '</span><span class="ep-kanban-count">' + cols[col].length + '</span></div>' +
      (cols[col].length ? cols[col].map(t => '<div class="ep-kanban-card"><div class="ep-task-id">' + esc(t.id) + '</div><div class="ep-task-desc">' + esc(t.desc) + '</div></div>').join('') : '') +
    '</div>'
  ).join('');
}

/* ── Files Tab ── */
function epInlineFormatSafe(str) {
  const escaped = (escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')))(str);
  return escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/`(.+?)`/g, '<code>$1</code>');
}

function epRenderMarkdownSafe(text) {
  if (!text) return '<p style="color:var(--text-dim)">Leer</p>';
  const esc = escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  const blocks = [];
  text = text.replace(/```([\s\S]*?)```/g, (_, code) => {
    blocks.push('<pre><code>' + esc(code.replace(/^\n/, '').replace(/\n$/, '')) + '</code></pre>');
    return '\x00BLOCK' + (blocks.length - 1) + '\x00';
  });
  const lines = text.split('\n');
  let html = '', inUl = false, inOl = false;
  const closeList = () => { if (inUl) { html += '</ul>'; inUl = false; } if (inOl) { html += '</ol>'; inOl = false; } };

  for (const line of lines) {
    if (/\x00BLOCK\d+\x00/.test(line)) { closeList(); html += line.replace(/\x00BLOCK(\d+)\x00/g, (_, n) => blocks[parseInt(n, 10)]); continue; }
    if (/^---+$/.test(line.trim())) { closeList(); html += '<hr>'; continue; }
    const h1m = line.match(/^# (.+)/); if (h1m) { closeList(); html += '<h1>' + epInlineFormatSafe(h1m[1]) + '</h1>'; continue; }
    const h2m = line.match(/^## (.+)/); if (h2m) { closeList(); html += '<h2>' + epInlineFormatSafe(h2m[1]) + '</h2>'; continue; }
    const h3m = line.match(/^### (.+)/); if (h3m) { closeList(); html += '<h3>' + epInlineFormatSafe(h3m[1]) + '</h3>'; continue; }
    const cbX = line.match(/^[-*]\s+\[x\]\s+(.*)/i);
    const cbO = line.match(/^[-*]\s+\[ \]\s+(.*)/);
    if (cbX || cbO) {
      if (!inUl) { html += '<ul style="list-style:none;padding-left:0">'; inUl = true; }
      const checked = !!cbX;
      html += '<li class="cb-item' + (checked ? ' checked' : '') + '"><input type="checkbox" disabled ' + (checked ? 'checked' : '') + '><label>' + epInlineFormatSafe((cbX || cbO)[1]) + '</label></li>';
      continue;
    }
    const ulm = line.match(/^[-*]\s+(.*)/);
    if (ulm) { if (inOl) { html += '</ol>'; inOl = false; } if (!inUl) { html += '<ul>'; inUl = true; } html += '<li>' + epInlineFormatSafe(ulm[1]) + '</li>'; continue; }
    const olm = line.match(/^\d+\.\s+(.*)/);
    if (olm) { if (inUl) { html += '</ul>'; inUl = false; } if (!inOl) { html += '<ol>'; inOl = true; } html += '<li>' + epInlineFormatSafe(olm[1]) + '</li>'; continue; }
    closeList();
    if (!line.trim()) continue;
    html += '<p>' + epInlineFormatSafe(line) + '</p>';
  }
  closeList();
  return html;
}

async function epLoadFile(winId, filename, btnEl) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel) return;
  if (!panel._epState) epInitState(panel);
  panel._epState.activeFile = filename;

  // Update active button
  if (btnEl) {
    const parent = btnEl.parentElement;
    if (parent) parent.querySelectorAll('.ep-file-btn').forEach(b => b.classList.toggle('active', b === btnEl));
  }

  const appId = panel.dataset.appid;
  const el = document.getElementById('ep-md-' + winId);
  if (!el) return;
  if (!appId) { el.innerHTML = '<div class="ep-empty">Keine App</div>'; return; }

  el.innerHTML = '<div class="ep-empty">Lade ' + (escapeHtml ? escapeHtml(filename) : filename) + '...</div>';
  try {
    const res = await fetch('/api/app-files/' + appId + '/' + filename);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    el.innerHTML = epRenderMarkdownSafe(await res.text());
  } catch {
    el.innerHTML = '<div class="ep-empty"><div class="icon">📄</div>' + (escapeHtml ? escapeHtml(filename) : filename) + ' existiert noch nicht<br><span style="font-size:9px;color:var(--text-dim)">Wird vom Worker erstellt sobald die Phase startet</span></div>';
  }
}

/* ── Git Tab ── */
async function epPollGit(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState) return;
  try {
    const appId = panel.dataset.appid;
    const res = await fetch('/api/git/branches' + (appId ? '?appId=' + encodeURIComponent(appId) : ''));
    if (!res.ok) return;
    panel._epState.gitData = await res.json();
    epRenderGit(winId);
  } catch {}
}

function epRenderGit(winId) {
  const panel = document.getElementById('edit-' + winId);
  if (!panel || !panel._epState || !panel._epState.gitData) return;
  const { branches, commits, currentBranch } = panel._epState.gitData;
  const esc = escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));

  // Header
  const headerEl = document.getElementById('ep-git-header-' + winId);
  if (headerEl) {
    const local = branches.filter(b => !b.name.startsWith('origin/'));
    const remote = branches.filter(b => b.name.startsWith('origin/'));
    headerEl.innerHTML = '⎇ ' + esc(currentBranch || 'detached') + '<span class="ep-git-branch-count">' + local.length + ' local, ' + remote.length + ' remote</span>';
  }

  // Branch list
  const branchEl = document.getElementById('ep-git-branches-' + winId);
  if (branchEl) {
    const local = branches.filter(b => !b.name.startsWith('origin/'));
    const remote = branches.filter(b => b.name.startsWith('origin/'));
    branchEl.innerHTML = '<div class="ep-git-branches-title">Branches</div>' +
      local.map(b => {
        const isCurrent = b.current || b.name === currentBranch;
        return '<div class="ep-git-branch ' + (isCurrent ? 'current' : '') + '"><span class="branch-dot"></span><span>' + esc(b.name) + '</span></div>';
      }).join('') +
      (remote.length ? '<div style="margin-top:4px;font-size:8px;color:var(--text-dim);text-transform:uppercase;margin-bottom:2px;">Remote</div>' : '') +
      remote.slice(0, 5).map(b => '<div class="ep-git-branch remote"><span class="branch-dot"></span><span>' + esc(b.name.replace('origin/', '')) + '</span></div>').join('');
  }

  // Commits
  const commitsEl = document.getElementById('ep-git-commits-' + winId);
  if (commitsEl && commits) {
    commitsEl.innerHTML = commits.slice(0, 30).map(c => {
      const refs = epParseRefs(c.refs, currentBranch);
      const dateStr = c.date ? new Date(c.date).toLocaleDateString('de-DE', {day:'2-digit', month:'short'}) : '';
      return '<div class="ep-git-commit-row">' +
        '<span class="ep-git-commit-hash">' + esc(c.short || '') + '</span>' +
        '<span class="ep-git-commit-date">' + dateStr + '</span>' +
        (refs ? '<span class="ep-git-commit-refs">' + refs + '</span>' : '') +
        '<span class="ep-git-commit-msg">' + esc(c.subject || '') + '</span></div>';
    }).join('');
  }
}

function epParseRefs(refStr, currentBranch) {
  if (!refStr) return '';
  const esc = escapeHtml || (s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  return refStr.split(',').map(r => {
    r = r.trim();
    if (!r) return '';
    if (r === 'HEAD') return '<span class="ep-git-ref-badge head">HEAD</span>';
    if (r.startsWith('HEAD -> ')) return '<span class="ep-git-ref-badge head">HEAD → ' + esc(r.replace('HEAD -> ', '')) + '</span>';
    if (r.startsWith('origin/')) return '<span class="ep-git-ref-badge remote">' + esc(r) + '</span>';
    if (r.startsWith('tag:')) return '<span class="ep-git-ref-badge tag">' + esc(r) + '</span>';
    return '<span class="ep-git-ref-badge branch">' + esc(r) + '</span>';
  }).filter(Boolean).join(' ');
}

async function epLoadEnvVars(winId, appId) {
  const textarea = document.getElementById('edit-envtxt-' + winId);
  if (!textarea || textarea._loaded) return;
  textarea._loaded = true;
  try {
    if (typeof AppActions !== 'undefined' && AppActions.getEnv) {
      const vars = await AppActions.getEnv(appId);
      if (vars && typeof vars === 'object') {
        textarea.value = Object.entries(vars).map(([k, v]) => k + '=' + v).join('\n');
      }
    }
  } catch {}
}

function epFilterList(input, listId) {
  const q = input.value.toLowerCase().trim();
  const list = document.getElementById(listId);
  if (!list) return;
  const items = list.children;
  for (let i = 0; i < items.length; i++) {
    const text = items[i].textContent.toLowerCase();
    items[i].style.display = !q || text.includes(q) ? '' : 'none';
  }
}

function epStartResize(e, winId) {
  e.preventDefault();
  const panel = document.getElementById('edit-' + winId);
  if (!panel) return;
  const handle = e.target;
  handle.classList.add('dragging');
  const startX = e.clientX || (e.touches && e.touches[0].clientX);
  const startW = panel.offsetWidth;

  // Disable pointer events on iframe during drag
  const winBody = panel.parentElement;
  const iframe = winBody && winBody.querySelector('iframe');
  if (iframe) iframe.style.pointerEvents = 'none';

  function onMove(ev) {
    const x = ev.clientX || (ev.touches && ev.touches[0].clientX);
    const newW = Math.max(200, Math.min(startW + (x - startX), panel.parentElement.offsetWidth * 0.7));
    panel.style.width = newW + 'px';
  }
  function onUp() {
    handle.classList.remove('dragging');
    if (iframe) iframe.style.pointerEvents = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove);
  document.addEventListener('touchend', onUp);
}

}

function maximizeWin(winId) {
  const win = openWindows.find(w => w.winId === winId);
  if (!win) return;
  if (win.maximized) {
    const r = win.savedRect;
    win.el.style.left = r.left; win.el.style.top = r.top; win.el.style.width = r.width; win.el.style.height = r.height;
    win.el.style.borderRadius = '';
    win.maximized = false;
  } else {
    win.savedRect = { left: win.el.style.left, top: win.el.style.top, width: win.el.style.width, height: win.el.style.height };
    win.el.style.left = '0'; win.el.style.top = '0'; win.el.style.width = '100%'; win.el.style.height = '100%';
    win.el.style.borderRadius = '0';
    win.maximized = true;
  }
}

function closeWin(winId) {
  const win = openWindows.find(w => w.winId === winId);
  if (!win) return;
  // Cleanup Edit-Panel 2.0 polling + SSE
  epStopAllPolling(winId);
  const editPanel = document.getElementById('edit-' + winId);
  if (editPanel && editPanel._chatSSE) { editPanel._chatSSE.close(); editPanel._chatSSE = null; }
  win.el.classList.add('closing');
  win.closed = true;
  // Animate dock item removal
  const dockItem = document.querySelector('.dock-item[data-app-id="' + win.appId + '"]');
  if (dockItem && !DOCK_FAVORITES.includes(win.appId)) {
    dockItem.classList.add('closing');
  }
  setTimeout(() => {
    win.el.remove();
    openWindows = openWindows.filter(w => w.winId !== winId);
    if (activeTabWinId === winId) {
      const remaining = openWindows.filter(w => !w.closed);
      if (remaining.length > 0) focusTab(remaining[remaining.length - 1].winId);
      else showHome();
    }
    renderTopbarTabs();
    renderDock();
  }, 250);
}

// ── Drag & Resize ──
let dragWin = null, dragOff = { x: 0, y: 0 };
function getPointer(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function startDrag(e, winId) {
  if (e.target.closest('.win-btn')) return;
  const win = openWindows.find(w => w.winId === winId);
  if (win && win.maximized) return;
  dragWin = document.getElementById(winId);
  const p = getPointer(e);
  dragOff.x = p.x - dragWin.offsetLeft;
  dragOff.y = p.y - dragWin.offsetTop;
  document.querySelectorAll('.app-window iframe').forEach(f => f.style.pointerEvents = 'none');
  focusWindow(winId);
  e.preventDefault();
}
function stopDragAndResize() {
  if (dragWin) { dragWin = null; document.querySelectorAll('.app-window iframe').forEach(f => f.style.pointerEvents = ''); }
  if (resizeState) { resizeState.el.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = ''); document.querySelectorAll('.app-window iframe').forEach(f => f.style.pointerEvents = ''); resizeState = null; }
}
function onDragMove(e) {
  if (!dragWin) return;
  const p = getPointer(e);
  dragWin.style.left = (p.x - dragOff.x) + 'px';
  dragWin.style.top = (p.y - dragOff.y) + 'px';
  if (e.cancelable) e.preventDefault();
}
document.addEventListener('mousemove', onDragMove);
document.addEventListener('touchmove', onDragMove, { passive: false });
document.addEventListener('mouseup', stopDragAndResize);
document.addEventListener('mouseleave', stopDragAndResize);
document.addEventListener('touchend', stopDragAndResize);
document.addEventListener('touchcancel', stopDragAndResize);

let resizeState = null;
function startResize(e, winId, dir) {
  const el = document.getElementById(winId);
  if (!el) return;
  const win = openWindows.find(w => w.winId === winId);
  if (win && win.maximized) return;
  el.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
  document.querySelectorAll('.app-window iframe').forEach(f => f.style.pointerEvents = 'none');
  const p = getPointer(e);
  resizeState = { el, dir, startX: p.x, startY: p.y, startW: el.offsetWidth, startH: el.offsetHeight, startL: el.offsetLeft, startT: el.offsetTop };
  focusWindow(winId);
  e.preventDefault();
  e.stopPropagation();
}
function onResizeMove(e) {
  if (!resizeState) return;
  const p = getPointer(e), s = resizeState, dx = p.x - s.startX, dy = p.y - s.startY;
  if (e.cancelable) e.preventDefault();
  const minW = 400, minH = 300;
  if (s.dir.includes('r')) s.el.style.width = Math.max(minW, s.startW + dx) + 'px';
  if (s.dir.includes('b')) s.el.style.height = Math.max(minH, s.startH + dy) + 'px';
  if (s.dir.includes('l')) { const nw = Math.max(minW, s.startW - dx); s.el.style.width = nw + 'px'; s.el.style.left = (s.startL + s.startW - nw) + 'px'; }
  if (s.dir.includes('t') && s.dir !== 'tr' && s.dir !== 'tl') { const nh = Math.max(minH, s.startH - dy); s.el.style.height = nh + 'px'; s.el.style.top = (s.startT + s.startH - nh) + 'px'; }
  if (s.dir === 'tr') { s.el.style.width = Math.max(minW, s.startW + dx) + 'px'; const nh = Math.max(minH, s.startH - dy); s.el.style.height = nh + 'px'; s.el.style.top = (s.startT + s.startH - nh) + 'px'; }
  if (s.dir === 'tl') { const nw = Math.max(minW, s.startW - dx); s.el.style.width = nw + 'px'; s.el.style.left = (s.startL + s.startW - nw) + 'px'; const nh = Math.max(minH, s.startH - dy); s.el.style.height = nh + 'px'; s.el.style.top = (s.startT + s.startH - nh) + 'px'; }
}
document.addEventListener('mousemove', onResizeMove);
document.addEventListener('touchmove', onResizeMove, { passive: false });

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  const isMeta = e.metaKey || e.ctrlKey;
  if (e.key === 'Escape') {
    if (launcherOpen) toggleLauncher();
    if (ctxLauncherOpen) toggleContextLauncher();
    if (systemChatOpen) toggleSystemChat();
    return;
  }
  if (isMeta && e.key === 'l') { e.preventDefault(); toggleLauncher(); return; }
  if (isMeta && e.key === 'k') { e.preventDefault(); toggleSystemChat(); return; }
  if (isMeta && e.key === 'g') { e.preventDefault(); const app = state?.apps?.find(a => a.id === 'projects'); if (app) openApp(app); return; }
  if (isMeta && e.key === 't') { e.preventDefault(); cycleTheme(); return; }
  if (isMeta && e.shiftKey && e.key === 'v') { e.preventDefault(); if (window.shareClipboard) window.shareClipboard(); return; }
  if (isMeta && e.key === 'w') {
    e.preventDefault();
    if (activeTabWinId) closeWin(activeTabWinId);
    return;
  }
  if (isMeta && e.key === 'Tab') {
    e.preventDefault();
    const active = openWindows.filter(w => !w.closed);
    if (active.length === 0) return;
    const idx = active.findIndex(w => w.winId === activeTabWinId);
    const next = active[(idx + 1) % active.length];
    focusTab(next.winId);
    return;
  }
});

async function exportProfile() {
  try {
    const r = await fetch('/api/profile/export');
    const d = await r.json();
    if (d.error) { alert('Export fehlgeschlagen: ' + d.error); return; }
    // Download as ZIP-like: two files
    for (const [filename, content] of Object.entries(d.files)) {
      const blob = new Blob([content], { type: filename.endsWith('.json') ? 'application/json' : 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    const modal = document.getElementById('profileModal');
    if (modal) {
      const row = modal.querySelector('.btn-row');
      if (row) { const msg = document.createElement('div'); msg.style.cssText = 'color:var(--green);font-size:11px;margin-top:8px;'; msg.textContent = 'pulse-profile.json + index.html heruntergeladen! Lade sie in dein GitHub Pages Repo hoch.'; row.appendChild(msg); }
    }
  } catch { alert('Export fehlgeschlagen'); }
}

// ── Feed / Pulse ──
function addFeed(text, type) {
  const now = new Date();
  feed.unshift({ text, type, time: now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) });
  if (feed.length > 50) feed.length = 50;
  const icon = type === 'error' ? '!' : type === 'mutation' ? '*' : type === 'sse' ? '~' : type === 'chat' ? '>' : type === 'install' ? '+' : type === 'create' ? '+' : '.';
  addPulseEntry(icon, text, type === 'error' ? 'error' : 'success');
}

function addPulseEntry(icon, text, type) {
  const feed = document.getElementById('pulseFeed');
  if (!feed) return;
  const entry = document.createElement('div');
  entry.className = 'pulse-entry';
  entry.innerHTML = '<span class="pe-icon">' + icon + '</span> ' + text + ' <span class="pe-time">jetzt</span>';
  feed.prepend(entry);
  while (feed.children.length > 20) feed.removeChild(feed.lastChild);
}

// ── Mutation Queue ──
function trackMutation(action, detail) {
  mutationQueue.push({ action, detail, time: new Date().toISOString() });
  addFeed(action + ': ' + detail, 'mutation');
  clearTimeout(batchTimer);
  batchTimer = setTimeout(flushMutations, 30000);
}

async function flushMutations() {
  if (mutationQueue.length === 0) return;
  const batch = mutationQueue.splice(0);
  try {
    await fetch('/api/changelog', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(batch) });
  } catch { mutationQueue.unshift(...batch); }
}

// ── State Summary ──
async function generateStateSummary() {
  if (!state) return;
  const summary = {
    openApps: openWindows.filter(w => !w.minimized && !w.closed).map(w => w.appId),
    installedApps: state.apps.filter(a => a.installed).map(a => a.id),
    pendingMutations: mutationQueue.length,
    lastUpdate: new Date().toISOString()
  };
  try { await fetch('/api/state', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(summary) }); } catch {}
}

// ── Tunnel ──
let tunnelActive = false, tunnelCurrentUrl = null, bridgeCurrentUrl = null;

function handleTunnelSSE(msg) {
  tunnelActive = !!msg.active;
  tunnelCurrentUrl = msg.url || null;
  if (msg.bridgeUrl) bridgeCurrentUrl = msg.bridgeUrl;
  const btn = document.getElementById('tunnelBtn');
  if (tunnelActive && tunnelCurrentUrl) {
    btn.classList.add('active');
    btn.textContent = 'Live';
    addFeed('Tunnel: ' + tunnelCurrentUrl, 'sse');
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Share';
  }
}

async function toggleTunnel() {
  const btn = document.getElementById('tunnelBtn');
  if (tunnelActive && tunnelCurrentUrl) {
    showTunnelModal(tunnelCurrentUrl, bridgeCurrentUrl);
    return;
  }
  btn.textContent = '...';
  try {
    const r = await fetch('/api/tunnel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'start' }) });
    const d = await r.json();
    if (d.ok && d.url) {
      tunnelActive = true;
      tunnelCurrentUrl = d.url;
      bridgeCurrentUrl = d.bridgeUrl || null;
      btn.classList.add('active');
      btn.textContent = 'Live';
      showTunnelModal(d.url, d.bridgeUrl);
      if (d.bridgeRoom) startBridgeHost(d.bridgeRoom);
    } else {
      btn.textContent = 'Share';
    }
  } catch {
    btn.textContent = 'Share';
  }
}

      body: JSON.stringify({ interests })

    const data = await res.json();

let tutorialIdx = 0;
let tutorialChapter = '';

function startTutorial() {
  tutorialIdx = 0;
  tutorialChapter = '';
  showTutorialStep();
}

function showTutorialStep() {
  document.getElementById('tutorialOverlay')?.remove();
  if (tutorialIdx >= tutorialSteps.length) {
    localStorage.setItem('pulse-tutorial-done', '1');
    setMode('flow');
    return;
  }
  const step = tutorialSteps[tutorialIdx];
  const overlay = document.createElement('div');
  overlay.id = 'tutorialOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:90000;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;';

  let boxStyle = 'background:#111118;border:1px solid var(--teal,#4ecdc4);border-radius:10px;padding:24px 28px;max-width:420px;width:90%;color:rgba(255,255,255,.85);font-family:var(--font);';
  let spotlightCSS = '';

  if (step.target) {
    const el = document.querySelector(step.target);
    if (el) {
      const rect = el.getBoundingClientRect();
      spotlightCSS = 'position:fixed;left:' + (rect.left - 6) + 'px;top:' + (rect.top - 6) + 'px;width:' + (rect.width + 12) + 'px;height:' + (rect.height + 12) + 'px;border:2px solid var(--teal,#4ecdc4);border-radius:8px;z-index:90001;pointer-events:none;box-shadow:0 0 20px rgba(78,205,196,.15);';
      if (step.pos === 'below') {
        boxStyle += 'position:fixed;left:' + Math.max(20, Math.min(rect.left, window.innerWidth - 440)) + 'px;top:' + (rect.bottom + 20) + 'px;z-index:90002;';
      } else if (step.pos === 'above') {
        boxStyle += 'position:fixed;left:' + Math.max(20, Math.min(rect.left, window.innerWidth - 440)) + 'px;bottom:' + (window.innerHeight - rect.top + 20) + 'px;z-index:90002;';
      }
    }
  }

  const stepNum = (tutorialIdx + 1) + '/' + tutorialSteps.length;
  const isLast = tutorialIdx === tutorialSteps.length - 1;
  const isNewChapter = step.chapter !== tutorialChapter;
  tutorialChapter = step.chapter;

  // Progress bar
  const progress = Math.round(((tutorialIdx + 1) / tutorialSteps.length) * 100);
  const progressBar = '<div style="width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:16px;overflow:hidden;"><div style="width:' + progress + '%;height:100%;background:var(--teal,#4ecdc4);border-radius:2px;transition:width .3s;"></div></div>';

  // Chapter badge
  const chapterBadge = isNewChapter ?
    '<div style="display:inline-block;background:rgba(78,205,196,.1);color:var(--teal,#4ecdc4);padding:2px 10px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">' + step.chapter + '</div>' : '';

  // Action hint
  let actionHint = '';
  if (step.action === 'try-cockpit') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:6px;font-size:10px;color:var(--amber,#f5a623);">Tipp: Du kannst den Modus jederzeit wechseln</div>';
  if (step.action === 'open-notes') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;font-size:10px;color:var(--teal,#4ecdc4);">Aktion: Klicke auf N oder druecke Cmd+Space</div>';
  if (step.action === 'open-tasks') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;font-size:10px;color:var(--teal,#4ecdc4);">Tipp: !! = hoch, ! = mittel, ohne = niedrig</div>';
  if (step.action === 'try-launcher') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:6px;font-size:10px;color:var(--lila,#a855f7);">Probiere es nach dem Tutorial: Cmd+Space</div>';
  if (step.action === 'open-chat') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;font-size:10px;color:var(--teal,#4ecdc4);">Shortcut: Cmd+K oeffnet den Chat</div>';
  if (step.action === 'show-cockpit-graphs') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:6px;font-size:10px;color:var(--lila,#a855f7);">Graphen sind in der Cockpit-Ansicht sichtbar</div>';

  overlay.innerHTML =
    (spotlightCSS ? '<div style="' + spotlightCSS + '"></div>' : '') +
    '<div style="' + boxStyle + '">' +
      progressBar +
      chapterBadge +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
        '<div style="font-size:16px;font-weight:700;">' + step.title + '</div>' +
        '<div style="font-size:9px;color:rgba(255,255,255,.3);">' + stepNum + '</div>' +
      '</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,.55);white-space:pre-line;line-height:1.7;">' + step.text + '</div>' +
      actionHint +
      '<div style="display:flex;gap:8px;margin-top:18px;justify-content:space-between;align-items:center;">' +
        '<button onclick="skipTutorial()" style="background:none;border:none;color:rgba(255,255,255,.25);padding:4px 0;font:10px var(--font);cursor:pointer;">Tutorial ueberspringen</button>' +
        '<div style="display:flex;gap:8px;">' +
          (tutorialIdx > 0 ? '<button onclick="prevTutorialStep()" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);padding:5px 14px;border-radius:5px;font:11px var(--font);cursor:pointer;">Zurueck</button>' : '') +
          '<button onclick="nextTutorialStep()" style="background:var(--teal,#4ecdc4);color:var(--bg);border:none;padding:5px 16px;border-radius:5px;font:600 11px var(--font);cursor:pointer;">' + (isLast ? 'Los geht\'s!' : 'Weiter') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Execute step actions
  if (step.action === 'show-cockpit-graphs') setMode('cockpit');
}

function nextTutorialStep() {
  tutorialIdx++;
  showTutorialStep();
}

function prevTutorialStep() {
  if (tutorialIdx > 0) { tutorialIdx--; showTutorialStep(); }
}

function skipTutorial() {
  document.getElementById('tutorialOverlay')?.remove();
  localStorage.setItem('pulse-tutorial-done', '1');
  setMode('flow');
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function saveProfileEdit() {
  const name = document.getElementById('pe-name').value.trim();
  if (!name) { document.getElementById('pe-name').style.borderColor = 'var(--red)'; return; }
  const profile = {
    name,
    handle: document.getElementById('pe-handle').value.trim() || name.toLowerCase().replace(/\s+/g, '-'),
    avatar: document.getElementById('pe-avatar').value || '>',
    bio: document.getElementById('pe-bio').value.trim(),
    githubPages: document.getElementById('pe-ghpages').value.trim()
  };
  try {
    await fetch('/api/profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(profile) });
    const res = await fetch('/api/profile');
    userProfile = await res.json();
    updateProfileDisplay();
    document.getElementById('profileModal')?.remove();
  } catch {}
}

// ── Greeting ──
function updateGreeting() {
  const h = new Date().getHours();
  const name = userProfile?.name || '';
  let greeting = 'Guten Tag';
  let sub = 'Agentic Operating System';
  if (h < 6) { greeting = 'Gute Nacht'; sub = 'PulseOS laeuft im Hintergrund.'; }
  else if (h < 12) { greeting = 'Guten Morgen'; sub = 'Dein System ist bereit.'; }
  else if (h < 18) { greeting = 'Guten Tag'; sub = 'Was steht an?'; }
  else { greeting = 'Guten Abend'; sub = 'Noch etwas erledigen?'; }
  document.getElementById('greetingText').textContent = greeting + (name ? ', ' + name : '');
  document.getElementById('greetingSub').textContent = sub;
  // Load quick stats
  loadQuickStats();
  updateWorkerBadge();
}

async function updateWorkerBadge() {
  try {
    const r = await fetch('/api/workers');
    if (!r.ok) return;
    const data = await r.json();
    const workers = Array.isArray(data) ? data : (data.workers || []);
    const running = workers.filter(w => w.status === 'running').length;
    const badge = document.getElementById('workerBadge');
    const count = document.getElementById('workerCount');
    if (badge && count) {
      badge.style.display = running > 0 ? 'inline-block' : 'none';
      count.textContent = running;
    }
  } catch {}
}
setInterval(updateWorkerBadge, 10000);

async function loadQuickStats() {
  try {
    const [actRes, tasksRes] = await Promise.all([
      fetch('/api/activity-summary?days=7'),
      fetch('/app/tasks/api/tasks').catch(() => null)
    ]);
    const act = await actRes.json();
    const parts = [];
    if (act.activity?.length > 0) parts.push(act.activity.length + ' aktive Apps');
    if (act.staleApps?.length > 0) parts.push(act.staleApps.length + ' inaktiv');
    if (tasksRes) {
      try {
        const td = await tasksRes.json();
        const tasks = td.tasks || [];
        const open = tasks.filter(t => !t.done && !t.completed).length;
        if (open > 0) parts.push(open + ' offene Tasks');
      } catch {}
    }
    const claudeOnline = agentPresence['claudeos']?.online;
    if (claudeOnline) parts.push('ClaudeOS online');
    const sub = document.getElementById('greetingSub');
    if (sub && parts.length > 0) sub.textContent = parts.join(' · ');
  } catch {}
}

function renderChatsList() {
  const el = document.getElementById('chatListContent');
  if (!el) return;
  if (chatsList.length === 0) {
    el.innerHTML = '<div class="chat-empty" style="padding:16px;text-align:center;">Keine Chats.<br><button onclick="chatNewDialog()" style="margin-top:8px;background:var(--teal);border:none;color:var(--bg);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;">+ Neuer Chat</button></div>';
    return;
  }
  el.innerHTML = chatsList.map(c => {
    const isGroup = c.type === 'group';
    const name = c.name || c.participants.filter(p => p !== (userProfile?.handle || 'chris')).join(', ') || 'Chat';
    // Peer-type icon: 🟢 PulseOS+ClaudeOS, 🔵 PulseOS, ⚪ Guest, ◆ ClaudeOS, 👥 Group
    let icon = '💬';
    if (isGroup) { icon = '👥'; }
    else if (c.id === 'chat-claudeos') { icon = '◆'; }
    else if (c.id.startsWith('chat-peer-')) {
      // Find connected peer to check capabilities
      const peer = Object.values(window.connectedPeers || {}).find(p => p.chatId === c.id);
      if (peer && peer.pulseos && peer.claudeos) icon = '🟢';
      else if (peer && peer.pulseos) icon = '🔵';
      else icon = '⚪';
    }
    const preview = c.lastMessage ? c.lastMessage.text : 'Noch keine Nachrichten';
    const unreadCount = (c.unread || 0) + ((window.unreadChats && window.unreadChats[c.id]) || 0);
    if (unreadCount > 0) console.log('[chat] Unread badge:', c.id, 'server:', c.unread, 'local:', window.unreadChats?.[c.id], 'total:', unreadCount);
    const unread = unreadCount > 0 ? '<span style="background:var(--teal);color:var(--bg);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">' + unreadCount + '</span>' : '';
    const time = c.lastMessage?.time ? new Date(c.lastMessage.time).toLocaleTimeString('de', {hour:'2-digit',minute:'2-digit'}) : '';
    const deletable = c.id !== 'chat-claudeos';
    return '<div class="chat-list-item" onclick="openChat(\'' + c.id + '\')" oncontextmenu="event.preventDefault();' + (deletable ? 'confirmDeleteChat(\'' + c.id + '\',\'' + escapeHtml(name).replace(/'/g, "\\'") + '\')' : '') + '" style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;" onmouseenter="this.style.background=\'var(--bg-card-hover)\'" onmouseleave="this.style.background=\'\'">' +
      '<span style="font-size:18px;width:28px;text-align:center;flex-shrink:0;">' + icon + '</span>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-weight:600;font-size:12px;">' + escapeHtml(name) + '</span>' +
          '<span style="font-size:9px;color:var(--text-dim);">' + time + '</span>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:4px;">' +
          '<span style="font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(preview.substring(0, 50)) + '</span>' +
          unread +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function openChat(chatId) {
  activeChatId = chatId;
  renderedMsgIds.clear();
  // Clear unread counter for this chat
  if (window.unreadChats) delete window.unreadChats[chatId];
  document.getElementById('chatListView').style.display = 'none';
  document.getElementById('chatMsgView').style.display = 'flex';
  document.getElementById('chatBackBtn').style.display = '';
  const chat = chatsList.find(c => c.id === chatId);
  const name = chat?.name || chat?.participants?.filter(p => p !== (userProfile?.handle || 'chris')).join(', ') || 'Chat';
  const titleEl = document.getElementById('chatHeaderTitle');
  titleEl.textContent = name;
  titleEl.style.cursor = chat?.type === 'group' ? 'pointer' : '';
  titleEl.onclick = chat?.type === 'group' ? () => showGroupEditDialog(chatId) : null;
  // Show ClaudeOS toggle for peer chats
  const slot = document.getElementById('claudeToggleSlot');
  let toggleEl = document.getElementById('claudeToggle');
  if (!toggleEl) {
    toggleEl = document.createElement('button');
    toggleEl.id = 'claudeToggle';
    toggleEl.style.cssText = 'background:none;border:1px solid var(--border);color:var(--text-dim);font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;';
    slot.appendChild(toggleEl);
  }
  if (chatId.startsWith('chat-peer-')) {
    toggleEl.style.display = '';
    const isEnabled = chat?.claudeEnabled || false;
    toggleEl.textContent = isEnabled ? '◆ KI an' : '◇ KI aus';
    toggleEl.style.color = isEnabled ? 'var(--teal)' : 'var(--text-dim)';
    toggleEl.style.borderColor = isEnabled ? 'var(--teal)' : 'var(--border)';
    toggleEl.onclick = async () => {
      const newState = !isEnabled;
      await fetch('/api/chats/' + chatId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ claudeEnabled: newState }) });
      if (chat) chat.claudeEnabled = newState;
      openChat(chatId); // re-render
    };
  } else {
    toggleEl.style.display = 'none';
  }
  // Load messages
  const msgs = document.getElementById('systemChatMessages');
  msgs.innerHTML = '<div class="chat-empty">Lade...</div>';
  chatHistoryRendering = true;
  lastSentText = '';
  lastSentTime = 0;
  try {
    const res = await fetch('/api/chats/' + chatId);
    const data = await res.json();
    msgs.innerHTML = '';
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(m => renderChatMsg(m));
    } else {
      msgs.innerHTML = '<div class="chat-empty">Noch keine Nachrichten</div>';
    }
    // Merge global chat-history into ClaudeOS chat (unified view)
    if (chatId === 'chat-claudeos') {
      try {
        const histRes = await fetch('/api/chat-history');
        const histData = await histRes.json();
        if (histData.messages && histData.messages.length > 0) {
          // Merge: combine chat-file messages + history, deduplicate by id, sort by time
          const chatMsgs = data.messages || [];
          const allMsgs = [...chatMsgs];
          const seenIds = new Set(chatMsgs.map(m => m.id));
          histData.messages.forEach(m => { if (!seenIds.has(m.id)) { allMsgs.push(m); seenIds.add(m.id); } });
          allMsgs.sort((a, b) => new Date(a.time || 0) - new Date(b.time || 0));
          msgs.innerHTML = '';
          renderedMsgIds.clear();
          allMsgs.forEach(m => renderChatMsg(m));
        }
      } catch {}
    }
  } catch {}
  chatHistoryRendering = false;
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('systemChatInput')?.focus();
}

function chatShowList() {
  activeChatId = null;
  document.getElementById('chatMsgView').style.display = 'none';

}

async function confirmDeleteContact(contactId, contactName) {
  if (!confirm('Kontakt "' + contactName + '" entfernen?')) return;
  try {

let lastSentText = '', lastSentTime = 0;
let chatHistoryRendering = false;
function renderChatMsg(msg) {
  if (renderedMsgIds.has(msg.id)) return;
  renderedMsgIds.add(msg.id);
  // Dedupe: skip SSE echo of message we already rendered locally (not during history load)
  if (!chatHistoryRendering && msg.from === 'user' && msg.text === lastSentText && Date.now() - lastSentTime < 10000 && msg.id.startsWith('m-')) {
    return;
  }
  // Hide typing indicator when agent responds
  if (msg.from !== 'user') hideTypingIndicator();
  const msgs = document.getElementById('systemChatMessages');
  if (!msgs) return;
  if (msgs.querySelector('.chat-empty')) msgs.innerHTML = '';
  const isUser = msg.from === 'user';
  let txt = msg.text || '';
  // Parse and execute ACTION tags from PulseOS agent (only for new msgs, not history)
  if (!isUser && txt.includes('[ACTION:')) {
    // Worker-started action: show inline status with link to Workers app
    const workerStartMatch = txt.match(/\[ACTION:worker-started:([a-zA-Z0-9_-]+)\]/);
    if (workerStartMatch) {
      const workerId = workerStartMatch[1];
      txt = txt.replace(/\[ACTION:worker-started:[a-zA-Z0-9_-]+\]/g, '').trim();
      if (!txt) txt = 'Worker gestartet';
      txt += '\n⚙ Worker läuft...';
      // Start polling worker status for auto-update
      if (!chatHistoryRendering) pollWorkerStatus(workerId);
    }
    const actionMatch = txt.match(/\[ACTION:open:([a-zA-Z0-9_-]+)\]/g);
    if (actionMatch) {
      if (!chatHistoryRendering) {
        actionMatch.forEach(tag => {
          const appId = tag.match(/\[ACTION:open:([a-zA-Z0-9_-]+)\]/)[1];
          const app = (state && state.apps || []).find(a => a.id === appId);
          if (app) openApp(app);
          else console.warn('[ACTION] App not found:', appId);
        });
      }
      txt = txt.replace(/\[ACTION:open:[a-zA-Z0-9_-]+\]/g, '').trim();
    }
    if (!txt) txt = 'Erledigt ✓';
  }
  // Auto-open app if response contains a PulseOS app URL (localhost or tunnel)
  if (!isUser && !chatHistoryRendering) {
    const appUrlMatch = txt.match(/(?:localhost:3000|\.lhr\.life|\.railway\.app)\/app\/([a-zA-Z0-9_-]+)/);
    if (appUrlMatch) {
      const urlAppId = appUrlMatch[1];
      const app = (state && state.apps || []).find(a => a.id === urlAppId);
      if (app) openApp(app);
    }
  }
  const isProactive = !isUser && /^[\u2600-\u26FF\u{1F300}-\u{1F9FF}]/u.test(txt);
  const sourceIcon = msg.source === 'telegram' ? '\u2708' : '\u25b8';
  const fromLabel = isUser ? (userProfile?.name || 'Du') : (msg.source === 'webrtc' ? (msg.senderName || 'Peer') : msg.source === 'pulseos' ? 'PulseOS' : 'ClaudeOS');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;' + (isUser ? 'flex-direction:row-reverse;' : '');
  const bgStyle = isUser ? 'background:var(--teal);color:var(--bg);' : isProactive ? 'background:linear-gradient(135deg, var(--bg-card-hover), rgba(245,166,35,0.15));color:var(--text);border:1px solid rgba(245,166,35,0.3);' : 'background:var(--bg-card-hover);color:var(--text);';
  div.innerHTML = '<span style="font-size:14px;flex-shrink:0;width:20px;text-align:center;">' + sourceIcon + '</span>' +
    '<div style="max-width:220px;padding:6px 10px;border-radius:8px;font-size:11px;' + bgStyle + '">' +
    '<div style="font-size:9px;opacity:0.6;margin-bottom:2px;">' + fromLabel + ' <span style="opacity:0.5;">' + (msg.source || '') + '</span></div>' +
    '<div style="white-space:pre-wrap;word-break:break-word;">' + renderChatMarkdown(txt) + '</div></div>';
  // Insert before typing indicator so it always stays at the bottom
  const typing = document.getElementById('typingIndicator');
  if (typing) msgs.insertBefore(div, typing);
  else msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderChatMarkdown(txt) {
  let html = escapeHtml(txt);
  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code: `text`
  html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.2);padding:1px 4px;border-radius:3px;font-size:10px;">$1</code>');
  // Markdown links: [text](url)
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--teal);text-decoration:underline;">$1</a>');
  // PulseOS app URLs → inline "open" button (not external link)
  html = html.replace(/(https?:\/\/[^\s<]*\/app\/([a-zA-Z0-9_-]+)\/?\*?\*?)/g, function(match, url, appId) {
    const cleanUrl = url.replace(/\*+$/g, ''); // Remove trailing ** stars
    return '<span onclick="const a=(state?.apps||[]).find(x=>x.id===\'' + appId + '\');if(a)openApp(a);" style="color:var(--teal);cursor:pointer;text-decoration:underline;">' + (appId) + ' öffnen</span>';
  });
  // Auto-link other URLs (not already in an <a> tag)
  html = html.replace(/(?<!href="|">|onclick=")(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--teal);text-decoration:underline;">$1</a>');
  return html;
}

async function sendToAgent(text) {
  // Render user message immediately
  const userMsgId = 'm-' + Date.now();
  renderChatMsg({ id: userMsgId, from: 'user', text, source: 'dashboard' });
  lastSentText = text; lastSentTime = Date.now();
  // Persist user message to active chat file (so it survives reload)
  if (activeChatId) {
    fetch('/api/chats/' + activeChatId + '/message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: userMsgId, from: 'user', text, source: 'dashboard', time: new Date().toISOString() })
    }).catch(() => {});
  }

  // ── Fast-path: Action Cache (instant, no API call) ──
  const lower = text.toLowerCase().trim();
  const openMatch = lower.match(/(?:öffne|open|starte|start|zeig|show)\s+(?:die\s+|den\s+|das\s+|mir\s+|die\s+app\s+)?(.+?)(?:\s+app)?$/i);
  if (openMatch && state && state.apps) {
    const search = openMatch[1].replace(/[^a-z0-9äöü]/g, '');
    const found = state.apps.find(a => a.id.toLowerCase() === search || (a.name || '').toLowerCase().includes(search) || a.id.includes(search));
    if (found) {
      renderChatMsg({ id: 'action-' + Date.now(), from: 'agent', text: '[ACTION:open:' + found.id + ']', source: 'pulseos' });
      return;
    }
  }

  // ── Everything else → ClaudeOS (persistent memory + personality) ──
  showTypingIndicator();
  try {
    const r = await fetch('/api/chat-outbox', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, source: 'dashboard' }) });
    const d = await r.json();
    if (!d.ok) throw new Error('outbox failed');
  } catch(e) {
    hideTypingIndicator();
    // Queue for retry when ClaudeOS comes online
    messageRetryQueue.push({ text, target: 'claudeos', time: Date.now(), retries: 0 });
    renderChatMsg({ id: 'err-' + Date.now(), from: 'agent', text: 'Offline \u2014 Nachricht wird erneut gesendet wenn ClaudeOS online.', source: 'system' });
  }
}

// ── Worker Status Polling ──
// Track which workers have been reported as done (to avoid duplicate messages from SSE + polling)
const workerDoneReported = new Set();

function pollWorkerStatus(workerId) {
  let attempts = 0;
  const maxAttempts = 40; // 40 * 15s = 10 min max
  const interval = setInterval(async () => {
    attempts++;
    if (attempts > maxAttempts || workerDoneReported.has(workerId)) { clearInterval(interval); return; }
    try {
      const r = await fetch('/api/workers/' + workerId);
      if (!r.ok) { clearInterval(interval); return; }
      const w = await r.json();
      if (w.status === 'done' || w.status === 'error' || w.status === 'stopped') {
        clearInterval(interval);
        if (workerDoneReported.has(workerId)) return; // Server SSE already delivered the message
        workerDoneReported.add(workerId);
        // Reload app list so new apps are available
        try { const sr = await fetch('/api/state'); if (sr.ok) state = await sr.json(); } catch(e) {}
      }
    } catch(e) { /* retry next interval */ }
  }, 15000);
}

// ── Message Retry Queue ──
let messageRetryQueue = [];
async function processRetryQueue() {
  if (messageRetryQueue.length === 0) return;
  const claudeOnline = agentPresence['claudeos']?.online;
  if (!claudeOnline) return;
  const queue = [...messageRetryQueue];
  messageRetryQueue = [];
  for (const msg of queue) {
    if (msg.retries >= 3 || Date.now() - msg.time > 30 * 60 * 1000) continue; // Max 3 retries or 30 min old
    try {
      const r = await fetch('/api/chat-outbox', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg.text, source: 'dashboard' }) });
      const d = await r.json();
      if (d.ok) {
        renderChatMsg({ id: 'retry-' + Date.now(), from: 'agent', text: '\u2705 Nachricht erneut gesendet.', source: 'system' });
      } else {
        msg.retries++;
        messageRetryQueue.push(msg);
      }
    } catch { msg.retries++; messageRetryQueue.push(msg); }
  }
}
setInterval(processRetryQueue, 15000); // Check every 15s with presence refresh

// ── Morning Briefing ──
function checkMorningBriefing() {
  const now = new Date();
  const hour = now.getHours();
  const today = now.toISOString().slice(0, 10);
  const lastBriefing = localStorage.getItem('pulse-last-briefing');
  if (lastBriefing === today || hour < 6 || hour > 11) return;

  localStorage.setItem('pulse-last-briefing', today);
  fetch('/api/dashboard-stats').then(r => r.json()).then(data => {
    if (!data.stats) return;
    const s = data.stats;
    const parts = [];
    if (s.openTodos > 0) parts.push(s.openTodos + ' offene Todos');
    if (s.highPriorityTodos > 0) parts.push(s.highPriorityTodos + ' dringend');
    if (s.activeContexts > 0) parts.push(s.activeContexts + ' aktive Projekte');
    if (s.staleContexts > 0) parts.push(s.staleContexts + ' Projekte brauchen Aufmerksamkeit');

    if (parts.length > 0) {
      const briefing = 'Guten Morgen! Heute: ' + parts.join(', ') + '.';
      renderSystemChatMessage({ peerId: 'agent', from: 'Agent', text: briefing, avatar: '*' });
      const ab = document.getElementById('agentText');
      if (ab) ab.textContent = briefing;
    }
  }).catch(() => {});
}
setTimeout(checkMorningBriefing, 2000);

  const bar = document.getElementById('agentStatus');

  const short = text.length > 60 ? text.substring(0, 57) + '...' : text;

async function refreshAgentPresence() {

    (data.agents || []).forEach(a => {

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'mutation') trackMutation(e.data.action || 'app', e.data.detail || '');
  if (e.data && e.data.type === 'error') addFeed('Error: ' + (e.data.message || '?'), 'error');
  if (e.data && e.data.type === 'graph-output' && e.data.appId && e.data.outputName) {
    fetch('/api/graphs').then(r => r.json()).then(gData => {
      (gData.graphs || []).filter(g => g.nodes && g.nodes.some(n => n.appId === e.data.appId)).forEach(g => {
        fetch('/api/graphs/' + g.projectId + '/output', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ appId: e.data.appId, outputName: e.data.outputName, data: e.data.data }) }).catch(() => {});
      });
    }).catch(() => {});
  }
  if (e.data && e.data.type === 'open-app' && e.data.appId) {
    const app = (state && state.apps || []).find(a => a.id === e.data.appId);
    if (app) openApp(app);
  }
  if (e.data && e.data.type === 'app-alert' && e.data.message) {
    addFeed(e.data.message, 'info');
    const ab = document.getElementById('agentText');
    if (ab) ab.textContent = e.data.message;
  }
  if (e.data && e.data.type === 'set-theme' && e.data.theme) setTheme(e.data.theme);
  if (e.data && e.data.type === 'start-tutorial') {
    const settingsWin = openWindows.find(w => w.appId === 'settings');
    if (settingsWin) closeWin(settingsWin.winId);
    showHome();
    setTimeout(() => startTutorial(), 300);
  }
  if (e.data && e.data.type === 'open-app' && e.data.appId) {
    const app = state?.apps?.find(a => a.id === e.data.appId);
    if (app) openApp(app);
    else fetch('/api/apps').then(r => r.json()).then(data => { if (data.apps) state.apps = data.apps; const a = data.apps?.find(a => a.id === e.data.appId); if (a) openApp(a); }).catch(() => {});
  }
  if (e.data && e.data.type === 'show-publishing-panel' && e.data.appId) {
    if (window.AppActions) AppActions.showPublishingPanel(e.data.appId);
  }
});

async function renderActiveGraphs() {
  const section = document.getElementById('graphSection');
  const el = document.getElementById('activeGraphs');
  if (!section || !el) return;
  try {
    const [graphsRes, regRes] = await Promise.all([
      fetch('/api/graphs').then(r => r.ok ? r.json() : { graphs: [] }),
      fetch('/api/app-registry').then(r => r.ok ? r.json() : { apps: [] })
    ]);
    const graphs = graphsRes.graphs || [];
    const regApps = regRes.apps || [];
    if (graphs.length === 0) { section.style.display = 'none'; return; }
    section.style.display = '';
    el.innerHTML = graphs.map(g => {
      const nodes = (g.nodes || []).slice(0, 4);
      const nodesHtml = nodes.map((n, i) => {
        const app = regApps.find(a => a.id === n.appId);
        const icon = app?.manifest?.icon || '#';
        return (i > 0 ? '<span class="graph-arrow">-></span>' : '') +
          '<div class="graph-node" title="' + (app?.manifest?.name || n.appId) + '">' + icon + '</div>';
      }).join('');
      const label = g.name || g.projectId;
      const playBtn = '<button class="graph-run-btn" onclick="event.stopPropagation();runGraph(\'' + g.projectId + '\')" title="Graph ausführen">▶</button>';
      const delBtn = '<button class="graph-del-btn" onclick="event.stopPropagation();deleteGraph(\'' + g.projectId + '\')" title="Graph löschen">x</button>';
      return '<div class="graph-card" onclick="openGraphEditor(\'' + g.projectId + '\')" style="cursor:pointer;"><div class="graph-nodes">' + nodesHtml + '</div>' +
        '<div class="graph-info"><div class="graph-name">' + label + '</div>' +
        '<div class="graph-status">' + nodes.length + ' Nodes · ' + (g.edges || []).length + ' Edges' +
        ((g.triggers && g.triggers.length > 0) ? ' · ' + g.triggers.map(t => t.type === 'cron' ? '⏰' : t.type === 'chat' ? '💬' : '⚡').join('') : '') +
        '</div></div>' + playBtn + delBtn + '</div>';
    }).join('');
  } catch { section.style.display = 'none'; }
}

function openGraphEditor(projectId) {
  // Find projects app from state
  const app = state?.apps?.find(a => a.id === 'projects');
  if (!app) { showAgentAlert('Projects App nicht gefunden'); return; }

async function deleteGraph(graphId) {

  try {
    await fetch('/api/graphs/' + graphId, { method: 'DELETE' });

async function createNewGraph() {
  const name = prompt('Name für den neuen Graph:');
  if (!name) return;
  const id = 'graph-' + Date.now();
  try {
    const now = new Date().toISOString();
    // Create graph
    await fetch('/api/graphs/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, projectId: id, name, description: '', nodes: [], edges: [], created: now, updated: now })
    });
    // Also create project entry
    const projRes = await fetch('/app/projects/api/projects');
    const projData = await projRes.json();
    projData.projects = projData.projects || [];
    projData.projects.push({ id, name, description: '', color: '#4ecdc4', created: now });
    await fetch('/app/projects/api/projects', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(projData) });
    renderActiveGraphs();
    setTimeout(() => openGraphEditor(id), 300);
  } catch (e) {
    showAgentAlert('Fehler: ' + e.message);
  }
}

async function runGraph(graphId) {
  const btn = document.querySelector('.graph-run-btn[onclick*="' + graphId + '"]');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  try {
    const r = await fetch('/api/graph-run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ graphId }) });
    const data = await r.json();
    if (data.ok && data.summary) {
      showAgentAlert(data.summary.split('\n')[0]);
    } else if (!data.ok) {
      showAgentAlert('Graph-Fehler: ' + (data.error || 'unbekannt'));
    }
  } catch (e) {
    showAgentAlert('Graph-Fehler: ' + e.message);
  }
  if (btn) { btn.textContent = '▶'; btn.disabled = false; }
}

function getRelativeTime(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'jetzt';
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h';
  return Math.floor(hrs / 24) + 'd';
}

// Toast notification
function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;z-index:99999;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.4);';
  t.style.background = type === 'error' ? '#e74c3c' : type === 'success' ? 'var(--teal)' : 'var(--bg-surface)';
  t.style.color = type === 'error' || type === 'success' ? '#fff' : 'var(--text)';
  t.style.border = '1px solid ' + (type === 'error' ? '#c0392b' : type === 'success' ? '#3db89a' : 'var(--border)');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3500);
}
