function showTutorialStep() {
  document.getElementById('tutorialOverlay')?.remove();
  if (tutorialIdx >= tutorialSteps.length) {
    localStorage.setItem('pulse-tutorial-done', '1');
    setMode('flow');
    return;
  }
  const step = tutorialSteps[tutorialIdx];
  const overlay = document.createElement('div');
  overlay.id = 'tutorialOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:90000;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;';

  let boxStyle = 'background:#111118;border:1px solid var(--teal,#4ecdc4);border-radius:10px;padding:24px 28px;max-width:420px;width:90%;color:rgba(255,255,255,.85);font-family:var(--font);';
  let spotlightCSS = '';

  if (step.target) {
    const el = document.querySelector(step.target);
    if (el) {
      const rect = el.getBoundingClientRect();
      spotlightCSS = 'position:fixed;left:' + (rect.left - 6) + 'px;top:' + (rect.top - 6) + 'px;width:' + (rect.width + 12) + 'px;height:' + (rect.height + 12) + 'px;border:2px solid var(--teal,#4ecdc4);border-radius:8px;z-index:90001;pointer-events:none;box-shadow:0 0 20px rgba(78,205,196,.15);';
      if (step.pos === 'below') {
        boxStyle += 'position:fixed;left:' + Math.max(20, Math.min(rect.left, window.innerWidth - 440)) + 'px;top:' + (rect.bottom + 20) + 'px;z-index:90002;';
      } else if (step.pos === 'above') {
        boxStyle += 'position:fixed;left:' + Math.max(20, Math.min(rect.left, window.innerWidth - 440)) + 'px;bottom:' + (window.innerHeight - rect.top + 20) + 'px;z-index:90002;';
      }
    }
  }

  const stepNum = (tutorialIdx + 1) + '/' + tutorialSteps.length;
  const isLast = tutorialIdx === tutorialSteps.length - 1;
  const isNewChapter = step.chapter !== tutorialChapter;
  tutorialChapter = step.chapter;

  // Progress bar
  const progress = Math.round(((tutorialIdx + 1) / tutorialSteps.length) * 100);
  const progressBar = '<div style="width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:16px;overflow:hidden;"><div style="width:' + progress + '%;height:100%;background:var(--teal,#4ecdc4);border-radius:2px;transition:width .3s;"></div></div>';

  // Chapter badge
  const chapterBadge = isNewChapter ?
    '<div style="display:inline-block;background:rgba(78,205,196,.1);color:var(--teal,#4ecdc4);padding:2px 10px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">' + step.chapter + '</div>' : '';

  // Action hint
  let actionHint = '';
  if (step.action === 'try-cockpit') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:6px;font-size:10px;color:var(--amber,#f5a623);">Tipp: Du kannst den Modus jederzeit wechseln</div>';
  if (step.action === 'open-notes') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;font-size:10px;color:var(--teal,#4ecdc4);">Aktion: Klicke auf N oder druecke Cmd+Space</div>';
  if (step.action === 'open-tasks') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;font-size:10px;color:var(--teal,#4ecdc4);">Tipp: !! = hoch, ! = mittel, ohne = niedrig</div>';
  if (step.action === 'try-launcher') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:6px;font-size:10px;color:var(--lila,#a855f7);">Probiere es nach dem Tutorial: Cmd+Space</div>';
  if (step.action === 'open-chat') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:6px;font-size:10px;color:var(--teal,#4ecdc4);">Shortcut: Cmd+K oeffnet den Chat</div>';
  if (step.action === 'show-cockpit-graphs') actionHint = '<div style="margin-top:12px;padding:8px 12px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:6px;font-size:10px;color:var(--lila,#a855f7);">Graphen sind in der Cockpit-Ansicht sichtbar</div>';

  overlay.innerHTML =
    (spotlightCSS ? '<div style="' + spotlightCSS + '"></div>' : '') +
    '<div style="' + boxStyle + '">' +
      progressBar +
      chapterBadge +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
        '<div style="font-size:16px;font-weight:700;">' + step.title + '</div>' +
        '<div style="font-size:9px;color:rgba(255,255,255,.3);">' + stepNum + '</div>' +
      '</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,.55);white-space:pre-line;line-height:1.7;">' + step.text + '</div>' +
      actionHint +
      '<div style="display:flex;gap:8px;margin-top:18px;justify-content:space-between;align-items:center;">' +
        '<button onclick="skipTutorial()" style="background:none;border:none;color:rgba(255,255,255,.25);padding:4px 0;font:10px var(--font);cursor:pointer;">Tutorial ueberspringen</button>' +
        '<div style="display:flex;gap:8px;">' +
          (tutorialIdx > 0 ? '<button onclick="prevTutorialStep()" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);padding:5px 14px;border-radius:5px;font:11px var(--font);cursor:pointer;">Zurueck</button>' : '') +
          '<button onclick="nextTutorialStep()" style="background:var(--teal,#4ecdc4);color:var(--bg);border:none;padding:5px 16px;border-radius:5px;font:600 11px var(--font);cursor:pointer;">' + (isLast ? 'Los geht\'s!' : 'Weiter') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Execute step actions
  if (step.action === 'show-cockpit-graphs') setMode('cockpit');
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function saveProfileEdit() {
  const name = document.getElementById('pe-name').value.trim();
  if (!name) { document.getElementById('pe-name').style.borderColor = 'var(--red)'; return; }
  const profile = {
    name,
    handle: document.getElementById('pe-handle').value.trim() || name.toLowerCase().replace(/\s+/g, '-'),
    avatar: document.getElementById('pe-avatar').value || '>',
    bio: document.getElementById('pe-bio').value.trim(),
    githubPages: document.getElementById('pe-ghpages').value.trim()
  };
  try {
    await fetch('/api/profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(profile) });
    const res = await fetch('/api/profile');
    userProfile = await res.json();
    updateProfileDisplay();
    document.getElementById('profileModal')?.remove();
  } catch {}
}

// ── Greeting ──
function updateGreeting() {
  const h = new Date().getHours();
  const name = userProfile?.name || '';
  let greeting = 'Guten Tag';
  let sub = 'Agentic Operating System';
  if (h < 6) { greeting = 'Gute Nacht'; sub = 'PulseOS laeuft im Hintergrund.'; }
  else if (h < 12) { greeting = 'Guten Morgen'; sub = 'Dein System ist bereit.'; }
  else if (h < 18) { greeting = 'Guten Tag'; sub = 'Was steht an?'; }
  else { greeting = 'Guten Abend'; sub = 'Noch etwas erledigen?'; }
  document.getElementById('greetingText').textContent = greeting + (name ? ', ' + name : '');
  document.getElementById('greetingSub').textContent = sub;
  // Load quick stats
  loadQuickStats();
  updateWorkerBadge();
}

async function updateWorkerBadge() {
  try {
    const r = await fetch('/api/workers');
    if (!r.ok) return;
    const data = await r.json();
    const workers = Array.isArray(data) ? data : (data.workers || []);
    const running = workers.filter(w => w.status === 'running').length;
    const badge = document.getElementById('workerBadge');
    const count = document.getElementById('workerCount');
    if (badge && count) {
      badge.style.display = running > 0 ? 'inline-block' : 'none';
      count.textContent = running;
    }
  } catch {}
}
setInterval(updateWorkerBadge, 10000);

async function loadQuickStats() {
  try {
    const [actRes, tasksRes] = await Promise.all([
      fetch('/api/activity-summary?days=7'),
      fetch('/app/tasks/api/tasks').catch(() => null)
    ]);
    const act = await actRes.json();
    const parts = [];
    if (act.activity?.length > 0) parts.push(act.activity.length + ' aktive Apps');
    if (act.staleApps?.length > 0) parts.push(act.staleApps.length + ' inaktiv');
    if (tasksRes) {
      try {
        const td = await tasksRes.json();
        const tasks = td.tasks || [];
        const open = tasks.filter(t => !t.done && !t.completed).length;
        if (open > 0) parts.push(open + ' offene Tasks');
      } catch {}
    }
    const claudeOnline = agentPresence['claudeos']?.online;
    if (claudeOnline) parts.push('ClaudeOS online');
    const sub = document.getElementById('greetingSub');
    if (sub && parts.length > 0) sub.textContent = parts.join(' · ');
  } catch {}
}

function renderChatsList() {
  const el = document.getElementById('chatListContent');
  if (!el) return;
  if (chatsList.length === 0) {
    el.innerHTML = '<div class="chat-empty" style="padding:16px;text-align:center;">Keine Chats.<br><button onclick="chatNewDialog()" style="margin-top:8px;background:var(--teal);border:none;color:var(--bg);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;">+ Neuer Chat</button></div>';
    return;
  }
  el.innerHTML = chatsList.map(c => {
    const isGroup = c.type === 'group';
    const name = c.name || c.participants.filter(p => p !== (userProfile?.handle || 'chris')).join(', ') || 'Chat';
    // Peer-type icon: 🟢 PulseOS+ClaudeOS, 🔵 PulseOS, ⚪ Guest, ◆ ClaudeOS, 👥 Group
    let icon = '💬';
    if (isGroup) { icon = '👥'; }
    else if (c.id === 'chat-claudeos') { icon = '◆'; }
    else if (c.id.startsWith('chat-peer-')) {
      // Find connected peer to check capabilities
      const peer = Object.values(window.connectedPeers || {}).find(p => p.chatId === c.id);
      if (peer && peer.pulseos && peer.claudeos) icon = '🟢';
      else if (peer && peer.pulseos) icon = '🔵';
      else icon = '⚪';
    }
    const preview = c.lastMessage ? c.lastMessage.text : 'Noch keine Nachrichten';
    const unreadCount = (c.unread || 0) + ((window.unreadChats && window.unreadChats[c.id]) || 0);
    if (unreadCount > 0) console.log('[chat] Unread badge:', c.id, 'server:', c.unread, 'local:', window.unreadChats?.[c.id], 'total:', unreadCount);
    const unread = unreadCount > 0 ? '<span style="background:var(--teal);color:var(--bg);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">' + unreadCount + '</span>' : '';
    const time = c.lastMessage?.time ? new Date(c.lastMessage.time).toLocaleTimeString('de', {hour:'2-digit',minute:'2-digit'}) : '';
    const deletable = c.id !== 'chat-claudeos';
    return '<div class="chat-list-item" onclick="openChat(\'' + c.id + '\')" oncontextmenu="event.preventDefault();' + (deletable ? 'confirmDeleteChat(\'' + c.id + '\',\'' + escapeHtml(name).replace(/'/g, "\\'") + '\')' : '') + '" style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;" onmouseenter="this.style.background=\'var(--bg-card-hover)\'" onmouseleave="this.style.background=\'\'">' +
      '<span style="font-size:18px;width:28px;text-align:center;flex-shrink:0;">' + icon + '</span>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-weight:600;font-size:12px;">' + escapeHtml(name) + '</span>' +
          '<span style="font-size:9px;color:var(--text-dim);">' + time + '</span>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:4px;">' +
          '<span style="font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(preview.substring(0, 50)) + '</span>' +

  document.getElementById('chatListView').style.display = 'none';
  document.getElementById('chatMsgView').style.display = 'flex';
  document.getElementById('chatBackBtn').style.display = '';
  const chat = chatsList.find(c => c.id === chatId);
  const name = chat?.name || chat?.participants?.filter(p => p !== (userProfile?.handle || 'chris')).join(', ') || 'Chat';
  const titleEl = document.getElementById('chatHeaderTitle');
  titleEl.textContent = name;
  titleEl.style.cursor = chat?.type === 'group' ? 'pointer' : '';
  titleEl.onclick = chat?.type === 'group' ? () => showGroupEditDialog(chatId) : null;
  // Show ClaudeOS toggle for peer chats
  const slot = document.getElementById('claudeToggleSlot');
  let toggleEl = document.getElementById('claudeToggle');
  if (!toggleEl) {
    toggleEl = document.createElement('button');
    toggleEl.id = 'claudeToggle';
    toggleEl.style.cssText = 'background:none;border:1px solid var(--border);color:var(--text-dim);font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;';
    slot.appendChild(toggleEl);
  }
  if (chatId.startsWith('chat-peer-')) {
    toggleEl.style.display = '';
    const isEnabled = chat?.claudeEnabled || false;
    toggleEl.textContent = isEnabled ? '◆ KI an' : '◇ KI aus';
    toggleEl.style.color = isEnabled ? 'var(--teal)' : 'var(--text-dim)';
    toggleEl.style.borderColor = isEnabled ? 'var(--teal)' : 'var(--border)';
    toggleEl.onclick = async () => {
      const newState = !isEnabled;
      await fetch('/api/chats/' + chatId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ claudeEnabled: newState }) });
      if (chat) chat.claudeEnabled = newState;
      openChat(chatId); // re-render
    };
  } else {
    toggleEl.style.display = 'none';
  }
  // Load messages
  const msgs = document.getElementById('systemChatMessages');
  msgs.innerHTML = '<div class="chat-empty">Lade...</div>';
  chatHistoryRendering = true;
  try {
    const res = await fetch('/api/chats/' + chatId);
    const data = await res.json();
    msgs.innerHTML = '';
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(m => renderChatMsg(m));
    } else {
      msgs.innerHTML = '<div class="chat-empty">Noch keine Nachrichten</div>';
    }
    // Merge global chat-history into ClaudeOS chat (unified view)
    if (chatId === 'chat-claudeos') {
      try {
        const histRes = await fetch('/api/chat-history');
        const histData = await histRes.json();
        if (histData.messages && histData.messages.length > 0) {
          // Merge: combine chat-file messages + history, deduplicate by id, sort by time
          const chatMsgs = data.messages || [];
          const allMsgs = [...chatMsgs];
          const seenIds = new Set(chatMsgs.map(m => m.id));
          histData.messages.forEach(m => { if (!seenIds.has(m.id)) { allMsgs.push(m); seenIds.add(m.id); } });
          allMsgs.sort((a, b) => new Date(a.time || 0) - new Date(b.time || 0));
          msgs.innerHTML = '';
          allMsgs.forEach(m => renderChatMsg(m));
        }
      } catch {}
    }
  } catch {}
  chatHistoryRendering = false;
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('systemChatInput')?.focus();
}

let lastSentText = '', lastSentTime = 0;
let chatHistoryRendering = false;
function renderChatMsg(msg) {
  if (renderedMsgIds.has(msg.id)) return;
  renderedMsgIds.add(msg.id);
  // Dedupe: skip SSE echo of message we already rendered locally
  if (msg.from === 'user' && msg.text === lastSentText && Date.now() - lastSentTime < 10000 && msg.id.startsWith('m-')) {
    return;
  }
  // Hide typing indicator when agent responds
  if (msg.from !== 'user') hideTypingIndicator();
  const msgs = document.getElementById('systemChatMessages');
  if (!msgs) return;
  if (msgs.querySelector('.chat-empty')) msgs.innerHTML = '';
  const isUser = msg.from === 'user';
  let txt = msg.text || '';
  // Parse and execute ACTION tags from PulseOS agent (only for new msgs, not history)
  if (!isUser && txt.includes('[ACTION:')) {
    // Worker-started action: show inline status with link to Workers app
    const workerStartMatch = txt.match(/\[ACTION:worker-started:([a-zA-Z0-9_-]+)\]/);
    if (workerStartMatch) {
      const workerId = workerStartMatch[1];
      txt = txt.replace(/\[ACTION:worker-started:[a-zA-Z0-9_-]+\]/g, '').trim();
      if (!txt) txt = 'Worker gestartet';
      txt += '\n⚙ Worker läuft...';
      // Start polling worker status for auto-update
      if (!chatHistoryRendering) pollWorkerStatus(workerId);
    }
    const actionMatch = txt.match(/\[ACTION:open:([a-zA-Z0-9_-]+)\]/g);
    if (actionMatch) {
      if (!chatHistoryRendering) {
        actionMatch.forEach(tag => {
          const appId = tag.match(/\[ACTION:open:([a-zA-Z0-9_-]+)\]/)[1];
          const app = (state && state.apps || []).find(a => a.id === appId);
          if (app) openApp(app);
          else console.warn('[ACTION] App not found:', appId);
        });
      }
      txt = txt.replace(/\[ACTION:open:[a-zA-Z0-9_-]+\]/g, '').trim();
    }
    if (!txt) txt = 'Erledigt ✓';
  }
  const isProactive = !isUser && /^[\u2600-\u26FF\u{1F300}-\u{1F9FF}]/u.test(txt);
  const sourceIcon = msg.source === 'telegram' ? '\u2708' : '\u25b8';
  const fromLabel = isUser ? (userProfile?.name || 'Du') : (msg.source === 'webrtc' ? (msg.senderName || 'Peer') : msg.source === 'pulseos' ? 'PulseOS' : 'ClaudeOS');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;' + (isUser ? 'flex-direction:row-reverse;' : '');
  const bgStyle = isUser ? 'background:var(--teal);color:var(--bg);' : isProactive ? 'background:linear-gradient(135deg, var(--bg-card-hover), rgba(245,166,35,0.15));color:var(--text);border:1px solid rgba(245,166,35,0.3);' : 'background:var(--bg-card-hover);color:var(--text);';
  div.innerHTML = '<span style="font-size:14px;flex-shrink:0;width:20px;text-align:center;">' + sourceIcon + '</span>' +
    '<div style="max-width:220px;padding:6px 10px;border-radius:8px;font-size:11px;' + bgStyle + '">' +
    '<div style="font-size:9px;opacity:0.6;margin-bottom:2px;">' + fromLabel + ' <span style="opacity:0.5;">' + (msg.source || '') + '</span></div>' +
    '<div style="white-space:pre-wrap;word-break:break-word;">' + escapeHtml(txt) + '</div></div>';
  // Insert before typing indicator so it always stays at the bottom
  const typing = document.getElementById('typingIndicator');
  if (typing) msgs.insertBefore(div, typing);
  else msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function sendToAgent(text) {
  // Render user message immediately
  const userMsgId = 'm-' + Date.now();
  renderChatMsg({ id: userMsgId, from: 'user', text, source: 'dashboard' });
  lastSentText = text; lastSentTime = Date.now();
  // Persist user message to active chat file (so it survives reload)
  if (activeChatId) {
    fetch('/api/chats/' + activeChatId + '/message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: userMsgId, from: 'user', text, source: 'dashboard', time: new Date().toISOString() })
    }).catch(() => {});
  }

  // ── Fast-path: Action Cache (instant, no API call) ──
  const lower = text.toLowerCase().trim();
  const openMatch = lower.match(/(?:öffne|open|starte|start|zeig|show)\s+(?:die\s+|den\s+|das\s+|mir\s+|die\s+app\s+)?(.+?)(?:\s+app)?$/i);
  if (openMatch && state && state.apps) {
    const search = openMatch[1].replace(/[^a-z0-9äöü]/g, '');
    const found = state.apps.find(a => a.id.toLowerCase() === search || (a.name || '').toLowerCase().includes(search) || a.id.includes(search));
    if (found) {
      renderChatMsg({ id: 'action-' + Date.now(), from: 'agent', text: '[ACTION:open:' + found.id + ']', source: 'pulseos' });
      return;
    }
  }

  // ── Everything else → ClaudeOS (persistent memory + personality) ──
  showTypingIndicator();
  try {
    const r = await fetch('/api/chat-outbox', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, source: 'dashboard' }) });
    const d = await r.json();
    if (!d.ok) throw new Error('outbox failed');
  } catch(e) {
    hideTypingIndicator();
    // Queue for retry when ClaudeOS comes online
    messageRetryQueue.push({ text, target: 'claudeos', time: Date.now(), retries: 0 });
    renderChatMsg({ id: 'err-' + Date.now(), from: 'agent', text: 'Offline \u2014 Nachricht wird erneut gesendet wenn ClaudeOS online.', source: 'system' });
  }
}

// ── Worker Status Polling ──
// Track which workers have been reported as done (to avoid duplicate messages from SSE + polling)
const workerDoneReported = new Set();

function pollWorkerStatus(workerId) {
  let attempts = 0;
  const maxAttempts = 40; // 40 * 15s = 10 min max
  const interval = setInterval(async () => {
    attempts++;
    if (attempts > maxAttempts || workerDoneReported.has(workerId)) { clearInterval(interval); return; }
    try {
      const r = await fetch('/api/workers/' + workerId);
      if (!r.ok) { clearInterval(interval); return; }
      const w = await r.json();
      if (w.status === 'done' || w.status === 'error' || w.status === 'stopped') {
        clearInterval(interval);
        if (workerDoneReported.has(workerId)) return; // Server SSE already delivered the message
        workerDoneReported.add(workerId);
        // Reload app list so new apps are available
        try { const sr = await fetch('/api/state'); if (sr.ok) state = await sr.json(); } catch(e) {}
      }
    } catch(e) { /* retry next interval */ }
  }, 15000);
}

// ── Message Retry Queue ──
let messageRetryQueue = [];
async function processRetryQueue() {
  if (messageRetryQueue.length === 0) return;
  const claudeOnline = agentPresence['claudeos']?.online;
  if (!claudeOnline) return;
  const queue = [...messageRetryQueue];
  messageRetryQueue = [];
  for (const msg of queue) {
    if (msg.retries >= 3 || Date.now() - msg.time > 30 * 60 * 1000) continue; // Max 3 retries or 30 min old
    try {
      const r = await fetch('/api/chat-outbox', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg.text, source: 'dashboard' }) });
      const d = await r.json();
      if (d.ok) {
        renderChatMsg({ id: 'retry-' + Date.now(), from: 'agent', text: '\u2705 Nachricht erneut gesendet.', source: 'system' });
      } else {
        msg.retries++;
        messageRetryQueue.push(msg);
      }
    } catch { msg.retries++; messageRetryQueue.push(msg); }
  }
}
setInterval(processRetryQueue, 15000); // Check every 15s with presence refresh

// ── Morning Briefing ──
function checkMorningBriefing() {
  const now = new Date();
  const hour = now.getHours();
  const today = now.toISOString().slice(0, 10);
  const lastBriefing = localStorage.getItem('pulse-last-briefing');
  if (lastBriefing === today || hour < 6 || hour > 11) return;

  localStorage.setItem('pulse-last-briefing', today);
  fetch('/api/dashboard-stats').then(r => r.json()).then(data => {
    if (!data.stats) return;
    const s = data.stats;
    const parts = [];
    if (s.openTodos > 0) parts.push(s.openTodos + ' offene Todos');
    if (s.highPriorityTodos > 0) parts.push(s.highPriorityTodos + ' dringend');
    if (s.activeContexts > 0) parts.push(s.activeContexts + ' aktive Projekte');
    if (s.staleContexts > 0) parts.push(s.staleContexts + ' Projekte brauchen Aufmerksamkeit');

    if (parts.length > 0) {
      const briefing = 'Guten Morgen! Heute: ' + parts.join(', ') + '.';
      renderSystemChatMessage({ peerId: 'agent', from: 'Agent', text: briefing, avatar: '*' });
      const ab = document.getElementById('agentText');
      if (ab) ab.textContent = briefing;
    }
  }).catch(() => {});
}
setTimeout(checkMorningBriefing, 2000);

let agentAlertTimeout = null;
function showAgentAlert(text) {
  const bar = document.getElementById('agentStatus');

  const short = text.length > 60 ? text.substring(0, 57) + '...' : text;

}

let agentPresence = {}; // { claudeos: { online: true, lastSeen: '...' } }
async function refreshAgentPresence() {
  try {
    const r = await fetch('/api/agents');
    const data = await r.json();
    const now = Date.now();
    (data.agents || []).forEach(a => {
      const lastHB = a.lastHeartbeat ? new Date(a.lastHeartbeat).getTime() : 0;
      agentPresence[a.id] = { online: (now - lastHB) < 60000, lastSeen: a.lastHeartbeat };
    });
    // Update agent-bar dot and status text
    const dot = document.querySelector('.agent-dot');
    const agentText = document.getElementById('agentText');
    if (dot) {
      const claudeOnline = agentPresence['claudeos']?.online;
      if (!document.getElementById('agentStatus').classList.contains('has-alert')) {
        dot.style.background = claudeOnline ? 'var(--teal)' : '#666';

        if (agentText && unreadAgentCount === 0) {
          agentText.textContent = claudeOnline ? 'ClaudeOS online' : 'Offline';
        }
      }
    }
    renderContacts();
  } catch {}
}

// ── Message Handler ──
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'mutation') trackMutation(e.data.action || 'app', e.data.detail || '');
  if (e.data && e.data.type === 'error') addFeed('Error: ' + (e.data.message || '?'), 'error');
  if (e.data && e.data.type === 'graph-output' && e.data.appId && e.data.outputName) {
    fetch('/api/graphs').then(r => r.json()).then(gData => {
      (gData.graphs || []).filter(g => g.nodes && g.nodes.some(n => n.appId === e.data.appId)).forEach(g => {
        fetch('/api/graphs/' + g.projectId + '/output', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ appId: e.data.appId, outputName: e.data.outputName, data: e.data.data }) }).catch(() => {});
      });
    }).catch(() => {});
  }
  if (e.data && e.data.type === 'open-app' && e.data.appId) {
    const app = (state && state.apps || []).find(a => a.id === e.data.appId);
    if (app) openApp(app);
  }
  if (e.data && e.data.type === 'app-alert' && e.data.message) {
    addFeed(e.data.message, 'info');
    const ab = document.getElementById('agentText');
    if (ab) ab.textContent = e.data.message;
  }
  if (e.data && e.data.type === 'set-theme' && e.data.theme) setTheme(e.data.theme);
  if (e.data && e.data.type === 'start-tutorial') {
    const settingsWin = openWindows.find(w => w.appId === 'settings');
    if (settingsWin) closeWin(settingsWin.winId);
    showHome();
    setTimeout(() => startTutorial(), 300);
  }
  if (e.data && e.data.type === 'open-app' && e.data.appId) {
    const app = state?.apps?.find(a => a.id === e.data.appId);
    if (app) openApp(app);
    else fetch('/api/apps').then(r => r.json()).then(data => { if (data.apps) state.apps = data.apps; const a = data.apps?.find(a => a.id === e.data.appId); if (a) openApp(a); }).catch(() => {});
  }
});

// ── Contexts ──
let ctxLauncherOpen = false;
let contextList = [];

async function loadContexts() {
  try {
    const r = await fetch('/api/contexts');
    const data = await r.json();
    contextList = (data.contexts || []).sort((a, b) => (b.updated || '').localeCompare(a.updated || ''));

}

function openContext(ctx) {
  if (ctxLauncherOpen) toggleContextLauncher();
  const projectsApp = state?.apps?.find(a => a.id === 'projects');
  if (projectsApp) openApp(projectsApp, { contextId: ctx.id, titleSuffix: ctx.name });
}

function toggleContextLauncher() {
  ctxLauncherOpen = !ctxLauncherOpen;
  document.getElementById('contextLauncher').style.display = ctxLauncherOpen ? 'flex' : 'none';
  if (ctxLauncherOpen) {
    loadContexts().then(() => renderContextGrid(contextList));
    document.getElementById('ctxLauncherSearch').value = '';
    document.getElementById('ctxLauncherSearch').focus();
  }
}

function renderContextGrid(contexts) {
  const grid = document.getElementById('ctxLauncherGrid');
  if (!grid) return;
  if (contexts.length === 0) { grid.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">Keine Projekte</div>'; return; }

    '<div class="launcher-app" onclick="openContext(' + JSON.stringify(ctx).replace(/"/g, '&quot;') + ')" style="width:100px;">' +
    '<div class="icon" style="background:' + (ctx.color || 'var(--lila)') + '">' + (ctx.icon || '#') + '</div>' +
    '<div class="name">' + (ctx.name || ctx.id) + '</div></div>'
  ).join('');
}

function filterContexts(query) {
  const q = query.toLowerCase();
  renderContextGrid(contextList.filter(c => (c.name || '').toLowerCase().includes(q) || (c.id || '').toLowerCase().includes(q)));
}

function renderRecentContexts() {

  }

      '<div class="project-head">' +

        '<div><div class="project-name">' + (ctx.name || ctx.id) + '</div>' +
        '<div class="project-meta">' + (widgetCount ? widgetCount + ' Widgets' : '') + (age ? ' · ' + age : '') + '</div></div>' +
      '</div>' +
      (pills ? '<div class="project-pills">' + pills + '</div>' : '') +

function openContextById(ctxId) {
  const ctx = contextList.find(c => c.id === ctxId);
  if (ctx) { openContext(ctx); return; }
  const app = state?.apps?.find(a => a.id === 'projects');
  if (app) openApp(app, { contextId: ctxId });

async function renderActiveGraphs() {
  const section = document.getElementById('graphSection');
  const el = document.getElementById('activeGraphs');
  if (!section || !el) return;
  try {
    const [graphsRes, regRes] = await Promise.all([
      fetch('/api/graphs').then(r => r.ok ? r.json() : { graphs: [] }),
      fetch('/api/app-registry').then(r => r.ok ? r.json() : { apps: [] })
    ]);
    const graphs = graphsRes.graphs || [];
    const regApps = regRes.apps || [];
    if (graphs.length === 0) { section.style.display = 'none'; return; }
    section.style.display = '';
    el.innerHTML = graphs.map(g => {
      const nodes = (g.nodes || []).slice(0, 4);
      const nodesHtml = nodes.map((n, i) => {
        const app = regApps.find(a => a.id === n.appId);
        const icon = app?.manifest?.icon || '#';
        return (i > 0 ? '<span class="graph-arrow">-></span>' : '') +
          '<div class="graph-node" title="' + (app?.manifest?.name || n.appId) + '">' + icon + '</div>';
      }).join('');
      const label = g.name || g.projectId;
      const playBtn = '<button class="graph-run-btn" onclick="event.stopPropagation();runGraph(\'' + g.projectId + '\')" title="Graph ausführen">▶</button>';
      const delBtn = '<button class="graph-del-btn" onclick="event.stopPropagation();deleteGraph(\'' + g.projectId + '\')" title="Graph löschen">x</button>';
      return '<div class="graph-card" onclick="openGraphEditor(\'' + g.projectId + '\')" style="cursor:pointer;"><div class="graph-nodes">' + nodesHtml + '</div>' +
        '<div class="graph-info"><div class="graph-name">' + label + '</div>' +
        '<div class="graph-status">' + nodes.length + ' Nodes · ' + (g.edges || []).length + ' Edges' +
        ((g.triggers && g.triggers.length > 0) ? ' · ' + g.triggers.map(t => t.type === 'cron' ? '⏰' : t.type === 'chat' ? '💬' : '⚡').join('') : '') +
        '</div></div>' + playBtn + delBtn + '</div>';
    }).join('');
  } catch { section.style.display = 'none'; }
}

function openGraphEditor(projectId) {
  // Find projects app from state
  const app = state?.apps?.find(a => a.id === 'projects');
  if (!app) { showAgentAlert('Projects App nicht gefunden'); return; }
  openApp(app);
  // After a short delay, send a message to the iframe to open the graph
  setTimeout(() => {
    const win = openWindows.find(w => w.appId === 'projects' && !w.closed);
    if (win) {
      const iframe = win.el.querySelector('iframe');
      if (iframe) iframe.contentWindow.postMessage({ type: 'open-graph', projectId }, '*');
    }
  }, 500);
}

async function deleteGraph(graphId) {
  if (!confirm('Graph "' + graphId + '" wirklich löschen?')) return;
  try {
    await fetch('/api/graphs/' + graphId, { method: 'DELETE' });
    renderActiveGraphs();
  } catch (e) {
    showAgentAlert('Fehler: ' + e.message);
  }
}

async function createNewGraph() {
  const name = prompt('Name für den neuen Graph:');
  if (!name) return;
  const id = 'graph-' + Date.now();
  try {
    const now = new Date().toISOString();
    // Create graph
    await fetch('/api/graphs/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, projectId: id, name, description: '', nodes: [], edges: [], created: now, updated: now })
    });
    // Also create project entry
    const projRes = await fetch('/app/projects/api/projects');
    const projData = await projRes.json();
    projData.projects = projData.projects || [];
    projData.projects.push({ id, name, description: '', color: '#4ecdc4', created: now });
    await fetch('/app/projects/api/projects', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(projData) });
    renderActiveGraphs();
    setTimeout(() => openGraphEditor(id), 300);
  } catch (e) {
    showAgentAlert('Fehler: ' + e.message);
  }
}

async function runGraph(graphId) {
  const btn = document.querySelector('.graph-run-btn[onclick*="' + graphId + '"]');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  try {
    const r = await fetch('/api/graph-run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ graphId }) });
    const data = await r.json();
    if (data.ok && data.summary) {
      showAgentAlert(data.summary.split('\n')[0]);
    } else if (!data.ok) {
      showAgentAlert('Graph-Fehler: ' + (data.error || 'unbekannt'));
    }
  } catch (e) {
    showAgentAlert('Graph-Fehler: ' + e.message);
  }
  if (btn) { btn.textContent = '▶'; btn.disabled = false; }
}

function getRelativeTime(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'jetzt';
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h';
  return Math.floor(hrs / 24) + 'd';
}

// Toast notification
function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;z-index:99999;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.4);';
  t.style.background = type === 'error' ? '#e74c3c' : type === 'success' ? 'var(--teal)' : 'var(--bg-surface)';
  t.style.color = type === 'error' || type === 'success' ? '#fff' : 'var(--text)';
  t.style.border = '1px solid ' + (type === 'error' ? '#c0392b' : type === 'success' ? '#3db89a' : 'var(--border)');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3500);
}

  const installRepo = params.get('install');

    // Clean URL
    history.replaceState(null, '', '/');
    // Wait for dashboard to load, then install

      try {
        const r = await fetch('/api/apps/install', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: installRepo }) });

        if (d.ok) {
          showToast(d.name + ' installiert!', 'success');
          addFeed('Installiert: ' + d.name, 'install');
          await load();
          render();
          openApp({ id: d.id, name: d.name });
        } else {
          showToast(d.error || 'Installation fehlgeschlagen', 'error');
          addFeed('Install-Fehler: ' + (d.error || 'Unbekannt'), 'error');
        }
      } catch (e) {
        showToast('Netzwerkfehler: ' + e.message, 'error');
      }
    }, 1500);
  }
})();

<script>
(function() {
  const SIGNALING_URL = 'https://web-production-84380f.up.railway.app';
  const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  let bridgeSocket = null, bridgeRoom = null;
  const bridgePeers = {}, bridgeChannels = {}, connectedPeers = {};
  const systemChatHistory = [];
  const pulseEventListeners = {};

  window.startBridgeHost = function(roomId) {
    if (bridgeSocket && bridgeRoom === roomId && bridgeSocket.connected) return;
    Object.keys(bridgePeers).forEach(id => cleanupBridgePeer(id));
    if (bridgeSocket && bridgeSocket.connected && bridgeRoom) {
      bridgeSocket.emit('leave-room', { roomId: bridgeRoom });
      bridgeRoom = roomId;
      bridgeSocket.emit('join-room', { roomId: bridgeRoom });
      return;
    }
    if (bridgeSocket) { try { bridgeSocket.removeAllListeners(); bridgeSocket.disconnect(); } catch {} bridgeSocket = null; }
    bridgeRoom = roomId;

    bridgeSocket = io(SIGNALING_URL, { forceNew: true, transports: ['websocket', 'polling'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 3000 });
    bridgeSocket.on('connect', () => bridgeSocket.emit('join-room', { roomId: bridgeRoom }));
    bridgeSocket.on('reconnect', () => bridgeSocket.emit('join-room', { roomId: bridgeRoom }));
    bridgeSocket.on('room-users', ({ users }) => users.forEach(id => createBridgePeer(id, true)));
    bridgeSocket.on('user-left', ({ userId }) => cleanupBridgePeer(userId));
    bridgeSocket.on('offer', async ({ offer, senderId, roomId }) => {
      const pc = createBridgePeer(senderId, false);
      try { await pc.setRemoteDescription(offer); const answer = await pc.createAnswer(); await pc.setLocalDescription(answer); bridgeSocket.emit('answer', { roomId, answer, targetId: senderId }); } catch (e) { console.warn('[bridge] Offer handling failed:', e.message); cleanupBridgePeer(senderId); }
    });
    bridgeSocket.on('answer', async ({ answer, senderId }) => { if (bridgePeers[senderId]) try { await bridgePeers[senderId].setRemoteDescription(answer); } catch (e) { console.warn('[bridge] Answer failed:', e.message); cleanupBridgePeer(senderId); } });
    bridgeSocket.on('ice-candidate', async ({ candidate, senderId }) => { if (bridgePeers[senderId] && candidate) try { await bridgePeers[senderId].addIceCandidate(candidate); } catch (e) { console.warn('[bridge] ICE failed:', e.message); } });
  };

  function createBridgePeer(targetId, isInitiator) {
    if (bridgePeers[targetId]) return bridgePeers[targetId];
    const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    bridgePeers[targetId] = pc;
    if (isInitiator) { const dc = pc.createDataChannel('bridge', { ordered: true }); setupBridgeChannel(dc, targetId); }
    pc.ondatachannel = e => setupBridgeChannel(e.channel, targetId);
    pc.onicecandidate = e => { if (e.candidate && bridgeSocket) bridgeSocket.emit('ice-candidate', { roomId: bridgeRoom, candidate: e.candidate, targetId }); };
    pc.onconnectionstatechange = () => {
      console.log('[bridge] Peer', targetId, 'state:', pc.connectionState);
      if (pc.connectionState === 'failed') { const name = connectedPeers[targetId]?.name || 'Peer'; showToast('Verbindung zu ' + name + ' verloren', 'error'); cleanupBridgePeer(targetId); }
      else if (pc.connectionState === 'closed') cleanupBridgePeer(targetId);
    };
    if (isInitiator) pc.createOffer().then(offer => { pc.setLocalDescription(offer); bridgeSocket.emit('offer', { roomId: bridgeRoom, offer, targetId }); }).catch(e => { console.warn('[bridge] createOffer failed:', e.message); cleanupBridgePeer(targetId); });
    return pc;
  }

  function setupBridgeChannel(dc, targetId) {
    bridgeChannels[targetId] = dc;
    dc.onopen = () => {
      connectedPeers[targetId] = { peerId: targetId, online: true, lastSeen: Date.now() };
      updatePeerBar();
      if (userProfile) sendBridgeMsg(targetId, { type: 'profile-exchange', profile: { ...userProfile, pulseos: true, claudeos: !!(agentPresence.claudeos && agentPresence.claudeos.online), capabilities: ['chat', 'app-share', 'clipboard', 'agent-relay', 'graphs'] } });
    };
    dc.onclose = () => { if (connectedPeers[targetId]) connectedPeers[targetId].online = false; updatePeerBar(); };
    dc.onmessage = e => { let data; try { data = JSON.parse(e.data); } catch { data = { type: 'text', content: e.data }; } console.log('[bridge] DC message from', targetId, ':', data.type, data.text?.substring(0,30) || ''); handleBridgeMessage(data, targetId); };
  }

  function handleBridgeMessage(data, senderId) {
    switch (data.type) {
      case 'tunnel-request':
        fetch('/api/tunnel').then(r => r.json()).then(d => {
          if (d.active && d.url) sendBridgeMsg(senderId, { type: 'tunnel-response', url: d.url });
          else {
            sendBridgeMsg(senderId, { type: 'text', content: 'Starting tunnel...' });
            fetch('/api/tunnel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'start' }) }).then(r => r.json()).then(result => {
              if (result.ok && result.url) { sendBridgeMsg(senderId, { type: 'tunnel-response', url: result.url }); tunnelActive = true; tunnelCurrentUrl = result.url; }
            }).catch(() => {});
          }
        }).catch(() => {});
        break;
      case 'ping': sendBridgeMsg(senderId, { type: 'pong', timestamp: data.timestamp }); break;
      case 'status-request':
        fetch('/api/tunnel').then(r => r.json()).then(d => sendBridgeMsg(senderId, { type: 'status-response', data: { server: 'PulseOS', tunnelActive: d.active, tunnelUrl: d.url || 'inactive' } })).catch(() => {});
        break;
      case 'text': case 'chat-message': {
        const peerName = connectedPeers[senderId]?.name || senderId.substring(0, 8);
        const peerHandle = connectedPeers[senderId]?.handle || peerName;
        const peerChatId = connectedPeers[senderId]?.chatId || ('chat-peer-' + peerHandle.toLowerCase().replace(/[^a-z0-9-]/g, ''));
        const msgText = data.content || data.text;
        if (!msgText) break;
        const msgId = data.id || ('m-peer-' + Date.now());
        if (renderedMsgIds.has(msgId)) break;
        const msgObj = { id: msgId, from: 'agent', text: msgText, source: 'webrtc', time: new Date().toISOString(), senderName: peerName };
        // Save to per-chat history via API (no SSE broadcast for webrtc)
        fetch('/api/chats/' + peerChatId + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(msgObj)
        }).catch(() => {});
        // Show in UI if this chat is open
        console.log('[bridge] Chat routing: activeChatId=' + activeChatId + ' peerChatId=' + peerChatId + ' match=' + (activeChatId === peerChatId));
        // Show in UI if this peer's chat is open
        if (activeChatId === peerChatId || activeChatId === connectedPeers[senderId]?.chatId) {
          renderChatMsg(msgObj);
        } else {
          // Unread badge
          if (!window.unreadChats) window.unreadChats = {};
          if (!window.unreadChats[peerChatId]) window.unreadChats[peerChatId] = 0;
          window.unreadChats[peerChatId]++;
          loadChatsList();
        }
        // ClaudeOS-Toggle: forward peer message to ClaudeOS if enabled
        fetch('/api/chats/' + peerChatId).then(r => r.json()).then(chat => {
          if (chat && chat.claudeEnabled) {
            console.log('[chat] ClaudeOS enabled for', peerChatId, '— forwarding');
            fetch('/api/chat-outbox', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: peerName + ': ' + msgText, source: 'webrtc-peer' })
            }).then(() => {
              // When ClaudeOS responds, it comes via SSE chat-message
              // We intercept it and forward to the peer
            }).catch(() => {});
          }
        }).catch(() => {});
        updatePeerBar();
        break;
      }
      case 'profile-exchange':
        if (data.profile) {
          connectedPeers[senderId] = { ...connectedPeers[senderId], ...data.profile, peerId: senderId, online: true, lastSeen: Date.now() };
          // Save peer as contact (with type 'peer', never overwrite agents)
          const peerContact = {
            ...data.profile,
            id: 'peer-' + (data.profile.handle || data.profile.name || senderId).toLowerCase().replace(/[^a-z0-9-]/g, ''),
            type: 'peer',
            peerId: senderId,
            lastSeen: new Date().toISOString()
          };
          fetch('/api/contacts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(peerContact) }).catch(() => {});
          updatePeerBar();
          // Auto-create DM chat for this peer — one chat per handle (not per session)
          const peerHandle = data.profile.handle || data.profile.name || senderId;
          const peerChatId = 'chat-peer-' + peerHandle.toLowerCase().replace(/[^a-z0-9-]/g, '');
          // Clear old mapping: if another targetId had this chatId, remove it
          Object.entries(connectedPeers).forEach(([pid, p]) => { if (pid !== senderId && p.chatId === peerChatId) delete connectedPeers[pid].chatId; });
          // Store chatId on peer for message routing
          connectedPeers[senderId].chatId = peerChatId;
          fetch('/api/chats/' + peerChatId).then(r => r.json()).then(existing => {
            if (existing.error) {
              // Chat doesn't exist — create it
              fetch('/api/chats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  id: peerChatId,
                  type: 'dm',
                  name: data.profile.name || peerHandle,
                  participants: ['chris', peerHandle],
                  peerType: data.profile.pulseos ? 'pulseos' : 'guest',
                  peerId: senderId
                })
              }).then(() => {
                showAgentAlert((data.profile.name || peerHandle) + ' verbunden!');
                loadChatsList();
              }).catch(() => {});
            }
          }).catch(() => {});
        }
        break;
      case 'profile-updated':
        const updaterName = connectedPeers[senderId]?.name || data.handle || 'Peer';
        showAgentAlert(updaterName + ' hat sein Profil aktualisiert');
        addFeed(updaterName + ': Profil aktualisiert', 'webrtc');
        break;
      case 'pulse-signal':
        if (data.appId) fetch('/api/pulse/fire/' + data.appId, { method: 'POST' }).catch(() => {});
        break;
      case 'clipboard':
        if (data.text) {
          const peerName = connectedPeers[senderId]?.name || 'Peer';
          showClipboardReceived(data.text, peerName);
        }
        break;
      case 'app-data-sync':
        if (data.appId && data.data) {
          const peerName = connectedPeers[senderId]?.name || 'Peer';
          showAppDataReceived(data.appId, data.appName || data.appId, data.data, peerName);
        }
        break;
      case 'presence':
        if (connectedPeers[senderId]) {
          connectedPeers[senderId].activeApp = data.activeApp || null;
          connectedPeers[senderId].status = data.status || '';
          connectedPeers[senderId].lastSeen = Date.now();
          updatePeerBar();
        }
        break;
      case 'pong':
        if (data.timestamp && connectedPeers[senderId]) {
          connectedPeers[senderId].ping = Date.now() - data.timestamp;
          updatePeerBar();
        }
        break;
    }
    // Forward to registered app listeners
    if (pulseEventListeners[data.type]) {
      pulseEventListeners[data.type].forEach(cb => { try { cb(data, senderId); } catch {} });
    }
  }

  function sendBridgeMsg(targetId, data) {
    const dc = bridgeChannels[targetId];
    if (dc && dc.readyState === 'open') { try { dc.send(JSON.stringify(data)); return true; } catch (e) { console.warn('[bridge] Send failed:', e.message); return false; } }
    return false;
  }
  window.sendBridgeMsg = sendBridgeMsg;
  function sendToAllPeers(data) {
    let sent = 0, failed = 0;
    Object.keys(bridgeChannels).forEach(id => { if (sendBridgeMsg(id, data)) sent++; else failed++; });
    return { sent, failed, total: sent + failed };
  }
  window.sendToAllPeers = sendToAllPeers;
  window.connectedPeers = connectedPeers;
  window.bridgeChannels = bridgeChannels;
  // Exposed function for chat system to send to peers
  window.sendChatToPeers = function(text, targetChatId) {
    const msgId = 'm-out-' + Date.now();
    const payload = JSON.stringify({ type: 'chat-message', text: text, id: msgId });
    // Try to find the specific peer for this chat
    if (targetChatId) {
      for (const [pid, peer] of Object.entries(connectedPeers)) {
        if (peer.chatId === targetChatId) {
          const dc = bridgeChannels[pid];
          if (dc && dc.readyState === 'open') {
            try { dc.send(payload); console.log('[bridge] Sent to matched peer:', pid, 'chat:', targetChatId); return true; } catch(e) { console.warn('[bridge] Send fail:', e); }
          }
        }
      }
    }
    // Fallback: send to first open channel
    for (const [pid, dc] of Object.entries(bridgeChannels)) {
      if (dc && dc.readyState === 'open') {
        try { dc.send(payload); console.log('[bridge] Sent via fallback channel:', pid); return true; } catch(e) { console.warn('[bridge] Send fail:', e); }
      }
    }
    console.warn('[bridge] No open channels!');
    return false;
  };
  function cleanupBridgePeer(targetId) {
    if (bridgeChannels[targetId]) { try { bridgeChannels[targetId].close(); } catch {} delete bridgeChannels[targetId]; }
    if (bridgePeers[targetId]) { try { bridgePeers[targetId].close(); } catch {} delete bridgePeers[targetId]; }
    if (connectedPeers[targetId]) connectedPeers[targetId].online = false;
    updatePeerBar();
  }

  // Clipboard sharing (XSS-safe DOM creation)
  function showClipboardReceived(text, fromName) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:60px;right:20px;background:var(--bg-surface);border:1px solid var(--teal);border-radius:10px;padding:14px;z-index:99999;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:12px;';
    const title = document.createElement('div');
    title.style.cssText = 'font-weight:600;margin-bottom:6px;color:var(--teal);';
    title.textContent = fromName + ' teilt Clipboard';
    const preview = document.createElement('div');
    preview.style.cssText = 'background:var(--bg-card);padding:8px;border-radius:6px;margin-bottom:8px;max-height:80px;overflow:auto;word-break:break-all;';
    preview.textContent = text.substring(0, 500);
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;';
    const closeBtn = document.createElement('button');
    closeBtn.textContent = 'Schließen';
    closeBtn.style.cssText = 'padding:4px 10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:11px;';
    closeBtn.onclick = () => t.remove();
    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Einfügen';
    copyBtn.style.cssText = 'padding:4px 10px;background:var(--teal);border:none;color:var(--bg);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;';
    copyBtn.onclick = () => { navigator.clipboard.writeText(text); copyBtn.textContent = 'Kopiert!'; setTimeout(() => t.remove(), 800); };
    btnRow.appendChild(closeBtn); btnRow.appendChild(copyBtn);
    t.appendChild(title); t.appendChild(preview); t.appendChild(btnRow);
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 15000);
  }

  // Clipboard share panel (replaces blocking prompt())
  window.shareClipboard = function() {
    let panel = document.getElementById('__clipSharePanel');
    if (panel) { panel.remove(); return; }
    panel = document.createElement('div');
    panel.id = '__clipSharePanel';
    panel.style.cssText = 'position:fixed;top:60px;right:20px;background:var(--bg-surface);border:1px solid var(--teal);border-radius:10px;padding:14px;z-index:99999;width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:12px;';
    const title = document.createElement('div');
    title.style.cssText = 'font-weight:600;margin-bottom:8px;color:var(--teal);';
    title.textContent = 'Clipboard teilen';
    const ta = document.createElement('textarea');
    ta.placeholder = 'Text eingeben oder einfügen...';
    ta.style.cssText = 'width:100%;height:60px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:8px;resize:vertical;box-sizing:border-box;margin-bottom:8px;';
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;';
    const pasteBtn = document.createElement('button');
    pasteBtn.textContent = 'Einfügen';
    pasteBtn.style.cssText = 'padding:4px 10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:11px;';
    pasteBtn.onclick = async () => { try { ta.value = await navigator.clipboard.readText(); } catch {} };
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Abbrechen';
    cancelBtn.style.cssText = 'padding:4px 10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:11px;';
    cancelBtn.onclick = () => panel.remove();
    const sendBtn = document.createElement('button');
    sendBtn.textContent = 'Senden';
    sendBtn.style.cssText = 'padding:4px 10px;background:var(--teal);border:none;color:var(--bg);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;';
    sendBtn.onclick = () => {
      if (!ta.value.trim()) return;
      const result = sendToAllPeers({ type: 'clipboard', text: ta.value.trim() });
      if (result.sent > 0) showToast('Clipboard an ' + result.sent + ' Peer(s) geteilt', 'success');
      else showToast('Keine Peers verbunden', 'error');
      panel.remove();
    };
    btnRow.appendChild(pasteBtn); btnRow.appendChild(cancelBtn); btnRow.appendChild(sendBtn);
    panel.appendChild(title); panel.appendChild(ta); panel.appendChild(btnRow);
    document.body.appendChild(panel);
    ta.focus();
  };

  // App data sharing — store pending data in a map, not on DOM
  const pendingAppData = {};

  // App data sharing (XSS-safe DOM creation)
  function showAppDataReceived(appId, appName, data, fromName) {
    const dataId = 'share-' + Date.now();
    pendingAppData[dataId] = { appId, data };
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:60px;right:20px;background:var(--bg-surface);border:1px solid var(--teal);border-radius:10px;padding:14px;z-index:99999;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:12px;';
    const title = document.createElement('div');
    title.style.cssText = 'font-weight:600;margin-bottom:6px;color:var(--teal);';
    title.textContent = fromName + ' teilt App-Daten';
    const info = document.createElement('div');
    info.style.cssText = 'margin-bottom:8px;';
    info.textContent = appName + ' (' + Object.keys(data).length + ' Dateien)';
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;';
    const rejectBtn = document.createElement('button');
    rejectBtn.textContent = 'Ablehnen';
    rejectBtn.style.cssText = 'padding:4px 10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:11px;';
    rejectBtn.onclick = () => { delete pendingAppData[dataId]; t.remove(); };
    const acceptBtn = document.createElement('button');
    acceptBtn.textContent = 'Importieren';
    acceptBtn.style.cssText = 'padding:4px 10px;background:var(--teal);border:none;color:var(--bg);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;';
    acceptBtn.onclick = () => { acceptAppData(dataId); t.remove(); };
    btnRow.appendChild(rejectBtn); btnRow.appendChild(acceptBtn);
    t.appendChild(title); t.appendChild(info); t.appendChild(btnRow);
    document.body.appendChild(t);
    setTimeout(() => { t.remove(); delete pendingAppData[dataId]; }, 30000);
  }

  window.acceptAppData = async function(dataId) {
    const pending = pendingAppData[dataId];
    if (!pending) { showToast('Daten nicht mehr verfügbar', 'error'); return; }
    const { appId, data } = pending;
    delete pendingAppData[dataId];
    const keys = Object.keys(data);
    let ok = 0, fail = 0;
    for (const key of keys) {
      try {
        const r = await fetch('/app/' + appId + '/api/' + key, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data[key]) });
        if (r.ok) ok++; else fail++;
      } catch { fail++; }
    }
    if (ok > 0) {
      await fetch('/api/notify-change', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ appId, file: keys[0] + '.json' }) });
    }
    if (fail === 0) showToast(ok + ' Dateien importiert', 'success');
    else if (ok > 0) showToast(ok + ' importiert, ' + fail + ' fehlgeschlagen', 'error');
    else showToast('Import komplett fehlgeschlagen', 'error');
  };

  window.shareAppData = async function(appId, appName) {
    try {
      // Try to get data file list from app registry, fallback to common names
      const dataFiles = {};
      let names = [];
      try {
        const reg = await fetch('/api/app-registry').then(r => r.json());
        const app = (reg.apps || []).find(a => a.id === appId);
        if (app && app.dataFiles) names = app.dataFiles.map(f => f.replace('.json', ''));
      } catch {}
      if (names.length === 0) names = ['notes', 'tasks', 'calendar', 'entries', 'kanban', 'todos', 'stations', 'weather', appId];
      for (const name of names) {
        try {
          const dr = await fetch('/app/' + appId + '/api/' + name);
          if (dr.ok) { dataFiles[name] = await dr.json(); }
        } catch {}
      }
      if (Object.keys(dataFiles).length === 0) { showToast('Keine Daten zum Teilen', 'error'); return; }
      const result = sendToAllPeers({ type: 'app-data-sync', appId, appName: appName || appId, data: dataFiles });
      if (result.sent > 0) showToast(appName + ': ' + Object.keys(dataFiles).length + ' Dateien an ' + result.sent + ' Peer(s) geteilt', 'success');
      else showToast('Keine Peers verbunden', 'error');
    } catch (e) { showToast('Teilen fehlgeschlagen: ' + e.message, 'error'); }
  };

  // Presence broadcasting
  let currentActiveApp = null;
  window.setActiveAppPresence = function(appId) {
    currentActiveApp = appId;
  };
  setInterval(() => {
    if (Object.keys(bridgeChannels).length > 0) {
      sendToAllPeers({ type: 'presence', activeApp: currentActiveApp, status: 'online' });
      // Ping for latency
      sendToAllPeers({ type: 'ping', timestamp: Date.now() });
    }
  }, 30000);

  // Auto-connect on dashboard load
  fetch('/api/bridge-room').then(r => r.json()).then(d => {
    if (d.roomId) window.startBridgeHost(d.roomId);
  }).catch(() => {});

  window.PulseOS = {
    send: (peerId, type, data) => peerId === '*' ? sendToAllPeers({ type, ...data, fromProfile: userProfile }) : sendBridgeMsg(peerId, { type, ...data, fromProfile: userProfile }),
    onMessage: (type, cb) => { if (!pulseEventListeners[type]) pulseEventListeners[type] = []; pulseEventListeners[type].push(cb); },
    offMessage: (type, cb) => { if (pulseEventListeners[type]) pulseEventListeners[type] = pulseEventListeners[type].filter(fn => fn !== cb); },
    getPeers: () => ({ ...connectedPeers }),
    getProfile: () => userProfile,
    getChatHistory: () => [...systemChatHistory],
    sendChat: text => {
      sendToAllPeers({ type: 'chat-message', text, timestamp: Date.now() });
      const localMsg = { from: userProfile?.name || 'Du', avatar: userProfile?.avatar || '>', text, time: Date.now(), peerId: 'self' };
      systemChatHistory.push(localMsg); if (systemChatHistory.length > 200) systemChatHistory.shift();
      renderSystemChatMessage(localMsg);
    }
  };

  window.addEventListener('message', e => {
    if (e.data && e.data.__pulseOS) {
      const { action, peerId, type, data } = e.data;
      if (action === 'send') window.PulseOS.send(peerId || '*', type, data);
      if (action === 'sendChat') window.PulseOS.sendChat(data?.text || '');
    }
  });
})();
</script>
</body>
</html>
