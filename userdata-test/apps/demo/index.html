<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Würfel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d0d14; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; user-select: none; }
.dice { font-size: 120px; cursor: pointer; transition: transform 0.3s; filter: drop-shadow(0 4px 20px rgba(231,76,60,0.4)); }
.dice:hover { transform: scale(1.1); }
.dice.rolling { animation: roll 0.4s ease-out; }
@keyframes roll { 0% { transform: rotate(0deg) scale(1.2); } 50% { transform: rotate(180deg) scale(0.8); } 100% { transform: rotate(360deg) scale(1); } }
.result { font-size: 24px; margin-top: 20px; color: #888; }
.history { margin-top: 30px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 300px; }
.history span { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 6px; padding: 4px 10px; font-size: 14px; }
h1 { font-size: 18px; margin-bottom: 30px; color: #666; }
</style>
</head>
<body>
<h1>Tippe zum Würfeln</h1>
<div class="dice" id="dice" onclick="roll()">🎲</div>
<div class="result" id="result"></div>
<div class="history" id="history"></div>
<script>
const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
const history = [];
function roll() {
  const dice = document.getElementById('dice');
  dice.classList.add('rolling');
  const val = Math.floor(Math.random() * 6);
  setTimeout(() => {
    dice.textContent = faces[val];
    dice.classList.remove('rolling');
    document.getElementById('result').textContent = (val + 1) + ' gewürfelt!';
    history.unshift(val + 1);
    if (history.length > 10) history.pop();
    document.getElementById('history').innerHTML = history.map(h => '<span>' + h + '</span>').join('');
  }, 400);
}
</script>
</body>
</html>
