<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PulseOS Chat</title>
<style>
:root { --bg: #0d0d14; --bg-card: #151520; --border: #1e1e2e; --text: #e0e0e0; --text-dim: #888; --teal: #4ecdc4; --font: -apple-system, system-ui, 'Segoe UI', sans-serif; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font:13px/1.5 var(--font); overflow:hidden; }

/* Setup Screen */
#setupScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:20px; gap:16px; }
.setup-title { font-size:24px; font-weight:700; color:var(--teal); letter-spacing:1px; }
.setup-sub { font-size:12px; color:var(--text-dim); }
.setup-input { width:100%; max-width:280px; padding:10px 14px; background:var(--bg-card); border:1px solid var(--border); color:var(--text); border-radius:8px; font:13px var(--font); outline:none; text-align:center; }
.setup-input:focus { border-color:var(--teal); }
.setup-btn { padding:10px 28px; background:var(--teal); border:none; color:var(--bg); border-radius:8px; font:13px var(--font); font-weight:600; cursor:pointer; }
.setup-btn:hover { filter:brightness(1.1); }
.setup-btn:disabled { opacity:0.4; cursor:not-allowed; }
.setup-divider { width:100%; max-width:280px; border-top:1px solid var(--border); margin:4px 0; }

/* Chat Screen */
#chatScreen { display:none; flex-direction:column; height:100%; }
.chat-topbar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.chat-topbar .dot { width:8px; height:8px; border-radius:50%; background:#ef4444; flex-shrink:0; }
.chat-topbar .dot.online { background:#22c55e; }
.chat-topbar .dot.connecting { background:#f59e0b; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.chat-topbar .title { font-weight:600; font-size:12px; flex:1; }
.chat-topbar .info { font-size:10px; color:var(--text-dim); }
.chat-topbar .btn { background:none; border:1px solid var(--border); color:var(--text-dim); padding:4px 8px; border-radius:4px; cursor:pointer; font-size:10px; }
.chat-topbar .btn:hover { border-color:var(--teal); color:var(--teal); }

#messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.msg { display:flex; gap:8px; align-items:flex-start; }
.msg.self { flex-direction:row-reverse; }
.msg .avatar { width:24px; height:24px; border-radius:50%; background:var(--bg-card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.msg .bubble { max-width:75%; padding:6px 10px; border-radius:8px; font-size:12px; word-break:break-word; white-space:pre-wrap; }
.msg.self .bubble { background:var(--teal); color:var(--bg); border-radius:8px 8px 2px 8px; }
.msg.peer .bubble { background:var(--bg-card); border:1px solid var(--border); border-radius:2px 8px 8px 8px; }
.msg.agent .bubble { background:linear-gradient(135deg, var(--bg-card), rgba(245,166,35,0.15)); border:1px solid rgba(245,166,35,0.3); border-radius:2px 8px 8px 8px; }
.msg .name { font-size:9px; color:var(--text-dim); margin-bottom:2px; }
.msg.agent .name { color:#f5a623; }
.system-msg { text-align:center; font-size:10px; color:var(--text-dim); padding:4px 0; }

.input-row { display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border); flex-shrink:0; }
#chatInput { flex:1; padding:8px 12px; background:var(--bg-card); border:1px solid var(--border); color:var(--text); border-radius:8px; font:13px var(--font); outline:none; resize:none; min-height:20px; max-height:80px; }
#chatInput:focus { border-color:var(--teal); }
#chatInput::placeholder { color:var(--text-dim); }
#sendBtn { width:36px; height:36px; background:var(--teal); border:none; color:var(--bg); border-radius:8px; cursor:pointer; font-size:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
#sendBtn:disabled { opacity:0.3; }

/* Powered by footer */
.powered { text-align:center; padding:4px; font-size:9px; color:var(--text-dim); border-top:1px solid var(--border); }
.powered a { color:var(--teal); text-decoration:none; }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setupScreen">
  <div class="setup-title">PulseOS Chat</div>
  <div class="setup-sub">Verbinde dich mit einem PulseOS User</div>
  <input class="setup-input" id="nameInput" placeholder="Dein Name" maxlength="30">
  <input class="setup-input" id="avatarInput" placeholder="Avatar (1 Emoji)" maxlength="4" value="👤" style="width:80px;">
  <div class="setup-divider"></div>
  <input class="setup-input" id="roomInput" placeholder="Raum-Code (z.B. pulse-56d8fb24)">
  <button class="setup-btn" id="joinBtn" onclick="joinRoom()">Verbinden</button>
  <div id="setupError" style="color:#ef4444;font-size:11px;min-height:16px;"></div>
</div>

<!-- Chat Screen -->
<div id="chatScreen">
  <div class="chat-topbar">
    <div class="dot connecting" id="statusDot"></div>
    <span class="title" id="roomTitle">Verbinde...</span>
    <span class="info" id="peerCount">0 online</span>
    <button class="btn" onclick="disconnect()">Verlassen</button>
  </div>
  <div id="messages"></div>
  <div class="input-row">
    <textarea id="chatInput" rows="1" placeholder="Nachricht..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button id="sendBtn" onclick="sendMsg()">▶</button>
  </div>
  <div class="powered">Powered by <a href="https://github.com/NastyFFM/PulseOS" target="_blank">PulseOS</a></div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const SIGNALING_URL = 'https://web-production-84380f.up.railway.app';
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

let socket = null, roomId = null;
let myProfile = { name: '', avatar: '👤', handle: '' };
const peers = {}; // peerId → { pc, dc, profile }
const msgIds = new Set();

// Load saved profile from localStorage
function loadProfile() {
  try {
    const saved = JSON.parse(localStorage.getItem('pulseChat') || '{}');
    if (saved.name) document.getElementById('nameInput').value = saved.name;
    if (saved.avatar) document.getElementById('avatarInput').value = saved.avatar;
    if (saved.lastRoom) document.getElementById('roomInput').value = saved.lastRoom;
  } catch {}
}

function saveProfile() {
  localStorage.setItem('pulseChat', JSON.stringify({
    name: myProfile.name,
    avatar: myProfile.avatar,
    lastRoom: roomId
  }));
}

// Check URL params for room
function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room');
  if (room) document.getElementById('roomInput').value = room;
}

// Join room
function joinRoom() {
  const name = document.getElementById('nameInput').value.trim();
  const avatar = document.getElementById('avatarInput').value.trim() || '👤';
  const room = document.getElementById('roomInput').value.trim();

  if (!name) { document.getElementById('setupError').textContent = 'Bitte Name eingeben'; return; }
  if (!room) { document.getElementById('setupError').textContent = 'Bitte Raum-Code eingeben'; return; }

  myProfile = { name, avatar, handle: name.toLowerCase().replace(/\s+/g, '-') + '-guest' };
  roomId = room;
  saveProfile();

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('roomTitle').textContent = 'Raum: ' + roomId.substring(0, 16);

  connectSocket();
}

// Socket.io + WebRTC
function connectSocket() {
  if (socket) { try { socket.disconnect(); } catch {} }

  socket = io(SIGNALING_URL, {
    forceNew: true,
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 3000
  });

  socket.on('connect', () => {
    document.getElementById('statusDot').className = 'dot connecting';
    socket.emit('join-room', { roomId });
    addSystemMsg('Verbunden mit Signaling-Server');
  });

  socket.on('room-users', ({ users }) => {
    users.forEach(id => createPeer(id, true));
    updatePeerCount();
  });

  socket.on('user-left', ({ userId }) => {
    const name = peers[userId]?.profile?.name || 'Peer';
    cleanupPeer(userId);
    addSystemMsg(name + ' hat den Raum verlassen');
    updatePeerCount();
  });

  socket.on('offer', async ({ offer, senderId }) => {
    const pc = createPeer(senderId, false);
    try {
      await pc.setRemoteDescription(offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', { roomId, answer, targetId: senderId });
    } catch (e) {
      console.warn('Offer handling failed:', e.message);
      cleanupPeer(senderId);
    }
  });

  socket.on('answer', async ({ answer, senderId }) => {
    if (peers[senderId]?.pc)
      try { await peers[senderId].pc.setRemoteDescription(answer); } catch {}
  });

  socket.on('ice-candidate', async ({ candidate, senderId }) => {
    if (peers[senderId]?.pc && candidate)
      try { await peers[senderId].pc.addIceCandidate(candidate); } catch {}
  });

  socket.on('disconnect', () => {
    document.getElementById('statusDot').className = 'dot';
    addSystemMsg('Verbindung verloren — versuche erneut...');
  });

  socket.on('reconnect', () => {
    socket.emit('join-room', { roomId });
    addSystemMsg('Wieder verbunden');
  });
}

function createPeer(targetId, isInitiator) {
  if (peers[targetId]?.pc) return peers[targetId].pc;

  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[targetId] = { pc, dc: null, profile: null };

  if (isInitiator) {
    const dc = pc.createDataChannel('bridge', { ordered: true });
    setupChannel(dc, targetId);
  }

  pc.ondatachannel = e => setupChannel(e.channel, targetId);

  pc.onicecandidate = e => {
    if (e.candidate && socket)
      socket.emit('ice-candidate', { roomId, candidate: e.candidate, targetId });
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
      const name = peers[targetId]?.profile?.name || 'Peer';
      addSystemMsg('Verbindung zu ' + name + ' verloren');
      cleanupPeer(targetId);
      updatePeerCount();
    }
  };

  if (isInitiator) {
    pc.createOffer()
      .then(offer => { pc.setLocalDescription(offer); socket.emit('offer', { roomId, offer, targetId }); })
      .catch(() => cleanupPeer(targetId));
  }

  return pc;
}

function setupChannel(dc, targetId) {
  peers[targetId].dc = dc;

  dc.onopen = () => {
    document.getElementById('statusDot').className = 'dot online';
    dc.send(JSON.stringify({ type: 'profile-exchange', profile: myProfile }));
    updatePeerCount();
  };

  dc.onclose = () => {
    if (peers[targetId]) peers[targetId].dc = null;
    updatePeerCount();
  };

  dc.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      handleMessage(data, targetId);
    } catch {}
  };
}

function handleMessage(data, senderId) {
  switch (data.type) {
    case 'profile-exchange':
      peers[senderId].profile = data.profile;
      addSystemMsg((data.profile.name || 'Peer') + ' ist beigetreten');
      updatePeerCount();
      break;

    case 'chat-message': case 'text':
      const text = data.text || data.content;
      if (!text) return;
      const from = peers[senderId]?.profile?.name || 'Peer';
      const avatar = peers[senderId]?.profile?.avatar || '?';
      // Check if it's from ClaudeOS
      const isAgent = data.fromAgent || data.source === 'claudeos';
      addChatMsg(from, avatar, text, isAgent ? 'agent' : 'peer', data.id);
      break;

    case 'ping':
      if (peers[senderId]?.dc?.readyState === 'open')
        peers[senderId].dc.send(JSON.stringify({ type: 'pong', timestamp: data.timestamp }));
      break;
  }
}

function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const msgId = 'g-' + Date.now() + Math.random().toString(36).substring(7);

  // Send to all peers
  Object.values(peers).forEach(p => {
    if (p.dc?.readyState === 'open') {
      p.dc.send(JSON.stringify({ type: 'chat-message', text, id: msgId, timestamp: Date.now() }));
    }
  });

  addChatMsg(myProfile.name, myProfile.avatar, text, 'self', msgId);
}

function addChatMsg(name, avatar, text, type, id) {
  if (id && msgIds.has(id)) return;
  if (id) msgIds.add(id);

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  const nameLabel = type === 'agent' ? '◆ ClaudeOS' : name;
  div.innerHTML =
    '<div class="avatar">' + esc(avatar || '?') + '</div>' +
    '<div>' +
      '<div class="name">' + esc(nameLabel) + '</div>' +
      '<div class="bubble">' + esc(text) + '</div>' +
    '</div>';

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMsg(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = '— ' + text + ' —';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function updatePeerCount() {
  const online = Object.values(peers).filter(p => p.dc?.readyState === 'open').length;
  document.getElementById('peerCount').textContent = online + ' online';
  if (online > 0) document.getElementById('statusDot').className = 'dot online';
}

function cleanupPeer(id) {
  if (peers[id]) {
    if (peers[id].dc) try { peers[id].dc.close(); } catch {}
    if (peers[id].pc) try { peers[id].pc.close(); } catch {}
    delete peers[id];
  }
}

function disconnect() {
  Object.keys(peers).forEach(cleanupPeer);
  if (socket) { try { socket.disconnect(); } catch {} socket = null; }
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('statusDot').className = 'dot';
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Auto-resize textarea
document.getElementById('chatInput')?.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// Init
loadProfile();
checkUrlParams();

// Auto-join if URL has room param
const autoRoom = new URLSearchParams(window.location.search).get('room');
if (autoRoom && document.getElementById('nameInput').value) {
  document.getElementById('roomInput').value = autoRoom;
  // Small delay for DOM
  setTimeout(() => {
    if (document.getElementById('nameInput').value) joinRoom();
  }, 100);
}
</script>
</body>
</html>
