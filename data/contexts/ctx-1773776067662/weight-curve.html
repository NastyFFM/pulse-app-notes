<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;padding:16px;background:#0f172a;color:#f1f5f9;font-family:system-ui;width:100%;height:100%;box-sizing:border-box}.container{display:flex;flex-direction:column;height:100%;gap:12px}.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}.title{font-size:18px;font-weight:600}.stats{display:flex;gap:16px;font-size:13px}.stat{display:flex;flex-direction:column;gap:4px}.stat-label{color:#94a3b8}.stat-value{font-weight:600;font-size:16px;color:#4ade80}.controls{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:6px 12px;background:#1e293b;border:1px solid #334155;color:#f1f5f9;cursor:pointer;border-radius:4px;font-size:12px;transition:all 0.2s}.btn.active{background:#10b981;border-color:#10b981}.btn:hover{background:#334155}#chart{flex:1;min-height:300px}.tooltip{position:absolute;background:#1e293b;border:1px solid #10b981;padding:8px 12px;border-radius:4px;font-size:12px;pointer-events:none;z-index:10;display:none}</style></head><body><div class="container"><div class="header"><div class="title">📈 Gewichtsverlauf</div><div class="stats"><div class="stat"><div class="stat-label">Aktuell</div><div class="stat-value" id="stat-current">86.1 kg</div></div><div class="stat"><div class="stat-label">Trend</div><div class="stat-value" id="stat-trend" style="color:#10b981">-2.9 kg</div></div><div class="stat"><div class="stat-label">Ziel</div><div class="stat-value" id="stat-target">80 kg</div></div></div></div><div class="controls"><button class="btn active" data-days="all">Alles</button><button class="btn" data-days="30">30 Tage</button><button class="btn" data-days="14">14 Tage</button><button class="btn" data-days="7">7 Tage</button></div><canvas id="chart"></canvas><div class="tooltip" id="tooltip"></div></div><script>const data=[{date:"17.03",value:89},{date:"18.03",value:88.8},{date:"19.03",value:88.5},{date:"20.03",value:88.3},{date:"21.03",value:88.1},{date:"22.03",value:87.9},{date:"23.03",value:87.7},{date:"24.03",value:87.8},{date:"25.03",value:87.6},{date:"26.03",value:87.4},{date:"27.03",value:87.2},{date:"28.03",value:87},{date:"29.03",value:86.8},{date:"30.03",value:86.9},{date:"31.03",value:86.7},{date:"01.04",value:86.5},{date:"02.04",value:86.3},{date:"03.04",value:86.1}];let filtered=data;const canvas=document.getElementById('chart');const ctx=canvas.getContext('2d');const tooltip=document.getElementById('tooltip');function resizeCanvas(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;draw()}function filter(days){if(days==='all')return data;return data.slice(-days)}function draw(){ctx.fillStyle='#0f172a';ctx.fillRect(0,0,canvas.width,canvas.height);if(filtered.length===0)return;const padding=40;const w=canvas.width-2*padding;const h=canvas.height-2*padding;const minVal=Math.min(...filtered.map(d=>d.value))-1;const maxVal=Math.max(...filtered.map(d=>d.value))+1;ctx.strokeStyle='#334155';ctx.lineWidth=0.5;for(let i=0;i<=5;i++){const y=padding+h/5*i;ctx.beginPath();ctx.moveTo(padding,y);ctx.lineTo(canvas.width-padding,y);ctx.stroke()}ctx.strokeStyle='#64748b';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padding,padding);ctx.lineTo(padding,canvas.height-padding);ctx.lineTo(canvas.width-padding,canvas.height-padding);ctx.stroke();ctx.fillStyle='#94a3b8';ctx.font='12px system-ui';ctx.textAlign='right';for(let i=0;i<=5;i++){const val=minVal+(maxVal-minVal)*(5-i)/5;const y=padding+h/5*i;ctx.fillText(val.toFixed(1),padding-10,y+4)}ctx.textAlign='center';for(let i=0;i<filtered.length;i+=Math.max(1,Math.floor(filtered.length/6))){const x=padding+w/(filtered.length-1||1)*i;const txt=filtered[i].date;ctx.fillText(txt,x,canvas.height-padding+20)}ctx.strokeStyle='#10b981';ctx.lineWidth=2;ctx.beginPath();filtered.forEach((d,i)=>{const x=padding+w/(filtered.length-1||1)*i;const y=padding+h*(1-(d.value-minVal)/(maxVal-minVal));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();ctx.fillStyle='#10b981';filtered.forEach((d,i)=>{const x=padding+w/(filtered.length-1||1)*i;const y=padding+h*(1-(d.value-minVal)/(maxVal-minVal));ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()})}function updateStats(){document.getElementById('stat-current').textContent=filtered[filtered.length-1]?.value+' kg'||'-'}canvas.addEventListener('mousemove',e=>{const rect=canvas.getBoundingClientRect();const padding=40;const w=canvas.width-2*padding;const x=e.clientX-rect.left;const relX=x-padding;const idx=Math.round(relX/w*(filtered.length-1));if(idx>=0&&idx<filtered.length){const d=filtered[idx];tooltip.innerHTML=`📅 ${d.date}<br/>⚖️ ${d.value} kg`;tooltip.style.display='block';tooltip.style.left=e.clientX-rect.left+10+'px';tooltip.style.top=e.clientY-rect.top-30+'px'}});canvas.addEventListener('mouseleave',()=>{tooltip.style.display='none'});document.querySelectorAll('.btn').forEach(btn=>{btn.addEventListener('click',e=>{document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');filtered=filter(e.target.dataset.days);updateStats();resizeCanvas()})});window.addEventListener('resize',resizeCanvas);resizeCanvas();updateStats();</script></body></html>
