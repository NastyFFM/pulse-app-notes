<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gewichtsverlauf</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:white}.container{padding:20px;height:100%;display:flex;flex-direction:column}.view-toggle{display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid #e5e7eb;padding-bottom:12px}.view-btn{flex:1;padding:10px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6b7280;transition:all 0.2s ease;border-bottom:3px solid transparent;margin-bottom:-15px;border-radius:4px 4px 0 0}.view-btn:hover{color:#2563eb;background:#f3f4f6}.view-btn.active{color:#2563eb;border-bottom-color:#2563eb}.chart-wrapper{flex:1;display:flex;align-items:center;justify-content:center;background:#fafafa;border-radius:8px;overflow:hidden;min-height:300px}.view-content{display:none;width:100%;height:100%}.view-content.active{display:flex;align-items:center;justify-content:center}canvas{max-width:100%;max-height:100%}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb}.stat-item{text-align:center;padding:8px}.stat-label{font-size:12px;color:#6b7280;font-weight:500}.stat-value{font-size:16px;font-weight:600;color:#1f2937;margin-top:4px}</style></head><body><div class="container"><div class="view-toggle"><button class="view-btn active" onclick="switchView('curve')">📈 Kurve</button><button class="view-btn" onclick="switchView('bar')">📊 Balken</button></div><div class="chart-wrapper"><div id="curve-view" class="view-content active"><canvas id="curveChart"></canvas></div><div id="bar-view" class="view-content"><canvas id="barChart"></canvas></div></div><div class="stats"><div class="stat-item"><div class="stat-label">Start</div><div class="stat-value" id="startValue">-</div></div><div class="stat-item"><div class="stat-label">Aktuell</div><div class="stat-value" id="currentValue">-</div></div><div class="stat-item"><div class="stat-label">Fortschritt</div><div class="stat-value" id="progressValue">-</div></div></div></div><script>const widgetData=window.__widgetData||{history:[{date:'17.03',value:89},{date:'18.03',value:88.8},{date:'19.03',value:88.5},{date:'20.03',value:88.3},{date:'21.03',value:88.1},{date:'22.03',value:87.9},{date:'23.03',value:87.7},{date:'24.03',value:87.8},{date:'25.03',value:87.6}]};const history=widgetData.history||[];const startValue=history.length>0?history[0].value:0;const currentValue=history.length>0?history[history.length-1].value:0;const progress=(startValue-currentValue).toFixed(1);document.getElementById('startValue').textContent=startValue+' kg';document.getElementById('currentValue').textContent=currentValue+' kg';document.getElementById('progressValue').textContent=(progress>=0?'-':'+')+Math.abs(progress)+' kg';function switchView(viewName){document.querySelectorAll('.view-btn').forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');document.querySelectorAll('.view-content').forEach(v=>v.classList.remove('active'));document.getElementById(viewName+'-view').classList.add('active');setTimeout(()=>{viewName==='curve'?drawCurveChart():drawBarChart()},50)}function drawCurveChart(){const canvas=document.getElementById('curveChart');if(!canvas)return;const rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width-40;canvas.height=rect.height-40;const ctx=canvas.getContext('2d');const padding=40;const drawWidth=canvas.width-2*padding;const drawHeight=canvas.height-2*padding;ctx.strokeStyle='#d1d5db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padding,padding);ctx.lineTo(padding,canvas.height-padding);ctx.lineTo(canvas.width-padding,canvas.height-padding);ctx.stroke();if(history.length===0)return;const maxVal=Math.max(...history.map(h=>h.value));const minVal=Math.min(...history.map(h=>h.value));const range=Math.max(maxVal-minVal,1);ctx.strokeStyle='#2563eb';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();history.forEach((point,i)=>{const x=padding+(i/Math.max(history.length-1,1))*drawWidth;const normalized=(point.value-minVal)/range;const y=canvas.height-padding-normalized*drawHeight;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();ctx.fillStyle='#2563eb';history.forEach((point,i)=>{const x=padding+(i/Math.max(history.length-1,1))*drawWidth;const normalized=(point.value-minVal)/range;const y=canvas.height-padding-normalized*drawHeight;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill()})}function drawBarChart(){const canvas=document.getElementById('barChart');if(!canvas)return;const rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width-40;canvas.height=rect.height-40;const ctx=canvas.getContext('2d');const padding=40;const drawWidth=canvas.width-2*padding;const drawHeight=canvas.height-2*padding;ctx.strokeStyle='#d1d5db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padding,padding);ctx.lineTo(padding,canvas.height-padding);ctx.lineTo(canvas.width-padding,canvas.height-padding);ctx.stroke();if(history.length===0)return;const maxVal=Math.max(...history.map(h=>h.value));const minVal=Math.min(...history.map(h=>h.value));const range=Math.max(maxVal-minVal,1);const barWidth=drawWidth/Math.max(history.length,1);history.forEach((point,i)=>{const x=padding+i*barWidth+5;const normalized=(point.value-minVal)/range;const barHeight=normalized*drawHeight;const y=canvas.height-padding-barHeight;const prevVal=i>0?history[i-1].value:point.value;ctx.fillStyle=point.value<prevVal?'#10b981':'#ef4444';ctx.fillRect(x,y,barWidth-10,barHeight)})}setTimeout(drawCurveChart,100);</script></body></html>
